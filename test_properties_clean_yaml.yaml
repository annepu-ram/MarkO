# Test YAML to verify properties panel fix
# This should only show explicitly set values, not all defaults

- name: page
  properties:
    layout:
      direction: column
      align: start
  components:
    # Heading with only text changed (should only show text property)
    - name: heading
      properties:
        text: Test Heading
    
    # Paragraph with custom color (should only show text and color)
    - name: paragraph
      properties:
        text: This is a test paragraph with custom color
        typography:
          color: '#3b82f6'
    
    # Button with custom appearance (should only show changed properties)
    - name: button
      properties:
        text: Click Me
        appearance:
          variant: primary
          radius: lg
    
    # Link with underline disabled (should show text, href, and underline)
    - name: link
      properties:
        text: Custom Link
        href: https://example.com
        underline: false

