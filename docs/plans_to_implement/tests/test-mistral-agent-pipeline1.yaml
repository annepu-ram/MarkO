          - label: Fiction
            href: '#fiction'
          - label: Non-Fiction
            href: '#non-fiction'
          - label: Self-Help
            href: '#self-help'
          - label: Business
            href: '#business'
          - label: Academic
            href: '#academic'
          - label: Crafts & Art
            href: '#crafts-art'
        layout:
          alignment: left
          height: 60
        appearance:
          background:
            color: '#352A21'
            transparency: 100
          border:
            width: 1
            style: solid
            color: '#4A3728'
        typography:
          title:
            size: 22
            weight: bold
            color: '#E8D5B7'
          menu:
            size: 14
            weight: medium
            color: '#B8A890'
    - name: layout-row
      properties:
        layout:
          horizontalAlign: space-between
          wrap: nowrap
          verticalAlign: center
        spacing:
          paddingBlock: xs
          paddingInline: lg
        appearance:
          background:
            color: '#352A21'
            transparency: 100
          border:
            width: 0
      components:
      - name: layout-row
        properties:
          layout:
            horizontalAlign: space-evenly
            verticalAlign: center
        components:
        - name: icon
          properties:
            name: store
            appearance:
              color: '#B8A890'
        - name: input
          properties:
            placeholder: Search books...
            appearance:
              border:
                width: 1
                style: solid
                color: '#4A3728'
              radius: sm
            spacing:
              paddingInline: md
      - name: layout-row
        properties:
