- name: site
  properties:
    theme:
      fonts:
        heading: &font-heading "'Lora', serif"
        content: &font-content "'Inter', sans-serif"
      colors:
        primary: &color-primary '#4A1942'
        text: &color-text '#5A3050'
        secondary: &color-secondary '#E8A0BF'
        accent: &color-accent '#C74B7A'
        background: &color-background '#FFF0F5'
  components:
    - name: page
      slug: home
      title: Pages Store
      properties:
        appearance:
          background:
            color: *color-background
            transparency: 100
      components:
        - name: titlebar
          properties:
            branding:
              showLogo: true
              logoUrl: https://images.unsplash.com/photo-1560179707-f14e90ef3623?w=60&h=60&fit=crop
              title: Book Haven
            navigation:
              links:
                - label: Home
                  href: '#home'
                - label: Fiction
                  href: '#fiction'
                - label: Non-Fiction
                  href: '#non-fiction'
                - label: Self-Help & Business
                  href: '#self-help'
                - label: Academic
                  href: '#academic'
                - label: Crafts & Art Supplies
                  href: '#crafts'
                - label: About Us
                  href: '#about'
                - label: Contact
                  href: '#contact'
            layout:
              alignment: left
              height: 64
            scroll:
              shrinkPercentage: 80
            appearance:
              background:
                color: *color-background
                transparency: 100
              border:
                width: 0
                style: solid
                color: *color-primary
              focus:
                background: *color-accent
                color: *color-background
            typography:
              title:
                size: 22
                weight: bold
                color: *color-primary
              menu:
                size: 15
                weight: medium
                color: *color-text
        - name: layout-row
          properties:
            layout:
              horizontalAlign: space-between
              verticalAlign: center
              wrap: nowrap
            appearance:
              background:
                color: *color-background
                transparency: 100
            spacing:
              paddingBlock: sm
              paddingInline: md
          components:
            - name: layout-column
              properties:
                layout:
                  horizontalAlign: left
                  widthMode: fit
              components:
                - name: icon
                  properties:
                    name: search
                    size: '20'
                    color: *color-text
                - name: link
                  properties:
                    text: Search
                    href: '#search'
                    appearance:
                      underline: false
                      showArrow: false
                    typography:
                      size: md
                      color: *color-text
                    spacing:
                      marginInline: xs
            - name: layout-column
              properties:
                layout:
                  horizontalAlign: right
                  widthMode: fit
              components:
                - name: badge
                  properties:
                    text: 50% Off Old Books
                    pill: true
                    typography:
                      color: *color-background
                    appearance:
                      background:
                        color: *color-accent
                      radius: pill
                      shadow: soft
                - name: icon
                  properties:
                    name: shopping-cart
                    size: '20'
                    color: *color-text
                    spacing:
                      marginInline: xs
                - name: link
                  properties:
                    text: Cart
                    href: '#cart'
                    appearance:
                      underline: false
                      showArrow: false
                    typography:
                      size: md
                      color: *color-text
                    spacing:
                      marginInline: xs
        - name: layout-row
