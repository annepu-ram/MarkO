# Test: Lottie Animation Component
# Renders JSON-based vector animations using the lottie-web library.
# The library is lazy-loaded from CDN on first use.
#
# Properties:
#   src               — URL to Lottie JSON file
#   loop              — true to loop animation continuously
#   autoplay          — true to play on load (when trigger is 'none')
#   trigger           — Play trigger: none (auto), scroll (IntersectionObserver), hover
#   width             — Container width in pixels
#   height            — Container height in pixels
#
# Runtime behavior:
#   - Lazy-loads lottie-web from CDN (cdnjs.cloudflare.com) on first use
#   - trigger: none + autoplay: true = plays immediately
#   - trigger: scroll = plays when scrolled into viewport (IntersectionObserver)
#   - trigger: hover = plays on mouseenter, stops on mouseleave
#   - Instances tracked for cleanup in SwiftSites.reset()
#   - When no src is set, shows dashed-border placeholder


- name: site
  properties:
    theme:
      fonts:
        heading: &font-heading "'Inter', sans-serif"
        content: &font-content "'Inter', sans-serif"
      colors:
        primary: &color-primary '#1e293b'
        secondary: &color-secondary '#6b7280'
        accent: &color-accent '#3b82f6'
        background: &color-background '#ffffff'
  components:
    - name: page
      slug: home
      title: "Lottie Animation Test"
      properties:
        appearance: { background: { color: '#ffffff', transparency: 100 } }
      components:
        - name: heading
          properties:
            text: "Lottie Animation Component Test"
            level: 1
            typography: { size: xxl, weight: bold, align: center, color: '#111827' }
            spacing: { marginBlock: lg }

        # ─────────────────────────────────────────
        # PLACEHOLDER (no src)
        # Shows when no JSON URL is configured
        # ─────────────────────────────────────────
        - name: paragraph
          properties:
            text: "No src — Shows placeholder"
            typography: { size: sm, weight: semibold, color: '#6b7280' }
            spacing: { marginBlock: sm }

        - name: layout-column
          properties: { layout: { horizontalAlign: center } }
          components:
            - name: lottie-animation
              properties:
                src: ''                   # Empty = placeholder mode
                width: 200
                height: 200

        - name: br
          properties: { type: solid, thickness: 1, color: '#e5e7eb', size: lg }

        # ─────────────────────────────────────────
        # TRIGGER: none (autoplay)
        # Plays immediately on load
        # ─────────────────────────────────────────
        - name: paragraph
          properties:
            text: "trigger: none + autoplay: true — Plays immediately"
            typography: { size: sm, weight: semibold, color: '#6b7280' }
            spacing: { marginBlock: sm }

        - name: layout-column
          properties: { layout: { horizontalAlign: center } }
          components:
            - name: lottie-animation
              properties:
                src: 'https://assets2.lottiefiles.com/packages/lf20_jcikwtux.json'
                loop: true
                autoplay: true
                trigger: none             # Auto-play mode
                width: 250
                height: 250

        - name: br
          properties: { type: solid, thickness: 1, color: '#e5e7eb', size: lg }

        # ─────────────────────────────────────────
        # TRIGGER: scroll
        # Plays when scrolled into viewport
        # ─────────────────────────────────────────
        - name: paragraph
          properties:
            text: "trigger: scroll — Plays when scrolled into view"
            typography: { size: sm, weight: semibold, color: '#6b7280' }
            spacing: { marginBlock: sm }

        - name: layout-column
          properties: { layout: { horizontalAlign: center } }
          components:
            - name: lottie-animation
              properties:
                src: 'https://assets2.lottiefiles.com/packages/lf20_jcikwtux.json'
                loop: false               # Plays once
                autoplay: true
                trigger: scroll           # IntersectionObserver trigger
                width: 250
                height: 250

        - name: br
          properties: { type: solid, thickness: 1, color: '#e5e7eb', size: lg }

        # ─────────────────────────────────────────
        # TRIGGER: hover
        # Plays on mouse enter, stops on mouse leave
        # ─────────────────────────────────────────
        - name: paragraph
          properties:
            text: "trigger: hover — Hover to play (mouse over the animation)"
            typography: { size: sm, weight: semibold, color: '#6b7280' }
            spacing: { marginBlock: sm }

        - name: layout-column
          properties: { layout: { horizontalAlign: center } }
          components:
            - name: lottie-animation
              properties:
                src: 'https://assets2.lottiefiles.com/packages/lf20_jcikwtux.json'
                loop: true
                autoplay: false           # Don't play until hovered
                trigger: hover            # Play on mouseenter
                width: 250
                height: 250

        - name: br
          properties: { type: solid, thickness: 1, color: '#e5e7eb', size: lg }

        # ─────────────────────────────────────────
        # SIZE VARIATIONS
        # ─────────────────────────────────────────
        - name: paragraph
          properties:
            text: "Size variations — width and height in pixels"
            typography: { size: sm, weight: semibold, color: '#6b7280' }
            spacing: { marginBlock: sm }

        - name: layout-row
          properties:
            layout: { horizontalAlign: center, verticalAlign: bottom, wrap: wrap, gap: lg }
          components:
            - name: layout-column
              properties: { layout: { horizontalAlign: center, widthMode: fit } }
              components:
                - name: lottie-animation
                  properties:
                    src: 'https://assets2.lottiefiles.com/packages/lf20_jcikwtux.json'
                    loop: true
                    autoplay: true
                    width: 100            # Small
                    height: 100
                - name: caption
                  properties: { text: "100x100", typography: { size: xxs, align: center, color: '#94a3b8' } }

            - name: layout-column
              properties: { layout: { horizontalAlign: center, widthMode: fit } }
              components:
                - name: lottie-animation
                  properties:
                    src: 'https://assets2.lottiefiles.com/packages/lf20_jcikwtux.json'
                    loop: true
                    autoplay: true
                    width: 200            # Medium
                    height: 200
                - name: caption
                  properties: { text: "200x200", typography: { size: xxs, align: center, color: '#94a3b8' } }

            - name: layout-column
              properties: { layout: { horizontalAlign: center, widthMode: fit } }
              components:
                - name: lottie-animation
                  properties:
                    src: 'https://assets2.lottiefiles.com/packages/lf20_jcikwtux.json'
                    loop: true
                    autoplay: true
                    width: 350            # Large
                    height: 350
                - name: caption
                  properties: { text: "350x350", typography: { size: xxs, align: center, color: '#94a3b8' } }

        # ─────────────────────────────────────────
        # LOOP: true vs false
        # ─────────────────────────────────────────
        - name: br
          properties: { type: solid, thickness: 1, color: '#e5e7eb', size: lg }

        - name: paragraph
          properties:
            text: "loop: false — Animation plays once then stops"
            typography: { size: sm, weight: semibold, color: '#6b7280' }
            spacing: { marginBlock: sm }

        - name: layout-column
          properties: { layout: { horizontalAlign: center } }
          components:
            - name: lottie-animation
              properties:
                src: 'https://assets2.lottiefiles.com/packages/lf20_jcikwtux.json'
                loop: false               # Plays once
                autoplay: true
                trigger: none
                width: 200
                height: 200
