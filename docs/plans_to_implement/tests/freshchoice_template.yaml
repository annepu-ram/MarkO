- name: site
  properties:
    theme:
      fonts:
        heading: &font-heading "'Montserrat', sans-serif"
        content: &font-content "'Noto Sans', sans-serif"
      colors:
        primary: &color-primary '#4C4637'
        secondary: &color-secondary '#FAF5E9'
        accent: &color-accent '#FF7A56'
        background: &color-background '#FDF9F0'
  components:
  - name: page
    slug: home
    title: "FreshChoice"
    properties:
      appearance:
        background:
          color: *color-background
          transparency: 100
    components:

        # ============================================
        # STORE INFO BAR
        # ============================================
    - name: titlebar
      properties:
        branding:
          showLogo: true
          logoUrl: https://images.pexels.com/photos/1833338/pexels-photo-1833338.jpeg?auto=compress&cs=tinysrgb&w=80
          title: Fresh Choice
        navigation:
          links:
          - label: Menu
            href: '#menu'
          - label: Cakes
            href: '#cakes'
          - label: About
            href: '#about'
          - label: Locations
            href: '#locations'
        layout:
          alignment: center
          height: 65
        scroll:
          shrinkPercentage: 75
        appearance:
          background:
            color: *color-background
            transparency: 100
          border:
            width: 0
            style: solid
            color: *color-secondary
          focus:
            background: *color-secondary
        typography:
          title:
            size: 24
            weight: bold
            color: *color-primary
          menu:
            size: 15
            weight: medium
            color: *color-primary
    - name: layout-column
      properties:
        layout:
          horizontalAlign: center
        spacing:
          paddingBlock: sm
          paddingInline: md
        appearance:
          background:
            color: *color-primary
            transparency: 100
      components:
      - name: paragraph
        properties:
          text: "Closed — Opens at 10:00 AM today • Fresh Choice Patisserie, Bakery & Cafe"
          typography:
            size: xs
            weight: regular
            color: *color-background
            align: center
          spacing:
            marginBlock: none

        # ============================================
        # HERO CAROUSEL (Split-Screen Cards)
        # ============================================
    - name: carousel
      properties:
        behavior:
          autoplay: true
          delay: 5000
          loop: true
          pauseOnHover: true
          swipeEnabled: true
          keyboardNavigation: true
        animation:
          effect: fade
          duration: 500
        navigation:
          showArrows: false
          showDots: true
        indicators:
          style: dots
          position: bottom
        accessibility:
          showPauseButton: false
          ariaLabel: 'Featured categories carousel'
        spacing:
          marginBlock: none
          marginInline: none
      slides:
            # ---- Slide 1: Patisserie / Bakery ----
      - components:
        - name: image
          properties:
            source:
              url: https://images.pexels.com/photos/1070850/pexels-photo-1070850.jpeg?auto=compress&cs=tinysrgb&w=1260&h=750&dpr=1
              altText: Fresh baked pastries and cakes display
            appearance:
              minHeight: 35
              fit: cover
              cornerStyle: none
              objectPosition: center
              maxHeight: 0
              filter: none
              shadow: none
              hoverEffect: none
              lazy: true
              padding:
                block: none
                inline: none
              overlay:
                enabled: false
                color: *color-primary
                opacity: 1
            layout:
              widthMode: stretch
              horizontalAlign: left
            spacing:
              marginBlock: none
              marginInline: none
          components:
          - name: layout-column
            properties:
              layout:
                horizontalAlign: left
                widthMode: "50"
                tag: section
                wrap: nowrap
                gap: none
              appearance:
                background:
                  color: *color-background
                  transparency: 100
                  type: solid
                padding:
                  block: sm
                  inline: sm
                border:
                  width: 0
                  style: solid
                  color: *color-primary
                radius: none
                shadow: none
              spacing:
                paddingBlock: xxxl
                paddingInline: xl
                marginBlock: none
                marginInline: none
            components:
            - name: eyebrow
              properties:
                text: PATISSERIE
                typography:
                  size: xs
                  weight: semibold
                  color: *color-accent
                  transform: uppercase
                  letterSpacing: wider
                spacing:
                  marginBlock: sm
            - name: heading
              properties:
                text: "Freshly baked goods made with love every morning."
                level: 1
                typography:
                  size: lg
                  weight: bold
                  color: *color-primary
                  lineHeight: '1.15'
                spacing:
                  marginBlock: md
            - name: button
              properties:
                text: Explore
                appearance:
                  background:
                    color: 'transparent'
                    transparency: 0
                  border:
                    width: 1
                    style: solid
                    color: *color-primary
                  radius: none
                  padding:
                    block: sm
                    inline: lg
                typography:
                  color: *color-primary
                  weight: medium
                  size: md
                spacing:
                  marginBlock: md

