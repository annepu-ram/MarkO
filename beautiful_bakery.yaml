- name: page
  properties:
    background: { color: '#fdf8f2' }
  components:
    - name: titlebar
      properties:
        branding:
          title: The Golden Crust
          logoUrl: https://images.pexels.com/photos/205961/pexels-photo-205961.jpeg?auto=compress&cs=tinysrgb&w=100
        navigation:
          links:
            - label: Home
              href: '#home'
            - label: Our Goodies
              href: '#goodies'
            - label: About
              href: '#about'
            - label: Contact
              href: '#contact'
        appearance:
          background: { color: '#ffffff', transparency: 95 }
          border: { width: 1, color: '#e5e7eb' }
        layout:
          alignment: center
          height: 70
    - name: image
      properties:
        source: { url: 'https://images.pexels.com/photos/1721934/pexels-photo-1721934.jpeg?auto=compress&cs=tinysrgb&w=1260&h=750&dpr=1', altText: 'A beautiful spread of freshly baked bread' }
        presentation: { height: 600px, fit: cover }
        layout: { widthMode: stretch }
      components:
        - name: layout-column
          properties:
            layout: { align: center, gap: md }
            spacing: { paddingBlock: xl }
            appearance:
              background: { color: 'rgba(0,0,0,0.4)', transparency: 100 }
              radius: md
              padding: { top: lg, right: lg, bottom: lg, left: lg }
          components:
            - name: heading
              properties:
                text: Handcrafted Goodness, Baked Daily
                level: 1
                typography: { color: '#ffffff', size: xxxl, weight: bold, align: center }
            - name: paragraph
              properties:
                text: Experience the warmth and comfort of artisanal baking, made with love and the finest ingredients.
                typography: { color: '#f0f0f0', size: lg, align: center }
                spacing: { marginBlock: md }
                layout: { widthMode: 75 }
            - name: button
              properties:
                text: Explore Our Menu
                action: { type: link, value: '#goodies' }
                appearance: { background: { color: '#c7926b' }, padding: { block: md, inline: lg } }
                typography: { color: '#ffffff', weight: semibold, size: md }
    - name: layout-column
      properties:
        layout: { align: center, gap: lg }
        spacing: { paddingBlock: xl, paddingInline: md }
      components:
        - name: heading
          properties:
            text: "Today's Freshly Baked Goodies"
            level: 2
            typography: { align: center, color: '#6b4f4b', weight: bold, size: xxl }
            spacing: { marginBlock: md }
        - name: columnsgrid
          properties:
            layout: { columns: 3, gap: lg }
            responsive: { breakpoints: { md: 2, sm: 1 } }
          columns:
            - components:
                - name: image
                  properties:
                    source: { url: 'https://images.pexels.com/photos/380954/pexels-photo-380954.jpeg?auto=compress&cs=tinysrgb&w=600', altText: 'Flaky croissants' }
                    presentation: { height: 250px, fit: cover, cornerStyle: lg }
                - name: heading
                  properties:
                    text: Butter Croissants
                    level: 3
                    typography: { color: '#a47551', weight: semibold, align: center }
                - name: paragraph
                  properties:
                    text: Flaky, buttery, and simply irresistible. A true classic.
                    typography: { align: center, color: '#6b4f4b' }
            - components:
                - name: image
                  properties:
                    source: { url: 'https://images.pexels.com/photos/1775043/pexels-photo-1775043.jpeg?auto=compress&cs=tinysrgb&w=600', altText: 'Crusty sourdough bread' }
                    presentation: { height: 250px, fit: cover, cornerStyle: lg }
                - name: heading
                  properties:
                    text: Rustic Sourdough
                    level: 3
                    typography: { color: '#a47551', weight: semibold, align: center }
                - name: paragraph
                  properties:
                    text: Our signature crusty sourdough, perfect for any meal.
                    typography: { align: center, color: '#6b4f4b' }
            - components:
                - name: image
                  properties:
                    source: { url: 'https://images.pexels.com/photos/267951/pexels-photo-267951.jpeg?auto=compress&cs=tinysrgb&w=600', altText: 'Gooey Cinnamon Roll' }
                    presentation: { height: 250px, fit: cover, cornerStyle: lg }
                - name: heading
                  properties:
                    text: Cinnamon Rolls
                    level: 3
                    typography: { color: '#a47551', weight: semibold, align: center }
                - name: paragraph
                  properties:
                    text: Warm, gooey, and topped with cream cheese frosting.
                    typography: { align: center, color: '#6b4f4b' }
    - name: layout-column
      properties:
        layout: { align: center, gap: md }
        spacing: { paddingBlock: xl, paddingInline: md }
        background: { color: '#ffffff' }
      components:
        - name: heading
          properties:
            text: "A Peek Inside Our Oven"
            level: 2
            typography: { align: center, color: '#6b4f4b', weight: bold, size: xxl }
            spacing: { marginBlock: md }
        - name: carousel
          properties:
            slides:
              - components:
                - name: image
                  properties:
                    source: { url: 'https://images.pexels.com/photos/1854037/pexels-photo-1854037.jpeg?auto=compress&cs=tinysrgb&w=1000', altText: 'A beautiful decorated cake' }
                    presentation: { height: 500px, fit: cover, cornerStyle: lg }
              - components:
                - name: image
                  properties:
                    source: { url: 'https://images.pexels.com/photos/3218467/pexels-photo-3218467.jpeg?auto=compress&cs=tinysrgb&w=1000', altText: 'Colorful macarons' }
                    presentation: { height: 500px, fit: cover, cornerStyle: lg }
              - components:
                - name: image
                  properties:
                    source: { url: 'https://images.pexels.com/photos/1027811/pexels-photo-1027811.jpeg?auto=compress&cs=tinysrgb&w=1000', altText: 'Decorated cupcakes' }
                    presentation: { height: 500px, fit: cover, cornerStyle: lg }
              - components:
                - name: image
                  properties:
                    source: { url: 'https://images.pexels.com/photos/1368498/pexels-photo-1368498.jpeg?auto=compress&cs=tinysrgb&w=1000', altText: 'Assortment of pastries' }
                    presentation: { height: 500px, fit: cover, cornerStyle: lg }
            behavior: { autoplay: true, delay: 4000, loop: true }
            navigation: { showArrows: true, showDots: true }
    - name: layout-row
      properties:
        layout: { gap: xl, align: center }
        spacing: { paddingBlock: xl, paddingInline: md }
        background: { color: '#ffffff' }
      components:
        - name: image
          properties:
            source: { url: 'https://images.pexels.com/photos/236781/pexels-photo-236781.jpeg?auto=compress&cs=tinysrgb&w=800', altText: 'Baker kneading dough' }
            presentation: { height: 400px, fit: cover, cornerStyle: lg }
        - name: layout-column
          properties:
            layout: { gap: md }
          components:
            - name: eyebrow
              properties:
                text: Our Story
                typography: { size: sm, weight: bold, transform: uppercase, color: '#c7926b' }
            - name: heading
              properties:
                text: Baked with Passion
                level: 2
                typography: { color: '#6b4f4b', weight: bold, size: xxl }
            - name: paragraph
              properties:
                text: |
                  Founded in 2005, The Golden Crust began with a simple mission: to bring the joy of traditional, artisanal baking to our community. We believe in using only the finest locally-sourced ingredients, time-honored techniques, and a whole lot of love. Every loaf, pastry, and cake that leaves our ovens is a piece of our heart.
                typography: { color: '#6b4f4b', size: md, lineHeight: '1.6' }
    - name: layout-column
      properties:
        layout: { align: center, gap: md }
        spacing: { paddingBlock: xl, paddingInline: md }
      components:
        - name: heading
          properties:
            text: From Our Happy Customers
            level: 2
            typography: { align: center, color: '#6b4f4b', weight: bold, size: xxl }
        - name: columnsgrid
          properties:
            layout: { columns: 3, gap: lg }
            responsive: { breakpoints: { sm: 1 } }
          columns:
            - components:
              - name: blockquote
                properties:
                  quote: The best sourdough in town! I come here every single morning.
                  cite: '- Sarah J.'
                  appearance: { background: { color: '#ffffff' }, border: { accentColor: '#c7926b' } }
            - components:
              - name: blockquote
                properties:
                  quote: The croissants are absolutely heavenly. You can taste the quality ingredients.
                  cite: '- Michael B.'
                  appearance: { background: { color: '#ffffff' }, border: { accentColor: '#c7926b' } }
            - components:
              - name: blockquote
                properties:
                  quote: I ordered a custom cake for my daughter's birthday and it was a work of art! And delicious too!
                  cite: '- Emily R.'
                  appearance: { background: { color: '#ffffff' }, border: { accentColor: '#c7926b' } }
    - name: layout-row
      properties:
        layout: { align: center, gap: lg }
        spacing: { paddingBlock: xl, paddingInline: lg }
        background: { color: '#a47551' }
      components:
        - name: layout-column
          properties:
            layout: { gap: sm }
          components:
            - name: heading
              properties:
                text: Get In Touch
                level: 2
                typography: { weight: bold, color: '#ffffff' }
            - name: paragraph
              properties:
                text: Have a question or a special order? We'd love to hear from you.
                typography: { color: '#fdf8f2' }
        - name: form
          properties:
            layout: { direction: row, gap: md }
            submit: { show: false }
            responsive: { breakpoints: { sm: 1 } }
          components:
            - name: textbox
              properties: { label: { show: false }, field: { placeholder: 'Your email address' } }
            - name: button
              properties:
                text: Subscribe
                appearance: { background: { color: '#6b4f4b' } }
                typography: { color: '#ffffff' }
    - name: layout-column
      properties:
        layout: { align: center, gap: sm }
        spacing: { paddingBlock: lg }
        background: { color: '#3d302a' }
      components:
        - name: paragraph
          properties:
            text: '© 2025 The Golden Crust. All Rights Reserved.'
            typography: { color: '#d1d5db', size: sm }
        - name: paragraph
          properties:
            text: '123 Bread Street, Pastryville, CA 90210'
            typography: { color: '#d1d5db', size: sm }
