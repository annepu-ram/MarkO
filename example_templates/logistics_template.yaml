- name: page
  properties:
    theme:
      fonts:
        heading: &font-heading "'Inter', sans-serif"
        content: &font-content "'Open Sans', sans-serif"
      colors:
        # 60-30-10 Color System:
        # Primary (30%) = TEXT - all headings, paragraphs, body text
        # Secondary (10%) = UI elements, section highlights, regular buttons
        # Accent (CTAs only) = Call-to-action buttons like "Get Quote", "Track Shipment"
        # Background (60%) = Page base, content areas
        primary: &color-primary '#1a365d'
        secondary: &color-secondary '#0d6efd'
        accent: &color-accent '#198754'
        background: &color-background '#f8f9fa'
    appearance:
      background:
        color: *color-background
    layout:
      padding:
        top: none
        right: none
        bottom: none
        left: none
  components:
  - name: titlebar
    properties:
      branding:
        title: Swift Logistics
        logoUrl: https://images.pexels.com/photos/1267320/pexels-photo-1267320.jpeg?auto=compress&cs=tinysrgb&w=100
      appearance:
        background:
          color: *color-background
      navigation:
        links:
        - label: Home
          href: '#home'
        - label: Services
          href: '#services'
        - label: Tracking
          href: '#tracking'
        - label: Contact
          href: '#contact'
  - name: image
    properties:
      source:
        url: https://images.pexels.com/photos/1267320/pexels-photo-1267320.jpeg?auto=compress&cs=tinysrgb&w=1260&h=750&dpr=1
        altText: Logistics warehouse with shipping containers
      appearance:
        minHeight: 25
        fit: cover
        cornerStyle: none
      spacing:
        marginBlock: sm
        marginInline: none
      layout:
        widthMode: stretch
    components:
    - name: heading
      properties:
        text: Efficient & Reliable Logistics Solutions
        typography:
          color: *color-background
          align: center
        appearance:
          background:
            color: rgba(0, 0, 0, 0.5)
          padding:
            block: md
            inline: md
          radius: sm
        level: 1
  - name: heading
    properties:
      text: Our Services
      typography:
        align: center
        color: *color-primary
      spacing:
        marginBlock: lg
      level: 2
  - name: tabs
    properties:
      layout:
        orientation: horizontal
      typography:
        label:
          active:
            color: *color-primary
          inactive:
            color: *color-secondary
      appearance:
        tab:
          background:
            active: *color-background
            inactive: *color-secondary
        content:
          background:
            color: *color-background
          border:
            color: *color-secondary
      tabs:
      - title: Air Freight
        content: ''
      - title: Sea Freight
        content: ''
      - title: Land Transport
        content: ''
  - name: columnsgrid
    properties:
      layout:
        columns: 3
        gap: md
    columns:
    - components:
      - name: image
        properties:
          source:
            url: https://images.pexels.com/photos/358319/pexels-photo-358319.jpeg?auto=compress&cs=tinysrgb&w=600
            altText: Airplane taking off
          appearance:
            minHeight: 12.5
            fit: cover
            cornerStyle: sm
          layout:
            widthMode: stretch
      - name: heading
        properties:
          text: Air Freight
          level: 3
          typography:
            color: *color-primary
            weight: semibold
      - name: paragraph
        properties:
          text: Fast and reliable air freight services for your urgent shipping needs.
          typography:
            align: center
            color: *color-primary
    - components:
      - name: image
        properties:
          source:
            url: https://images.pexels.com/photos/1267338/pexels-photo-1267338.jpeg?auto=compress&cs=tinysrgb&w=600
            altText: Cargo ship at port
          appearance:
            minHeight: 12.5
            fit: cover
            cornerStyle: sm
          layout:
            widthMode: stretch
      - name: heading
        properties:
          text: Sea Freight
          level: 3
          typography:
            color: *color-primary
            weight: semibold
      - name: paragraph
        properties:
          text: Cost-effective sea freight solutions for large shipments.
          typography:
            align: center
            color: *color-primary
    - components:
      - name: image
        properties:
          source:
            url: https://images.pexels.com/photos/2199293/pexels-photo-2199293.jpeg?auto=compress&cs=tinysrgb&w=600
            altText: Trucks on highway
          appearance:
            minHeight: 12.5
            fit: cover
            cornerStyle: sm
          layout:
            widthMode: stretch
      - name: heading
        properties:
          text: Land Transport
          level: 3
          typography:
            color: *color-primary
            weight: semibold
      - name: paragraph
        properties:
          text: Comprehensive road and rail transport across the country.
          typography:
            align: center
            color: *color-primary
  - name: heading
    properties:
      text: Why Choose Us?
      typography:
        align: center
        color: *color-primary
      spacing:
        marginBlock: lg
      level: 2
  - name: accordion
    properties:
      items:
      - title: Global Network
        content: Our extensive network of partners ensures your shipments reach any destination worldwide with reliable service.
      - title: Advanced Tracking
        content: Real-time tracking of your shipments from origin to destination. Track your packages online or via our mobile app.
      - title: 24/7 Support
        content: Our dedicated team is available around the clock to assist you with any queries or concerns about your shipments.
      behavior:
        allowMultipleOpen: false
      typography:
        title:
          color: *color-primary
        content:
          color: *color-primary
      appearance:
        titleBackground:
          color: *color-background
        border:
          color: *color-secondary
        contentBackground:
          color: *color-background
  - name: video
    properties:
      source:
        url: https://www.youtube.com/watch?v=dQw4w9WgXcQ
      playback:
        controls: true
        autoplay: false
        muted: false
      spacing:
        marginBlock: lg
