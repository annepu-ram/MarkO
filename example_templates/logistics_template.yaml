- name: page
  properties:
    backgroundColor: '#f8f9fa'
    padding: 0
  components:
  - name: titlebar
    properties:
      title: Swift Logistics
      logo: https://images.pexels.com/photos/1267320/pexels-photo-1267320.jpeg?auto=compress&cs=tinysrgb&w=1260&h=750&dpr=1
      backgroundColor: '#ffffff'
      links:
      - text: Home
        value: '#home'
      - text: Services
        value: '#services'
      - text: Tracking
        value: '#tracking'
      - text: Contact
        value: '#contact'
  - name: image
    properties:
      src: https://images.pexels.com/photos/1267320/pexels-photo-1267320.jpeg?auto=compress&cs=tinysrgb&w=1260&h=750&dpr=1
      alt: Logistics warehouse
      height: 300px
      padding: '0'
      margin: '10'
      borderRadius: '0'
    components:
    - name: heading
      properties:
        text: Efficient & Reliable Logistics Solutions
        color: '#ffffff'
        textAlign: center
        backgroundColor: rgba(0, 0, 0, 0.5)
        padding: 20
        borderRadius: 5
        level: 1
        variant: display
  - name: heading
    properties:
      text: Our Services
      textAlign: center
      margin: 40 0 20 0
      level: 2
      variant: default
  - name: tabs
    properties:
      tabs:
      - title: Air Freight
        components:
        - name: image
          properties:
            src: https://images.pexels.com/photos/4481258/pexels-photo-4481258.jpeg?auto=compress&cs=tinysrgb&w=1260&h=750&dpr=1"
            alt: Air Freight
            height: 200px
            borderRadius: 5
        - name: paragraph
          properties:
            text: Fast and reliable air freight services for your urgent shipping
              needs.
            textAlign: center
      - title: Sea Freight
        components:
        - name: image
          properties:
            src: https://images.pexels.com/photos/1267338/pexels-photo-1267338.jpeg?auto=compress&cs=tinysrgb&w=1260&h=750&dpr=1
            alt: Sea Freight
            height: 200px
            borderRadius: 5
        - name: paragraph
          properties:
            text: Cost-effective sea freight solutions for large shipments.
            textAlign: center
      - title: Land Transport
        components:
        - name: image
          properties:
            src: https://images.pexels.com/photos/2199293/pexels-photo-2199293.jpeg?auto=compress&cs=tinysrgb&w=1260&h=750&dpr=1
            alt: Land Transport
            height: 200px
            borderRadius: 5
        - name: paragraph
          properties:
            text: Comprehensive road and rail transport across the country.
            textAlign: center
  - name: accordion
    properties:
      title: Why Choose Us?
      margin: 40
    content:
      components:
      - name: heading
        properties:
          text: Global Network
          level: 3
          variant: subtitle
      - name: paragraph
        properties:
          text: Our extensive network of partners ensures your shipments reach any
            destination worldwide.
      - name: heading
        properties:
          text: Advanced Tracking
          level: 3
          variant: subtitle
      - name: paragraph
        properties:
          text: Real-time tracking of your shipments from origin to destination.
      - name: heading
        properties:
          text: 24/7 Support
          level: 3
          variant: subtitle
      - name: paragraph
        properties:
          text: Our dedicated team is available around the clock to assist you with
            any queries.
  - name: video
    properties:
      src: https://www.youtube.com/watch?v=3t5-pA0A_lk
      margin: 40
