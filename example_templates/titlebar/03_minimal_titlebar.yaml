# Minimal Titlebar - Clean Centered Header
# A minimal titlebar with centered brand name, sparse navigation, and transparent background, followed by a clean hero
# Base components: titlebar, layout-column, heading, paragraph, button
# Section type: navigation
# Layout: stacked
# Visual style: aurora_gradient
# Perfect for: consulting firm, law firm, online store, fashion brand, photography studio, design portfolio, creative studio, wellness spa


- name: site
  properties:
    theme:
      fonts:
        heading: &font-heading "'Sora', sans-serif"
        content: &font-content "'Inter', sans-serif"
      colors:
        primary: &color-primary '#1A2035'
        text: &color-text '#313541'
        secondary: &color-secondary '#C8D8F0'
        accent: &color-accent '#EC4899'
        background: &color-background '#E6F0FA'
  components:
  - name: page
    slug: home
    title: "Minimal Titlebar"
    properties:
      appearance: {background: {color: *color-background, opacity: 100}}
    components:

        # ============================================
        # MINIMAL TITLEBAR
        # ============================================
    - name: titlebar
      properties:
        branding:
          showLogo: false
          title: 'Aurora Studio'
        navigation:
          links:
          - label: Work
            href: '#work'
          - label: About
            href: '#about'
          - label: Contact
            href: '#contact'
        layout: {alignment: center, height: 60}
        scroll:
          shrinkPercentage: 85
        appearance:
          background: {color: *color-background, opacity: 50}
          border: {width: 0}
          focus:
            background: *color-background
            color: *color-accent
        typography:
          title: {size: 20, weight: bold, color: *color-primary}
          menu: {size: 14, weight: regular, color: *color-primary}

        # ============================================
        # GRADIENT HERO
        # ============================================
    - name: layout-column
      properties:
        layout: {horizontalAlign: space-evenly}
        appearance:
          background:
            type: gradient
            gradient:
              colorStart: *color-background
              colorEnd: *color-secondary
              direction: to bottom right
        spacing:
          paddingBlock: xxxl
          paddingInline: xl
      components:
      - name: heading
        properties:
          text: Design That Speaks
          level: 1
          typography: {size: xxxl, weight: bold, color: *color-primary, align: center, letterSpacing: tight}
          spacing: {marginBlock: md, paddingBlock: md, paddingInline: xl}
      - name: paragraph
        properties:
          text: We craft digital experiences that connect brands with their audience through thoughtful, intentional design.
          typography: {size: lg, color: *color-text, align: center, lineHeight: '1.8'}
          layout: {widthMode: 66}
          spacing: {marginBlock: lg}
      - name: button
        properties:
          text: View Our Work
          appearance:
            background:
              type: gradient
              gradient:
                colorStart: *color-accent
                colorEnd: '#8B5CF6'
                direction: to right
            radius: pill
          typography: {color: '#ffffff', weight: semibold, size: md}
