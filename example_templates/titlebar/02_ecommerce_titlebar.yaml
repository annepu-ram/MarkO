# Ecommerce Titlebar - Dark Online Store Header
# A sleek dark-mode ecommerce titlebar with logo, store navigation, and shop CTA, followed by a featured product hero
# Base components: titlebar, layout-column, layout-row, heading, paragraph, eyebrow, button, image
# Section type: navigation
# Layout: stacked, split
# Visual style: monochrome_dark
# Perfect for: consulting firm, law firm, online store, fashion brand, photography studio, design portfolio, creative studio, wellness spa


- name: site
  properties:
    theme:
      fonts:
        heading: &font-heading "'Space Grotesk', sans-serif"
        content: &font-content "'Inter', sans-serif"
      colors:
        primary: &color-primary '#F5F5F5'
        text: &color-text '#D9D9D9'
        secondary: &color-secondary '#1F1F1F'
        accent: &color-accent '#DC143C'
        background: &color-background '#0F0F0F'
  components:
  - name: page
    slug: home
    title: "Ecommerce Titlebar"
    properties:
      appearance: {background: {color: *color-background, opacity: 100}}
    components:

        # ============================================
        # DARK ECOMMERCE TITLEBAR
        # ============================================
    - name: titlebar
      properties:
        branding:
          showLogo: true
          logoUrl: 'https://images.unsplash.com/photo-1441986300917-64674bd600d8?w=60&h=60&fit=crop'
          title: 'NOIR'
        navigation:
          links:
          - label: Shop
            href: '#shop'
          - label: Collections
            href: '#collections'
          - label: Sale
            href: '#sale'
          - label: New Arrivals
            href: '#new'
        layout: {alignment: left, height: 64}
        scroll:
          shrinkPercentage: 80
        appearance:
          background: {color: *color-secondary, opacity: 100}
          border: {width: 1, style: solid, color: '#333333'}
          focus:
            background: *color-secondary
            color: *color-accent
        typography:
          title: {size: 24, weight: bold, color: *color-primary}
          menu: {size: 14, weight: medium, color: '#a0a0a0'}

        # ============================================
        # FEATURED PRODUCT HERO
        # ============================================
    - name: layout-row
      properties:
        layout: {horizontalAlign: space-evenly, wrap: nowrap, verticalAlign: center}
        appearance:
          background: {color: *color-secondary, opacity: 100}
        spacing:
          paddingBlock: xxxl
          paddingInline: xl
      components:
      - name: layout-column
        properties:
          layout: {widthMode: "50", horizontalAlign: space-evenly}
          spacing: {paddingBlock: lg, paddingInline: lg}
        components:
        - name: eyebrow
          properties:
            text: NEW COLLECTION
            typography: {size: xs, weight: semibold, color: *color-accent, transform: uppercase, letterSpacing: wider}
        - name: heading
          properties:
            text: Winter Essentials 2026
            level: 1
            typography: {size: xxxl, weight: semibold, color: *color-primary, letterSpacing: wide}
            spacing: {marginBlock: md, paddingBlock: md, paddingInline: xl}
        - name: paragraph
          properties:
            text: Discover our curated selection of premium winter pieces. Crafted with the finest materials for timeless style.
            typography: {size: md, color: '#a0a0a0', lineHeight: '1.7'}
            spacing: {marginBlock: md}
        - name: button
          properties:
            text: Shop Now
            appearance:
              background: {color: *color-accent}
              radius: xs
              border: {width: 1, style: solid, color: '#444444'}
            typography: {color: *color-primary, weight: semibold, size: md}
      - name: image
        properties:
          source: {url: 'https://images.unsplash.com/photo-1483985988355-763728e1935b?w=600&h=500&fit=crop'}
          layout: {widthMode: "50"}
          appearance: {radius: xs}
