# Badge: Status Dashboard
# System status cards using all four badge variants

- name: page
  properties:
    theme:
      colors:
        background: &color-background '#0f172a'
        primary: &color-primary '#f8fafc'
        secondary: &color-secondary '#94a3b8'
        accent: &color-accent '#38bdf8'
      fonts:
        heading: &font-heading "'Inter', sans-serif"
        content: &font-content "'Inter', sans-serif"
    appearance: { background: { color: *color-background } }
  components:
    - name: layout-row
      properties:
        layout: { horizontalAlign: center }
        spacing: { paddingBlock: xl }
      components:
        - name: layout-column
          properties:
            layout: { widthMode: '75', horizontalAlign: center }
          components:
            - name: heading
              properties:
                text: System Status
                level: 2
                typography: { size: xxl, weight: bold, color: *color-primary, align: center }
            - name: paragraph
              properties:
                text: Real-time monitoring of all services
                typography: { size: md, color: *color-secondary, align: center }
                spacing: { marginBlock: sm }

    - name: columnsgrid
      properties:
        layout: { columns: 2, gap: md }
        responsive: { breakpoints: { sm: 1 } }
        spacing: { paddingBlock: lg, paddingInline: lg }
      columns:
        - components:
            - name: layout-column
              properties:
                appearance: { background: { color: '#1e293b' }, radius: lg }
                spacing: { paddingBlock: lg, paddingInline: lg }
              components:
                - name: layout-row
                  properties:
                    layout: { horizontalAlign: left, verticalAlign: center, gap: sm }
                  components:
                    - name: icon
                      properties: { name: dns, size: "28", color: '#10b981' }
                    - name: heading
                      properties:
                        text: API Server
                        level: 3
                        typography: { size: lg, weight: semibold, color: *color-primary }
                - name: badge
                  properties: { text: "OPERATIONAL", variant: success, pill: false }
                - name: paragraph
                  properties:
                    text: "Uptime: 99.99% | Response: 45ms"
                    typography: { size: sm, color: *color-secondary }
                    spacing: { marginBlock: sm }

        - components:
            - name: layout-column
              properties:
                appearance: { background: { color: '#1e293b' }, radius: lg }
                spacing: { paddingBlock: lg, paddingInline: lg }
              components:
                - name: layout-row
                  properties:
                    layout: { horizontalAlign: left, verticalAlign: center, gap: sm }
                  components:
                    - name: icon
                      properties: { name: storage, size: "28", color: '#f59e0b' }
                    - name: heading
                      properties:
                        text: Database Cluster
                        level: 3
                        typography: { size: lg, weight: semibold, color: *color-primary }
                - name: badge
                  properties: { text: "DEGRADED", variant: warning, pill: false }
                - name: paragraph
                  properties:
                    text: "Uptime: 99.5% | Latency: 120ms"
                    typography: { size: sm, color: *color-secondary }
                    spacing: { marginBlock: sm }

        - components:
            - name: layout-column
              properties:
                appearance: { background: { color: '#1e293b' }, radius: lg }
                spacing: { paddingBlock: lg, paddingInline: lg }
              components:
                - name: layout-row
                  properties:
                    layout: { horizontalAlign: left, verticalAlign: center, gap: sm }
                  components:
                    - name: icon
                      properties: { name: cloud, size: "28", color: '#10b981' }
                    - name: heading
                      properties:
                        text: CDN Network
                        level: 3
                        typography: { size: lg, weight: semibold, color: *color-primary }
                - name: badge
                  properties: { text: "ALL CLEAR", variant: info, pill: false }
                - name: paragraph
                  properties:
                    text: "Uptime: 100% | Edge nodes: 42"
                    typography: { size: sm, color: *color-secondary }
                    spacing: { marginBlock: sm }

        - components:
            - name: layout-column
              properties:
                appearance: { background: { color: '#1e293b' }, radius: lg }
                spacing: { paddingBlock: lg, paddingInline: lg }
              components:
                - name: layout-row
                  properties:
                    layout: { horizontalAlign: left, verticalAlign: center, gap: sm }
                  components:
                    - name: icon
                      properties: { name: mail, size: "28", color: '#dc2626' }
                    - name: heading
                      properties:
                        text: Email Service
                        level: 3
                        typography: { size: lg, weight: semibold, color: *color-primary }
                - name: badge
                  properties: { text: "OUTAGE", variant: danger, pill: false }
                - name: paragraph
                  properties:
                    text: "Uptime: 94.2% | Queue: 12,450"
                    typography: { size: sm, color: *color-secondary }
                    spacing: { marginBlock: sm }
