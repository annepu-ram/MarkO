# Dashboard Data Card 10 - "Chart Placeholder"
# A video-background component showing an animated data visualization with overlay content describing the trend. Uses dark overlay for readability.
# Base components: page, layout-column, layout-row, heading, eyebrow, video-background, paragraph, caption
# Section type: dashboard
# Layout: stacked
# Visual style: monochrome_dark
# Content volume: standard
# Tone: formal
# Conversion intent: engagement
# Image requirement: none
# Interactivity: video
# Industries: saas
# Perfect for: SaaS, analytics, admin panels, dashboards, business tools

- name: page
  properties:
    theme:
      fonts:
        heading: &font-heading "'Inter', sans-serif"
        content: &font-content "'Inter', sans-serif"
      colors:
        primary: &color-primary '#0f172a'
        text: &color-text '#2B2F3B'
        secondary: &color-secondary '#64748b'
        accent: &color-accent '#6366f1'
        background: &color-background '#f8fafc'
    spacing: {paddingBlock: xl, paddingInline: xl}
    appearance:
      background: {color: *color-background}
  components:
  - name: layout-column
    properties:
      layout:
        horizontalAlign: center
        widthMode: "66"
      spacing:
        paddingBlock: lg
        paddingInline: lg
      appearance:
        background:
          color: *color-background
          opacity: 100
        radius: md
        shadow: soft
    components:
    - name: layout-row
      properties:
        layout:
          horizontalAlign: space-between
          wrap: nowrap
          gap: md
          verticalAlign: center
        spacing:
          marginBlock: xs
      components:
      - name: heading
        properties:
          text: Revenue Trend
          level: 3
          layout:
            widthMode: stretch
          typography:
            size: md
            weight: bold
            color: *color-primary
      - name: eyebrow
        properties:
          text: "LIVE"
          layout:
            widthMode: fit
          typography:
            size: xxs
            weight: bold
            color: *color-accent
            letterSpacing: wider
          spacing:
            paddingBlock: xxs
            paddingInline: xs
          appearance:
            background:
              color: *color-background
              opacity: 100
            radius: pill

    - name: video-background
      properties:
        source:
          url: 'https://cdn.pixabay.com/video/2020/06/09/40775-430530472_large.mp4'
          poster: ''
        appearance:
          aspectRatio: '16/9'
          minHeight: 17.5
          objectFit: cover
          objectPosition: center
          radius: sm
          overlay:
            enabled: true
            color: 'rgba(15, 23, 42, 0.75)'
            opacity: 75
        playback:
          autoplay: true
          loop: true
          muted: true
        content:
          verticalAlign: end
          horizontalAlign: left
          padding: md
      components:
      - name: layout-row
        properties:
          layout:
            horizontalAlign: space-between
            wrap: nowrap
            gap: lg
            verticalAlign: end
        components:
        - name: layout-column
          properties:
            layout:
              widthMode: stretch
              horizontalAlign: start
              gap: none
          components:
          - name: heading
            properties:
              text: "$284,920"
              level: 2
              typography:
                size: xxl
                weight: extrabold
                color: *color-background
          - name: paragraph
            properties:
              text: "Total revenue this quarter"
              typography:
                size: sm
                weight: regular
                color: *color-secondary

        - name: layout-column
          properties:
            layout:
              widthMode: fit
              horizontalAlign: end
              gap: none
          components:
          - name: eyebrow
            properties:
              text: "+23.4%"
              typography:
                size: md
                weight: bold
                color: *color-accent
          - name: caption
            properties:
              text: vs last quarter
              typography:
                size: xxs
                weight: regular
                color: *color-secondary
                align: right

    - name: caption
      properties:
        text: "Real-time data visualization powered by your analytics pipeline. Updates every 30 seconds."
        typography:
          size: xxs
          weight: regular
          color: *color-secondary
          align: left
        spacing:
          marginBlock: xs
