# Dashboard Data Card 07 - "Data Filter Card"
# A filter panel with dropdown, calendar, and search textbox. Styled as a collapsible data filtering sidebar or toolbar.
# Base components: page, layout-column, heading, dropdown, calendar, textbox, button
# Section type: dashboard
# Layout: stacked
# Visual style: modern_minimalist
# Content volume: standard
# Tone: neutral
# Conversion intent: engagement
# Image requirement: none
# Interactivity: form
# Industries: saas
# Perfect for: SaaS, analytics, admin panels, dashboards, business tools

- name: page
  properties:
    theme:
      fonts:
        heading: &font-heading "'Inter', sans-serif"
        content: &font-content "'Inter', sans-serif"
      colors:
        primary: &color-primary '#0f172a'
        text: &color-text '#2B2F3B'
        secondary: &color-secondary '#64748b'
        accent: &color-accent '#6366f1'
        background: &color-background '#f8fafc'
    spacing: {paddingBlock: xl, paddingInline: xl}
    appearance:
      background: {color: *color-background}
  components:
  - name: layout-column
    properties:
      layout:
        horizontalAlign: center
        widthMode: "33"
        gap: sm
      spacing:
        paddingBlock: lg
        paddingInline: lg
      appearance:
        background:
          color: *color-background
          opacity: 100
        radius: md
        shadow: soft
    components:
    - name: heading
      properties:
        text: Filters
        level: 3
        typography:
          size: md
          weight: bold
          color: *color-primary

    - name: dropdown
      properties:
        label:
          show: true
          text: Department
        field:
          options: "All Departments\nEngineering\nDesign\nMarketing\nSales\nSupport"

    - name: calendar
      properties:
        label:
          show: true
          text: Date Range
        field:
          value: "2026-02-01"

    - name: textbox
      properties:
        label:
          show: true
          text: Search
        field:
          placeholder: "Search by name or ID..."
          value: ""

    - name: button
      properties:
        text: "Apply Filters"
        appearance:
          background:
            color: *color-accent
          radius: sm
        typography:
          color: *color-background
          weight: semibold
          size: sm
        spacing:
          paddingBlock: sm
          paddingInline: md
