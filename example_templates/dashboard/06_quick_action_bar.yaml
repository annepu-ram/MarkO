# Dashboard Data Card 06 - "Quick Action Bar"
# A horizontal row of action buttons for common dashboard operations. Clean, evenly spaced buttons with consistent styling.
# Base components: page, layout-column, heading, layout-row, button
# Section type: dashboard
# Layout: stacked
# Visual style: modern_minimalist
# Content volume: standard
# Tone: neutral
# Conversion intent: engagement
# Image requirement: none
# Interactivity: static
# Industries: saas
# Perfect for: SaaS, analytics, admin panels, dashboards, business tools

- name: page
  properties:
    theme:
      fonts:
        heading: &font-heading "'Inter', sans-serif"
        content: &font-content "'Inter', sans-serif"
      colors:
        primary: &color-primary '#0f172a'
        text: &color-text '#2B2F3B'
        secondary: &color-secondary '#64748b'
        accent: &color-accent '#6366f1'
        background: &color-background '#f8fafc'
    spacing: {paddingBlock: xl, paddingInline: xl}
    appearance:
      background: {color: *color-background}
  components:
  - name: layout-column
    properties:
      layout:
        horizontalAlign: center
        widthMode: "66"
      spacing:
        paddingBlock: lg
        paddingInline: lg
      appearance:
        background:
          color: *color-background
          opacity: 100
        radius: md
        shadow: soft
    components:
    - name: heading
      properties:
        text: Quick Actions
        level: 3
        typography:
          size: md
          weight: bold
          color: *color-primary
        spacing:
          marginBlock: xs

    - name: layout-row
      properties:
        layout:
          horizontalAlign: start
          wrap: wrap
          gap: sm
          verticalAlign: center
        spacing:
          marginBlock: xs
      components:
      - name: button
        properties:
          text: "+ Add User"
          layout:
            widthMode: fit
          appearance:
            background:
              color: *color-accent
            radius: sm
          typography:
            color: *color-background
            weight: semibold
            size: sm

          spacing:
            paddingBlock: sm
            paddingInline: md
      - name: button
        properties:
          text: "Export CSV"
          layout:
            widthMode: fit
          appearance:
            background:
              color: *color-secondary
            radius: sm
          typography:
            color: *color-primary
            weight: semibold
            size: sm

          spacing:
            paddingBlock: sm
            paddingInline: md
      - name: button
        properties:
          text: "Print Report"
          layout:
            widthMode: fit
          appearance:
            background:
              color: *color-secondary
            radius: sm
          typography:
            color: *color-primary
            weight: semibold
            size: sm
          spacing:
            paddingBlock: sm
            paddingInline: md
