# Aurora Gradient Feature Cards
# Vibrant flowing gradient feature section inspired by northern lights
# Base components: site, page, layout-column, columnsgrid, layout-row, heading, paragraph, eyebrow, button
# Section type: features
# Layout: grid
# Visual style: aurora_gradient
# Perfect for: SaaS platform, tech startup, creative portfolio, design studio, fintech

- name: site
  properties:
    theme:
      fonts:
        heading: "'Sora', sans-serif"
        content: "'Inter', sans-serif"
      colors:
        primary: &color-primary '#1A2035'
        text: &color-text '#313541'
        secondary: &color-secondary '#C8D8F0'
        accent: &color-accent '#EC4899'
        background: &color-background '#E6F0FA'
  components:
    - name: page
      slug: home
      title: "Aurora Gradient Feature Cards"
      properties:
        appearance:
          background:
            color: *color-background
            opacity: 100
      components:

        # Outer aurora gradient wrapper
        - name: layout-column
          properties:
            layout:
              horizontalAlign: center
            appearance:
              background:
                type: gradient
                gradient:
                  colorStart: '#EC4899'
                  colorEnd: '#8B5CF6'
                  direction: to bottom right
                opacity: 100
            spacing:
              paddingBlock: none
              paddingInline: none
          components:

            # Inner content area
            - name: layout-column
              properties:
                layout:
                  horizontalAlign: center
                  gap: lg
                spacing:
                  paddingBlock: xxxl
                  paddingInline: lg
              components:

                # Section header
                - name: eyebrow
                  properties:
                    text: Features
                    typography:
                      size: xs
                      weight: semibold
                      color: '#ffffff'
                      transform: uppercase
                      letterSpacing: wider
                      align: center

                - name: heading
                  properties:
                    text: Designed for the future
                    level: 2
                    typography:
                      size: xxl
                      weight: bold
                      color: '#ffffff'
                      align: center
                    spacing:
                      marginBlock: sm

                - name: paragraph
                  properties:
                    text: Next-generation tools built for teams who move fast, think boldly, and build products the world has never seen.
                    typography:
                      size: lg
                      color: rgba(255,255,255,0.85)
                      align: center
                    layout:
                      widthMode: '66'
                    spacing:
                      marginBlock: md

                # Feature grid — 3 gradient cards
                - name: columnsgrid
                  properties:
                    layout:
                      columns: 3
                      gap: md
                    responsive:
                      breakpoints:
                        md: 2
                        sm: 1
                    spacing:
                      paddingBlock: lg
                  columns:

                    # Card 1 — pink to orange
                    - components:
                        - name: layout-column
                          properties:
                            layout:
                              horizontalAlign: center
                              gap: sm
                            appearance:
                              background:
                                type: gradient
                                gradient:
                                  colorStart: '#EC4899'
                                  colorEnd: '#F97316'
                                  direction: to bottom right
                                opacity: 100
                              radius: lg
                              shadow: none
                              border:
                                width: 0
                            spacing:
                              paddingBlock: xl
                              paddingInline: lg
                          components:
                            - name: heading
                              properties:
                                text: Instant Deploy
                                level: 3
                                typography:
                                  size: lg
                                  weight: bold
                                  color: '#ffffff'
                                  align: center
                                spacing:
                                  marginBlock: sm
                            - name: paragraph
                              properties:
                                text: Ship to production in seconds with zero-config pipelines that adapt to your workflow.
                                typography:
                                  size: sm
                                  color: rgba(255,255,255,0.9)
                                  align: center

                    # Card 2 — purple to cyan
                    - components:
                        - name: layout-column
                          properties:
                            layout:
                              horizontalAlign: center
                              gap: sm
                            appearance:
                              background:
                                type: gradient
                                gradient:
                                  colorStart: '#8B5CF6'
                                  colorEnd: '#06B6D4'
                                  direction: to bottom right
                                opacity: 100
                              radius: lg
                              shadow: none
                              border:
                                width: 0
                            spacing:
                              paddingBlock: xl
                              paddingInline: lg
                          components:
                            - name: heading
                              properties:
                                text: AI-Powered Insights
                                level: 3
                                typography:
                                  size: lg
                                  weight: bold
                                  color: '#ffffff'
                                  align: center
                                spacing:
                                  marginBlock: sm
                            - name: paragraph
                              properties:
                                text: Intelligent recommendations and predictive analytics surface the signals that matter most.
                                typography:
                                  size: sm
                                  color: rgba(255,255,255,0.9)
                                  align: center

                    # Card 3 — cyan to green
                    - components:
                        - name: layout-column
                          properties:
                            layout:
                              horizontalAlign: center
                              gap: sm
                            appearance:
                              background:
                                type: gradient
                                gradient:
                                  colorStart: '#06B6D4'
                                  colorEnd: '#10B981'
                                  direction: to bottom right
                                opacity: 100
                              radius: lg
                              shadow: none
                              border:
                                width: 0
                            spacing:
                              paddingBlock: xl
                              paddingInline: lg
                          components:
                            - name: heading
                              properties:
                                text: Real-Time Sync
                                level: 3
                                typography:
                                  size: lg
                                  weight: bold
                                  color: '#ffffff'
                                  align: center
                                spacing:
                                  marginBlock: sm
                            - name: paragraph
                              properties:
                                text: All your data synced across every device and team member in under 50 milliseconds.
                                typography:
                                  size: sm
                                  color: rgba(255,255,255,0.9)
                                  align: center

                    # Card 4 — orange to pink
                    - components:
                        - name: layout-column
                          properties:
                            layout:
                              horizontalAlign: center
                              gap: sm
                            appearance:
                              background:
                                type: gradient
                                gradient:
                                  colorStart: '#F97316'
                                  colorEnd: '#EC4899'
                                  direction: to bottom right
                                opacity: 100
                              radius: lg
                              shadow: none
                              border:
                                width: 0
                            spacing:
                              paddingBlock: xl
                              paddingInline: lg
                          components:
                            - name: heading
                              properties:
                                text: Enterprise Security
                                level: 3
                                typography:
                                  size: lg
                                  weight: bold
                                  color: '#ffffff'
                                  align: center
                                spacing:
                                  marginBlock: sm
                            - name: paragraph
                              properties:
                                text: SOC 2 compliant with end-to-end encryption, SSO, and granular access controls built in.
                                typography:
                                  size: sm
                                  color: rgba(255,255,255,0.9)
                                  align: center

                    # Card 5 — cyan to purple
                    - components:
                        - name: layout-column
                          properties:
                            layout:
                              horizontalAlign: center
                              gap: sm
                            appearance:
                              background:
                                type: gradient
                                gradient:
                                  colorStart: '#06B6D4'
                                  colorEnd: '#8B5CF6'
                                  direction: to bottom right
                                opacity: 100
                              radius: lg
                              shadow: none
                              border:
                                width: 0
                            spacing:
                              paddingBlock: xl
                              paddingInline: lg
                          components:
                            - name: heading
                              properties:
                                text: Flexible APIs
                                level: 3
                                typography:
                                  size: lg
                                  weight: bold
                                  color: '#ffffff'
                                  align: center
                                spacing:
                                  marginBlock: sm
                            - name: paragraph
                              properties:
                                text: RESTful and GraphQL APIs with webhooks, SDKs, and developer-first documentation.
                                typography:
                                  size: sm
                                  color: rgba(255,255,255,0.9)
                                  align: center

                    # Card 6 — green to cyan
                    - components:
                        - name: layout-column
                          properties:
                            layout:
                              horizontalAlign: center
                              gap: sm
                            appearance:
                              background:
                                type: gradient
                                gradient:
                                  colorStart: '#10B981'
                                  colorEnd: '#06B6D4'
                                  direction: to bottom right
                                opacity: 100
                              radius: lg
                              shadow: none
                              border:
                                width: 0
                            spacing:
                              paddingBlock: xl
                              paddingInline: lg
                          components:
                            - name: heading
                              properties:
                                text: Global Scale
                                level: 3
                                typography:
                                  size: lg
                                  weight: bold
                                  color: '#ffffff'
                                  align: center
                                spacing:
                                  marginBlock: sm
                            - name: paragraph
                              properties:
                                text: 99.99% uptime SLA backed by a multi-region infrastructure spanning 18 data centers worldwide.
                                typography:
                                  size: sm
                                  color: rgba(255,255,255,0.9)
                                  align: center

                # CTA button
                - name: layout-row
                  properties:
                    layout:
                      horizontalAlign: center
                    spacing:
                      paddingBlock: md
                  components:
                    - name: button
                      properties:
                        text: Start Building for Free
                        appearance:
                          background:
                            color: '#ffffff'
                            opacity: 100
                          border:
                            width: 0
                          radius: pill
                          shadow: none
                        typography:
                          color: *color-accent
                          weight: bold
                          size: md
                        spacing:
                          paddingBlock: md
                          paddingInline: xxl
