# Numbered Process Steps Section — How It Works
# A step-by-step process guide using counter-up numbers with headings and descriptions in a horizontal grid layout showing a sequential workflow or onboarding process
# Base components: layout-row, columnsgrid, layout-column, counter-up, heading, paragraph, eyebrow, br
# Section type: features
# Layout: grid, stacked
# Visual style: modern, minimal
# Perfect for: SaaS platform, mobile app, software company, online store, consulting firm, logistics company, tutoring center, dental clinic, gym, digital agency


- name: site
  properties:
    theme:
      fonts:
        heading: &font-heading "'Inter', sans-serif"
        content: &font-content "'Inter', sans-serif"
      colors:
        primary: &color-primary '#f8fafc'
        text: &color-text '#DBDCDD'
        secondary: &color-secondary '#94a3b8'
        accent: &color-accent '#818cf8'
        background: &color-background '#0f172a'
  components:
    - name: page
      slug: home
      title: "03 Numbered Process Steps"
      properties:
        appearance: { background: { color: *color-background } }
      components:
        # Section Header
        - name: layout-row
          properties:
            layout: { horizontalAlign: center }
            spacing: { paddingBlock: xl, paddingInline: lg }
          components:
            - name: layout-column
              properties:
                layout: { widthMode: '75', horizontalAlign: center }
              components:
                - name: eyebrow
                  properties:
                    text: HOW IT WORKS
                    typography: { size: xs, weight: semibold, color: *color-accent, transform: uppercase, letterSpacing: wider, align: center }
                - name: heading
                  properties:
                    text: Get Started in Four Simple Steps
                    level: 2
                    typography: { size: xxl, weight: bold, color: *color-primary, align: center }
                    spacing: { marginBlock: sm }
                - name: paragraph
                  properties:
                    text: From sign-up to launch, our streamlined process gets you up and running in minutes, not days.
                    typography: { size: md, color: *color-secondary, align: center }
                    spacing: { marginBlock: sm }

        # Divider
        - name: br
          properties:
            size: md

        # Process Steps Grid - 4 columns
        - name: columnsgrid
          properties:
            layout: { columns: 4, gap: lg }
            responsive: { breakpoints: { md: 2, sm: 1 } }
            spacing: { paddingBlock: xl, paddingInline: lg }
          columns:
            # Step 1
            - components:
                - name: layout-column
                  properties:
                    layout: { horizontalAlign: center, gap: sm }
                    appearance: { background: { color: '#1e293b', transparency: 100 }, radius: lg }
                    spacing: { paddingBlock: xl, paddingInline: md }
                  components:
                    - name: counter-up
                      properties:
                        endValue: 1
                        duration: 1000
                        typography: { size: xxxl, weight: extrabold, color: *color-accent, align: center }
                    - name: heading
                      properties:
                        text: Create Account
                        level: 3
                        typography: { size: lg, weight: semibold, color: *color-primary, align: center }
                        spacing: { marginBlock: xs }
                    - name: paragraph
                      properties:
                        text: Sign up in seconds with your email or SSO. No credit card required to get started.
                        typography: { size: sm, color: *color-secondary, align: center }

            # Step 2
            - components:
                - name: layout-column
                  properties:
                    layout: { horizontalAlign: center, gap: sm }
                    appearance: { background: { color: '#1e293b', transparency: 100 }, radius: lg }
                    spacing: { paddingBlock: xl, paddingInline: md }
                  components:
                    - name: counter-up
                      properties:
                        endValue: 2
                        duration: 1200
                        typography: { size: xxxl, weight: extrabold, color: *color-accent, align: center }
                    - name: heading
                      properties:
                        text: Configure Workspace
                        level: 3
                        typography: { size: lg, weight: semibold, color: *color-primary, align: center }
                        spacing: { marginBlock: xs }
                    - name: paragraph
                      properties:
                        text: Customize your workspace with templates, integrations, and team roles tailored to your needs.
                        typography: { size: sm, color: *color-secondary, align: center }

            # Step 3
            - components:
                - name: layout-column
                  properties:
                    layout: { horizontalAlign: center, gap: sm }
                    appearance: { background: { color: '#1e293b', transparency: 100 }, radius: lg }
                    spacing: { paddingBlock: xl, paddingInline: md }
                  components:
                    - name: counter-up
                      properties:
                        endValue: 3
                        duration: 1400
                        typography: { size: xxxl, weight: extrabold, color: *color-accent, align: center }
                    - name: heading
                      properties:
                        text: Import Data
                        level: 3
                        typography: { size: lg, weight: semibold, color: *color-primary, align: center }
                        spacing: { marginBlock: xs }
                    - name: paragraph
                      properties:
                        text: Bring your existing data with one-click imports from CSV, API, or popular third-party platforms.
                        typography: { size: sm, color: *color-secondary, align: center }

            # Step 4
            - components:
                - name: layout-column
                  properties:
                    layout: { horizontalAlign: center, gap: sm }
                    appearance: { background: { color: '#1e293b', transparency: 100 }, radius: lg }
                    spacing: { paddingBlock: xl, paddingInline: md }
                  components:
                    - name: counter-up
                      properties:
                        endValue: 4
                        duration: 1600
                        typography: { size: xxxl, weight: extrabold, color: *color-accent, align: center }
                    - name: heading
                      properties:
                        text: Launch & Scale
                        level: 3
                        typography: { size: lg, weight: semibold, color: *color-primary, align: center }
                        spacing: { marginBlock: xs }
                    - name: paragraph
                      properties:
                        text: Go live with confidence. Monitor performance and scale effortlessly as your business grows.
                        typography: { size: sm, color: *color-secondary, align: center }
