# Review Card Variant: The CEO Quote
# layout-column with a large blockquote, caption (Name/Title), and a small circular image
# Base components: layout-column, blockquote, br, image, heading, caption
# Section type: testimonials
# Layout: centered
# Visual style: modern_minimalist
# Content volume: light
# Tone: neutral
# Conversion intent: trust
# Image requirement: decorative
# Interactivity: static
# Industries: saas, ecommerce
# Perfect for: any business, SaaS, ecommerce, services, agencies

- name: page
  properties:
    theme:
      colors:
        primary: &color-primary '#1e293b'
        text: &color-text '#343A45'
        secondary: &color-secondary '#6b7280'
        accent: &color-accent '#6366f1'
        background: &color-background '#ffffff'
    appearance:
      background: {color: *color-background}
  components:
  - name: layout-column
    properties:
      layout: {horizontalAlign: center, gap: md}
      appearance:
        background: {color: *color-background}
        radius: lg
        shadow: medium
      spacing: {marginBlock: lg, marginInline: lg, paddingBlock: xl, paddingInline: xl}
    components:
    - name: blockquote
      properties:
        quote: |
          This platform transformed our entire workflow. We went from
          spending weeks on projects to shipping in days. It's not just
          a tool — it's a competitive advantage.
        cite: ''
        typography: {size: lg, weight: medium, color: *color-text, align: center, lineHeight: "1.8"}
        appearance:
          border: {accentColor: *color-accent}
          background: {opacity: 0}
        spacing: {marginBlock: sm, paddingBlock: md, paddingInline: md}
    - name: br
      properties:
        size: sm
    - name: image
      properties:
        source: {url: 'https://images.unsplash.com/photo-1560250097-0b93528c311a?w=200', altText: 'CEO portrait'}
        appearance: {minHeight: 5, maxHeight: 5, fit: cover, cornerStyle: pill}
        layout: {widthMode: fit}
        spacing: {marginBlock: xs}
    - name: heading
      properties:
        text: Michael Chen
        level: 4
        typography: {size: md, weight: bold, color: *color-primary, align: center}
        spacing: {marginBlock: none}
    - name: caption
      properties:
        text: CEO, TechForward Inc.
        typography: {size: sm, color: *color-secondary, align: center}
