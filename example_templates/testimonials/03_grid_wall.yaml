# Review Card Variant: The Grid Wall
# A columnsgrid containing multiple small layout-column cards with just paragraph and eyebrow
# Base components: layout-column, heading, columnsgrid, paragraph, eyebrow
# Section type: testimonials
# Layout: grid
# Visual style: modern_minimalist
# Content volume: standard
# Tone: neutral
# Conversion intent: trust
# Image requirement: none
# Interactivity: static
# Industries: saas, ecommerce
# Perfect for: any business, SaaS, ecommerce, services, agencies

- name: page
  properties:
    theme:
      colors:
        primary: &color-primary '#111827'
        text: &color-text '#2C3039'
        secondary: &color-secondary '#374151'
        accent: &color-accent '#6366f1'
        background: &color-background '#ffffff'
    appearance:
      background: {color: *color-background}
  components:
  - name: layout-column
    properties:
      layout: {horizontalAlign: center, gap: md}
      spacing: {paddingBlock: xl, paddingInline: lg}
      appearance: {background: {opacity: 0}}
    components:
    - name: heading
      properties:
        text: What Our Customers Say
        level: 2
        typography: {size: xxl, weight: extrabold, color: *color-primary, align: center}
    - name: columnsgrid
      properties:
        layout: {columns: 3, gap: md, verticalAlign: top}
        responsive: {breakpoints: {md: 2, sm: 1}}
      columns:
      - components:
        - name: layout-column
          properties:
            layout: {horizontalAlign: left, gap: xs}
            appearance:
              background: {color: *color-background, opacity: 100}
              radius: md
              shadow: soft
              border: {width: 1, style: solid, color: *color-secondary}
            spacing:
              paddingBlock: md
              paddingInline: md
          components:
          - name: paragraph
            properties:
              text: "Absolutely love it! Saves me hours every week."
              typography: {size: sm, color: *color-secondary, lineHeight: "1.6"}
          - name: eyebrow
            properties:
              text: "— EMMA T."
              typography: {size: xxs, weight: semibold, color: *color-accent, letterSpacing: wider}
      - components:
