# Review Card Variant: Carousel Praise
# A carousel where each slide is a high-impact video-background with a blockquote overlay
# Base components: carousel, image, layout-column, blockquote, heading, caption
# Section type: testimonials
# Layout: carousel_slider
# Visual style: monochrome_dark
# Content volume: standard
# Tone: formal
# Conversion intent: trust
# Image requirement: required
# Interactivity: carousel
# Industries: saas, ecommerce
# Perfect for: any business, SaaS, ecommerce, services, agencies

- name: page
  properties:
    theme:
      colors:
        primary: &color-primary '#0f172a'
        text: &color-text '#2B2F3B'
        secondary: &color-secondary '#a5b4fc'
        accent: &color-accent '#818cf8'
        background: &color-background '#ffffff'
    appearance:
      background: { color: *color-primary }
  components:
    - name: carousel
      properties:
        behavior:
          autoplay: true
          delay: 6000
          loop: true
          pauseOnHover: true
          swipeEnabled: true
          swipeThreshold: 50
          keyboardNavigation: true
        animation:
          effect: fade
          duration: 700
        navigation:
          showArrows: true
          arrowStyle: chevron
          arrowPosition: inside
          showDots: true
        indicators:
          style: dots
          position: bottom
        accessibility:
          showPauseButton: true
          ariaLabel: 'Customer testimonials carousel'
        spacing: { marginBlock: none }
      slides:
        - components:
            - name: image
              properties:
                source: { url: 'https://images.unsplash.com/photo-1497366216548-37526070297c?w=1200', altText: 'Modern office' }
                appearance:
                  minHeight: 30
                  fit: cover
                  overlay:
                    enabled: true
                    color: *color-primary
                    opacity: 75
                layout: { widthMode: stretch }
              components:
                - name: layout-column
                  properties:
                    layout: { horizontalAlign: center, gap: md }
                    appearance: { background: { opacity: 0 } }
                    spacing: { paddingBlock: xxl, paddingInline: xl }
                  components:
                    - name: blockquote
                      properties:
                        quote: |
                          This is not just software. It's a paradigm shift in how
                          we build digital products. Our team ships 5x faster now.
                        cite: ''
                        typography: { size: xxl, weight: medium, color: *color-background, align: center, lineHeight: "1.6" }
                        appearance: { border: { accentColor: *color-accent }, background: { opacity: 0 } }
                        layout: { widthMode: "75" }
                    - name: heading
                      properties:
                        text: Amanda Foster
                        level: 4
                        typography: { size: md, weight: bold, color: *color-background, align: center }
                        spacing: { marginBlock: none }
                    - name: caption
                      properties:
                        text: VP of Engineering, DataFlow
                        typography: { size: sm, color: *color-secondary, align: center }
        - components:
            - name: image
              properties:
                source: { url: 'https://images.unsplash.com/photo-1522071820081-009f0129c71c?w=1200', altText: 'Team meeting' }
                appearance:
                  minHeight: 30
                  fit: cover
                  overlay:
                    enabled: true
                    color: *color-primary
                    opacity: 75
                layout: { widthMode: stretch }
              components:
                - name: layout-column
                  properties:
                    layout: { horizontalAlign: center, gap: md }
                    appearance: { background: { opacity: 0 } }
                    spacing: { paddingBlock: xxl, paddingInline: xl }
                  components:
                    - name: blockquote
                      properties:
                        quote: |
                          We evaluated 15 different platforms. This one won unanimously.
                          The ROI paid for itself in the first month.
                        cite: ''
                        typography: { size: xxl, weight: medium, color: *color-background, align: center, lineHeight: "1.6" }
                        appearance: { border: { accentColor: *color-accent }, background: { opacity: 0 } }
                        layout: { widthMode: "75" }
                    - name: heading
                      properties:
                        text: Marcus Rivera
                        level: 4
                        typography: { size: md, weight: bold, color: *color-background, align: center }
                        spacing: { marginBlock: none }
                    - name: caption
                      properties:
                        text: CEO, GreenTech Solutions
                        typography: { size: sm, color: *color-secondary, align: center }
        - components:
            - name: image
              properties:
                source: { url: 'https://images.unsplash.com/photo-1553877522-43269d4ea984?w=1200', altText: 'Creative workspace' }
                appearance:
                  minHeight: 30
                  fit: cover
                  overlay:
                    enabled: true
                    color: *color-primary
                    opacity: 75
                layout: { widthMode: stretch }
              components:
                - name: layout-column
                  properties:
                    layout: { horizontalAlign: center, gap: md }
                    appearance: { background: { opacity: 0 } }
                    spacing: { paddingBlock: xxl, paddingInline: xl }
                  components:
                    - name: blockquote
                      properties:
                        quote: |
                          From concept to production in 48 hours. I've never experienced
                          anything like this in 20 years of building products.
                        cite: ''
                        typography: { size: xxl, weight: medium, color: *color-background, align: center, lineHeight: "1.6" }
                        appearance: { border: { accentColor: *color-accent }, background: { opacity: 0 } }
                        layout: { widthMode: "75" }
                    - name: heading
                      properties:
                        text: Nina Patel
                        level: 4
                        typography: { size: md, weight: bold, color: *color-background, align: center }
                        spacing: { marginBlock: none }
                    - name: caption
                      properties:
                        text: Founder, DesignLab Studio
                        typography: { size: sm, color: *color-secondary, align: center }
