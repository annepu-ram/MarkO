# Story Card Variant: The Timed Read
# layout-column with image, heading, and a caption saying "5 min read - By Admin"

- name: page
  properties:
    theme:
      colors:
        primary: &color-primary '#111827'
        secondary: &color-secondary '#6b7280'
        accent: &color-accent '#059669'
        background: &color-background '#ffffff'
    appearance:
      background: { color: *color-background }
  components:
    - name: layout-column
      properties:
        layout: { horizontalAlign: left, gap: sm }
        appearance:
          background: { color: *color-background }
          radius: lg
          shadow: soft
          padding: { block: none, inline: none }
          border: { width: 1, style: solid, color: *color-secondary }
        spacing: { marginBlock: lg, marginInline: lg }
      components:
        - name: image
          properties:
            source: { url: 'https://images.unsplash.com/photo-1499750310107-5fef28a66643?w=800', altText: 'Coffee and laptop on a table' }
            appearance: { minHeight: 14, fit: cover, cornerStyle: none, hoverEffect: zoom }
            layout: { widthMode: stretch }
            spacing: { marginBlock: none }
        - name: layout-column
          properties:
            layout: { horizontalAlign: left, gap: xs }
            appearance: { background: { transparency: 0 }, padding: { block: md, inline: md } }
          components:
            - name: layout-row
              properties:
                layout: { horizontalAlign: left, verticalAlign: center, gap: sm, wrap: nowrap }
                appearance: { background: { transparency: 0 } }
              components:
                - name: eyebrow
                  properties:
                    text: LIFESTYLE
                    typography: { size: xxs, weight: bold, color: *color-accent, transform: uppercase, letterSpacing: wider }
                    spacing: { marginBlock: none }
                - name: caption
                  properties:
                    text: "5 min read"
                    typography: { size: xs, color: *color-secondary }
            - name: heading
              properties:
                text: The Morning Routine That Changed My Productivity
                level: 3
                typography: { size: lg, weight: bold, color: *color-primary, align: left, lineHeight: "1.3" }
                spacing: { marginBlock: xs }
            - name: paragraph
              properties:
                text: |
                  How waking up 30 minutes earlier and following a simple
                  3-step ritual transformed my entire workday.
                typography: { size: sm, color: *color-secondary, align: left, lineHeight: "1.6" }
            - name: layout-row
              properties:
                layout: { horizontalAlign: left, verticalAlign: center, gap: sm, wrap: nowrap }
                appearance: { background: { transparency: 0 } }
              components:
                - name: image
                  properties:
                    source: { url: 'https://images.unsplash.com/photo-1438761681033-6461ffad8d80?w=80', altText: 'Author avatar' }
                    appearance: { minHeight: 2, maxHeight: 2, fit: cover, cornerStyle: pill }
                    layout: { widthMode: fit }
                    spacing: { marginBlock: none }
                - name: caption
                  properties:
                    text: "By Emily Carter - Feb 8, 2026"
                    typography: { size: xs, color: *color-secondary }
