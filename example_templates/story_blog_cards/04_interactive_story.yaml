# Story Card Variant: The Interactive Story
# layout-column with a gif header and an accordion that reveals "Key Takeaways"

- name: page
  properties:
    appearance:
      background: { color: '#faf5ff' }
  components:
    - name: layout-column
      properties:
        layout: { horizontalAlign: center, gap: sm }
        appearance:
          background: { color: '#ffffff' }
          radius: lg
          shadow: medium
          padding: { block: none, inline: none }
        spacing: { marginBlock: lg, marginInline: lg }
      components:
        - name: gif
          properties:
            source: { url: 'https://media.giphy.com/media/ZVik7pBtu9dNS/giphy.gif', altText: 'Data visualization animation' }
            appearance: { minHeight: 15, fit: cover, cornerStyle: none }
            layout: { widthMode: stretch }
            spacing: { marginBlock: none }
        - name: layout-column
          properties:
            layout: { horizontalAlign: left, gap: sm }
            appearance: { background: { transparency: 0 }, padding: { block: md, inline: md } }
          components:
            - name: eyebrow
              properties:
                text: DATA SCIENCE
                typography: { size: xxs, weight: bold, color: '#7c3aed', transform: uppercase, letterSpacing: wider }
            - name: heading
              properties:
                text: Understanding Neural Networks in Plain English
                level: 3
                typography: { size: xl, weight: bold, color: '#111827', align: left }
                spacing: { marginBlock: xs }
            - name: paragraph
              properties:
                text: |
                  A visual guide to how neural networks learn, adapt, and make
                  predictions — no PhD required. We break down the most complex
                  concepts into bite-sized, understandable pieces.
                typography: { size: sm, color: '#6b7280', align: left, lineHeight: "1.7" }
            - name: accordion
              properties:
                behavior: { allowMultipleOpen: true }
                typography:
                  title: { size: sm, weight: semibold, color: '#7c3aed' }
                  content: { size: sm, weight: regular, color: '#4b5563' }
                appearance:
                  titleBackground: { color: '#faf5ff' }
                  border: { width: 1, style: solid, color: '#e9d5ff', position: bottom }
                  radius: md
                spacing: { marginBlock: sm }
              items:
                - title: Key Takeaways
                  components:
                    - name: paragraph
                      properties:
                        text: |
                          1. Neural networks mimic biological brain connections
                          2. Training is just repeated error correction at massive scale
                          3. Deep learning = many hidden layers = more abstraction
                          4. Transfer learning lets you reuse trained models
                          5. The real magic is in the data, not the architecture
                        typography: { size: sm, color: '#4b5563', lineHeight: "1.8" }
                - title: Related Resources
                  components:
                    - name: link
                      properties:
                        text: Interactive Playground - TensorFlow
                        href: '#'
                        typography: { size: sm, color: '#7c3aed' }
                        appearance: { showArrow: true, underline: false }
                    - name: link
                      properties:
                        text: Beginner's Guide to Machine Learning
                        href: '#'
                        typography: { size: sm, color: '#7c3aed' }
                        appearance: { showArrow: true, underline: false }
            - name: caption
              properties:
                text: "By Dr. Sarah Kim - 12 min read - Feb 2026"
                typography: { size: xs, color: '#9ca3af', align: left }
