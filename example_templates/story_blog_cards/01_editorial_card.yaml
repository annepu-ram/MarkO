# Story Card Variant: Editorial Card
# layout-column with a full-bleed image, eyebrow (Category), heading, and paragraph (Excerpt)
# Base components: page, layout-column, image, eyebrow, heading, paragraph, layout-row, caption, link
# Section type: blog
# Layout: stacked
# Visual style: modern_minimalist
# Perfect for: media, publishing, blogs, content marketing, news

- name: page
  properties:
    theme:
      colors:
        primary: &color-primary '#111827'
        text: &color-text '#2C3039'
        secondary: &color-secondary '#6b7280'
        accent: &color-accent '#2563eb'
        background: &color-background '#ffffff'
    appearance:
      background: {color: *color-background}
  components:
  - name: layout-column
    properties:
      layout: {horizontalAlign: left, gap: sm}
      appearance:
        background: {color: *color-background}
        radius: lg
        shadow: soft
      spacing: {marginBlock: lg, marginInline: lg, paddingBlock: none, paddingInline: none}
    components:
    - name: image
      properties:
        source: {url: 'https://images.unsplash.com/photo-1485827404703-89b55fcc595e?w=800', altText: 'AI and robotics'}
        appearance: {minHeight: 18, fit: cover, cornerStyle: none, hoverEffect: zoom}
        layout: {widthMode: stretch}
        spacing: {marginBlock: none}
    - name: layout-column
      properties:
        layout: {horizontalAlign: left, gap: xs}
        appearance: {background: {opacity: 0}}
        spacing:
          paddingBlock: md
          paddingInline: md
      components:
      - name: eyebrow
        properties:
          text: TECHNOLOGY
          typography: {size: xxs, weight: bold, color: *color-accent, transform: uppercase, letterSpacing: wider}
      - name: heading
        properties:
          text: The Future of AI-Powered Design Systems
          level: 3
          typography: {size: xl, weight: bold, color: *color-primary, align: left, lineHeight: "1.3"}
          spacing: {marginBlock: xs}
      - name: paragraph
        properties:
          text: |
            How machine learning is reshaping the way we think about
            user interfaces and design workflows. A deep dive into
            the tools that are changing everything.
          typography: {size: sm, color: *color-secondary, align: left, lineHeight: "1.7"}
      - name: layout-row
        properties:
          layout: {horizontalAlign: space-between, verticalAlign: center, wrap: nowrap}
          appearance: {background: {opacity: 0}}
        components:
        - name: caption
          properties:
            text: "5 min read"
            typography: {size: xs, color: *color-secondary}
        - name: link
          properties:
            text: Read Article
            href: '#'
            typography: {size: sm, weight: semibold, color: *color-accent}
            appearance: {showArrow: true, underline: false}
            spacing: {marginBlock: none}
