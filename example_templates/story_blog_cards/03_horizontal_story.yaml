# Story Card Variant: Horizontal Story
# layout-row (60/40 split) with image on the left and layout-column with heading and link on the right

- name: page
  properties:
    appearance:
      background: { color: '#f9fafb' }
  components:
    - name: layout-row
      properties:
        layout: { horizontalAlign: space-evenly, verticalAlign: center, wrap: nowrap, gap: none }
        appearance:
          background: { color: '#ffffff' }
          radius: lg
          shadow: soft
          border: { width: 1, style: solid, color: '#e5e7eb' }
        spacing: { marginBlock: md, marginInline: lg }
      components:
        - name: image
          properties:
            source: { url: 'https://images.unsplash.com/photo-1432821596592-e2c18b78144f?w=600', altText: 'Creative workspace with laptop' }
            appearance: { minHeight: 15, fit: cover, cornerStyle: none, hoverEffect: zoom }
            layout: { widthMode: "50" }
            spacing: { marginBlock: none }
        - name: layout-column
          properties:
            layout: { horizontalAlign: left, widthMode: "50", gap: sm }
            appearance: { background: { transparency: 0 }, padding: { block: lg, inline: lg } }
          components:
            - name: eyebrow
              properties:
                text: DESIGN
                typography: { size: xxs, weight: bold, color: '#ec4899', transform: uppercase, letterSpacing: wider }
            - name: heading
              properties:
                text: 10 Design Trends That Will Define 2026
                level: 3
                typography: { size: lg, weight: bold, color: '#111827', align: left, lineHeight: "1.3" }
                spacing: { marginBlock: xs }
            - name: paragraph
              properties:
                text: |
                  From neo-brutalism to AI-generated layouts, here's what
                  the world's top designers are betting on this year.
                typography: { size: sm, color: '#6b7280', align: left, lineHeight: "1.6" }
            - name: layout-row
              properties:
                layout: { horizontalAlign: space-between, verticalAlign: center, wrap: nowrap }
                appearance: { background: { transparency: 0 } }
              components:
                - name: caption
                  properties:
                    text: "Feb 10, 2026 - 8 min read"
                    typography: { size: xs, color: '#9ca3af' }
                - name: link
                  properties:
                    text: Read More
                    href: '#'
                    typography: { size: sm, weight: semibold, color: '#ec4899' }
                    appearance: { showArrow: true, underline: false }
                    spacing: { marginBlock: none }
