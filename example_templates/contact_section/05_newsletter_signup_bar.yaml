# Newsletter Signup Contact Bar Section
# A compact horizontal contact bar with heading text, brief description, and an inline email textbox with signup button for newsletter subscriptions and email capture
# Base components: layout-row, layout-column, form, textbox, heading, paragraph, button, eyebrow
# Section type: contact, cta
# Layout: centered
# Visual style: aurora_gradient
# Perfect for: consulting firm, law firm, dental clinic, real estate agency, digital agency, photography studio, architecture firm, accounting firm, tutoring center, wellness center


- name: site
  properties:
    theme:
      fonts:
        heading: &font-heading "'Inter', sans-serif"
        content: &font-content "'Inter', sans-serif"
      colors:
        primary: &color-primary '#ffffff'
        text: &color-text '#DFDFDF'
        secondary: &color-secondary '#e2e8f0'
        accent: &color-accent '#f59e0b'
        background: &color-background '#0f172a'
  components:
    - name: page
      slug: home
      title: "05 Newsletter Signup Bar"
      properties:
        appearance: { background: { color: '#f8fafc' } }
      components:

        # ============================================
        # NEWSLETTER SIGNUP BAR
        # ============================================
        - name: layout-row
          properties:
            layout:
              horizontalAlign: center
              align: center
              wrap: wrap
            appearance:
              background:
                type: gradient
                gradient:
                  colorStart: '#1e293b'
                  colorEnd: '#0f172a'
                  direction: to right
                opacity: 100
            spacing:
              paddingBlock: xl
              paddingInline: xl
          components:

            - name: layout-column
              properties:
                layout:
                  widthMode: "75"
                  horizontalAlign: center
                  align: center
              components:
                - name: eyebrow
                  properties:
                    text: NEWSLETTER
                    typography: { size: xs, weight: bold, color: *color-accent, transform: uppercase, letterSpacing: wider, align: center }
                    spacing: { marginBlock: xs }

                - name: heading
                  properties:
                    text: Stay Updated
                    level: 2
                    typography: { size: xxl, weight: bold, color: *color-primary, align: center }
                    spacing: { marginBlock: sm }

                - name: paragraph
                  properties:
                    text: Get the latest news, product updates, and exclusive insights delivered straight to your inbox. No spam, unsubscribe anytime.
                    typography: { size: md, color: *color-secondary, align: center, lineHeight: '1.6' }
                    spacing: { marginBlock: md }

                - name: form
                  properties:
                    layout: { style: inline }
                    submit: { show: false }
                  components:
                    - name: textbox
                      properties:
                        label:
                          show: false
                        field:
                          name: email
                          placeholder: "Enter your email address"
                          validation: email
                          required: true
                        appearance:
                          size: sm
                          accentColor: *color-accent
                          background:
                            color: '#1e293b'
                            opacity: 100
                          border:
                            width: 1
                            style: solid
                            color: '#334155'
                          radius: md
                        spacing:
                          paddingBlock: sm
                          paddingInline: md
                          paddingBlock: sm
                          paddingInline: lg
                    - name: button
                      properties:
                        text: Subscribe
                        appearance:
                          background: { color: *color-accent, opacity: 100 }
                          radius: md
                        typography: { color: *color-background, weight: bold, size: md }
                        spacing: { marginBlock: none }

                - name: paragraph
                  properties:
                    text: "Join 25,000+ subscribers. We respect your privacy."
                    typography: { size: xs, color: '#94a3b8', align: center }
                    spacing: { marginBlock: md }
