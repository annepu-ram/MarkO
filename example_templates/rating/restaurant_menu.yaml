# Rating: Restaurant Menu with Ratings
# Food items with star ratings and descriptions
# Base components: page, layout-row, layout-column, heading, paragraph, image, rating
# Section type: product
# Layout: stacked
# Visual style: modern_minimalist
# Content volume: standard
# Tone: neutral
# Conversion intent: awareness
# Image requirement: required
# Interactivity: static
# Industries: restaurant, ecommerce
# Perfect for: ecommerce, restaurants, reviews, services

- name: page
  properties:
    theme:
      colors:
        background: &color-background '#fffbeb'
        primary: &color-primary '#292524'
        text: &color-text '#3A3837'
        secondary: &color-secondary '#78716c'
        accent: &color-accent '#ea580c'
      fonts:
        heading: &font-heading "'Inter', sans-serif"
        content: &font-content "'Inter', sans-serif"
    appearance: {background: {color: *color-background}}
  components:
  - name: layout-row
    properties:
      layout: {horizontalAlign: center}
      spacing: {paddingBlock: xl}
    components:
    - name: layout-column
      properties:
        layout: {widthMode: '75', horizontalAlign: center}
      components:
      - name: heading
        properties:
          text: Our Menu Favorites
          level: 2
          typography: {size: xxl, weight: bold, color: *color-primary, align: center}
      - name: paragraph
        properties:
          text: Rated by our guests
          typography: {size: md, color: *color-secondary, align: center}
          spacing: {marginBlock: sm}

  - name: layout-row
    properties:
      layout: {horizontalAlign: center}
      spacing: {paddingInline: lg}
    components:
    - name: layout-column
      properties:
        layout: {widthMode: '66'}
      components:
      - name: layout-column
        properties:
          appearance: {background: {color: '#ffffff'}, radius: lg, shadow: soft}
          spacing: {paddingBlock: lg, paddingInline: lg, marginBlock: sm}
        components:
        - name: layout-row
          properties:
            layout: {horizontalAlign: left, verticalAlign: center, wrap: nowrap, gap: md}
          components:
          - name: layout-column
            properties:
              layout: {widthMode: '25'}
            components:
            - name: image
              properties:
                source: {url: 'https://images.unsplash.com/photo-1565299624946-b28f40a0ae38'}
                appearance: {minHeight: 7.5, fit: cover, radius: md}
          - name: layout-column
            properties:
              layout: {widthMode: '75'}
            components:
            - name: heading
              properties:
                text: Truffle Margherita Pizza
                level: 3
                typography: {size: lg, weight: semibold, color: *color-primary}
            - name: rating
              properties:
                value: 5
                iconType: star
                showCount: true
                color: '#f59e0b'
                typography: {size: sm, color: *color-secondary}
            - name: paragraph
              properties:
                text: Wood-fired with fresh mozzarella, basil, and black truffle oil.
                typography: {size: sm, color: *color-secondary}
            - name: paragraph
              properties:
                text: "$24.00"
                typography: {size: lg, weight: bold, color: *color-accent}

      - name: layout-column
        properties:
          appearance: {background: {color: '#ffffff'}, radius: lg, shadow: soft}
          spacing: {paddingBlock: lg, paddingInline: lg, marginBlock: sm}
        components:
        - name: layout-row
          properties:
            layout: {horizontalAlign: left, verticalAlign: center, wrap: nowrap, gap: md}
          components:
          - name: layout-column
            properties:
              layout: {widthMode: '25'}
            components:
            - name: image
              properties:
                source: {url: 'https://images.unsplash.com/photo-1546069901-ba9599a7e63c'}
                appearance: {minHeight: 7.5, fit: cover, radius: md}
          - name: layout-column
            properties:
              layout: {widthMode: '75'}
            components:
            - name: heading
              properties:
                text: Grilled Salmon Bowl
                level: 3
                typography: {size: lg, weight: semibold, color: *color-primary}
            - name: rating
              properties:
                value: 4.5
                iconType: star
                showCount: true
                color: '#f59e0b'
                typography: {size: sm, color: *color-secondary}
            - name: paragraph
              properties:
                text: Atlantic salmon with quinoa, avocado, and citrus dressing.
                typography: {size: sm, color: *color-secondary}
            - name: paragraph
              properties:
                text: "$19.50"
                typography: {size: lg, weight: bold, color: *color-accent}

      - name: layout-column
        properties:
          appearance: {background: {color: '#ffffff'}, radius: lg, shadow: soft}
          spacing: {paddingBlock: lg, paddingInline: lg, marginBlock: sm}
        components:
        - name: layout-row
          properties:
            layout: {horizontalAlign: left, verticalAlign: center, wrap: nowrap, gap: md}
          components:
          - name: layout-column
            properties:
              layout: {widthMode: '25'}
            components:
            - name: image
              properties:
                source: {url: 'https://images.unsplash.com/photo-1551024506-0bccd828d307'}
                appearance: {minHeight: 7.5, fit: cover, radius: md}
          - name: layout-column
            properties:
              layout: {widthMode: '75'}
            components:
            - name: heading
              properties:
                text: Tiramisu
                level: 3
                typography: {size: lg, weight: semibold, color: *color-primary}
            - name: rating
              properties:
                value: 4
                iconType: star
                showCount: true
                color: '#f59e0b'
                typography: {size: sm, color: *color-secondary}
            - name: paragraph
              properties:
                text: Classic Italian dessert with espresso-soaked ladyfingers and mascarpone.
                typography: {size: sm, color: *color-secondary}
            - name: paragraph
              properties:
                text: "$12.00"
                typography: {size: lg, weight: bold, color: *color-accent}
