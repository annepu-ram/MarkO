# Rating: Customer Testimonials
# Testimonial cards with heart ratings and customer photos
# Base components: page, layout-row, layout-column, heading, paragraph, columnsgrid, rating
# Section type: product
# Layout: grid
# Visual style: modern
# Perfect for: ecommerce, restaurants, reviews, services

- name: page
  properties:
    theme:
      colors:
        background: &color-background '#fdf2f8'
        primary: &color-primary '#1e293b'
        text: &color-text '#343A45'
        secondary: &color-secondary '#64748b'
        accent: &color-accent '#ec4899'
      fonts:
        heading: &font-heading "'Inter', sans-serif"
        content: &font-content "'Inter', sans-serif"
    appearance: { background: { color: *color-background } }
  components:
    - name: layout-row
      properties:
        layout: { horizontalAlign: center }
        spacing: { paddingBlock: xl }
      components:
        - name: layout-column
          properties:
            layout: { widthMode: '75', horizontalAlign: center }
          components:
            - name: heading
              properties:
                text: What Our Customers Say
                level: 2
                typography: { size: xxl, weight: bold, color: *color-primary, align: center }
            - name: paragraph
              properties:
                text: Real stories from real people
                typography: { size: md, color: *color-secondary, align: center }
                spacing: { marginBlock: sm }

    - name: columnsgrid
      properties:
        layout: { columns: 3, gap: lg }
        responsive: { breakpoints: { md: 2, sm: 1 } }
        spacing: { paddingBlock: lg, paddingInline: lg }
      columns:
        - components:
            - name: layout-column
              properties:
                layout: { horizontalAlign: center }
                appearance: { background: { color: '#ffffff' }, radius: lg, shadow: soft }
                spacing: { paddingBlock: xl, paddingInline: lg }
              components:
                - name: rating
                  properties:
                    value: 5
                    iconType: heart
                    showCount: false
                    color: *color-accent
                    typography: { size: lg }
                - name: paragraph
                  properties:
                    text: '"This product completely changed my morning routine. I cannot recommend it enough!"'
                    typography: { size: sm, color: *color-text, align: center }
                    spacing: { marginBlock: md }
                - name: heading
                  properties:
                    text: Sarah M.
                    level: 4
                    typography: { size: md, weight: semibold, color: *color-primary, align: center }
                - name: paragraph
                  properties:
                    text: Verified Buyer
                    typography: { size: xs, color: *color-accent, align: center }

        - components:
            - name: layout-column
              properties:
                layout: { horizontalAlign: center }
                appearance: { background: { color: '#ffffff' }, radius: lg, shadow: soft }
                spacing: { paddingBlock: xl, paddingInline: lg }
              components:
                - name: rating
                  properties:
                    value: 4.5
                    iconType: heart
                    showCount: false
                    color: *color-accent
                    typography: { size: lg }
                - name: paragraph
                  properties:
                    text: '"Outstanding quality and the customer service team went above and beyond. Five stars!"'
                    typography: { size: sm, color: *color-text, align: center }
                    spacing: { marginBlock: md }
                - name: heading
                  properties:
                    text: James R.
                    level: 4
                    typography: { size: md, weight: semibold, color: *color-primary, align: center }
                - name: paragraph
                  properties:
                    text: Verified Buyer
                    typography: { size: xs, color: *color-accent, align: center }

        - components:
            - name: layout-column
              properties:
                layout: { horizontalAlign: center }
                appearance: { background: { color: '#ffffff' }, radius: lg, shadow: soft }
                spacing: { paddingBlock: xl, paddingInline: lg }
              components:
                - name: rating
                  properties:
                    value: 4
                    iconType: heart
                    showCount: false
                    color: *color-accent
                    typography: { size: lg }
                - name: paragraph
                  properties:
                    text: '"Great value for money. The packaging was beautiful and delivery was super fast."'
                    typography: { size: sm, color: *color-text, align: center }
                    spacing: { marginBlock: md }
                - name: heading
                  properties:
                    text: Emily K.
                    level: 4
                    typography: { size: md, weight: semibold, color: *color-primary, align: center }
                - name: paragraph
                  properties:
                    text: Verified Buyer
                    typography: { size: xs, color: *color-accent, align: center }
