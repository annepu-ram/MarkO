# Dashboard Data Card 09 - "Notification Card"
# A compact alert-style card with an icon image and notification message.
# Styled as a system notification or alert banner.

- name: page
  properties:
    theme:
      fonts:
        headingMain: &font-heading-main "'Inter', sans-serif"
        headingLevel2: &font-heading-level2 "'Inter', sans-serif"
        content: &font-content "'Inter', sans-serif"
      colors:
        primary: &color-primary '#0f172a'
        secondary: &color-secondary '#64748b'
        accent: &color-accent '#6366f1'
        background: &color-background '#f8fafc'
    spacing: { paddingBlock: xl, paddingInline: xl }
    appearance:
      background: { color: *color-background }
  components:
    # Success Notification
    - name: layout-row
      properties:
        layout:
          horizontalAlign: start
          align: center
          wrap: nowrap
          gap: sm
          widthMode: "50"
        spacing:
          paddingBlock: sm
          paddingInline: md
          marginBlock: xs
        appearance:
          background:
            color: '#f0fdf4'
            transparency: 100
          borderRadius: md
          border:
            width: 1
            style: solid
            color: '#bbf7d0'
      components:
        - name: image
          properties:
            source:
              url: 'https://img.icons8.com/fluency/48/checkmark.png'
              altText: 'Success check icon'
            layout:
              widthMode: fit
            appearance:
              fit: contain
              width: 28
              height: 28
        - name: layout-column
          properties:
            layout:
              horizontalAlign: start
              widthMode: stretch
              gap: none
          components:
            - name: paragraph
              properties:
                text: "<strong>Deployment successful</strong>"
                typography:
                  size: sm
                  weight: semibold
                  color: '#15803d'
            - name: paragraph
              properties:
                text: "v2.4.1 is now live in production. All health checks passed."
                typography:
                  size: xs
                  weight: regular
                  color: '#166534'

    # Warning Notification
    - name: layout-row
      properties:
        layout:
          horizontalAlign: start
          align: center
          wrap: nowrap
          gap: sm
          widthMode: "50"
        spacing:
          paddingBlock: sm
          paddingInline: md
          marginBlock: xs
        appearance:
          background:
            color: '#fffbeb'
            transparency: 100
          borderRadius: md
          border:
            width: 1
            style: solid
            color: '#fde68a'
      components:
        - name: image
          properties:
            source:
              url: 'https://img.icons8.com/fluency/48/warning-shield.png'
              altText: 'Warning icon'
            layout:
              widthMode: fit
            appearance:
              fit: contain
              width: 28
              height: 28
        - name: layout-column
          properties:
            layout:
              horizontalAlign: start
              widthMode: stretch
              gap: none
          components:
            - name: paragraph
              properties:
                text: "<strong>API rate limit approaching</strong>"
                typography:
                  size: sm
                  weight: semibold
                  color: '#a16207'
            - name: paragraph
              properties:
                text: "You have used 87% of your monthly API quota. Consider upgrading your plan."
                typography:
                  size: xs
                  weight: regular
                  color: '#92400e'

    # Error Notification
    - name: layout-row
      properties:
        layout:
          horizontalAlign: start
          align: center
          wrap: nowrap
          gap: sm
          widthMode: "50"
        spacing:
          paddingBlock: sm
          paddingInline: md
          marginBlock: xs
        appearance:
          background:
            color: '#fef2f2'
            transparency: 100
          borderRadius: md
          border:
            width: 1
            style: solid
            color: '#fecaca'
      components:
        - name: image
          properties:
            source:
              url: 'https://img.icons8.com/fluency/48/cancel.png'
              altText: 'Error icon'
            layout:
              widthMode: fit
            appearance:
              fit: contain
              width: 28
              height: 28
        - name: layout-column
          properties:
            layout:
              horizontalAlign: start
              widthMode: stretch
              gap: none
          components:
            - name: paragraph
              properties:
                text: "<strong>Payment processing failed</strong>"
                typography:
                  size: sm
                  weight: semibold
                  color: '#b91c1c'
            - name: paragraph
              properties:
                text: "Transaction #TXN-9847 could not be completed. Retry or contact support."
                typography:
                  size: xs
                  weight: regular
                  color: '#991b1b'
