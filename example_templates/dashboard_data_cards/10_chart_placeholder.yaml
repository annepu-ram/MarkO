# Dashboard Data Card 10 - "Chart Placeholder"
# A video-background component showing an animated data visualization
# with overlay content describing the trend. Uses dark overlay for readability.

- name: page
  properties:
    theme:
      fonts:
        headingMain: &font-heading-main "'Inter', sans-serif"
        headingLevel2: &font-heading-level2 "'Inter', sans-serif"
        content: &font-content "'Inter', sans-serif"
      colors:
        primary: &color-primary '#0f172a'
        secondary: &color-secondary '#64748b'
        accent: &color-accent '#6366f1'
        background: &color-background '#f8fafc'
    spacing: { paddingBlock: xl, paddingInline: xl }
    appearance:
      background: { color: *color-background }
  components:
    - name: layout-column
      properties:
        layout:
          horizontalAlign: center
          align: start
          widthMode: "66"
        spacing:
          paddingBlock: lg
          paddingInline: lg
        appearance:
          background:
            color: '#ffffff'
            transparency: 100
          borderRadius: md
          shadow: soft
      components:
        - name: layout-row
          properties:
            layout:
              horizontalAlign: space-between
              align: center
              wrap: nowrap
              gap: md
            spacing:
              marginBlock: xs
          components:
            - name: heading
              properties:
                text: Revenue Trend
                level: 3
                layout:
                  widthMode: stretch
                typography:
                  size: md
                  weight: bold
                  color: *color-primary
            - name: eyebrow
              properties:
                text: "LIVE"
                layout:
                  widthMode: fit
                typography:
                  size: xxs
                  weight: bold
                  color: '#16a34a'
                  letterSpacing: wider
                spacing:
                  paddingBlock: xxs
                  paddingInline: xs
                appearance:
                  background:
                    color: '#dcfce7'
                    transparency: 100
                  borderRadius: pill

        - name: video-background
          properties:
            source:
              url: 'https://cdn.pixabay.com/video/2020/06/09/40775-430530472_large.mp4'
              poster: ''
            appearance:
              aspectRatio: '16/9'
              minHeight: 280
              objectFit: cover
              objectPosition: center
              borderRadius: sm
              overlay:
                enabled: true
                color: 'rgba(15, 23, 42, 0.75)'
                opacity: 75
            playback:
              autoplay: true
              loop: true
              muted: true
            content:
              verticalAlign: end
              horizontalAlign: left
              padding: md
          components:
            - name: layout-row
              properties:
                layout:
                  horizontalAlign: space-between
                  align: end
                  wrap: nowrap
                  gap: lg
              components:
                - name: layout-column
                  properties:
                    layout:
                      widthMode: stretch
                      horizontalAlign: start
                      gap: none
                  components:
                    - name: heading
                      properties:
                        text: "$284,920"
                        level: 2
                        typography:
                          size: xxl
                          weight: extrabold
                          color: '#ffffff'
                    - name: paragraph
                      properties:
                        text: "Total revenue this quarter"
                        typography:
                          size: sm
                          weight: regular
                          color: '#94a3b8'

                - name: layout-column
                  properties:
                    layout:
                      widthMode: fit
                      horizontalAlign: end
                      gap: none
                  components:
                    - name: eyebrow
                      properties:
                        text: "+23.4%"
                        typography:
                          size: md
                          weight: bold
                          color: '#4ade80'
                    - name: caption
                      properties:
                        text: vs last quarter
                        typography:
                          size: xxs
                          weight: regular
                          color: '#94a3b8'
                          align: right

        - name: caption
          properties:
            text: "Real-time data visualization powered by your analytics pipeline. Updates every 30 seconds."
            typography:
              size: xxs
              weight: regular
              color: *color-secondary
              align: left
            spacing:
              marginBlock: xs
