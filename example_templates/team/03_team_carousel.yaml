# Team Member Carousel Section — Sliding Team Showcase
# A team showcase using carousel slides with each slide containing a team member profile card featuring image, name heading, role caption, and social media icons
# Base components: layout-row, carousel, layout-column, image, heading, caption, paragraph, icon, eyebrow
# Section type: team
# Layout: carousel_slider
# Visual style: modern_minimalist
# Content volume: rich
# Tone: neutral
# Conversion intent: trust
# Image requirement: many
# Interactivity: carousel
# Industries: professional_services, saas, restaurant, portfolio, health
# Perfect for: digital agency, tech startup, consulting firm, law firm, restaurant, bakery, creative studio, architecture firm, dental clinic, accounting firm


- name: site
  properties:
    theme:
      fonts:
        heading: &font-heading "'Plus Jakarta Sans', sans-serif"
        content: &font-content "'Inter', sans-serif"
      colors:
        primary: &color-primary '#0f172a'
        text: &color-text '#2B2F3B'
        secondary: &color-secondary '#64748b'
        accent: &color-accent '#0ea5e9'
        background: &color-background '#f1f5f9'
  components:
    - name: page
      slug: home
      title: "03 Team Carousel"
      properties:
        appearance: { background: { color: *color-background } }
      components:

        # ============================================
        # SECTION HEADER
        # ============================================
        - name: layout-column
          properties:
            layout: { horizontalAlign: center }
            spacing: { paddingBlock: xl, paddingInline: lg }
          components:
            - name: eyebrow
              properties:
                text: THE EXPERTS
                typography: { size: xs, weight: semibold, color: *color-accent, transform: uppercase, letterSpacing: wider, align: center }
            - name: heading
              properties:
                text: Our Expert Team
                level: 1
                typography: { size: xxxl, weight: extrabold, color: *color-primary, align: center, letterSpacing: tight }
                spacing: { marginBlock: sm }
            - name: paragraph
              properties:
                text: Talented professionals who bring expertise, creativity, and dedication to every project we take on.
                typography: { size: lg, color: *color-secondary, align: center }
                layout: { widthMode: "75" }

        # ============================================
        # TEAM CAROUSEL
        # ============================================
        - name: carousel
          properties:
            behavior:
              autoplay: true
              delay: 5000
              loop: true
              pauseOnHover: true
              swipeEnabled: true
              swipeThreshold: 50
              keyboardNavigation: true
            animation:
              effect: fade
              duration: 600
            navigation:
              showArrows: true
              arrowStyle: chevron
              arrowPosition: inside
              showDots: true
            indicators:
              style: dots
              position: bottom
            accessibility:
              showPauseButton: true
              ariaLabel: 'Team members carousel'
            spacing: { marginBlock: lg, paddingInline: lg }
          slides:

            # Slide 1 - CEO
            - components:
                - name: layout-column
                  properties:
                    layout: { horizontalAlign: center }
                    appearance: { background: { color: '#ffffff', opacity: 100 }, radius: lg, shadow: soft }
                    spacing: { paddingBlock: xl, paddingInline: lg }
                  components:
                    - name: image
                      properties:
                        source:
                          url: 'https://images.unsplash.com/photo-1560250097-0b93528c311a?w=500&q=80'
                          altText: 'Portrait of James Park, CEO'
                        appearance:
                          fit: cover
                          cornerStyle: pill
                          aspectRatio: '1/1'
                          shadow: soft
                        layout: { widthMode: "25" }
                    - name: heading
                      properties:
                        text: James Park
                        level: 3
                        typography: { size: xl, weight: bold, color: *color-primary, align: center }
                        spacing: { marginBlock: sm }
                    - name: caption
                      properties:
                        text: Chief Executive Officer
                        typography: { size: sm, color: *color-accent, align: center, weight: semibold }
                    - name: paragraph
                      properties:
                        text: A seasoned entrepreneur with a track record of scaling startups from zero to acquisition. James brings strategic vision and an unwavering commitment to client success.
                        typography: { size: md, color: *color-secondary, align: center }
                        layout: { widthMode: "66" }
                        spacing: { marginBlock: md }
                    - name: layout-row
                      properties:
                        layout: { horizontalAlign: center, wrap: wrap }
                        spacing: { marginBlock: sm }
                      components:
                        - name: icon
                          properties: { name: mail, size: "24", color: *color-secondary }
                        - name: icon
                          properties: { name: phone, size: "24", color: *color-secondary }
                        - name: icon
                          properties: { name: globe, size: "24", color: *color-secondary }

            # Slide 2 - CTO
            - components:
                - name: layout-column
                  properties:
                    layout: { horizontalAlign: center }
                    appearance: { background: { color: '#ffffff', opacity: 100 }, radius: lg, shadow: soft }
                    spacing: { paddingBlock: xl, paddingInline: lg }
                  components:
                    - name: image
                      properties:
                        source:
                          url: 'https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?w=500&q=80'
                          altText: 'Portrait of Raj Mehta, CTO'
                        appearance:
                          fit: cover
                          cornerStyle: pill
                          aspectRatio: '1/1'
                          shadow: soft
                        layout: { widthMode: "25" }
                    - name: heading
                      properties:
                        text: Raj Mehta
                        level: 3
                        typography: { size: xl, weight: bold, color: *color-primary, align: center }
                        spacing: { marginBlock: sm }
                    - name: caption
                      properties:
                        text: Chief Technology Officer
                        typography: { size: sm, color: *color-accent, align: center, weight: semibold }
                    - name: paragraph
                      properties:
                        text: Former senior engineer at Google with deep expertise in distributed systems and AI. Raj architects the technical foundation that powers every solution we build.
                        typography: { size: md, color: *color-secondary, align: center }
                        layout: { widthMode: "66" }
                        spacing: { marginBlock: md }
                    - name: layout-row
                      properties:
                        layout: { horizontalAlign: center, wrap: wrap }
                        spacing: { marginBlock: sm }
                      components:
                        - name: icon
                          properties: { name: mail, size: "24", color: *color-secondary }
                        - name: icon
                          properties: { name: phone, size: "24", color: *color-secondary }
                        - name: icon
                          properties: { name: globe, size: "24", color: *color-secondary }

            # Slide 3 - Design Director
            - components:
                - name: layout-column
                  properties:
                    layout: { horizontalAlign: center }
                    appearance: { background: { color: '#ffffff', opacity: 100 }, radius: lg, shadow: soft }
                    spacing: { paddingBlock: xl, paddingInline: lg }
                  components:
                    - name: image
                      properties:
                        source:
                          url: 'https://images.unsplash.com/photo-1573496359142-b8d87734a5a2?w=500&q=80'
                          altText: 'Portrait of Sofia Andersson, Design Director'
                        appearance:
                          fit: cover
                          cornerStyle: pill
                          aspectRatio: '1/1'
                          shadow: soft
                        layout: { widthMode: "25" }
                    - name: heading
                      properties:
                        text: Sofia Andersson
                        level: 3
                        typography: { size: xl, weight: bold, color: *color-primary, align: center }
                        spacing: { marginBlock: sm }
                    - name: caption
                      properties:
                        text: Design Director
                        typography: { size: sm, color: *color-accent, align: center, weight: semibold }
                    - name: paragraph
                      properties:
                        text: An award-winning designer with a passion for human-centered design. Sofia leads our creative team with an eye for detail and a heart for storytelling.
                        typography: { size: md, color: *color-secondary, align: center }
                        layout: { widthMode: "66" }
                        spacing: { marginBlock: md }
                    - name: layout-row
                      properties:
                        layout: { horizontalAlign: center, wrap: wrap }
                        spacing: { marginBlock: sm }
                      components:
                        - name: icon
                          properties: { name: mail, size: "24", color: *color-secondary }
                        - name: icon
                          properties: { name: phone, size: "24", color: *color-secondary }
                        - name: icon
                          properties: { name: globe, size: "24", color: *color-secondary }

            # Slide 4 - Head of Marketing
            - components:
                - name: layout-column
                  properties:
                    layout: { horizontalAlign: center }
                    appearance: { background: { color: '#ffffff', opacity: 100 }, radius: lg, shadow: soft }
                    spacing: { paddingBlock: xl, paddingInline: lg }
                  components:
                    - name: image
                      properties:
                        source:
                          url: 'https://images.unsplash.com/photo-1580489944761-15a19d654956?w=500&q=80'
                          altText: 'Portrait of Amara Okonkwo, Head of Marketing'
                        appearance:
                          fit: cover
                          cornerStyle: pill
                          aspectRatio: '1/1'
                          shadow: soft
                        layout: { widthMode: "25" }
                    - name: heading
                      properties:
                        text: Amara Okonkwo
                        level: 3
                        typography: { size: xl, weight: bold, color: *color-primary, align: center }
                        spacing: { marginBlock: sm }
                    - name: caption
                      properties:
                        text: Head of Marketing
                        typography: { size: sm, color: *color-accent, align: center, weight: semibold }
                    - name: paragraph
                      properties:
                        text: Growth strategist who has helped brands scale from seed stage to market leaders. Amara blends data analytics with creative storytelling for maximum impact.
                        typography: { size: md, color: *color-secondary, align: center }
                        layout: { widthMode: "66" }
                        spacing: { marginBlock: md }
                    - name: layout-row
                      properties:
                        layout: { horizontalAlign: center, wrap: wrap }
                        spacing: { marginBlock: sm }
                      components:
                        - name: icon
                          properties: { name: mail, size: "24", color: *color-secondary }
                        - name: icon
                          properties: { name: phone, size: "24", color: *color-secondary }
                        - name: icon
                          properties: { name: globe, size: "24", color: *color-secondary }

            # Slide 5 - Operations Manager
            - components:
                - name: layout-column
                  properties:
                    layout: { horizontalAlign: center }
                    appearance: { background: { color: '#ffffff', opacity: 100 }, radius: lg, shadow: soft }
                    spacing: { paddingBlock: xl, paddingInline: lg }
                  components:
                    - name: image
                      properties:
                        source:
                          url: 'https://images.unsplash.com/photo-1519085360753-af0119f7cbe7?w=500&q=80'
                          altText: 'Portrait of Daniel Kim, Operations Manager'
                        appearance:
                          fit: cover
                          cornerStyle: pill
                          aspectRatio: '1/1'
                          shadow: soft
                        layout: { widthMode: "25" }
                    - name: heading
                      properties:
                        text: Daniel Kim
                        level: 3
                        typography: { size: xl, weight: bold, color: *color-primary, align: center }
                        spacing: { marginBlock: sm }
                    - name: caption
                      properties:
                        text: Operations Manager
                        typography: { size: sm, color: *color-accent, align: center, weight: semibold }
                    - name: paragraph
                      properties:
                        text: Process optimization expert who ensures every project runs smoothly from kickoff to delivery. Daniel keeps our teams aligned and our clients informed.
                        typography: { size: md, color: *color-secondary, align: center }
                        layout: { widthMode: "66" }
                        spacing: { marginBlock: md }
                    - name: layout-row
                      properties:
                        layout: { horizontalAlign: center, wrap: wrap }
                        spacing: { marginBlock: sm }
                      components:
                        - name: icon
                          properties: { name: mail, size: "24", color: *color-secondary }
                        - name: icon
                          properties: { name: phone, size: "24", color: *color-secondary }
                        - name: icon
                          properties: { name: globe, size: "24", color: *color-secondary }
