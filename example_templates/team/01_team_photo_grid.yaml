# Team Photo Grid Section — Meet the Team
# A team member showcase using columnsgrid with circular profile images, name headings, role captions, and short bios arranged in a responsive 4-column card grid layout
# Base components: layout-row, columnsgrid, layout-column, image, heading, caption, paragraph, eyebrow
# Section type: team
# Layout: grid, card_based
# Visual style: modern_minimalist
# Content volume: standard
# Tone: neutral
# Conversion intent: trust
# Image requirement: required
# Interactivity: static
# Industries: professional_services, saas, restaurant, portfolio, health
# Perfect for: digital agency, tech startup, consulting firm, law firm, restaurant, bakery, creative studio, architecture firm, dental clinic, accounting firm


- name: site
  properties:
    theme:
      fonts:
        heading: &font-heading "'Plus Jakarta Sans', sans-serif"
        content: &font-content "'Inter', sans-serif"
      colors:
        primary: &color-primary '#1e293b'
        text: &color-text '#343A45'
        secondary: &color-secondary '#64748b'
        accent: &color-accent '#6366f1'
        background: &color-background '#f8fafc'
  components:
    - name: page
      slug: home
      title: "01 Team Photo Grid"
      properties:
        appearance: { background: { color: *color-background } }
      components:

        # ============================================
        # SECTION HEADER
        # ============================================
        - name: layout-column
          properties:
            layout: { horizontalAlign: center }
            spacing: { paddingBlock: xl, paddingInline: lg }
          components:
            - name: eyebrow
              properties:
                text: OUR TEAM
                typography: { size: xs, weight: semibold, color: *color-accent, transform: uppercase, letterSpacing: wider, align: center }
            - name: heading
              properties:
                text: Meet the People Behind the Magic
                level: 1
                typography: { size: xxxl, weight: extrabold, color: *color-primary, align: center, letterSpacing: tight }
                spacing: { marginBlock: sm }
            - name: paragraph
              properties:
                text: A passionate team of creators, strategists, and builders dedicated to delivering exceptional results for every client.
                typography: { size: lg, color: *color-secondary, align: center }
                layout: { widthMode: "75" }

        # ============================================
        # TEAM GRID
        # ============================================
        - name: columnsgrid
          properties:
            layout: { columns: 4, gap: xl }
            responsive: { breakpoints: { md: 2, sm: 1 } }
            spacing: { paddingBlock: lg, paddingInline: lg }
          columns:

            # Team Member 1
            - components:
                - name: layout-column
                  properties:
                    layout: { horizontalAlign: center }
                    appearance: { background: { color: '#ffffff', opacity: 100 }, radius: lg, shadow: soft }
                    spacing: { paddingBlock: lg, paddingInline: md }
                  components:
                    - name: image
                      properties:
                        source:
                          url: 'https://images.unsplash.com/photo-1560250097-0b93528c311a?w=400&q=80'
                          altText: 'Portrait of David Chen, CEO'
                        appearance:
                          fit: cover
                          cornerStyle: pill
                          aspectRatio: '1/1'
                          hoverEffect: lift
                        layout: { widthMode: "50" }
                    - name: heading
                      properties:
                        text: David Chen
                        level: 3
                        typography: { size: lg, weight: bold, color: *color-primary, align: center }
                        spacing: { marginBlock: sm }
                    - name: caption
                      properties:
                        text: Chief Executive Officer
                        typography: { size: sm, color: *color-accent, align: center, weight: semibold }
                    - name: paragraph
                      properties:
                        text: Visionary leader with 15 years of experience driving innovation and building high-performing teams across the tech industry.
                        typography: { size: sm, color: *color-secondary, align: center }
                        spacing: { marginBlock: sm }

            # Team Member 2
            - components:
                - name: layout-column
                  properties:
                    layout: { horizontalAlign: center }
                    appearance: { background: { color: '#ffffff', opacity: 100 }, radius: lg, shadow: soft }
                    spacing: { paddingBlock: lg, paddingInline: md }
                  components:
                    - name: image
                      properties:
                        source:
                          url: 'https://images.unsplash.com/photo-1573496359142-b8d87734a5a2?w=400&q=80'
                          altText: 'Portrait of Sarah Mitchell, Creative Director'
                        appearance:
                          fit: cover
                          cornerStyle: pill
                          aspectRatio: '1/1'
                          hoverEffect: lift
                        layout: { widthMode: "50" }
                    - name: heading
                      properties:
                        text: Sarah Mitchell
                        level: 3
                        typography: { size: lg, weight: bold, color: *color-primary, align: center }
                        spacing: { marginBlock: sm }
                    - name: caption
                      properties:
                        text: Creative Director
                        typography: { size: sm, color: *color-accent, align: center, weight: semibold }
                    - name: paragraph
                      properties:
                        text: Award-winning designer who transforms bold ideas into beautiful, user-centered digital experiences that resonate with audiences.
                        typography: { size: sm, color: *color-secondary, align: center }
                        spacing: { marginBlock: sm }

            # Team Member 3
            - components:
                - name: layout-column
                  properties:
                    layout: { horizontalAlign: center }
                    appearance: { background: { color: '#ffffff', opacity: 100 }, radius: lg, shadow: soft }
                    spacing: { paddingBlock: lg, paddingInline: md }
                  components:
                    - name: image
                      properties:
                        source:
                          url: 'https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?w=400&q=80'
                          altText: 'Portrait of Marcus Rivera, Lead Engineer'
                        appearance:
                          fit: cover
                          cornerStyle: pill
                          aspectRatio: '1/1'
                          hoverEffect: lift
                        layout: { widthMode: "50" }
                    - name: heading
                      properties:
                        text: Marcus Rivera
                        level: 3
                        typography: { size: lg, weight: bold, color: *color-primary, align: center }
                        spacing: { marginBlock: sm }
                    - name: caption
                      properties:
                        text: Lead Engineer
                        typography: { size: sm, color: *color-accent, align: center, weight: semibold }
                    - name: paragraph
                      properties:
                        text: Full-stack architect passionate about scalable systems and clean code. Previously built platforms serving millions of users.
                        typography: { size: sm, color: *color-secondary, align: center }
                        spacing: { marginBlock: sm }

            # Team Member 4
            - components:
                - name: layout-column
                  properties:
                    layout: { horizontalAlign: center }
                    appearance: { background: { color: '#ffffff', opacity: 100 }, radius: lg, shadow: soft }
                    spacing: { paddingBlock: lg, paddingInline: md }
                  components:
                    - name: image
                      properties:
                        source:
                          url: 'https://images.unsplash.com/photo-1580489944761-15a19d654956?w=400&q=80'
                          altText: 'Portrait of Aisha Patel, Marketing Lead'
                        appearance:
                          fit: cover
                          cornerStyle: pill
                          aspectRatio: '1/1'
                          hoverEffect: lift
                        layout: { widthMode: "50" }
                    - name: heading
                      properties:
                        text: Aisha Patel
                        level: 3
                        typography: { size: lg, weight: bold, color: *color-primary, align: center }
                        spacing: { marginBlock: sm }
                    - name: caption
                      properties:
                        text: Marketing Lead
                        typography: { size: sm, color: *color-accent, align: center, weight: semibold }
                    - name: paragraph
                      properties:
                        text: Data-driven strategist who crafts compelling brand narratives and growth campaigns that consistently exceed performance targets.
                        typography: { size: sm, color: *color-secondary, align: center }
                        spacing: { marginBlock: sm }
