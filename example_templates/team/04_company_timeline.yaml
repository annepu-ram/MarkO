# Company Timeline Section — Our Journey and Milestones
# A vertical company history timeline using alternating layout-rows with year badges, milestone headings, description paragraphs, and achievement icons showing company growth story
# Base components: layout-row, layout-column, badge, heading, paragraph, icon, counter-up, br, eyebrow
# Section type: team
# Layout: stacked
# Visual style: modern_minimalist
# Content volume: rich
# Tone: neutral
# Conversion intent: trust
# Image requirement: none
# Interactivity: static
# Industries: professional_services, saas, restaurant, portfolio, health
# Perfect for: digital agency, tech startup, consulting firm, law firm, restaurant, bakery, creative studio, architecture firm, dental clinic, accounting firm


- name: site
  properties:
    theme:
      fonts:
        heading: &font-heading "'Plus Jakarta Sans', sans-serif"
        content: &font-content "'Inter', sans-serif"
      colors:
        primary: &color-primary '#1e293b'
        text: &color-text '#343A45'
        secondary: &color-secondary '#64748b'
        accent: &color-accent '#2563eb'
        background: &color-background '#ffffff'
  components:
    - name: page
      slug: home
      title: "04 Company Timeline"
      properties:
        appearance: { background: { color: *color-background } }
      components:

        # ============================================
        # SECTION HEADER
        # ============================================
        - name: layout-column
          properties:
            layout: { horizontalAlign: center }
            spacing: { paddingBlock: xl, paddingInline: lg }
          components:
            - name: eyebrow
              properties:
                text: OUR JOURNEY
                typography: { size: xs, weight: semibold, color: *color-accent, transform: uppercase, letterSpacing: wider, align: center }
            - name: heading
              properties:
                text: Company Milestones
                level: 1
                typography: { size: xxxl, weight: extrabold, color: *color-primary, align: center, letterSpacing: tight }
                spacing: { marginBlock: sm }
            - name: paragraph
              properties:
                text: From a bold idea to a thriving company — here are the moments that shaped who we are today.
                typography: { size: lg, color: *color-secondary, align: center }
                layout: { widthMode: "75" }

        # ============================================
        # MILESTONE 1 — 2018
        # ============================================
        - name: layout-row
          properties:
            layout:
              align: center
              horizontalAlign: center
              wrap: wrap
            appearance: { background: { color: '#f8fafc', opacity: 100 } }
            spacing: { paddingBlock: lg, paddingInline: lg }
          components:
            - name: layout-column
              properties:
                layout: { horizontalAlign: center, widthMode: "16" }
              components:
                - name: icon
                  properties: { name: rocket, size: "48", color: *color-accent }
                - name: badge
                  properties:
                    text: "2018"
                    appearance:
                      background: { color: *color-accent }
                      radius: pill
                    spacing:
                      paddingBlock: xs
                      paddingInline: md
                    typography: { color: *color-background, weight: bold, size: sm }

            - name: layout-column
              properties:
                layout: { horizontalAlign: start, widthMode: "66" }
                spacing: { paddingInline: md }
              components:
                - name: heading
                  properties:
                    text: The Beginning
                    level: 3
                    typography: { size: xl, weight: bold, color: *color-primary }
                    spacing: { marginBlock: xs }
                - name: paragraph
                  properties:
                    text: Founded in a small co-working space with just three people and a shared dream. We launched our first product and signed our initial five clients within the first quarter.
                    typography: { size: md, color: *color-secondary, lineHeight: "1.7" }

        - name: br
          properties:
            appearance: { color: '#e2e8f0', style: solid, width: 1 }
            spacing: { marginBlock: none }
            layout: { widthMode: "75" }

        # ============================================
        # MILESTONE 2 — 2020
        # ============================================
        - name: layout-row
          properties:
            layout:
              align: center
              horizontalAlign: center
              wrap: wrap
            appearance: { background: { color: *color-background, opacity: 100 } }
            spacing: { paddingBlock: lg, paddingInline: lg }
          components:
            - name: layout-column
              properties:
                layout: { horizontalAlign: center, widthMode: "16" }
              components:
                - name: icon
                  properties: { name: trending-up, size: "48", color: '#10b981' }
                - name: badge
                  properties:
                    text: "2020"
                    appearance:
                      background: { color: '#10b981' }
                      radius: pill
                    spacing:
                      paddingBlock: xs
                      paddingInline: md
                    typography: { color: *color-background, weight: bold, size: sm }

            - name: layout-column
              properties:
                layout: { horizontalAlign: start, widthMode: "66" }
                spacing: { paddingInline: md }
              components:
                - name: heading
                  properties:
                    text: Rapid Growth
                    level: 3
                    typography: { size: xl, weight: bold, color: *color-primary }
                    spacing: { marginBlock: xs }
                - name: paragraph
                  properties:
                    text: Expanded the team to 20 members and opened our first dedicated office. Secured Series A funding and grew our client base to over 100 companies across three continents.
                    typography: { size: md, color: *color-secondary, lineHeight: "1.7" }

        - name: br
          properties:
            appearance: { color: '#e2e8f0', style: solid, width: 1 }
            spacing: { marginBlock: none }
            layout: { widthMode: "75" }

        # ============================================
        # MILESTONE 3 — 2022
        # ============================================
        - name: layout-row
          properties:
            layout:
              align: center
              horizontalAlign: center
              wrap: wrap
            appearance: { background: { color: '#f8fafc', opacity: 100 } }
            spacing: { paddingBlock: lg, paddingInline: lg }
          components:
            - name: layout-column
              properties:
                layout: { horizontalAlign: center, widthMode: "16" }
              components:
                - name: icon
                  properties: { name: trophy, size: "48", color: '#f59e0b' }
                - name: badge
                  properties:
                    text: "2022"
                    appearance:
                      background: { color: '#f59e0b' }
                      radius: pill
                    spacing:
                      paddingBlock: xs
                      paddingInline: md
                    typography: { color: *color-primary, weight: bold, size: sm }

            - name: layout-column
              properties:
                layout: { horizontalAlign: start, widthMode: "66" }
                spacing: { paddingInline: md }
              components:
                - name: heading
                  properties:
                    text: Industry Recognition
                    level: 3
                    typography: { size: xl, weight: bold, color: *color-primary }
                    spacing: { marginBlock: xs }
                - name: paragraph
                  properties:
                    text: Named a top 50 company to watch by industry analysts. Won multiple design and innovation awards, and launched our flagship enterprise platform to rave reviews.
                    typography: { size: md, color: *color-secondary, lineHeight: "1.7" }

        - name: br
          properties:
            appearance: { color: '#e2e8f0', style: solid, width: 1 }
            spacing: { marginBlock: none }
            layout: { widthMode: "75" }

        # ============================================
        # MILESTONE 4 — 2025
        # ============================================
        - name: layout-row
          properties:
            layout:
              align: center
              horizontalAlign: center
              wrap: wrap
            appearance: { background: { color: *color-background, opacity: 100 } }
            spacing: { paddingBlock: lg, paddingInline: lg }
          components:
            - name: layout-column
              properties:
                layout: { horizontalAlign: center, widthMode: "16" }
              components:
                - name: icon
                  properties: { name: globe, size: "48", color: '#8b5cf6' }
                - name: badge
                  properties:
                    text: "2025"
                    appearance:
                      background: { color: '#8b5cf6' }
                      radius: pill
                    spacing:
                      paddingBlock: xs
                      paddingInline: md
                    typography: { color: *color-background, weight: bold, size: sm }

            - name: layout-column
              properties:
                layout: { horizontalAlign: start, widthMode: "66" }
                spacing: { paddingInline: md }
              components:
                - name: heading
                  properties:
                    text: Global Expansion
                    level: 3
                    typography: { size: xl, weight: bold, color: *color-primary }
                    spacing: { marginBlock: xs }
                - name: paragraph
                  properties:
                    text: Opened offices in London, Tokyo, and Sydney. Our team now numbers over 120, serving 500+ clients worldwide. We continue to push boundaries and redefine what is possible.
                    typography: { size: md, color: *color-secondary, lineHeight: "1.7" }

        # ============================================
        # ACHIEVEMENT COUNTERS
        # ============================================
        - name: layout-row
          properties:
            layout: { horizontalAlign: space-evenly, wrap: wrap }
            appearance: { background: { color: *color-primary } }
            spacing: { paddingBlock: xl, paddingInline: lg }
          components:
            - name: layout-column
              properties:
                layout: { horizontalAlign: center, widthMode: "25" }
              components:
                - name: counter-up
                  properties:
                    endValue: 7
                    duration: 2000
                    suffix: "+"
                    typography: { size: xxxl, weight: extrabold, color: *color-background, align: center }
                - name: paragraph
                  properties:
                    text: Years Strong
                    typography: { size: sm, color: '#94a3b8', align: center }

            - name: layout-column
              properties:
                layout: { horizontalAlign: center, widthMode: "25" }
              components:
                - name: counter-up
                  properties:
                    endValue: 120
                    duration: 2500
                    suffix: "+"
                    typography: { size: xxxl, weight: extrabold, color: *color-background, align: center }
                - name: paragraph
                  properties:
                    text: Team Members
                    typography: { size: sm, color: '#94a3b8', align: center }

            - name: layout-column
              properties:
                layout: { horizontalAlign: center, widthMode: "25" }
              components:
                - name: counter-up
                  properties:
                    endValue: 500
                    duration: 2500
                    suffix: "+"
                    typography: { size: xxxl, weight: extrabold, color: *color-background, align: center }
                - name: paragraph
                  properties:
                    text: Clients Worldwide
                    typography: { size: sm, color: '#94a3b8', align: center }

            - name: layout-column
              properties:
                layout: { horizontalAlign: center, widthMode: "25" }
              components:
                - name: counter-up
                  properties:
                    endValue: 15
                    duration: 2000
                    suffix: ""
                    typography: { size: xxxl, weight: extrabold, color: *color-background, align: center }
                - name: paragraph
                  properties:
                    text: Industry Awards
                    typography: { size: sm, color: '#94a3b8', align: center }
