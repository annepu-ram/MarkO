- name: page
  properties:
    theme:
      colors:
        background: &color-background '#f8fafc'
        primary: &color-primary '#1e293b'
        secondary: &color-secondary '#475569'
        accent: &color-accent '#2563eb'
      fonts:
        heading: &font-heading "'Inter', sans-serif"
        content: &font-content "'Inter', sans-serif"
      appearance:
        background: { color: *color-background }

  components:
    - name: titlebar
      properties:
        branding:
          showLogo: true
          logoUrl: 'https://www.swift-sites.com/assets/logo.png'
          title: 'Swift Clean'
        navigation:
          links:
            - label: Services
              href: '#services'
            - label: Pricing
              href: '#pricing'
            - label: About
              href: '#about'
            - label: Contact
              href: '#contact'
        layout: { alignment: left }
        appearance:
          background: { color: *color-primary }
          border: { width: 0 }
        spacing: { paddingInline: lg }

    - name: layout-row
      properties:
        layout: { horizontalAlign: center, verticalAlign: center }
        spacing: { paddingBlock: xl }
      components:
        - name: layout-column
          properties:
            layout: { widthMode: '75' }
            spacing: { paddingBlock: md }
          components:
            - name: heading
              properties:
                text: Professional Home Cleaning Services
                level: 1
                typography:
                  size: xxxl
                  weight: bold
                  color: *color-primary
                  align: center

            - name: paragraph
              properties:
                text: Transform your home with our comprehensive cleaning services. From quick tidy-ups to deep cleaning and everything in between.
                typography:
                  size: lg
                  color: *color-secondary
                  align: center
                spacing: { marginBlock: md }

            - name: layout-row
              properties:
                layout: { horizontalAlign: center, gap: sm }
              components:
                - name: button
                  properties:
                    text: Get Free Quote
                    appearance:
                      background: { color: *color-accent }
                    typography:
                      color: '#ffffff'
                      weight: semibold
                - name: button
                  properties:
                    text: View Pricing
                    appearance:
                      background: { color: *color-background }
                      border: { width: 1, color: *color-accent }
                    typography:
                      color: *color-accent
                      weight: semibold

    - name: layout-row
      properties:
        layout: { horizontalAlign: center, verticalAlign: center }
        spacing: { paddingBlock: lg }
      components:
        - name: layout-column
          properties:
            layout: { widthMode: '75' }
            spacing: { paddingBlock: md }
          components:
            - name: heading
              properties:
                text: Our Services
                level: 2
                typography:
                  size: xxl
                  weight: bold
                  color: *color-primary

            - name: columnsgrid
              properties:
                layout: { columns: 3, gap: lg }
                responsive: { breakpoints: { md: 2, sm: 1 } }
              columns:
                - components:
                    - name: layout-column
                      properties:
                        appearance: { background: { color: '#dbeafe' }, radius: lg }
                        spacing: { paddingBlock: lg, paddingInline: lg }
                      components:
                        - name: icon
                          properties:
                            name: clean_hands
                            size: xxl
                            color: *color-accent
                        - name: heading
                          properties:
                            text: Flat Cleaning
                            level: 3
                            typography: { color: *color-primary, align: center }
                        - name: paragraph
                          properties:
                            text: Thorough cleaning of your entire home. We tackle every room from top to bottom.
                            typography: { size: sm, align: center }

                - components:
                    - name: layout-column
                      properties:
                        appearance: { background: { color: '#e0f2fe' }, radius: lg }
                        spacing: { paddingBlock: lg, paddingInline: lg }
                      components:
                        - name: icon
                          properties:
                            name: shower
                            size: xxl
                            color: *color-accent
                        - name: heading
                          properties:
                            text: Deep Clean
                            level: 3
                            typography: { color: *color-primary, align: center }
                        - name: paragraph
                          properties:
                            text: Scrubbing machine deep cleaning for stubborn stains and grime in every corner.
                            typography: { size: sm, align: center }

                - components:
                    - name: layout-column
                      properties:
                        appearance: { background: { color: '#f3e8ff' }, radius: lg }
                        spacing: { paddingBlock: lg, paddingInline: lg }
                      components:
                        - name: icon
                          properties:
                            name: schedule
                            size: xxl
                            color: *color-accent
                        - name: heading
                          properties:
                            text: Routine Cleaning
                            level: 3
                            typography: { color: *color-primary, align: center }
                        - name: paragraph
                          properties:
                            text: Regular cleaning for a consistently fresh home. Perfect for busy households.
                            typography: { size: sm, align: center }

    - name: layout-row
      properties:
        layout: { horizontalAlign: center, verticalAlign: center }
        spacing: { paddingBlock: lg }
      components:
        - name: layout-column
          properties:
            layout: { widthMode: '75' }
            spacing: { paddingBlock: md }
          components:
            - name: heading
              properties:
                text: Our Pricing
                level: 2
                typography:
                  size: xxl
                  weight: bold
                  color: *color-primary

            - name: paragraph
              properties:
                text: Affordable home cleaning services tailored to your needs.
                typography: { size: lg, color: *color-secondary }
                spacing: { marginBlock: md }

            - name: columnsgrid
              properties:
                layout: { columns: 3, gap: lg }
                responsive: { breakpoints: { md: 2, sm: 1 } }
              columns:
                - components:
                    - name: layout-column
                      properties:
                        appearance: { radius: lg }
                        spacing: { paddingBlock: lg, paddingInline: lg }
                      components:
                        - name: heading
                          properties:
                            text: '1-Bedroom Flat'
                            level: 3
                            typography: { color: *color-primary, align: center }
                        - name: paragraph
                          properties:
                            text: £35
                            typography: { size: xxxl, weight: bold, align: center, color: *color-accent }
                        - name: paragraph
                          properties:
                            text: Perfect for small apartments and studios.
                            typography: { size: sm, align: center }

                - components:
                    - name: layout-column
                      properties:
                        appearance: { radius: lg }
                        spacing: { paddingBlock: lg, paddingInline: lg }
                      components:
                        - name: heading
                          properties:
                            text: '2-Bedroom Flat'
                            level: 3
                            typography: { color: *color-primary, align: center }
                        - name: paragraph
                          properties:
                            text: £55
                            typography: { size: xxxl, weight: bold, align: center, color: *color-accent }
                        - name: paragraph
                          properties:
                            text: Ideal for family homes and small terraces.
                            typography: { size: sm, align: center }

                - components:
                    - name: layout-column
                      properties:
                        appearance: { radius: lg }
                        spacing: { paddingBlock: lg, paddingInline: lg }
                      components:
                        - name: heading
                          properties:
                            text: '3+ Bedroom Flat'
                            level: 3
                            typography: { color: *color-primary, align: center }
                        - name: paragraph
                          properties:
                            text: £75+
                            typography: { size: xxxl, weight: bold, align: center, color: *color-accent }
                        - name: paragraph
                          properties:
                            text: Large family homes and spacious apartments.
                            typography: { size: sm, align: center }

            - name: paragraph
              properties:
                text: "Prices include: All rooms, bathrooms, windows, and floors. Discounts for regular bookings."
                typography: { size: sm, color: *color-secondary, align: center }
                spacing: { marginBlock: lg }

    - name: layout-row
      properties:
        layout: { horizontalAlign: center, verticalAlign: center }
        spacing: { paddingBlock: lg }
      components:
        - name: layout-column
          properties:
            layout: { widthMode: '75' }
            spacing: { paddingBlock: md }
          components:
            - name: heading
              properties:
                text: What We Offer
                level: 2
                typography:
                  size: xxl
                  weight: bold
                  color: *color-primary

            - name: layout-column
              properties:
                appearance: { background: { color: '#fef3c7' }, radius: lg }
                spacing: { paddingBlock: lg, paddingInline: lg }
              components:
                - name: heading
                  properties:
                    text: Furnished or Unfurnished
                    level: 3
                    typography: { color: *color-primary }
                - name: paragraph
                  properties:
                    text: We clean both furnished and unfurnished properties. Whether your furniture is brand new or well-loved, we'll make it sparkle.
                    spacing: { marginBlock: md }
                - name: layout-row
                  properties: { layout: { horizontalAlign: center, wrap: wrap } }
                  components:
                    - name: icon
                      properties:
                        name: weekend
                        size: xxl
                        color: *color-accent
                        spacing: { marginInline: md }

                - name: heading
                  properties:
                    text: Deep Clean Options
                    level: 3
                    typography: { color: *color-primary }
                    spacing: { marginBlock: lg }
                - name: paragraph
                  properties:
                    text: Choose between normal routine cleaning or our premium deep clean with scrubbing machines.
                    spacing: { marginBlock: md }
                - name: layout-row
                  properties: { layout: { horizontalAlign: center, wrap: wrap } }
                  components:
                    - name: icon
                      properties:
                        name: cleaning_services
                        size: xxl
                        color: *color-accent
                        spacing: { marginInline: md }

    - name: layout-row
      properties:
        layout: { horizontalAlign: center, verticalAlign: center }
        spacing: { paddingBlock: lg }
      components:
        - name: layout-column
          properties:
            layout: { widthMode: '75' }
            spacing: { paddingBlock: md }
          components:
            - name: heading
              properties:
                text: Why Choose Us
                level: 2
                typography:
                  size: xxl
                  weight: bold
                  color: *color-primary

            - name: layout-row
              properties: { layout: { horizontalAlign: center, gap: sm } }
              components:
                - name: layout-column
                  properties: { layout: { widthMode: "50" } }
                  components:
                    - name: image
                      properties:
                        source: { url: 'https://images.unsplash.com/photo-1579562459319-c515479701d0' }
                        appearance: { minHeight: 300, fit: cover }
                    - name: heading
                      properties:
                        text: Professional Team
                        level: 3
                        typography: { color: *color-primary, align: center }
                        spacing: { marginBlock: sm }
                    - name: paragraph
                      properties:
                        text: All our cleaners are trained professionals with years of experience.
                        typography: { align: center }

                - name: layout-column
                  properties: { layout: { widthMode: "50" } }
                  components:
                    - name: image
                      properties:
                        source: { url: 'https://images.unsplash.com/photo-1583512639765-240012224d11' }
                        appearance: { minHeight: 300, fit: cover }
                    - name: heading
                      properties:
                        text: Quality Products
                        level: 3
                        typography: { color: *color-primary, align: center }
                        spacing: { marginBlock: sm }
                    - name: paragraph
                      properties:
                        text: We use only the best eco-friendly cleaning products for your home.
                        typography: { align: center }

    - name: layout-row
      properties:
        layout: { horizontalAlign: center, verticalAlign: center }
        spacing: { paddingBlock: lg }
      components:
        - name: layout-column
          properties:
            layout: { widthMode: '75' }
            spacing: { paddingBlock: md }
          components:
            - name: heading
              properties:
                text: Ready to Book?
                level: 2
                typography:
                  size: xxl
                  weight: bold
                  color: *color-primary

            - name: paragraph
              properties:
                text: Contact us today to schedule your cleaning service or to get a free quote.
                typography: { size: lg, color: *color-secondary }
                spacing: { marginBlock: lg }

            - name: layout-row
              properties:
                layout: { horizontalAlign: center, gap: sm }
              components:
                - name: button
                  properties:
                    text: Get Free Quote
                    appearance:
                      background: { color: *color-accent }
                    typography:
                      color: '#ffffff'
                      weight: semibold
                - name: button
                  properties:
                    text: View Availability
                    appearance:
                      background: { color: *color-background }
                      border: { width: 1, color: *color-accent }
                    typography:
                      color: *color-accent
                      weight: semibold

            - name: layout-row
              properties:
                layout: { horizontalAlign: center, gap: lg, wrap: wrap }
                spacing: { marginBlock: lg }
              components:
                - name: layout-column
                  properties: { layout: { widthMode: "33" } }
                  components:
                    - name: icon
                      properties:
                        name: phone
                        size: xxl
                        color: *color-accent
                    - name: heading
                      properties:
                        text: Call Us
                        level: 3
                        typography: { color: *color-primary }
                        spacing: { marginBlock: sm }
                    - name: link
                      properties:
                        text: +44 20 1234 5678
                        appearance: { underline: true }
                        typography: { color: *color-accent }

                - name: layout-column
                  properties: { layout: { widthMode: "33" } }
                  components:
                    - name: icon
                      properties:
                        name: email
                        size: xxl
                        color: *color-accent
                    - name: heading
                      properties:
                        text: Email Us
                        level: 3
                        typography: { color: *color-primary }
                        spacing: { marginBlock: sm }
                    - name: link
                      properties:
                        text: info@swiftclean.co.uk
                        appearance: { underline: true }
                        typography: { color: *color-accent }

                - name: layout-column
                  properties: { layout: { widthMode: "33" } }
                  components:
                    - name: icon
                      properties:
                        name: location_on
                        size: xxl
                        color: *color-accent
                    - name: heading
                      properties:
                        text: Visit Us
                        level: 3
                        typography: { color: *color-primary }
                        spacing: { marginBlock: sm }
                    - name: paragraph
                      properties:
                        text: 123 Clean Street, London, UK
                        typography: { color: *color-secondary }

    - name: layout-row
      properties:
        layout: { horizontalAlign: center, verticalAlign: center }
        spacing: { paddingBlock: lg }
        appearance: { background: { color: '#1e293b' } }
      components:
        - name: layout-column
          properties:
            layout: { widthMode: 'stretch' }
            spacing: { paddingBlock: lg }
          components:
            - name: layout-row
              properties:
                layout: { horizontalAlign: center, wrap: wrap, gap: lg }
              components:
                - name: heading
                  properties:
                    text: Swift Clean Services
                    level: 3
                    typography: { color: *color-background, align: center }

                - name: link
                  properties:
                    text: 'Services'
                    href: '#services'
                    appearance: { underline: true }
                    typography: { color: *color-background }

                - name: link
                  properties:
                    text: 'Pricing'
                    href: '#pricing'
                    appearance: { underline: true }
                    typography: { color: *color-background }

                - name: link
                  properties:
                    text: 'About'
                    href: '#about'
                    appearance: { underline: true }
                    typography: { color: *color-background }

                - name: link
                  properties:
                    text: 'Contact'
                    href: '#contact'
                    appearance: { underline: true }
                    typography: { color: *color-background }

            - name: layout-row
              properties:
                layout: { horizontalAlign: center, gap: sm }
              components:
                - name: icon
                  properties:
                    name: facebook
                    size: lg
                    color: *color-background
                - name: icon
                  properties:
                    name: twitter
                    size: lg
                    color: *color-background
                - name: icon
                  properties:
                    name: instagram
                    size: lg
                    color: *color-background
                - name: icon
                  properties:
                    name: linkedin
                    size: lg
                    color: *color-background

            - name: paragraph
              properties:
                text: © 2023 Swift Clean Services. All rights reserved.
                typography: { color: *color-background, size: xs }