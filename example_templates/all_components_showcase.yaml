                    appearance:
                      padding:
                        block: md
                        inline: sm
                      background:
                        type: color
                        color: *color-accent
                        transparency: 100
                      radius: md
                  components:
                    - name: heading
                      level: 4
                      properties:
                        text: "Column 1"
                        typography:
                          size: md
                          weight: semibold
                          color: *color-background
                          align: center
                    - name: paragraph
                      properties:
                        text: "25% width"
                        typography:
                          size: sm
