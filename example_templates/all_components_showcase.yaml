- name: page
  properties:
    theme:
      fonts:
        heading: &font-heading "'Inter', sans-serif"
        content: &font-content "'Inter', sans-serif"
      colors:
        primary: &color-primary '#1e293b'
        secondary: &color-secondary '#64748b'
        accent: &color-accent '#6366f1'
        background: &color-background '#ffffff'
    appearance:
      padding:
        block: none
        inline: none
      background:
        type: color
        color: *color-background
        transparency: 100
  components:
    # ===========================================
    # TITLEBAR - NAVIGATION
    # ===========================================
    - name: titlebar
      properties:
        logo:
          src: "https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?w=50&h=50&fit=crop"
          alt: "Swift Sites Logo"
          size: md
        title:
          text: "Swift Sites"
          visible: true
        appearance:
          background:
            color: *color-primary
            transparency: 100
          padding:
            block: sm
            inline: lg
        typography:
          title:
            size: lg
            weight: semibold
            color: *color-background
          link:
            size: md
            weight: medium
            color: *color-secondary
        scroll:
          shrinkOnScroll: true
          shrinkPercentage: 30
      menu:
        - text: "Text"
          href: "#text-components"
        - text: "Layout"
          href: "#layout-components"
        - text: "Media"
          href: "#media-components"
        - text: "GitHub"
          href: "https://github.com"

    # ===========================================
    # SECTION 1: TEXT COMPONENTS
    # ===========================================
    - name: layout-row
      properties:
        layout:
          tag: section
          horizontalAlign: center
          verticalAlign: center
          wrap: nowrap
        appearance:
          padding:
            block: lg
            inline: md
          background:
            type: color
            color: *color-primary
            transparency: 100
      components:
        - name: layout-column
          properties:
            layout:
              widthMode: stretch
              horizontalAlign: center
            appearance:
              padding:
                block: md
                inline: md
              background:
                transparency: 0
          components:
            - name: eyebrow
              properties:
                text: "Text Components"
                typography:
                  size: sm
                  weight: semibold
                  align: center
                  color: *color-secondary
                  transform: uppercase
                  letterSpacing: wide
            - name: heading
              level: 1
              properties:
                text: "Typography & Text Elements"
                typography:
                  size: xxxl
                  weight: bold
                  align: center
                  color: *color-background
                  lineHeight: '1.2'
            - name: paragraph
              properties:
                text: "A comprehensive showcase of all text components available in Swift Sites. Each component is designed for specific use cases and can be fully customized."
                typography:
                  size: lg
                  weight: regular
                  align: center
                  color: *color-background
                  lineHeight: '1.6'

    # --- Heading Variations ---
    - name: layout-row
      properties:
        layout:
          tag: section
          horizontalAlign: center
          verticalAlign: top
          wrap: nowrap
        appearance:
          padding:
            block: xl
            inline: lg
          background:
            type: color
            color: *color-background
            transparency: 100
      components:
        - name: layout-column
          properties:
            layout:
              widthMode: stretch
              horizontalAlign: left
            appearance:
              padding:
                block: none
                inline: none
              background:
                transparency: 0
          components:
            - name: eyebrow
              properties:
                text: "Headings"
                typography:
                  size: xs
                  weight: semibold
                  color: *color-accent
                  transform: uppercase
                  letterSpacing: wider
            - name: heading
              level: 1
              properties:
                text: "Heading Level 1 (H1)"
                typography:
                  size: xxxl
                  weight: bold
                  color: *color-primary
            - name: heading
              level: 2
              properties:
                text: "Heading Level 2 (H2)"
                typography:
                  size: xxl
                  weight: bold
                  color: *color-primary
            - name: heading
              level: 3
              properties:
                text: "Heading Level 3 (H3)"
                typography:
                  size: xl
                  weight: semibold
                  color: *color-primary
            - name: heading
              level: 4
              properties:
                text: "Heading Level 4 (H4)"
                typography:
                  size: lg
                  weight: semibold
                  color: *color-secondary
            - name: heading
              level: 5
              properties:
                text: "Heading Level 5 (H5)"
                typography:
                  size: md
                  weight: medium
                  color: *color-secondary
            - name: heading
              level: 6
              properties:
                text: "Heading Level 6 (H6)"
                typography:
                  size: sm
                  weight: medium
                  color: *color-secondary

    # --- Paragraph & Caption ---
    - name: layout-row
      properties:
        layout:
          tag: section
          horizontalAlign: center
          verticalAlign: top
          wrap: wrap
        appearance:
          padding:
            block: xl
            inline: lg
          background:
            type: color
            color: *color-background
            transparency: 100
      components:
        - name: layout-column
          properties:
            layout:
              widthMode: '50'
              horizontalAlign: left
            appearance:
              padding:
                block: md
                inline: md
              background:
                type: color
                color: *color-background
                transparency: 100
              radius: md
          components:
            - name: eyebrow
              properties:
                text: "Paragraph"
                typography:
                  size: xs
                  weight: semibold
                  color: *color-accent
                  transform: uppercase
            - name: paragraph
              properties:
                text: "This is a standard paragraph component. It's perfect for body text, descriptions, and longer content blocks. The paragraph component supports various typography options including size, weight, color, line height, and text alignment."
                typography:
                  size: md
                  weight: regular
                  color: *color-primary
                  lineHeight: '1.7'
            - name: paragraph
              properties:
                text: "Multiple paragraphs can be stacked to create flowing content sections. Each paragraph maintains consistent spacing and can be individually styled."
                typography:
                  size: md
                  weight: regular
                  color: *color-secondary
                  lineHeight: '1.7'

        - name: layout-column
          properties:
            layout:
              widthMode: '50'
              horizontalAlign: left
            appearance:
              padding:
                block: md
                inline: md
              background:
                type: color
                color: *color-background
                transparency: 100
              radius: md
          components:
            - name: eyebrow
              properties:
                text: "Caption"
                typography:
                  size: xs
                  weight: semibold
                  color: *color-accent
                  transform: uppercase
            - name: caption
              properties:
                text: "Captions are smaller text elements, ideal for image descriptions, footnotes, or supplementary information."
                typography:
                  size: sm
                  weight: regular
                  color: *color-secondary
                  lineHeight: '1.5'
            - name: caption
              properties:
                text: "They can also be styled with different weights and colors to create visual hierarchy within your content."
                typography:
                  size: sm
                  weight: medium
                  color: *color-secondary
                  lineHeight: '1.5'

    # --- Blockquote ---
    - name: layout-row
      properties:
        layout:
          tag: section
          horizontalAlign: center
          verticalAlign: center
          wrap: nowrap
        appearance:
          padding:
            block: xl
            inline: lg
          background:
            type: color
            color: *color-background
            transparency: 100
      components:
        - name: layout-column
          properties:
            layout:
              widthMode: '75'
              horizontalAlign: center
            appearance:
              padding:
                block: none
                inline: none
              background:
                transparency: 0
          components:
            - name: eyebrow
              properties:
                text: "Blockquote"
                typography:
                  size: xs
                  weight: semibold
                  color: *color-accent
                  transform: uppercase
                  align: center
            - name: blockquote
              properties:
                quote: "Design is not just what it looks like and feels like. Design is how it works."
                cite: "Steve Jobs"
                typography:
                  size: xl
                  weight: medium
                  color: *color-primary
                  lineHeight: '1.6'
                  align: center
                appearance:
                  border:
                    accentColor: *color-accent
                  padding:
                    block: lg
                    inline: lg
                  background:
                    type: color
                    color: *color-background
                    transparency: 100
                  radius: md

    # --- Links ---
    - name: layout-row
      properties:
        layout:
