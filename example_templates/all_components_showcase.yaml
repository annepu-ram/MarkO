          components:
            - name: eyebrow
              properties:
                text: "Columns Grid"
                typography:
                  size: xs
                  weight: semibold
                  color: *color-accent
                  transform: uppercase
            - name: heading
              level: 3
              properties:
                text: "Responsive Grid Layout"
                typography:
                  size: xl
