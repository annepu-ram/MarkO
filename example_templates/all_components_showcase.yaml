            layout:
              widthMode: stretch
              horizontalAlign: center
            appearance:
              padding:
                block: md
                inline: none
              background:
                transparency: 0
          components:
            - name: layout-row
              properties:
                layout:
                  horizontalAlign: center
                  verticalAlign: center
                  wrap: wrap
                appearance:
                  padding:
                    block: sm
                    inline: none
                  background:
                    transparency: 0
              components:
                - name: link
                  properties:
                    text: "Standard Link"
                    href: "#"
                    appearance:
                      color: *color-accent
                      underline: true
                      showArrow: false
                    typography:
                      size: md
                      weight: medium
                - name: link
                  properties:
                    text: "Link with Arrow"
                    href: "#"
                    appearance:
                      color: *color-accent
                      underline: false
                      showArrow: true
                    typography:
                      size: md
                      weight: medium
                - name: link
                  properties:
                    text: "Bold Link"
                    href: "#"
                    appearance:
                      color: *color-accent
                      underline: true
                      showArrow: false
                    typography:
                      size: md
                      weight: bold

            # Links with different widths demonstration
            - name: layout-row
              properties:
                layout:
                  horizontalAlign: left
                  verticalAlign: center
                  wrap: wrap
                appearance:
                  padding:
                    block: md
                    inline: none
                  background:
                    transparency: 0
              components:
                - name: link
                  properties:
                    text: "33% Width Link - Demonstrates the new widthMode property on links"
                    href: "#"
                    layout:
                      widthMode: '33'
                    appearance:
                      color: *color-accent
                      underline: true
                      showArrow: true
                    typography:
                      size: md
                      weight: medium
                - name: link
                  properties:
                    text: "66% Width Link - Links now support all standardized width options"
                    href: "#"
                    layout:
                      widthMode: '66'
                    appearance:
                      color: *color-accent
                      underline: true
                      showArrow: true
                    typography:
                      size: md
                      weight: medium

    # ===========================================
    # SECTION 2: LAYOUT COMPONENTS
    # ===========================================
    - name: layout-row
      properties:
        layout:
          tag: section
          horizontalAlign: center
          verticalAlign: center
          wrap: nowrap
        appearance:
          padding:
            block: lg
            inline: md
          background:
            type: gradient
            gradient:
              colorStart: *color-accent
              colorEnd: *color-accent
              direction: to right
      components:
        - name: layout-column
          properties:
            layout:
              widthMode: stretch
              horizontalAlign: center
            appearance:
              padding:
                block: md
                inline: md
              background:
                transparency: 0
          components:
            - name: eyebrow
              properties:
                text: "Layout Components"
                typography:
                  size: sm
                  weight: semibold
                  align: center
                  color: *color-background
                  transform: uppercase
                  letterSpacing: wide
            - name: heading
              level: 2
              properties:
                text: "Flexible Layout System"
                typography:
                  size: xxxl
                  weight: bold
                  align: center
                  color: *color-background
                  lineHeight: '1.2'
            - name: paragraph
              properties:
                text: "Create complex layouts using rows, columns, and grids. Each layout component offers alignment, spacing, and responsive options."
                typography:
                  size: lg
                  weight: regular
                  align: center
                  color: *color-background
                  lineHeight: '1.6'

    # --- Layout Row Demo ---
