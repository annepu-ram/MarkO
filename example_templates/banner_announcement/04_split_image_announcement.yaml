# Split Image Announcement - Product or Event Reveal with Photo
# A 50/50 split-screen announcement banner with a striking product image on the left and an eyebrow label, bold heading, descriptive paragraph, and prominent CTA button on the right, ideal for new product reveals, event promotions, or feature announcements
# Base components: layout-row, layout-column, image, eyebrow, heading, paragraph, button
# Section type: banner
# Layout: split_screen
# Visual style: modern_minimalist
# Perfect for: online store, SaaS platform, fashion brand, tech startup, restaurant, event venue, hotel, university website

- name: site
  properties:
    theme:
      colors:
        background: &color-background '#ffffff'
        primary: &color-primary '#111827'
        text: &color-text '#2C3039'
        secondary: &color-secondary '#6b7280'
        accent: &color-accent '#2563eb'
      fonts:
        heading: &font-heading "'Inter', sans-serif"
        content: &font-content "'Inter', sans-serif"
  components:
    - name: page
      slug: home
      title: "Announcement"
      properties:
        appearance: { background: { color: *color-background } }
      components:
        - name: layout-row
          properties:
            layout: { horizontalAlign: center, verticalAlign: center, wrap: nowrap }
            appearance: { background: { color: '#f9fafb' } }
            spacing: { paddingBlock: 'none', paddingInline: 'none' }
          components:
            - name: layout-column
              properties:
                layout: { widthMode: '50' }
              components:
                - name: image
                  properties:
                    source:
                      url: 'https://images.unsplash.com/photo-1498049794561-7780e7231661'
                      altText: "Product announcement hero image"
                    appearance:
                      minHeight: 40
                      fit: cover
                      radius: none
                      objectPosition: center
                    layout:
                      widthMode: stretch

            - name: layout-column
              properties:
                layout: { widthMode: '50', horizontalAlign: left }
                spacing: { paddingBlock: xl, paddingInline: lg }
              components:
                - name: eyebrow
                  properties:
                    text: "NEW ARRIVAL"
                    typography: { size: xs, weight: bold, color: *color-accent, letterSpacing: wider }
                    spacing: { marginBlock: sm }
                - name: heading
                  properties:
                    text: "Introducing the Next Generation of Smart Devices"
                    level: 2
                    typography: { size: xxl, weight: extrabold, color: *color-primary, lineHeight: "1.2" }
                    spacing: { marginBlock: md }
                - name: paragraph
                  properties:
                    text: "Faster performance. Longer battery life. Sleeker design. Everything you loved, reimagined from the ground up for the way you work and play."
                    typography: { size: md, color: *color-secondary, lineHeight: "1.6" }
                    spacing: { marginBlock: md }
                - name: button
                  properties:
                    text: "Learn More"
                    appearance: { background: { color: *color-accent }, radius: md }
                    typography: { color: *color-background, weight: bold, size: md }
                    spacing: { marginBlock: md }
