# Industrial Grunge Hero
# Raw, gritty design with exposed metal textures, sharp edges, and bold industrial typography
# Base components: site, page, layout-row, layout-column, eyebrow, heading, paragraph, button, badge
# Section type: hero
# Layout: stacked
# Visual style: industrial_grunge
# Perfect for: manufacturing company, construction firm, automotive brand, brewery, fitness gym, metal workshop, urban fashion, industrial design studio

- name: site
  properties:
    theme:
      fonts:
        heading: &font-heading "'Space Grotesk', sans-serif"
        content: &font-content "'Inter', sans-serif"
      colors:
        primary: &color-primary "#E5E5E5"
        text: &color-text "#B0B0B0"
        secondary: &color-secondary "#2D2D2D"
        accent: &color-accent "#D97706"
        background: &color-background "#1A1A1A"
  components:
    - name: page
      slug: home
      title: "Industrial Grunge Hero"
      properties:
        appearance:
          background:
            color: *color-background
            opacity: 100
      components:

        # Hero section — raw industrial layout
        - name: layout-column
          properties:
            layout:
              horizontalAlign: center
              gap: lg
            appearance:
              background:
                color: *color-background
                opacity: 100
              border:
                width: 0
            spacing:
              paddingBlock: xxxl
              paddingInline: lg
          components:

            # Industrial badge
            - name: layout-row
              properties:
                layout:
                  horizontalAlign: center
                  verticalAlign: center
              components:
                - name: badge
                  properties:
                    text: "FORGED IN STEEL"
                    variant: warning
                    pill: false
                    layout: { widthMode: fit }

            # Eyebrow text
            - name: eyebrow
              properties:
                text: "INDUSTRIAL STRENGTH SINCE 1987"
                typography:
                  color: *color-accent
                  size: sm
                  weight: bold
                  align: center
                  letterSpacing: wide
                  transform: uppercase

            # Main heading — bold uppercase industrial
            - name: heading
              properties:
                text: "BUILT TO WITHSTAND. DESIGNED TO PERFORM."
                level: 1
                layout:
                  widthMode: "75"
                typography:
                  color: *color-primary
                  size: xxxl
                  weight: bold
                  align: center
                  letterSpacing: wide
                  transform: uppercase
                  lineHeight: snug

            # Subheadline
            - name: paragraph
              properties:
                text: |
                  We engineer solutions that endure the harshest conditions.
                  No polish, no pretense — just raw capability forged from decades
                  of relentless innovation and uncompromising craftsmanship.
                layout:
                  widthMode: "66"
                typography:
                  color: *color-text
                  size: lg
                  align: center
                  lineHeight: relaxed
                  weight: regular

            # Divider line
            - name: br
              properties:
                appearance:
                  divider: true
                  dividerColor: "#444444"

            # Stats row
            - name: layout-row
              properties:
                layout:
                  horizontalAlign: center
                  verticalAlign: center
                  wrap: wrap
                  gap: xl
                spacing:
                  paddingBlock: md
              components:
                - name: layout-column
                  properties:
                    layout:
                      widthMode: fit
                      horizontalAlign: center
                      gap: xs
                  components:
                    - name: heading
                      properties:
                        text: "250+"
                        level: 2
                        typography:
                          color: *color-accent
                          size: xxl
                          weight: bold
                          align: center
                    - name: paragraph
                      properties:
                        text: "Projects Delivered"
                        typography:
                          color: *color-text
                          size: sm
                          align: center
                          transform: uppercase
                          letterSpacing: wide

                - name: layout-column
                  properties:
                    layout:
                      widthMode: fit
                      horizontalAlign: center
                      gap: xs
                  components:
                    - name: heading
                      properties:
                        text: "36"
                        level: 2
                        typography:
                          color: *color-accent
                          size: xxl
                          weight: bold
                          align: center
                    - name: paragraph
                      properties:
                        text: "Years of Expertise"
                        typography:
                          color: *color-text
                          size: sm
                          align: center
                          transform: uppercase
                          letterSpacing: wide

                - name: layout-column
                  properties:
                    layout:
                      widthMode: fit
                      horizontalAlign: center
                      gap: xs
                  components:
                    - name: heading
                      properties:
                        text: "99.8%"
                        level: 2
                        typography:
                          color: *color-accent
                          size: xxl
                          weight: bold
                          align: center
                    - name: paragraph
                      properties:
                        text: "Uptime Guarantee"
                        typography:
                          color: *color-text
                          size: sm
                          align: center
                          transform: uppercase
                          letterSpacing: wide

            # CTA buttons — accent border industrial style
            - name: layout-row
              properties:
                layout:
                  horizontalAlign: center
                  verticalAlign: center
                  wrap: wrap
                  gap: md
                spacing:
                  paddingBlock: md
              components:
                - name: button
                  properties:
                    text: "GET A QUOTE"
                    appearance:
                      background:
                        color: *color-accent
                        opacity: 100
                      border:
                        width: 2
                        style: solid
                        color: *color-accent
                      radius: none
                      shadow: none
                    spacing:
                      paddingBlock: md
                      paddingInline: xl
                    typography:
                      color: *color-background
                      weight: bold
                      size: md
                      transform: uppercase
                      letterSpacing: wide

                - name: button
                  properties:
                    text: "VIEW PROJECTS"
                    appearance:
                      background:
                        color: transparent
                        opacity: 0
                      border:
                        width: 2
                        style: solid
                        color: *color-accent
                      radius: none
                      shadow: none
                    spacing:
                      paddingBlock: md
                      paddingInline: xl
                    typography:
                      color: *color-accent
                      weight: bold
                      size: md
                      transform: uppercase
                      letterSpacing: wide
