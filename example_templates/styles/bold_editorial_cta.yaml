# Bold Editorial CTA Banner
# Clean white call-to-action with strong heading and thick-bordered button
# Base components: site, page, layout-column, layout-row, heading, paragraph, button, eyebrow
# Section type: cta
# Layout: centered
# Visual style: bold_editorial
# Perfect for: Magazine, news, media, publishing, blog, creative agency, portfolio, fashion

- name: site
  properties:
    theme:
      fonts:
        heading: &font-heading "'Playfair Display', serif"
        content: &font-content "'Inter', sans-serif"
      colors:
        primary: &color-primary "#1A1A1A"
        text: &color-text "#374151"
        secondary: &color-secondary "#F5F5F0"
        accent: &color-accent "#DC2626"
        background: &color-background "#FFFFFF"
  components:
    - name: page
      slug: home
      title: "Bold Editorial CTA"
      properties:
        appearance:
          background:
            color: *color-background
            opacity: 100
      components:

        # CTA section — clean white with strong typography
        - name: layout-column
          properties:
            layout:
              horizontalAlign: center
            appearance:
              background:
                color: *color-background
                opacity: 100
              border:
                width: 0
              radius: none
              shadow: none
            spacing:
              paddingBlock: xxxl
              paddingInline: lg
          components:

            # Inner content
            - name: layout-column
              properties:
                layout:
                  widthMode: "66"
                  horizontalAlign: center
                  gap: md
              components:

                # Red accent eyebrow
                - name: eyebrow
                  properties:
                    text: "Don't Miss Out"
                    typography:
                      size: xs
                      weight: bold
                      color: *color-accent
                      transform: uppercase
                      letterSpacing: wider
                      align: center

                # Strong heading
                - name: heading
                  properties:
                    text: "The story continues with you"
                    level: 2
                    typography:
                      size: xxl
                      weight: extrabold
                      color: *color-primary
                      align: center
                      lineHeight: snug
                      letterSpacing: tight

                # Red divider
                - name: br
                  properties:
                    appearance:
                      color: *color-accent
                      width: 60

                # Supporting paragraph
                - name: paragraph
                  properties:
                    text: |
                      Subscribe to receive our weekly editorial digest. No fluff,
                      no filler — just the stories, insights, and perspectives
                      that shape the conversation.
                    typography:
                      size: md
                      color: *color-text
                      align: center
                      lineHeight: relaxed
                    layout:
                      widthMode: "75"
                    spacing:
                      marginBlock: md

                # CTA buttons
                - name: layout-row
                  properties:
                    layout:
                      horizontalAlign: center
                      verticalAlign: center
                      wrap: wrap
                      gap: md
                    spacing:
                      marginBlock: md
                  components:
                    - name: button
                      properties:
                        text: "Subscribe Now"
                        appearance:
                          background:
                            color: *color-primary
                            opacity: 100
                          border:
                            width: 2
                            style: solid
                            color: *color-primary
                          radius: none
                          shadow: none
                        typography:
                          color: *color-background
                          weight: bold
                          size: md
                        spacing:
                          paddingBlock: md
                          paddingInline: xxl
                    - name: button
                      properties:
                        text: "View Archive"
                        appearance:
                          background:
                            color: transparent
                            opacity: 0
                          border:
                            width: 2
                            style: solid
                            color: *color-primary
                          radius: none
                          shadow: none
                        typography:
                          color: *color-primary
                          weight: bold
                          size: md
                        spacing:
                          paddingBlock: md
                          paddingInline: xxl
