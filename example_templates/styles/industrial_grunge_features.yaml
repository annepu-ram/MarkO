# Industrial Grunge Features
# Raw feature grid with sharp edges, exposed borders, and utilitarian card design
# Base components: site, page, layout-column, heading, paragraph, eyebrow, columnsgrid, icon, button
# Section type: features
# Layout: grid
# Visual style: industrial_grunge
# Perfect for: manufacturing company, construction firm, automotive brand, brewery, fitness gym, metal workshop, urban fashion, industrial design studio

- name: site
  properties:
    theme:
      fonts:
        heading: &font-heading "'Space Grotesk', sans-serif"
        content: &font-content "'Inter', sans-serif"
      colors:
        primary: &color-primary "#E5E5E5"
        text: &color-text "#B0B0B0"
        secondary: &color-secondary "#2D2D2D"
        accent: &color-accent "#D97706"
        background: &color-background "#1A1A1A"
  components:
    - name: page
      slug: home
      title: "Industrial Grunge Features"
      properties:
        appearance:
          background:
            color: *color-background
            opacity: 100
      components:

        # Features section
        - name: layout-column
          properties:
            layout:
              horizontalAlign: center
              gap: xl
            appearance:
              background:
                color: *color-background
                opacity: 100
            spacing:
              paddingBlock: xxxl
              paddingInline: lg
          components:

            # Section header
            - name: eyebrow
              properties:
                text: "CAPABILITIES"
                typography:
                  color: *color-accent
                  size: sm
                  weight: bold
                  align: center
                  letterSpacing: wide
                  transform: uppercase

            - name: heading
              properties:
                text: "ENGINEERED FOR EXTREME CONDITIONS"
                level: 2
                layout:
                  widthMode: "66"
                typography:
                  color: *color-primary
                  size: xxl
                  weight: bold
                  align: center
                  letterSpacing: wide
                  transform: uppercase
                  lineHeight: snug

            - name: paragraph
              properties:
                text: "Every component is stress-tested, battle-hardened, and built to outlast the competition."
                layout:
                  widthMode: "66"
                typography:
                  color: *color-text
                  size: md
                  align: center
                  lineHeight: relaxed

            # Divider
            - name: br
              properties:
                appearance:
                  divider: true
                  dividerColor: "#444444"

            # Feature cards grid — no radius, border, no shadow
            - name: columnsgrid
              properties:
                layout: { columns: 3, gap: lg }
                responsive: { breakpoints: { md: 2, sm: 1 } }
              columns:

                # Card 1
                - components:
                    - name: layout-column
                      properties:
                        layout:
                          horizontalAlign: left
                          gap: sm
                        appearance:
                          background:
                            color: *color-secondary
                            opacity: 100
                          radius: none
                          shadow: none
                          border:
                            width: 1
                            style: solid
                            color: "#444444"
                        spacing:
                          paddingBlock: lg
                          paddingInline: lg
                      components:
                        - name: icon
                          properties:
                            name: shield
                            size: lg
                            color: *color-accent
                        - name: heading
                          properties:
                            text: "STRUCTURAL INTEGRITY"
                            level: 3
                            typography:
                              color: *color-primary
                              size: lg
                              weight: bold
                              transform: uppercase
                              letterSpacing: wide
                        - name: paragraph
                          properties:
                            text: "Reinforced frameworks that resist corrosion, impact, and thermal stress across all operating environments."
                            typography:
                              color: *color-text
                              size: sm
                              lineHeight: relaxed

                # Card 2
                - components:
                    - name: layout-column
                      properties:
                        layout:
                          horizontalAlign: left
                          gap: sm
                        appearance:
                          background:
                            color: *color-secondary
                            opacity: 100
                          radius: none
                          shadow: none
                          border:
                            width: 1
                            style: solid
                            color: "#444444"
                        spacing:
                          paddingBlock: lg
                          paddingInline: lg
                      components:
                        - name: icon
                          properties:
                            name: zap
                            size: lg
                            color: *color-accent
                        - name: heading
                          properties:
                            text: "RAW POWER OUTPUT"
                            level: 3
                            typography:
                              color: *color-primary
                              size: lg
                              weight: bold
                              transform: uppercase
                              letterSpacing: wide
                        - name: paragraph
                          properties:
                            text: "High-torque systems delivering consistent performance under maximum load without degradation or downtime."
                            typography:
                              color: *color-text
                              size: sm
                              lineHeight: relaxed

                # Card 3
                - components:
                    - name: layout-column
                      properties:
                        layout:
                          horizontalAlign: left
                          gap: sm
                        appearance:
                          background:
                            color: *color-secondary
                            opacity: 100
                          radius: none
                          shadow: none
                          border:
                            width: 1
                            style: solid
                            color: "#444444"
                        spacing:
                          paddingBlock: lg
                          paddingInline: lg
                      components:
                        - name: icon
                          properties:
                            name: settings
                            size: lg
                            color: *color-accent
                        - name: heading
                          properties:
                            text: "PRECISION TOOLING"
                            level: 3
                            typography:
                              color: *color-primary
                              size: lg
                              weight: bold
                              transform: uppercase
                              letterSpacing: wide
                        - name: paragraph
                          properties:
                            text: "CNC-machined components with tolerances measured in microns. Every piece fits exactly where it belongs."
