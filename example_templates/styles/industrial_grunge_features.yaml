                        - name: heading
                          properties:
                            text: "HEAT RESISTANCE"
                            level: 3
                            typography:
                              color: *color-primary
                              size: lg
                              weight: bold
                              transform: uppercase
                              letterSpacing: wide
                        - name: paragraph
                          properties:
                            text: "Ceramic-coated alloys rated for sustained operation at temperatures exceeding 1,200 degrees Fahrenheit."
                            typography:
                              color: *color-text
                              size: sm
                              lineHeight: relaxed

                # Card 5
                - components:
                    - name: layout-column
                      properties:
                        layout:
                          horizontalAlign: left
                          gap: sm
                        appearance:
                          background:
                            color: *color-secondary
                            opacity: 100
                          radius: none
                          shadow: none
                          border:
                            width: 1
                            style: solid
                            color: "#444444"
                        spacing:
                          paddingBlock: lg
                          paddingInline: lg
                      components:
                        - name: icon
                          properties:
                            name: hard-hat
                            size: lg
                            color: *color-accent
                        - name: heading
                          properties:
                            text: "SAFETY CERTIFIED"
                            level: 3
                            typography:
                              color: *color-primary
                              size: lg
                              weight: bold
                              transform: uppercase
                              letterSpacing: wide
