# Dark Academia CTA Banner
# Literary call-to-action with dark warm background and gold accent button
# Base components: site, page, layout-column, layout-row, heading, paragraph, button, eyebrow
# Section type: cta
# Layout: centered
# Visual style: dark_academia
# Perfect for: Bookshop, university, literary magazine, antique store, library, museum, law firm

- name: site
  properties:
    theme:
      fonts:
        heading: &font-heading "'Cormorant Garamond', serif"
        content: &font-content "'Inter', sans-serif"
      colors:
        primary: &color-primary "#F5E6D3"
        text: &color-text "#C8B8A0"
        secondary: &color-secondary "#2C1810"
        accent: &color-accent "#8B6914"
        background: &color-background "#1A1008"
  components:
    - name: page
      slug: home
      title: "Dark Academia CTA"
      properties:
        appearance:
          background:
            color: *color-background
            opacity: 100
      components:

        # CTA section — dark warm background
        - name: layout-column
          properties:
            layout:
              horizontalAlign: center
            appearance:
              background:
                color: *color-secondary
                opacity: 100
              border:
                width: 1
                style: solid
                color: "#3D2B1F"
            spacing:
              paddingBlock: xxxl
              paddingInline: lg
          components:

            # Inner content
            - name: layout-column
              properties:
                layout:
                  widthMode: "66"
                  horizontalAlign: center
                  gap: md
              components:

                # Decorative italic eyebrow
                - name: eyebrow
                  properties:
                    text: "Memento Vivere"
                    typography:
                      size: sm
                      weight: regular
                      color: *color-accent
                      letterSpacing: wider
                      align: center
                      fontStyle: italic

                # Main heading
                - name: heading
                  properties:
                    text: "Begin your chapter today"
                    level: 2
                    typography:
                      size: xxl
                      weight: light
                      color: *color-primary
                      align: center
                      lineHeight: snug

                # Supporting paragraph
                - name: paragraph
                  properties:
                    text: |
                      Every great scholar began with a single step into the unknown. Our doors
                      are open to curious minds seeking wisdom, community, and the transformative
                      power of deep study.
                    typography:
                      size: md
                      color: *color-text
                      align: center
                      lineHeight: relaxed
                    layout:
                      widthMode: "83"
                    spacing:
                      marginBlock: md

                # CTA buttons
                - name: layout-row
                  properties:
                    layout:
                      horizontalAlign: center
                      verticalAlign: center
                      wrap: wrap
                      gap: md
                    spacing:
                      marginBlock: md
                  components:
                    - name: button
                      properties:
                        text: "Apply Now"
                        appearance:
                          background:
                            color: *color-accent
                            opacity: 100
                          border:
                            width: 0
                          radius: xs
                          shadow: none
                        typography:
                          color: *color-background
                          weight: semibold
                          size: md
                        spacing:
                          paddingBlock: md
                          paddingInline: xxl
                    - name: button
                      properties:
                        text: "Request Prospectus"
                        appearance:
                          background:
                            color: transparent
                            opacity: 0
                          border:
                            width: 1
                            style: solid
                            color: *color-accent
                          radius: xs
                          shadow: none
                        typography:
                          color: *color-accent
                          weight: medium
                          size: md
                        spacing:
                          paddingBlock: md
                          paddingInline: xxl
