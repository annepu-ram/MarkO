# Aurora / Liquid Gradient Hero
# Flowing blended colors inspired by the Northern Lights with smooth rounding
# Base components: site, page, layout-row, layout-column, heading, paragraph, columnsgrid, button
# Section type: hero
# Layout: stacked
# Visual style: aurora_gradient
# Perfect for: SaaS platform, creative portfolio, fashion brand, design studio, tech startup, luxury brand, photography studio, music platform

- name: site
  properties:
    theme:
      fonts:
        heading: &font-heading "'Sora', sans-serif"
        content: &font-content "'Inter', sans-serif"
      colors:
        primary: &color-primary "#1A2035"
        text: &color-text "#313541"
        secondary: &color-secondary "#C8D8F0"
        accent: &color-accent "#EC4899"
        background: &color-background "#E6F0FA"
  components:
    - name: page
      slug: home
      title: "Aurora Gradient Hero"
      properties:
        appearance:
          background:
            color: *color-background
            opacity: 100
      components:

        # Aurora gradient background section
        - name: layout-column
          properties:
            layout:
              horizontalAlign: center
            appearance:
              background:
                type: gradient
                gradient:
                  colorStart: *color-accent
                  colorEnd: '#8B5CF6'
                  direction: to bottom right
                opacity: 100
            spacing:
              paddingBlock: none
              paddingInline: none
          components:

            # Content area with flowing gradient feeling
            - name: layout-column
              properties:
                layout:
                  horizontalAlign: center
                  gap: lg
                appearance:
                spacing:
                  paddingBlock: xxxl
                  paddingInline: lg
              components:

                # Gradient pill badge
                - name: layout-row
                  properties:
                    layout:
                      horizontalAlign: center
                  components:
                    - name: layout-column
                      properties:
                        layout:
                          horizontalAlign: center
                          tag: section
                          verticalAlign: center
                          wrap: nowrap
                          gap: none
                          widthMode: stretch
                        appearance:
                          background:
                            type: gradient
                            gradient:
                              colorStart: *color-secondary
                              colorEnd: '#f0f0ff'
                              direction: to right
                            opacity: 30
                          radius: pill
                          shadow: none
                          border:
                            width: 0
                            style: solid
                            color: "#000000"
                          blur: false
                          shadowColor: "#000000"
                        spacing:
                          paddingBlock: xs
                          paddingInline: lg
                        spacing:
                          marginBlock: none
                          marginInline: none
                      components:
                        - name: paragraph
                          properties:
                            text: "Introducing Flow 2.0"
                            typography:
                              color: *color-accent
                              size: sm
                              weight: medium
                              align: left
                              lineHeight: "1.6"
                              transform: none
                              letterSpacing: normal
                              fontStyle: normal
                              textDecoration: none
                            layout:
                              widthMode: fit
                            appearance:
                              background:
                                type: ""
                                color: "#ffffff"
                                opacity: 0
                            spacing:
                              marginBlock: none
                              marginInline: none
                              paddingBlock: sm
                              paddingInline: none
                # Main heading
                - name: heading
                  properties:
                    text: "Where colors come alive"
                    level: 1
                    layout:
                      widthMode: "75"
                    typography:
                      color: '#ffffff'
                      size: xxxl
                      weight: bold
                      align: center
                      letterSpacing: tight
                      lineHeight: snug

                # Subheading
                - name: paragraph
                  properties:
                    text: |
                      Experience design that moves and breathes. Flowing gradients,
                      seamless transitions, and immersive color stories that captivate.
                    layout:
                      widthMode: "50"
                    typography:
                      color: rgba(255,255,255,0.85)
                      size: lg
                      align: center
                      lineHeight: relaxed
                      weight: regular

                # Gradient feature cards — no shadows, lg radius
                - name: columnsgrid
                  properties:
                    layout: { columns: 3, gap: md }
                    responsive: { breakpoints: { md: 2, sm: 1 } }
                    spacing: { paddingBlock: lg }
                  columns:
                    - components:
                        - name: layout-column
                          properties:
                            layout:
                              horizontalAlign: center
                              gap: sm
                            appearance:
                              background:
                                type: gradient
                                gradient:
                                  colorStart: '#EC4899'
                                  colorEnd: '#F97316'
                                  direction: to bottom right
                                opacity: 100
                              radius: lg
                              shadow: none
                              border:
                                width: 0
                            spacing:
                              paddingBlock: lg
                              paddingInline: md
                          components:
                            - name: heading
                              properties:
                                text: "Create"
                                level: 3
                                typography:
                                  color: '#ffffff'
                                  size: lg
                                  weight: bold
                                  align: center
                            - name: paragraph
                              properties:
                                text: "Intuitive tools that let your creativity flow without limits"
                                typography:
                                  color: rgba(255,255,255,0.9)
                                  size: sm
                                  align: center

                    - components:
                        - name: layout-column
                          properties:
                            layout:
                              horizontalAlign: center
                              gap: sm
                            appearance:
                              background:
                                type: gradient
                                gradient:
                                  colorStart: '#8B5CF6'
                                  colorEnd: '#06B6D4'
                                  direction: to bottom right
                                opacity: 100
                              radius: lg
                              shadow: none
                              border:
                                width: 0
                            spacing:
                              paddingBlock: lg
                              paddingInline: md
                          components:
                            - name: heading
                              properties:
                                text: "Collaborate"
                                level: 3
                                typography:
                                  color: '#ffffff'
                                  size: lg
                                  weight: bold
                                  align: center
                            - name: paragraph
                              properties:
                                text: "Real-time teamwork with smooth handoffs and shared color palettes"
                                typography:
                                  color: rgba(255,255,255,0.9)
                                  size: sm
                                  align: center

                    - components:
                        - name: layout-column
                          properties:
                            layout:
                              horizontalAlign: center
                              gap: sm
                            appearance:
                              background:
                                type: gradient
                                gradient:
                                  colorStart: '#06B6D4'
                                  colorEnd: '#10B981'
                                  direction: to bottom right
                                opacity: 100
                              radius: lg
                              shadow: none
                              border:
                                width: 0
                            spacing:
                              paddingBlock: lg
                              paddingInline: md
                          components:
                            - name: heading
                              properties:
                                text: "Ship"
                                level: 3
                                typography:
                                  color: '#ffffff'
                                  size: lg
                                  weight: bold
                                  align: center
                            - name: paragraph
                              properties:
                                text: "Export pixel-perfect assets that look stunning on every screen"
                                typography:
                                  color: rgba(255,255,255,0.9)
                                  size: sm
                                  align: center

                # CTA buttons — gradient style
                - name: layout-row
                  properties:
                    layout:
                      horizontalAlign: center
                      verticalAlign: center
                      wrap: wrap
                      gap: md
                  components:
                    - name: button
                      properties:
                        text: "Start Creating"
                        appearance:
                          background:
                            color: '#ffffff'
                            opacity: 100
                          border:
                            width: 0
                          radius: pill
                          shadow: none
                        spacing:
                          paddingBlock: md
                          paddingInline: xl
                          paddingBlock: md
                          paddingInline: xl
                        typography:
                          color: *color-accent
                          weight: bold
                          size: md
                    - name: button
                      properties:
                        text: "Explore Gallery"
                        appearance:
                          background:
                            color: transparent
                            opacity: 0
                          border:
                            width: 2
                            style: solid
                            color: '#ffffff'
                          radius: pill
                          shadow: none
                        typography:
                          color: '#ffffff'
                          weight: semibold
                          size: md
