# Y2K Retro-Futurism Features
# Soft rounded feature cards with lavender tones, pill accents, and dreamy gradients
# Base components: site, page, layout-column, heading, paragraph, eyebrow, columnsgrid, icon, button
# Section type: features
# Layout: grid
# Visual style: y2k_retro_futurism
# Perfect for: tech startup, digital agency, gaming platform, music streaming, social media app, NFT marketplace, fashion brand, creative studio

- name: site
  properties:
    theme:
      fonts:
        heading: &font-heading "'Sora', sans-serif"
        content: &font-content "'Inter', sans-serif"
      colors:
        primary: &color-primary "#1A1A2E"
        text: &color-text "#3A3A50"
        secondary: &color-secondary "#C0C0C0"
        accent: &color-accent "#7B68EE"
        background: &color-background "#E8E8FF"
  components:
    - name: page
      slug: home
      title: "Y2K Retro-Futurism Features"
      properties:
        appearance:
          background:
            color: *color-background
            opacity: 100
      components:

        # Features section
        - name: layout-column
          properties:
            layout:
              horizontalAlign: center
              gap: xl
            appearance:
              background:
                color: *color-background
                opacity: 100
            spacing:
              paddingBlock: xxxl
              paddingInline: lg
          components:

            # Section header with pill badge
            - name: layout-row
              properties:
                layout:
                  horizontalAlign: center
              components:
                - name: badge
                  properties:
                    text: "Features"
                    variant: primary
                    pill: true
                    layout: { widthMode: fit }

            - name: heading
              properties:
                text: "Everything You Need to Level Up"
                level: 2
                layout:
                  widthMode: "66"
                typography:
                  color: *color-primary
                  size: xxl
                  weight: bold
                  align: center
                  lineHeight: snug

            - name: paragraph
              properties:
                text: "A complete toolkit designed for the next generation of digital creators and innovators."
                layout:
                  widthMode: "50"
                typography:
                  color: *color-text
                  size: md
                  align: center
                  lineHeight: relaxed

            # Feature cards grid — xl radius, soft shadow
            - name: columnsgrid
              properties:
                layout: { columns: 3, gap: lg }
                responsive: { breakpoints: { md: 2, sm: 1 } }
              columns:

                # Card 1
                - components:
                    - name: layout-column
                      properties:
                        layout:
                          horizontalAlign: center
                          gap: sm
                        appearance:
                          background:
                            color: "#ffffff"
                            opacity: 80
                          radius: xl
                          shadow: soft
                          border:
                            width: 1
                            style: solid
                            color: "#d0d0ff"
                        spacing:
                          paddingBlock: xl
                          paddingInline: lg
                      components:
                        - name: layout-row
                          properties:
                            layout:
                              horizontalAlign: center
                          components:
                            - name: layout-column
                              properties:
                                layout:
                                  widthMode: fit
                                  horizontalAlign: center
                                  verticalAlign: center
                                appearance:
                                  background:
                                    color: *color-accent
                                    opacity: 15
                                  radius: xl
                                spacing:
                                  paddingBlock: sm
                                  paddingInline: sm
                              components:
                                - name: icon
                                  properties:
                                    name: palette
                                    size: lg
                                    color: *color-accent
                        - name: heading
                          properties:
