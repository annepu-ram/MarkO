# Claymorphism Hero
# Playful 3D clay-like design with soft pastels, extreme rounding, and layered shadows
# Base components: site, page, layout-row, layout-column, heading, paragraph, button
# Section type: hero
# Layout: stacked
# Visual style: claymorphism
# Perfect for: SaaS platform, creative portfolio, fashion brand, design studio, tech startup, luxury brand, photography studio, music platform


- name: site
  properties:
    theme:
      fonts:
        heading: &font-heading "'Poppins', sans-serif"
        content: &font-content "'Nunito Sans', sans-serif"
      colors:
        primary: &color-primary "#4A1942"
        text: &color-text "#4E3149"
        secondary: &color-secondary "#9D5094"
        accent: &color-accent "#FF1493"
        background: &color-background "#FFD6E6"
  components:
    - name: page
      slug: home
      title: "Claymorphism Hero"
      properties:
        appearance:
          background:
            color: *color-background
            transparency: 100
      components:

        # Hero section — bubbly, rounded, pastel
        - name: layout-column
          properties:
            layout:
              horizontalAlign: center
              gap: lg
            appearance:
            spacing:
              paddingBlock: xxl
              paddingInline: lg
          components:

            # Clay pill badge
            - name: layout-row
              properties:
                layout:
                  horizontalAlign: center
              components:
                - name: layout-column
                  properties:
                    layout:
                      horizontalAlign: center
                    appearance:
                      background:
                        color: '#ffffff'
                        transparency: 100
                      radius: pill
                      shadow: medium
                      border:
                        width: 0
                    spacing:
                      paddingBlock: xs
                      paddingInline: lg
                  components:
                    - name: paragraph
                      properties:
                        text: "New & Exciting"
                        typography:
                          color: *color-accent
                          size: sm
                          weight: bold

            # Main heading
            - name: heading
              properties:
                text: "Learning feels like play"
                level: 1
                layout:
                  widthMode: "75"
                typography:
                  color: *color-primary
                  size: xxxl
                  weight: bold
                  align: center
                  lineHeight: snug

            # Subheading
            - name: paragraph
              properties:
                text: |
                  Interactive lessons, colorful adventures, and rewards that make
                  every child excited to learn something new every day.
                layout:
                  widthMode: "50"
                typography:
                  color: *color-secondary
                  size: lg
                  align: center
                  lineHeight: relaxed
                  weight: medium

            # Clay feature cards — xxl radius, elevated shadow, no borders
            - name: layout-row
              properties:
                layout:
                  horizontalAlign: center
                  verticalAlign: start
                  wrap: wrap
                  gap: lg
                appearance:
                spacing:
                  paddingBlock: lg
              components:
                - name: layout-column
                  properties:
                    layout:
                      widthMode: "33"
                      horizontalAlign: center
                      gap: sm
                    appearance:
                      background:
                        color: '#FFF0F5'
                        transparency: 100
                      radius: xxl
                      shadow: elevated
                      border:
                        width: 0
                    spacing:
                      paddingBlock: lg
                      paddingInline: md
                  components:
                    - name: paragraph
                      properties:
                        text: "500+"
                        typography:
                          color: *color-accent
                          size: xl
                          weight: bold
                          align: center
                    - name: heading
                      properties:
                        text: "Fun Lessons"
                        level: 3
                        typography:
                          color: *color-primary
                          size: md
                          weight: bold
                          align: center
                    - name: paragraph
                      properties:
                        text: "Interactive stories and games that teach real skills"
                        typography:
                          color: *color-secondary
                          size: sm
                          align: center

                - name: layout-column
                  properties:
                    layout:
                      widthMode: "33"
                      horizontalAlign: center
                      gap: sm
                    appearance:
                      background:
                        color: '#F0F5FF'
                        transparency: 100
                      radius: xxl
                      shadow: elevated
                      border:
                        width: 0
                    spacing:
                      paddingBlock: lg
                      paddingInline: md
                  components:
                    - name: paragraph
                      properties:
                        text: "50K+"
                        typography:
                          color: '#7C3AED'
                          size: xl
                          weight: bold
                          align: center
                    - name: heading
                      properties:
                        text: "Happy Kids"
                        level: 3
                        typography:
                          color: *color-primary
                          size: md
                          weight: bold
                          align: center
                    - name: paragraph
                      properties:
                        text: "Children from around the world love learning with us"
                        typography:
                          color: *color-secondary
                          size: sm
                          align: center

                - name: layout-column
                  properties:
                    layout:
                      widthMode: "33"
                      horizontalAlign: center
                      gap: sm
                    appearance:
                      background:
                        color: '#F0FFF4'
                        transparency: 100
                      radius: xxl
                      shadow: elevated
                      border:
                        width: 0
                    spacing:
                      paddingBlock: lg
                      paddingInline: md
                  components:
                    - name: paragraph
                      properties:
                        text: "100%"
                        typography:
                          color: '#059669'
                          size: xl
                          weight: bold
                          align: center
                    - name: heading
                      properties:
                        text: "Safe & Fun"
                        level: 3
                        typography:
                          color: *color-primary
                          size: md
                          weight: bold
                          align: center
                    - name: paragraph
                      properties:
                        text: "Ad-free, parent-approved content designed by educators"
                        typography:
                          color: *color-secondary
                          size: sm
                          align: center

            # CTA buttons — clay style (pill, medium shadow)
            - name: layout-row
              properties:
                layout:
                  horizontalAlign: center
                  verticalAlign: center
                  wrap: wrap
                  gap: md
              components:
                - name: button
                  properties:
                    text: "Try It Free"
                    appearance:
                      background:
                        color: *color-accent
                        transparency: 100
                      border:
                        width: 0
                      radius: pill
                      shadow: medium
                    spacing:
                      paddingBlock: md
                      paddingInline: xl
                      paddingBlock: md
                      paddingInline: xl
                    typography:
                      color: '#ffffff'
                      weight: bold
                      size: md
                - name: button
                  properties:
                    text: "See How It Works"
                    appearance:
                      background:
                        color: '#ffffff'
                        transparency: 100
                      border:
                        width: 0
                      radius: pill
                      shadow: medium
                    typography:
                      color: *color-primary
                      weight: bold
                      size: md
