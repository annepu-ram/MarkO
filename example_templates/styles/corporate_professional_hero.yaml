# Corporate Professional Hero
# Structured split-screen hero with clean blue tones and semibold typography
# Base components: site, page, layout-row, layout-column, eyebrow, heading, paragraph, button, image
# Section type: hero
# Layout: split_screen
# Visual style: corporate_professional
# Perfect for: SaaS, consulting, finance, enterprise, B2B, legal, insurance, accounting

- name: site
  properties:
    theme:
      fonts:
        heading: &font-heading "'Inter', sans-serif"
        content: &font-content "'Inter', sans-serif"
      colors:
        primary: &color-primary "#1E3A5F"
        text: &color-text "#4B5563"
        secondary: &color-secondary "#E2E8F0"
        accent: &color-accent "#2563EB"
        background: &color-background "#F8FAFC"
        border: &color-border '#e5e7eb'
  components:
    - name: page
      slug: home
      title: "Corporate Professional Hero"
      properties:
        appearance:
          background:
            color: *color-background
            opacity: 100
      components:

        # Hero section — clean structured split
        - name: layout-row
          properties:
            layout:
              wrap: nowrap
              verticalAlign: center
              horizontalAlign: center
              tag: section
              gap: xl
            spacing:
              paddingBlock: xxxl
              paddingInline: xl
            appearance:
              background:
                color: *color-background
                opacity: 100
              border:
                width: 0
              radius: none
              shadow: none
          components:

            # Left column — text content
            - name: layout-column
              properties:
                layout:
                  widthMode: "50"
                  gap: md
                spacing:
                  paddingInline: lg
              components:

                # Badge-style eyebrow
                - name: eyebrow
                  properties:
                    text: "Trusted by 500+ Companies"
                    typography:
                      color: *color-accent
                      size: xs
                      weight: semibold
                      letterSpacing: wider
                      transform: uppercase

                - name: heading
                  properties:
                    text: "Streamline your business operations with confidence"
                    level: 1
                    typography:
                      color: *color-primary
                      size: xxl
                      weight: semibold
                      lineHeight: snug

                - name: paragraph
                  properties:
                    text: |
                      Our enterprise platform helps teams collaborate efficiently,
                      reduce overhead costs, and make data-driven decisions that
                      drive measurable growth across every department.
                    typography:
                      color: *color-text
                      size: md
                      weight: regular
                      lineHeight: relaxed

                # CTA buttons
                - name: layout-row
                  properties:
                    layout:
                      horizontalAlign: left
                      verticalAlign: center
                      wrap: wrap
                      gap: md
                    spacing:
                      marginBlock: md
                  components:
                    - name: button
                      properties:
                        text: "Get Started"
                        appearance:
                          background:
                            color: *color-accent
                            opacity: 100
                          border:
                            width: 0
                          radius: sm
                          shadow: none
                        typography:
                          color: "#ffffff"
                          weight: semibold
                          size: md
                        spacing:
                          paddingBlock: md
                          paddingInline: xl
                    - name: button
                      properties:
                        text: "Book a Demo"
                        appearance:
                          background:
                            color: transparent
                            opacity: 0
                          border:
                            width: 1
                            style: solid
                            color: "#e5e7eb"
                          radius: sm
                          shadow: none
                        typography:
                          color: *color-primary
                          weight: medium
                          size: md
                        spacing:
                          paddingBlock: md
                          paddingInline: xl

            # Right column — product image
            - name: layout-column
              properties:
                layout:
                  widthMode: "50"
                  horizontalAlign: center
              components:
                - name: layout-column
                  properties:
                    appearance:
                      background:
                        color: "#ffffff"
                        opacity: 100
                      border:
                        width: 1
                        style: solid
                        color: "#e5e7eb"
                      radius: sm
                      shadow: soft
                    spacing:
                      paddingBlock: sm
                      paddingInline: sm
                  components:
                    - name: image
                      properties:
                        source:
                          url: https://images.pexels.com/photos/3184292/pexels-photo-3184292.jpeg?auto=compress&cs=tinysrgb&w=800
                          altText: Professional team collaborating in modern office
                        appearance:
                          minHeight: 25
                          fit: cover
                          radius: sm
