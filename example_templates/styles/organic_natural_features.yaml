# Organic Natural Features
# Warm earthy feature cards with natural rounded shapes and botanical imagery
# Base components: site, page, layout-column, columnsgrid, icon, heading, paragraph, eyebrow
# Section type: features
# Layout: grid
# Visual style: organic_natural
# Perfect for: Wellness brand, organic food, sustainable fashion, eco-friendly products, farm-to-table

- name: site
  properties:
    theme:
      fonts:
        heading: &font-heading "'Lora', serif"
        content: &font-content "'Inter', sans-serif"
      colors:
        primary: &color-primary "#2D3B2D"
        text: &color-text "#4A5D4A"
        secondary: &color-secondary "#D4E5D1"
        accent: &color-accent "#5B8C5A"
        background: &color-background "#F5F0EB"
  components:
    - name: page
      slug: home
      title: "Organic Natural Features"
      properties:
        appearance:
          background:
            color: *color-background
            opacity: 100
      components:

        # Features section — warm organic cards
        - name: layout-column
          properties:
            layout:
              horizontalAlign: center
              gap: lg
            spacing:
              paddingBlock: xxxl
              paddingInline: lg
          components:

            # Section header
            - name: eyebrow
              properties:
                text: "Our Approach"
                typography:
                  size: xs
                  weight: semibold
                  color: *color-accent
                  transform: uppercase
                  letterSpacing: wider
                  align: center

            - name: heading
              properties:
                text: "Rooted in nature, crafted with care"
                level: 2
                typography:
                  size: xxl
                  weight: semibold
                  color: *color-primary
                  align: center
                  lineHeight: snug

            - name: paragraph
              properties:
                text: "We believe the best things come from working with the earth, not against it. Simple ingredients, honest processes."
                typography:
                  size: lg
                  color: *color-text
                  align: center
                  lineHeight: relaxed
                layout:
                  widthMode: "66"

            # Feature grid — 3 organic cards
            - name: columnsgrid
              properties:
                layout:
                  columns: 3
                  gap: md
                responsive:
                  breakpoints:
                    md: 2
                    sm: 1
                spacing:
                  paddingBlock: lg
              columns:

                # Card 1 — Sustainably Sourced
                - components:
                    - name: layout-column
                      properties:
                        layout:
                          horizontalAlign: center
                          gap: sm
                        appearance:
                          background:
                            color: "#ffffff"
                            opacity: 100
                          radius: lg
                          shadow: soft
                          border:
                            width: 1
                            style: solid
                            color: *color-secondary
                        spacing:
                          paddingBlock: xl
                          paddingInline: lg
                      components:
                        - name: icon
                          properties:
                            name: leaf
                            appearance:
                              color: *color-accent
                              size: xl
                        - name: heading
                          properties:
                            text: "Sustainably Sourced"
                            level: 3
                            typography:
                              size: lg
                              weight: semibold
                              color: *color-primary
                              align: center
                        - name: paragraph
                          properties:
                            text: "Every ingredient traced back to its origin. We partner directly with small farms that practice regenerative agriculture."
                            typography:
                              size: sm
                              color: *color-text
                              align: center
                              lineHeight: relaxed

                # Card 2 — Handmade Process
                - components:
                    - name: layout-column
                      properties:
                        layout:
                          horizontalAlign: center
                          gap: sm
                        appearance:
                          background:
                            color: "#ffffff"
                            opacity: 100
                          radius: lg
                          shadow: soft
                          border:
                            width: 1
                            style: solid
                            color: *color-secondary
                        spacing:
                          paddingBlock: xl
                          paddingInline: lg
                      components:
                        - name: icon
                          properties:
                            name: hand-heart
                            appearance:
                              color: *color-accent
                              size: xl
                        - name: heading
                          properties:
                            text: "Handmade with Love"
                            level: 3
                            typography:
                              size: lg
                              weight: semibold
                              color: *color-primary
                              align: center
                        - name: paragraph
                          properties:
                            text: "Small-batch production ensures quality in every jar. Our artisans follow time-tested methods passed down through generations."
                            typography:
                              size: sm
                              color: *color-text
                              align: center
                              lineHeight: relaxed

                # Card 3 — Zero Waste
                - components:
                    - name: layout-column
                      properties:
                        layout:
                          horizontalAlign: center
                          gap: sm
                        appearance:
                          background:
                            color: "#ffffff"
                            opacity: 100
                          radius: lg
                          shadow: soft
                          border:
                            width: 1
                            style: solid
                            color: *color-secondary
                        spacing:
                          paddingBlock: xl
                          paddingInline: lg
                      components:
                        - name: icon
                          properties:
                            name: recycle
                            appearance:
                              color: *color-accent
                              size: xl
                        - name: heading
                          properties:
                            text: "Zero Waste Packaging"
                            level: 3
                            typography:
                              size: lg
                              weight: semibold
                              color: *color-primary
                              align: center
                        - name: paragraph
                          properties:
                            text: "Compostable containers, recycled labels, and carbon-neutral shipping. We leave nothing behind but good things."
                            typography:
                              size: sm
                              color: *color-text
                              align: center
                              lineHeight: relaxed

            # Bottom highlight row
            - name: layout-row
              properties:
                layout:
                  horizontalAlign: center
                  verticalAlign: center
                  wrap: wrap
                  gap: lg
                spacing:
                  paddingBlock: lg
              components:
                - name: layout-column
                  properties:
                    layout:
                      widthMode: "25"
                      horizontalAlign: center
                      gap: xs
                  components:
                    - name: heading
                      properties:
                        text: "100%"
                        level: 3
                        typography:
                          size: xl
                          weight: bold
                          color: *color-accent
                          align: center
                    - name: paragraph
                      properties:
                        text: "Organic Certified"
                        typography:
                          size: sm
                          color: *color-text
                          align: center
                - name: layout-column
                  properties:
                    layout:
                      widthMode: "25"
                      horizontalAlign: center
                      gap: xs
                  components:
                    - name: heading
                      properties:
                        text: "50+"
                        level: 3
                        typography:
                          size: xl
                          weight: bold
                          color: *color-accent
                          align: center
                    - name: paragraph
                      properties:
                        text: "Partner Farms"
                        typography:
                          size: sm
                          color: *color-text
                          align: center
                - name: layout-column
                  properties:
                    layout:
                      widthMode: "25"
                      horizontalAlign: center
                      gap: xs
                  components:
                    - name: heading
                      properties:
                        text: "0"
                        level: 3
                        typography:
                          size: xl
                          weight: bold
                          color: *color-accent
                          align: center
                    - name: paragraph
                      properties:
                        text: "Synthetic Additives"
                        typography:
                          size: sm
                          color: *color-text
                          align: center
