# Neubrutalism Pricing Plans
# Raw bold pricing tiers with thick borders and retro shadows
# Base components: site, page, layout-column, columnsgrid, heading, paragraph, eyebrow, button
# Section type: pricing
# Layout: grid
# Visual style: neubrutalism
# Perfect for: creative agency, portfolio, indie brand, art gallery, design studio, startup

- name: site
  properties:
    theme:
      fonts:
        heading: &font-heading "'Space Grotesk', sans-serif"
        content: &font-content "'IBM Plex Sans', sans-serif"
      colors:
        primary: &color-primary "#1A1A1A"
        text: &color-text "#3D3D3D"
        secondary: &color-secondary "#C8C4BB"
        accent: &color-accent "#FF4D00"
        background: &color-background "#E5E2DD"
  components:
    - name: page
      slug: home
      title: "Neubrutalism Pricing Plans"
      properties:
        appearance:
          background:
            color: *color-background
            opacity: 100
      components:

        # Pricing section — brutally bold
        - name: layout-column
          properties:
            layout:
              horizontalAlign: center
              gap: lg
            spacing:
              paddingBlock: xxxl
              paddingInline: md
          components:

            # Section header
            - name: eyebrow
              properties:
                text: PRICING
                typography:
                  size: xs
                  weight: bold
                  color: *color-accent
                  transform: uppercase
                  letterSpacing: wider
                  align: center

            - name: heading
              properties:
                text: "PAY UP. LEVEL UP."
                level: 2
                typography:
                  size: xxl
                  weight: extrabold
                  color: *color-primary
                  align: center
                  lineHeight: snug
                  transform: uppercase
                spacing:
                  marginBlock: sm

            - name: paragraph
              properties:
                text: "No tricks, no fine print. Pick a plan and start building something that slaps."
                typography:
                  size: lg
                  color: *color-text
                  align: center
                  lineHeight: relaxed
                layout:
                  widthMode: "66"
                spacing:
                  marginBlock: md

            # Pricing cards grid — 3 columns
            - name: columnsgrid
              properties:
                layout:
                  columns: 3
                  gap: lg
                responsive:
                  breakpoints:
                    md: 2
                    sm: 1
                spacing:
                  paddingBlock: lg
              columns:

                # Starter tier — white background
                - components:
                    - name: layout-column
                      properties:
                        layout:
                          horizontalAlign: center
                          gap: sm
                        appearance:
                          background:
                            color: "#ffffff"
                            opacity: 100
                          radius: none
                          shadow: retro
                          shadowColor: "#000000"
                          border:
                            width: 4
                            style: solid
                            color: "#000000"
                        spacing:
                          paddingBlock: md
                          paddingInline: md
                      components:
                        - name: eyebrow
                          properties:
                            text: STARTER
                            typography:
                              size: xs
                              weight: extrabold
                              color: *color-text
                              transform: uppercase
                              letterSpacing: wider
                              align: center

                        - name: heading
                          properties:
                            text: "$12"
                            level: 2
                            typography:
                              size: xxxl
                              weight: extrabold
                              color: *color-primary
                              align: center
                            spacing:
                              marginBlock: none

                        - name: paragraph
                          properties:
                            text: "/month"
                            typography:
                              size: sm
                              color: *color-text
                              align: center
                            spacing:
                              marginBlock: xs

                        - name: paragraph
                          properties:
                            text: For solo creators who want the basics without the bloat.
                            typography:
                              size: sm
                              color: *color-text
                              align: center
                              lineHeight: relaxed
                            spacing:
                              marginBlock: sm

                        - name: layout-column
                          properties:
                            layout:
                              horizontalAlign: left
                              gap: xs
                            appearance:
                              background:
                                opacity: 0
                          components:
                            - name: paragraph
                              properties:
                                text: "// 3 active projects"
                                typography:
                                  size: sm
                                  color: *color-text
                                  weight: medium
                                spacing:
                                  marginBlock: xxs
                            - name: paragraph
                              properties:
                                text: "// 5 GB storage"
                                typography:
                                  size: sm
                                  color: *color-text
                                  weight: medium
                                spacing:
                                  marginBlock: xxs
                            - name: paragraph
                              properties:
                                text: "// Community support"
                                typography:
                                  size: sm
                                  color: *color-text
                                  weight: medium
                                spacing:
                                  marginBlock: xxs
                            - name: paragraph
                              properties:
                                text: "// Basic templates"
                                typography:
                                  size: sm
                                  color: *color-text
                                  weight: medium
                                spacing:
                                  marginBlock: xxs
                            - name: paragraph
                              properties:
                                text: "// Standard export"
                                typography:
                                  size: sm
                                  color: *color-text
                                  weight: medium
                                spacing:
                                  marginBlock: xxs

                        - name: button
                          properties:
                            text: "GET STARTED"
                            appearance:
                              background:
                                color: *color-secondary
                                opacity: 100
                              border:
                                width: 4
                                style: solid
                                color: "#000000"
                              radius: none
                              shadow: retro
