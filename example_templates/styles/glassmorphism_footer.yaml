# Glassmorphism Footer
# Frosted glass footer with translucent containers on gradient background
# Base components: site, page, layout-column, layout-row, columnsgrid, heading, paragraph, link
# Section type: footer
# Layout: split_screen
# Visual style: glassmorphism
# Perfect for: SaaS platform, fintech, tech startup, software, portfolio, luxury brand

- name: site
  properties:
    theme:
      fonts:
        heading: &font-heading "'Inter', sans-serif"
        content: &font-content "'Inter', sans-serif"
      colors:
        primary: &color-primary "#1A365D"
        text: &color-text "#334E68"
        secondary: &color-secondary "#B0D4E8"
        accent: &color-accent "#3182CE"
        background: &color-background "#D6EBF5"
  components:
    - name: page
      slug: home
      title: "Glassmorphism Footer"
      properties:
        appearance:
          background:
            color: *color-background
            opacity: 100
      components:

        # Gradient background — mandatory for glassmorphism blur visibility
        - name: layout-column
          properties:
            layout:
              horizontalAlign: center
            appearance:
              background:
                type: gradient
                gradient:
                  colorStart: "#0f172a"
                  colorEnd: "#1e293b"
                  direction: to bottom right
                opacity: 100
            spacing:
              paddingBlock: none
              paddingInline: none
          components:

            # Footer content wrapper
            - name: layout-column
              properties:
                layout:
                  horizontalAlign: center
                  gap: xl
                spacing:
                  paddingBlock: xxxl
                  paddingInline: lg
              components:

                # Main footer — brand column + 3-column links grid
                - name: layout-row
                  properties:
                    layout:
                      horizontalAlign: space-between
                      verticalAlign: start
                      gap: xl
                      wrap: wrap
                  components:

                    # Brand column
                    - name: layout-column
                      properties:
                        layout:
                          horizontalAlign: left
                          gap: sm
                          widthMode: "33"
                        appearance:
                          background:
                            color: "#ffffff"
                            opacity: 12
                          blur: true
                          border:
                            width: 1
                            style: solid
                            color: "#ffffff"
                          radius: lg
                          shadow: soft
                          shadowColor: "rgba(0,0,0,0.1)"
                        spacing:
                          paddingBlock: lg
                          paddingInline: lg
                      components:
                        - name: heading
                          properties:
                            text: "Prism"
                            level: 3
                            typography:
                              size: xl
                              weight: bold
                              color: "#ffffff"
                        - name: paragraph
                          properties:
                            text: "Building transparent tools for modern teams. See through complexity to what truly matters."
                            typography:
                              size: sm
                              color: rgba(255,255,255,0.7)
                              lineHeight: relaxed
                        - name: br
                          properties:
                            size: xs
                        - name: paragraph
                          properties:
                            text: "Empowering startups, agencies, and enterprises with elegant, performant solutions since 2021."
                            typography:
                              size: sm
                              color: rgba(255,255,255,0.6)
                              lineHeight: relaxed
                        - name: br
                          properties:
                            size: sm
                        - name: layout-row
                          properties:
                            layout:
                              horizontalAlign: left
                              verticalAlign: center
                              gap: sm
                              wrap: nowrap
                            appearance:
                              background:
                                opacity: 0
                          components:
                            - name: link
                              properties:
                                text: "Twitter"
                                href: "https://twitter.com"
                                typography:
                                  size: sm
                                  weight: medium
                                  color: *color-accent
                                appearance:
                                  underline: false
                            - name: link
                              properties:
                                text: "GitHub"
                                href: "https://github.com"
                                typography:
                                  size: sm
                                  weight: medium
                                  color: *color-accent
                                appearance:
                                  underline: false
                            - name: link
                              properties:
                                text: "LinkedIn"
                                href: "https://linkedin.com"
                                typography:
                                  size: sm
                                  weight: medium
                                  color: *color-accent
                                appearance:
                                  underline: false

                    # Links grid — 3 columns inside a glass container
                    - name: layout-column
                      properties:
                        layout:
                          horizontalAlign: left
                          widthMode: "66"
                        appearance:
                          background:
                            color: "#ffffff"
                            opacity: 12
                          blur: true
                          border:
                            width: 1
                            style: solid
                            color: "#ffffff"
                          radius: lg
                          shadow: soft
                          shadowColor: "rgba(0,0,0,0.1)"
                        spacing:
                          paddingBlock: lg
                          paddingInline: lg
                      components:
                        - name: columnsgrid
                          properties:
                            layout:
                              columns: 3
                              gap: lg
                            responsive:
                              breakpoints:
                                md: 2
                                sm: 1
                          columns:

                            # Product links
                            - components:
                                - name: layout-column
                                  properties:
                                    layout:
                                      horizontalAlign: left
                                      gap: xs
                                    appearance:
                                      background:
                                        opacity: 0
                                  components:
                                    - name: heading
                                      properties:
                                        text: "Product"
                                        level: 4
                                        typography:
                                          size: sm
                                          weight: bold
                                          color: "#ffffff"
                                        spacing:
                                          marginBlock: xs
                                    - name: link
                                      properties:
                                        text: "Features"
                                        href: "#features"
                                        typography:
                                          size: sm
                                          color: rgba(255,255,255,0.6)
                                        appearance:
                                          underline: false
                                    - name: link
                                      properties:
                                        text: "Pricing"
                                        href: "#pricing"
                                        typography:
                                          size: sm
                                          color: rgba(255,255,255,0.6)
                                        appearance:
                                          underline: false
                                    - name: link
                                      properties:
                                        text: "Integrations"
                                        href: "#integrations"
                                        typography:
                                          size: sm
                                          color: rgba(255,255,255,0.6)
                                        appearance:
                                          underline: false
                                    - name: link
                                      properties:
                                        text: "Changelog"
                                        href: "#changelog"
                                        typography:
                                          size: sm
                                          color: rgba(255,255,255,0.6)
                                        appearance:
                                          underline: false
                                    - name: link
                                      properties:
                                        text: "Roadmap"
                                        href: "#roadmap"
                                        typography:
                                          size: sm
                                          color: rgba(255,255,255,0.6)
                                        appearance:
                                          underline: false

                            # Resources links
                            - components:
                                - name: layout-column
                                  properties:
                                    layout:
                                      horizontalAlign: left
                                      gap: xs
                                    appearance:
                                      background:
                                        opacity: 0
                                  components:
                                    - name: heading
                                      properties:
                                        text: "Resources"
                                        level: 4
                                        typography:
                                          size: sm
                                          weight: bold
                                          color: "#ffffff"
                                        spacing:
                                          marginBlock: xs
                                    - name: link
                                      properties:
                                        text: "Documentation"
                                        href: "#docs"
                                        typography:
                                          size: sm
                                          color: rgba(255,255,255,0.6)
                                        appearance:
                                          underline: false
                                    - name: link
                                      properties:
                                        text: "API Reference"
                                        href: "#api"
                                        typography:
                                          size: sm
                                          color: rgba(255,255,255,0.6)
                                        appearance:
                                          underline: false
                                    - name: link
                                      properties:
                                        text: "Blog"
                                        href: "#blog"
                                        typography:
                                          size: sm
                                          color: rgba(255,255,255,0.6)
                                        appearance:
                                          underline: false
                                    - name: link
                                      properties:
                                        text: "Tutorials"
                                        href: "#tutorials"
                                        typography:
                                          size: sm
                                          color: rgba(255,255,255,0.6)
                                        appearance:
                                          underline: false
                                    - name: link
                                      properties:
                                        text: "Community"
                                        href: "#community"
                                        typography:
                                          size: sm
                                          color: rgba(255,255,255,0.6)
                                        appearance:
                                          underline: false

                            # Company links
                            - components:
                                - name: layout-column
                                  properties:
                                    layout:
                                      horizontalAlign: left
                                      gap: xs
                                    appearance:
                                      background:
                                        opacity: 0
                                  components:
                                    - name: heading
                                      properties:
                                        text: "Company"
                                        level: 4
                                        typography:
                                          size: sm
                                          weight: bold
                                          color: "#ffffff"
                                        spacing:
                                          marginBlock: xs
                                    - name: link
                                      properties:
                                        text: "About Us"
                                        href: "#about"
                                        typography:
                                          size: sm
                                          color: rgba(255,255,255,0.6)
                                        appearance:
                                          underline: false
                                    - name: link
                                      properties:
                                        text: "Careers"
                                        href: "#careers"
                                        typography:
                                          size: sm
                                          color: rgba(255,255,255,0.6)
                                        appearance:
                                          underline: false
                                    - name: link
                                      properties:
                                        text: "Contact"
                                        href: "#contact"
                                        typography:
                                          size: sm
                                          color: rgba(255,255,255,0.6)
                                        appearance:
                                          underline: false
                                    - name: link
                                      properties:
                                        text: "Press Kit"
                                        href: "#press"
                                        typography:
                                          size: sm
                                          color: rgba(255,255,255,0.6)
                                        appearance:
                                          underline: false
                                    - name: link
                                      properties:
                                        text: "Partners"
                                        href: "#partners"
                                        typography:
                                          size: sm
                                          color: rgba(255,255,255,0.6)
                                        appearance:
                                          underline: false

                # Divider
                - name: br
                  properties:
                    size: xs

                # Bottom bar — copyright row
                - name: layout-row
                  properties:
                    layout:
                      horizontalAlign: space-between
                      verticalAlign: center
                      wrap: wrap
                    appearance:
                      background:
                        color: "#ffffff"
                        opacity: 8
                      blur: true
                      border:
                        width: 1
                        style: solid
                        color: rgba(255,255,255,0.1)
                      radius: lg
                    spacing:
                      paddingBlock: sm
                      paddingInline: lg
                  components:
                    - name: paragraph
                      properties:
                        text: "© 2026 Prism Inc. All rights reserved."
                        typography:
                          size: xs
                          color: rgba(255,255,255,0.5)
                    - name: layout-row
                      properties:
                        layout:
                          horizontalAlign: right
                          gap: md
                          wrap: nowrap
                        appearance:
                          background:
                            opacity: 0
                      components:
                        - name: link
                          properties:
                            text: "Privacy Policy"
                            href: "#privacy"
                            typography:
                              size: xs
                              color: rgba(255,255,255,0.5)
                            appearance:
                              underline: false
                        - name: link
                          properties:
                            text: "Terms of Service"
                            href: "#terms"
                            typography:
                              size: xs
                              color: rgba(255,255,255,0.5)
                            appearance:
                              underline: false
                        - name: link
                          properties:
                            text: "Cookie Policy"
                            href: "#cookies"
                            typography:
                              size: xs
                              color: rgba(255,255,255,0.5)
                            appearance:
                              underline: false
