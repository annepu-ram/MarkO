# Tropical Vibrant Features
# Bright feature grid with rounded cards, warm accents, and soft shadows
# Base components: site, page, layout-column, columnsgrid, icon, heading, paragraph, eyebrow
# Section type: features
# Layout: grid
# Visual style: tropical_vibrant
# Perfect for: Travel agency, resort, beach club, surf shop, tropical restaurant, island retreat, outdoor adventure, vacation rental

- name: site
  properties:
    theme:
      fonts:
        heading: &font-heading "'Poppins', sans-serif"
        content: &font-content "'Nunito Sans', sans-serif"
      colors:
        primary: &color-primary "#1C1917"
        text: &color-text "#3D3830"
        secondary: &color-secondary "#FDBA74"
        accent: &color-accent "#F97316"
        background: &color-background "#FFF7ED"
  components:
    - name: page
      slug: home
      title: "Tropical Vibrant Features"
      properties:
        appearance:
          background:
            color: *color-background
            opacity: 100
      components:

        # Features section — warm grid with bright accents
        - name: layout-column
          properties:
            layout:
              horizontalAlign: center
              gap: lg
            spacing:
              paddingBlock: xxxl
              paddingInline: lg
          components:

            # Section eyebrow
            - name: eyebrow
              properties:
                text: "Why Choose Us"
                typography:
                  size: xs
                  weight: bold
                  color: *color-accent
                  transform: uppercase
                  letterSpacing: wider
                  align: center

            # Section heading
            - name: heading
              properties:
                text: "Everything you need for the perfect getaway"
                level: 2
                layout:
                  widthMode: "75"
                typography:
                  size: xxl
                  weight: bold
                  color: *color-primary
                  align: center
                  lineHeight: snug
                  letterSpacing: tight

            # Section description
            - name: paragraph
              properties:
                text: "From booking to boarding, we handle every detail so you can focus on making memories that last a lifetime."
                layout:
                  widthMode: "66"
                typography:
                  size: lg
                  color: *color-text
                  align: center
                  lineHeight: relaxed

            # Feature grid — 3 columns with rounded cards
            - name: columnsgrid
              properties:
                layout:
                  columns: 3
                  gap: lg
                responsive:
                  breakpoints:
                    md: 2
                    sm: 1
                spacing:
                  paddingBlock: lg
              columns:

                # Card 1
                - components:
                    - name: layout-column
                      properties:
                        layout:
                          horizontalAlign: center
                          gap: sm
                        appearance:
                          background:
                            color: '#ffffff'
                            opacity: 100
                          radius: lg
                          shadow: soft
                          border:
                            width: 0
                        spacing:
                          paddingBlock: xl
                          paddingInline: lg
                      components:
                        - name: icon
                          properties:
                            name: map-pin
                            appearance:
                              color: *color-accent
                              size: lg
                        - name: heading
                          properties:
                            text: "Curated Destinations"
                            level: 3
                            typography:
                              size: lg
                              weight: bold
                              color: *color-primary
                              align: center
                        - name: paragraph
                          properties:
                            text: "Every location in our collection is personally vetted by our travel team. We visit each destination to ensure it meets our standards for beauty, safety, and authentic local charm."
                            typography:
                              size: sm
                              color: *color-text
                              align: center
                              lineHeight: relaxed

                # Card 2
                - components:
                    - name: layout-column
                      properties:
                        layout:
                          horizontalAlign: center
                          gap: sm
                        appearance:
                          background:
                            color: '#ffffff'
                            opacity: 100
                          radius: lg
                          shadow: soft
                          border:
                            width: 0
                        spacing:
                          paddingBlock: xl
                          paddingInline: lg
                      components:
                        - name: icon
                          properties:
                            name: shield-check
                            appearance:
                              color: *color-accent
                              size: lg
                        - name: heading
                          properties:
                            text: "Flexible Booking"
                            level: 3
                            typography:
                              size: lg
                              weight: bold
                              color: *color-primary
                              align: center
                        - name: paragraph
                          properties:
                            text: "Plans change, and we get it. Free cancellation up to 48 hours before arrival, easy date swaps, and no hidden fees. Your peace of mind is part of the package."
                            typography:
                              size: sm
                              color: *color-text
                              align: center
                              lineHeight: relaxed

                # Card 3
                - components:
                    - name: layout-column
                      properties:
                        layout:
                          horizontalAlign: center
                          gap: sm
                        appearance:
                          background:
                            color: '#ffffff'
                            opacity: 100
                          radius: lg
                          shadow: soft
                          border:
                            width: 0
                        spacing:
                          paddingBlock: xl
                          paddingInline: lg
                      components:
                        - name: icon
                          properties:
                            name: compass
                            appearance:
                              color: *color-accent
                              size: lg
                        - name: heading
                          properties:
                            text: "Local Guides"
                            level: 3
                            typography:
                              size: lg
                              weight: bold
                              color: *color-primary
                              align: center
                        - name: paragraph
                          properties:
                            text: "Skip the tourist traps. Our network of island-born guides takes you to the secret spots, hidden beaches, and family-run restaurants that only locals know about."
                            typography:
                              size: sm
                              color: *color-text
                              align: center
                              lineHeight: relaxed

