# Zen Japanese Features
# Minimal feature cards with earth tones, clean lines, and generous breathing room
# Base components: site, page, layout-column, columnsgrid, icon, heading, paragraph, eyebrow
# Section type: features
# Layout: grid
# Visual style: zen_japanese
# Perfect for: Tea house, ceramics studio, spa, wellness retreat, meditation center, Japanese restaurant

- name: site
  properties:
    theme:
      fonts:
        heading: &font-heading "'Noto Serif', serif"
        content: &font-content "'Inter', sans-serif"
      colors:
        primary: &color-primary "#2D2D2D"
        text: &color-text "#5A5A58"
        secondary: &color-secondary "#E8E0D0"
        accent: &color-accent "#8B4513"
        background: &color-background "#FAF8F5"
  components:
    - name: page
      slug: home
      title: "Zen Japanese Features"
      properties:
        appearance:
          background:
            color: *color-background
            opacity: 100
      components:

        # Features section — minimal cards, earth tones
        - name: layout-column
          properties:
            layout:
              horizontalAlign: center
              gap: xl
            spacing:
              paddingBlock: xxxl
              paddingInline: lg
          components:

            # Section header — generous spacing
            - name: eyebrow
              properties:
                text: "Our Way"
                typography:
                  size: xs
                  weight: regular
                  color: *color-accent
                  transform: uppercase
                  letterSpacing: wider
                  align: center

            - name: heading
              properties:
                text: "Three pillars of practice"
                level: 2
                typography:
                  size: xxl
                  weight: light
                  color: *color-primary
                  align: center
                  lineHeight: relaxed

            - name: paragraph
              properties:
                text: "Rooted in centuries of tradition, refined for the present moment."
                typography:
                  size: lg
                  color: *color-text
                  align: center
                  lineHeight: relaxed
                layout:
                  widthMode: "50"

            # Feature grid — 3 minimal cards
            - name: columnsgrid
              properties:
                layout:
                  columns: 3
                  gap: lg
                responsive:
                  breakpoints:
                    md: 2
                    sm: 1
                spacing:
                  paddingBlock: lg
              columns:

                # Card 1
                - components:
                    - name: layout-column
                      properties:
                        layout:
                          horizontalAlign: center
                          gap: md
                        appearance:
                          background:
                            color: *color-background
                            opacity: 100
                          radius: xs
                          shadow: none
                          border:
                            width: 0
                        spacing:
                          paddingBlock: xl
                          paddingInline: lg
                      components:
                        - name: icon
                          properties:
                            name: droplets
                            appearance:
                              color: *color-accent
                              size: lg
                        - name: heading
                          properties:
                            text: "Stillness"
                            level: 3
                            typography:
                              size: lg
                              weight: light
                              color: *color-primary
                              align: center
                        - name: paragraph
                          properties:
                            text: "In quiet observation we discover clarity. Our guided sessions create space for the mind to settle and the spirit to rest."
                            typography:
                              size: sm
                              color: *color-text
                              align: center
                              lineHeight: relaxed

                # Card 2
                - components:
                    - name: layout-column
                      properties:
                        layout:
                          horizontalAlign: center
                          gap: md
                        appearance:
                          background:
                            color: *color-background
                            opacity: 100
                          radius: xs
                          shadow: none
                          border:
                            width: 0
                        spacing:
                          paddingBlock: xl
                          paddingInline: lg
                      components:
                        - name: icon
                          properties:
                            name: mountain
                            appearance:
                              color: *color-accent
                              size: lg
                        - name: heading
                          properties:
                            text: "Balance"
                            level: 3
                            typography:
                              size: lg
                              weight: light
                              color: *color-primary
                              align: center
                        - name: paragraph
                          properties:
                            text: "Harmony between effort and ease, structure and flow. We cultivate equilibrium through mindful movement and breath."
                            typography:
                              size: sm
                              color: *color-text
                              align: center
                              lineHeight: relaxed

                # Card 3
                - components:
                    - name: layout-column
                      properties:
                        layout:
                          horizontalAlign: center
                          gap: md
                        appearance:
                          background:
                            color: *color-background
                            opacity: 100
                          radius: xs
                          shadow: none
                          border:
                            width: 0
                        spacing:
                          paddingBlock: xl
                          paddingInline: lg
                      components:
                        - name: icon
                          properties:
                            name: flower-2
                            appearance:
                              color: *color-accent
                              size: lg
                        - name: heading
                          properties:
                            text: "Presence"
                            level: 3
                            typography:
                              size: lg
                              weight: light
                              color: *color-primary
                              align: center
                        - name: paragraph
                          properties:
                            text: "The art of being fully here. Through tea ceremony, calligraphy, and contemplation, we practice the gift of attention."
                            typography:
                              size: sm
                              color: *color-text
                              align: center
                              lineHeight: relaxed
