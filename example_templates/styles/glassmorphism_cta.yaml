# Glassmorphism CTA
# Frosted glass call-to-action container floating over a vibrant gradient background
# Base components: site, page, layout-column, layout-row, heading, paragraph, button, eyebrow
# Section type: cta
# Layout: centered
# Visual style: glassmorphism
# Perfect for: SaaS platform, fintech, design studio, tech startup, crypto, AI platform

- name: site
  properties:
    theme:
      fonts:
        heading: &font-heading "'Inter', sans-serif"
        content: &font-content "'Inter', sans-serif"
      colors:
        primary: &color-primary "#1A365D"
        text: &color-text "#334E68"
        secondary: &color-secondary "#B0D4E8"
        accent: &color-accent "#3182CE"
        background: &color-background "#D6EBF5"
  components:
    - name: page
      slug: home
      title: "Glassmorphism CTA"
      properties:
        appearance:
          background:
            color: *color-background
            opacity: 100
      components:

        # Gradient background — mandatory for glassmorphism blur visibility
        - name: layout-column
          properties:
            layout:
              horizontalAlign: center
            appearance:
              background:
                type: gradient
                gradient:
                  colorStart: *color-accent
                  colorEnd: "#7C3AED"
                  direction: to bottom right
                opacity: 100
            spacing:
              paddingBlock: xxl
              paddingInline: lg
          components:

            # Frosted glass CTA container
            - name: layout-column
              properties:
                layout:
                  widthMode: "75"
                  horizontalAlign: center
                  gap: md
                appearance:
                  background:
                    color: "#ffffff"
                    opacity: 15
                  blur: true
                  border:
                    width: 1
                    style: solid
                    color: "#ffffff"
                  radius: xl
                  shadow: soft
                  shadowColor: "rgba(0,0,0,0.1)"
                spacing:
                  paddingBlock: xxxl
                  paddingInline: xxl
              components:

                # Eyebrow in frosted pill
                - name: layout-row
                  properties:
                    layout:
                      horizontalAlign: center
                  components:
                    - name: layout-column
                      properties:
                        layout:
                          widthMode: fit
                          horizontalAlign: center
                        appearance:
                          background:
                            color: "#ffffff"
                            opacity: 10
                          blur: true
                          border:
                            width: 1
                            style: solid
                            color: rgba(255,255,255,0.5)
                          radius: pill
                        spacing:
                          paddingBlock: xs
                          paddingInline: md
                      components:
                        - name: paragraph
                          properties:
                            text: "LIMITED TIME OFFER"
                            typography:
                              size: xs
                              weight: semibold
                              color: "#ffffff"
                              letterSpacing: wider
                              align: center

                # Main heading
                - name: heading
                  properties:
                    text: "See through the complexity"
                    level: 2
                    typography:
                      size: xxl
                      weight: bold
                      color: "#ffffff"
                      align: center
                      lineHeight: snug

                # Supporting paragraph
                - name: paragraph
                  properties:
                    text: |
                      Start building with the most transparent platform in the industry.
                      No hidden fees, no opaque processes — just crystal-clear tools that
                      help you ship faster than ever before.
                    typography:
                      size: md
                      color: rgba(255,255,255,0.85)
                      align: center
                      lineHeight: relaxed
                    layout:
                      widthMode: "83"
                    spacing:
                      marginBlock: md

                # CTA buttons — frosted glass style
                - name: layout-row
                  properties:
                    layout:
                      horizontalAlign: center
                      verticalAlign: center
                      wrap: wrap
                      gap: md
                    spacing:
                      marginBlock: md
                  components:
                    - name: button
                      properties:
                        text: "Start Building"
                        appearance:
                          background:
                            color: "#ffffff"
                            opacity: 20
                          blur: true
                          border:
                            width: 1
                            style: solid
                            color: "#ffffff"
                          radius: pill
                          shadow: none
                        typography:
                          color: "#ffffff"
                          weight: bold
                          size: md
                        spacing:
                          paddingBlock: md
                          paddingInline: xxl
                    - name: button
                      properties:
                        text: "Book a Demo"
                        appearance:
                          background:
                            color: transparent
                            opacity: 0
                          border:
                            width: 1
                            style: solid
                            color: rgba(255,255,255,0.5)
                          radius: pill
                          shadow: none
                        typography:
                          color: rgba(255,255,255,0.9)
                          weight: semibold
                          size: md
                        spacing:
                          paddingBlock: md
                          paddingInline: xxl

                # Trust line
                - name: paragraph
                  properties:
                    text: "Trusted by 10,000+ teams worldwide. 14-day free trial, cancel anytime."
                    typography:
                      size: sm
                      color: rgba(255,255,255,0.6)
                      align: center
                      weight: regular
                    spacing:
                      marginBlock: sm
