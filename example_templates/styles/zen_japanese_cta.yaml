# Zen Japanese CTA Banner
# Minimal earth-tone call-to-action with bordered button and serene typography
# Base components: site, page, layout-column, layout-row, heading, paragraph, button, eyebrow
# Section type: cta
# Layout: centered
# Visual style: zen_japanese
# Perfect for: Tea house, ceramics studio, spa, wellness retreat, meditation center, Japanese restaurant

- name: site
  properties:
    theme:
      fonts:
        heading: &font-heading "'Noto Serif', serif"
        content: &font-content "'Inter', sans-serif"
      colors:
        primary: &color-primary "#2D2D2D"
        text: &color-text "#5A5A58"
        secondary: &color-secondary "#E8E0D0"
        accent: &color-accent "#8B4513"
        background: &color-background "#FAF8F5"
  components:
    - name: page
      slug: home
      title: "Zen Japanese CTA"
      properties:
        appearance:
          background:
            color: *color-background
            opacity: 100
      components:

        # CTA section — warm earth tone background
        - name: layout-column
          properties:
            layout:
              horizontalAlign: center
            appearance:
              background:
                color: *color-secondary
                opacity: 100
              border:
                width: 0
              radius: none
            spacing:
              paddingBlock: xxxl
              paddingInline: lg
          components:

            # Inner content — narrow, centered
            - name: layout-column
              properties:
                layout:
                  widthMode: "50"
                  horizontalAlign: center
                  gap: lg
              components:

                # Eyebrow
                - name: eyebrow
                  properties:
                    text: "Begin"
                    typography:
                      size: xs
                      weight: regular
                      color: *color-accent
                      transform: uppercase
                      letterSpacing: wider
                      align: center

                # Main heading
                - name: heading
                  properties:
                    text: "The journey of a thousand miles"
                    level: 2
                    typography:
                      size: xxl
                      weight: light
                      color: *color-primary
                      align: center
                      lineHeight: relaxed

                # Supporting paragraph
                - name: paragraph
                  properties:
                    text: |
                      Every practice begins with a single breath. Join us and discover
                      the quiet transformation that comes from showing up, day after day,
                      with patience and intention.
                    typography:
                      size: md
                      color: *color-text
                      align: center
                      lineHeight: relaxed
                    spacing:
                      marginBlock: md

                # CTA button — minimal, single
                - name: layout-row
                  properties:
                    layout:
                      horizontalAlign: center
                      verticalAlign: center
                      wrap: wrap
                      gap: md
                    spacing:
                      marginBlock: md
                  components:
                    - name: button
                      properties:
                        text: "Reserve Your Place"
                        appearance:
                          background:
                            color: transparent
                            opacity: 0
                          border:
                            width: 1
                            style: solid
                            color: *color-primary
                          radius: xs
                          shadow: none
                        typography:
                          color: *color-primary
                          weight: regular
                          size: md
                        spacing:
                          paddingBlock: md
                          paddingInline: xxl
