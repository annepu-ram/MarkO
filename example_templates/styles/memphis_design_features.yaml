# Memphis Design Features
# Playful feature grid with alternating card styles, thick borders, and retro shadows
# Base components: site, page, layout-column, columnsgrid, icon, heading, paragraph, eyebrow
# Section type: features
# Layout: grid
# Visual style: memphis_design
# Perfect for: Creative agency, design studio, art gallery, music label, youth brand, streetwear, event, pop-up shop

- name: site
  properties:
    theme:
      fonts:
        heading: &font-heading "'Space Grotesk', sans-serif"
        content: &font-content "'IBM Plex Sans', sans-serif"
      colors:
        primary: &color-primary "#1A1A1A"
        text: &color-text "#2D2D2D"
        secondary: &color-secondary "#FFD700"
        accent: &color-accent "#FF3366"
        background: &color-background "#00BFFF"
  components:
    - name: page
      slug: home
      title: "Memphis Design Features"
      properties:
        appearance:
          background:
            color: *color-background
            opacity: 100
      components:

        # Features section — playful cards with alternating styles
        - name: layout-column
          properties:
            layout:
              horizontalAlign: center
              gap: lg
            appearance:
              background:
                color: '#ffffff'
                opacity: 100
              border:
                width: 3
                style: solid
                color: *color-primary
            spacing:
              paddingBlock: xxxl
              paddingInline: lg
          components:

            # Section eyebrow
            - name: eyebrow
              properties:
                text: "What We Do"
                typography:
                  size: xs
                  weight: bold
                  color: *color-accent
                  transform: uppercase
                  letterSpacing: wider
                  align: center

            # Section heading
            - name: heading
              properties:
                text: "SERVICES THAT HIT DIFFERENT"
                level: 2
                layout:
                  widthMode: "75"
                typography:
                  size: xxl
                  weight: extrabold
                  color: *color-primary
                  align: center
                  lineHeight: snug
                  transform: uppercase
                  letterSpacing: wide

            # Section description
            - name: paragraph
              properties:
                text: "We do not do boring. Every project gets the full Memphis treatment — bold, unexpected, and impossible to ignore."
                layout:
                  widthMode: "66"
                typography:
                  size: lg
                  color: *color-text
                  align: center
                  lineHeight: relaxed

            # Feature grid — 3 columns, alternating card styles
            - name: columnsgrid
              properties:
                layout:
                  columns: 3
                  gap: lg
                responsive:
                  breakpoints:
                    md: 2
                    sm: 1
                spacing:
                  paddingBlock: lg
              columns:

                # Card 1 — yellow bg, no radius, retro shadow
                - components:
                    - name: layout-column
                      properties:
                        layout:
                          horizontalAlign: center
                          gap: sm
                        appearance:
                          background:
                            color: *color-secondary
                            opacity: 100
                          radius: none
                          shadow: retro
                          shadowColor: '#000000'
                          border:
                            width: 3
                            style: solid
                            color: *color-primary
                        spacing:
                          paddingBlock: xl
                          paddingInline: lg
                      components:
                        - name: icon
                          properties:
                            name: palette
                            appearance:
                              color: *color-primary
                              size: lg
                        - name: heading
                          properties:
                            text: "BRAND IDENTITY"
                            level: 3
                            typography:
                              size: lg
                              weight: extrabold
                              color: *color-primary
                              align: center
                              transform: uppercase
                        - name: paragraph
                          properties:
                            text: "Logos, color systems, and visual languages that make your brand instantly recognizable in a sea of sameness."
                            typography:
                              size: sm
                              color: *color-text
                              align: center
                              lineHeight: relaxed

                # Card 2 — accent bg, pill radius, retro shadow
                - components:
                    - name: layout-column
                      properties:
                        layout:
                          horizontalAlign: center
                          gap: sm
                        appearance:
                          background:
                            color: *color-accent
                            opacity: 100
                          radius: pill
                          shadow: retro
                          shadowColor: '#000000'
                          border:
                            width: 3
                            style: solid
                            color: *color-primary
                        spacing:
                          paddingBlock: xl
                          paddingInline: lg
                      components:
                        - name: icon
                          properties:
                            name: globe
                            appearance:
                              color: '#ffffff'
                              size: lg
                        - name: heading
                          properties:
                            text: "WEB DESIGN"
                            level: 3
                            typography:
                              size: lg
                              weight: extrabold
                              color: '#ffffff'
                              align: center
                              transform: uppercase
                        - name: paragraph
                          properties:
                            text: "Websites that load fast, look wild, and convert visitors into fans. Mobile-first, accessibility-always."
                            typography:
                              size: sm
                              color: '#ffffff'
                              align: center
                              lineHeight: relaxed

                # Card 3 — blue bg, no radius, retro shadow
                - components:
                    - name: layout-column
                      properties:
                        layout:
                          horizontalAlign: center
                          gap: sm
                        appearance:
                          background:
                            color: *color-background
                            opacity: 100
                          radius: none
                          shadow: retro
                          shadowColor: '#000000'
                          border:
                            width: 3
                            style: solid
                            color: *color-primary
                        spacing:
                          paddingBlock: xl
                          paddingInline: lg
                      components:
                        - name: icon
                          properties:
                            name: megaphone
                            appearance:
                              color: *color-primary
                              size: lg
                        - name: heading
                          properties:
                            text: "CAMPAIGNS"
                            level: 3
                            typography:
                              size: lg
                              weight: extrabold
                              color: *color-primary
                              align: center
                              transform: uppercase
                        - name: paragraph
                          properties:
                            text: "Social media blitzes, launch events, and guerrilla marketing that gets people talking and sharing."
                            typography:
                              size: sm
                              color: *color-text
                              align: center
                              lineHeight: relaxed

