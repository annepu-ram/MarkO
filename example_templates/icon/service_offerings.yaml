                    spacing: { marginBlock: sm }
                - name: paragraph
                  properties:
                    text: User-centered design that balances aesthetics with usability to create engaging digital experiences.
                    typography: { size: sm, color: *color-secondary, align: center }

        - components:
            - name: layout-column
