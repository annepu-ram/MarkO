# Icon: Contact Info Section
# Icons used alongside contact details (phone, email, location)
# Base components: page, layout-row, layout-column, heading, paragraph, columnsgrid, icon
# Section type: features
# Layout: grid
# Visual style: modern
# Perfect for: SaaS, tech, services, agencies

- name: page
  properties:
    theme:
      colors:
        background: &color-background '#f8fafc'
        primary: &color-primary '#1e293b'
        text: &color-text '#343A45'
        secondary: &color-secondary '#64748b'
        accent: &color-accent '#0ea5e9'
      fonts:
        heading: &font-heading "'Inter', sans-serif"
        content: &font-content "'Inter', sans-serif"
    appearance: { background: { color: *color-background } }
  components:
    - name: layout-row
      properties:
        layout: { horizontalAlign: center }
        spacing: { paddingBlock: xl }
        appearance: { background: { color: *color-primary } }
      components:
        - name: layout-column
          properties:
            layout: { widthMode: '75', horizontalAlign: center }
          components:
            - name: heading
              properties:
                text: Get In Touch
                level: 2
                typography: { size: xxl, weight: bold, color: *color-background, align: center }
            - name: paragraph
              properties:
                text: We'd love to hear from you. Reach out through any of these channels.
                typography: { size: md, color: '#94a3b8', align: center }
                spacing: { marginBlock: md }

    - name: columnsgrid
      properties:
        layout: { columns: 3, gap: lg }
        responsive: { breakpoints: { md: 2, sm: 1 } }
        spacing: { paddingBlock: xl, paddingInline: lg }
      columns:
        - components:
            - name: layout-column
              properties:
                layout: { horizontalAlign: center }
                appearance: { background: { color: '#ffffff' }, radius: lg, shadow: soft }
                spacing: { paddingBlock: xl, paddingInline: lg }
              components:
                - name: icon
                  properties: { name: phone, size: "48", color: *color-accent }
                - name: heading
                  properties:
                    text: Call Us
                    level: 3
                    typography: { size: lg, weight: semibold, color: *color-primary, align: center }
                    spacing: { marginBlock: sm }
                - name: paragraph
                  properties:
                    text: +1 (555) 123-4567
                    typography: { size: md, color: *color-secondary, align: center }
                - name: paragraph
                  properties:
                    text: Mon-Fri 9am-6pm EST
                    typography: { size: xs, color: '#94a3b8', align: center }

        - components:
            - name: layout-column
              properties:
                layout: { horizontalAlign: center }
                appearance: { background: { color: '#ffffff' }, radius: lg, shadow: soft }
                spacing: { paddingBlock: xl, paddingInline: lg }
              components:
                - name: icon
                  properties: { name: mail, size: "48", color: *color-accent }
                - name: heading
                  properties:
                    text: Email Us
                    level: 3
                    typography: { size: lg, weight: semibold, color: *color-primary, align: center }
                    spacing: { marginBlock: sm }
                - name: paragraph
                  properties:
                    text: hello@company.com
                    typography: { size: md, color: *color-secondary, align: center }
                - name: paragraph
                  properties:
                    text: We reply within 24 hours
                    typography: { size: xs, color: '#94a3b8', align: center }

        - components:
            - name: layout-column
              properties:
                layout: { horizontalAlign: center }
                appearance: { background: { color: '#ffffff' }, radius: lg, shadow: soft }
                spacing: { paddingBlock: xl, paddingInline: lg }
              components:
                - name: icon
                  properties: { name: location_on, size: "48", color: *color-accent }
                - name: heading
                  properties:
                    text: Visit Us
                    level: 3
                    typography: { size: lg, weight: semibold, color: *color-primary, align: center }
                    spacing: { marginBlock: sm }
                - name: paragraph
                  properties:
                    text: "123 Innovation Drive\nSan Francisco, CA 94107"
                    typography: { size: md, color: *color-secondary, align: center }
