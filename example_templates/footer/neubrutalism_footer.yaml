# Neubrutalism Footer
# Raw bold footer with thick borders on dark background
# Base components: site, page, layout-column, layout-row, columnsgrid, heading, paragraph, link
# Section type: footer
# Layout: split_screen
# Visual style: neubrutalism
# Content volume: rich
# Tone: playful
# Conversion intent: awareness
# Image requirement: none
# Interactivity: static
# Industries: saas, portfolio
# Perfect for: creative agency, portfolio, indie brand, art gallery, design studio, startup

- name: site
  properties:
    theme:
      fonts:
        heading: &font-heading "'Space Grotesk', sans-serif"
        content: &font-content "'IBM Plex Sans', sans-serif"
      colors:
        primary: &color-primary "#1A1A1A"
        text: &color-text "#3D3D3D"
        secondary: &color-secondary "#C8C4BB"
        accent: &color-accent "#FF4D00"
        background: &color-background "#E5E2DD"
  components:
    - name: page
      slug: home
      title: "Neubrutalism Footer"
      properties:
        appearance:
          background:
            color: *color-background
            opacity: 100
      components:

        # Footer section — dark primary background with thick accent border-top
        - name: layout-column
          properties:
            layout:
              horizontalAlign: center
              gap: xl
            appearance:
              background:
                color: *color-primary
                opacity: 100
              border:
                width: 4
                style: solid
                color: *color-accent
                sides: top
            spacing:
              paddingBlock: xxl
              paddingInline: xl
          components:

            # Main footer row — brand column + links grid
            - name: layout-row
              properties:
                layout:
                  horizontalAlign: space-between
                  verticalAlign: start
                  wrap: wrap
                  gap: md
              components:

                # Brand column
                - name: layout-column
                  properties:
                    layout:
                      widthMode: "25"
                      horizontalAlign: left
                      gap: sm
                    appearance:
                      background:
                        opacity: 0
                  components:
                    - name: heading
                      properties:
                        text: RAWSTACK
                        level: 3
                        typography:
                          size: xl
                          weight: extrabold
                          color: *color-background
                          transform: uppercase

                    - name: paragraph
                      properties:
                        text: "We build tools that don't apologize for being bold. No rounded corners, no soft gradients — just raw creative power for people who ship."
                        typography:
                          size: sm
                          color: *color-background
                          lineHeight: relaxed
                        spacing:
                          marginBlock: sm

                    - name: layout-row
                      properties:
                        layout:
                          horizontalAlign: left
                          verticalAlign: center
                          gap: md
                          wrap: wrap
                        appearance:
                          background:
                            opacity: 0
                      components:
                        - name: link
                          properties:
                            text: TWITTER
                            href: "https://twitter.com"
                            typography:
                              size: xs
                              weight: extrabold
                              color: *color-background
                              transform: uppercase
                            appearance:
                              underline: false
                        - name: link
                          properties:
                            text: GITHUB
                            href: "https://github.com"
                            typography:
                              size: xs
                              weight: extrabold
                              color: *color-background
                              transform: uppercase
                            appearance:
                              underline: false
                        - name: link
                          properties:
                            text: DRIBBBLE
                            href: "https://dribbble.com"
                            typography:
                              size: xs
                              weight: extrabold
                              color: *color-background
                              transform: uppercase
                            appearance:
                              underline: false

                # Links grid — 3 columns
                - name: columnsgrid
                  properties:
                    layout:
                      columns: 3
                      gap: md
                    responsive:
                      breakpoints:
                        md: 2
                        sm: 1
                  columns:

                    # Product column
                    - components:
                        - name: heading
                          properties:
                            text: PRODUCT
                            level: 4
                            typography:
                              size: sm
                              weight: extrabold
                              color: *color-background
                              transform: uppercase
                            spacing:
                              marginBlock: sm
                        - name: link
                          properties:
                            text: Features
                            href: "#features"
                            typography:
                              size: sm
                              color: *color-background
                            appearance:
                              underline: false
                            spacing:
                              marginBlock: xs
                        - name: link
                          properties:
                            text: Pricing
                            href: "#pricing"
                            typography:
                              size: sm
                              color: *color-background
                            appearance:
                              underline: false
                            spacing:
                              marginBlock: xs
                        - name: link
                          properties:
                            text: Templates
                            href: "#templates"
                            typography:
                              size: sm
                              color: *color-background
                            appearance:
                              underline: false
                            spacing:
                              marginBlock: xs
                        - name: link
                          properties:
                            text: Changelog
                            href: "#changelog"
                            typography:
                              size: sm
                              color: *color-background
                            appearance:
                              underline: false
                            spacing:
                              marginBlock: xs

                    # Resources column
                    - components:
                        - name: heading
                          properties:
                            text: RESOURCES
                            level: 4
                            typography:
                              size: sm
                              weight: extrabold
                              color: *color-background
                              transform: uppercase
                            spacing:
                              marginBlock: sm
                        - name: link
                          properties:
                            text: Documentation
                            href: "#docs"
                            typography:
                              size: sm
                              color: *color-background
                            appearance:
                              underline: false
                            spacing:
                              marginBlock: xs
                        - name: link
                          properties:
                            text: API Reference
                            href: "#api"
                            typography:
                              size: sm
                              color: *color-background
                            appearance:
                              underline: false
                            spacing:
                              marginBlock: xs
                        - name: link
                          properties:
                            text: Blog
                            href: "#blog"
                            typography:
                              size: sm
                              color: *color-background
                            appearance:
                              underline: false
                            spacing:
                              marginBlock: xs
                        - name: link
                          properties:
                            text: Tutorials
                            href: "#tutorials"
                            typography:
                              size: sm
                              color: *color-background
                            appearance:
                              underline: false
                            spacing:
                              marginBlock: xs

                    # Company column
                    - components:
                        - name: heading
                          properties:
                            text: COMPANY
                            level: 4
                            typography:
                              size: sm
                              weight: extrabold
                              color: *color-background
                              transform: uppercase
                            spacing:
                              marginBlock: sm
                        - name: link
                          properties:
                            text: About
                            href: "#about"
                            typography:
                              size: sm
                              color: *color-background
                            appearance:
                              underline: false
                            spacing:
                              marginBlock: xs
                        - name: link
                          properties:
                            text: Careers
                            href: "#careers"
                            typography:
                              size: sm
                              color: *color-background
                            appearance:
                              underline: false
                            spacing:
                              marginBlock: xs
                        - name: link
                          properties:
                            text: Contact
                            href: "#contact"
                            typography:
                              size: sm
                              color: *color-background
                            appearance:
                              underline: false
                            spacing:
                              marginBlock: xs
                        - name: link
                          properties:
                            text: Press Kit
                            href: "#press"
                            typography:
                              size: sm
                              color: *color-background
                            appearance:
                              underline: false
                            spacing:
                              marginBlock: xs

            # Bottom bar — accent background with thick border
            - name: layout-row
              properties:
                layout:
                  horizontalAlign: space-between
                  verticalAlign: center
                  wrap: wrap
                appearance:
                  background:
                    color: *color-accent
                    opacity: 100
                  border:
                    width: 4
                    style: solid
                    color: "#000000"
                spacing:
                  paddingBlock: sm
                  paddingInline: lg
              components:
                - name: paragraph
                  properties:
                    text: "© 2026 RAWSTACK. NO RIGHTS RESERVED."
                    typography:
                      size: xs
                      weight: extrabold
                      color: "#ffffff"
                      transform: uppercase

                - name: layout-row
                  properties:
                    layout:
                      horizontalAlign: right
                      gap: md
                      wrap: nowrap
                    appearance:
                      background:
                        opacity: 0
                  components:
                    - name: link
                      properties:
                        text: PRIVACY
                        href: "#privacy"
                        typography:
                          size: xs
                          weight: extrabold
                          color: "#ffffff"
                          transform: uppercase
                        appearance:
                          underline: false
                    - name: link
                      properties:
                        text: TERMS
                        href: "#terms"
                        typography:
                          size: xs
                          weight: extrabold
                          color: "#ffffff"
                          transform: uppercase
                        appearance:
                          underline: false

