- name: page
  properties:
    background:
      color: '#f0f4f8'
  components:
  - name: titlebar
    properties:
      branding:
        title: InnovateCon 2025
        logoUrl: https://images.pexels.com/photos/2833037/pexels-photo-2833037.jpeg?auto=compress&cs=tinysrgb&w=100
      appearance:
        background:
          color: '#ffffff'
      navigation:
        links:
        - label: Home
          href: '#home'
        - label: Speakers
          href: '#speakers'
        - label: Schedule
          href: '#schedule'
        - label: Register
          href: '#register'
  - name: heading
    properties:
      text: 'InnovateCon 2025: The Future of Technology'
      typography:
        align: center
        color: '#007BFF'
      spacing:
        marginBlock: lg
      level: 1
  - name: heading
    properties:
      text: October 22-24, 2025 | Metro Convention Center
      typography:
        align: center
        weight: regular
      spacing:
        marginBlock: md
      level: 3
  - name: button
    properties:
      text: Register Now
  - name: heading
    properties:
      text: Featured Speakers
      typography:
        align: center
        color: '#343a40'
      spacing:
        marginBlock: lg
      level: 2
  - name: columnsgrid
    properties:
      layout:
        columns: 4
        gap: md
    columns:
    - components:
      - name: image
        properties:
          source:
            url: https://images.pexels.com/photos/220453/pexels-photo-220453.jpeg?auto=compress&cs=tinysrgb&w=400
            altText: Professional speaker portrait
          presentation:
            height: 250px
            fit: cover
            cornerStyle: md
          layout:
            widthMode: stretch
      - name: heading
        properties:
          text: Jane Doe
          typography:
            align: center
            size: md
          level: 3
    - components:
      - name: image
        properties:
          source:
            url: https://images.pexels.com/photos/2379004/pexels-photo-2379004.jpeg?auto=compress&cs=tinysrgb&w=400
            altText: Professional speaker portrait
          presentation:
            height: 250px
            fit: cover
            cornerStyle: md
          layout:
            widthMode: stretch
      - name: heading
        properties:
          text: John Smith
          typography:
            align: center
            size: md
          level: 3
    - components:
      - name: image
        properties:
          source:
            url: https://images.pexels.com/photos/1043474/pexels-photo-1043474.jpeg?auto=compress&cs=tinysrgb&w=400
            altText: Professional speaker portrait
          presentation:
            height: 250px
            fit: cover
            cornerStyle: md
          layout:
            widthMode: stretch
      - name: heading
        properties:
          text: Emily Jones
          typography:
            align: center
            size: md
          level: 3
    - components:
      - name: image
        properties:
          source:
            url: https://images.pexels.com/photos/614810/pexels-photo-614810.jpeg?auto=compress&cs=tinysrgb&w=400
            altText: Professional speaker portrait
          presentation:
            height: 250px
            fit: cover
            cornerStyle: md
          layout:
            widthMode: stretch
      - name: heading
        properties:
          text: Michael Lee
          typography:
            align: center
            size: md
          level: 3
  - name: heading
    properties:
      text: Conference Schedule
      typography:
        align: center
        color: '#343a40'
      spacing:
        marginBlock: lg
      level: 2
  - name: tabs
    properties:
      layout:
        orientation: horizontal
      tabs:
      - title: 'Day 1: Foundations'
        content: ''
      - title: 'Day 2: Deep Dive'
        content: ''
      - title: 'Day 3: Futures'
        content: ''
  - name: heading
    properties:
      text: Frequently Asked Questions
      typography:
        align: center
        color: '#343a40'
      spacing:
        marginBlock: lg
      level: 2
  - name: accordion
    properties:
      items:
      - title: What is the dress code?
        content: The dress code is business casual. We want you to be comfortable while you learn and network.
      - title: Are meals provided?
        content: Yes, a continental breakfast, lunch, and afternoon snacks will be provided on all three days of the conference.
      - title: Is parking available?
        content: Free parking is available at the Metro Convention Center. We also recommend public transportation as the venue is well-connected.
      behavior:
        allowMultipleOpen: false
  - name: heading
    properties:
      text: Register Your Interest
      typography:
        align: center
        color: '#343a40'
      spacing:
        marginBlock: lg
      level: 2
  - name: textbox
    properties:
      field:
        placeholder: Full Name
  - name: textbox
    properties:
      field:
        placeholder: Email Address
  - name: dropdown
    properties:
      field:
        options: |
          General Admission
          VIP Pass
          Student Pass
  - name: button
    properties:
      text: Submit
