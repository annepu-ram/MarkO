# Company Values and Culture Section — What We Stand For
# A company culture showcase using a columnsgrid of value cards with large material icons, value name headings, and descriptive paragraphs highlighting organizational principles
# Base components: layout-row, columnsgrid, layout-column, icon, heading, paragraph, eyebrow, blockquote
# Section type: team
# Layout: grid, card_based
# Visual style: modern_minimalist
# Perfect for: digital agency, tech startup, consulting firm, law firm, restaurant, bakery, creative studio, architecture firm, dental clinic, accounting firm


- name: site
  properties:
    theme:
      fonts:
        heading: &font-heading "'Plus Jakarta Sans', sans-serif"
        content: &font-content "'Inter', sans-serif"
      colors:
        primary: &color-primary '#111827'
        text: &color-text '#2C3039'
        secondary: &color-secondary '#6b7280'
        accent: &color-accent '#8b5cf6'
        background: &color-background '#faf5ff'
  components:
    - name: page
      slug: home
      title: "05 Values and Culture"
      properties:
        appearance: { background: { color: *color-background } }
      components:

        # ============================================
        # SECTION HEADER
        # ============================================
        - name: layout-column
          properties:
            layout: { horizontalAlign: center }
            spacing: { paddingBlock: xl, paddingInline: lg }
          components:
            - name: eyebrow
              properties:
                text: OUR VALUES
                typography: { size: xs, weight: semibold, color: *color-accent, transform: uppercase, letterSpacing: wider, align: center }
            - name: heading
              properties:
                text: What We Stand For
                level: 1
                typography: { size: xxxl, weight: extrabold, color: *color-primary, align: center, letterSpacing: tight }
                spacing: { marginBlock: sm }
            - name: paragraph
              properties:
                text: The principles that guide every decision we make and every relationship we build.
                typography: { size: lg, color: *color-secondary, align: center }
                layout: { widthMode: "75" }

        # ============================================
        # MISSION BLOCKQUOTE
        # ============================================
        - name: layout-row
          properties:
            layout: { horizontalAlign: center }
            spacing: { paddingBlock: md, paddingInline: lg }
          components:
            - name: layout-column
              properties:
                layout: { widthMode: "66", horizontalAlign: center }
              components:
                - name: blockquote
                  properties:
                    quote: |
                      Our mission is to empower organizations through thoughtful design and
                      technology, creating solutions that are not only effective but genuinely
                      make people's lives better.
                    cite: 'Company Mission Statement'
                    typography: { size: lg, weight: medium, color: *color-text, align: center, lineHeight: "1.7" }
                    appearance:
                      border: { accentColor: *color-accent }
                      background: { color: '#ffffff', opacity: 100 }

        # ============================================
        # VALUES GRID
        # ============================================
        - name: columnsgrid
          properties:
            layout: { columns: 3, gap: lg }
            responsive: { breakpoints: { md: 2, sm: 1 } }
            spacing: { paddingBlock: lg, paddingInline: lg }
          columns:

            # Value 1 - Innovation
            - components:
                - name: layout-column
                  properties:
                    layout: { horizontalAlign: center }
                    appearance: { background: { color: '#ffffff', opacity: 100 }, radius: lg, shadow: soft }
                    spacing: { paddingBlock: xl, paddingInline: md }
                  components:
                    - name: icon
                      properties: { name: lightbulb, size: "48", color: *color-accent }
                    - name: heading
                      properties:
                        text: Innovation
                        level: 3
                        typography: { size: lg, weight: bold, color: *color-primary, align: center }
                        spacing: { marginBlock: sm }
                    - name: paragraph
                      properties:
                        text: We challenge the status quo and embrace new ideas. Every project is an opportunity to push boundaries and discover better ways of solving problems.
                        typography: { size: sm, color: *color-secondary, align: center }

            # Value 2 - Integrity
            - components:
                - name: layout-column
                  properties:
                    layout: { horizontalAlign: center }
                    appearance: { background: { color: '#ffffff', opacity: 100 }, radius: lg, shadow: soft }
                    spacing: { paddingBlock: xl, paddingInline: md }
                  components:
                    - name: icon
                      properties: { name: handshake, size: "48", color: *color-accent }
                    - name: heading
                      properties:
                        text: Integrity
                        level: 3
                        typography: { size: lg, weight: bold, color: *color-primary, align: center }
                        spacing: { marginBlock: sm }
                    - name: paragraph
                      properties:
                        text: Honesty and transparency are the foundation of everything we do. We build trust through open communication, ethical practices, and keeping our promises.
                        typography: { size: sm, color: *color-secondary, align: center }

            # Value 3 - Collaboration
            - components:
                - name: layout-column
                  properties:
                    layout: { horizontalAlign: center }
                    appearance: { background: { color: '#ffffff', opacity: 100 }, radius: lg, shadow: soft }
                    spacing: { paddingBlock: xl, paddingInline: md }
                  components:
                    - name: icon
                      properties: { name: users, size: "48", color: *color-accent }
                    - name: heading
                      properties:
                        text: Collaboration
                        level: 3
                        typography: { size: lg, weight: bold, color: *color-primary, align: center }
                        spacing: { marginBlock: sm }
                    - name: paragraph
                      properties:
                        text: Great work happens when great minds come together. We foster a culture of teamwork where diverse perspectives are celebrated and everyone has a voice.
                        typography: { size: sm, color: *color-secondary, align: center }

            # Value 4 - Sustainability
            - components:
                - name: layout-column
                  properties:
                    layout: { horizontalAlign: center }
                    appearance: { background: { color: '#ffffff', opacity: 100 }, radius: lg, shadow: soft }
                    spacing: { paddingBlock: xl, paddingInline: md }
                  components:
                    - name: icon
                      properties: { name: leaf, size: "48", color: *color-accent }
                    - name: heading
                      properties:
                        text: Sustainability
                        level: 3
                        typography: { size: lg, weight: bold, color: *color-primary, align: center }
                        spacing: { marginBlock: sm }
                    - name: paragraph
                      properties:
                        text: We are committed to building a better future. From our office practices to our digital solutions, we prioritize environmental responsibility and long-term thinking.
                        typography: { size: sm, color: *color-secondary, align: center }

            # Value 5 - Excellence
            - components:
                - name: layout-column
                  properties:
                    layout: { horizontalAlign: center }
                    appearance: { background: { color: '#ffffff', opacity: 100 }, radius: lg, shadow: soft }
                    spacing: { paddingBlock: xl, paddingInline: md }
                  components:
                    - name: icon
                      properties: { name: heart, size: "48", color: *color-accent }
                    - name: heading
                      properties:
                        text: Excellence
                        level: 3
                        typography: { size: lg, weight: bold, color: *color-primary, align: center }
                        spacing: { marginBlock: sm }
                    - name: paragraph
                      properties:
                        text: Good enough is never enough. We hold ourselves to the highest standards of quality, continuously refining our craft and delivering work we are truly proud of.
                        typography: { size: sm, color: *color-secondary, align: center }

            # Value 6 - Growth
            - components:
                - name: layout-column
                  properties:
                    layout: { horizontalAlign: center }
                    appearance: { background: { color: '#ffffff', opacity: 100 }, radius: lg, shadow: soft }
                    spacing: { paddingBlock: xl, paddingInline: md }
                  components:
                    - name: icon
                      properties: { name: rocket, size: "48", color: *color-accent }
                    - name: heading
                      properties:
                        text: Growth
                        level: 3
                        typography: { size: lg, weight: bold, color: *color-primary, align: center }
                        spacing: { marginBlock: sm }
                    - name: paragraph
                      properties:
                        text: We invest in our people and nurture continuous learning. Personal and professional growth is not just encouraged — it is woven into the fabric of our culture.
                        typography: { size: sm, color: *color-secondary, align: center }
