# Food Delivery App Hero
# A vibrant, appetite-inducing hero for food delivery services
# Base components: page, titlebar, layout-row, layout-column, paragraph, heading, textbox, button, image
# Section type: hero
# Layout: split_screen
# Visual style: modern
# Perfect for: Food delivery, restaurants, meal kits, food apps

- name: page
  properties:
    theme:
      colors:
        primary: &color-primary "#1f2937"
        text: &color-text "#343A43"
        secondary: &color-secondary "#6b7280"
        accent: &color-accent "#ff6b35"
        background: &color-background "#fff8f0"
        accent-dark: &color-accent-dark "#ff4500"
        border: &color-border "#f3f4f6"
        muted: &color-muted "#9ca3af"
        nav-text: &color-nav-text "#374151"
        promo-end: &color-promo-end "#fde68a"
        promo-start: &color-promo-start "#fef3c7"
        promo-text: &color-promo-text "#92400e"
        surface: &color-surface "#fff0e6"
        surface-light: &color-surface-light "#ffffff"
    appearance:
      background:
        type: gradient
        gradient:
          colorStart: *color-background
          colorEnd: *color-surface
          direction: 'to bottom'
        transparency: 100
  components:
  # Colorful Navigation
  - name: titlebar
    properties:
      branding:
        showLogo: false
        title: "YUMMY"
      navigation:
        links:
        - label: Restaurants
          href: '#restaurants'
        - label: Cuisines
          href: '#cuisines'
        - label: Deals
          href: '#deals'
        - label: Sign in
          href: '#signin'
        - label: Get the App
          href: '#app'
      layout:
        alignment: left
        height: 56
      scroll:
        shrinkPercentage: 70
      appearance:
        background:
          color: *color-background
          transparency: 100
        border:
          width: 0
          style: solid
          color: transparent
        focus:
          background: *color-surface
          color: *color-accent
      typography:
        title:
          size: 20
          weight: bold
          color: *color-accent
        menu:
          size: 14
          weight: medium
          color: *color-nav-text

  # Hero Section
  - name: layout-row
    properties:
      layout:
        horizontalAlign: space-evenly
        wrap: wrap
        verticalAlign: center
      spacing:
        paddingBlock: xxxl
        paddingInline: xl
      appearance:
        background:
          color: *color-background
          transparency: 100
    components:
    # Left Content
    - name: layout-column
      properties:
        layout:
          horizontalAlign: space-evenly
          widthMode: "50"
      components:
      # Promo Badge
      - name: layout-row
        properties:
          layout:
            horizontalAlign: space-evenly
            verticalAlign: center
            wrap: nowrap
          appearance:
            background:
              type: gradient
              gradient:
                colorStart: *color-promo-start
                colorEnd: *color-promo-end
                direction: 'to right'
              transparency: 100
            radius: pill
        components:
        - name: paragraph
          properties:
            text: "🎉"
            typography:
              size: sm
              lineHeight: '1'
            spacing:
              marginBlock: none
        - name: paragraph
          properties:
            text: "FREE delivery on your first order!"
            typography:
              color: *color-promo-text
              size: sm
              weight: semibold
              lineHeight: '1'
            spacing:
              marginBlock: none

      # Main Headline
      - name: heading
        properties:
          text: "Craving"
          level: 1
          typography:
            color: *color-primary
            size: xxxl
            weight: bold
            lineHeight: '1.1'
          spacing:
            marginBlock: none

      - name: heading
        properties:
          text: "something"
          level: 1
          typography:
            color: *color-primary
            size: xxxl
            weight: bold
            lineHeight: '1.1'
          spacing:
            marginBlock: none

      - name: heading
        properties:
          text: "delicious?"
          level: 1
          typography:
            color: *color-accent
            size: xxxl
            weight: bold
            lineHeight: '1.1'
          spacing:
            marginBlock: none

      # Description
      - name: paragraph
        properties:
          text: |
            From sizzling burgers to authentic sushi, get your favorite food
            delivered hot and fresh in under 30 minutes. 5,000+ restaurants at your fingertips.
          typography:
            color: *color-secondary
            size: lg
            lineHeight: '1.6'
          spacing:
            marginBlock: md

      # Search/Location Input
      - name: layout-row
        properties:
          layout:
            horizontalAlign: space-evenly
            wrap: wrap
            verticalAlign: center
          spacing:
            marginBlock: md
            paddingBlock: sm
            paddingInline: sm
          appearance:
            background:
              color: *color-surface-light
              transparency: 100
            radius: lg
            border:
              width: 2
              style: solid
              color: *color-border
            shadow: medium
            shadowColor: *color-accent
        components:
        - name: textbox
          properties:
            label:
              show: false
            field:
              placeholder: "📍 Enter your delivery address"
            appearance:
              background:
                color: transparent
                transparency: 0
              border:
                width: 0
                style: solid
                color: transparent
            layout:
        - name: button
          properties:
            text: "Find Food"
            appearance:
              background:
                type: gradient
                gradient:
                  colorStart: *color-accent
                  colorEnd: *color-accent-dark
