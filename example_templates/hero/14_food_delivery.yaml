              border:
                width: 0
                style: solid
                color: transparent
              shadow: medium
              shadowColor: *color-accent
            typography:
              color: *color-surface-light
              weight: semibold
              size: md
            spacing:
              marginBlock: none

      # Quick Stats
              paddingBlock: sm
              paddingInline: lg
