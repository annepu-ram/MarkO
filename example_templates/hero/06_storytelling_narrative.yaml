# Storytelling Narrative Hero
# A cinematic, story-driven hero with layered content and emotional appeal
# Base components: page, image, layout-column, layout-row, paragraph, heading, button, blockquote
# Section type: hero
# Layout: fullscreen
# Visual style: monochrome_dark
# Content volume: rich
# Tone: formal
# Conversion intent: awareness
# Image requirement: decorative
# Interactivity: static
# Perfect for: Non-profits, documentaries, brand stories, lifestyle brands

- name: page
  properties:
    theme:
      colors:
        primary: &color-primary "#ffffff"
        text: &color-text "#DFDFDF"
        secondary: &color-secondary *color-background
        accent: &color-accent "#d4af37"
        background: &color-background "#1a1a1a"
    appearance:
      background:
        color: *color-background
        opacity: 100
  components:
    # Full-Width Cinematic Hero
  - name: image
    properties:
      source:
        url: https://images.pexels.com/photos/1076758/pexels-photo-1076758.jpeg?auto=compress&cs=tinysrgb&w=1920
        altText: Person standing on mountain peak at sunrise
      appearance:
        minHeight: 100vh
        fit: cover
        cornerStyle: none
        hoverEffect: zoom
      spacing:
        marginBlock: none
        marginInline: none
      layout:
        widthMode: stretch
    components:
        # Gradient Overlay with Story Content
    - name: layout-column
      properties:
        layout:
          horizontalAlign: space-evenly
        spacing:
          paddingBlock: xxxl
          paddingInline: xl
        appearance:
          background:
            color: linear-gradient(to right, rgba(0,0,0,0.85) 0%, rgba(0,0,0,0.4) 60%, transparent 100%)
            opacity: 100
      components:
            # Chapter / Story Marker
      - name: layout-row
        properties:
          layout:
            horizontalAlign: left
            tag: section
            verticalAlign: center
            wrap: wrap
          spacing:
            marginBlock: none
            marginInline: none
            paddingBlock: sm
            paddingInline: sm
          appearance:
            background:
              type: solid
              color: *color-primary
              opacity: 0
            border:
              width: 0
              style: solid
              color: *color-background
            radius: none
            shadow: none
            shadowColor: *color-background
        components:
        - name: paragraph
          properties:
            text: "—"
            typography:
              color: *color-accent
              size: lg
              weight: bold
              align: left
              lineHeight: "1.6"
              transform: none
              letterSpacing: normal
            spacing:
              marginBlock: none
              marginInline: none
              paddingBlock: none
              paddingInline: none
            layout:
            appearance:
              background:
                type: solid
                color: *color-text
                opacity: 0
              textShadow: soft
              radius: none
        - name: paragraph
          properties:
            text: "CHAPTER ONE"
            typography:
              color: *color-accent
              size: xl
              weight: bold
              letterSpacing: wider
              transform: uppercase
              align: left
              lineHeight: "1.6"
            spacing:
              marginBlock: none
              marginInline: none
              paddingBlock: none
              paddingInline: none
            layout:
            appearance:
              background:
                type: solid
                color: *color-text
                opacity: 0
              textShadow: soft
              radius: none
      - name: heading
        properties:
          text: "Every summit begins with a single step"
          level: 2
          layout:
            widthMode: "50"
          typography:
            color: *color-accent
            size: xxxl
            weight: bold
            lineHeight: '1.15'
            letterSpacing: tight
            align: center
            transform: none
          spacing:
            marginBlock: none
            marginInline: none
            paddingBlock: none
            paddingInline: none
          appearance:
            background:
              type: solid
              color: *color-primary
              opacity: 0
            textShadow: soft
            radius: none
      - name: paragraph
        properties:
          text: |
            In the quiet moments before dawn, when the world still sleeps,
            they begin their journey. Not for glory. Not for recognition.
            But for the pure, unfiltered experience of being alive.
          layout:
            widthMode: "33"
          typography:
            color: *color-text
            size: lg
            lineHeight: '1.8'
            weight: semibold
            align: left
            transform: none
            letterSpacing: normal
          spacing:
            marginBlock: md
            marginInline: none
            paddingBlock: none
            paddingInline: none
          appearance:
            background:
              type: solid
              color: *color-text
              opacity: 0
            textShadow: soft
            radius: none
      - name: layout-row
        properties:
          layout:
            horizontalAlign: space-evenly
            verticalAlign: center
          spacing:
            marginBlock: lg
        components:
        - name: layout-column
          properties:
            layout:
              widthMode: "33"
              horizontalAlign: space-evenly
          components:
          - name: paragraph
            properties:
              text: "LOCATION"
              typography:
                color: rgba(255,255,255,0.5)
                size: xxs
                weight: medium
                letterSpacing: wide
                transform: uppercase
              appearance:
                textShadow: soft
              spacing:
                marginBlock: none
          - name: paragraph
            properties:
              text: "Patagonia, Chile"
              typography:
                color: *color-text
                size: sm
                weight: medium
              appearance:
                textShadow: soft
              spacing:
                marginBlock: none
        - name: layout-column
          properties:
            layout:
              widthMode: "33"
              horizontalAlign: space-evenly
          components:
          - name: paragraph
            properties:
              text: "ELEVATION"
              typography:
                color: rgba(255,255,255,0.5)
                size: xxs
                weight: medium
                letterSpacing: wide
                transform: uppercase
              appearance:
                textShadow: soft
              spacing:
                marginBlock: none
          - name: paragraph
            properties:
              text: "4,892 meters"
              typography:
                color: *color-text
                size: sm
                weight: medium
              appearance:
                textShadow: soft
              spacing:
                marginBlock: none
        - name: layout-column
          properties:
            layout:
              widthMode: "33"
              horizontalAlign: space-evenly
          components:
          - name: paragraph
            properties:
              text: "EXPEDITION"
              typography:
                color: rgba(255,255,255,0.5)
                size: xxs
                weight: medium
                letterSpacing: wide
                transform: uppercase
              appearance:
                textShadow: soft
              spacing:
                marginBlock: none
          - name: paragraph
            properties:
              text: "12 Days"
              typography:
                color: *color-text
                size: sm
                weight: medium
              appearance:
                textShadow: soft
              spacing:
                marginBlock: none

            # CTA - Subtle & Elegant
      - name: layout-row
        properties:
          layout:
            horizontalAlign: space-evenly
            verticalAlign: center
          spacing:
            marginBlock: xl
        components:
        - name: button
          properties:
            text: "Begin the Journey"
            appearance:
              background:
                type: gradient
                gradient:
                  colorStart: *color-accent
                  colorEnd: *color-accent
                  direction: to right
              border:
                width: 0
                style: solid
                color: transparent
              shadow: medium
              shadowColor: *color-accent
            typography:
              color: *color-secondary
              weight: semibold
              size: md
            spacing:
              marginBlock: none
              paddingBlock: md
              paddingInline: xl
        - name: button
          properties:
            text: "Watch Documentary"
            appearance:
              background:
                color: transparent
                opacity: 0
              border:
                width: 1
                style: solid
                color: rgba(255,255,255,0.4)
            typography:
              color: *color-primary
              weight: medium
              size: md
            spacing:
              marginBlock: none

            # Bottom Quote
              paddingBlock: md
              paddingInline: xl
      - name: layout-column
        properties:
          layout:
            horizontalAlign: space-evenly
          spacing:
            marginBlock: xxl
        components:
        - name: blockquote
          properties:
            quote: "The mountains are calling and I must go."
            cite: " John Muir"
            typography:
              size: md
              weight: light
              color: *color-text
              align: center
              lineHeight: "1.6"
              transform: none
              letterSpacing: normal
            appearance:
              background:
                color: transparent
                opacity: 0
                type: solid
              border:
                accentColor: *color-accent
                width: 2
                style: solid
                position: left
              radius: none
              shadow: none
              shadowColor: *color-background
              textShadow: soft
            spacing:
              marginBlock: none
              marginInline: none
              paddingBlock: md
              paddingInline: md
            layout:
              widthMode: stretch
