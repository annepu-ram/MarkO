# Full-Screen Immersive Hero
# A dramatic, full-screen hero with stunning background imagery
# Base components: page, image, layout-column, layout-row, paragraph, heading, button
# Section type: hero
# Layout: fullscreen
# Visual style: dark_mode
# Perfect for: Travel, hospitality, luxury brands, creative agencies

- name: page
  properties:
    theme:
      colors:
        primary: &color-primary "#ffffff"
        text: &color-text "#DFDFDF"
        secondary: &color-secondary "#0a0a0a"
        accent: &color-accent "#ffffff"
        background: &color-background "#0a0a0a"
    appearance:
      background:
        color: *color-background
        transparency: 100
  components:
  # Full-Screen Hero with Centered Content
  - name: image
    properties:
      source:
        url: https://images.pexels.com/photos/1287145/pexels-photo-1287145.jpeg?auto=compress&cs=tinysrgb&w=1920
        altText: Majestic mountain landscape at golden hour
      appearance:
        minHeight: 100vh
        fit: cover
        cornerStyle: none
        hoverEffect: zoom
      spacing:
        marginBlock: none
        marginInline: none
      layout:
        widthMode: stretch
    components:
    # Dark Gradient Overlay for Text Readability
    - name: layout-column
      properties:
        layout:
          horizontalAlign: space-evenly
        spacing:
          paddingBlock: xxxl
          paddingInline: lg
        appearance:
          background:
            color: rgba(0,0,0,0.45)
            transparency: 100
      components:
      # Eyebrow Badge
      - name: layout-row
        properties:
          layout:
            horizontalAlign: space-evenly
            verticalAlign: center
            wrap: nowrap
        components:
        - name: paragraph
          properties:
            text: "DISCOVER THE EXTRAORDINARY"
            typography:
              color: *color-text
              size: xs
              weight: medium
              letterSpacing: wider
              transform: uppercase
              lineHeight: '1'
            spacing:
              marginBlock: none
            appearance:
              background:
                color: rgba(255,255,255,0.15)
                transparency: 100
              radius: pill
              shadow: medium
      - name: heading
        properties:
          text: "Explore Beyond Horizons"
          level: 1
          typography:
            color: *color-primary
            size: xxxl
            weight: bold
            align: center
            letterSpacing: tight
          spacing:
            marginBlock: none
        layout:
          widthMode: 75

      # Sub-headline
      - name: paragraph
        properties:
          text: |
            Embark on journeys that transform. From snow-capped peaks to endless coastlines,
            discover destinations that speak to your soul and awaken your sense of wonder.
          typography:
            color: rgba(255,255,255,0.9)
            size: lg
            align: center
            lineHeight: '1.7'
            weight: light
          spacing:
            marginBlock: md
          layout:
            widthMode: 50

      # CTA Buttons
      - name: layout-row
        properties:
          layout:
            horizontalAlign: space-evenly
            wrap: wrap
            verticalAlign: center
          spacing:
            marginBlock: lg
        components:
        - name: button
          properties:
            text: Start Your Journey
            appearance:
              background:
                color: *color-accent
                transparency: 100
              border:
                width: 0
                style: solid
                color: transparent
            typography:
              color: *color-secondary
              weight: semibold
              size: md
            spacing:
              marginBlock: none
              paddingBlock: md
              paddingInline: xl
        - name: button
          properties:
            text: Watch Film
            appearance:
              background:
                color: transparent
                transparency: 0
              border:
                width: 2
                style: solid
                color: *color-primary
            typography:
              color: *color-primary
              weight: semibold
              size: md
            spacing:
              marginBlock: none

      # Scroll Indicator
              paddingBlock: md
              paddingInline: xl
      - name: layout-column
        properties:
          layout:
            horizontalAlign: space-evenly
          spacing:
            marginBlock: xl
        components:
        - name: paragraph
          properties:
            text: "Scroll to explore"
            typography:
              color: rgba(255,255,255,0.6)
              size: xs
              align: center
              weight: light
              letterSpacing: wide
            spacing:
              marginBlock: none
        - name: paragraph
          properties:
            text: "↓"
            typography:
              color: rgba(255,255,255,0.6)
              size: lg
              align: center
            spacing:
              marginBlock: none
