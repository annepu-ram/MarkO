# Video Background Style Hero
# Simulated with a carousel for dynamic visual movement
# Perfect for: Entertainment, events, music, nightlife, sports

- name: page
  properties:
    theme:
      colors:
        primary: &color-primary "#ffffff"
        secondary: &color-secondary "#ef4444"
        accent: &color-accent "#fbbf24"
        accent-dark: &color-accent-dark "#f59e0b"
        background: &color-background "#000000"
    appearance:
      background:
        color: *color-background
        transparency: 100
  components:
  # Hero with Carousel Background (simulating video)
  - name: carousel
    properties:
      behavior:
        autoplay: true
        delay: 3000
        loop: true
      navigation:
        showArrows: false
        showDots: false
      spacing:
        marginBlock: none
        marginInline: none
    slides:
    - components:
      - name: image
        properties:
          source:
            url: https://images.pexels.com/photos/1763075/pexels-photo-1763075.jpeg?auto=compress&cs=tinysrgb&w=1920
            altText: Concert crowd with lights
          appearance:
            minHeight: 100vh
            fit: cover
            cornerStyle: none
            hoverEffect: zoom
          layout:
            widthMode: stretch
          spacing:
            marginBlock: none
        components:
        - name: layout-column
          properties:
            layout:
              align: center
              horizontalAlign: space-evenly
            spacing:
              paddingBlock: xxxl
              paddingInline: lg
            appearance:
              background:
                color: rgba(0,0,0,0.6)
                transparency: 100
          components:
          # Live Badge
          - name: layout-row
            properties:
              layout:
                align: center
                horizontalAlign: space-evenly
              appearance:
                background:
                  color: rgba(239,68,68,0.15)
                  transparency: 100
                radius: pill
                border:
                  width: 1
                  style: solid
                  color: rgba(239,68,68,0.3)
                padding:
                  block: xs
                  inline: md
            components:
            - name: paragraph
              properties:
                text: "●"
                typography:
                  color: *color-secondary
                  size: sm
                spacing:
                  marginBlock: none
            - name: paragraph
              properties:
                text: "LIVE EVENT"
                typography:
                  color: *color-primary
                  size: xs
                  weight: bold
                  letterSpacing: wider
                  transform: uppercase
                spacing:
                  marginBlock: none
          # Main Headline
          - name: heading
            properties:
              text: "ELECTRIC NIGHTS"
              level: 1
              typography:
                color: *color-primary
                size: xxxl
                weight: bold
                align: center
                letterSpacing: wide
              spacing:
                marginBlock: none
          - name: heading
            properties:
              text: "FESTIVAL 2026"
              level: 2
              typography:
                color: *color-accent
                size: xxl
                weight: bold
                align: center
                letterSpacing: wide
              spacing:
                marginBlock: none
          # Date & Location
          - name: paragraph
            properties:
              text: "AUGUST 15-17  •  CENTRAL PARK, NYC"
              typography:
                color: rgba(255,255,255,0.8)
                size: md
                align: center
                letterSpacing: wide
              spacing:
                marginBlock: md
          # CTAs
          - name: layout-row
            properties:
              layout:
                align: center
                horizontalAlign: space-evenly
                wrap: wrap
              spacing:
                marginBlock: lg
            components:
            - name: button
              properties:
                text: "Get Tickets"
                appearance:
                  background:
                    type: gradient
                    gradient:
                      colorStart: *color-accent
                      colorEnd: *color-accent-dark
                      direction: to right
                  border:
                    width: 0
                    style: solid
                    color: transparent
                  padding:
                    block: md
                    inline: xl
                  shadow: medium
                  shadowColor: *color-accent
                typography:
                  color: *color-background
                  weight: bold
                  size: md
                spacing:
                  marginBlock: none
            - name: button
              properties:
                text: "View Lineup"
                appearance:
                  background:
                    color: transparent
                    transparency: 0
                  border:
                    width: 2
                    style: solid
                    color: *color-primary
                  padding:
                    block: md
                    inline: xl
                typography:
                  color: *color-primary
                  weight: semibold
                  size: md
                spacing:
                  marginBlock: none
          # Countdown
          - name: layout-row
            properties:
              layout:
                align: center
                horizontalAlign: space-evenly
              spacing:
                marginBlock: xl
            components:
            - name: layout-column
              properties:
                layout:
                  align: center
                  horizontalAlign: space-evenly
                appearance:
              components:
              - name: heading
                properties:
                  text: "127"
                  level: 2
                  typography:
                    color: *color-primary
                    size: xxl
                    weight: bold
                    align: center
                  spacing:
                    marginBlock: none
              - name: paragraph
                properties:
                  text: "DAYS"
                  typography:
                    color: rgba(255,255,255,0.6)
                    size: xs
                    align: center
                    letterSpacing: wide
                  spacing:
                    marginBlock: none
            - name: paragraph
              properties:
                text: ":"
                typography:
                  color: *color-accent
                  size: xxl
                  weight: bold
                spacing:
                  marginBlock: none
                layout:
            - name: layout-column
              properties:
                layout:
                  align: center
                  horizontalAlign: space-evenly
                appearance:
              components:
              - name: heading
                properties:
                  text: "14"
                  level: 2
                  typography:
                    color: *color-primary
                    size: xxl
                    weight: bold
                    align: center
                  spacing:
                    marginBlock: none
              - name: paragraph
                properties:
                  text: "HOURS"
                  typography:
                    color: rgba(255,255,255,0.6)
                    size: xs
                    align: center
                    letterSpacing: wide
                  spacing:
                    marginBlock: none
            - name: paragraph
              properties:
                text: ":"
                typography:
                  color: *color-accent
                  size: xxl
                  weight: bold
                spacing:
                  marginBlock: none
                layout:
            - name: layout-column
              properties:
                layout:
                  align: center
                  horizontalAlign: space-evenly
                appearance:
              components:
              - name: heading
                properties:
                  text: "32"
                  level: 2
                  typography:
                    color: *color-primary
                    size: xxl
                    weight: bold
                    align: center
                  spacing:
                    marginBlock: none
              - name: paragraph
                properties:
                  text: "MINS"
                  typography:
                    color: rgba(255,255,255,0.6)
                    size: xs
                    align: center
                    letterSpacing: wide
                  spacing:
                    marginBlock: none
    - components:
      - name: image
        properties:
          source:
            url: https://images.pexels.com/photos/1540406/pexels-photo-1540406.jpeg?auto=compress&cs=tinysrgb&w=1920
            altText: DJ performing on stage
          appearance:
            minHeight: 100vh
            fit: cover
            cornerStyle: none
            hoverEffect: zoom
          layout:
            widthMode: stretch
          spacing:
            marginBlock: none
        components:
        - name: layout-column
          properties:
            layout:
              align: center
              horizontalAlign: space-evenly
            spacing:
              paddingBlock: xxxl
              paddingInline: lg
            appearance:
              background:
                color: rgba(0,0,0,0.6)
                transparency: 100
          components:
          - name: layout-row
            properties:
              layout:
                align: center
                horizontalAlign: space-evenly
            components:
            - name: paragraph
              properties:
                text: "●"
                typography:
                  color: *color-secondary
                  size: sm
                spacing:
                  marginBlock: none
            - name: paragraph
              properties:
                text: "LIVE EVENT"
                typography:
                  color: *color-primary
                  size: xs
                  weight: bold
                  letterSpacing: wider
                  transform: uppercase
                spacing:
                  marginBlock: none
          - name: heading
            properties:
              text: "ELECTRIC NIGHTS"
              level: 1
              typography:
                color: *color-primary
                size: xxxl
                weight: bold
                align: center
                letterSpacing: wide
              spacing:
                marginBlock: none
          - name: heading
            properties:
              text: "FESTIVAL 2026"
              level: 2
              typography:
                color: *color-accent
                size: xxl
                weight: bold
                align: center
                letterSpacing: wide
              spacing:
                marginBlock: none
