# Cyberpunk Neon Hero
# Dark futuristic hero with neon green accents and monospace-inspired typography
# Base components: site, page, layout-row, layout-column, eyebrow, heading, paragraph, button, image
# Section type: hero
# Layout: split_screen
# Visual style: cyberpunk_neon
# Content volume: standard
# Tone: playful
# Conversion intent: awareness
# Image requirement: decorative
# Interactivity: static
# Industries: saas, entertainment
# Perfect for: Gaming, tech startup, hacker tools, crypto, cybersecurity, AI, VR, digital art

- name: site
  properties:
    theme:
      fonts:
        heading: &font-heading "'Space Grotesk', sans-serif"
        content: &font-content "'Inter', sans-serif"
      colors:
        primary: &color-primary "#E2E8F0"
        text: &color-text "#B0B8C8"
        secondary: &color-secondary "#1A1A2E"
        accent: &color-accent "#00FF41"
        background: &color-background "#0A0A0F"
  components:
    - name: page
      slug: home
      title: "Cyberpunk Neon Hero"
      properties:
        appearance:
          background:
            color: *color-background
            opacity: 100
      components:

        # Hero section — dark with neon accents
        - name: layout-row
          properties:
            layout:
              wrap: wrap
              verticalAlign: center
              horizontalAlign: center
              tag: section
              gap: lg
            spacing:
              paddingBlock: xxxl
              paddingInline: xl
            appearance:
              background:
                color: *color-background
                opacity: 100
              border:
                width: 0
              radius: none
              shadow: none
          components:

            # Left column — text content
            - name: layout-column
              properties:
                layout:
                  widthMode: "50"
                  gap: md
                spacing:
                  paddingInline: lg
              components:

                # Terminal-style eyebrow
                - name: eyebrow
                  properties:
                    text: "> INITIALIZING_PROTOCOL"
                    typography:
                      color: *color-accent
                      size: xs
                      weight: medium
                      letterSpacing: wider

                - name: heading
                  properties:
                    text: "Break the system. Build the future."
                    level: 1
                    typography:
                      color: *color-primary
                      size: xxl
                      weight: bold
                      lineHeight: snug

                - name: paragraph
                  properties:
                    text: |
                      Next-generation infrastructure for the decentralized web.
                      Deploy anywhere, scale instantly, and maintain full control
                      over your digital sovereign stack.
                    typography:
                      color: *color-text
                      size: md
                      weight: regular
                      lineHeight: relaxed

                # CTA buttons
                - name: layout-row
                  properties:
                    layout:
                      horizontalAlign: left
                      verticalAlign: center
                      wrap: wrap
                      gap: md
                    spacing:
                      marginBlock: md
                  components:
                    - name: button
                      properties:
                        text: "Launch Terminal"
                        appearance:
                          background:
                            color: transparent
                            opacity: 0
                          border:
                            width: 1
                            style: solid
                            color: *color-accent
                          radius: xs
                          shadow: none
                        typography:
                          color: *color-accent
                          weight: semibold
                          size: md
                        spacing:
                          paddingBlock: md
                          paddingInline: xl
                    - name: button
                      properties:
                        text: "Read Docs"
                        appearance:
                          background:
                            color: transparent
                            opacity: 0
                          border:
                            width: 1
                            style: solid
                            color: "#333344"
                          radius: xs
                          shadow: none
                        typography:
                          color: *color-text
                          weight: medium
                          size: md
                        spacing:
                          paddingBlock: md
                          paddingInline: xl

            # Right column — image with neon border
            - name: layout-column
              properties:
                layout:
                  widthMode: "50"
                  horizontalAlign: center
              components:
                - name: layout-column
                  properties:
                    appearance:
                      background:
                        color: *color-secondary
                        opacity: 100
                      border:
                        width: 1
                        style: solid
                        color: *color-accent
                      radius: xs
                      shadow: none
                    spacing:
                      paddingBlock: sm
                      paddingInline: sm
                  components:
                    - name: image
                      properties:
                        source:
                          url: https://images.pexels.com/photos/2653362/pexels-photo-2653362.jpeg?auto=compress&cs=tinysrgb&w=800
                          altText: Futuristic neon cityscape with digital elements
                        appearance:
                          minHeight: 25
                          fit: cover
                          radius: xs
