    - name: paragraph
      properties:
        text: |
          The all-in-one platform that helps teams move faster. Automate repetitive tasks,
          collaborate in real-time, and ship products 10x faster than before.
        typography:
          color: '#6b7280'
          size: lg
          align: center
          lineHeight: '1.6'
        spacing:
          marginBlock: md
        layout:
          widthMode: 50

    # CTA with Social Proof
    - name: layout-column
      properties:
        layout:
          align: center
          horizontalAlign: space-evenly
        spacing:
          marginBlock: md
      components:
      - name: layout-row
        properties:
          layout:
            align: center
            horizontalAlign: space-evenly
            wrap: wrap
        components:
        - name: textbox
          properties:
            label:
              show: false
            field:
              placeholder: "Enter your work email"
            appearance:
              background:
                color: '#ffffff'
                transparency: 100
              border:
                width: 1
                style: solid
                color: '#d1d5db'
              radius: md
              padding:
                block: sm
                inline: md
            layout:
              widthMode: fit
        - name: button
          properties:
            text: "Start Free Trial →"
            appearance:
              background:
                color: '#4f46e5'
                transparency: 100
              border:
                width: 0
                style: solid
                color: transparent
              padding:
                block: sm
                inline: lg
            typography:
              color: '#ffffff'
              weight: semibold
              size: md
            spacing:
              marginBlock: none

      - name: paragraph
        properties:
          text: "No credit card required  •  14-day free trial  •  Cancel anytime"
          typography:
            color: '#9ca3af'
            size: xs
          spacing:
            marginBlock: none

