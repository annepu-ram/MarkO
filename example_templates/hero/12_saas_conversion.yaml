            inline: md
          shadow: '0 1px 2px rgba(0,0,0,0.05)'
      components:
      - name: layout-row
        properties:
          layout:
            align: center
            horizontalAlign: none
        components:
        - name: paragraph
          properties:
            text: "★★★★★"
            typography:
              color: '#fbbf24'
              size: sm
            spacing:
              marginBlock: none
      - name: paragraph
        properties:
