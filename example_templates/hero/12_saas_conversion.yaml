# SaaS Conversion Hero - OpenBank Style
# A clean, professional fintech hero with split layout and visual card grid
# Perfect for: Fintech, SaaS products, B2B software, banking apps

- name: page
  properties:
    theme:
      colors:
        primary: &color-primary "#1a1a1a"
        secondary: &color-secondary "#6b7280"
        accent: &color-accent "#2d5a4a"
        background: &color-background "#f8f6f1"
    appearance:
      background:
        color: *color-background
        transparency: 100
  components:
  # Navigation
  - name: titlebar
    properties:
      branding:
        showLogo: true
        logoUrl: https://images.unsplash.com/photo-1611974789855-9c2a0a7236a3?auto=format&fit=crop&w=50&h=50
        title: "OpenBank"
      navigation:
        links:
        - label: Features
          href: '#features'
        - label: Use cases
          href: '#usecases'
        - label: Pricing
          href: '#pricing'
        - label: Blog
          href: '#blog'
        - label: How it works
          href: '#howitworks'
        - label: Sign up
          href: '#signup'
      layout:
        alignment: left
        height: 72
      scroll:
        shrinkPercentage: 70
      appearance:
        background:
          color: *color-background
          transparency: 100
        border:
          width: 0
          style: solid
          color: transparent
        focus:
          background: *color-background
          color: *color-accent
      typography:
        title:
          size: 20
          weight: semibold
          color: *color-primary
        menu:
          size: 14
          weight: medium
          color: *color-primary

  # Hero Section - Split Layout
  - name: layout-row
    properties:
      layout:
        align: center
        horizontalAlign: space-evenly
        wrap: wrap
      spacing:
        paddingBlock: xxxl
        paddingInline: xl
      appearance:
        background:
          color: *color-background
          transparency: 100
    components:
    # Left Content
    - name: layout-column
      properties:
        layout:
          align: start
          horizontalAlign: space-evenly
          gap: sm
        appearance:
          widthMode: 45
      components:
      # Eyebrow with dash
      - name: layout-row
        properties:
          layout:
            align: center
            horizontalAlign: space-evenly
          spacing:
            marginBlock: none
        components:
        - name: paragraph
          properties:
            text: "—"
            typography:
              color: *color-accent
              size: md
              weight: bold
            spacing:
              marginBlock: none
        - name: eyebrow
          properties:
            text: "TRY IT NOW!"
            typography:
              color: *color-accent
              size: xs
              weight: semibold
              letterSpacing: wider
              transform: uppercase
            spacing:
              marginBlock: none

      # Main Headline
      - name: heading
        properties:
          text: "Instant Payment with"
          level: 1
          typography:
            color: *color-primary
            size: xxxl
            weight: bold
            lineHeight: '1.1'
          spacing:
            marginBlock: none

      - name: heading
        properties:
          text: "Open Banking"
          level: 1
          typography:
            color: *color-accent
            size: xxxl
            weight: bold
            lineHeight: '1.1'
          spacing:
            marginBlock: none

      # Description
      - name: paragraph
        properties:
          text: |
            Our advanced technology and secure systems
            provide a safe and reliable way to transfer funds,
            allowing you to improved efficiency.
          typography:
            color: *color-secondary
            size: md
            lineHeight: '1.7'
          spacing:
            marginBlock: md

      # CTA Button
      - name: button
        properties:
          text: "Get demo account"
          appearance:
            background:
              color: *color-accent
              transparency: 100
            border:
              width: 0
              style: solid
              color: transparent
            padding:
              block: md
              inline: xl
            radius: pill
          typography:
            color: *color-background
            weight: semibold
            size: md
          spacing:
            marginBlock: sm
          layout:

      # Star Rating + Review Count
      - name: layout-row
        properties:
          layout:
            align: center
            horizontalAlign: space-evenly
          spacing:
            marginBlock: sm
        components:
        - name: paragraph
          properties:
            text: "★★★★★"
            typography:
              color: *color-accent
              size: md
            spacing:
              marginBlock: none
        - name: paragraph
          properties:
            text: "4.8"
            typography:
              color: *color-accent
              size: md
              weight: bold
            spacing:
              marginBlock: none
        - name: paragraph
          properties:
            text: "from 500+ reviews"
            typography:
              color: *color-secondary
              size: sm
            spacing:
              marginBlock: none

    # Right Side - 2x2 Visual Card Grid
    - name: layout-column
      properties:
        layout:
          align: center
          horizontalAlign: space-evenly
          gap: sm
        appearance:
          widthMode: 50
      components:
      # Top Row
      - name: layout-row
        properties:
          layout:
            align: stretch
            horizontalAlign: space-evenly
        components:
        # Credit Cards Image
        - name: image
          properties:
            source:
              url: https://images.pexels.com/photos/4482900/pexels-photo-4482900.jpeg?auto=compress&cs=tinysrgb&w=600
              altText: Credit cards stacked
            appearance:
              minHeight: 15
              fit: cover
              cornerStyle: xl
              hoverEffect: zoom
            spacing:
              marginBlock: none

        # Successful Transaction Card
        - name: layout-column
          properties:
            layout:
              align: center
              horizontalAlign: space-evenly
              gap: xs
            appearance:
              background:
                color: *color-background
                transparency: 100
              radius: xl
              padding:
                block: lg
                inline: md
          components:
          - name: paragraph
            properties:
              text: "✓"
              typography:
                color: *color-accent
                size: xl
                weight: bold
                align: center
              spacing:
                marginBlock: none
              appearance:
                background:
                  color: *color-background
                  transparency: 100
                radius: pill
                padding:
                  block: xs
                  inline: xs
          - name: heading
            properties:
              text: "Successful"
              level: 3
              typography:
                color: *color-primary
                size: md
                weight: semibold
                align: center
              spacing:
                marginBlock: none
          - name: heading
            properties:
              text: "Transaction"
              level: 3
              typography:
                color: *color-primary
                size: md
                weight: semibold
                align: center
              spacing:
                marginBlock: none
          - name: paragraph
            properties:
              text: "Date: Mar 20, 2024"
              typography:
                color: *color-secondary
                size: xs
                align: center
              spacing:
                marginBlock: none

      # Bottom Row
      - name: layout-row
        properties:
          layout:
            align: stretch
            horizontalAlign: space-evenly
        components:
        # $25,000 Card
        - name: layout-column
          properties:
            layout:
              align: center
              horizontalAlign: space-evenly
              gap: xs
            appearance:
              background:
                color: *color-accent
                transparency: 100
              radius: xl
              padding:
                block: xl
                inline: md
          components:
          - name: paragraph
            properties:
              text: "▲"
              typography:
                color: *color-background
                size: md
                align: center
              spacing:
                marginBlock: none
          - name: heading
            properties:
              text: "$25,000"
              level: 2
              typography:
                color: *color-background
                size: xxl
                weight: bold
                align: center
              spacing:
                marginBlock: none
          - name: paragraph
            properties:
              text: "Sent to Jack"
              typography:
                color: 'rgba(255,255,255,0.7)'
                size: sm
                align: center
              spacing:
                marginBlock: none

        # Payment Terminal Image
        - name: image
          properties:
            source:
              url: https://images.pexels.com/photos/4482933/pexels-photo-4482933.jpeg?auto=compress&cs=tinysrgb&w=600
              altText: Mobile payment at terminal
            appearance:
              minHeight: 15
              fit: cover
              cornerStyle: xl
              hoverEffect: zoom
            spacing:
              marginBlock: none
