# SaaS Conversion Hero - OpenBank Style
# A clean, professional fintech hero with split layout and visual card grid
# Base components: page, titlebar, layout-row, layout-column, paragraph, eyebrow, heading, button, image
# Section type: hero
# Layout: split_screen
# Visual style: modern_minimalist
# Perfect for: Fintech, SaaS products, B2B software, banking apps

- name: page
  properties:
    theme:
      colors:
        primary: &color-primary "#1a1a1a"
        text: &color-text "#313131"
        secondary: &color-secondary "#6b7280"
        accent: &color-accent "#2d5a4a"
        background: &color-background "#f8f6f1"
    appearance:
      background:
        color: *color-background
        opacity: 100
  components:
    # Navigation
  - name: titlebar
    properties:
      branding:
        showLogo: true
        logoUrl: https://images.unsplash.com/photo-1611974789855-9c2a0a7236a3?auto=format&fit=crop&w=50&h=50
        title: "OpenBank"
      navigation:
        links:
        - label: Features
          href: '#features'
        - label: Use cases
          href: '#usecases'
        - label: Pricing
          href: '#pricing'
        - label: Blog
          href: '#blog'
        - label: How it works
          href: '#howitworks'
        - label: Sign up
          href: '#signup'
      layout:
        alignment: left
        height: 72
      scroll:
        shrinkPercentage: 70
      appearance:
        background:
          color: *color-background
          opacity: 100
        border:
          width: 0
          style: solid
          color: transparent
        focus:
          background: *color-background
          color: *color-accent
      typography:
        title:
          size: 20
          weight: semibold
          color: *color-primary
        menu:
          size: 14
          weight: medium
          color: *color-primary

    # Hero Section - Split Layout
  - name: layout-row
    properties:
      layout:
        horizontalAlign: space-evenly
        wrap: wrap
        verticalAlign: center
      spacing:
        paddingBlock: xxxl
        paddingInline: xl
      appearance:
        background:
          color: *color-background
          opacity: 100
    components:
        # Left Content
    - name: layout-column
      properties:
        layout:
          horizontalAlign: ""
          gap: sm
          tag: section
          verticalAlign: space-between
          wrap: nowrap
          widthMode: "50"
        appearance:
          background:
            type: ""
            color: *color-background
            opacity: 0
          blur: false
          border:
            width: 0
            style: solid
            color: *color-primary
          radius: none
          shadow: none
          shadowColor: "#000000"
        spacing:
          marginBlock: none
          marginInline: none
          paddingBlock: sm
          paddingInline: sm
      components:
            # Eyebrow with dash
      - name: layout-row
        properties:
          layout:
            horizontalAlign: center
            tag: section
            verticalAlign: center
            wrap: nowrap
            gap: sm
          spacing:
            marginBlock: none
            marginInline: none
          appearance:
            background:
              type: ""
              color: *color-background
              opacity: 0
            blur: false
            border:
              width: 0
              style: solid
              color: *color-primary
            radius: none
            shadow: none
            shadowColor: "#000000"
        components:
        - name: paragraph
          properties:
            text: "—"
            typography:
              color: *color-accent
              size: xs
              weight: bold
              align: left
              lineHeight: '1'
              transform: none
              letterSpacing: normal
              fontStyle: normal
              textDecoration: none
            spacing:
              marginBlock: none
              marginInline: none
            layout:
              widthMode: fit
            appearance:
              background:
                type: ""
                color: *color-background
                opacity: 0
        - name: eyebrow
          properties:
            text: "TRY IT NOW!"
            typography:
              color: *color-accent
              size: xs
              weight: semibold
              letterSpacing: wider
              transform: uppercase
              align: left
              lineHeight: '1'
              fontStyle: normal
              textDecoration: none
            spacing:
              marginBlock: none
              marginInline: none
            layout:
              widthMode: fit
            appearance:
              background:
                type: ""
                color: *color-background
                opacity: 0

            # Main Headline
      - name: heading
        properties:
          text: "Instant Payment with"
          level: 1
          typography:
            color: *color-primary
            size: xxxl
            weight: bold
            lineHeight: '1.1'
          spacing:
            marginBlock: none

      - name: heading
        properties:
          text: "Open Banking"
          level: 1
          typography:
            color: *color-accent
            size: xxxl
            weight: bold
            lineHeight: '1.1'
          spacing:
            marginBlock: none

            # Description
      - name: paragraph
        properties:
          text: |
            Our advanced technology and secure systems
            provide a safe and reliable way to transfer funds,
            allowing you to improved efficiency.
          typography:
            color: *color-secondary
            size: md
            lineHeight: '1.7'
          spacing:
            marginBlock: md

            # CTA Button
      - name: button
        properties:
          text: "Get demo account"
          appearance:
            background:
              color: *color-accent
              opacity: 100
            border:
              width: 0
              style: solid
              color: transparent
            radius: pill
          typography:
            color: *color-background
            weight: semibold
            size: md
          spacing:
            marginBlock: sm
            paddingBlock: md
            paddingInline: xl
          layout:

                  # Star Rating + Review Count
      - name: layout-row
        properties:
          layout:
            horizontalAlign: space-evenly
            verticalAlign: center
          spacing:
            marginBlock: sm
        components:
        - name: paragraph
          properties:
            text: "★★★★★"
            typography:
              color: *color-accent
              size: md
            spacing:
              marginBlock: none
        - name: paragraph
          properties:
            text: "4.8"
            typography:
              color: *color-accent
              size: md
              weight: bold
            spacing:
              marginBlock: none
        - name: paragraph
          properties:
            text: "from 500+ reviews"
            typography:
              color: *color-secondary
              size: sm
            spacing:
              marginBlock: none

        # Right Side - 2x2 Visual Card Grid
    - name: layout-column
      properties:
        layout:
          horizontalAlign: ""
          gap: sm
          tag: section
          verticalAlign: space-between
          wrap: nowrap
          widthMode: "50"
        appearance:
          background:
            type: ""
            color: *color-background
            opacity: 0
          blur: false
          border:
            width: 0
            style: solid
            color: *color-primary
          radius: none
          shadow: none
          shadowColor: "#000000"
        spacing:
          marginBlock: none
          marginInline: none
          paddingBlock: sm
          paddingInline: sm
      components:
            # Top Row
      - name: layout-row
        properties:
          layout:
            horizontalAlign: space-evenly
            verticalAlign: stretch
        components:
                # Credit Cards Image
        - name: image
          properties:
            source:
              url: https://images.pexels.com/photos/4482900/pexels-photo-4482900.jpeg?auto=compress&cs=tinysrgb&w=600
              altText: Credit cards stacked
            appearance:
              minHeight: 15
              fit: cover
              cornerStyle: xl
              hoverEffect: zoom
            spacing:
              marginBlock: none

                # Successful Transaction Card
        - name: layout-column
          properties:
            layout:
              horizontalAlign: space-evenly
              gap: xs
            appearance:
              background:
                color: *color-background
                opacity: 100
              radius: xl
            spacing:
              paddingBlock: lg
              paddingInline: md
          components:
          - name: paragraph
            properties:
              text: "✓"
              typography:
                color: *color-accent
                size: xl
                weight: bold
                align: center
              spacing:
                marginBlock: none
                paddingBlock: xs
                paddingInline: xs
              appearance:
                background:
                  color: *color-background
                  opacity: 100
                radius: pill
          - name: heading
            properties:
              text: "Successful"
              level: 3
              typography:
                color: *color-primary
                size: md
                weight: semibold
                align: center
              spacing:
                marginBlock: none
          - name: heading
            properties:
              text: "Transaction"
              level: 3
              typography:
                color: *color-primary
                size: md
                weight: semibold
                align: center
              spacing:
                marginBlock: none
          - name: paragraph
            properties:
              text: "Date: Mar 20, 2024"
              typography:
                color: *color-secondary
                size: xs
                align: center
              spacing:
                marginBlock: none

            # Bottom Row
      - name: layout-row
        properties:
          layout:
            horizontalAlign: space-evenly
            verticalAlign: stretch
        components:
                # $25,000 Card
        - name: layout-column
          properties:
            layout:
              horizontalAlign: space-evenly
              gap: xs
            appearance:
              background:
                color: *color-accent
                opacity: 100
              radius: xl
            spacing:
              paddingBlock: xl
              paddingInline: md
          components:
          - name: paragraph
            properties:
              text: "▲"
              typography:
                color: *color-background
                size: md
                align: center
              spacing:
                marginBlock: none
          - name: heading
            properties:
              text: "$25,000"
              level: 2
              typography:
                color: *color-background
                size: xxl
                weight: bold
                align: center
              spacing:
                marginBlock: none
          - name: paragraph
            properties:
              text: "Sent to Jack"
              typography:
                color: 'rgba(255,255,255,0.7)'
                size: sm
                align: center
              spacing:
                marginBlock: none

                # Payment Terminal Image
        - name: image
          properties:
            source:
              url: https://images.pexels.com/photos/4482933/pexels-photo-4482933.jpeg?auto=compress&cs=tinysrgb&w=600
              altText: Mobile payment at terminal
            appearance:
              minHeight: 15
              fit: cover
              cornerStyle: xl
              hoverEffect: zoom
            spacing:
              marginBlock: none
