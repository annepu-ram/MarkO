          style: solid
          color: '#f3f4f6'
          position: bottom
    components:
    - name: heading
      properties:
        text: "Workflow"
        level: 3
        typography:
          color: '#111827'
          size: md
          weight: bold
        spacing:
          marginBlock: none
    - name: layout-row
      properties:
