          typography:
            color: '#6b7280'
            size: sm
            weight: medium
          spacing:
            marginBlock: none
      - name: link
        properties:
          text: "Solutions"
          typography:
            color: '#6b7280'
            size: sm
            weight: medium
          spacing:
            marginBlock: none
      - name: link
