# Magazine Editorial Hero
# A sophisticated, editorial-style layout inspired by fashion magazines
# Perfect for: Fashion brands, lifestyle blogs, editorial content, luxury

- name: page
  properties:
    appearance:
      background:
        color: '#f8f6f3'
        transparency: 100
  components:
  # Thin Top Bar
  - name: layout-row
    properties:
      layout:
        align: center
        horizontalAlign: none
      spacing:
        paddingBlock: xs
        paddingInline: lg
      background:
        color: '#1a1a1a'
        transparency: 100
    components:
    - name: paragraph
      properties:
        text: "AUTUMN / WINTER 2025 COLLECTION NOW AVAILABLE"
        typography:
          color: '#ffffff'
          size: xxs
          weight: medium
          letterSpacing: wider
          align: center
          transform: uppercase
        spacing:
          marginBlock: none

  # Magazine Header
  - name: layout-row
    properties:
      layout:
        align: center
        horizontalAlign: space-evenly
      spacing:
        paddingBlock: lg
        paddingInline: xl
      background:
        color: '#f8f6f3'
        transparency: 100
    components:
    - name: layout-row
      properties:
        layout:
          align: center
          horizontalAlign: space-evenly
      components:
      - name: link
        properties:
          text: "Fashion"
          typography:
            color: '#1a1a1a'
            size: xs
            weight: medium
            transform: uppercase
            letterSpacing: wide
          spacing:
            marginBlock: none
      - name: link
        properties:
          text: "Beauty"
          typography:
            color: '#1a1a1a'
            size: xs
            weight: medium
            transform: uppercase
            letterSpacing: wide
          spacing:
            marginBlock: none
    - name: heading
      properties:
        text: "VOGUE"
        level: 1
        typography:
          color: '#1a1a1a'
          size: xxxl
          weight: bold
          letterSpacing: wide
        spacing:
          marginBlock: none
    - name: layout-row
      properties:
        layout:
          align: center
          horizontalAlign: space-evenly
      components:
      - name: link
        properties:
          text: "Culture"
          typography:
            color: '#1a1a1a'
            size: xs
            weight: medium
            transform: uppercase
            letterSpacing: wide
          spacing:
            marginBlock: none
      - name: link
        properties:
          text: "Living"
          typography:
            color: '#1a1a1a'
            size: xs
            weight: medium
            transform: uppercase
            letterSpacing: wide
          spacing:
            marginBlock: none

  # Editorial Hero Layout
  - name: layout-row
    properties:
      layout:
        align: stretch
        horizontalAlign: space-evenly
        wrap: wrap
      spacing:
        paddingBlock: none
        paddingInline: sm
      background:
        color: '#f8f6f3'
        transparency: 100
    components:
    # Main Feature Image
    - name: image
      properties:
        source:
          url: https://images.pexels.com/photos/2681751/pexels-photo-2681751.jpeg?auto=compress&cs=tinysrgb&w=1200
          altText: Fashion editorial portrait
        appearance:
          minHeight: 43.75
          fit: cover
          cornerStyle: none
        layout:
          widthMode: 65
        spacing:
          marginBlock: none
      components:
      # Overlay Content
      - name: layout-column
        properties:
          layout:
            align: start
            horizontalAlign: space-evenly
          spacing:
            paddingBlock: xl
            paddingInline: lg
          appearance:
            background:
              color: linear-gradient(to top, rgba(0,0,0,0.7) 0%, transparent 60%)
              transparency: 100
        components:
        - name: layout-column
          properties:
            layout:
              align: start
              horizontalAlign: space-evenly
            spacing:
              marginBlock: xxl
          components:
          - name: paragraph
            properties:
              text: "COVER STORY"
              typography:
                color: '#ffffff'
                size: xxs
                weight: bold
                letterSpacing: wider
                transform: uppercase
              spacing:
                marginBlock: none
          - name: heading
            properties:
              text: "The Art of Quiet Luxury"
              level: 2
              typography:
                color: '#ffffff'
                size: xxl
                weight: bold
                lineHeight: '1.1'
              spacing:
                marginBlock: none
          - name: paragraph
            properties:
              text: "How understated elegance is redefining modern fashion"
              typography:
                color: rgba(255,255,255,0.8)
                size: md
              spacing:
                marginBlock: none
          - name: link
            properties:
              text: "Read the full story →"
              typography:
                color: '#ffffff'
                size: sm
                weight: medium
              spacing:
                marginBlock: sm

    # Side Column with Multiple Stories
    - name: layout-column
      properties:
        layout:
          align: stretch
          horizontalAlign: space-evenly
        spacing:
          paddingBlock: none
          paddingInline: none
        appearance:
          widthMode: 33
      components:
      # Top Story
      - name: image
        properties:
          source:
            url: https://images.pexels.com/photos/3622614/pexels-photo-3622614.jpeg?auto=compress&cs=tinysrgb&w=800
            altText: Designer accessories
          appearance:
            minHeight: 21.25
            fit: cover
            cornerStyle: none
          layout:
            widthMode: stretch
          spacing:
            marginBlock: none
        components:
        - name: layout-column
          properties:
            layout:
              align: start
              horizontalAlign: space-evenly
            spacing:
              paddingBlock: md
              paddingInline: md
            appearance:
              background:
                color: linear-gradient(to top, rgba(0,0,0,0.8) 0%, transparent 70%)
                transparency: 100
          components:
          - name: paragraph
            properties:
              text: "ACCESSORIES"
              typography:
                color: rgba(255,255,255,0.7)
                size: xxs
                weight: bold
                letterSpacing: wide
                transform: uppercase
              spacing:
                marginBlock: xxl
          - name: heading
            properties:
              text: "The Bags to Invest In"
              level: 3
              typography:
                color: '#ffffff'
                size: lg
                weight: bold
              spacing:
                marginBlock: none

      # Bottom Story
      - name: image
        properties:
          source:
            url: https://images.pexels.com/photos/1536619/pexels-photo-1536619.jpeg?auto=compress&cs=tinysrgb&w=800
            altText: Beauty editorial
          appearance:
            minHeight: 21.25
            fit: cover
            cornerStyle: none
          layout:
            widthMode: stretch
          spacing:
            marginBlock: none
        components:
        - name: layout-column
          properties:
            layout:
              align: start
              horizontalAlign: space-evenly
            spacing:
              paddingBlock: md
              paddingInline: md
            appearance:
              background:
                color: linear-gradient(to top, rgba(0,0,0,0.8) 0%, transparent 70%)
                transparency: 100
          components:
          - name: paragraph
            properties:
              text: "BEAUTY"
              typography:
                color: rgba(255,255,255,0.7)
                size: xxs
                weight: bold
                letterSpacing: wide
                transform: uppercase
              spacing:
                marginBlock: xxl
          - name: heading
            properties:
              text: "Glow Like Glass"
              level: 3
              typography:
                color: '#ffffff'
                size: lg
                weight: bold
              spacing:
                marginBlock: none

  # Trending Topics Bar
  - name: layout-row
    properties:
      layout:
        align: center
        horizontalAlign: space-evenly
        wrap: wrap
      spacing:
        paddingBlock: md
        paddingInline: lg
      background:
        color: '#ffffff'
        transparency: 100
      appearance:
        border:
          width: 1
          style: solid
          color: '#e5e5e5'
          position: top
    components:
    - name: paragraph
      properties:
        text: "TRENDING:"
        typography:
          color: '#1a1a1a'
          size: xs
          weight: bold
          letterSpacing: wide
        spacing:
          marginBlock: none
    - name: link
      properties:
        text: "Fall Fashion Week"
        typography:
          color: '#666666'
          size: xs
          weight: medium
        spacing:
          marginBlock: none
    - name: link
      properties:
        text: "Celebrity Style"
        typography:
          color: '#666666'
          size: xs
          weight: medium
        spacing:
          marginBlock: none
    - name: link
      properties:
        text: "Sustainable Fashion"
        typography:
          color: '#666666'
          size: xs
          weight: medium
        spacing:
          marginBlock: none
    - name: link
      properties:
        text: "Street Style"
        typography:
          color: '#666666'
          size: xs
          weight: medium
        spacing:
          marginBlock: none
