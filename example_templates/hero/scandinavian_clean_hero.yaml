# Scandinavian Clean Hero
# Minimal clean hero with generous whitespace, subtle borders, and arctic tones
# Base components: site, page, layout-row, layout-column, eyebrow, heading, paragraph, button, image
# Section type: hero
# Layout: split
# Visual style: scandinavian_clean
# Content volume: standard
# Tone: neutral
# Conversion intent: awareness
# Image requirement: decorative
# Interactivity: static
# Industries: professional_services, portfolio, realestate
# Perfect for: Furniture brand, architecture studio, interior design, Nordic lifestyle, home goods

- name: site
  properties:
    theme:
      fonts:
        heading: &font-heading "'Inter', sans-serif"
        content: &font-content "'Inter', sans-serif"
      colors:
        primary: &color-primary "#1A2B3C"
        text: &color-text "#4A5568"
        secondary: &color-secondary "#E2E8F0"
        accent: &color-accent "#2B6CB0"
        background: &color-background "#F7FAFC"
  components:
    - name: page
      slug: home
      title: "Scandinavian Clean Hero"
      properties:
        appearance:
          background:
            color: *color-background
            opacity: 100
      components:

        # Hero section — clean, lots of whitespace
        - name: layout-row
          properties:
            layout:
              wrap: wrap
              verticalAlign: center
              horizontalAlign: center
              tag: section
              gap: lg
            spacing:
              paddingBlock: xxxl
              paddingInline: xl
            appearance:
              background:
                color: "#ffffff"
                opacity: 100
              border:
                width: 0
              radius: none
              shadow: none
          components:

            # Left column — text content
            - name: layout-column
              properties:
                layout:
                  widthMode: "50"
                  gap: md
                spacing:
                  paddingInline: lg
              components:

                - name: eyebrow
                  properties:
                    text: "Designed for Living"
                    typography:
                      color: *color-accent
                      size: xs
                      weight: medium
                      letterSpacing: wider
                      transform: uppercase

                - name: heading
                  properties:
                    text: "Less is more. Always."
                    level: 1
                    typography:
                      color: *color-primary
                      size: xxl
                      weight: medium
                      lineHeight: snug
                      letterSpacing: tight

                - name: paragraph
                  properties:
                    text: |
                      Functional design that puts people first. Clean lines, natural materials,
                      and thoughtful details create spaces where life simply feels better.
                    typography:
                      color: *color-text
                      size: md
                      weight: regular
                      lineHeight: relaxed

                # CTA buttons
                - name: layout-row
                  properties:
                    layout:
                      horizontalAlign: left
                      verticalAlign: center
                      wrap: wrap
                      gap: md
                    spacing:
                      marginBlock: md
                  components:
                    - name: button
                      properties:
                        text: "Shop Collection"
                        appearance:
                          background:
                            color: *color-accent
                            opacity: 100
                          border:
                            width: 0
                          radius: md
                          shadow: none
                        typography:
                          color: "#ffffff"
                          weight: medium
                          size: md
                        spacing:
                          paddingBlock: md
                          paddingInline: xl
                    - name: button
                      properties:
                        text: "Our Story"
                        appearance:
                          background:
                            color: transparent
                            opacity: 0
                          border:
                            width: 1
                            style: solid
                            color: *color-secondary
                          radius: md
                          shadow: none
                        typography:
                          color: *color-primary
                          weight: medium
                          size: md
                        spacing:
                          paddingBlock: md
                          paddingInline: xl

            # Right column — clean image
            - name: layout-column
              properties:
                layout:
                  widthMode: "50"
                  horizontalAlign: center
              components:
                - name: layout-column
                  properties:
                    appearance:
                      background:
                        color: *color-background
                        opacity: 100
                      border:
                        width: 1
                        style: solid
                        color: *color-secondary
                      radius: md
                      shadow: none
                    spacing:
                      paddingBlock: sm
                      paddingInline: sm
                  components:
                    - name: image
                      properties:
                        source:
                          url: https://images.pexels.com/photos/1571460/pexels-photo-1571460.jpeg?auto=compress&cs=tinysrgb&w=800
                          altText: Minimal Scandinavian interior with clean lines
                        appearance:
                          minHeight: 25
                          fit: cover
                          radius: md
