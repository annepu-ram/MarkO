# Asymmetric Creative Hero
# A bold, unconventional layout with overlapping elements and creative tension
# Base components: page, titlebar, layout-row, layout-column, paragraph, heading, button, image, link
# Section type: hero
# Layout: split_screen
# Visual style: monochrome_dark
# Content volume: rich
# Tone: formal
# Conversion intent: awareness
# Image requirement: required
# Interactivity: static
# Industries: portfolio
# Perfect for: Creative agencies, artists, photographers, avant-garde brands

- name: page
  properties:
    theme:
      colors:
        primary: &color-primary "#ffffff"
        text: &color-text "#DFDFDF"
        secondary: &color-secondary "#808080"
        accent: &color-accent "#ff3366"
        background: &color-background "#0d0d0d"
    appearance:
      background:
        color: *color-background
        opacity: 100
  components:
  # Creative Navigation
  - name: titlebar
    properties:
      branding:
        showLogo: false
        title: "VOID"
      navigation:
        links:
        - label: Work
          href: '#work'
        - label: About
          href: '#about'
        - label: Contact
          href: '#contact'
      layout:
        alignment: left
        height: 64
      scroll:
        shrinkPercentage: 70
      appearance:
        background:
          color: *color-background
          opacity: 100
        border:
          width: 0
          style: solid
          color: transparent
        focus:
          background: *color-background
          color: *color-primary
      typography:
        title:
          size: 20
          weight: bold
          color: *color-primary
        menu:
          size: 14
          weight: medium
          color: *color-primary

  # Asymmetric Hero Layout
  - name: layout-row
    properties:
      layout:
        horizontalAlign: none
        wrap: wrap
        verticalAlign: start
      spacing:
        paddingBlock: none
        paddingInline: none
      background:
        color: *color-background
        opacity: 100
    components:
    # Left Content Area
    - name: layout-column
      properties:
        layout:
          horizontalAlign: space-evenly
          widthMode: "33"
        spacing:
          paddingBlock: xxxl
          paddingInline: md
      components:
      # Year / Index
      - name: layout-row
        properties:
          layout:
            horizontalAlign: space-evenly
            verticalAlign: center
        components:
        - name: paragraph
          properties:
            text: "©2026"
            typography:
              color: *color-secondary
              size: xs
              weight: medium
            spacing:
              marginBlock: none
        - name: paragraph
          properties:
            text: "—"
            typography:
              color: *color-secondary
              size: xs
            spacing:
              marginBlock: none
        - name: paragraph
          properties:
            text: "CREATIVE STUDIO"
            typography:
              color: *color-secondary
              size: xs
              weight: medium
              letterSpacing: wide
            spacing:
              marginBlock: none

      # Big Rotated Typography
      - name: layout-column
        properties:
          layout:
            horizontalAlign: none
        components:
        - name: heading
          properties:
            text: "WE"
            level: 1
            typography:
              color: *color-primary
              size: xxxl
              weight: bold
              lineHeight: '0.85'
            spacing:
              marginBlock: none
        - name: heading
          properties:
            text: "CREATE"
            level: 1
            typography:
              color: *color-primary
              size: xxxl
              weight: bold
              lineHeight: '0.85'
            spacing:
              marginBlock: none
        - name: heading
          properties:
            text: "BOLD"
            level: 1
            typography:
              color: *color-accent
              size: xxxl
              weight: bold
              lineHeight: '0.85'
            spacing:
              marginBlock: none

      # Description
      - name: paragraph
        properties:
          text: |
            We're a collective of designers, developers, and dreamers
            who believe in pushing boundaries. We don't follow trends—
            we set them.
          typography:
            color: *color-secondary
            size: md
            lineHeight: '1.7'
          spacing:
            marginBlock: md
          layout:
            widthMode: "75"

      # Stats in Creative Layout
      - name: layout-row
        properties:
          layout:
            horizontalAlign: space-evenly
            verticalAlign: start
          spacing:
            marginBlock: lg
        components:
        - name: layout-column
          properties:
            layout:
              horizontalAlign: none
          components:
          - name: heading
            properties:
              text: "147"
              level: 2
              typography:
                color: *color-primary
                size: xxl
                weight: bold
              spacing:
                marginBlock: none
          - name: paragraph
            properties:
              text: "Projects"
              typography:
                color: *color-secondary
                size: xs
                weight: medium
                letterSpacing: wide
                transform: uppercase
              spacing:
                marginBlock: none
        - name: layout-column
          properties:
            layout:
              horizontalAlign: none
          components:
          - name: heading
            properties:
              text: "23"
              level: 2
              typography:
                color: *color-primary
                size: xxl
                weight: bold
              spacing:
                marginBlock: none
          - name: paragraph
            properties:
              text: "Awards"
              typography:
                color: *color-secondary
                size: xs
                weight: medium
                letterSpacing: wide
                transform: uppercase
              spacing:
                marginBlock: none

      # CTA Button
      - name: button
        properties:
          text: "Explore Our Work"
          appearance:
            background:
              type: gradient
              gradient:
                colorStart: *color-accent
                colorEnd: *color-accent
                direction: to right
            border:
              width: 0
              style: solid
              color: transparent
            shadow: medium
            shadowColor: *color-accent
          typography:
            color: *color-primary
            weight: semibold
            size: sm
          spacing:
            marginBlock: lg
            paddingBlock: md
            paddingInline: md
          layout:

    # Right Image Area - Asymmetric
    - name: layout-column
      properties:
        layout:
          horizontalAlign: space-evenly
          widthMode: "66"
        spacing:
          paddingBlock: lg
          paddingInline: md
      components:
      # Main Image - Offset
      - name: image
        properties:
          source:
            url: https://images.pexels.com/photos/3184360/pexels-photo-3184360.jpeg?auto=compress&cs=tinysrgb&w=1200
            altText: Creative team in action
          appearance:
            minHeight: 31.25
            fit: cover
            cornerStyle: none
            shadow: elevated
            shadowColor: *color-accent
            hoverEffect: zoom
          layout:
            widthMode: stretch
          spacing:
            marginBlock: none

      # Small Floating Element
      - name: layout-row
        properties:
          layout:
            horizontalAlign: space-evenly
            verticalAlign: center
        components:
        - name: image
          properties:
            source:
              url: https://images.pexels.com/photos/3184418/pexels-photo-3184418.jpeg?auto=compress&cs=tinysrgb&w=400
              altText: Design detail
            appearance:
              minHeight: 12.5
              fit: cover
              cornerStyle: none
              hoverEffect: zoom
            layout:
              widthMode: "50"
            spacing:
              marginBlock: none
        - name: layout-column
          properties:
            layout:
              horizontalAlign: space-evenly
              widthMode: "50"
          components:
          - name: paragraph
            properties:
              text: "LATEST PROJECT"
              typography:
                color: *color-secondary
                size: xxs
                weight: bold
                letterSpacing: wider
                transform: uppercase
              spacing:
                marginBlock: none
          - name: heading
            properties:
              text: "Nike Air Max"
              level: 3
              typography:
                color: *color-primary
                size: lg
                weight: bold
              spacing:
                marginBlock: none
          - name: paragraph
            properties:
              text: "Brand Campaign"
              typography:
                color: *color-secondary
                size: sm
              spacing:
                marginBlock: none
          - name: link
            properties:
              text: "View Case Study →"
              typography:
                color: *color-accent
                size: sm
                weight: medium
              spacing:
                marginBlock: sm

  # Scrolling Text Marquee
  - name: layout-row
    properties:
      layout:
        horizontalAlign: space-evenly
        verticalAlign: center
      spacing:
        paddingBlock: lg
        paddingInline: none
      background:
        color: *color-accent
        opacity: 100
    components:
    - name: paragraph
      properties:
        text: "STRATEGY"
        typography:
          color: *color-background
          size: sm
          weight: bold
          letterSpacing: wider
        spacing:
          marginBlock: none
    - name: paragraph
      properties:
        text: "•"
        typography:
          color: *color-background
          size: sm
        spacing:
          marginBlock: none
    - name: paragraph
      properties:
        text: "DESIGN"
        typography:
          color: *color-background
          size: sm
          weight: bold
          letterSpacing: wider
        spacing:
          marginBlock: none
    - name: paragraph
      properties:
        text: "•"
        typography:
          color: *color-background
          size: sm
        spacing:
          marginBlock: none
    - name: paragraph
      properties:
        text: "DEVELOPMENT"
        typography:
          color: *color-background
          size: sm
          weight: bold
          letterSpacing: wider
        spacing:
          marginBlock: none
    - name: paragraph
      properties:
        text: "•"
        typography:
          color: *color-background
          size: sm
        spacing:
          marginBlock: none
    - name: paragraph
      properties:
        text: "BRANDING"
        typography:
          color: *color-background
          size: sm
          weight: bold
          letterSpacing: wider
        spacing:
          marginBlock: none
    - name: paragraph
      properties:
        text: "•"
        typography:
          color: *color-background
          size: sm
        spacing:
          marginBlock: none
    - name: paragraph
      properties:
        text: "MOTION"
        typography:
          color: *color-background
          size: sm
          weight: bold
          letterSpacing: wider
        spacing:
          marginBlock: none

