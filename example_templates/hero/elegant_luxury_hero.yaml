# Elegant Luxury Hero
# Refined split-screen hero with serif typography and gold accents
# Base components: site, page, layout-row, layout-column, eyebrow, heading, paragraph, button, image
# Section type: hero
# Layout: split_screen
# Visual style: elegant_luxury
# Content volume: standard
# Tone: formal
# Conversion intent: awareness
# Image requirement: decorative
# Interactivity: static
# Industries: beauty, restaurant, portfolio, realestate, hospitality
# Perfect for: Jewelry, hotel, fashion, interior design, real estate, spa, fine dining, wedding

- name: site
  properties:
    theme:
      fonts:
        heading: &font-heading "'Playfair Display', serif"
        content: &font-content "'Inter', sans-serif"
      colors:
        primary: &color-primary "#1A1A1A"
        text: &color-text "#4A4A4A"
        secondary: &color-secondary "#D4AF37"
        accent: &color-accent "#B8860B"
        background: &color-background "#FFFDF7"
  components:
    - name: page
      slug: home
      title: "Elegant Luxury Hero"
      properties:
        appearance:
          background:
            color: *color-background
            opacity: 100
      components:

        # Hero section — refined split with generous whitespace
        - name: layout-row
          properties:
            layout:
              wrap: wrap
              verticalAlign: center
              horizontalAlign: center
              tag: section
              gap: lg
            spacing:
              paddingBlock: xxxl
              paddingInline: xl
            appearance:
              background:
                color: *color-background
                opacity: 100
              border:
                width: 0
              radius: none
              shadow: none
          components:

            # Left column — text content
            - name: layout-column
              properties:
                layout:
                  widthMode: "50"
                  gap: md
                spacing:
                  paddingInline: lg
              components:

                # Uppercase spaced eyebrow
                - name: eyebrow
                  properties:
                    text: "Curated Excellence"
                    typography:
                      color: *color-secondary
                      size: xs
                      weight: regular
                      letterSpacing: wider
                      transform: uppercase

                - name: heading
                  properties:
                    text: "Where timeless elegance meets modern refinement"
                    level: 1
                    typography:
                      color: *color-primary
                      size: xxl
                      weight: light
                      lineHeight: snug
                      letterSpacing: wider
                      transform: uppercase

                - name: paragraph
                  properties:
                    text: |
                      Discover a world of understated luxury, where every detail is
                      meticulously crafted and every experience is designed to transcend
                      the ordinary. Our commitment to excellence is woven into every moment.
                    typography:
                      color: *color-text
                      size: md
                      weight: regular
                      lineHeight: relaxed

                # CTA buttons
                - name: layout-row
                  properties:
                    layout:
                      horizontalAlign: left
                      verticalAlign: center
                      wrap: wrap
                      gap: md
                    spacing:
                      marginBlock: md
                  components:
                    - name: button
                      properties:
                        text: "Explore Collection"
                        appearance:
                          background:
                            color: *color-primary
                            opacity: 100
                          border:
                            width: 1
                            style: solid
                            color: *color-primary
                          radius: none
                          shadow: none
                        typography:
                          color: *color-background
                          weight: regular
                          size: md
                          letterSpacing: wider
                          transform: uppercase
                        spacing:
                          paddingBlock: md
                          paddingInline: xl
                    - name: button
                      properties:
                        text: "Our Story"
                        appearance:
                          background:
                            color: transparent
                            opacity: 0
                          border:
                            width: 1
                            style: solid
                            color: *color-secondary
                          radius: none
                          shadow: none
                        typography:
                          color: *color-secondary
                          weight: regular
                          size: md
                          letterSpacing: wider
                          transform: uppercase
                        spacing:
                          paddingBlock: md
                          paddingInline: xl

            # Right column — image with subtle gold border
            - name: layout-column
              properties:
                layout:
                  widthMode: "50"
                  horizontalAlign: center
              components:
                - name: layout-column
                  properties:
                    appearance:
                      background:
                        color: *color-background
                        opacity: 100
                      border:
                        width: 1
                        style: solid
                        color: *color-secondary
                      radius: none
                      shadow: soft
                    spacing:
                      paddingBlock: sm
                      paddingInline: sm
                  components:
                    - name: image
                      properties:
                        source:
                          url: https://images.pexels.com/photos/1536619/pexels-photo-1536619.jpeg?auto=compress&cs=tinysrgb&w=800
                          altText: Elegant luxury interior with golden accents
                        appearance:
                          minHeight: 25
                          fit: cover
                          radius: none
