# Card-Based Hero (Bento Grid)
# Modern bento-style card grid with asymmetric layout, vibrant colors, and interactive elements
# Base components: page, titlebar, layout-column, layout-row, heading, paragraph, eyebrow, button
# Section type: hero
# Layout: grid
# Visual style: modern_minimalist
# Perfect for: SaaS platforms, content sites, creative portfolios, product showcases

- name: page
  properties:
    theme:
      colors:
        primary: &color-primary "#0f0f23"
        text: &color-text "#2B2B37"
        secondary: &color-secondary "#6b7280"
        accent: &color-accent "#ff006e"
        background: &color-background "#fafafa"
    appearance:
      background:
        color: *color-background
        opacity: 100
  components:

  # Compact Navigation
  - name: titlebar
    properties:
      branding:
        showLogo: false
        title: "NEXUS"
      navigation:
        links:
        - label: Products
          href: '#products'
        - label: Features
          href: '#features'
        - label: Pricing
          href: '#pricing'
        - label: Docs
          href: '#docs'
      layout:
        alignment: left
        height: 56
      scroll:
        shrinkPercentage: 70
      appearance:
        background:
          color: *color-background
          opacity: 100
        border:
          width: 1
          style: solid
          color: rgba(0,0,0,0.08)
        focus:
          color: *color-accent
      typography:
        title:
          size: 18
          weight: bold
          color: *color-primary
        menu:
          size: 14
          weight: medium
          color: *color-secondary

  # Bento Grid Hero Container
  - name: layout-column
    properties:
      layout:
        horizontalAlign: space-evenly
      spacing:
        paddingBlock: xl
        paddingInline: lg
    components:

    # Section Title
    - name: layout-column
      properties:
        layout:
          horizontalAlign: space-evenly
          widthMode: "83"
        spacing:
          marginBlock: md
      components:
      - name: heading
        properties:
          text: "Build Faster. Ship Smarter."
          level: 1
          typography:
            color: *color-primary
            size: xxxl
            weight: bold
            align: center
            lineHeight: '1.1'
          spacing:
            marginBlock: none
      - name: paragraph
        properties:
          text: "Powerful tools and seamless workflows for modern teams. Experience the future of productivity."
          typography:
            color: *color-secondary
            size: lg
            align: center
            lineHeight: '1.6'
          spacing:
            marginBlock: sm
          layout:
            widthMode: "66"

    # Bento Grid - Row 1 (Large + 2 Medium)
    - name: layout-row
      properties:
        layout:
          horizontalAlign: space-evenly
          wrap: wrap
          verticalAlign: stretch
        spacing:
          marginBlock: md
      components:

      # LARGE CARD - Main Feature (50% width)
      - name: layout-column
        properties:
          layout:
            horizontalAlign: space-evenly
            widthMode: "50"
          spacing:
            paddingBlock: xl
            paddingInline: lg
          appearance:
            background:
              type: gradient
              gradient:
                colorStart: *color-accent
                colorEnd: *color-accent
                direction: to bottom right
              opacity: 100
            radius: lg
            shadow: elevated
            shadowColor: *color-accent
        components:
        - name: eyebrow
          properties:
            text: "AI-POWERED"
            typography:
              color: rgba(255,255,255,0.8)
              size: xs
              weight: bold
              letterSpacing: wider
              transform: uppercase
            spacing:
              marginBlock: none
        - name: heading
          properties:
            text: "Instant Code Generation"
            level: 2
            typography:
              color: *color-background
              size: xxl
              weight: bold
              lineHeight: '1.2'
            spacing:
              marginBlock: sm
        - name: paragraph
          properties:
            text: "Transform your ideas into production-ready code in seconds. Our AI understands context and generates clean, optimized code."
            typography:
              color: rgba(255,255,255,0.9)
              size: md
              lineHeight: '1.6'
            spacing:
              marginBlock: md
        - name: button
          properties:
            text: "Try AI Assistant →"
            appearance:
              background:
                color: rgba(255,255,255,0.2)
                opacity: 100
              backdropBlur: 12
              border:
                width: 1
                style: solid
                color: rgba(255,255,255,0.3)
              radius: pill
            typography:
              color: *color-background
              weight: semibold
              size: sm
            spacing:
              marginBlock: none
              paddingBlock: sm
              paddingInline: lg
            layout:

      # Right Column - 2 Medium Stacked Cards
      - name: layout-column
        properties:
          layout:
            horizontalAlign: space-evenly
            widthMode: "50"
            gap: md
        components:

        # MEDIUM CARD 1 - Collaboration
        - name: layout-column
          properties:
            layout:
              horizontalAlign: space-evenly
            spacing:
              paddingBlock: lg
              paddingInline: lg
            appearance:
              background:
                type: gradient
                gradient:
                  colorStart: *color-accent
                  colorEnd: *color-accent
                  direction: to right
                opacity: 100
              radius: lg
              shadow: medium
              shadowColor: *color-accent
          components:
          - name: heading
            properties:
              text: "Real-Time Collaboration"
              level: 3
              typography:
                color: *color-background
                size: lg
                weight: bold
                lineHeight: '1.3'
              spacing:
                marginBlock: none
          - name: paragraph
            properties:
              text: "Work together seamlessly with live cursors, instant sync, and built-in video chat."
              typography:
                color: rgba(255,255,255,0.85)
                size: sm
                lineHeight: '1.5'
              spacing:
                marginBlock: sm
          - name: layout-row
            properties:
              layout:
                horizontalAlign: space-evenly
                verticalAlign: center
            components:
            - name: paragraph
              properties:
                text: "→"
                typography:
                  color: *color-background
                  size: xl
                  weight: bold
                spacing:
                  marginBlock: none
            - name: paragraph
              properties:
                text: "Learn more"
                typography:
                  color: rgba(255,255,255,0.9)
                  size: sm
                  weight: medium
                spacing:
                  marginBlock: none

        # MEDIUM CARD 2 - Security
        - name: layout-column
          properties:
            layout:
              horizontalAlign: space-evenly
            spacing:
              paddingBlock: lg
              paddingInline: lg
            appearance:
              background:
                color: *color-primary
                opacity: 100
              radius: lg
              shadow: medium
              shadowColor: *color-accent
          components:
          - name: heading
            properties:
              text: "Enterprise Security"
              level: 3
              typography:
                color: *color-background
                size: lg
                weight: bold
                lineHeight: '1.3'
              spacing:
                marginBlock: none
          - name: paragraph
            properties:
              text: "Bank-grade encryption, SOC 2 certified, and GDPR compliant. Your data is safe with us."
              typography:
                color: rgba(255,255,255,0.75)
                size: sm
                lineHeight: '1.5'
              spacing:
                marginBlock: sm
          - name: layout-row
            properties:
              layout:
                horizontalAlign: space-evenly
                verticalAlign: center
            components:
            - name: paragraph
              properties:
                text: "✓"
                typography:
                  color: *color-background
                  size: lg
                  weight: bold
                spacing:
                  marginBlock: none
            - name: paragraph
              properties:
                text: "SOC 2 Certified"
                typography:
                  color: rgba(255,255,255,0.6)
                  size: xs
                  weight: medium
                spacing:
                  marginBlock: none
            - name: paragraph
              properties:
                text: "•"
                typography:
                  color: rgba(255,255,255,0.3)
                  size: xs
                spacing:
                  marginBlock: none
            - name: paragraph
              properties:
                text: "256-bit Encryption"
                typography:
                  color: rgba(255,255,255,0.6)
                  size: xs
                  weight: medium
                spacing:
                  marginBlock: none

    # Bento Grid - Row 2 (3 Small Cards)
    - name: layout-row
      properties:
        layout:
          horizontalAlign: space-evenly
          wrap: wrap
          verticalAlign: stretch
      components:

      # SMALL CARD 1 - Performance
      - name: layout-column
        properties:
          layout:
            horizontalAlign: space-evenly
            widthMode: "33"
          spacing:
            paddingBlock: lg
            paddingInline: md
          appearance:
            background:
              color: *color-background
              opacity: 100
            radius: lg
            shadow: soft
            border:
              width: 1
              style: solid
              color: rgba(0,0,0,0.08)
        components:
        - name: heading
          properties:
            text: "⚡"
            level: 3
            typography:
              size: xxxl
              align: center
            spacing:
              marginBlock: none
        - name: heading
          properties:
            text: "Lightning Fast"
            level: 4
            typography:
              color: *color-primary
              size: md
              weight: bold
              align: center
            spacing:
              marginBlock: sm
        - name: paragraph
          properties:
            text: "Sub-100ms response times. Optimized for speed and performance."
            typography:
              color: *color-secondary
              size: sm
              align: center
              lineHeight: '1.5'
            spacing:
              marginBlock: none

      # SMALL CARD 2 - Analytics
      - name: layout-column
        properties:
          layout:
            horizontalAlign: space-evenly
            widthMode: "33"
          spacing:
            paddingBlock: lg
            paddingInline: md
          appearance:
            background:
              color: *color-background
              opacity: 100
            radius: lg
            shadow: soft
            border:
              width: 1
              style: solid
              color: rgba(0,0,0,0.08)
        components:
        - name: heading
          properties:
            text: "📊"
            level: 3
            typography:
              size: xxxl
              align: center
            spacing:
              marginBlock: none
        - name: heading
          properties:
            text: "Deep Analytics"
            level: 4
            typography:
              color: *color-primary
              size: md
              weight: bold
              align: center
            spacing:
              marginBlock: sm
        - name: paragraph
          properties:
            text: "Actionable insights with real-time dashboards and custom reports."
            typography:
              color: *color-secondary
              size: sm
              align: center
              lineHeight: '1.5'
            spacing:
              marginBlock: none

      # SMALL CARD 3 - Integrations
      - name: layout-column
        properties:
          layout:
            horizontalAlign: space-evenly
            widthMode: "33"
          spacing:
            paddingBlock: lg
            paddingInline: md
          appearance:
            background:
              color: *color-background
              opacity: 100
            radius: lg
            shadow: soft
            border:
              width: 1
              style: solid
              color: rgba(0,0,0,0.08)
        components:
        - name: heading
          properties:
            text: "🔗"
            level: 3
            typography:
              size: xxxl
              align: center
            spacing:
              marginBlock: none
        - name: heading
          properties:
            text: "100+ Integrations"
            level: 4
            typography:
              color: *color-primary
              size: md
              weight: bold
              align: center
            spacing:
              marginBlock: sm
        - name: paragraph
          properties:
            text: "Connect with your favorite tools. Works with Slack, GitHub, Figma, and more."
            typography:
              color: *color-secondary
              size: sm
              align: center
              lineHeight: '1.5'
            spacing:
              marginBlock: none

    # Bottom CTA Section
    - name: layout-column
      properties:
        layout:
          horizontalAlign: space-evenly
        spacing:
          paddingBlock: xl
          paddingInline: lg
          marginBlock: lg
        appearance:
          background:
            type: gradient
            gradient:
              colorStart: *color-accent
              colorEnd: *color-accent
              direction: to right
            opacity: 100
          radius: lg
          shadow: dramatic
          shadowColor: *color-accent
      components:
      - name: heading
        properties:
          text: "Ready to get started?"
          level: 2
          typography:
            color: *color-background
            size: xxl
            weight: bold
            align: center
          spacing:
            marginBlock: none
      - name: paragraph
        properties:
          text: "Join 10,000+ teams building faster with Nexus."
          typography:
            color: *color-background
            size: md
            align: center
          spacing:
            marginBlock: md
      - name: layout-row
        properties:
          layout:
            horizontalAlign: space-evenly
            wrap: wrap
            verticalAlign: center
        components:
        - name: button
          properties:
            text: "Start Free Trial"
            appearance:
              background:
                color: *color-primary
                opacity: 100
              border:
                width: 0
                style: solid
                color: transparent
              radius: pill
              shadow: medium
              shadowColor: *color-primary
            typography:
              color: *color-background
              weight: bold
              size: md
            spacing:
              marginBlock: none
              paddingBlock: md
              paddingInline: xl
        - name: button
          properties:
            text: "Schedule Demo"
            appearance:
              background:
                color: rgba(255,255,255,0.2)
                opacity: 100
              backdropBlur: 8
              border:
                width: 1
                style: solid
                color: rgba(15,15,35,0.2)
              radius: pill
            typography:
              color: *color-primary
              weight: semibold
              size: md
            spacing:
              marginBlock: none
              paddingBlock: md
              paddingInline: xl
