            paddingBlock: none
            paddingInline: none
          layout:
          appearance:
            background:
              type: solid
              color: *color-background
              opacity: 0
            radius: none
      - name: paragraph
        properties:
          text: "●"
          typography:
            color: *color-accent
            size: xl
            align: left
            weight: regular
            lineHeight: "1.6"
            transform: none
            letterSpacing: normal
          spacing:
            marginBlock: none
            marginInline: none
            paddingBlock: none
            paddingInline: none
          layout:
          appearance:
            background:
              type: solid
              color: *color-background
              opacity: 0
            radius: none
      - name: paragraph
        properties:
          text: "●"
          typography:
            color: *color-accent
            size: xl
            align: left
            weight: regular
            lineHeight: "1.6"
