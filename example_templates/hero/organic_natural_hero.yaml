# Organic Natural Hero
# Warm earthy hero with serif heading, nature-inspired palette, and soft rounded containers
# Base components: site, page, layout-row, layout-column, eyebrow, heading, paragraph, button, image
# Section type: hero
# Layout: split
# Visual style: organic_natural
# Content volume: standard
# Tone: casual
# Conversion intent: awareness
# Image requirement: decorative
# Interactivity: static
# Industries: ecommerce
# Perfect for: Organic farm, eco brand, sustainable fashion, plant shop, natural skincare, herbalist

- name: site
  properties:
    theme:
      fonts:
        heading: &font-heading "'Playfair Display', serif"
        content: &font-content "'Inter', sans-serif"
      colors:
        primary: &color-primary "#1A3A1A"
        text: &color-text "#3A5A3A"
        secondary: &color-secondary "#E0EBD8"
        accent: &color-accent "#2E8B57"
        background: &color-background "#F5FAF0"
  components:
    - name: page
      slug: home
      title: "Organic Natural Hero"
      properties:
        appearance:
          background:
            color: *color-background
            opacity: 100
      components:

        # Hero section — warm, earthy, nature-inspired
        - name: layout-row
          properties:
            layout:
              wrap: wrap
              verticalAlign: center
              horizontalAlign: center
              tag: section
              gap: lg
            spacing:
              paddingBlock: xxxl
              paddingInline: xl
            appearance:
              background:
                color: *color-background
                opacity: 100
              border:
                width: 0
              radius: none
              shadow: none
          components:

            # Left column — text content
            - name: layout-column
              properties:
                layout:
                  widthMode: "50"
                  gap: md
                spacing:
                  paddingInline: lg
              components:

                - name: eyebrow
                  properties:
                    text: "Rooted in Nature"
                    typography:
                      color: *color-accent
                      size: xs
                      weight: medium
                      letterSpacing: wider
                      transform: uppercase

                - name: heading
                  properties:
                    text: "Grown with care, crafted with love"
                    level: 1
                    typography:
                      color: *color-primary
                      size: xxl
                      weight: semibold
                      lineHeight: snug
                      letterSpacing: tight

                - name: paragraph
                  properties:
                    text: |
                      From seed to shelf, every product in our collection is nurtured by hand
                      using time-honored methods and the purest organic ingredients the earth
                      has to offer.
                    typography:
                      color: *color-text
                      size: md
                      weight: regular
                      lineHeight: relaxed

                # CTA buttons
                - name: layout-row
                  properties:
                    layout:
                      horizontalAlign: left
                      verticalAlign: center
                      wrap: wrap
                      gap: md
                    spacing:
                      marginBlock: md
                  components:
                    - name: button
                      properties:
                        text: "Shop Organic"
                        appearance:
                          background:
                            color: *color-accent
                            opacity: 100
                          border:
                            width: 0
                          radius: lg
                          shadow: soft
                        typography:
                          color: "#ffffff"
                          weight: semibold
                          size: md
                        spacing:
                          paddingBlock: md
                          paddingInline: xl
                    - name: button
                      properties:
                        text: "Our Farm"
                        appearance:
                          background:
                            color: transparent
                            opacity: 0
                          border:
                            width: 1
                            style: solid
                            color: *color-accent
                          radius: lg
                          shadow: none
                        typography:
                          color: *color-accent
                          weight: medium
                          size: md
                        spacing:
                          paddingBlock: md
                          paddingInline: xl

                # Trust line
                - name: paragraph
                  properties:
                    text: "100% organic | Sustainably sourced | Carbon neutral shipping"
                    typography:
                      color: *color-text
                      size: xs
                      weight: regular
                    spacing:
                      marginBlock: sm

            # Right column — nature image with soft container
            - name: layout-column
              properties:
                layout:
                  widthMode: "50"
                  horizontalAlign: center
              components:
                - name: layout-column
                  properties:
                    appearance:
                      background:
                        color: *color-secondary
                        opacity: 100
                      border:
                        width: 0
                      radius: lg
                      shadow: soft
                    spacing:
                      paddingBlock: sm
                      paddingInline: sm
                  components:
                    - name: image
                      properties:
                        source:
                          url: https://images.pexels.com/photos/1072824/pexels-photo-1072824.jpeg?auto=compress&cs=tinysrgb&w=800
                          altText: Lush green organic garden with fresh herbs
                        appearance:
                          minHeight: 25
                          fit: cover
                          radius: lg
