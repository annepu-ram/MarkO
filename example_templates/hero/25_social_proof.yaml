# Hero Card Variant: Social Proof Hero
# layout-column with a primary heading, followed by a layout-row of small partner image components

- name: page
  properties:
    appearance:
      background: { color: '#ffffff' }
  components:
    - name: layout-column
      properties:
        layout: { horizontalAlign: center, gap: lg }
        spacing: { paddingBlock: xxxl, paddingInline: xl }
        appearance:
          background:
            type: gradient
            color: '#0f172a'
            gradient:
              colorStart: '#0f172a'
              colorEnd: '#1e293b'
              direction: 'to bottom'
          padding: { block: xxxl, inline: xl }
      components:
        - name: eyebrow
          properties:
            text: TRUSTED WORLDWIDE
            typography: { size: xs, weight: semibold, color: '#818cf8', transform: uppercase, letterSpacing: wider, align: center }
        - name: heading
          properties:
            text: |
              Empowering teams at the
              world's best companies
            level: 1
            typography: { size: xxxl, weight: extrabold, color: '#ffffff', align: center, letterSpacing: tight }
            layout: { widthMode: "75" }
        - name: paragraph
          properties:
            text: |
              Over 10,000 organizations rely on our platform daily to
              streamline operations and accelerate growth.
            typography: { size: lg, color: '#94a3b8', align: center, lineHeight: "1.7" }
            layout: { widthMode: "50" }
        - name: button
          properties:
            text: Join Them Today
            appearance: { background: { color: '#6366f1' }, radius: pill, padding: { block: md, inline: xl } }
            typography: { color: '#ffffff', weight: bold }
        - name: br
          properties:
            size: lg
        - name: caption
          properties:
            text: "Trusted by 500+ industry-leading companies"
            typography: { size: sm, color: '#64748b', align: center }
        - name: layout-row
          properties:
            layout: { horizontalAlign: space-evenly, verticalAlign: center, gap: xl, wrap: wrap }
            appearance: { background: { transparency: 0 } }
            spacing: { paddingInline: xl }
          components:
            - name: image
              properties:
                source: { url: 'https://via.placeholder.com/120x40/334155/94a3b8?text=Acme+Co', altText: 'Acme Co logo' }
                appearance: { minHeight: 2.5, fit: contain, filter: grayscale }
                layout: { widthMode: fit }
            - name: image
              properties:
                source: { url: 'https://via.placeholder.com/120x40/334155/94a3b8?text=TechCorp', altText: 'TechCorp logo' }
                appearance: { minHeight: 2.5, fit: contain, filter: grayscale }
                layout: { widthMode: fit }
            - name: image
              properties:
                source: { url: 'https://via.placeholder.com/120x40/334155/94a3b8?text=GlobalFin', altText: 'GlobalFin logo' }
                appearance: { minHeight: 2.5, fit: contain, filter: grayscale }
                layout: { widthMode: fit }
            - name: image
              properties:
                source: { url: 'https://via.placeholder.com/120x40/334155/94a3b8?text=NovaStar', altText: 'NovaStar logo' }
                appearance: { minHeight: 2.5, fit: contain, filter: grayscale }
                layout: { widthMode: fit }
            - name: image
              properties:
                source: { url: 'https://via.placeholder.com/120x40/334155/94a3b8?text=BlueWave', altText: 'BlueWave logo' }
                appearance: { minHeight: 2.5, fit: contain, filter: grayscale }
                layout: { widthMode: fit }
