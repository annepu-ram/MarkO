# Hero Card Variant: Social Proof Hero
# layout-column with a primary heading, followed by a layout-row of small partner image components
# Base components: page, layout-column, layout-row, eyebrow, heading, paragraph, button, br, caption, image
# Section type: hero
# Layout: centered
# Visual style: monochrome_dark
# Content volume: standard
# Tone: formal
# Conversion intent: awareness
# Image requirement: many
# Interactivity: static
# Industries: saas, ecommerce
# Perfect for: Enterprise SaaS, B2B platforms, established brands, trust-driven products

- name: page
  properties:
    theme:
      colors:
        primary: &color-primary '#0f172a'
        text: &color-text '#2B2F3B'
        secondary: &color-secondary '#94a3b8'
        accent: &color-accent '#6366f1'
        background: &color-background '#ffffff'
    appearance:
      background: {color: *color-background}
  components:
  - name: layout-column
    properties:
      layout: {horizontalAlign: center, gap: lg}
      spacing: {paddingBlock: xxxl, paddingInline: xl}
      appearance:
        background:
          type: gradient
          color: *color-primary
          gradient:
            colorStart: *color-primary
            colorEnd: *color-primary
            direction: 'to bottom'
    components:
    - name: eyebrow
      properties:
        text: TRUSTED WORLDWIDE
        typography: {size: xs, weight: semibold, color: *color-background, transform: uppercase, letterSpacing: wider, align: center}
    - name: heading
      properties:
        text: |
          Empowering teams at the
          world's best companies
        level: 1
        typography: {size: xxxl, weight: extrabold, color: *color-background, align: center, letterSpacing: tight}
        layout: {widthMode: "75"}
    - name: paragraph
      properties:
        text: |
          Over 10,000 organizations rely on our platform daily to
          streamline operations and accelerate growth.
        typography: {size: lg, color: *color-background, align: center, lineHeight: "1.7"}
        layout: {widthMode: "50"}
    - name: button
      properties:
        text: Join Them Today
        appearance: {background: {color: *color-accent}, radius: pill}
        typography: {color: *color-background, weight: bold}
        spacing:
          paddingBlock: md
          paddingInline: xl
    - name: br
      properties:
        size: lg
    - name: caption
      properties:
        text: "Trusted by 500+ industry-leading companies"
        typography: {size: sm, color: *color-background, align: center}
    - name: layout-row
      properties:
        layout: {horizontalAlign: space-evenly, verticalAlign: center, gap: lg, wrap: wrap}
        appearance: {background: {opacity: 0}}
        spacing: {paddingInline: xl}
      components:
      - name: image
        properties:
          source: {url: 'https://placehold.co/120x40?text=Add+Image', altText: 'Acme Co logo'}
          appearance: {minHeight: 2.5, fit: contain, filter: grayscale}
          layout: {widthMode: fit}
      - name: image
        properties:
          source: {url: 'https://placehold.co/120x40?text=Add+Image', altText: 'TechCorp logo'}
          appearance: {minHeight: 2.5, fit: contain, filter: grayscale}
          layout: {widthMode: fit}
      - name: image
        properties:
          source: {url: 'https://placehold.co/120x40?text=Add+Image', altText: 'GlobalFin logo'}
          appearance: {minHeight: 2.5, fit: contain, filter: grayscale}
          layout: {widthMode: fit}
      - name: image
        properties:
          source: {url: 'https://placehold.co/120x40?text=Add+Image', altText: 'NovaStar logo'}
          appearance: {minHeight: 2.5, fit: contain, filter: grayscale}
          layout: {widthMode: fit}
      - name: image
        properties:
          source: {url: 'https://placehold.co/120x40?text=Add+Image', altText: 'BlueWave logo'}
          appearance: {minHeight: 2.5, fit: contain, filter: grayscale}
          layout: {widthMode: fit}
