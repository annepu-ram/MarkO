# Gradient Glassmorphism Hero
# True glassmorphism with backdrop-filter blur, frosted glass panels on vibrant gradients
# Perfect for: Fintech, web3, modern SaaS, creative portfolios
#
# KEY: Glassmorphism needs a colorful, varied background for blur to be visible.
# Uses a vivid multi-color gradient so frosted glass panels create a visible frosted effect.

- name: page
  properties:
    theme:
      colors:
        primary: &color-primary "#ffffff"
        secondary: &color-secondary "#e0e7ff"
        accent: &color-accent "#818cf8"
        background: &color-background "#0f0720"
    appearance:
      background:
        color: *color-background
        transparency: 100
  components:

  # Vivid multi-color gradient background — the key to visible glassmorphism
  # Bright contrasting colors create the frosted effect when blurred
  - name: layout-column
    properties:
      layout:
        align: center
        horizontalAlign: none
      spacing:
        paddingBlock: none
        paddingInline: none
      background:
        color: linear-gradient(135deg, #667eea 0%, #764ba2 20%, #f093fb 40%, #f5576c 60%, #4facfe 80%, #00f2fe 100%)
        transparency: 100
    components:

    # Inner content container
    - name: layout-column
      properties:
        layout:
          align: center
          horizontalAlign: space-evenly
        spacing:
          paddingBlock: xxxl
          paddingInline: lg
      components:

      # Floating glass badge
      - name: layout-row
        properties:
          layout:
            align: center
            horizontalAlign: space-evenly
          appearance:
            background:
              color: rgba(255,255,255,0.15)
              transparency: 100
            backdropBlur: 16
            radius: pill
            border:
              width: 1
              style: solid
              color: rgba(255,255,255,0.3)
            padding:
              block: xs
              inline: md
        components:
        - name: paragraph
          properties:
            text: "Introducing Aurora Pay"
            typography:
              color: *color-primary
              size: sm
              weight: medium
            spacing:
              marginBlock: none

      # Main Headline
      - name: heading
        properties:
          text: "Your finances, reimagined"
          level: 1
          layout:
            widthMode: "75"
          typography:
            color: *color-primary
            size: xxxl
            weight: bold
            align: center
            lineHeight: '1.1'
          spacing:
            marginBlock: none

      # Subheadline
      - name: paragraph
        properties:
          text: |
            Experience the next generation of personal finance. Smart insights,
            seamless transactions, and complete control — all in one beautiful app.
          layout:
            widthMode: "50"
          typography:
            color: *color-secondary
            size: lg
            align: center
            lineHeight: '1.6'
          spacing:
            marginBlock: md

      # Main frosted glass card — feature highlights
      - name: layout-column
        properties:
          layout:
            align: center
            horizontalAlign: space-evenly
            widthMode: "83"
          spacing:
            paddingBlock: lg
            paddingInline: lg
            marginBlock: lg
          appearance:
            background:
              color: rgba(255,255,255,0.12)
              transparency: 100
            backdropBlur: 20
            radius: lg
            border:
              width: 1
              style: solid
              color: rgba(255,255,255,0.25)
            shadow: soft
        components:
        # Stats row inside glass card
        - name: layout-row
          properties:
            layout:
              align: center
              horizontalAlign: space-evenly
              wrap: wrap
          components:
          # Stat 1
          - name: layout-column
            properties:
              layout:
                widthMode: "33"
                align: center
                horizontalAlign: space-evenly
            components:
            - name: paragraph
              properties:
                text: "128-bit"
                typography:
                  color: *color-primary
                  size: xl
                  weight: bold
                  align: center
                spacing:
                  marginBlock: none
            - name: paragraph
              properties:
                text: "Encryption"
                typography:
                  color: rgba(255,255,255,0.7)
                  size: sm
                  align: center
                spacing:
                  marginBlock: none
          # Stat 2
          - name: layout-column
            properties:
              layout:
                widthMode: "33"
                align: center
                horizontalAlign: space-evenly
            components:
            - name: paragraph
              properties:
                text: "0%"
                typography:
                  color: *color-primary
                  size: xl
                  weight: bold
                  align: center
                spacing:
                  marginBlock: none
            - name: paragraph
              properties:
                text: "Hidden Fees"
                typography:
                  color: rgba(255,255,255,0.7)
                  size: sm
                  align: center
                spacing:
                  marginBlock: none
          # Stat 3
          - name: layout-column
            properties:
              layout:
                widthMode: "33"
                align: center
                horizontalAlign: space-evenly
            components:
            - name: paragraph
              properties:
                text: "24/7"
                typography:
                  color: *color-primary
                  size: xl
                  weight: bold
                  align: center
                spacing:
                  marginBlock: none
            - name: paragraph
              properties:
                text: "Support"
                typography:
                  color: rgba(255,255,255,0.7)
                  size: sm
                  align: center
                spacing:
                  marginBlock: none

      # CTA Buttons
      - name: layout-row
        properties:
          layout:
            align: center
            horizontalAlign: space-evenly
            wrap: wrap
          spacing:
            marginBlock: lg
        components:
        - name: button
          properties:
            text: "Download App"
            appearance:
              background:
                color: rgba(255,255,255,0.2)
                transparency: 100
              backdropBlur: 12
              border:
                width: 1
                style: solid
                color: rgba(255,255,255,0.4)
              padding:
                block: md
                inline: xl
              radius: pill
              shadow: soft
            typography:
              color: *color-primary
              weight: bold
              size: md
            spacing:
              marginBlock: none
        - name: button
          properties:
            text: "Watch Demo"
            appearance:
              background:
                color: rgba(255,255,255,0.1)
                transparency: 100
              backdropBlur: 8
              border:
                width: 1
                style: solid
                color: rgba(255,255,255,0.25)
              padding:
                block: md
                inline: xl
              radius: pill
            typography:
              color: *color-primary
              weight: semibold
              size: md
            spacing:
              marginBlock: none

      # App availability note
      - name: paragraph
        properties:
          text: "Available on iOS and Android"
          typography:
            color: rgba(255,255,255,0.6)
            size: sm
          spacing:
            marginBlock: md

      # Phone mockup in glass frame
      - name: layout-column
        properties:
          layout:
            align: center
            horizontalAlign: none
            widthMode: "50"
          spacing:
            marginBlock: lg
          appearance:
            background:
              color: rgba(255,255,255,0.1)
              transparency: 100
            backdropBlur: 14
            radius: lg
            border:
              width: 1
              style: solid
              color: rgba(255,255,255,0.2)
        components:
        - name: image
          properties:
            source:
              url: https://images.pexels.com/photos/6289028/pexels-photo-6289028.jpeg?auto=compress&cs=tinysrgb&w=800
              altText: Finance app on smartphone
            appearance:
              minHeight: 28.125
              fit: contain
              cornerStyle: lg
              hoverEffect: lift
            layout:
              widthMode: stretch
            spacing:
              marginBlock: none
