# Gradient Glassmorphism Hero
# True glassmorphism using blur checkbox with auto-transparency
# Base components: page, layout-column, layout-row, paragraph, heading, button, image
# Section type: hero
# Layout: centered
# Visual style: glassmorphism
# Perfect for: Fintech, web3, modern SaaS, creative portfolios

- name: page
  properties:
    theme:
      colors:
        primary: &color-primary "#ffffff"
        text: &color-text "#DFDFDF"
        secondary: &color-secondary "#e0e7ff"
        accent: &color-accent "#818cf8"
        background: &color-background "#0f0720"
    appearance:
      background:
        color: *color-background
        transparency: 100
  components:

  # Vivid gradient background — the key to visible glassmorphism
  - name: layout-column
    properties:
      layout:
        horizontalAlign: center
      spacing:
        paddingBlock: none
        paddingInline: none
      appearance:
        background:
          type: gradient
          gradient:
            colorStart: *color-accent
            colorEnd: *color-background
            direction: to bottom right
          transparency: 100
    components:

    # Inner content container
    - name: layout-column
      properties:
        layout:
          horizontalAlign: center
          gap: md
        spacing:
          paddingBlock: xxxl
          paddingInline: lg
      components:

      # Floating glass badge — blur: true auto-applies transparency
      - name: layout-row
        properties:
          layout:
            horizontalAlign: center
            verticalAlign: center
            wrap: nowrap
          appearance:
            background:
              color: '#ffffff'
              transparency: 15
            blur: true
            radius: pill
            border:
              width: 1
              style: solid
              color: '#ffffff'
        components:
        - name: paragraph
          properties:
            text: "Introducing Aurora Pay"
            typography:
              color: *color-text
              size: sm
              weight: medium
              lineHeight: '1'

      # Main Headline
      - name: heading
        properties:
          text: "Your finances, reimagined"
          level: 1
          layout:
            widthMode: "75"
          typography:
            color: *color-primary
            size: xxxl
            weight: bold
            align: center
            lineHeight: snug

      # Subheadline
      - name: paragraph
        properties:
          text: |
            Experience the next generation of personal finance. Smart insights,
            seamless transactions, and complete control — all in one beautiful app.
          layout:
            widthMode: "50"
          typography:
            color: *color-secondary
            size: lg
            align: center
            lineHeight: relaxed

      # Main frosted glass card — feature highlights
      - name: layout-column
        properties:
          layout:
            horizontalAlign: center
            widthMode: "83"
            gap: md
          spacing:
            paddingBlock: lg
            paddingInline: lg
          appearance:
            background:
              color: '#ffffff'
              transparency: 12
            blur: true
            radius: lg
            border:
              width: 1
              style: solid
              color: '#ffffff'
            shadow: soft
        components:
        # Stats row inside glass card
        - name: layout-row
          properties:
            layout:
              horizontalAlign: space-evenly
              verticalAlign: center
              wrap: wrap
          components:
          # Stat 1
          - name: layout-column
            properties:
              layout:
                widthMode: "33"
                horizontalAlign: center
                gap: xs
            components:
            - name: paragraph
              properties:
                text: "128-bit"
                typography:
                  color: *color-text
                  size: xl
                  weight: bold
                  align: center
            - name: paragraph
              properties:
                text: "Encryption"
                typography:
                  color: *color-secondary
                  size: sm
                  align: center
          # Stat 2
          - name: layout-column
            properties:
              layout:
                widthMode: "33"
                horizontalAlign: center
                gap: xs
            components:
            - name: paragraph
              properties:
                text: "0%"
                typography:
                  color: *color-text
                  size: xl
                  weight: bold
                  align: center
            - name: paragraph
              properties:
                text: "Hidden Fees"
                typography:
                  color: *color-secondary
                  size: sm
                  align: center
          # Stat 3
          - name: layout-column
            properties:
              layout:
                widthMode: "33"
                horizontalAlign: center
                gap: xs
            components:
            - name: paragraph
              properties:
                text: "24/7"
                typography:
                  color: *color-text
                  size: xl
                  weight: bold
                  align: center
            - name: paragraph
              properties:
                text: "Support"
                typography:
                  color: *color-secondary
                  size: sm
                  align: center

      # CTA Buttons
      - name: layout-row
        properties:
          layout:
            horizontalAlign: center
            verticalAlign: center
            wrap: wrap
            gap: md
        components:
        - name: button
          properties:
            text: "Download App"
            appearance:
              background:
                color: '#ffffff'
                transparency: 20
              blur: true
              border:
                width: 1
                style: solid
                color: '#ffffff'
              radius: pill
              shadow: soft
            typography:
              color: *color-primary
              weight: bold
              size: md
            spacing:
              paddingBlock: md
              paddingInline: xl
        - name: button
          properties:
            text: "Watch Demo"
            appearance:
              background:
                color: '#ffffff'
                transparency: 10
              blur: true
              border:
                width: 1
                style: solid
                color: '#ffffff'
              radius: pill
            typography:
              color: *color-primary
              weight: semibold
              size: md

      # App availability note
            spacing:
              paddingBlock: md
              paddingInline: xl
      - name: paragraph
        properties:
          text: "Available on iOS and Android"
          typography:
            color: *color-secondary
            size: sm

      # Phone mockup in glass frame
      - name: layout-column
        properties:
          layout:
            horizontalAlign: center
            widthMode: "50"
          appearance:
            background:
              color: '#ffffff'
              transparency: 10
            blur: true
            radius: lg
            border:
              width: 1
              style: solid
              color: '#ffffff'
        components:
        - name: image
          properties:
            source:
              url: https://images.pexels.com/photos/6289028/pexels-photo-6289028.jpeg?auto=compress&cs=tinysrgb&w=800
              altText: Finance app on smartphone
            appearance:
              minHeight: 25
              fit: contain
              radius: lg
              hoverEffect: lift
            layout:
              widthMode: stretch
