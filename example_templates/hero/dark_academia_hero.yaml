# Dark Academia Hero
# Scholarly hero with dark warm tones, cream/gold serif typography, and literary elegance
# Base components: site, page, layout-row, layout-column, eyebrow, heading, paragraph, button, image
# Section type: hero
# Layout: split
# Visual style: dark_academia
# Content volume: standard
# Tone: formal
# Conversion intent: awareness
# Image requirement: decorative
# Interactivity: static
# Industries: retail_local, community, ecommerce, legal
# Perfect for: Bookshop, university, literary magazine, antique store, library, museum, law firm

- name: site
  properties:
    theme:
      fonts:
        heading: &font-heading "'Cormorant Garamond', serif"
        content: &font-content "'Inter', sans-serif"
      colors:
        primary: &color-primary "#F5E6D3"
        text: &color-text "#C8B8A0"
        secondary: &color-secondary "#2C1810"
        accent: &color-accent "#8B6914"
        background: &color-background "#1A1008"
  components:
    - name: page
      slug: home
      title: "Dark Academia Hero"
      properties:
        appearance:
          background:
            color: *color-background
            opacity: 100
      components:

        # Hero section — dark warm scholarly feel
        - name: layout-row
          properties:
            layout:
              wrap: wrap
              verticalAlign: center
              horizontalAlign: center
              tag: section
              gap: lg
            spacing:
              paddingBlock: xxxl
              paddingInline: xl
            appearance:
              background:
                color: *color-background
                opacity: 100
              border:
                width: 0
              radius: none
              shadow: none
          components:

            # Left column — text content
            - name: layout-column
              properties:
                layout:
                  widthMode: "50"
                  gap: md
                spacing:
                  paddingInline: lg
              components:

                # Italic eyebrow — decorative serif
                - name: eyebrow
                  properties:
                    text: "Est. MDCCCXLV"
                    typography:
                      color: *color-accent
                      size: sm
                      weight: regular
                      letterSpacing: wider
                      fontStyle: italic

                - name: heading
                  properties:
                    text: "The pursuit of knowledge begins here"
                    level: 1
                    typography:
                      color: *color-primary
                      size: xxl
                      weight: light
                      lineHeight: snug
                      letterSpacing: tight

                - name: paragraph
                  properties:
                    text: |
                      Step into a world where ancient wisdom meets contemporary thought.
                      Our curated collection spans centuries of human discovery, waiting
                      to illuminate your path forward.
                    typography:
                      color: *color-text
                      size: md
                      weight: regular
                      lineHeight: relaxed

                # CTA buttons
                - name: layout-row
                  properties:
                    layout:
                      horizontalAlign: left
                      verticalAlign: center
                      wrap: wrap
                      gap: md
                    spacing:
                      marginBlock: md
                  components:
                    - name: button
                      properties:
                        text: "Explore Collection"
                        appearance:
                          background:
                            color: *color-accent
                            opacity: 100
                          border:
                            width: 0
                          radius: xs
                          shadow: none
                        typography:
                          color: *color-background
                          weight: semibold
                          size: md
                        spacing:
                          paddingBlock: md
                          paddingInline: xl
                    - name: button
                      properties:
                        text: "Read More"
                        appearance:
                          background:
                            color: transparent
                            opacity: 0
                          border:
                            width: 1
                            style: solid
                            color: *color-accent
                          radius: xs
                          shadow: none
                        typography:
                          color: *color-accent
                          weight: medium
                          size: md
                        spacing:
                          paddingBlock: md
                          paddingInline: xl

            # Right column — image with warm border
            - name: layout-column
              properties:
                layout:
                  widthMode: "50"
                  horizontalAlign: center
              components:
                - name: layout-column
                  properties:
                    appearance:
                      background:
                        color: *color-secondary
                        opacity: 100
                      border:
                        width: 1
                        style: solid
                        color: "#3D2B1F"
                      radius: xs
                      shadow: soft
                    spacing:
                      paddingBlock: sm
                      paddingInline: sm
                  components:
                    - name: image
                      properties:
                        source:
                          url: https://images.pexels.com/photos/2908984/pexels-photo-2908984.jpeg?auto=compress&cs=tinysrgb&w=800
                          altText: Vintage library with leather-bound books
                        appearance:
                          minHeight: 25
                          fit: cover
                          radius: xs
