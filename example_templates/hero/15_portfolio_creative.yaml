            size: xl
            weight: bold
            align: center
          spacing:
            marginBlock: none
      - name: paragraph
        properties:
          text: "Design Awards"
          typography:
            color: '#8f8f9d'
            size: xs
            align: center
          spacing:
            marginBlock: none
    - name: layout-column
      properties:
        layout:
          align: center
          horizontalAlign: space-evenly
      components:
      - name: heading
        properties:
          text: "12"
          level: 3
          typography:
            color: '#ffffff'
            size: xl
            weight: bold
            align: center
          spacing:
            marginBlock: none
      - name: paragraph
        properties:
          text: "Happy Clients"
          typography:
            color: '#8f8f9d'
            size: xs
            align: center
          spacing:
            marginBlock: none
