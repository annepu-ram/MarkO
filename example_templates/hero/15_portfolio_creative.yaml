# Portfolio Creative Hero
# A personal, artistic hero for creative professionals
# Perfect for: Designers, photographers, artists, freelancers

- name: page
  properties:
    theme:
      colors:
        primary: &color-primary "#ffffff"
        secondary: &color-secondary "#8f8f9d"
        accent: &color-accent "#e879f9"
        background: &color-background "#1a1a2e"
        accent-alt: &color-accent-alt "#c084fc"
        dark: &color-dark "#16162a"
        divider: &color-divider "#3f3f5a"
        muted: &color-muted "#4a4a5a"
        surface: &color-surface "#2a2a3e"
        surface-alt: &color-surface-alt "#16213e"
        tag-available: &color-tag-available "#10b981"
    appearance:
      background:
        color: *color-background
        transparency: 100
  components:
  # Minimal Name Header
  - name: titlebar
    properties:
      branding:
        showLogo: false
        title: "ALEX CHEN"
      navigation:
        links:
        - label: Work
          href: '#work'
        - label: About
          href: '#about'
        - label: Contact
          href: '#contact'
      layout:
        alignment: left
        height: 60
      scroll:
        shrinkPercentage: 70
      appearance:
        background:
          color: *color-background
          transparency: 100
        border:
          width: 0
          style: solid
          color: transparent
        focus:
          background: *color-surface
          color: *color-accent
      typography:
        title:
          size: 14
          weight: medium
          color: *color-primary
        menu:
          size: 14
          weight: regular
          color: *color-secondary

  # Hero Section
  - name: layout-column
    properties:
      layout:
        align: center
        horizontalAlign: space-evenly
      spacing:
        paddingBlock: xxxl
        paddingInline: xl
      appearance:
        background:
          type: gradient
          gradient:
            colorStart: *color-background
            colorEnd: *color-surface-alt
            direction: to bottom
          transparency: 100
    components:
    # Availability Badge
    - name: layout-row
      properties:
        layout:
          align: center
          horizontalAlign: space-evenly
        appearance:
          background:
            color: rgba(16,185,129,0.1)
            transparency: 100
          radius: pill
          border:
            width: 1
            style: solid
            color: rgba(16,185,129,0.3)
          padding:
            block: xs
            inline: md
      components:
      - name: paragraph
        properties:
          text: "●"
          typography:
            color: *color-tag-available
            size: xs
          spacing:
            marginBlock: none
      - name: paragraph
        properties:
          text: "Available for freelance"
          typography:
            color: *color-tag-available
            size: sm
            weight: medium
          spacing:
            marginBlock: none

    # Large Title with Accent
    - name: heading
      properties:
        text: "Digital Product"
        level: 1
        typography:
          color: *color-primary
          size: xxxl
          weight: bold
          align: center
          lineHeight: '1.1'
        spacing:
          marginBlock: none

    - name: heading
      properties:
        text: "Designer"
        level: 1
        typography:
          color: *color-accent
          size: xxxl
          weight: bold
          align: center
          lineHeight: '1.1'
        spacing:
          marginBlock: none

    # Intro Text
    - name: paragraph
      properties:
        text: |
          I craft meaningful digital experiences that connect brands
          with their audience. Currently designing at Spotify, previously
          at Google and Airbnb.
        typography:
          color: *color-secondary
          size: lg
          align: center
          lineHeight: '1.7'
        spacing:
          marginBlock: md
        layout:
          widthMode: 50

    # Social Links
    - name: layout-row
      properties:
        layout:
          align: center
          horizontalAlign: space-evenly
        spacing:
          marginBlock: md
      components:
      - name: link
        properties:
          text: "Dribbble"
          typography:
            color: *color-accent
            size: sm
            weight: medium
          spacing:
            marginBlock: none
      - name: paragraph
        properties:
          text: "/"
          typography:
            color: *color-divider
            size: sm
          spacing:
            marginBlock: none
      - name: link
        properties:
          text: "LinkedIn"
          typography:
            color: *color-accent
            size: sm
            weight: medium
          spacing:
            marginBlock: none
      - name: paragraph
        properties:
          text: "/"
          typography:
            color: *color-divider
            size: sm
          spacing:
            marginBlock: none
      - name: link
        properties:
          text: "Twitter"
          typography:
            color: *color-accent
            size: sm
            weight: medium
          spacing:
            marginBlock: none
      - name: paragraph
        properties:
          text: "/"
          typography:
            color: *color-divider
            size: sm
          spacing:
            marginBlock: none
      - name: link
        properties:
          text: "Email"
          typography:
            color: *color-accent
            size: sm
            weight: medium
          spacing:
            marginBlock: none

    # Featured Work Grid
    - name: layout-column
      properties:
        layout:
          align: center
          horizontalAlign: space-evenly
        spacing:
          marginBlock: xl
      components:
      - name: paragraph
        properties:
          text: "SELECTED WORK"
          typography:
            color: *color-muted
            size: xs
            weight: medium
            letterSpacing: wider
            align: center
          spacing:
            marginBlock: none

      - name: layout-row
        properties:
          layout:
            align: stretch
            horizontalAlign: space-evenly
            wrap: wrap
        components:
        # Project 1
        - name: image
          properties:
            source:
              url: https://images.pexels.com/photos/3182781/pexels-photo-3182781.jpeg?auto=compress&cs=tinysrgb&w=800
              altText: Dashboard design project
            appearance:
              minHeight: 17.5
              fit: cover
              cornerStyle: lg
              shadow: elevated
              shadowColor: *color-accent
              hoverEffect: zoom
            layout:
              widthMode: 48
            spacing:
              marginBlock: none
          components:
          - name: layout-column
            properties:
              layout:
                align: start
                horizontalAlign: space-evenly
              spacing:
                paddingBlock: md
                paddingInline: md
              appearance:
                background:
                  color: linear-gradient(to top, rgba(0,0,0,0.9) 0%, transparent 70%)
                  transparency: 100
            components:
            - name: paragraph
              properties:
                text: "SPOTIFY"
                typography:
                  color: rgba(255,255,255,0.6)
                  size: xxs
                  weight: bold
                  letterSpacing: wide
                spacing:
                  marginBlock: xxl
            - name: heading
              properties:
                text: "Artist Dashboard Redesign"
                level: 3
                typography:
                  color: *color-primary
                  size: lg
                  weight: semibold
                spacing:
                  marginBlock: none
            - name: paragraph
              properties:
                text: "Product Design • 2024"
                typography:
                  color: rgba(255,255,255,0.5)
                  size: xs
                spacing:
                  marginBlock: none
        # Project 2
        - name: image
          properties:
            source:
              url: https://images.pexels.com/photos/3184339/pexels-photo-3184339.jpeg?auto=compress&cs=tinysrgb&w=800
              altText: Mobile app design project
            appearance:
              minHeight: 17.5
              fit: cover
              cornerStyle: lg
              shadow: elevated
              shadowColor: *color-accent
              hoverEffect: zoom
            layout:
              widthMode: 48
            spacing:
              marginBlock: none
          components:
          - name: layout-column
            properties:
              layout:
                align: start
                horizontalAlign: space-evenly
              spacing:
                paddingBlock: md
                paddingInline: md
              appearance:
                background:
                  color: linear-gradient(to top, rgba(0,0,0,0.9) 0%, transparent 70%)
                  transparency: 100
            components:
            - name: paragraph
              properties:
                text: "AIRBNB"
                typography:
                  color: rgba(255,255,255,0.6)
                  size: xxs
                  weight: bold
                  letterSpacing: wide
                spacing:
                  marginBlock: xxl
            - name: heading
              properties:
                text: "Experience Booking Flow"
                level: 3
                typography:
                  color: *color-primary
                  size: lg
                  weight: semibold
                spacing:
                  marginBlock: none
            - name: paragraph
              properties:
                text: "UX Design • 2023"
                typography:
                  color: rgba(255,255,255,0.5)
                  size: xs
                spacing:
                  marginBlock: none

    # CTA
    - name: button
      properties:
        text: "View All Projects →"
        appearance:
          background:
            type: gradient
            gradient:
              colorStart: *color-accent
              colorEnd: *color-accent-alt
              direction: to right
          border:
            width: 0
            style: solid
            color: transparent
          padding:
            block: md
            inline: xl
          shadow: medium
          shadowColor: *color-accent
        typography:
          color: *color-background
          weight: semibold
          size: md
        spacing:
          marginBlock: md
        layout:

  # Stats Bar
  - name: layout-row
    properties:
      layout:
        align: center
        horizontalAlign: space-evenly
        wrap: wrap
      spacing:
        paddingBlock: lg
        paddingInline: xl
      background:
        color: *color-dark
        transparency: 100
    components:
    - name: layout-column
      properties:
        layout:
          align: center
          horizontalAlign: space-evenly
      components:
      - name: heading
        properties:
          text: "8+"
          level: 3
          typography:
            color: *color-primary
            size: xl
            weight: bold
            align: center
          spacing:
            marginBlock: none
      - name: paragraph
        properties:
          text: "Years Experience"
          typography:
            color: *color-secondary
            size: xs
            align: center
          spacing:
            marginBlock: none
    - name: layout-column
      properties:
        layout:
          align: center
          horizontalAlign: space-evenly
      components:
      - name: heading
        properties:
          text: "50+"
          level: 3
          typography:
            color: *color-primary
            size: xl
            weight: bold
            align: center
          spacing:
            marginBlock: none
      - name: paragraph
        properties:
          text: "Projects Shipped"
          typography:
            color: *color-secondary
            size: xs
            align: center
          spacing:
            marginBlock: none
    - name: layout-column
      properties:
        layout:
          align: center
          horizontalAlign: space-evenly
      components:
      - name: heading
        properties:
          text: "3"
          level: 3
          typography:
            color: *color-primary
            size: xl
            weight: bold
            align: center
          spacing:
            marginBlock: none
      - name: paragraph
        properties:
          text: "Design Awards"
          typography:
            color: *color-secondary
            size: xs
            align: center
          spacing:
            marginBlock: none
    - name: layout-column
      properties:
        layout:
          align: center
          horizontalAlign: space-evenly
      components:
      - name: heading
        properties:
          text: "12"
          level: 3
          typography:
            color: *color-primary
            size: xl
            weight: bold
            align: center
          spacing:
            marginBlock: none
      - name: paragraph
        properties:
          text: "Happy Clients"
          typography:
            color: *color-secondary
            size: xs
            align: center
          spacing:
            marginBlock: none
