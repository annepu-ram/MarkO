# Zen Wellness Hero
# A calm, serene hero with soft colors and peaceful imagery
# Perfect for: Wellness apps, meditation, spas, yoga studios, health

- name: page
  properties:
    theme:
      colors:
        primary: &color-primary "#3d4a3f"
        secondary: &color-secondary "#7c8c7e"
        accent: &color-accent "#5c6b5e"
        background: &color-background "#f7f5f2"
        accent-dark: &color-accent-dark "#4a5c4c"
        focus-bg: &color-focus-bg "#e8e5e0"
        muted: &color-muted "#9cab9e"
        surface: &color-surface "#eee9e0"
        surface-light: &color-surface-light "#ffffff"
    appearance:
      background:
        type: gradient
        gradient:
          colorStart: *color-background
          colorEnd: *color-surface
          direction: 'to bottom right'
        transparency: 100
  components:
  # Minimal Navigation
  - name: titlebar
    properties:
      branding:
        showLogo: false
        title: "serenity"
      navigation:
        links:
        - label: Programs
          href: '#programs'
        - label: Teachers
          href: '#teachers'
        - label: About
          href: '#about'
        - label: Start Free
          href: '#start'
      layout:
        alignment: left
        height: 56
      scroll:
        shrinkPercentage: 70
      appearance:
        background:
          color: *color-background
          transparency: 100
        border:
          width: 0
          style: solid
          color: transparent
        focus:
          background: *color-focus-bg
          color: *color-accent
      typography:
        title:
          size: 20
          weight: medium
          color: *color-accent
        menu:
          size: 14
          weight: regular
          color: *color-secondary

  # Hero Section
  - name: layout-row
    properties:
      layout:
        align: center
        horizontalAlign: space-evenly
        wrap: wrap
      spacing:
        paddingBlock: xxxl
        paddingInline: xl
      appearance:
        background:
          color: *color-background
          transparency: 100
    components:
    # Left Content
    - name: layout-column
      properties:
        layout:
          align: start
          horizontalAlign: space-evenly
        spacing:
          paddingBlock: lg
          paddingInline: none
        appearance:
          widthMode: 45
      components:
      # Small Tag
      - name: eyebrow
        properties:
          text: "FIND YOUR CALM"
          typography:
            color: *color-muted
            size: xs
            weight: medium
            letterSpacing: wider
            transform: uppercase
          spacing:
            marginBlock: none

      # Main Headline - Gentle
      - name: heading
        properties:
          text: "Be kind to"
          level: 1
          typography:
            color: *color-primary
            size: xxxl
            weight: medium
            lineHeight: '1.15'
          spacing:
            marginBlock: none

      - name: heading
        properties:
          text: "your mind"
          level: 1
          typography:
            color: *color-accent
            size: xxxl
            weight: medium
            lineHeight: '1.15'
          spacing:
            marginBlock: none

      # Gentle Description
      - name: paragraph
        properties:
          text: |
            Take a moment to breathe. Our guided meditations help you
            find peace in the chaos, sleep better, and live more mindfully.
            Start with just 5 minutes a day.
          typography:
            color: *color-secondary
            size: lg
            lineHeight: '1.8'
            weight: light
          spacing:
            marginBlock: md

      # Features - Soft Pills
      - name: layout-row
        properties:
          layout:
            align: center
            horizontalAlign: space-evenly
            wrap: wrap
          spacing:
            marginBlock: sm
        components:
        - name: paragraph
          properties:
            text: "500+ meditations"
            typography:
              color: *color-accent
              size: sm
              weight: medium
            spacing:
              marginBlock: none
            appearance:
              background:
                color: *color-focus-bg
                transparency: 100
              radius: pill
              padding:
                block: xs
                inline: md
              shadow: soft
              shadowColor: *color-accent
        - name: paragraph
          properties:
            text: "Sleep stories"
            typography:
              color: *color-accent
              size: sm
              weight: medium
            spacing:
              marginBlock: none
            appearance:
              background:
                color: *color-focus-bg
                transparency: 100
              radius: pill
              padding:
                block: xs
                inline: md
              shadow: soft
              shadowColor: *color-accent
        - name: paragraph
          properties:
            text: "Breathwork"
            typography:
              color: *color-accent
              size: sm
              weight: medium
            spacing:
              marginBlock: none
            appearance:
              background:
                color: *color-focus-bg
                transparency: 100
              radius: pill
              padding:
                block: xs
                inline: md
              shadow: soft
              shadowColor: *color-accent

      # Soft CTA
      - name: layout-row
        properties:
          layout:
            align: center
            horizontalAlign: space-evenly
          spacing:
            marginBlock: lg
        components:
        - name: button
          properties:
            text: "Start Your Journey"
            appearance:
              background:
                type: gradient
                gradient:
                  colorStart: *color-accent
                  colorEnd: *color-accent-dark
                  direction: to right
              border:
                width: 0
                style: solid
                color: transparent
              padding:
                block: md
                inline: xl
              shadow: medium
              shadowColor: *color-accent
            typography:
              color: *color-surface-light
              weight: medium
              size: md
            spacing:
              marginBlock: none
        - name: button
          properties:
            text: "Try Free for 7 Days"
            appearance:
              background:
                color: transparent
                transparency: 0
              border:
                width: 1
                style: solid
                color: *color-accent
              padding:
                block: md
                inline: xl
            typography:
              color: *color-accent
              weight: medium
              size: md
            spacing:
              marginBlock: none
        - name: link
          properties:
            text: "Learn more"
            typography:
              color: *color-secondary
              size: md
              weight: medium
            spacing:
              marginBlock: none

      # User Count
      - name: layout-row
        properties:
          layout:
            align: center
            horizontalAlign: space-evenly
          spacing:
            marginBlock: md
        components:
        - name: paragraph
          properties:
            text: "Join 2M+ people finding their calm"
            typography:
              color: *color-muted
              size: sm
            spacing:
              marginBlock: none

    # Right - Peaceful Image
    - name: layout-column
      properties:
        layout:
          align: center
          horizontalAlign: space-evenly
        appearance:
          widthMode: 50
      components:
      - name: image
        properties:
          source:
            url: https://images.pexels.com/photos/3822622/pexels-photo-3822622.jpeg?auto=compress&cs=tinysrgb&w=1200
            altText: Person meditating in peaceful setting
          appearance:
            minHeight: 34.375
            fit: cover
            cornerStyle: xl
            shadow: soft
            shadowColor: *color-accent
            hoverEffect: zoom
          layout:
            widthMode: stretch
          spacing:
            marginBlock: none

  # Testimonial Banner
  - name: layout-column
    properties:
      layout:
        align: center
        horizontalAlign: space-evenly
      spacing:
        paddingBlock: lg
        paddingInline: xl
      appearance:
        background:
          color: *color-focus-bg
          transparency: 100
    components:
    - name: blockquote
      properties:
        quote: "This app has genuinely changed my life. I sleep better, stress less, and feel more present in every moment."
        cite: "— Jessica M., practicing for 6 months"
        typography:
          size: lg
          weight: light
          color: *color-accent
        appearance:
          background:
            color: transparent
            transparency: 0
          border:
            accentColor: *color-accent
            width: 0
            style: solid
            position: left
        spacing:
          marginBlock: none
      layout:
        widthMode: 50
