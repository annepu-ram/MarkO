# Zen Wellness Hero
# A calm, serene hero with soft colors and peaceful imagery
# Base components: page, titlebar, layout-row, layout-column, eyebrow, heading, paragraph, button, link, image, blockquote
# Section type: hero
# Layout: split_screen
# Visual style: zen_japanese
# Perfect for: Wellness apps, meditation, spas, yoga studios, health

- name: page
  properties:
    theme:
      colors:
        primary: &color-primary "#3d4a3f"
        text: &color-text "#464E47"
        secondary: &color-secondary "#7c8c7e"
        accent: &color-accent "#5c6b5e"
        background: &color-background "#f7f5f2"
    appearance:
      background:
        type: gradient
        gradient:
          colorStart: *color-background
          colorEnd: *color-background
          direction: 'to bottom right'
        opacity: 100
  components:
  # Minimal Navigation
  - name: titlebar
    properties:
      branding:
        showLogo: false
        title: "serenity"
      navigation:
        links:
        - label: Programs
          href: '#programs'
        - label: Teachers
          href: '#teachers'
        - label: About
          href: '#about'
        - label: Start Free
          href: '#start'
      layout:
        alignment: left
        height: 56
      scroll:
        shrinkPercentage: 70
      appearance:
        background:
          color: *color-background
          opacity: 100
        border:
          width: 0
          style: solid
          color: transparent
        focus:
          background: *color-background
          color: *color-accent
      typography:
        title:
          size: 20
          weight: medium
          color: *color-accent
        menu:
          size: 14
          weight: regular
          color: *color-secondary

  # Hero Section
  - name: layout-row
    properties:
      layout:
        horizontalAlign: space-evenly
        wrap: wrap
        verticalAlign: center
      spacing:
        paddingBlock: xxxl
        paddingInline: xl
      appearance:
        background:
          color: *color-background
          opacity: 100
    components:
    # Left Content
    - name: layout-column
      properties:
        layout:
          horizontalAlign: space-evenly
          widthMode: "50"
        spacing:
          paddingBlock: lg
          paddingInline: none
      components:
      # Small Tag
      - name: eyebrow
        properties:
          text: "FIND YOUR CALM"
          typography:
            color: *color-secondary
            size: xs
            weight: medium
            letterSpacing: wider
            transform: uppercase
          spacing:
            marginBlock: none

      # Main Headline - Gentle
      - name: heading
        properties:
          text: "Be kind to"
          level: 1
          typography:
            color: *color-primary
            size: xxxl
            weight: medium
            lineHeight: '1.15'
          spacing:
            marginBlock: none

      - name: heading
        properties:
          text: "your mind"
          level: 1
          typography:
            color: *color-accent
            size: xxxl
            weight: medium
            lineHeight: '1.15'
          spacing:
            marginBlock: none

      # Gentle Description
      - name: paragraph
        properties:
          text: |
            Take a moment to breathe. Our guided meditations help you
            find peace in the chaos, sleep better, and live more mindfully.
            Start with just 5 minutes a day.
          typography:
            color: *color-secondary
            size: lg
            lineHeight: '1.8'
            weight: light
          spacing:
            marginBlock: md

      # Features - Soft Pills
      - name: layout-row
        properties:
          layout:
            horizontalAlign: space-evenly
            wrap: wrap
            verticalAlign: center
          spacing:
            marginBlock: sm
        components:
        - name: paragraph
          properties:
            text: "500+ meditations"
            typography:
              color: *color-accent
              size: sm
              weight: medium
            spacing:
              marginBlock: none
              paddingBlock: xs
              paddingInline: md
            appearance:
              background:
                color: *color-background
                opacity: 100
              radius: pill
              shadow: soft
              shadowColor: *color-accent
        - name: paragraph
          properties:
            text: "Sleep stories"
            typography:
              color: *color-accent
              size: sm
              weight: medium
            spacing:
              marginBlock: none
              paddingBlock: xs
              paddingInline: md
            appearance:
              background:
                color: *color-background
                opacity: 100
              radius: pill
              shadow: soft
              shadowColor: *color-accent
        - name: paragraph
          properties:
            text: "Breathwork"
            typography:
              color: *color-accent
              size: sm
              weight: medium
            spacing:
              marginBlock: none
              paddingBlock: xs
              paddingInline: md
            appearance:
              background:
                color: *color-background
                opacity: 100
              radius: pill
              shadow: soft
              shadowColor: *color-accent

      # Soft CTA
      - name: layout-row
        properties:
          layout:
            horizontalAlign: space-evenly
            verticalAlign: center
          spacing:
            marginBlock: lg
        components:
        - name: button
          properties:
            text: "Start Your Journey"
            appearance:
              background:
                type: gradient
                gradient:
                  colorStart: *color-accent
                  colorEnd: *color-accent
                  direction: to right
              border:
                width: 0
                style: solid
                color: transparent
              shadow: medium
              shadowColor: *color-accent
            typography:
              color: *color-background
              weight: medium
              size: md
            spacing:
              marginBlock: none
              paddingBlock: md
              paddingInline: xl
        - name: button
          properties:
            text: "Try Free for 7 Days"
            appearance:
              background:
                color: transparent
                opacity: 0
              border:
                width: 1
                style: solid
                color: *color-accent
            typography:
              color: *color-accent
              weight: medium
              size: md
            spacing:
              marginBlock: none
              paddingBlock: md
              paddingInline: xl
        - name: link
          properties:
            text: "Learn more"
            typography:
              color: *color-secondary
              size: md
              weight: medium
            spacing:
              marginBlock: none

      # User Count
      - name: layout-row
        properties:
          layout:
            horizontalAlign: space-evenly
            verticalAlign: center
          spacing:
            marginBlock: md
        components:
        - name: paragraph
          properties:
            text: "Join 2M+ people finding their calm"
            typography:
              color: *color-secondary
              size: sm
            spacing:
              marginBlock: none

    # Right - Peaceful Image
    - name: layout-column
      properties:
        layout:
          horizontalAlign: space-evenly
          widthMode: "50"
      components:
      - name: image
        properties:
          source:
            url: https://images.pexels.com/photos/3822622/pexels-photo-3822622.jpeg?auto=compress&cs=tinysrgb&w=1200
            altText: Person meditating in peaceful setting
          appearance:
            minHeight: 34.375
            fit: cover
            cornerStyle: xl
            shadow: soft
            shadowColor: *color-accent
            hoverEffect: zoom
          layout:
            widthMode: stretch
          spacing:
            marginBlock: none

  # Testimonial Banner
  - name: layout-column
    properties:
      layout:
        horizontalAlign: space-evenly
      spacing:
        paddingBlock: lg
        paddingInline: xl
      appearance:
        background:
          color: *color-background
          opacity: 100
    components:
    - name: blockquote
      properties:
        quote: "This app has genuinely changed my life. I sleep better, stress less, and feel more present in every moment."
        cite: "— Jessica M., practicing for 6 months"
        typography:
          size: lg
          weight: light
          color: *color-accent
        appearance:
          background:
            color: transparent
            opacity: 0
          border:
            accentColor: *color-accent
            width: 0
            style: solid
            position: left
        spacing:
          marginBlock: none
      layout:
        widthMode: 50
