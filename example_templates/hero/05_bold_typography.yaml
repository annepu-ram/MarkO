# Bold Typography Hero
# A striking, typography-focused hero with minimal imagery
# Base components: page, titlebar, layout-column, layout-row, paragraph, heading, button
# Section type: hero
# Layout: stacked
# Visual style: bold_editorial
# Perfect for: Creative agencies, portfolios, editorial, branding studios

- name: page
  properties:
    theme:
      colors:
        primary: &color-primary "#1a1a1a"
        text: &color-text "#313131"
        secondary: &color-secondary "#666666"
        accent: &color-accent "#ff4d4d"
        background: &color-background "#f5f5f0"
    appearance:
      background:
        type: gradient
        gradient:
          colorStart: *color-background
          colorEnd: *color-background
          direction: to bottom
        opacity: 100
  components:
  # Minimal Navigation
  - name: titlebar
    properties:
      branding:
        showLogo: false
        title: "STUDIO"
      navigation:
        links:
        - label: Work
          href: '#work'
        - label: About
          href: '#about'
        - label: Contact
          href: '#contact'
      layout:
        alignment: left
        height: 60
      scroll:
        shrinkPercentage: 70
      appearance:
        background:
          color: *color-background
          opacity: 100
        border:
          width: 0
          style: solid
          color: transparent
        focus:
          background: *color-background
          color: *color-primary
      typography:
        title:
          size: 16
          weight: bold
          color: *color-primary
        menu:
          size: 14
          weight: regular
          color: *color-secondary

  # Hero Section - Typography Focused
  - name: layout-column
    properties:
      layout:
        horizontalAlign: left
        gap: md
      spacing:
        paddingBlock: xxxl
        paddingInline: xl
      appearance:
        background:
          type: gradient
          gradient:
            colorStart: *color-background
            colorEnd: *color-background
            direction: to bottom right
          opacity: 100
    components:
    # Small Intro Text
    - name: paragraph
      properties:
        text: "We are a creative studio"
        typography:
          color: *color-secondary
          size: md
          weight: regular
          letterSpacing: wide
        spacing:
          marginBlock: none

    # Giant Headline - Multiple Lines
    - name: layout-column
      properties:
        layout:
          horizontalAlign: left
      components:
      - name: heading
        properties:
          text: "We design"
          level: 1
          typography:
            color: *color-primary
            size: xxxl
            weight: bold
            lineHeight: '0.95'
            letterSpacing: tight
          spacing:
            marginBlock: none
      - name: heading
        properties:
          text: "experiences that"
          level: 1
          typography:
            color: *color-primary
            size: xxxl
            weight: bold
            lineHeight: '0.95'
            letterSpacing: tight
          spacing:
            marginBlock: none
      - name: heading
        properties:
          text: "matter."
          level: 1
          typography:
            color: *color-accent
            size: xxxl
            weight: bold
            lineHeight: '0.95'
            letterSpacing: tight
          spacing:
            marginBlock: none

    # Description - Offset to the right
    - name: layout-row
      properties:
        layout:
          horizontalAlign: right
          verticalAlign: top
          wrap: wrap
        spacing:
          marginBlock: xl
      components:
      - name: layout-column
        properties:
          layout:
            widthMode: "50"
            horizontalAlign: left
          spacing:
            paddingBlock: none
        components:
        # Empty space / visual balance
      - name: layout-column
        properties:
          layout:
            widthMode: "50"
            horizontalAlign: left
            gap: md
          spacing:
            paddingBlock: none
        components:
        - name: paragraph
          properties:
            text: |
              We're a team of designers, developers, and strategists
              who believe in the power of thoughtful design. We create
              digital experiences that connect brands with people.
            layout:
              widthMode: "75"
            typography:
              color: *color-secondary
              size: lg
              lineHeight: '1.7'
            spacing:
              marginBlock: none
        - name: layout-row
          properties:
            layout:
              horizontalAlign: left
              verticalAlign: center
            spacing:
              marginBlock: none
          components:
          - name: button
            properties:
              text: "View Our Work →"
              layout:
              appearance:
                background:
                  type: gradient
                  gradient:
                    colorStart: *color-primary
                    colorEnd: *color-primary
                    direction: to right
                border:
                  width: 0
                  style: solid
                  color: transparent
                shadow: medium
                shadowColor: *color-accent
              typography:
                color: *color-background
                weight: medium
                size: md
              spacing:
                marginBlock: none
                paddingBlock: md
                paddingInline: lg
          - name: button
            properties:
              text: "Meet the Team"
              layout:
              appearance:
                background:
                  color: transparent
                  opacity: 0
                border:
                  width: 2
                  style: solid
                  color: *color-primary
              typography:
                color: *color-primary
                weight: medium
                size: md
              spacing:
                marginBlock: none

    # Awards / Recognition Row
