# Counter-Up: Fundraising / Campaign Progress
# Animated counters showing donation milestones

- name: page
  properties:
    theme:
      colors:
        background: &color-background '#ecfdf5'
        primary: &color-primary '#064e3b'
        secondary: &color-secondary '#047857'
        accent: &color-accent '#10b981'
      fonts:
        heading: &font-heading "'Inter', sans-serif"
        content: &font-content "'Inter', sans-serif"
    appearance: { background: { color: *color-background } }
  components:
    - name: layout-row
      properties:
        layout: { horizontalAlign: center }
        spacing: { paddingBlock: xl }
      components:
        - name: layout-column
          properties:
            layout: { widthMode: '75', horizontalAlign: center }
          components:
            - name: heading
              properties:
                text: Help Us Reach Our Goal
                level: 2
                typography: { size: xxl, weight: bold, color: *color-primary, align: center }
            - name: paragraph
              properties:
                text: Every contribution makes a difference
                typography: { size: md, color: *color-secondary, align: center }
                spacing: { marginBlock: md }

    - name: layout-row
      properties:
        layout: { horizontalAlign: center }
        spacing: { paddingInline: lg }
      components:
        - name: layout-column
          properties:
            layout: { widthMode: '50', horizontalAlign: center }
            appearance: { background: { color: '#ffffff' }, radius: xl, shadow: elevated }
            spacing: { paddingBlock: xl, paddingInline: xl }
          components:
            - name: counter-up
              properties:
                endValue: 847500
                duration: 3000
                prefix: "$"
                typography: { size: xxxl, weight: extrabold, color: *color-accent, align: center }
            - name: paragraph
              properties:
                text: raised of $1,000,000 goal
                typography: { size: lg, color: *color-secondary, align: center }
                spacing: { marginBlock: sm }
            - name: progress-bar
              properties:
                percent: 85
                thickness: large
                color: *color-accent
                trackColor: '#d1fae5'
                appearance: { radius: pill }
            - name: button
              properties:
                text: Donate Now
                appearance: { background: { color: *color-accent } }
                typography: { color: '#ffffff', weight: bold }
                spacing: { marginBlock: lg }

    - name: columnsgrid
      properties:
        layout: { columns: 3, gap: lg }
        responsive: { breakpoints: { md: 2, sm: 1 } }
        spacing: { paddingBlock: xl, paddingInline: lg }
      columns:
        - components:
            - name: layout-column
              properties:
                layout: { horizontalAlign: center }
                appearance: { background: { color: '#ffffff' }, radius: lg }
                spacing: { paddingBlock: lg, paddingInline: md }
              components:
                - name: icon
                  properties: { name: volunteer_activism, size: "36", color: *color-accent }
                - name: counter-up
                  properties:
                    endValue: 12400
                    duration: 2000
                    suffix: "+"
                    typography: { size: xxl, weight: extrabold, color: *color-primary, align: center }
                - name: paragraph
                  properties:
                    text: Donors Worldwide
                    typography: { size: sm, color: *color-secondary, align: center }

        - components:
            - name: layout-column
              properties:
                layout: { horizontalAlign: center }
                appearance: { background: { color: '#ffffff' }, radius: lg }
                spacing: { paddingBlock: lg, paddingInline: md }
              components:
                - name: icon
                  properties: { name: park, size: "36", color: *color-accent }
                - name: counter-up
                  properties:
                    endValue: 5000
                    duration: 2500
                    suffix: ""
                    typography: { size: xxl, weight: extrabold, color: *color-primary, align: center }
                - name: paragraph
                  properties:
                    text: Trees Planted
                    typography: { size: sm, color: *color-secondary, align: center }

        - components:
            - name: layout-column
              properties:
                layout: { horizontalAlign: center }
                appearance: { background: { color: '#ffffff' }, radius: lg }
                spacing: { paddingBlock: lg, paddingInline: md }
              components:
                - name: icon
                  properties: { name: water_drop, size: "36", color: *color-accent }
                - name: counter-up
                  properties:
                    endValue: 2000000
                    duration: 3000
                    suffix: "L"
                    typography: { size: xxl, weight: extrabold, color: *color-primary, align: center }
                - name: paragraph
                  properties:
                    text: Clean Water Delivered
                    typography: { size: sm, color: *color-secondary, align: center }
