
- name: page
  properties:
    backgroundColor: "#f8f9fa"
  components:
    - name: titlebar
      properties:
        title: "Prestige Motors"
        logo: "https://via.placeholder.com/150x50/000000/FFFFFF?text=PM"
        backgroundColor: "#343a40"
        color: "#ffffff"
        links:
          - text: "Inventory"
            value: "#inventory"
          - text: "Financing"
            value: "#financing"
          - text: "About Us"
            value: "#about"
          - text: "Contact"
            value: "#contact"

    - name: image
      properties:
        src: "https://via.placeholder.com/1200x500/495057/FFFFFF?text=Find+Your+Dream+Car"
        alt: "Luxury sports car"
        margin: "0 0 40 0"

    - name: h1
      properties:
        text: "Experience Luxury and Performance"
        textAlign: "center"
        color: "#343a40"

    - name: paragraph
      properties:
        text: "Your trusted source for high-quality pre-owned luxury vehicles."
        textAlign: "center"
        fontSize: 18
        margin: "0 0 40 0"

    - name: h2
      properties:
        text: "Featured Vehicles"
        textAlign: "center"
        color: "#343a40"
        margin: "40 0 20 0"

    - name: columnsgrid
      properties:
        count: 3
      columns:
        - components:
            - name: image
              properties:
                src: "https://via.placeholder.com/300x200/6c757d/FFFFFF?text=Sedan"
                alt: "Luxury Sedan"
            - name: h3
              properties:
                text: "2023 Apex Sedan"
            - name: paragraph
              properties:
                text: "$55,000 - Low mileage, fully loaded."
            - name: button
              properties:
                text: "View Details"
                variant: "primary"
        - components:
            - name: image
              properties:
                src: "https://via.placeholder.com/300x200/6c757d/FFFFFF?text=SUV"
                alt: "Luxury SUV"
            - name: h3
              properties:
                text: "2022 Nova SUV"
            - name: paragraph
              properties:
                text: "$62,000 - Perfect for the family."
            - name: button
              properties:
                text: "View Details"
                variant: "primary"
        - components:
            - name: image
              properties:
                src: "https://via.placeholder.com/300x200/6c757d/FFFFFF?text=Coupe"
                alt: "Sports Coupe"
            - name: h3
              properties:
                text: "2023 Comet Coupe"
            - name: paragraph
              properties:
                text: "$75,000 - Unmatched performance."
            - name: button
              properties:
                text: "View Details"
                variant: "primary"

    - name: h2
      properties:
        text: "Financing Made Easy"
        textAlign: "center"
        color: "#343a40"
        margin: "40 0 20 0"

    - name: accordion
      properties:
        title: "Do you offer financing?"
      content:
        components:
          - name: paragraph
            properties:
              text: "Yes, we work with a variety of lenders to get you the best rates possible. You can apply online or in person."

    - name: accordion
      properties:
        title: "What do I need to apply?"
      content:
        components:
          - name: paragraph
            properties:
              text: "You will need a valid driver's license, proof of income, and proof of insurance."

    - name: h2
      properties:
        text: "Contact Us"
        textAlign: "center"
        color: "#343a40"
        margin: "40 0 20 0"

    - name: paragraph
      properties:
        text: "Visit our showroom at 123 Prestige Lane, or give us a call at 555-1234."
        textAlign: "center"

