# Pricing Card Variant: Feature Grid Card
# columnsgrid (3 cols) where each cell is a layout-column showing a feature image and paragraph description

- name: page
  properties:
    appearance:
      background: { color: '#ffffff' }
  components:
    - name: layout-column
      properties:
        layout: { horizontalAlign: center, gap: md }
        appearance:
          background: { color: '#f8fafc' }
          radius: lg
          shadow: medium
          padding: { block: xl, inline: xl }
          border: { width: 1, style: solid, color: '#e2e8f0' }
        spacing: { marginBlock: lg, marginInline: lg }
      components:
        # Card header
        - name: heading
          properties:
            text: Business Plan Features
            level: 2
            typography: { size: xxl, weight: bold, color: '#0f172a', align: center }
            spacing: { marginBlock: xs }
        - name: caption
          properties:
            text: Everything you need to scale your operations
            typography: { size: sm, color: '#64748b', align: center }
        - name: br
          properties:
            size: sm
        # Feature grid
        - name: columnsgrid
          properties:
            layout: { columns: 3, gap: md, verticalAlign: top }
            responsive: { breakpoints: { md: 2, sm: 1 } }
          columns:
            - components:
                - name: layout-column
                  properties:
                    layout: { horizontalAlign: center, gap: xs }
                    appearance:
                      background: { color: '#ffffff' }
                      radius: md
                      padding: { block: md, inline: md }
                      border: { width: 1, style: solid, color: '#e2e8f0' }
                  components:
                    - name: image
                      properties:
                        source: { url: 'https://images.unsplash.com/photo-1551288049-bebda4e38f71?w=200&h=200&fit=crop' }
                        appearance: { aspectRatio: '1/1', radius: sm, objectPosition: center }
                        layout: { widthMode: stretch }
                    - name: paragraph
                      properties:
                        text: "Real-Time Analytics"
                        typography: { size: sm, weight: semibold, color: '#1e293b', align: center }
                        spacing: { marginBlock: xxs }
                    - name: paragraph
                      properties:
                        text: "Track performance metrics with live dashboards and custom reports."
                        typography: { size: xs, color: '#64748b', align: center }
            - components:
                - name: layout-column
                  properties:
                    layout: { horizontalAlign: center, gap: xs }
                    appearance:
                      background: { color: '#ffffff' }
                      radius: md
                      padding: { block: md, inline: md }
                      border: { width: 1, style: solid, color: '#e2e8f0' }
                  components:
                    - name: image
                      properties:
                        source: { url: 'https://images.unsplash.com/photo-1522071820081-009f0129c71c?w=200&h=200&fit=crop' }
                        appearance: { aspectRatio: '1/1', radius: sm, objectPosition: center }
                        layout: { widthMode: stretch }
                    - name: paragraph
                      properties:
                        text: "Team Collaboration"
                        typography: { size: sm, weight: semibold, color: '#1e293b', align: center }
                        spacing: { marginBlock: xxs }
                    - name: paragraph
                      properties:
                        text: "Work together seamlessly with shared workspaces and commenting."
                        typography: { size: xs, color: '#64748b', align: center }
            - components:
                - name: layout-column
                  properties:
                    layout: { horizontalAlign: center, gap: xs }
                    appearance:
                      background: { color: '#ffffff' }
                      radius: md
                      padding: { block: md, inline: md }
                      border: { width: 1, style: solid, color: '#e2e8f0' }
                  components:
                    - name: image
                      properties:
                        source: { url: 'https://images.unsplash.com/photo-1563986768609-322da13575f2?w=200&h=200&fit=crop' }
                        appearance: { aspectRatio: '1/1', radius: sm, objectPosition: center }
                        layout: { widthMode: stretch }
                    - name: paragraph
                      properties:
                        text: "Secure Cloud Storage"
                        typography: { size: sm, weight: semibold, color: '#1e293b', align: center }
                        spacing: { marginBlock: xxs }
                    - name: paragraph
                      properties:
                        text: "Enterprise-grade encryption with unlimited file storage and versioning."
                        typography: { size: xs, color: '#64748b', align: center }
