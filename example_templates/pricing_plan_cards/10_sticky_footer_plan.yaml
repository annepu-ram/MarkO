# Pricing Card Variant: The Sticky Footer Plan
# layout-row designed as a bottom bar containing plan info and a "Sign Up" button
# Acts as a persistent call-to-action strip at the bottom of a pricing page

- name: page
  properties:
    theme:
      colors:
        primary: &color-primary '#0f172a'
        secondary: &color-secondary '#64748b'
        accent: &color-accent '#3b82f6'
        background: &color-background '#ffffff'
    appearance:
      background: { color: *color-background }
  components:
    # Page content above the footer (sample pricing summary)
    - name: layout-column
      properties:
        layout: { horizontalAlign: center, gap: md }
        appearance:
          background: { transparency: 0 }
          padding: { block: xl, inline: lg }
      components:
        - name: heading
          properties:
            text: "Ready to get started?"
            level: 2
            typography: { size: xxl, weight: bold, color: *color-primary, align: center }
        - name: paragraph
          properties:
            text: "Join 25,000+ teams already using our platform. Start your 14-day free trial today."
            typography: { size: md, color: *color-secondary, align: center }
            spacing: { marginBlock: sm }
        # Feature highlights
        - name: layout-row
          properties:
            layout: { horizontalAlign: center, verticalAlign: center, gap: lg, wrap: wrap }
            appearance: { background: { transparency: 0 }, padding: { block: md } }
          components:
            - name: caption
              properties:
                text: "No credit card required"
                typography: { size: sm, color: *color-secondary }
                layout: { widthMode: fit }
            - name: caption
              properties:
                text: "Cancel anytime"
                typography: { size: sm, color: *color-secondary }
                layout: { widthMode: fit }
            - name: caption
              properties:
                text: "Full feature access"
                typography: { size: sm, color: *color-secondary }
                layout: { widthMode: fit }

    # Sticky footer bar
    - name: layout-row
      properties:
        layout:
          horizontalAlign: space-between
          verticalAlign: center
          gap: md
          wrap: nowrap
        appearance:
          background: { color: *color-primary }
          shadow: dramatic
          padding: { block: md, inline: xl }
          border: { width: 0, style: none, color: *color-primary }
        spacing: { marginBlock: none, marginInline: none }
      components:
        # Left side: plan summary
        - name: layout-column
          properties:
            layout: { horizontalAlign: left, gap: none, widthMode: "50" }
            appearance: { background: { transparency: 0 } }
          components:
            - name: heading
              properties:
                text: "Pro Plan - $49/mo"
                level: 4
                typography: { size: lg, weight: bold, color: *color-background }
                spacing: { marginBlock: none }
            - name: caption
              properties:
                text: "Everything you need to grow. Billed annually."
                typography: { size: xs, color: *color-secondary }
        # Right side: CTA button
        - name: button
          properties:
            text: "Sign Up Now"
            appearance:
              background: { color: *color-accent }
              radius: md
              padding: { block: sm, inline: xl }
            typography: { color: *color-background, weight: bold, size: md }
            layout: { widthMode: fit }
