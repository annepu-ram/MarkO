# Pricing Card Variant: The Sliding Scale
# layout-column with a textbox (number input) representing user count, and caption showing calculated price
# Interactive pricing calculator concept

- name: page
  properties:
    theme:
      colors:
        primary: &color-primary '#0f172a'
        secondary: &color-secondary '#64748b'
        accent: &color-accent '#3b82f6'
        background: &color-background '#ffffff'
    appearance:
      background: { color: *color-background }
  components:
    - name: layout-column
      properties:
        layout: { horizontalAlign: center, gap: md }
        appearance:
          background: { color: *color-background }
          radius: lg
          shadow: medium
          padding: { block: xl, inline: xl }
          border: { width: 1, style: solid, color: *color-secondary }
        spacing: { marginBlock: lg, marginInline: lg }
      components:
        # Title
        - name: heading
          properties:
            text: Pay Per Seat
            level: 2
            typography: { size: xxl, weight: bold, color: *color-primary, align: center }
            spacing: { marginBlock: xs }
        - name: paragraph
          properties:
            text: "Only pay for what you need. Adjust your team size anytime."
            typography: { size: sm, color: *color-secondary, align: center }
        - name: br
          properties:
            size: sm
        # User count input
        - name: layout-column
          properties:
            layout: { horizontalAlign: center, gap: xs }
            appearance:
              background: { color: *color-background, transparency: 100 }
              radius: md
              padding: { block: md, inline: lg }
              border: { width: 1, style: solid, color: *color-secondary }
          components:
            - name: caption
              properties:
                text: "Number of team members"
                typography: { size: xs, weight: semibold, color: *color-secondary, align: center, transform: uppercase, letterSpacing: wide }
            - name: textbox
              properties:
                label:
                  text: ""
                  show: false
                field:
                  placeholder: "10"
                  value: "10"
                appearance:
                  border: { width: 2, style: solid, color: *color-accent }
                  background: { color: *color-background, transparency: 100 }
                  radius: md
                typography:
                  size: xxl
                  weight: bold
                  color: *color-primary
                  align: center
        - name: br
          properties:
            size: sm
        # Calculated price display
        - name: layout-column
          properties:
            layout: { horizontalAlign: center, gap: xxs }
            appearance: { background: { transparency: 0 } }
          components:
            - name: heading
              properties:
                text: "$120"
                level: 2
                typography: { size: xxxl, weight: extrabold, color: *color-accent, align: center }
                spacing: { marginBlock: none }
            - name: caption
              properties:
                text: "per month ($12/user)"
                typography: { size: sm, color: *color-secondary, align: center }
        - name: br
          properties:
            size: xs
        # Price breakdown
        - name: layout-row
          properties:
            layout: { horizontalAlign: space-between, verticalAlign: center, gap: sm, wrap: nowrap }
            appearance:
              background: { color: *color-background, transparency: 100 }
              radius: sm
              padding: { block: sm, inline: md }
          components:
            - name: paragraph
              properties:
                text: "10 users x $12/user"
                typography: { size: xs, color: *color-secondary }
                layout: { widthMode: "50" }
            - name: paragraph
              properties:
                text: "$120.00/mo"
                typography: { size: xs, weight: semibold, color: *color-primary, align: right }
                layout: { widthMode: "50" }
        - name: br
          properties:
            size: md
        # CTA
        - name: button
          properties:
            text: Start with 10 Users
            appearance:
              background: { color: *color-accent }
              radius: md
              padding: { block: md }
            typography: { color: *color-background, weight: bold }
            layout: { widthMode: stretch }
        - name: caption
          properties:
            text: "Volume discounts available for 50+ users"
            typography: { size: xs, color: *color-secondary, align: center }
            spacing: { marginBlock: xs }
