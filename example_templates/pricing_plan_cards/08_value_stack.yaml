# Pricing Card Variant: The Value Stack
# layout-column where each line is a layout-row containing a checkmark-style paragraph and a feature description

- name: page
  properties:
    appearance:
      background: { color: '#fafafa' }
  components:
    - name: layout-column
      properties:
        layout: { horizontalAlign: center, gap: sm }
        appearance:
          background: { color: '#ffffff' }
          radius: lg
          shadow: medium
          padding: { block: xl, inline: lg }
          border: { width: 1, style: solid, color: '#e5e7eb' }
        spacing: { marginBlock: lg, marginInline: lg }
      components:
        # Plan header
        - name: heading
          properties:
            text: Pro Plan
            level: 3
            typography: { size: xl, weight: bold, color: '#111827', align: center }
            spacing: { marginBlock: xs }
        - name: heading
          properties:
            text: "$59/mo"
            level: 2
            typography: { size: xxl, weight: extrabold, color: '#059669', align: center }
            spacing: { marginBlock: none }
        - name: caption
          properties:
            text: "billed annually, or $69 monthly"
            typography: { size: xs, color: '#9ca3af', align: center }
        - name: br
          properties:
            size: md
        # Value stack - feature rows with checkmarks
        - name: layout-row
          properties:
            layout: { horizontalAlign: left, verticalAlign: center, gap: sm, wrap: nowrap }
            appearance: { background: { transparency: 0 }, padding: { block: xs, inline: sm } }
          components:
            - name: paragraph
              properties:
                text: "\u2713"
                typography: { size: md, weight: bold, color: '#059669' }
                layout: { widthMode: fit }
                spacing: { marginBlock: none }
            - name: paragraph
              properties:
                text: "Unlimited projects and workspaces"
                typography: { size: sm, color: '#374151' }
                layout: { widthMode: stretch }
                spacing: { marginBlock: none }

        - name: layout-row
