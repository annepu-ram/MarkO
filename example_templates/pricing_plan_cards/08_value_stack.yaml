# Pricing Card Variant: The Value Stack
# layout-column where each line is a layout-row containing a checkmark-style paragraph and a feature description
# Base components: layout-column, heading, caption, br, layout-row, paragraph, button
# Section type: pricing
# Layout: stacked
# Visual style: card_based
# Perfect for: SaaS, subscriptions, memberships, services, ecommerce

- name: page
  properties:
    theme:
      colors:
        primary: &color-primary '#111827'
        text: &color-text '#2C3039'
        secondary: &color-secondary '#9ca3af'
        accent: &color-accent '#059669'
        background: &color-background '#ffffff'
    appearance:
      background: {color: *color-background}
  components:
  - name: layout-column
    properties:
      layout: {horizontalAlign: center, gap: sm}
      appearance:
        background: {color: *color-background}
        radius: lg
        shadow: medium
        border: {width: 1, style: solid, color: *color-secondary}
      spacing: {marginBlock: lg, marginInline: lg, paddingBlock: xl, paddingInline: lg}
    components:
        # Plan header
    - name: heading
      properties:
        text: Pro Plan
        level: 3
        typography: {size: xl, weight: bold, color: *color-primary, align: center}
        spacing: {marginBlock: xs}
    - name: heading
      properties:
        text: "$59/mo"
        level: 2
        typography: {size: xxl, weight: extrabold, color: *color-accent, align: center}
        spacing: {marginBlock: none}
    - name: caption
      properties:
        text: "billed annually, or $69 monthly"
        typography: {size: xs, color: *color-secondary, align: center}
    - name: br
      properties:
        size: md
        # Value stack - feature rows with checkmarks
    - name: layout-row
      properties:
        layout: {horizontalAlign: left, verticalAlign: center, gap: sm, wrap: nowrap}
        appearance: {background: {transparency: 0}}
        spacing:
          paddingBlock: xs
          paddingInline: sm
      components:
      - name: paragraph
        properties:
          text: "✓"
          typography: {size: md, weight: bold, color: *color-accent}
          layout: {widthMode: fit}
          spacing: {marginBlock: none}
      - name: paragraph
        properties:
          text: "Unlimited projects and workspaces"
          typography: {size: sm, color: *color-text}
          layout: {widthMode: stretch}
          spacing: {marginBlock: none}

    - name: layout-row
      properties:
        layout: {horizontalAlign: left, verticalAlign: center, gap: sm, wrap: nowrap}
        appearance: {background: {color: *color-accent, transparency: 100}, radius: sm}
        spacing:
          paddingBlock: xs
          paddingInline: sm
      components:
      - name: paragraph
        properties:
          text: "✓"
          typography: {size: md, weight: bold, color: *color-accent}
          layout: {widthMode: fit}
          spacing: {marginBlock: none}
      - name: paragraph
        properties:
          text: "Advanced analytics and custom reports"
          typography: {size: sm, color: *color-text}
          layout: {widthMode: stretch}
          spacing: {marginBlock: none}

    - name: layout-row
      properties:
        layout: {horizontalAlign: left, verticalAlign: center, gap: sm, wrap: nowrap}
        appearance: {background: {transparency: 0}}
        spacing:
          paddingBlock: xs
          paddingInline: sm
      components:
      - name: paragraph
        properties:
          text: "✓"
          typography: {size: md, weight: bold, color: *color-accent}
          layout: {widthMode: fit}
          spacing: {marginBlock: none}
      - name: paragraph
