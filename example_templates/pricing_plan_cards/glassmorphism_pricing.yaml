# Glassmorphism Pricing Plans
# Three frosted glass pricing tiers on a vibrant gradient background
# Base components: site, page, layout-column, columnsgrid, layout-row, heading, paragraph, eyebrow, button
# Section type: pricing
# Layout: grid
# Visual style: glassmorphism
# Perfect for: SaaS platform, tech startup, creative portfolio, design studio, fintech

- name: site
  properties:
    theme:
      fonts:
        heading: "'Inter', sans-serif"
        content: "'Inter', sans-serif"
      colors:
        primary: '#ffffff'
        text: '#DFDFDF'
        secondary: '#B0D4E8'
        accent: '#3182CE'
        background: '#0f172a'
  components:
    - name: page
      slug: home
      title: "Glassmorphism Pricing Plans"
      properties:
        appearance:
          background:
            color: '#0f172a'
            transparency: 100
      components:

        # Gradient outer wrapper — mandatory for glassmorphism blur visibility
        - name: layout-column
          properties:
            layout:
              horizontalAlign: center
            appearance:
              background:
                type: gradient
                gradient:
                  colorStart: '#3182CE'
                  colorEnd: '#0f172a'
                  direction: to bottom right
                transparency: 100
            spacing:
              paddingBlock: none
              paddingInline: none
          components:

            # Section header
            - name: layout-row
              properties:
                layout:
                  horizontalAlign: center
                spacing:
                  paddingBlock: xl
                  paddingInline: lg
              components:
                - name: layout-column
                  properties:
                    layout:
                      widthMode: '66'
                      horizontalAlign: center
                  components:
                    - name: eyebrow
                      properties:
                        text: PRICING
                        typography:
                          size: xs
                          weight: semibold
                          color: '#B0D4E8'
                          transform: uppercase
                          letterSpacing: wider
                          align: center
                    - name: heading
                      properties:
                        text: Simple, transparent pricing
                        level: 2
                        typography:
                          size: xxl
                          weight: bold
                          color: '#ffffff'
                          align: center
                        spacing:
                          marginBlock: sm
                    - name: paragraph
                      properties:
                        text: Choose the plan that fits your team. No hidden fees, no surprises. Upgrade or downgrade at any time.
                        typography:
                          size: md
                          color: '#DFDFDF'
                          align: center
                          lineHeight: relaxed
                        spacing:
                          marginBlock: sm

            # Pricing cards — 3-column glass grid
            - name: columnsgrid
              properties:
                layout:
                  columns: 3
                  gap: lg
                responsive:
                  breakpoints:
                    md: 2
                    sm: 1
                spacing:
                  paddingBlock: lg
                  paddingInline: xl
              columns:

                # Card 1 — Starter
                - components:
                    - name: layout-column
                      properties:
                        layout:
                          horizontalAlign: center
                          gap: sm
                        appearance:
                          background:
                            color: '#ffffff'
                            transparency: 15
                          blur: true
                          radius: lg
                          border:
                            width: 1
                            style: solid
                            color: '#ffffff'
                          shadow: soft
                        spacing:
                          paddingBlock: xl
                          paddingInline: lg
                      components:
                        - name: heading
                          properties:
                            text: Starter
                            level: 3
                            typography:
                              size: xl
                              weight: bold
                              color: '#ffffff'
                              align: center
                            spacing:
                              marginBlock: xs
                        - name: paragraph
                          properties:
                            text: Perfect for individuals and small projects
                            typography:
                              size: sm
                              color: '#B0D4E8'
                              align: center
                            spacing:
                              marginBlock: xs
                        - name: heading
                          properties:
                            text: "$0"
                            level: 2
                            typography:
                              size: xxxl
                              weight: extrabold
                              color: '#ffffff'
                              align: center
                            spacing:
                              marginBlock: xs
                        - name: paragraph
                          properties:
                            text: per month, forever free
                            typography:
                              size: xs
                              color: '#B0D4E8'
                              align: center
                            spacing:
                              marginBlock: md
                        - name: paragraph
                          properties:
                            text: "Up to 3 projects"
                            typography:
                              size: sm
                              color: '#DFDFDF'
                            spacing:
                              marginBlock: xxs
                        - name: paragraph
                          properties:
                            text: "1 team member"
                            typography:
                              size: sm
                              color: '#DFDFDF'
                            spacing:
                              marginBlock: xxs
                        - name: paragraph
                          properties:
                            text: "5 GB storage"
                            typography:
                              size: sm
                              color: '#DFDFDF'
                            spacing:
                              marginBlock: xxs
                        - name: paragraph
                          properties:
                            text: "Community support"
                            typography:
                              size: sm
                              color: '#DFDFDF'
                            spacing:
                              marginBlock: md
                        - name: button
                          properties:
                            text: Get Started Free
                            appearance:
                              background:
                                color: '#ffffff'
                                transparency: 20
                              blur: true
                              border:
                                width: 1
                                style: solid
                                color: '#ffffff'
                              radius: pill
                            typography:
                              color: '#ffffff'
                              weight: semibold
                              size: sm
                            layout:
                              widthMode: stretch
                            spacing:
                              paddingBlock: sm

                # Card 2 — Pro (highlighted with solid accent background)
                - components:
                    - name: layout-column
                      properties:
                        layout:
                          horizontalAlign: center
                          gap: sm
                        appearance:
                          background:
                            color: '#3182CE'
                            transparency: 80
                          blur: true
                          radius: lg
                          border:
                            width: 1
                            style: solid
                            color: '#ffffff'
                          shadow: soft
                        spacing:
                          paddingBlock: xl
                          paddingInline: lg
                      components:
                        - name: eyebrow
                          properties:
                            text: MOST POPULAR
                            typography:
                              size: xxs
                              weight: semibold
                              color: '#ffffff'
                              transform: uppercase
                              letterSpacing: wider
                              align: center
                            spacing:
                              marginBlock: xs
                        - name: heading
                          properties:
                            text: Pro
                            level: 3
                            typography:
                              size: xl
                              weight: bold
                              color: '#ffffff'
                              align: center
                            spacing:
                              marginBlock: xs
                        - name: paragraph
                          properties:
                            text: Ideal for growing teams and businesses
                            typography:
                              size: sm
                              color: '#DFDFDF'
                              align: center
                            spacing:
                              marginBlock: xs
                        - name: heading
                          properties:
                            text: "$49"
                            level: 2
                            typography:
                              size: xxxl
                              weight: extrabold
                              color: '#ffffff'
                              align: center
                            spacing:
                              marginBlock: xs
                        - name: paragraph
                          properties:
                            text: per month, billed annually
                            typography:
                              size: xs
                              color: '#DFDFDF'
                              align: center
                            spacing:
                              marginBlock: md
                        - name: paragraph
                          properties:
                            text: "Unlimited projects"
                            typography:
                              size: sm
                              color: '#ffffff'
                            spacing:
                              marginBlock: xxs
                        - name: paragraph
                          properties:
                            text: "Up to 25 team members"
                            typography:
                              size: sm
                              color: '#ffffff'
                            spacing:
                              marginBlock: xxs
                        - name: paragraph
                          properties:
                            text: "100 GB storage"
                            typography:
                              size: sm
                              color: '#ffffff'
                            spacing:
                              marginBlock: xxs
                        - name: paragraph
                          properties:
                            text: "Priority email support"
                            typography:
                              size: sm
                              color: '#ffffff'
                            spacing:
                              marginBlock: md
                        - name: button
                          properties:
                            text: Start Pro Trial
                            appearance:
                              background:
                                color: '#ffffff'
                                transparency: 100
                              border:
                                width: 0
                                style: solid
                                color: transparent
                              radius: pill
                              shadow: soft
                            typography:
                              color: '#3182CE'
                              weight: bold
                              size: sm
                            layout:
                              widthMode: stretch
                            spacing:
                              paddingBlock: sm

                # Card 3 — Enterprise
                - components:
                    - name: layout-column
                      properties:
                        layout:
                          horizontalAlign: center
                          gap: sm
                        appearance:
                          background:
                            color: '#ffffff'
                            transparency: 15
                          blur: true
                          radius: lg
                          border:
                            width: 1
                            style: solid
                            color: '#ffffff'
                          shadow: soft
                        spacing:
                          paddingBlock: xl
                          paddingInline: lg
                      components:
                        - name: heading
                          properties:
                            text: Enterprise
                            level: 3
                            typography:
                              size: xl
                              weight: bold
                              color: '#ffffff'
                              align: center
                            spacing:
                              marginBlock: xs
                        - name: paragraph
                          properties:
                            text: For large organizations with advanced needs
                            typography:
                              size: sm
                              color: '#B0D4E8'
                              align: center
                            spacing:
                              marginBlock: xs
                        - name: heading
                          properties:
                            text: "$199"
                            level: 2
                            typography:
                              size: xxxl
                              weight: extrabold
                              color: '#ffffff'
                              align: center
                            spacing:
                              marginBlock: xs
                        - name: paragraph
                          properties:
                            text: per month, billed annually
                            typography:
                              size: xs
                              color: '#B0D4E8'
                              align: center
                            spacing:
                              marginBlock: md
                        - name: paragraph
                          properties:
                            text: "Unlimited everything"
                            typography:
                              size: sm
                              color: '#DFDFDF'
                            spacing:
                              marginBlock: xxs
                        - name: paragraph
                          properties:
                            text: "Dedicated account manager"
                            typography:
                              size: sm
                              color: '#DFDFDF'
                            spacing:
                              marginBlock: xxs
                        - name: paragraph
                          properties:
                            text: "Custom SLA & SSO"
                            typography:
                              size: sm
                              color: '#DFDFDF'
                            spacing:
                              marginBlock: xxs
                        - name: paragraph
                          properties:
                            text: "24/7 phone support"
                            typography:
                              size: sm
                              color: '#DFDFDF'
                            spacing:
                              marginBlock: md
                        - name: button
                          properties:
                            text: Contact Sales
                            appearance:
                              background:
                                color: '#ffffff'
                                transparency: 20
                              blur: true
                              border:
                                width: 1
                                style: solid
                                color: '#ffffff'
                              radius: pill
                            typography:
                              color: '#ffffff'
                              weight: semibold
                              size: sm
                            layout:
                              widthMode: stretch
                            spacing:
                              paddingBlock: sm

            # Bottom spacer
            - name: layout-row
              properties:
                spacing:
                  paddingBlock: xl
