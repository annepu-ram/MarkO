# Pricing Card Variant: The Tiered Comparison
# layout-column containing heading (Plan Name), caption (Price), br, and a list of paragraph items with checkbox icons

- name: page
  properties:
    appearance:
      background: { color: '#f9fafb' }
  components:
    - name: layout-column
      properties:
        layout: { horizontalAlign: center, gap: sm }
        appearance:
          background: { color: '#ffffff' }
          radius: lg
          shadow: medium
          padding: { block: lg, inline: lg }
          border: { width: 1, style: solid, color: '#e5e7eb' }
        spacing: { marginBlock: lg, marginInline: lg }
      components:
        - name: heading
          properties:
            text: Professional
            level: 3
            typography: { size: xl, weight: bold, color: '#111827', align: center }
            spacing: { marginBlock: xs }
        - name: caption
          properties:
            text: Best for growing teams
            typography: { size: sm, color: '#6b7280', align: center }
        - name: br
          properties:
            size: xs
        - name: heading
          properties:
            text: "$49"
            level: 2
            typography: { size: xxxl, weight: extrabold, color: '#2563eb', align: center }
            spacing: { marginBlock: none }
        - name: caption
          properties:
            text: per month, billed annually
            typography: { size: xs, color: '#9ca3af', align: center }
        - name: br
          properties:
            size: md
        - name: layout-column
          properties:
            layout: { horizontalAlign: left, gap: xs }
            appearance: { background: { transparency: 0 } }
          components:
            - name: paragraph
              properties:
                text: "Unlimited projects"
                typography: { size: sm, color: '#374151' }
                spacing: { marginBlock: xxs }
            - name: paragraph
              properties:
                text: "Up to 25 team members"
                typography: { size: sm, color: '#374151' }
                spacing: { marginBlock: xxs }
            - name: paragraph
              properties:
                text: "Advanced analytics dashboard"
                typography: { size: sm, color: '#374151' }
                spacing: { marginBlock: xxs }
            - name: paragraph
              properties:
                text: "Priority email support"
                typography: { size: sm, color: '#374151' }
                spacing: { marginBlock: xxs }
            - name: paragraph
              properties:
                text: "Custom integrations"
                typography: { size: sm, color: '#374151' }
                spacing: { marginBlock: xxs }
            - name: paragraph
              properties:
                text: "API access"
                typography: { size: sm, color: '#374151' }
                spacing: { marginBlock: xxs }
        - name: br
          properties:
            size: md
        - name: button
          properties:
            text: Get Started
            appearance: { background: { color: '#2563eb' }, radius: md, padding: { block: md } }
            typography: { color: '#ffffff', weight: bold }
            layout: { widthMode: stretch }
