# Pricing Card Variant: The Enterprise Inquiry
# layout-column with heading ("Custom"), paragraph ("For 100+ users"), feature highlights, and a CTA button
# Designed for enterprise customers who need to contact sales
# Base components: layout-column, eyebrow, heading, paragraph, br, button, caption
# Section type: pricing
# Layout: centered
# Visual style: dark_mode
# Perfect for: SaaS, subscriptions, memberships, services, ecommerce

- name: page
  properties:
    theme:
      colors:
        primary: &color-primary '#0f172a'
        text: &color-text '#2B2F3B'
        secondary: &color-secondary '#94a3b8'
        accent: &color-accent '#3b82f6'
        background: &color-background '#ffffff'
    appearance:
      background: {color: *color-background}
  components:
  - name: layout-column
    properties:
      layout: {horizontalAlign: center, gap: sm}
      appearance:
        background:
          type: gradient
          gradient:
            colorStart: *color-primary
            colorEnd: *color-primary
            direction: 'to bottom right'
        radius: xl
        shadow: dramatic
      spacing: {marginBlock: lg, marginInline: lg, paddingBlock: xl, paddingInline: xl}
    components:
        # Badge
    - name: eyebrow
      properties:
        text: ENTERPRISE
        typography:
          size: xxs
          weight: bold
          color: *color-secondary
          align: center
          transform: uppercase
          letterSpacing: wider
        spacing: {marginBlock: xxs}
        # Plan title
    - name: heading
      properties:
        text: Custom Pricing
        level: 2
        typography: {size: xxl, weight: extrabold, color: *color-background, align: center}
        spacing: {marginBlock: xs}
        # Subtitle
    - name: paragraph
      properties:
        text: "Tailored solutions for organizations with 100+ users"
        typography: {size: md, color: *color-secondary, align: center}
        spacing: {marginBlock: xs}
    - name: br
      properties:
        size: sm
        # Feature highlights
    - name: layout-column
      properties:
        layout: {horizontalAlign: left, gap: xs}
        appearance:
          background: {color: *color-primary, transparency: 100}
          radius: md
        spacing:
          paddingBlock: md
          paddingInline: md
      components:
      - name: paragraph
        properties:
          text: "Dedicated account manager"
          typography: {size: sm, color: *color-background}
          spacing: {marginBlock: xxs}
      - name: paragraph
        properties:
          text: "Custom SLA & uptime guarantees"
          typography: {size: sm, color: *color-background}
          spacing: {marginBlock: xxs}
      - name: paragraph
        properties:
          text: "On-premise deployment options"
          typography: {size: sm, color: *color-background}
          spacing: {marginBlock: xxs}
      - name: paragraph
        properties:
          text: "Advanced compliance & audit logs"
          typography: {size: sm, color: *color-background}
          spacing: {marginBlock: xxs}
      - name: paragraph
        properties:
          text: "Unlimited seats & storage"
          typography: {size: sm, color: *color-background}
          spacing: {marginBlock: xxs}
    - name: br
      properties:
        size: md
        # CTA button (implies opening contact form)
    - name: button
      properties:
        text: Talk to Sales
        appearance:
          background: {color: *color-accent}
          radius: md
        typography: {color: *color-background, weight: bold, size: md}
        layout: {widthMode: stretch}
        spacing:
          paddingBlock: md
          paddingInline: xl
        # Secondary link
    - name: caption
      properties:
        text: "No commitment required. Get a custom quote in 24 hours."
        typography: {size: xs, color: *color-secondary, align: center}
        spacing: {marginBlock: xs}
