# Countdown: Membership Deadline
# Enrollment deadline section with countdown timer, benefits list, and call to action
# Base components: page, layout-row, layout-column, eyebrow, heading, paragraph, countdown, button, icon, badge
# Section type: countdown
# Layout: stacked
# Visual style: modern_minimalist
# Perfect for: education, gym, courses, memberships

- name: page
  properties:
    theme:
      colors:
        background: &color-background '#0f172a'
        primary: &color-primary '#f8fafc'
        text: &color-text '#cbd5e1'
        secondary: &color-secondary '#94a3b8'
        accent: &color-accent '#f59e0b'
      fonts:
        heading: &font-heading "'Inter', sans-serif"
        content: &font-content "'Inter', sans-serif"
    appearance: { background: { color: *color-background } }
  components:
    - name: layout-row
      properties:
        layout: { horizontalAlign: center, verticalAlign: center }
        spacing: { paddingBlock: xxxl, paddingInline: lg }
      components:
        - name: layout-column
          properties:
            layout: { widthMode: '66', horizontalAlign: center }
          components:
            - name: badge
              properties: { text: "LIMITED TIME OFFER", variant: warning, pill: true }
            - name: heading
              properties:
                text: Founding Member Registration Closes Soon
                level: 1
                typography: { size: xxxl, weight: extrabold, color: *color-primary, align: center }
                spacing: { marginBlock: md }
            - name: paragraph
              properties:
                text: Lock in your lifetime rate before enrollment closes. Join thousands of members already transforming their skills.
                typography: { size: lg, color: *color-secondary, align: center }
                spacing: { marginBlock: md }

            - name: countdown
              properties:
                targetDate: '2026-07-01T23:59:59'
                format: 'DD:HH:MM:SS'
                expiredText: "Registration is now closed."
                typography: { size: xxl, weight: bold, color: *color-accent, align: center }

    - name: layout-row
      properties:
        layout: { horizontalAlign: center }
        spacing: { paddingBlock: lg, paddingInline: lg }
      components:
        - name: layout-column
          properties:
            layout: { widthMode: '50', horizontalAlign: left }
            appearance: { background: { color: '#1e293b' }, radius: lg }
            spacing: { paddingBlock: xl, paddingInline: xl }
          components:
            - name: heading
              properties:
                text: What You Get
                level: 3
                typography: { size: lg, weight: semibold, color: *color-primary }
                spacing: { marginBlock: sm }

            - name: layout-row
              properties:
                layout: { horizontalAlign: left, verticalAlign: center, gap: sm }
                spacing: { marginBlock: sm }
              components:
                - name: icon
                  properties: { name: check-circle, size: "20", color: '#10b981' }
                - name: paragraph
                  properties:
                    text: Unlimited access to all 200+ courses and workshops
                    typography: { size: sm, color: *color-text }

            - name: layout-row
              properties:
                layout: { horizontalAlign: left, verticalAlign: center, gap: sm }
                spacing: { marginBlock: sm }
              components:
                - name: icon
                  properties: { name: check-circle, size: "20", color: '#10b981' }
                - name: paragraph
                  properties:
                    text: Weekly live Q&A sessions with industry experts
                    typography: { size: sm, color: *color-text }

            - name: layout-row
              properties:
                layout: { horizontalAlign: left, verticalAlign: center, gap: sm }
                spacing: { marginBlock: sm }
              components:
                - name: icon
                  properties: { name: check-circle, size: "20", color: '#10b981' }
                - name: paragraph
                  properties:
                    text: Private community with 15,000+ active members
                    typography: { size: sm, color: *color-text }

            - name: layout-row
              properties:
                layout: { horizontalAlign: left, verticalAlign: center, gap: sm }
                spacing: { marginBlock: sm }
              components:
                - name: icon
                  properties: { name: check-circle, size: "20", color: '#10b981' }
                - name: paragraph
                  properties:
                    text: Certificate of completion for every course
                    typography: { size: sm, color: *color-text }

            - name: layout-row
              properties:
                layout: { horizontalAlign: left, verticalAlign: center, gap: sm }
                spacing: { marginBlock: sm }
              components:
                - name: icon
                  properties: { name: check-circle, size: "20", color: '#10b981' }
                - name: paragraph
                  properties:
                    text: Founding member price locked for life — $29/mo instead of $79/mo
                    typography: { size: sm, color: *color-text }

    - name: layout-row
      properties:
        layout: { horizontalAlign: center, gap: md }
        spacing: { paddingBlock: xl, paddingInline: lg }
      components:
        - name: button
          properties:
            text: Claim Your Spot Now
            appearance: { background: { color: *color-accent } }
            typography: { color: *color-background, weight: bold, size: lg }
        - name: button
          properties:
            text: View Course Catalog
            appearance: { background: { color: 'transparent' }, border: { width: 1, color: *color-secondary } }
            typography: { color: *color-secondary, weight: semibold }
