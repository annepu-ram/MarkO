# Countdown: Event Registration
# Conference/event page with countdown and speaker lineup

- name: page
  properties:
    theme:
      colors:
        background: &color-background '#faf5ff'
        primary: &color-primary '#1e1b4b'
        secondary: &color-secondary '#6b7280'
        accent: &color-accent '#7c3aed'
      fonts:
        heading: &font-heading "'Inter', sans-serif"
        content: &font-content "'Inter', sans-serif"
    appearance: { background: { color: *color-background } }
  components:
    - name: layout-row
      properties:
        layout: { horizontalAlign: center }
        spacing: { paddingBlock: xl }
        appearance: { background: { type: gradient, gradient: { colorStart: '#7c3aed', colorEnd: '#4f46e5', direction: 'to bottom right' } } }
      components:
        - name: layout-column
          properties:
            layout: { widthMode: '75', horizontalAlign: center }
          components:
            - name: eyebrow
              properties:
                text: OCTOBER 15-17, 2026
                typography: { size: sm, weight: semibold, color: '#c4b5fd', transform: uppercase, letterSpacing: wider, align: center }
            - name: heading
              properties:
                text: DevConnect Summit 2026
                level: 1
                typography: { size: xxxl, weight: extrabold, color: '#ffffff', align: center }
                spacing: { marginBlock: sm }
            - name: paragraph
              properties:
                text: The premier developer conference. Three days of talks, workshops, and networking.
                typography: { size: lg, color: '#e0e7ff', align: center }
                spacing: { marginBlock: md }
            - name: countdown
              properties:
                targetDate: '2026-10-15T09:00:00'
                format: 'DD:HH:MM:SS'
                expiredText: "The event has started!"
                typography: { size: xxl, weight: bold, color: '#ffffff', align: center }
            - name: layout-row
              properties:
                layout: { horizontalAlign: center, gap: sm }
                spacing: { marginBlock: lg }
              components:
                - name: button
                  properties:
                    text: Register Now - $299
                    appearance: { background: { color: '#ffffff' } }
                    typography: { color: *color-accent, weight: bold }
                - name: button
                  properties:
                    text: View Schedule
                    appearance: { background: { color: 'transparent' }, border: { width: 1, color: '#ffffff' } }
                    typography: { color: '#ffffff', weight: semibold }

    - name: layout-row
      properties:
        layout: { horizontalAlign: center }
        spacing: { paddingBlock: xl }
      components:
        - name: layout-column
          properties:
            layout: { widthMode: '75', horizontalAlign: center }
          components:
            - name: heading
              properties:
                text: Featured Speakers
                level: 2
                typography: { size: xxl, weight: bold, color: *color-primary, align: center }
                spacing: { marginBlock: md }

    - name: columnsgrid
      properties:
        layout: { columns: 3, gap: lg }
        responsive: { breakpoints: { md: 2, sm: 1 } }
        spacing: { paddingBlock: md, paddingInline: lg }
      columns:
        - components:
            - name: layout-column
              properties:
                layout: { horizontalAlign: center }
                appearance: { background: { color: '#ffffff' }, radius: lg, shadow: soft }
                spacing: { paddingBlock: xl, paddingInline: lg }
              components:
                - name: icon
                  properties: { name: person, size: "48", color: *color-accent }
                - name: heading
                  properties:
                    text: Dr. Sarah Chen
                    level: 3
                    typography: { size: lg, weight: semibold, color: *color-primary, align: center }
                    spacing: { marginBlock: sm }
                - name: badge
                  properties: { text: "KEYNOTE", variant: warning, pill: true }
                - name: paragraph
                  properties:
                    text: "AI & Machine Learning"
                    typography: { size: sm, color: *color-secondary, align: center }
                    spacing: { marginBlock: sm }

        - components:
            - name: layout-column
              properties:
                layout: { horizontalAlign: center }
                appearance: { background: { color: '#ffffff' }, radius: lg, shadow: soft }
                spacing: { paddingBlock: xl, paddingInline: lg }
              components:
                - name: icon
                  properties: { name: person, size: "48", color: *color-accent }
                - name: heading
                  properties:
                    text: Marcus Rivera
                    level: 3
                    typography: { size: lg, weight: semibold, color: *color-primary, align: center }
                    spacing: { marginBlock: sm }
                - name: badge
                  properties: { text: "WORKSHOP", variant: success, pill: true }
                - name: paragraph
                  properties:
                    text: "Full-Stack Architecture"
                    typography: { size: sm, color: *color-secondary, align: center }
                    spacing: { marginBlock: sm }

        - components:
            - name: layout-column
              properties:
                layout: { horizontalAlign: center }
                appearance: { background: { color: '#ffffff' }, radius: lg, shadow: soft }
                spacing: { paddingBlock: xl, paddingInline: lg }
              components:
                - name: icon
                  properties: { name: person, size: "48", color: *color-accent }
                - name: heading
                  properties:
                    text: Aiko Tanaka
                    level: 3
                    typography: { size: lg, weight: semibold, color: *color-primary, align: center }
                    spacing: { marginBlock: sm }
                - name: badge
                  properties: { text: "PANEL", variant: info, pill: true }
                - name: paragraph
                  properties:
                    text: "Cloud Infrastructure"
                    typography: { size: sm, color: *color-secondary, align: center }
                    spacing: { marginBlock: sm }
