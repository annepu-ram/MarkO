# Retro Vintage Pricing Plans
# Nostalgic pricing tiers with poster-style typography and chunky borders
# Base components: site, page, layout-column, columnsgrid, layout-row, heading, paragraph, eyebrow, button
# Section type: pricing
# Layout: grid
# Visual style: retro_vintage
# Content volume: rich
# Tone: casual
# Conversion intent: purchase
# Image requirement: none
# Interactivity: static
# Industries: saas, restaurant, portfolio, entertainment
# Perfect for: creative portfolio, music platform, fashion brand, design studio, restaurant

- name: site
  properties:
    theme:
      fonts:
        heading: "'Bebas Neue', sans-serif"
        content: "'Merriweather', serif"
      colors:
        primary: &color-primary '#0D0D0D'
        text: &color-text '#292929'
        secondary: &color-secondary '#FFD600'
        accent: *color-background
        background: &color-background '#FF0000'
  components:
    - name: page
      slug: home
      title: "Retro Vintage Pricing Plans"
      properties:
        appearance:
          background:
            color: *color-background
            opacity: 100
      components:

        # Section Header
        - name: layout-row
          properties:
            layout:
              horizontalAlign: center
            spacing:
              paddingBlock: xl
              paddingInline: lg
          components:
            - name: layout-column
              properties:
                layout:
                  widthMode: '75'
                  horizontalAlign: center
              components:
                - name: eyebrow
                  properties:
                    text: PRICING
                    typography:
                      size: sm
                      weight: extrabold
                      color: *color-secondary
                      transform: uppercase
                      letterSpacing: wide
                      align: center
                    spacing:
                      marginBlock: xs
                - name: heading
                  properties:
                    text: CHOOSE YOUR PLAN
                    level: 2
                    typography:
                      size: xxxl
                      weight: extrabold
                      color: '#ffffff'
                      transform: uppercase
                      letterSpacing: wide
                      align: center
                    spacing:
                      marginBlock: sm
                - name: paragraph
                  properties:
                    text: No hidden fees, no fine print. Pick the tier that suits your hustle and get moving. Cancel anytime — we're not the clingy type.
                    typography:
                      size: md
                      color: '#ffffff'
                      align: center
                      lineHeight: '1.7'
                    spacing:
                      marginBlock: sm

        # Pricing Cards Grid
        - name: columnsgrid
          properties:
            layout:
              columns: 3
              gap: lg
            responsive:
              breakpoints:
                md: 2
                sm: 1
            spacing:
              marginBlock: lg
              paddingInline: lg
          columns:

            # Basic Plan — white card
            - components:
                - name: layout-column
                  properties:
                    layout:
                      horizontalAlign: center
                      gap: sm
                    appearance:
                      background:
                        color: '#ffffff'
                        opacity: 100
                      radius: none
                      shadow: retro
                      shadowColor: *color-primary
                      border:
                        width: 3
                        style: solid
                        color: *color-primary
                    spacing:
                      paddingBlock: xl
                      paddingInline: lg
                  components:
                    - name: eyebrow
                      properties:
                        text: STARTER
                        typography:
                          size: xs
                          weight: extrabold
                          color: *color-primary
                          transform: uppercase
                          letterSpacing: wide
                          align: center
                        spacing:
                          marginBlock: xs
                    - name: heading
                      properties:
                        text: BASIC
                        level: 3
                        typography:
                          size: xxl
                          weight: extrabold
                          color: *color-primary
                          transform: uppercase
                          align: center
                        spacing:
                          marginBlock: xs
                    - name: heading
                      properties:
                        text: "$19"
                        level: 2
                        typography:
                          size: xxxl
                          weight: extrabold
                          color: *color-background
                          align: center
                        spacing:
                          marginBlock: none
                    - name: paragraph
                      properties:
                        text: per month
                        typography:
                          size: sm
                          color: *color-text
                          align: center
                        spacing:
                          marginBlock: sm
                    - name: paragraph
                      properties:
                        text: "— Up to 3 projects"
                        typography:
                          size: sm
                          color: *color-text
                          lineHeight: '1.8'
                    - name: paragraph
                      properties:
                        text: "— 5 GB storage"
                        typography:
                          size: sm
                          color: *color-text
                          lineHeight: '1.8'
                    - name: paragraph
                      properties:
                        text: "— Email support"
                        typography:
                          size: sm
                          color: *color-text
                          lineHeight: '1.8'
                    - name: paragraph
                      properties:
                        text: "— Standard templates"
                        typography:
                          size: sm
                          color: *color-text
                          lineHeight: '1.8'
                        spacing:
                          marginBlock: md
                    - name: button
                      properties:
                        text: GET STARTED
                        appearance:
                          background:
                            color: *color-primary
                            opacity: 100
                          radius: none
                          shadow: retro
                          shadowColor: *color-primary
                          border:
                            width: 3
                            style: solid
                            color: *color-primary
                        typography:
                          color: '#ffffff'
                          weight: extrabold
                          size: sm
                          transform: uppercase
                          letterSpacing: wide
                        layout:
                          widthMode: stretch
                        spacing:
                          paddingBlock: md

            # Standard Plan — gold card (featured)
            - components:
                - name: layout-column
                  properties:
                    layout:
                      horizontalAlign: center
                      gap: sm
                    appearance:
                      background:
                        color: *color-secondary
                        opacity: 100
                      radius: none
                      shadow: retro
                      shadowColor: *color-primary
                      border:
                        width: 3
                        style: solid
                        color: *color-primary
                    spacing:
                      paddingBlock: xl
                      paddingInline: lg
                  components:
                    - name: eyebrow
                      properties:
                        text: MOST POPULAR
                        typography:
                          size: xs
                          weight: extrabold
                          color: *color-background
                          transform: uppercase
                          letterSpacing: wide
                          align: center
                        spacing:
                          marginBlock: xs
                    - name: heading
                      properties:
                        text: STANDARD
                        level: 3
                        typography:
                          size: xxl
                          weight: extrabold
                          color: *color-primary
                          transform: uppercase
                          align: center
                        spacing:
                          marginBlock: xs
                    - name: heading
                      properties:
                        text: "$49"
                        level: 2
                        typography:
                          size: xxxl
                          weight: extrabold
                          color: *color-primary
                          align: center
                        spacing:
                          marginBlock: none
                    - name: paragraph
                      properties:
                        text: per month
                        typography:
                          size: sm
                          color: *color-primary
                          align: center
                        spacing:
                          marginBlock: sm
                    - name: paragraph
                      properties:
                        text: "— Unlimited projects"
                        typography:
                          size: sm
                          color: *color-primary
                          lineHeight: '1.8'
                    - name: paragraph
                      properties:
                        text: "— 50 GB storage"
                        typography:
                          size: sm
                          color: *color-primary
                          lineHeight: '1.8'
                    - name: paragraph
                      properties:
                        text: "— Priority support"
                        typography:
                          size: sm
                          color: *color-primary
                          lineHeight: '1.8'
                    - name: paragraph
                      properties:
                        text: "— Premium templates"
                        typography:
                          size: sm
                          color: *color-primary
                          lineHeight: '1.8'
                    - name: paragraph
                      properties:
                        text: "— Custom branding"
                        typography:
                          size: sm
                          color: *color-primary
                          lineHeight: '1.8'
                        spacing:
                          marginBlock: md
                    - name: button
                      properties:
                        text: GET STANDARD
                        appearance:
                          background:
                            color: *color-background
                            opacity: 100
                          radius: none
                          shadow: retro
                          shadowColor: *color-primary
                          border:
                            width: 3
                            style: solid
                            color: *color-primary
                        typography:
                          color: '#ffffff'
                          weight: extrabold
                          size: sm
                          transform: uppercase
                          letterSpacing: wide
                        layout:
                          widthMode: stretch
                        spacing:
                          paddingBlock: md

            # Pro Plan — black card
            - components:
                - name: layout-column
                  properties:
                    layout:
                      horizontalAlign: center
                      gap: sm
                    appearance:
                      background:
                        color: *color-primary
                        opacity: 100
                      radius: none
                      shadow: retro
                      shadowColor: *color-secondary
                      border:
                        width: 3
                        style: solid
                        color: *color-secondary
                    spacing:
                      paddingBlock: xl
                      paddingInline: lg
                  components:
                    - name: eyebrow
                      properties:
                        text: TOP TIER
                        typography:
                          size: xs
                          weight: extrabold
                          color: *color-secondary
                          transform: uppercase
                          letterSpacing: wide
                          align: center
                        spacing:
                          marginBlock: xs
                    - name: heading
                      properties:
                        text: PRO
                        level: 3
                        typography:
                          size: xxl
                          weight: extrabold
                          color: '#ffffff'
                          transform: uppercase
                          align: center
                        spacing:
                          marginBlock: xs
                    - name: heading
                      properties:
                        text: "$99"
                        level: 2
                        typography:
                          size: xxxl
                          weight: extrabold
                          color: *color-secondary
                          align: center
                        spacing:
                          marginBlock: none
                    - name: paragraph
                      properties:
                        text: per month
                        typography:
                          size: sm
                          color: '#ffffff'
                          align: center
                        spacing:
                          marginBlock: sm
                    - name: paragraph
                      properties:
                        text: "— Everything in Standard"
                        typography:
                          size: sm
                          color: '#ffffff'
                          lineHeight: '1.8'
                    - name: paragraph
                      properties:
                        text: "— 500 GB storage"
                        typography:
                          size: sm
                          color: '#ffffff'
                          lineHeight: '1.8'
                    - name: paragraph
                      properties:
                        text: "— Dedicated account manager"
                        typography:
                          size: sm
                          color: '#ffffff'
                          lineHeight: '1.8'
                    - name: paragraph
                      properties:
                        text: "— API access & webhooks"
                        typography:
                          size: sm
                          color: '#ffffff'
                          lineHeight: '1.8'
                    - name: paragraph
                      properties:
                        text: "— White-label exports"
                        typography:
                          size: sm
                          color: '#ffffff'
                          lineHeight: '1.8'
                        spacing:
                          marginBlock: md
                    - name: button
                      properties:
                        text: GO PRO
                        appearance:
                          background:
                            color: *color-secondary
                            opacity: 100
                          radius: none
                          shadow: retro
                          shadowColor: *color-secondary
                          border:
                            width: 3
                            style: solid
                            color: *color-secondary
                        typography:
                          color: *color-primary
                          weight: extrabold
                          size: sm
                          transform: uppercase
                          letterSpacing: wide
                        layout:
                          widthMode: stretch
                        spacing:
                          paddingBlock: md

        # Footer note
        - name: layout-row
          properties:
            layout:
              horizontalAlign: center
            spacing:
              paddingBlock: md
              paddingInline: lg
          components:
            - name: paragraph
              properties:
                text: All plans include a 14-day free trial. No credit card required.
                typography:
                  size: sm
                  color: '#ffffff'
                  align: center
                  weight: bold
