# Aurora Gradient Pricing Plans
# Vibrant gradient pricing tiers with flowing color backgrounds
# Base components: site, page, layout-column, columnsgrid, layout-row, heading, paragraph, eyebrow, button
# Section type: pricing
# Layout: grid
# Visual style: aurora_gradient
# Content volume: rich
# Tone: neutral
# Conversion intent: purchase
# Image requirement: none
# Interactivity: static
# Industries: saas, portfolio
# Perfect for: SaaS platform, tech startup, creative portfolio, design studio, fintech

- name: site
  properties:
    theme:
      fonts:
        heading: "'Sora', sans-serif"
        content: "'Inter', sans-serif"
      colors:
        primary: &color-primary '#1A2035'
        text: &color-text '#313541'
        secondary: &color-secondary '#C8D8F0'
        accent: &color-accent '#EC4899'
        background: &color-background '#E6F0FA'
  components:
    - name: page
      slug: home
      title: "Aurora Gradient Pricing Plans"
      properties:
        appearance:
          background:
            color: *color-background
            opacity: 100
      components:

        # Outer aurora gradient wrapper
        - name: layout-column
          properties:
            layout:
              horizontalAlign: center
            appearance:
              background:
                type: gradient
                gradient:
                  colorStart: '#8B5CF6'
                  colorEnd: '#06B6D4'
                  direction: to bottom right
                opacity: 100
            spacing:
              paddingBlock: none
              paddingInline: none
          components:

            # Inner content
            - name: layout-column
              properties:
                layout:
                  horizontalAlign: center
                  gap: lg
                spacing:
                  paddingBlock: xxxl
                  paddingInline: lg
              components:

                # Section header
                - name: eyebrow
                  properties:
                    text: Pricing
                    typography:
                      size: xs
                      weight: semibold
                      color: '#ffffff'
                      transform: uppercase
                      letterSpacing: wider
                      align: center

                - name: heading
                  properties:
                    text: Pricing that scales with you
                    level: 2
                    typography:
                      size: xxl
                      weight: bold
                      color: '#ffffff'
                      align: center
                    spacing:
                      marginBlock: sm

                - name: paragraph
                  properties:
                    text: Simple, transparent pricing for teams of all sizes. Start free and upgrade when you're ready.
                    typography:
                      size: lg
                      color: rgba(255,255,255,0.85)
                      align: center
                    layout:
                      widthMode: '66'
                    spacing:
                      marginBlock: md

                # Pricing card grid
                - name: columnsgrid
                  properties:
                    layout:
                      columns: 3
                      gap: lg
                    responsive:
                      breakpoints:
                        md: 2
                        sm: 1
                    spacing:
                      paddingBlock: lg
                  columns:

                    # Starter — pink to orange
                    - components:
                        - name: layout-column
                          properties:
                            layout:
                              horizontalAlign: center
                              gap: sm
                            appearance:
                              background:
                                type: gradient
                                gradient:
                                  colorStart: *color-accent
                                  colorEnd: '#F97316'
                                  direction: to bottom right
                                opacity: 100
                              radius: lg
                              shadow: none
                              border:
                                width: 0
                            spacing:
                              paddingBlock: xl
                              paddingInline: xl
                          components:
                            - name: heading
                              properties:
                                text: Starter
                                level: 3
                                typography:
                                  size: xl
                                  weight: bold
                                  color: '#ffffff'
                                  align: center
                                spacing:
                                  marginBlock: xs
                            - name: paragraph
                              properties:
                                text: Perfect for solo builders
                                typography:
                                  size: sm
                                  color: rgba(255,255,255,0.9)
                                  align: center
                                spacing:
                                  marginBlock: sm
                            - name: heading
                              properties:
                                text: "$0"
                                level: 2
                                typography:
                                  size: xxxl
                                  weight: bold
                                  color: '#ffffff'
                                  align: center
                                spacing:
                                  marginBlock: none
                            - name: paragraph
                              properties:
                                text: free forever
                                typography:
                                  size: xs
                                  color: rgba(255,255,255,0.8)
                                  align: center
                                spacing:
                                  marginBlock: md
                            - name: layout-column
                              properties:
                                layout:
                                  horizontalAlign: left
                                  gap: xs
                                appearance:
                                  background:
                                    opacity: 0
                              components:
                                - name: paragraph
                                  properties:
                                    text: "✓ Up to 5 projects"
                                    typography:
                                      size: sm
                                      color: rgba(255,255,255,0.9)
                                    spacing:
                                      marginBlock: xxs
                                - name: paragraph
                                  properties:
                                    text: "✓ 1 GB storage"
                                    typography:
                                      size: sm
                                      color: rgba(255,255,255,0.9)
                                    spacing:
                                      marginBlock: xxs
                                - name: paragraph
                                  properties:
                                    text: "✓ Community support"
                                    typography:
                                      size: sm
                                      color: rgba(255,255,255,0.9)
                                    spacing:
                                      marginBlock: xxs
                                - name: paragraph
                                  properties:
                                    text: "✓ Core features"
                                    typography:
                                      size: sm
                                      color: rgba(255,255,255,0.9)
                                    spacing:
                                      marginBlock: xxs
                            - name: button
                              properties:
                                text: Get Started Free
                                appearance:
                                  background:
                                    color: '#ffffff'
                                    opacity: 100
                                  border:
                                    width: 0
                                  radius: pill
                                  shadow: none
                                typography:
                                  color: *color-accent
                                  weight: bold
                                  size: sm
                                layout:
                                  widthMode: stretch
                                spacing:
                                  paddingBlock: md
                                  marginBlock: md

                    # Pro — purple to cyan
                    - components:
                        - name: layout-column
                          properties:
                            layout:
                              horizontalAlign: center
                              gap: sm
                            appearance:
                              background:
                                type: gradient
                                gradient:
                                  colorStart: '#8B5CF6'
                                  colorEnd: '#06B6D4'
                                  direction: to bottom right
                                opacity: 100
                              radius: lg
                              shadow: none
                              border:
                                width: 0
                            spacing:
                              paddingBlock: xl
                              paddingInline: xl
                          components:
                            - name: paragraph
                              properties:
                                text: Most Popular
                                typography:
                                  size: xs
                                  weight: bold
                                  color: '#ffffff'
                                  align: center
                                spacing:
                                  marginBlock: xs
                            - name: heading
                              properties:
                                text: Pro
                                level: 3
                                typography:
                                  size: xl
                                  weight: bold
                                  color: '#ffffff'
                                  align: center
                                spacing:
                                  marginBlock: xs
                            - name: paragraph
                              properties:
                                text: For growing teams
                                typography:
                                  size: sm
                                  color: rgba(255,255,255,0.9)
                                  align: center
                                spacing:
                                  marginBlock: sm
                            - name: heading
                              properties:
                                text: "$49"
                                level: 2
                                typography:
                                  size: xxxl
                                  weight: bold
                                  color: '#ffffff'
                                  align: center
                                spacing:
                                  marginBlock: none
                            - name: paragraph
                              properties:
                                text: per month
                                typography:
                                  size: xs
                                  color: rgba(255,255,255,0.8)
                                  align: center
                                spacing:
                                  marginBlock: md
                            - name: layout-column
                              properties:
                                layout:
                                  horizontalAlign: left
                                  gap: xs
                                appearance:
                                  background:
                                    opacity: 0
                              components:
                                - name: paragraph
                                  properties:
                                    text: "✓ Unlimited projects"
                                    typography:
                                      size: sm
                                      color: rgba(255,255,255,0.9)
                                    spacing:
                                      marginBlock: xxs
                                - name: paragraph
                                  properties:
                                    text: "✓ 50 GB storage"
                                    typography:
                                      size: sm
                                      color: rgba(255,255,255,0.9)
                                    spacing:
                                      marginBlock: xxs
                                - name: paragraph
                                  properties:
                                    text: "✓ Priority support"
                                    typography:
                                      size: sm
                                      color: rgba(255,255,255,0.9)
                                    spacing:
                                      marginBlock: xxs
                                - name: paragraph
                                  properties:
                                    text: "✓ Advanced analytics"
                                    typography:
                                      size: sm
                                      color: rgba(255,255,255,0.9)
                                    spacing:
                                      marginBlock: xxs
                                - name: paragraph
                                  properties:
                                    text: "✓ Custom integrations"
                                    typography:
                                      size: sm
                                      color: rgba(255,255,255,0.9)
                                    spacing:
                                      marginBlock: xxs
                            - name: button
                              properties:
                                text: Start Pro Trial
                                appearance:
                                  background:
                                    color: '#ffffff'
                                    opacity: 100
                                  border:
                                    width: 0
                                  radius: pill
                                  shadow: none
                                typography:
                                  color: '#8B5CF6'
                                  weight: bold
                                  size: sm
                                layout:
                                  widthMode: stretch
                                spacing:
                                  paddingBlock: md
                                  marginBlock: md

                    # Enterprise — cyan to green
                    - components:
                        - name: layout-column
                          properties:
                            layout:
                              horizontalAlign: center
                              gap: sm
                            appearance:
                              background:
                                type: gradient
                                gradient:
                                  colorStart: '#06B6D4'
                                  colorEnd: '#10B981'
                                  direction: to bottom right
                                opacity: 100
                              radius: lg
                              shadow: none
                              border:
                                width: 0
                            spacing:
                              paddingBlock: xl
                              paddingInline: xl
                          components:
                            - name: heading
                              properties:
                                text: Enterprise
                                level: 3
                                typography:
                                  size: xl
                                  weight: bold
                                  color: '#ffffff'
                                  align: center
                                spacing:
                                  marginBlock: xs
                            - name: paragraph
                              properties:
                                text: For large organizations
                                typography:
                                  size: sm
                                  color: rgba(255,255,255,0.9)
                                  align: center
                                spacing:
                                  marginBlock: sm
                            - name: heading
                              properties:
                                text: "$149"
                                level: 2
                                typography:
                                  size: xxxl
                                  weight: bold
                                  color: '#ffffff'
                                  align: center
                                spacing:
                                  marginBlock: none
                            - name: paragraph
                              properties:
                                text: per month
                                typography:
                                  size: xs
                                  color: rgba(255,255,255,0.8)
                                  align: center
                                spacing:
                                  marginBlock: md
                            - name: layout-column
                              properties:
                                layout:
                                  horizontalAlign: left
                                  gap: xs
                                appearance:
                                  background:
                                    opacity: 0
                              components:
                                - name: paragraph
                                  properties:
                                    text: "✓ Everything in Pro"
                                    typography:
                                      size: sm
                                      color: rgba(255,255,255,0.9)
                                    spacing:
                                      marginBlock: xxs
                                - name: paragraph
                                  properties:
                                    text: "✓ Unlimited storage"
                                    typography:
                                      size: sm
                                      color: rgba(255,255,255,0.9)
                                    spacing:
                                      marginBlock: xxs
                                - name: paragraph
                                  properties:
                                    text: "✓ Dedicated success manager"
                                    typography:
                                      size: sm
                                      color: rgba(255,255,255,0.9)
                                    spacing:
                                      marginBlock: xxs
                                - name: paragraph
                                  properties:
                                    text: "✓ SSO & SAML"
                                    typography:
                                      size: sm
                                      color: rgba(255,255,255,0.9)
                                    spacing:
                                      marginBlock: xxs
                                - name: paragraph
                                  properties:
                                    text: "✓ SLA guarantee"
                                    typography:
                                      size: sm
                                      color: rgba(255,255,255,0.9)
                                    spacing:
                                      marginBlock: xxs
                                - name: paragraph
                                  properties:
                                    text: "✓ On-premise option"
                                    typography:
                                      size: sm
                                      color: rgba(255,255,255,0.9)
                                    spacing:
                                      marginBlock: xxs
                            - name: button
                              properties:
                                text: Contact Sales
                                appearance:
                                  background:
                                    color: '#ffffff'
                                    opacity: 100
                                  border:
                                    width: 0
                                  radius: pill
                                  shadow: none
                                typography:
                                  color: '#06B6D4'
                                  weight: bold
