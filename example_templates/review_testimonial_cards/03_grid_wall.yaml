# Review Card Variant: The Grid Wall
# A columnsgrid containing multiple small layout-column cards with just paragraph and eyebrow

- name: page
  properties:
    appearance:
      background: { color: '#f9fafb' }
  components:
    - name: layout-column
      properties:
        layout: { horizontalAlign: center, gap: md }
        spacing: { paddingBlock: xl, paddingInline: lg }
        appearance: { background: { transparency: 0 } }
      components:
        - name: heading
          properties:
            text: What Our Customers Say
            level: 2
            typography: { size: xxl, weight: extrabold, color: '#111827', align: center }
        - name: columnsgrid
          properties:
            layout: { columns: 3, gap: md, verticalAlign: top }
            responsive: { breakpoints: { md: 2, sm: 1 } }
          columns:
            - components:
                - name: layout-column
                  properties:
                    layout: { horizontalAlign: left, gap: xs }
                    appearance:
                      background: { color: '#ffffff', transparency: 100 }
                      radius: md
                      shadow: soft
                      padding: { block: md, inline: md }
                      border: { width: 1, style: solid, color: '#f3f4f6' }
                  components:
                    - name: paragraph
                      properties:
                        text: "Absolutely love it! Saves me hours every week."
                        typography: { size: sm, color: '#374151', lineHeight: "1.6" }
                    - name: eyebrow
                      properties:
                        text: "— EMMA T."
                        typography: { size: xxs, weight: semibold, color: '#6366f1', letterSpacing: wider }
