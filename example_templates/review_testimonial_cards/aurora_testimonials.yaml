# Aurora Gradient Testimonial Cards
# Customer testimonials on vibrant flowing gradient cards
# Base components: site, page, layout-column, columnsgrid, layout-row, heading, paragraph, eyebrow, caption
# Section type: testimonial
# Layout: grid
# Visual style: aurora_gradient
# Perfect for: SaaS platform, tech startup, creative portfolio, design studio, fintech

- name: site
  properties:
    theme:
      fonts:
        heading: "'Sora', sans-serif"
        content: "'Inter', sans-serif"
      colors:
        primary: &color-primary '#1A2035'
        text: &color-text '#313541'
        secondary: &color-secondary '#C8D8F0'
        accent: &color-accent '#EC4899'
        background: &color-background '#E6F0FA'
  components:
    - name: page
      slug: home
      title: "Aurora Gradient Testimonial Cards"
      properties:
        appearance:
          background:
            color: *color-background
            opacity: 100
      components:

        # Outer aurora gradient wrapper
        - name: layout-column
          properties:
            layout:
              horizontalAlign: center
            appearance:
              background:
                type: gradient
                gradient:
                  colorStart: '#06B6D4'
                  colorEnd: '#10B981'
                  direction: to bottom right
                opacity: 100
            spacing:
              paddingBlock: none
              paddingInline: none
          components:

            # Inner content
            - name: layout-column
              properties:
                layout:
                  horizontalAlign: center
                  gap: lg
                spacing:
                  paddingBlock: xxxl
                  paddingInline: lg
              components:

                # Section header
                - name: eyebrow
                  properties:
                    text: Testimonials
                    typography:
                      size: xs
                      weight: semibold
                      color: '#ffffff'
                      transform: uppercase
                      letterSpacing: wider
                      align: center

                - name: heading
                  properties:
                    text: Trusted by innovators
                    level: 2
                    typography:
                      size: xxl
                      weight: bold
                      color: '#ffffff'
                      align: center
                    spacing:
                      marginBlock: sm

                - name: paragraph
                  properties:
                    text: Hear from the teams and builders who transformed their work with our platform.
                    typography:
                      size: lg
                      color: rgba(255,255,255,0.85)
                      align: center
                    layout:
                      widthMode: '66'
                    spacing:
                      marginBlock: md

                # Testimonial grid
                - name: columnsgrid
                  properties:
                    layout:
                      columns: 3
                      gap: lg
                    responsive:
                      breakpoints:
                        md: 2
                        sm: 1
                    spacing:
                      paddingBlock: lg
                  columns:

                    # Card 1 — pink to orange
                    - components:
                        - name: layout-column
                          properties:
                            layout:
                              horizontalAlign: left
                              gap: sm
                            appearance:
                              background:
                                type: gradient
                                gradient:
                                  colorStart: '#EC4899'
                                  colorEnd: '#F97316'
                                  direction: to bottom right
                                opacity: 100
                              radius: lg
                              shadow: none
                              border:
                                width: 0
                            spacing:
                              paddingBlock: lg
                              paddingInline: lg
                          components:
                            - name: paragraph
                              properties:
                                text: "Switching to this platform cut our deployment time in half. The developer experience is in a league of its own — I recommend it to every engineer I meet."
                                typography:
                                  size: sm
                                  color: rgba(255,255,255,0.9)
                                  lineHeight: "1.7"
                                spacing:
                                  marginBlock: sm
                            - name: heading
                              properties:
                                text: Lena Fischer
                                level: 4
                                typography:
                                  size: md
                                  weight: bold
                                  color: '#ffffff'
                            - name: caption
                              properties:
                                text: CTO, NovaBridge Technologies
                                typography:
                                  size: xs
                                  color: rgba(255,255,255,0.7)

                    # Card 2 — purple to cyan
                    - components:
                        - name: layout-column
                          properties:
                            layout:
                              horizontalAlign: left
                              gap: sm
                            appearance:
                              background:
                                type: gradient
                                gradient:
                                  colorStart: '#8B5CF6'
                                  colorEnd: '#06B6D4'
                                  direction: to bottom right
                                opacity: 100
                              radius: lg
                              shadow: none
                              border:
                                width: 0
                            spacing:
                              paddingBlock: lg
                              paddingInline: lg
                          components:
                            - name: paragraph
                              properties:
                                text: "The analytics alone are worth the subscription. We surfaced insights we didn't know existed and doubled our conversion rate within 90 days."
                                typography:
                                  size: sm
                                  color: rgba(255,255,255,0.9)
                                  lineHeight: "1.7"
                                spacing:
                                  marginBlock: sm
                            - name: heading
                              properties:
                                text: James Okafor
                                level: 4
                                typography:
                                  size: md
                                  weight: bold
                                  color: '#ffffff'
                            - name: caption
                              properties:
                                text: Growth Lead, Meridian SaaS
                                typography:
                                  size: xs
                                  color: rgba(255,255,255,0.7)

                    # Card 3 — cyan to green
                    - components:
                        - name: layout-column
                          properties:
                            layout:
                              horizontalAlign: left
                              gap: sm
                            appearance:
                              background:
                                type: gradient
                                gradient:
                                  colorStart: '#06B6D4'
                                  colorEnd: '#10B981'
                                  direction: to bottom right
                                opacity: 100
                              radius: lg
                              shadow: none
                              border:
                                width: 0
                            spacing:
                              paddingBlock: lg
                              paddingInline: lg
                          components:
                            - name: paragraph
                              properties:
                                text: "Our fintech app needed a platform that could handle scale without compromising security. This delivered on every single requirement and more."
                                typography:
                                  size: sm
                                  color: rgba(255,255,255,0.9)
                                  lineHeight: "1.7"
                                spacing:
                                  marginBlock: sm
                            - name: heading
                              properties:
                                text: Riya Sharma
                                level: 4
                                typography:
                                  size: md
                                  weight: bold
                                  color: '#ffffff'
                            - name: caption
                              properties:
                                text: VP Engineering, Apex Capital
                                typography:
                                  size: xs
                                  color: rgba(255,255,255,0.7)
