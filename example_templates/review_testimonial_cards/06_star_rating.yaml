# Review Card Variant: The Star Rating
# layout-column starting with a layout-row of star icons, followed by a heading and paragraph

- name: page
  properties:
    theme:
      colors:
        primary: &color-primary '#111827'
        secondary: &color-secondary '#4b5563'
        accent: &color-accent '#d97706'
        background: &color-background '#ffffff'
    appearance:
      background: { color: *color-background }
  components:
    - name: layout-column
      properties:
        layout: { horizontalAlign: left, gap: sm }
        appearance:
          background: { color: *color-background }
          radius: lg
          shadow: soft
          padding: { block: lg, inline: lg }
          border: { width: 1, style: solid, color: *color-accent }
        spacing: { marginBlock: lg, marginInline: lg }
      components:
        - name: layout-row
          properties:
            layout: { horizontalAlign: left, verticalAlign: center, gap: xxs, wrap: nowrap }
            appearance: { background: { transparency: 0 } }
          components:
            - name: paragraph
              properties:
                text: "5.0"
                typography: { size: lg, weight: extrabold, color: *color-accent }
                spacing: { marginBlock: none }
        - name: heading
          properties:
            text: "Outstanding Service and Results"
            level: 3
            typography: { size: lg, weight: bold, color: *color-primary, align: left }
            spacing: { marginBlock: xs }
        - name: paragraph
          properties:
            text: |
              I've tried dozens of similar tools over the years and nothing comes
              close to this. The attention to detail is remarkable — from the onboarding
              experience to the daily workflow, everything just works. My team's
              productivity has increased by 300% since we made the switch.
            typography: { size: sm, color: *color-secondary, align: left, lineHeight: "1.7" }
        - name: br
          properties:
            size: xs
        - name: layout-row
          properties:
            layout: { horizontalAlign: left, verticalAlign: center, gap: sm, wrap: nowrap }
            appearance: { background: { transparency: 0 } }
          components:
            - name: image
              properties:
                source: { url: 'https://images.unsplash.com/photo-1494790108377-be9c29b29330?w=80', altText: 'Reviewer' }
                appearance: { minHeight: 3, maxHeight: 3, fit: cover, cornerStyle: pill }
                layout: { widthMode: fit }
                spacing: { marginBlock: none }
            - name: layout-column
              properties:
                layout: { horizontalAlign: left, gap: none }
                appearance: { background: { transparency: 0 } }
              components:
                - name: paragraph
                  properties:
                    text: Jennifer Walsh
                    typography: { size: sm, weight: bold, color: *color-primary }
                    spacing: { marginBlock: none }
                - name: caption
                  properties:
                    text: "Verified Purchase - March 2026"
                    typography: { size: xs, color: *color-secondary }
