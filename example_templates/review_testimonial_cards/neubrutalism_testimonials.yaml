# Neubrutalism Testimonial Cards
# Bold customer quotes with thick borders and flat vivid color accents
# Base components: site, page, layout-column, columnsgrid, layout-row, heading, paragraph, eyebrow, caption
# Section type: testimonials
# Layout: grid
# Visual style: neubrutalism
# Perfect for: SaaS platform, creative portfolio, design studio, fashion brand, tech startup

- name: site
  properties:
    theme:
      fonts:
        heading: "'Space Grotesk', sans-serif"
        content: "'IBM Plex Sans', sans-serif"
      colors:
        primary: '#1A1A1A'
        text: '#313131'
        secondary: '#C8C4BB'
        accent: '#FF4D00'
        background: '#E5E2DD'
  components:
    - name: page
      slug: home
      title: "Neubrutalism Testimonial Cards"
      properties:
        appearance:
          background:
            color: '#E5E2DD'
      components:

        # Section Header
        - name: layout-row
          properties:
            layout:
              horizontalAlign: center
            spacing:
              paddingBlock: xl
              paddingInline: lg
          components:
            - name: layout-column
              properties:
                layout:
                  widthMode: '75'
                  horizontalAlign: center
              components:
                - name: eyebrow
                  properties:
                    text: TESTIMONIALS
                    typography:
                      size: xs
                      weight: semibold
                      color: '#FF4D00'
                      transform: uppercase
                      letterSpacing: wider
                      align: center
                    spacing:
                      marginBlock: none
                - name: heading
                  properties:
                    text: PEOPLE ARE TALKING.
                    level: 2
                    typography:
                      size: xxxl
                      weight: extrabold
                      color: '#1A1A1A'
                      transform: uppercase
                      align: center
                    spacing:
                      marginBlock: sm

        # Testimonial Cards Grid — 3 columns, alternating vivid colors
        - name: columnsgrid
          properties:
            layout:
              columns: 3
              gap: lg
            responsive:
              breakpoints:
                md: 2
                sm: 1
            spacing:
              paddingBlock: xl
              paddingInline: lg
          columns:

            # Card 1 — Yellow
            - components:
                - name: layout-column
                  properties:
                    layout:
                      horizontalAlign: left
                      gap: sm
                    appearance:
                      background:
                        color: '#FFE566'
                      border:
                        width: 4
                        style: solid
                        color: '#000000'
                      radius: none
                      shadow: retro
                      shadowColor: '#000000'
                    spacing:
                      paddingBlock: lg
                      paddingInline: lg
                  components:
                    - name: paragraph
                      properties:
                        text: "Brutally honest review: this is the best tool I've used in 10 years. No fluff, just results. My team doubled output in 2 weeks."
                        typography:
                          size: sm
                          weight: medium
                          color: '#1A1A1A'
                          lineHeight: '1.6'
                        spacing:
                          marginBlock: sm
                    - name: heading
                      properties:
                        text: ALEX KIM
                        level: 4
                        typography:
                          size: sm
                          weight: extrabold
                          color: '#1A1A1A'
                          transform: uppercase
                        spacing:
                          marginBlock: none
                    - name: caption
                      properties:
                        text: Product Lead, Blockbase
                        typography:
                          size: xs
                          weight: medium
                          color: '#313131'

            # Card 2 — Lime
            - components:
                - name: layout-column
                  properties:
                    layout:
                      horizontalAlign: left
                      gap: sm
                    appearance:
                      background:
                        color: '#A3E635'
                      border:
                        width: 4
                        style: solid
                        color: '#000000'
                      radius: none
                      shadow: retro
                      shadowColor: '#000000'
                    spacing:
                      paddingBlock: lg
                      paddingInline: lg
                  components:
                    - name: paragraph
                      properties:
                        text: "They don't sugarcoat it and neither will I. Switched from three other tools to this one the same day I saw the demo. Never looking back."
                        typography:
                          size: sm
                          weight: medium
                          color: '#1A1A1A'
                          lineHeight: '1.6'
                        spacing:
                          marginBlock: sm
                    - name: heading
                      properties:
                        text: JAMIE TORRES
                        level: 4
                        typography:
                          size: sm
                          weight: extrabold
                          color: '#1A1A1A'
                          transform: uppercase
                        spacing:
                          marginBlock: none
                    - name: caption
