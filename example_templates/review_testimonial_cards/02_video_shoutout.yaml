# Review Card Variant: The Video Shoutout
# layout-column with an embedded video testimonial and a paragraph transcript below
# Base components: layout-column, video, eyebrow, heading, paragraph, layout-row, image, caption
# Section type: testimonial
# Layout: stacked
# Visual style: card_based
# Perfect for: any business, SaaS, ecommerce, services, agencies

- name: page
  properties:
    theme:
      colors:
        primary: &color-primary '#111827'
        text: &color-text '#2C3039'
        secondary: &color-secondary '#6b7280'
        accent: &color-accent '#2563eb'
        background: &color-background '#ffffff'
    appearance:
      background: {color: *color-background}
  components:
  - name: layout-column
    properties:
      layout: {horizontalAlign: center, gap: sm}
      appearance:
        background: {color: *color-background}
        radius: lg
        shadow: soft
      spacing: {marginBlock: lg, marginInline: lg, paddingBlock: none, paddingInline: none}
    components:
    - name: video
      properties:
        source: {url: 'https://www.youtube.com/watch?v=dQw4w9WgXcQ'}
        appearance: {aspectRatio: '16/9', height: 300}
        playback: {controls: true, autoplay: false, muted: false, loop: false}
        spacing: {marginBlock: none}
        layout: {widthMode: stretch}
    - name: layout-column
      properties:
        layout: {horizontalAlign: left, gap: sm}
        appearance: {background: {transparency: 0}}
        spacing:
          paddingBlock: md
          paddingInline: md
      components:
      - name: eyebrow
        properties:
          text: VIDEO TESTIMONIAL
          typography: {size: xxs, weight: semibold, color: *color-accent, transform: uppercase, letterSpacing: wider}
      - name: heading
        properties:
          text: "How We Scaled to 1M Users"
          level: 3
          typography: {size: lg, weight: bold, color: *color-primary, align: left}
          spacing: {marginBlock: xs}
      - name: paragraph
        properties:
          text: |
            "We started using this platform when we had just 100 users.
            Within 18 months, we scaled to over a million. The infrastructure
            handled everything seamlessly, and the support team was incredible
            every step of the way."
          typography: {size: sm, color: *color-secondary, align: left, lineHeight: "1.7"}
      - name: layout-row
        properties:
          layout: {horizontalAlign: left, verticalAlign: center, gap: sm, wrap: nowrap}
          appearance: {background: {transparency: 0}}
        components:
        - name: image
          properties:
            source: {url: 'https://images.unsplash.com/photo-1573497019940-1c28c88b4f3e?w=100', altText: 'Sarah Johnson'}
            appearance: {minHeight: 3, maxHeight: 3, fit: cover, cornerStyle: pill}
            layout: {widthMode: fit}
            spacing: {marginBlock: none}
        - name: layout-column
          properties:
            layout: {horizontalAlign: left, gap: none}
            appearance: {background: {transparency: 0}}
          components:
          - name: paragraph
            properties:
              text: Sarah Johnson
              typography: {size: sm, weight: bold, color: *color-text}
              spacing: {marginBlock: none}
          - name: caption
            properties:
              text: CTO, RapidScale
              typography: {size: xs, color: *color-secondary}
