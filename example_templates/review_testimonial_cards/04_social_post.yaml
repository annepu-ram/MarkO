# Review Card Variant: Social Post Style
# layout-row with an image (avatar) and a layout-column containing heading (Username) and paragraph
# Base components: layout-row, image, layout-column, heading, caption, paragraph, link
# Section type: testimonial
# Layout: split_screen
# Visual style: modern_minimalist
# Perfect for: any business, SaaS, ecommerce, services, agencies

- name: page
  properties:
    theme:
      colors:
        primary: &color-primary '#0f172a'
        text: &color-text '#2B2F3B'
        secondary: &color-secondary '#94a3b8'
        accent: &color-accent '#2563eb'
        background: &color-background '#ffffff'
    appearance:
      background: {color: *color-background}
  components:
  - name: layout-row
    properties:
      layout: {horizontalAlign: left, verticalAlign: top, wrap: nowrap, gap: md}
      appearance:
        background: {color: *color-background}
        radius: lg
        shadow: soft
        border: {width: 1, style: solid, color: *color-secondary}
      spacing: {marginBlock: md, marginInline: lg, paddingBlock: md, paddingInline: md}
    components:
    - name: image
      properties:
        source: {url: 'https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?w=100', altText: 'User avatar'}
        appearance: {minHeight: 3.5, maxHeight: 3.5, fit: cover, cornerStyle: pill}
        layout: {widthMode: fit}
        spacing: {marginBlock: none}
    - name: layout-column
      properties:
        layout: {horizontalAlign: left, widthMode: "75", gap: xs}
        appearance: {background: {opacity: 0}}
      components:
      - name: layout-row
        properties:
          layout: {horizontalAlign: left, verticalAlign: center, gap: xs, wrap: nowrap}
          appearance: {background: {opacity: 0}}
        components:
        - name: heading
          properties:
            text: "@rajpatel"
            level: 4
            typography: {size: md, weight: bold, color: *color-primary, align: left}
            spacing: {marginBlock: none}
        - name: caption
          properties:
            text: "2 hours ago"
            typography: {size: xs, color: *color-secondary, align: left}
      - name: paragraph
        properties:
          text: |
            Just shipped our new landing page using @SwiftSites and wow,
            the conversion rate jumped 40% overnight. This is the real deal.
            Highly recommended for any startup founder!
          typography: {size: sm, color: *color-text, lineHeight: "1.7"}
          spacing: {marginBlock: xs}
      - name: layout-row
        properties:
          layout: {horizontalAlign: left, verticalAlign: center, gap: md, wrap: nowrap}
          appearance: {background: {opacity: 0}}
        components:
        - name: caption
          properties:
            text: "142 likes"
            typography: {size: xs, color: *color-secondary}
        - name: caption
          properties:
            text: "23 replies"
            typography: {size: xs, color: *color-secondary}
        - name: link
          properties:
            text: Reply
            href: '#'
            typography: {size: xs, weight: semibold, color: *color-accent}
            appearance: {underline: false}
            spacing: {marginBlock: none}
