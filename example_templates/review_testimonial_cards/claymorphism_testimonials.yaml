# Claymorphism Testimonial Cards
# Soft bubbly customer quotes in rounded pastel clay cards
# Base components: site, page, layout-column, columnsgrid, layout-row, heading, paragraph, eyebrow, caption
# Section type: testimonials
# Layout: grid
# Visual style: claymorphism
# Perfect for: education, health, SaaS platform, creative portfolio, children's app

- name: site
  properties:
    theme:
      fonts:
        heading: "'Poppins', sans-serif"
        content: "'Nunito Sans', sans-serif"
      colors:
        primary: '#4A1942'
        text: '#4E3149'
        secondary: '#9D5094'
        accent: '#FF1493'
        background: '#FFD6E6'
  components:
    - name: page
      slug: home
      title: "Claymorphism Testimonial Cards"
      properties:
        appearance:
          background:
            color: '#F0F5FF'
            transparency: 100
      components:

        # Section header
        - name: layout-row
          properties:
            layout:
              horizontalAlign: center
            spacing:
              paddingBlock: xl
              paddingInline: lg
          components:
            - name: layout-column
              properties:
                layout:
                  widthMode: '75'
                  horizontalAlign: center
              components:
                - name: eyebrow
                  properties:
                    text: Testimonials
                    typography:
                      size: xs
                      weight: semibold
                      color: '#FF1493'
                      transform: none
                      letterSpacing: wider
                      align: center
                - name: heading
                  properties:
                    text: What our community says
                    level: 2
                    typography:
                      size: xxl
                      weight: bold
                      color: '#4A1942'
                      align: center
                    spacing:
                      marginBlock: sm
                - name: paragraph
                  properties:
                    text: Real stories from real people who found joy using our platform every single day.
                    typography:
                      size: md
                      color: '#9D5094'
                      align: center
                    spacing:
                      marginBlock: sm

        # Testimonial card grid
        - name: columnsgrid
          properties:
            layout:
              columns: 3
              gap: lg
            responsive:
              breakpoints:
                md: 2
                sm: 1
            spacing:
              marginBlock: lg
              paddingInline: lg
          columns:

            # Card 1 — soft pink
            - components:
                - name: layout-column
                  properties:
                    layout:
                      horizontalAlign: left
                      gap: sm
                    appearance:
                      background:
                        color: '#FFF0F5'
                        transparency: 100
                      radius: xxl
                      shadow: elevated
                      border:
                        width: 0
                    spacing:
                      paddingBlock: lg
                      paddingInline: lg
                  components:
                    - name: paragraph
                      properties:
                        text: "This platform completely changed how I run my studio. It's intuitive, beautiful, and everything just works. My clients are impressed every single time."
                        typography:
                          size: sm
                          color: '#4E3149'
                          lineHeight: "1.7"
                        spacing:
                          marginBlock: sm
                    - name: heading
                      properties:
                        text: Sophie Laurent
                        level: 4
                        typography:
                          size: md
                          weight: bold
                          color: '#4A1942'
                    - name: caption
                      properties:
                        text: Creative Director, Bloom Studio
                        typography:
                          size: xs
                          color: '#9D5094'

            # Card 2 — lavender
            - components:
                - name: layout-column
                  properties:
                    layout:
                      horizontalAlign: left
                      gap: sm
                    appearance:
                      background:
                        color: '#F5F0FF'
                        transparency: 100
                      radius: xxl
                      shadow: elevated
                      border:
                        width: 0
                    spacing:
                      paddingBlock: lg
                      paddingInline: lg
                  components:
                    - name: paragraph
                      properties:
                        text: "We rolled this out across our entire education platform and the kids absolutely love it. Engagement went up 40% in the first month alone."
                        typography:
                          size: sm
                          color: '#4E3149'
                          lineHeight: "1.7"
                        spacing:
                          marginBlock: sm
                    - name: heading
                      properties:
                        text: Marcus Chen
                        level: 4
                        typography:
                          size: md
                          weight: bold
                          color: '#4A1942'
                    - name: caption
                      properties:
                        text: Product Lead, EduSpark
                        typography:
