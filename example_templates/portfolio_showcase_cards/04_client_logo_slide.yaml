# 04 - The Client Logo Slide
# Carousel that shows brand logo images in a sliding carousel. Clean presentation of client logos with autoplay.
# Base components: page, layout-column, eyebrow, heading, paragraph, carousel, layout-row, image, columnsgrid
# Section type: gallery
# Layout: stacked
# Visual style: minimal
# Perfect for: agencies, freelancers, photographers, creatives, portfolios

- name: page
  properties:
    theme:
      fonts:
        heading: &font-heading "'Outfit', sans-serif"
        content: &font-content "'Inter', sans-serif"
      colors:
        primary: &color-primary '#111827'
        text: &color-text '#2C3039'
        secondary: &color-secondary '#374151'
        accent: &color-accent '#8b5cf6'
        background: &color-background '#ffffff'
    spacing: { paddingBlock: none, paddingInline: none }
    appearance: { background: { color: *color-background } }
  components:

    # ============================================
    # SECTION HEADER
    # ============================================
    - name: layout-column
      properties:
        layout: { horizontalAlign: center }
        spacing: { paddingBlock: xl, paddingInline: lg }
        appearance: { background: { color: *color-background } }
      components:
        - name: eyebrow
          properties:
            text: TRUSTED BY INDUSTRY LEADERS
            typography: { size: xs, weight: semibold, color: *color-accent, transform: uppercase, letterSpacing: wider }
        - name: heading
          properties:
            text: Our Clients
            level: 1
            typography: { size: xxxl, weight: extrabold, color: *color-primary, align: center, letterSpacing: tight }
            spacing: { marginBlock: sm }
        - name: paragraph
          properties:
            text: We have been privileged to work with some of the most recognized brands in the world.
            typography: { size: lg, color: *color-secondary, align: center }
            layout: { widthMode: "75" }

    # ============================================
    # CLIENT LOGO CAROUSEL
    # ============================================
    - name: layout-column
      properties:
        layout: { horizontalAlign: center }
        spacing: { paddingBlock: xl, paddingInline: lg }
        appearance: { background: { color: *color-background } }
      components:
        - name: carousel
          properties:
            behavior:
              autoplay: true
              delay: 3000
              loop: true
              pauseOnHover: true
              swipeEnabled: true
              swipeThreshold: 50
              keyboardNavigation: true
            animation:
              effect: slide
              duration: 600
            navigation:
              showArrows: true
              arrowStyle: minimal
              arrowPosition: outside
              showDots: true
            indicators:
              style: dots
              position: bottom
            accessibility:
              showPauseButton: true
              ariaLabel: "Client logo carousel"
            appearance:
              shadow: none
            spacing: { marginBlock: lg }
          slides:
            # Slide 1 - Row of 4 logos
            - components:
                - name: layout-row
                  properties:
                    layout: { horizontalAlign: space-evenly, verticalAlign: center, gap: xl, wrap: nowrap }
                    spacing: { paddingBlock: lg, paddingInline: md }
                  components:
                    - name: image
                      properties:
                        source:
                          url: 'https://images.unsplash.com/photo-1611162617474-5b21e879e113?w=200&h=100&fit=crop'
                          altText: 'Client brand logo - Tech Innovations Inc.'
                        appearance:
                          fit: contain
                          aspectRatio: '16/9'
                          filter: grayscale
                          hoverEffect: none
                          cornerStyle: sm
                        layout: { widthMode: "25" }
                    - name: image
                      properties:
                        source:
                          url: 'https://images.unsplash.com/photo-1599305445671-ac291c95aaa9?w=200&h=100&fit=crop'
                          altText: 'Client brand logo - Global Solutions'
                        appearance:
                          fit: contain
                          aspectRatio: '16/9'
                          filter: grayscale
                          hoverEffect: none
                          cornerStyle: sm
                        layout: { widthMode: "25" }
                    - name: image
                      properties:
                        source:
                          url: 'https://images.unsplash.com/photo-1614680376573-df3480f0c6ff?w=200&h=100&fit=crop'
                          altText: 'Client brand logo - Creative Partners'
                        appearance:
                          fit: contain
                          aspectRatio: '16/9'
                          filter: grayscale
                          hoverEffect: none
                          cornerStyle: sm
                        layout: { widthMode: "25" }
                    - name: image
                      properties:
                        source:
                          url: 'https://images.unsplash.com/photo-1614680376408-81e91ffe3db7?w=200&h=100&fit=crop'
                          altText: 'Client brand logo - Digital Ventures'
                        appearance:
                          fit: contain
                          aspectRatio: '16/9'
                          filter: grayscale
                          hoverEffect: none
                          cornerStyle: sm
                        layout: { widthMode: "25" }

            # Slide 2 - Row of 4 logos
            - components:
                - name: layout-row
                  properties:
                    layout: { horizontalAlign: space-evenly, verticalAlign: center, gap: xl, wrap: nowrap }
                    spacing: { paddingBlock: lg, paddingInline: md }
                  components:
                    - name: image
                      properties:
                        source:
                          url: 'https://images.unsplash.com/photo-1567095761054-7a02e69e5b2b?w=200&h=100&fit=crop'
                          altText: 'Client brand logo - Summit Media'
                        appearance:
                          fit: contain
                          aspectRatio: '16/9'
                          filter: grayscale
                          hoverEffect: none
                          cornerStyle: sm
                        layout: { widthMode: "25" }
                    - name: image
                      properties:
                        source:
                          url: 'https://images.unsplash.com/photo-1560179707-f14e90ef3623?w=200&h=100&fit=crop'
                          altText: 'Client brand logo - Atlas Corporation'
                        appearance:
                          fit: contain
                          aspectRatio: '16/9'
                          filter: grayscale
                          hoverEffect: none
                          cornerStyle: sm
                        layout: { widthMode: "25" }
                    - name: image
                      properties:
                        source:
                          url: 'https://images.unsplash.com/photo-1572021335469-31706a17ced0?w=200&h=100&fit=crop'
                          altText: 'Client brand logo - Nexus Labs'
                        appearance:
                          fit: contain
                          aspectRatio: '16/9'
                          filter: grayscale
                          hoverEffect: none
                          cornerStyle: sm
                        layout: { widthMode: "25" }
                    - name: image
                      properties:
                        source:
                          url: 'https://images.unsplash.com/photo-1553877522-43269d4ea984?w=200&h=100&fit=crop'
                          altText: 'Client brand logo - Horizon Brands'
                        appearance:
                          fit: contain
                          aspectRatio: '16/9'
                          filter: grayscale
                          hoverEffect: none
                          cornerStyle: sm
                        layout: { widthMode: "25" }

            # Slide 3 - Row of 4 logos
            - components:
                - name: layout-row
                  properties:
                    layout: { horizontalAlign: space-evenly, verticalAlign: center, gap: xl, wrap: nowrap }
                    spacing: { paddingBlock: lg, paddingInline: md }
                  components:
                    - name: image
                      properties:
                        source:
                          url: 'https://images.unsplash.com/photo-1531973576160-7125cd663d86?w=200&h=100&fit=crop'
                          altText: 'Client brand logo - Forge Industries'
                        appearance:
                          fit: contain
                          aspectRatio: '16/9'
                          filter: grayscale
                          hoverEffect: none
                          cornerStyle: sm
                        layout: { widthMode: "25" }
                    - name: image
                      properties:
                        source:
                          url: 'https://images.unsplash.com/photo-1542744173-8e7e53415bb0?w=200&h=100&fit=crop'
                          altText: 'Client brand logo - Prism Agency'
                        appearance:
                          fit: contain
                          aspectRatio: '16/9'
                          filter: grayscale
                          hoverEffect: none
                          cornerStyle: sm
                        layout: { widthMode: "25" }
                    - name: image
                      properties:
                        source:
                          url: 'https://images.unsplash.com/photo-1557804506-669a67965ba0?w=200&h=100&fit=crop'
                          altText: 'Client brand logo - Vertex Technologies'
                        appearance:
                          fit: contain
                          aspectRatio: '16/9'
                          filter: grayscale
                          hoverEffect: none
                          cornerStyle: sm
                        layout: { widthMode: "25" }
                    - name: image
                      properties:
                        source:
                          url: 'https://images.unsplash.com/photo-1521791136064-7986c2920216?w=200&h=100&fit=crop'
                          altText: 'Client brand logo - Catalyst Group'
                        appearance:
                          fit: contain
                          aspectRatio: '16/9'
                          filter: grayscale
                          hoverEffect: none
                          cornerStyle: sm
                        layout: { widthMode: "25" }

    # ============================================
    # CLIENT COUNT STATS
    # ============================================
    - name: columnsgrid
      properties:
        layout: { columns: 4, gap: lg }
        responsive: { breakpoints: { md: 2, sm: 2 } }
        spacing: { paddingBlock: xl, paddingInline: lg }
        appearance: { background: { color: *color-primary } }
      columns:
        - components:
            - name: heading
              properties:
                text: "120+"
                level: 3
                typography: { size: xxl, weight: extrabold, color: *color-accent, align: center }
            - name: paragraph
              properties:
                text: Clients Worldwide
                typography: { size: sm, color: *color-secondary, align: center }
        - components:
            - name: heading
              properties:
                text: "350+"
                level: 3
                typography: { size: xxl, weight: extrabold, color: *color-accent, align: center }
            - name: paragraph
              properties:
                text: Projects Delivered
                typography: { size: sm, color: *color-secondary, align: center }
        - components:
            - name: heading
              properties:
                text: "15"
                level: 3
                typography: { size: xxl, weight: extrabold, color: *color-accent, align: center }
            - name: paragraph
              properties:
                text: Years Experience
                typography: { size: sm, color: *color-secondary, align: center }
        - components:
            - name: heading
              properties:
                text: "98%"
                level: 3
                typography: { size: xxl, weight: extrabold, color: *color-accent, align: center }
            - name: paragraph
              properties:
                text: Client Retention
                typography: { size: sm, color: *color-secondary, align: center }
