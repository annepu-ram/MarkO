# 07 - The Result Card
# Layout-column with a heading ("200% Growth") followed by a paragraph
# explaining the project impact. Stats-focused portfolio cards.

- name: page
  properties:
    theme:
      fonts:
        headingMain: &font-heading-main "'Clash Display', sans-serif"
        headingLevel2: &font-heading-level2 "'Clash Display', sans-serif"
        content: &font-content "'Satoshi', sans-serif"
      colors:
        primary: &color-primary '#0c0a09'
        secondary: &color-secondary '#57534e'
        accent: &color-accent '#10b981'
        background: &color-background '#fafaf9'
    spacing: { paddingBlock: none, paddingInline: none }
    appearance: { background: { color: *color-background } }
  components:

    # ============================================
    # SECTION HEADER
    # ============================================
    - name: layout-column
      properties:
        layout: { horizontalAlign: center }
        spacing: { paddingBlock: xl, paddingInline: lg }
        appearance: { background: { color: *color-background } }
      components:
        - name: eyebrow
          properties:
            text: MEASURABLE IMPACT
            typography: { size: xs, weight: semibold, color: *color-accent, transform: uppercase, letterSpacing: wider }
        - name: heading
          properties:
            text: Results That Speak
            level: 1
            typography: { size: xxxl, weight: extrabold, color: *color-primary, align: center, letterSpacing: tight }
            spacing: { marginBlock: sm }
        - name: paragraph
          properties:
            text: Every project is measured by the impact it delivers. Here are the numbers behind our recent work.
            typography: { size: lg, color: *color-secondary, align: center }
            layout: { widthMode: "75" }

    # ============================================
    # RESULT CARDS - TOP ROW
    # ============================================
    - name: columnsgrid
      properties:
        layout: { columns: 3, gap: lg }
        responsive: { breakpoints: { md: 2, sm: 1 } }
        spacing: { paddingBlock: lg, paddingInline: lg }
      columns:

        # Card 1 - Revenue Growth
        - components:
            - name: layout-column
              properties:
                layout: { horizontalAlign: left }
                spacing: { paddingBlock: xl, paddingInline: lg }
                appearance:
                  background: { color: '#ffffff', transparency: 100 }
                  radius: lg
                  shadow: soft
                  border: { width: 1, style: solid, color: '#e7e5e4' }
              components:
                - name: eyebrow
                  properties:
                    text: NOVAPAY FINTECH
                    typography: { size: xs, weight: semibold, color: *color-secondary, transform: uppercase, letterSpacing: wider }
                - name: heading
                  properties:
                    text: "200%"
                    level: 2
                    typography: { size: xxxl, weight: extrabold, color: *color-accent, letterSpacing: tight }
                    spacing: { marginBlock: xs }
                - name: heading
                  properties:
                    text: Revenue Growth
                    level: 3
                    typography: { size: lg, weight: bold, color: *color-primary }
                    spacing: { marginBlock: xs }
                - name: paragraph
                  properties:
                    text: Complete brand redesign and digital platform overhaul drove a 200% increase in recurring revenue within 8 months of launch.
                    typography: { size: sm, color: *color-secondary }
                    spacing: { marginBlock: md }
                - name: layout-row
                  properties:
                    layout: { horizontalAlign: left, verticalAlign: center, gap: lg, wrap: wrap }
                  components:
                    - name: layout-column
                      properties:
                        layout: { horizontalAlign: left }
                      components:
                        - name: heading
                          properties:
                            text: "4.2M"
                            level: 4
                            typography: { size: md, weight: bold, color: *color-primary }
                        - name: caption
                          properties:
                            text: New Users
                            typography: { size: xs, color: *color-secondary }
                    - name: layout-column
                      properties:
                        layout: { horizontalAlign: left }
                      components:
                        - name: heading
                          properties:
                            text: "67%"
                            level: 4
                            typography: { size: md, weight: bold, color: *color-primary }
                        - name: caption
                          properties:
                            text: Faster Onboarding
                            typography: { size: xs, color: *color-secondary }

        # Card 2 - Conversion Rate
        - components:
            - name: layout-column
              properties:
                layout: { horizontalAlign: left }
                spacing: { paddingBlock: xl, paddingInline: lg }
                appearance:
                  background: { color: *color-primary, transparency: 100 }
                  radius: lg
                  shadow: elevated
              components:
                - name: eyebrow
                  properties:
                    text: ARTISAN COLLECTIVE
                    typography: { size: xs, weight: semibold, color: '#a8a29e', transform: uppercase, letterSpacing: wider }
                - name: heading
                  properties:
                    text: "340%"
                    level: 2
                    typography: { size: xxxl, weight: extrabold, color: *color-accent, letterSpacing: tight }
                    spacing: { marginBlock: xs }
                - name: heading
                  properties:
                    text: Conversion Uplift
                    level: 3
                    typography: { size: lg, weight: bold, color: '#fafaf9' }
                    spacing: { marginBlock: xs }
                - name: paragraph
                  properties:
                    text: E-commerce redesign with UX research-led approach transformed the shopping experience, resulting in a 340% conversion rate increase.
                    typography: { size: sm, color: '#a8a29e' }
                    spacing: { marginBlock: md }
                - name: layout-row
                  properties:
                    layout: { horizontalAlign: left, verticalAlign: center, gap: lg, wrap: wrap }
                  components:
                    - name: layout-column
                      properties:
                        layout: { horizontalAlign: left }
                      components:
                        - name: heading
                          properties:
                            text: "$12M"
                            level: 4
                            typography: { size: md, weight: bold, color: '#fafaf9' }
                        - name: caption
                          properties:
                            text: Annual GMV
                            typography: { size: xs, color: '#a8a29e' }
                    - name: layout-column
                      properties:
                        layout: { horizontalAlign: left }
                      components:
                        - name: heading
                          properties:
                            text: "82%"
                            level: 4
                            typography: { size: md, weight: bold, color: '#fafaf9' }
                        - name: caption
                          properties:
                            text: Return Rate
                            typography: { size: xs, color: '#a8a29e' }

        # Card 3 - User Engagement
        - components:
            - name: layout-column
              properties:
                layout: { horizontalAlign: left }
                spacing: { paddingBlock: xl, paddingInline: lg }
                appearance:
                  background: { color: '#ffffff', transparency: 100 }
                  radius: lg
                  shadow: soft
                  border: { width: 1, style: solid, color: '#e7e5e4' }
              components:
                - name: eyebrow
                  properties:
                    text: HEALTHBRIDGE SAAS
                    typography: { size: xs, weight: semibold, color: *color-secondary, transform: uppercase, letterSpacing: wider }
                - name: heading
                  properties:
                    text: "60%"
                    level: 2
                    typography: { size: xxxl, weight: extrabold, color: *color-accent, letterSpacing: tight }
                    spacing: { marginBlock: xs }
                - name: heading
                  properties:
                    text: Fewer Support Tickets
                    level: 3
                    typography: { size: lg, weight: bold, color: *color-primary }
                    spacing: { marginBlock: xs }
                - name: paragraph
                  properties:
                    text: Dashboard redesign with intuitive data visualization reduced support tickets by 60% and increased daily active usage by 150%.
                    typography: { size: sm, color: *color-secondary }
                    spacing: { marginBlock: md }
                - name: layout-row
                  properties:
                    layout: { horizontalAlign: left, verticalAlign: center, gap: lg, wrap: wrap }
                  components:
                    - name: layout-column
                      properties:
                        layout: { horizontalAlign: left }
                      components:
                        - name: heading
                          properties:
                            text: "150%"
                            level: 4
                            typography: { size: md, weight: bold, color: *color-primary }
                        - name: caption
                          properties:
                            text: DAU Increase
                            typography: { size: xs, color: *color-secondary }
                    - name: layout-column
                      properties:
                        layout: { horizontalAlign: left }
                      components:
                        - name: heading
                          properties:
                            text: "4.8/5"
                            level: 4
                            typography: { size: md, weight: bold, color: *color-primary }
                        - name: caption
                          properties:
                            text: User Rating
                            typography: { size: xs, color: *color-secondary }

    # ============================================
    # BOTTOM ROW - 2 WIDE CARDS
    # ============================================
    - name: columnsgrid
      properties:
        layout: { columns: 2, gap: lg }
        responsive: { breakpoints: { md: 1, sm: 1 } }
        spacing: { paddingBlock: none, paddingInline: lg }
      columns:

        # Card 4 - App Downloads
        - components:
            - name: layout-column
              properties:
                layout: { horizontalAlign: left }
                spacing: { paddingBlock: xl, paddingInline: lg }
                appearance:
                  background:
                    type: gradient
                    gradient:
                      colorStart: '#065f46'
                      colorEnd: '#0c0a09'
                      direction: to bottom right
                  radius: lg
                  shadow: elevated
              components:
                - name: eyebrow
                  properties:
                    text: MERIDIAN FITNESS APP
                    typography: { size: xs, weight: semibold, color: '#6ee7b7', transform: uppercase, letterSpacing: wider }
                - name: heading
                  properties:
                    text: "2.5M+"
                    level: 2
                    typography: { size: xxxl, weight: extrabold, color: '#ffffff', letterSpacing: tight }
                    spacing: { marginBlock: xs }
                - name: heading
                  properties:
                    text: App Downloads in 6 Months
                    level: 3
                    typography: { size: lg, weight: bold, color: '#d1fae5' }
                    spacing: { marginBlock: xs }
                - name: paragraph
                  properties:
                    text: End-to-end mobile app design and development for a fitness platform that reached 2.5 million downloads within its first 6 months, becoming the #3 ranked health app in the App Store.
                    typography: { size: sm, color: '#a7f3d0' }

        # Card 5 - Brand Awareness
        - components:
            - name: layout-column
              properties:
                layout: { horizontalAlign: left }
                spacing: { paddingBlock: xl, paddingInline: lg }
                appearance:
                  background: { color: '#ffffff', transparency: 100 }
                  radius: lg
                  shadow: soft
                  border: { width: 1, style: solid, color: '#e7e5e4' }
              components:
                - name: eyebrow
                  properties:
                    text: TERRA ORGANICS REBRAND
                    typography: { size: xs, weight: semibold, color: *color-secondary, transform: uppercase, letterSpacing: wider }
                - name: heading
                  properties:
                    text: "520%"
                    level: 2
                    typography: { size: xxxl, weight: extrabold, color: *color-accent, letterSpacing: tight }
                    spacing: { marginBlock: xs }
                - name: heading
                  properties:
                    text: Social Media Engagement
                    level: 3
                    typography: { size: lg, weight: bold, color: *color-primary }
                    spacing: { marginBlock: xs }
                - name: paragraph
                  properties:
                    text: Complete rebrand with new packaging design, social content strategy, and website overhaul drove a 520% increase in social engagement and 180% growth in direct-to-consumer sales.
                    typography: { size: sm, color: *color-secondary }
