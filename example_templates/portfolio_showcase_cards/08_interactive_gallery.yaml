# 08 - The Interactive Gallery
# Tabs where each tab shows a different columnsgrid of images.
# 3 tabs (Branding, Web, Mobile) with image grids.

- name: page
  properties:
    theme:
      fonts:
        headingMain: &font-heading-main "'Manrope', sans-serif"
        headingLevel2: &font-heading-level2 "'Manrope', sans-serif"
        content: &font-content "'Inter', sans-serif"
      colors:
        primary: &color-primary '#18181b'
        secondary: &color-secondary '#52525b'
        accent: &color-accent '#ec4899'
        background: &color-background '#fafafa'
    spacing: { paddingBlock: none, paddingInline: none }
    appearance: { background: { color: *color-background } }
  components:

    # ============================================
    # SECTION HEADER
    # ============================================
    - name: layout-column
      properties:
        layout: { horizontalAlign: center }
        spacing: { paddingBlock: xl, paddingInline: lg }
        appearance: { background: { color: *color-background } }
      components:
        - name: eyebrow
          properties:
            text: EXPLORE BY DISCIPLINE
            typography: { size: xs, weight: semibold, color: *color-accent, transform: uppercase, letterSpacing: wider }
        - name: heading
          properties:
            text: Interactive Gallery
            level: 1
            typography: { size: xxxl, weight: extrabold, color: *color-primary, align: center, letterSpacing: tight }
            spacing: { marginBlock: sm }
        - name: paragraph
          properties:
            text: Browse our work across branding, web, and mobile design disciplines.
            typography: { size: lg, color: *color-secondary, align: center }
            layout: { widthMode: "75" }

    # ============================================
    # TABBED GALLERY
    # ============================================
    - name: layout-column
      properties:
        layout: { horizontalAlign: center }
        spacing: { paddingBlock: lg, paddingInline: lg }
      components:
        - name: tabs
          properties:
            layout: { orientation: horizontal, widthMode: stretch }
            typography:
              label:
                size: md
                weight: semibold
                active: { color: *color-accent }
                inactive: { color: *color-secondary }
            appearance:
              tab:
                background: { active: '#ffffff', inactive: '#f4f4f5' }
                border: { width: 3, style: solid, position: lower }
              content:
                background: { color: '#ffffff', transparency: 100 }
                border: { color: '#e4e4e7', width: 1, style: solid }
                padding: { block: lg, inline: lg }
            spacing: { marginBlock: lg }
          tabs:

            # Tab 1 - Branding
            - title: Branding
              components:
                - name: columnsgrid
                  properties:
                    layout: { columns: 3, gap: md }
                    responsive: { breakpoints: { md: 2, sm: 1 } }
                  columns:
                    - components:
                        - name: image
                          properties:
                            source:
                              url: 'https://images.unsplash.com/photo-1561070791-2526d30994b5?w=600&q=80'
                              altText: 'Brand identity mockup with business cards and letterhead'
                            appearance:
                              fit: cover
                              cornerStyle: md
                              hoverEffect: lift
                              shadow: soft
                              aspectRatio: '4/3'
                            layout: { widthMode: stretch }
                        - name: heading
                          properties:
                            text: Luminary Studios
                            level: 4
                            typography: { size: md, weight: semibold, color: *color-primary }
                            spacing: { marginBlock: xs }
                        - name: caption
                          properties:
                            text: Brand Identity / Logo System
                            typography: { size: xs, color: *color-secondary }
                    - components:
                        - name: image
                          properties:
                            source:
                              url: 'https://images.unsplash.com/photo-1586717791821-3f44a563fa4c?w=600&q=80'
                              altText: 'Packaging design with botanical elements'
                            appearance:
                              fit: cover
                              cornerStyle: md
                              hoverEffect: lift
                              shadow: soft
                              aspectRatio: '4/3'
                            layout: { widthMode: stretch }
                        - name: heading
                          properties:
                            text: Terra Organics
                            level: 4
                            typography: { size: md, weight: semibold, color: *color-primary }
                            spacing: { marginBlock: xs }
                        - name: caption
                          properties:
                            text: Packaging / Brand Guidelines
                            typography: { size: xs, color: *color-secondary }
                    - components:
                        - name: image
                          properties:
                            source:
                              url: 'https://images.unsplash.com/photo-1558591710-4b4a1ae0f04d?w=600&q=80'
                              altText: 'Minimalist typographic poster series'
                            appearance:
                              fit: cover
                              cornerStyle: md
                              hoverEffect: lift
                              shadow: soft
                              aspectRatio: '4/3'
                            layout: { widthMode: stretch }
                        - name: heading
                          properties:
                            text: Apex Athletics
