# 09 - Meet the Team
# Layout-column with an image, heading (name), and a link to their profile.
# Part of a team grid using columnsgrid.

- name: page
  properties:
    theme:
      fonts:
        heading: &font-heading "'Plus Jakarta Sans', sans-serif"
        content: &font-content "'Inter', sans-serif"
      colors:
        primary: &color-primary '#1e293b'
        secondary: &color-secondary '#64748b'
        accent: &color-accent '#7c3aed'
        background: &color-background '#ffffff'
    spacing: { paddingBlock: none, paddingInline: none }
    appearance: { background: { color: *color-background } }
  components:

    # ============================================
    # SECTION HEADER
    # ============================================
    - name: layout-column
      properties:
        layout: { horizontalAlign: center }
        spacing: { paddingBlock: xl, paddingInline: lg }
        appearance: { background: { color: *color-background } }
      components:
        - name: eyebrow
          properties:
            text: THE PEOPLE BEHIND THE PIXELS
            typography: { size: xs, weight: semibold, color: *color-accent, transform: uppercase, letterSpacing: wider }
        - name: heading
          properties:
            text: Meet the Team
            level: 1
            typography: { size: xxxl, weight: extrabold, color: *color-primary, align: center, letterSpacing: tight }
            spacing: { marginBlock: sm }
        - name: paragraph
          properties:
            text: A multidisciplinary crew of designers, engineers, and strategists united by a passion for craft.
            typography: { size: lg, color: *color-secondary, align: center }
            layout: { widthMode: "75" }

    # ============================================
    # LEADERSHIP ROW
    # ============================================
    - name: layout-column
      properties:
        layout: { horizontalAlign: center }
        spacing: { paddingBlock: lg, paddingInline: lg }
        appearance: { background: { color: *color-background } }
      components:
        - name: eyebrow
          properties:
            text: LEADERSHIP
            typography: { size: xs, weight: semibold, color: *color-secondary, transform: uppercase, letterSpacing: wider, align: center }
            spacing: { marginBlock: md }

        - name: columnsgrid
          properties:
            layout: { columns: 3, gap: xl }
            responsive: { breakpoints: { md: 2, sm: 1 } }
          columns:

            # Team Member 1 - CEO
            - components:
                - name: layout-column
                  properties:
                    layout: { horizontalAlign: center }
                    spacing: { paddingBlock: lg, paddingInline: md }
                    appearance:
                      background: { color: *color-background, transparency: 100 }
                      radius: lg
                      shadow: soft
                  components:
                    - name: image
                      properties:
                        source:
                          url: 'https://images.unsplash.com/photo-1560250097-0b93528c311a?w=400&q=80'
                          altText: 'Portrait of James Whitfield, CEO and Co-Founder'
                        appearance:
                          fit: cover
                          cornerStyle: pill
                          aspectRatio: '1/1'
                          hoverEffect: lift
                          shadow: soft
                        layout: { widthMode: "50" }
                    - name: heading
                      properties:
                        text: James Whitfield
                        level: 3
                        typography: { size: lg, weight: bold, color: *color-primary, align: center }
                        spacing: { marginBlock: sm }
                    - name: eyebrow
                      properties:
                        text: CEO & CO-FOUNDER
                        typography: { size: xs, weight: semibold, color: *color-accent, align: center, transform: uppercase, letterSpacing: wider }
                    - name: paragraph
                      properties:
                        text: 15 years shaping digital experiences for Fortune 500 brands. Previously led design at Spotify.
                        typography: { size: sm, color: *color-secondary, align: center }
                        spacing: { marginBlock: sm }
                    - name: link
                      properties:
                        text: View Profile
                        href: '#james'
                        appearance: { color: *color-accent, underline: false, showArrow: true }

            # Team Member 2 - Creative Director
            - components:
                - name: layout-column
                  properties:
                    layout: { horizontalAlign: center }
                    spacing: { paddingBlock: lg, paddingInline: md }
                    appearance:
                      background: { color: *color-background, transparency: 100 }
                      radius: lg
                      shadow: soft
                  components:
                    - name: image
                      properties:
                        source:
                          url: 'https://images.unsplash.com/photo-1573496359142-b8d87734a5a2?w=400&q=80'
                          altText: 'Portrait of Elena Vasquez, Creative Director'
                        appearance:
                          fit: cover
                          cornerStyle: pill
                          aspectRatio: '1/1'
                          hoverEffect: lift
                          shadow: soft
                        layout: { widthMode: "50" }
                    - name: heading
                      properties:
                        text: Elena Vasquez
                        level: 3
                        typography: { size: lg, weight: bold, color: *color-primary, align: center }
                        spacing: { marginBlock: sm }
                    - name: eyebrow
                      properties:
                        text: CREATIVE DIRECTOR
                        typography: { size: xs, weight: semibold, color: *color-accent, align: center, transform: uppercase, letterSpacing: wider }
                    - name: paragraph
                      properties:
                        text: Award-winning designer with a background in editorial and brand identity. D&AD Yellow Pencil winner.
                        typography: { size: sm, color: *color-secondary, align: center }
                        spacing: { marginBlock: sm }
                    - name: link
                      properties:
                        text: View Profile
                        href: '#elena'
                        appearance: { color: *color-accent, underline: false, showArrow: true }

            # Team Member 3 - CTO
            - components:
                - name: layout-column
                  properties:
                    layout: { horizontalAlign: center }
                    spacing: { paddingBlock: lg, paddingInline: md }
                    appearance:
                      background: { color: *color-background, transparency: 100 }
                      radius: lg
                      shadow: soft
                  components:
                    - name: image
                      properties:
                        source:
                          url: 'https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?w=400&q=80'
                          altText: 'Portrait of Kenji Tanaka, CTO and Co-Founder'
                        appearance:
                          fit: cover
                          cornerStyle: pill
                          aspectRatio: '1/1'
                          hoverEffect: lift
                          shadow: soft
                        layout: { widthMode: "50" }
                    - name: heading
                      properties:
                        text: Kenji Tanaka
                        level: 3
                        typography: { size: lg, weight: bold, color: *color-primary, align: center }
                        spacing: { marginBlock: sm }
                    - name: eyebrow
                      properties:
                        text: CTO & CO-FOUNDER
                        typography: { size: xs, weight: semibold, color: *color-accent, align: center, transform: uppercase, letterSpacing: wider }
                    - name: paragraph
                      properties:
                        text: Full-stack engineer turned technical leader. Built platforms serving 50M+ users. Ex-Google, ex-Stripe.
                        typography: { size: sm, color: *color-secondary, align: center }
                        spacing: { marginBlock: sm }
                    - name: link
                      properties:
                        text: View Profile
                        href: '#kenji'
                        appearance: { color: *color-accent, underline: false, showArrow: true }

    # ============================================
    # DESIGN TEAM
    # ============================================
    - name: layout-column
      properties:
        layout: { horizontalAlign: center }
        spacing: { paddingBlock: lg, paddingInline: lg }
        appearance: { background: { color: *color-background } }
      components:
        - name: eyebrow
          properties:
            text: DESIGN TEAM
            typography: { size: xs, weight: semibold, color: *color-secondary, transform: uppercase, letterSpacing: wider, align: center }
            spacing: { marginBlock: md }

        - name: columnsgrid
          properties:
            layout: { columns: 4, gap: lg }
            responsive: { breakpoints: { md: 2, sm: 1 } }
          columns:

            # Designer 1
            - components:
                - name: layout-column
                  properties:
                    layout: { horizontalAlign: center }
                    spacing: { paddingBlock: md, paddingInline: sm }
                  components:
                    - name: image
                      properties:
                        source:
                          url: 'https://images.unsplash.com/photo-1580489944761-15a19d654956?w=300&q=80'
                          altText: 'Portrait of Mara Osei, Senior Designer'
                        appearance:
                          fit: cover
                          cornerStyle: pill
                          aspectRatio: '1/1'
                          hoverEffect: lift
                        layout: { widthMode: "50" }
                    - name: heading
                      properties:
                        text: Mara Osei
                        level: 4
                        typography: { size: md, weight: semibold, color: *color-primary, align: center }
                        spacing: { marginBlock: xs }
                    - name: caption
                      properties:
                        text: Senior Designer
                        typography: { size: xs, color: *color-secondary, align: center }
                    - name: link
                      properties:
                        text: Profile
                        href: '#mara'
                        appearance: { color: *color-accent, underline: false, showArrow: true }

            # Designer 2
            - components:
                - name: layout-column
                  properties:
                    layout: { horizontalAlign: center }
                    spacing: { paddingBlock: md, paddingInline: sm }
                  components:
                    - name: image
                      properties:
                        source:
                          url: 'https://images.unsplash.com/photo-1519085360753-af0119f7cbe7?w=300&q=80'
                          altText: 'Portrait of Lucas Chen, Motion Designer'
                        appearance:
                          fit: cover
                          cornerStyle: pill
                          aspectRatio: '1/1'
                          hoverEffect: lift
                        layout: { widthMode: "50" }
                    - name: heading
                      properties:
                        text: Lucas Chen
                        level: 4
                        typography: { size: md, weight: semibold, color: *color-primary, align: center }
                        spacing: { marginBlock: xs }
                    - name: caption
                      properties:
                        text: Motion Designer
                        typography: { size: xs, color: *color-secondary, align: center }
                    - name: link
                      properties:
                        text: Profile
                        href: '#lucas'
                        appearance: { color: *color-accent, underline: false, showArrow: true }

            # Designer 3
            - components:
                - name: layout-column
                  properties:
                    layout: { horizontalAlign: center }
                    spacing: { paddingBlock: md, paddingInline: sm }
                  components:
                    - name: image
                      properties:
                        source:
                          url: 'https://images.unsplash.com/photo-1544005313-94ddf0286df2?w=300&q=80'
                          altText: 'Portrait of Priya Sharma, UX Researcher'
                        appearance:
                          fit: cover
                          cornerStyle: pill
                          aspectRatio: '1/1'
                          hoverEffect: lift
                        layout: { widthMode: "50" }
                    - name: heading
                      properties:
                        text: Priya Sharma
                        level: 4
                        typography: { size: md, weight: semibold, color: *color-primary, align: center }
                        spacing: { marginBlock: xs }
                    - name: caption
                      properties:
                        text: UX Researcher
                        typography: { size: xs, color: *color-secondary, align: center }
                    - name: link
                      properties:
                        text: Profile
                        href: '#priya'
                        appearance: { color: *color-accent, underline: false, showArrow: true }

            # Designer 4
            - components:
                - name: layout-column
                  properties:
                    layout: { horizontalAlign: center }
                    spacing: { paddingBlock: md, paddingInline: sm }
                  components:
                    - name: image
                      properties:
                        source:
                          url: 'https://images.unsplash.com/photo-1506794778202-cad84cf45f1d?w=300&q=80'
                          altText: 'Portrait of Oliver Park, Brand Strategist'
                        appearance:
                          fit: cover
                          cornerStyle: pill
                          aspectRatio: '1/1'
                          hoverEffect: lift
                        layout: { widthMode: "50" }
                    - name: heading
                      properties:
                        text: Oliver Park
                        level: 4
                        typography: { size: md, weight: semibold, color: *color-primary, align: center }
                        spacing: { marginBlock: xs }
                    - name: caption
                      properties:
                        text: Brand Strategist
                        typography: { size: xs, color: *color-secondary, align: center }
                    - name: link
                      properties:
                        text: Profile
                        href: '#oliver'
                        appearance: { color: *color-accent, underline: false, showArrow: true }

    # ============================================
    # JOIN THE TEAM CTA
    # ============================================
    - name: layout-column
      properties:
        layout: { horizontalAlign: center }
        spacing: { paddingBlock: xl, paddingInline: lg }
        appearance:
          background: { color: *color-primary }
      components:
        - name: heading
          properties:
            text: Want to Join Us?
            level: 2
            typography: { size: xxl, weight: bold, color: *color-background, align: center }
            spacing: { marginBlock: sm }
        - name: paragraph
          properties:
            text: We are always looking for talented, curious people who want to do the best work of their careers.
            typography: { size: md, color: *color-secondary, align: center }
            layout: { widthMode: "50" }
            spacing: { marginBlock: md }
        - name: button
          properties:
            text: View Open Positions
            action: { type: link, value: '#careers' }
            appearance:
              background: { color: *color-accent }
              padding: { block: md, inline: xl }
            typography: { color: *color-background, weight: semibold, size: md }
