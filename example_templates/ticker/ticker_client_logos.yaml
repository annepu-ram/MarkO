# Ticker Template: Client Logos Strip
# Minimal logo + company name cards scrolling continuously
# Base components: page, layout-column, eyebrow, ticker, layout-row, icon, heading
# Section type: ticker
# Layout: stacked
# Visual style: modern_minimalist
# Content volume: rich
# Tone: neutral
# Conversion intent: awareness
# Image requirement: none
# Interactivity: static
# Industries: saas
# Perfect for: any business, SaaS, agencies, corporate
- name: page
  properties:
    theme:
      fonts:
        heading: &font-heading "'Inter', sans-serif"
        content: &font-content "'Inter', sans-serif"
      colors:
        primary: &color-primary '#1e293b'
        text: &color-text '#343A45'
        secondary: &color-secondary '#64748b'
        accent: &color-accent '#3b82f6'
        background: &color-background '#ffffff'
    appearance:
      background:
        color: *color-background
        opacity: 100
  components:
    - name: layout-column
      properties:
        layout:
          horizontalAlign: center
          gap: sm
        spacing:
          paddingBlock: xl
          paddingInline: lg
        appearance:
          background:
            color: *color-background
            opacity: 100
      components:
        - name: eyebrow
          properties:
            text: TRUSTED BY 500+ COMPANIES WORLDWIDE
            typography:
              size: xs
              weight: semibold
              color: *color-secondary
              align: center
              letterSpacing: wider
              transform: uppercase

        - name: ticker
          properties:
            behavior:
              direction: left
              speed: 30
              mode: continuous
              pauseOnHover: false
            spacing:
              marginBlock: sm
              marginInline: none
            layout:
              gap: xxl
          columns:
            - components:
                - name: layout-row
                  properties:
                    layout:
                      horizontalAlign: center
                      verticalAlign: center
                      wrap: nowrap
                    spacing:
                      gap: xs
                  components:
                    - name: icon
                      properties:
                        name: languages
                        size: "36"
                        color: *color-primary
                        strokeWidth: "2"
                    - name: heading
                      properties:
                        text: Nexora
                        level: 4
                        typography:
                          size: md
                          weight: bold
                          color: *color-primary
            - components:
                - name: layout-row
                  properties:
                    layout:
                      horizontalAlign: center
                      verticalAlign: center
                      wrap: nowrap
                    spacing:
                      gap: xs
                  components:
                    - name: icon
                      properties:
                        name: local_fire_department
                        size: lg
                        color: *color-accent
                    - name: heading
                      properties:
                        text: Blaze Studio
                        level: 4
                        typography:
                          size: md
                          weight: bold
                          color: *color-primary
            - components:
                - name: layout-row
                  properties:
                    layout:
                      horizontalAlign: center
                      verticalAlign: center
                      wrap: nowrap
                    spacing:
                      gap: xs
                  components:
                    - name: icon
                      properties:
                        name: star
                        size: "36"
                        color: *color-accent
                        strokeWidth: "2"
                    - name: heading
