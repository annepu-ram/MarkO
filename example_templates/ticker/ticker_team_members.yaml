# Ticker Template: Team Members
# Team headshot cards with name, role, and social link
# Base components: page, layout-column, eyebrow, heading, ticker, image, paragraph
# Section type: ticker
# Layout: stacked
# Visual style: modern_minimalist
# Perfect for: agencies, corporate, SaaS, any business
- name: page
  properties:
    theme:
      fonts:
        heading: &font-heading "'Outfit', sans-serif"
        content: &font-content "'Outfit', sans-serif"
      colors:
        primary: &color-primary '#18181b'
        text: &color-text '#303032'
        secondary: &color-secondary '#71717a'
        accent: &color-accent '#0ea5e9'
        background: &color-background '#f0f9ff'
    appearance:
      background:
        color: *color-background
        opacity: 100
  components:
  - name: layout-column
    properties:
      layout:
        horizontalAlign: center
        gap: md
      spacing:
        paddingBlock: xxl
        paddingInline: lg
    components:
    - name: eyebrow
      properties:
        text: THE PEOPLE BEHIND THE PRODUCT
        typography:
          size: xs
          weight: semibold
          color: *color-accent
          align: center
          letterSpacing: wider
          transform: uppercase
    - name: heading
      properties:
        text: Meet Our Team
        level: 2
        typography:
          size: xxl
          weight: bold
          color: *color-primary
          align: center

    - name: ticker
      properties:
        behavior:
          direction: left
          speed: 25
          mode: continuous
          pauseOnHover: true
        layout:
          gap: lg
          widthMode: "200"
        spacing:
          marginBlock: lg
          marginInline: none
        appearance:
          columnBackground: *color-background
          columnOpacity: 100
          columnRadius: lg
          columnBorder:
            width: 1
            style: solid
            color: *color-secondary
      columns:
      - components:
        - name: layout-column
          properties:
            layout:
              horizontalAlign: center
              gap: sm
            spacing:
              paddingBlock: lg
              paddingInline: md
          components:
          - name: image
            properties:
              source:
                url: https://images.unsplash.com/photo-1560250097-0b93528c311a?w=300&h=300&fit=crop&crop=face
                altText: Alex Rivera
              appearance:
                radius: pill
                fit: cover
                minHeight: 9.375
          - name: heading
            properties:
              text: Alex Rivera
              level: 4
              typography:
                size: md
                weight: semibold
                color: *color-primary
                align: center
          - name: paragraph
            properties:
              text: CEO & Co-Founder
              typography:
                size: xs
                color: *color-accent
                align: center
                weight: medium
      - components:
