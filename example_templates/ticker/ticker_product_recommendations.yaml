# Ticker Template: Product Recommendations
# Product image cards with name, price, and CTA button
# Base components: page, layout-column, eyebrow, heading, ticker, image, paragraph, button
# Section type: ticker
# Layout: stacked
# Visual style: modern
# Perfect for: ecommerce, any business
- name: page
  properties:
    theme:
      fonts:
        heading: &font-heading "'Poppins', sans-serif"
        content: &font-content "'Poppins', sans-serif"
      colors:
        primary: &color-primary '#111827'
        text: &color-text '#2C3039'
        secondary: &color-secondary '#6b7280'
        accent: &color-accent '#4f46e5'
        background: &color-background '#ffffff'
    appearance:
      background:
        color: *color-background
        transparency: 100
  components:
  - name: layout-column
    properties:
      layout:
        horizontalAlign: center
        gap: md
      spacing:
        paddingBlock: xxl
        paddingInline: lg
    components:
    - name: eyebrow
      properties:
        text: HANDPICKED FOR YOU
        typography:
          size: xs
          weight: semibold
          color: *color-accent
          align: center
          letterSpacing: wider
          transform: uppercase
    - name: heading
      properties:
        text: Recommended Products
        level: 2
        typography:
          size: xxl
          weight: bold
          color: *color-primary
          align: center

    - name: ticker
      properties:
        behavior:
          direction: left
          speed: 25
          mode: continuous
          pauseOnHover: true
        layout:
          gap: lg
          widthMode: "280"
        spacing:
          marginBlock: lg
          marginInline: none
        appearance:
          columnBackground: *color-background
          columnTransparency: 100
          columnRadius: lg
          columnBorder:
            width: 1
            style: solid
            color: *color-secondary
      columns:
      - components:
        - name: layout-column
          properties:
            layout:
              horizontalAlign: center
              gap: sm
            spacing:
              paddingBlock: sm
              paddingInline: sm
          components:
          - name: image
            properties:
              source:
                url: https://images.unsplash.com/photo-1523275335684-37898b6baf30?w=400&h=400&fit=crop
                altText: Premium Watch
              appearance:
                radius: md
                fit: cover
                minHeight: 12.5
          - name: heading
            properties:
              text: Premium Watch
              level: 4
              typography:
                size: md
                weight: semibold
                color: *color-primary
          - name: paragraph
            properties:
              text: "$249.99"
              typography:
                size: lg
                weight: bold
                color: *color-accent
          - name: button
            properties:
              text: Add to Cart
              appearance:
                background:
                  color: *color-accent
              typography:
                color: *color-background
                size: sm
      - components:
