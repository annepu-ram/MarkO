# Ticker Template: Service Cards
# Professional service offering cards with icon, title, description, and CTA
# Base components: page, layout-column, eyebrow, heading, paragraph, ticker, icon, button
# Section type: ticker
# Layout: stacked
# Visual style: modern_minimalist
# Perfect for: agencies, corporate, SaaS, any business
- name: page
  properties:
    theme:
      fonts:
        heading: &font-heading "'Space Grotesk', sans-serif"
        content: &font-content "'Space Grotesk', sans-serif"
      colors:
        primary: &color-primary '#0f172a'
        text: &color-text '#2B2F3B'
        secondary: &color-secondary '#475569'
        accent: &color-accent '#7c3aed'
        background: &color-background '#faf5ff'
    appearance:
      background:
        color: *color-background
        opacity: 100
  components:
  - name: layout-column
    properties:
      layout:
        horizontalAlign: center
        gap: md
      spacing:
        paddingBlock: xxl
        paddingInline: lg
    components:
    - name: eyebrow
      properties:
        text: WHAT WE OFFER
        typography:
          size: xs
          weight: semibold
          color: *color-accent
          align: center
          letterSpacing: wider
          transform: uppercase
    - name: heading
      properties:
        text: Our Services
        level: 2
        typography:
          size: xxl
          weight: bold
          color: *color-primary
          align: center
    - name: paragraph
      properties:
        text: End-to-end solutions tailored to your business needs
        typography:
          size: md
          color: *color-secondary
          align: center

    - name: ticker
      properties:
        behavior:
          direction: left
          speed: 25
          mode: continuous
          pauseOnHover: true
        layout:
          gap: lg
          widthMode: "280"
        spacing:
          marginBlock: lg
          marginInline: none
        appearance:
          columnBackground: *color-background
          columnOpacity: 100
          columnRadius: lg
          columnBorder:
            width: 1
            style: solid
            color: *color-secondary
      columns:
      - components:
        - name: layout-column
          properties:
            layout:
              horizontalAlign: center
              gap: sm
            spacing:
              paddingBlock: xl
              paddingInline: lg
          components:
          - name: icon
            properties:
              name: language
              size: xl
              color: *color-accent
          - name: heading
            properties:
              text: Web Development
              level: 4
              typography:
                size: md
                weight: bold
                color: *color-primary
                align: center
          - name: paragraph
            properties:
              text: Custom websites and web apps built with modern frameworks. Responsive, fast, and SEO-optimized.
              typography:
                size: sm
                color: *color-secondary
                align: center
                lineHeight: relaxed
          - name: button
            properties:
              text: Learn More
              appearance:
                background:
                  color: *color-accent
              typography:
                color: *color-background
                size: sm
      - components:
        - name: layout-column
          properties:
            layout:
              horizontalAlign: center
              gap: sm
            spacing:
              paddingBlock: xl
              paddingInline: lg
          components:
          - name: icon
