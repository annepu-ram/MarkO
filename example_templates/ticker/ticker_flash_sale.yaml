# Ticker Template: Flash Sale
# Urgent sale cards with countdown feel, badges, and discounted prices
- name: page
  properties:
    theme:
      fonts:
        heading: &font-heading "'Montserrat', sans-serif"
        content: &font-content "'Montserrat', sans-serif"
      colors:
        primary: &color-primary '#0f172a'
        secondary: &color-secondary '#64748b'
        accent: &color-accent '#dc2626'
        background: &color-background '#fef2f2'
    appearance:
      background:
        color: *color-background
        transparency: 100
  components:
    - name: layout-column
      properties:
        layout:
          horizontalAlign: center
          gap: md
        spacing:
          paddingBlock: xxl
          paddingInline: lg
      components:
        - name: layout-row
          properties:
            layout:
              horizontalAlign: center
              verticalAlign: center
              wrap: nowrap
            spacing:
              gap: sm
          components:
            - name: icon
              properties:
                name: local_fire_department
                size: xl
                color: *color-accent
            - name: heading
              properties:
                text: Flash Sale — Up to 60% Off
                level: 2
                typography:
                  size: xxl
                  weight: extrabold
                  color: *color-primary
                  align: center
        - name: paragraph
          properties:
            text: Limited time only. Grab your favorites before they're gone!
            typography:
              size: md
              color: *color-secondary
              align: center

        - name: ticker
          properties:
            behavior:
              direction: left
              speed: 20
              mode: continuous
              pauseOnHover: true
            layout:
              width: "280"
            spacing:
              marginBlock: lg
              marginInline: none
              gap: lg
            appearance:
              columnBackground: *color-background
              columnTransparency: 100
              columnRadius: lg
              columnBorder:
                width: 1
                style: solid
                color: *color-secondary
          columns:
            - components:
                - name: layout-column
                  properties:
                    layout:
                      horizontalAlign: center
                      gap: none
                  components:
                    - name: image
                      properties:
                        source:
                          url: https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=400&h=300&fit=crop
                          altText: Red Running Shoes
                        appearance:
                          radius: none
                          fit: cover
                          minHeight: 200
                    - name: badge
                      properties:
                        text: "60% OFF"
                        variant: danger
                        pill: true
                        typography:
                          size: xs
                          color: *color-background
                    - name: layout-column
                      properties:
                        layout:
                          horizontalAlign: center
                          gap: xs
                        spacing:
                          paddingBlock: sm
                          paddingInline: sm
                      components:
                        - name: heading
                          properties:
                            text: Running Shoes Pro
                            level: 4
                            typography:
                              size: md
                              weight: semibold
                              color: *color-primary
                              align: center
                        - name: layout-row
                          properties:
                            layout:
                              horizontalAlign: center
                              verticalAlign: center
                              wrap: nowrap
                            spacing:
                              gap: sm
                          components:
                            - name: paragraph
                              properties:
                                text: "$199.99"
                                typography:
                                  size: sm
                                  color: *color-secondary
                                  weight: regular
                            - name: paragraph
                              properties:
                                text: "$79.99"
                                typography:
                                  size: lg
                                  weight: bold
                                  color: *color-accent
            - components:
