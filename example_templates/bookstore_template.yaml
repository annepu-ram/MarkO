- name: page
  properties:
    theme:
      fonts:
        headingMain: &font-heading-main 'Georgia, serif'
        headingLevel2: &font-heading-level2 'Georgia, serif'
        content: &font-content 'Georgia, serif'
      colors:
        # 60-30-10 Color System:
        # Primary (30%) = TEXT - all headings, paragraphs, body text
        # Secondary (10%) = UI elements, section highlights, inverted section backgrounds
        # Accent (CTAs only) = Call-to-action buttons like "Browse Collection", "Shop Now"
        # Background (60%) = Page base, content areas
        primary: &color-primary '#3d2c29'
        secondary: &color-secondary '#d63031'
        accent: &color-accent '#e17055'
        background: &color-background '#faf7f2'
    spacing: { paddingBlock: none, paddingInline: none }
    appearance: { background: { color: *color-background } }
  components:
    # Navigation
    - name: titlebar
      properties:
        branding:
          showLogo: true
          logoUrl: 'https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?w=60&h=60&fit=crop'
          title: 'The Book Nook'
        navigation:
          links:
            - label: Home
              href: '#home'
            - label: New Arrivals
              href: '#new'
            - label: Second Hand
              href: '#secondhand'
            - label: Kids Books
              href: '#kids'
            - label: Arts & Crafts
              href: '#crafts'
            - label: Contact
              href: '#contact'
        layout: { alignment: left, height: 70 }
        appearance:
          background: { color: *color-secondary }
          title: { color: *color-background }
          link: { color: *color-background }

    # Hero Section
    - name: image
      properties:
        source:
          url: 'https://images.unsplash.com/photo-1481627834876-b7833e8f5570?w=1920&q=80'
          altText: 'Cozy bookstore interior with wooden shelves'
        appearance: { minHeight: 37.5, fit: cover }
        layout: { widthMode: stretch }
      components:
        - name: layout-column
          properties:
            layout: { align: center, horizontalAlign: space-evenly }
            spacing: { paddingBlock: xxxl, paddingInline: lg }
          components:
            - name: eyebrow
              properties:
                text: WELCOME TO
                typography: { size: sm, weight: semibold, color: *color-background, transform: uppercase, letterSpacing: wider }
            - name: heading
              properties:
                text: The Book Nook
                level: 1
                typography: { size: xxxl, weight: extrabold, color: *color-background, align: center }
                spacing: { marginBlock: sm }
            - name: paragraph
              properties:
                text: Your neighborhood bookstore since 1985. Discover new stories, rediscover classics, and find unique arts & crafts supplies.
                typography: { size: lg, color: *color-background, align: center }
                layout: { widthMode: 75 }
                spacing: { marginBlock: md }
            - name: layout-row
              properties:
                layout: { horizontalAlign: space-evenly, align: center }
              components:
                - name: button
                  properties:
                    text: Browse Collection
                    appearance:
                      background:
                        type: gradient
                        gradient:
                          colorStart: *color-accent
                          colorEnd: *color-secondary
                          direction: to right
                      padding: { block: md, inline: lg }
                    typography: { color: *color-background, weight: semibold, size: md }
                - name: button
                  properties:
                    text: Visit Us
                    appearance: { background: { color: *color-background }, padding: { block: md, inline: lg } }
                    typography: { color: *color-secondary, weight: semibold, size: md }

