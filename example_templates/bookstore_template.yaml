    # Newsletter Section
    - name: layout-row
      properties:
        layout: { horizontalAlign: space-evenly, align: center }
        spacing: { paddingBlock: xl, paddingInline: xl }
        appearance:
          background:
            type: gradient
            gradient:
              colorStart: *color-accent
              colorEnd: *color-secondary
              direction: to bottom right
      components:
        - name: layout-column
          properties:
            layout: { align: start, horizontalAlign: space-evenly, widthMode: "50" }
          components:
            - name: heading
              properties:
                text: Join Our Book Club
                level: 3
                typography: { size: xl, weight: bold, color: *color-background }
            - name: paragraph
              properties:
                text: Get exclusive discounts, early access to sales, and book recommendations delivered to your inbox.
                typography: { size: md, color: *color-background }
        - name: form
          properties:
            layout: { direction: row, horizontalAlign: space-evenly, widthMode: "50" }
            submit: { show: false }
          components:
            - name: textbox
              properties:
                label: { show: false }
                field: { placeholder: 'Enter your email address' }
                appearance: { background: { color: *color-background }, border: { width: 0 } }
            - name: button
              properties:
                text: Subscribe
                appearance: { background: { color: *color-secondary }, padding: { block: md, inline: lg } }
