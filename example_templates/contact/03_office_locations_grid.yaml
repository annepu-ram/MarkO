# Office Locations Contact Grid Section
# A multi-location contact section using columnsgrid with office cards showing location name, address, phone, email, and office hours for each branch or office location
# Base components: layout-row, columnsgrid, layout-column, heading, paragraph, caption, icon, button, eyebrow
# Section type: contact
# Layout: grid, card_based
# Visual style: modern_minimalist
# Content volume: rich
# Tone: neutral
# Conversion intent: lead
# Image requirement: none
# Interactivity: static
# Industries: professional_services, portfolio, health, education, realestate
# Perfect for: consulting firm, law firm, dental clinic, real estate agency, digital agency, photography studio, architecture firm, accounting firm, tutoring center, wellness center


- name: site
  properties:
    theme:
      fonts:
        heading: &font-heading "'Inter', sans-serif"
        content: &font-content "'Inter', sans-serif"
      colors:
        primary: &color-primary '#0f172a'
        text: &color-text '#2B2F3B'
        secondary: &color-secondary '#475569'
        accent: &color-accent '#0ea5e9'
        background: &color-background '#f1f5f9'
  components:
    - name: page
      slug: home
      title: "03 Office Locations Grid"
      properties:
        appearance: { background: { color: *color-background } }
      components:

        # ============================================
        # HEADER
        # ============================================
        - name: layout-row
          properties:
            layout: { horizontalAlign: center, align: center }
            appearance: { background: { color: *color-background, opacity: 100 } }
            spacing: { paddingBlock: xl, paddingInline: xl }
          components:
            - name: layout-column
              properties:
                layout: { widthMode: "75", horizontalAlign: center }
              components:
                - name: eyebrow
                  properties:
                    text: OUR OFFICES
                    typography: { size: xs, weight: bold, color: *color-accent, transform: uppercase, letterSpacing: wider, align: center }
                    spacing: { marginBlock: xs }
                - name: heading
                  properties:
                    text: Find Us Near You
                    level: 2
                    typography: { size: xxl, weight: bold, color: *color-primary, align: center }
                    spacing: { marginBlock: sm }
                - name: paragraph
                  properties:
                    text: Visit one of our offices around the world. Our teams are ready to help you in person.
                    typography: { size: md, color: *color-secondary, align: center, lineHeight: '1.6' }
                    spacing: { marginBlock: sm }

        # ============================================
        # OFFICE CARDS GRID
        # ============================================
        - name: columnsgrid
          properties:
            layout: { columns: 3, gap: lg, verticalAlign: top }
            spacing: { paddingBlock: lg, paddingInline: xl }
            responsive: { breakpoints: { md: 2, sm: 1 } }
          columns:

            # ── San Francisco ──
            - components:
                - name: layout-column
                  properties:
                    layout: { horizontalAlign: start }
                    appearance: { background: { color: '#ffffff', opacity: 100 }, radius: lg, shadow: soft }
                    spacing: { paddingBlock: lg, paddingInline: lg }
                  components:
                    - name: heading
                      properties:
                        text: San Francisco
                        level: 3
                        typography: { size: lg, weight: bold, color: *color-primary }
                        spacing: { marginBlock: sm }

                    - name: layout-row
                      properties:
                        layout: { align: center, horizontalAlign: start, wrap: wrap, gap: xs }
                        spacing: { marginBlock: xs }
                      components:
                        - name: icon
                          properties: { name: map-pin, size: "20", color: *color-accent }
                        - name: paragraph
                          properties:
                            text: "123 Market Street, Suite 400\nSan Francisco, CA 94105"
                            typography: { size: sm, color: *color-secondary, lineHeight: '1.5' }

                    - name: layout-row
                      properties:
                        layout: { align: center, horizontalAlign: start, wrap: wrap, gap: xs }
                        spacing: { marginBlock: xs }
                      components:
                        - name: icon
                          properties: { name: phone, size: "20", color: *color-accent }
                        - name: caption
                          properties:
                            text: "+1 (415) 555-0100"
                            typography: { size: sm, color: *color-secondary }

                    - name: layout-row
                      properties:
                        layout: { align: center, horizontalAlign: start, wrap: wrap, gap: xs }
                        spacing: { marginBlock: xs }
                      components:
                        - name: icon
                          properties: { name: mail, size: "20", color: *color-accent }
                        - name: caption
                          properties:
                            text: "sf@company.com"
                            typography: { size: sm, color: *color-secondary }

                    - name: layout-row
                      properties:
                        layout: { align: center, horizontalAlign: start, wrap: wrap, gap: xs }
                        spacing: { marginBlock: xs }
                      components:
                        - name: icon
                          properties: { name: clock, size: "20", color: *color-accent }
                        - name: caption
                          properties:
                            text: "Mon-Fri, 8am-6pm PST"
                            typography: { size: sm, color: *color-secondary }

                    - name: button
                      properties:
                        text: Get Directions
                        appearance:
                          background: { color: *color-accent, opacity: 100 }
                          radius: md
                        typography: { color: '#ffffff', weight: semibold, size: sm }
                        spacing: { marginBlock: sm, paddingBlock: xs, paddingInline: md }

            # ── New York ──
            - components:
                - name: layout-column
                  properties:
                    layout: { horizontalAlign: start }
                    appearance: { background: { color: '#ffffff', opacity: 100 }, radius: lg, shadow: soft }
                    spacing: { paddingBlock: lg, paddingInline: lg }
                  components:
                    - name: heading
                      properties:
                        text: New York
                        level: 3
                        typography: { size: lg, weight: bold, color: *color-primary }
                        spacing: { marginBlock: sm }

                    - name: layout-row
                      properties:
                        layout: { align: center, horizontalAlign: start, wrap: wrap, gap: xs }
                        spacing: { marginBlock: xs }
                      components:
                        - name: icon
                          properties: { name: map-pin, size: "20", color: *color-accent }
                        - name: paragraph
                          properties:
                            text: "456 Park Avenue, 12th Floor\nNew York, NY 10022"
                            typography: { size: sm, color: *color-secondary, lineHeight: '1.5' }

                    - name: layout-row
                      properties:
                        layout: { align: center, horizontalAlign: start, wrap: wrap, gap: xs }
                        spacing: { marginBlock: xs }
                      components:
                        - name: icon
                          properties: { name: phone, size: "20", color: *color-accent }
                        - name: caption
                          properties:
                            text: "+1 (212) 555-0200"
                            typography: { size: sm, color: *color-secondary }

                    - name: layout-row
                      properties:
                        layout: { align: center, horizontalAlign: start, wrap: wrap, gap: xs }
                        spacing: { marginBlock: xs }
                      components:
                        - name: icon
                          properties: { name: mail, size: "20", color: *color-accent }
                        - name: caption
                          properties:
                            text: "nyc@company.com"
                            typography: { size: sm, color: *color-secondary }

                    - name: layout-row
                      properties:
                        layout: { align: center, horizontalAlign: start, wrap: wrap, gap: xs }
                        spacing: { marginBlock: xs }
                      components:
                        - name: icon
                          properties: { name: clock, size: "20", color: *color-accent }
                        - name: caption
                          properties:
                            text: "Mon-Fri, 9am-7pm EST"
                            typography: { size: sm, color: *color-secondary }

                    - name: button
                      properties:
                        text: Get Directions
                        appearance:
                          background: { color: *color-accent, opacity: 100 }
                          radius: md
                        typography: { color: '#ffffff', weight: semibold, size: sm }
                        spacing: { marginBlock: sm, paddingBlock: xs, paddingInline: md }

            # ── London ──
            - components:
                - name: layout-column
                  properties:
                    layout: { horizontalAlign: start }
                    appearance: { background: { color: '#ffffff', opacity: 100 }, radius: lg, shadow: soft }
                    spacing: { paddingBlock: lg, paddingInline: lg }
                  components:
                    - name: heading
                      properties:
                        text: London
                        level: 3
                        typography: { size: lg, weight: bold, color: *color-primary }
                        spacing: { marginBlock: sm }

                    - name: layout-row
                      properties:
                        layout: { align: center, horizontalAlign: start, wrap: wrap, gap: xs }
                        spacing: { marginBlock: xs }
                      components:
                        - name: icon
                          properties: { name: map-pin, size: "20", color: *color-accent }
                        - name: paragraph
                          properties:
                            text: "10 Finsbury Square, 3rd Floor\nLondon, EC2A 1AF, UK"
                            typography: { size: sm, color: *color-secondary, lineHeight: '1.5' }

                    - name: layout-row
                      properties:
                        layout: { align: center, horizontalAlign: start, wrap: wrap, gap: xs }
                        spacing: { marginBlock: xs }
                      components:
                        - name: icon
                          properties: { name: phone, size: "20", color: *color-accent }
                        - name: caption
                          properties:
                            text: "+44 20 7946 0300"
                            typography: { size: sm, color: *color-secondary }

                    - name: layout-row
                      properties:
                        layout: { align: center, horizontalAlign: start, wrap: wrap, gap: xs }
                        spacing: { marginBlock: xs }
                      components:
                        - name: icon
                          properties: { name: mail, size: "20", color: *color-accent }
                        - name: caption
                          properties:
                            text: "london@company.com"
                            typography: { size: sm, color: *color-secondary }

                    - name: layout-row
                      properties:
                        layout: { align: center, horizontalAlign: start, wrap: wrap, gap: xs }
                        spacing: { marginBlock: xs }
                      components:
                        - name: icon
                          properties: { name: clock, size: "20", color: *color-accent }
                        - name: caption
                          properties:
                            text: "Mon-Fri, 9am-6pm GMT"
                            typography: { size: sm, color: *color-secondary }

                    - name: button
                      properties:
                        text: Get Directions
                        appearance:
                          background: { color: *color-accent, opacity: 100 }
                          radius: md
                        typography: { color: '#ffffff', weight: semibold, size: sm }
                        spacing: { marginBlock: sm, paddingBlock: xs, paddingInline: md }
