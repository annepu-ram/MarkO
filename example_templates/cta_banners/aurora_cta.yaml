# Aurora Gradient CTA Banner
# Flowing gradient call-to-action with vibrant northern lights colors
# Base components: site, page, layout-column, layout-row, heading, paragraph, button
# Section type: cta
# Layout: centered
# Visual style: aurora_gradient
# Perfect for: SaaS platform, tech startup, creative portfolio, design studio, fintech

- name: site
  properties:
    theme:
      fonts:
        heading: "'Sora', sans-serif"
        content: "'Inter', sans-serif"
      colors:
        primary: &color-primary '#1A2035'
        text: &color-text '#313541'
        secondary: &color-secondary '#C8D8F0'
        accent: &color-accent '#EC4899'
        background: &color-background '#E6F0FA'
  components:
    - name: page
      slug: home
      title: "Aurora Gradient CTA Banner"
      properties:
        appearance:
          background:
            color: *color-background
            opacity: 100
      components:

        # Outer aurora gradient wrapper
        - name: layout-column
          properties:
            layout:
              horizontalAlign: center
            appearance:
              background:
                type: gradient
                gradient:
                  colorStart: '#EC4899'
                  colorEnd: '#8B5CF6'
                  direction: to bottom right
                opacity: 100
            spacing:
              paddingBlock: xxl
              paddingInline: lg
          components:

            # Inner CTA container with its own gradient
            - name: layout-column
              properties:
                layout:
                  widthMode: '75'
                  horizontalAlign: center
                  gap: md
                appearance:
                  background:
                    type: gradient
                    gradient:
                      colorStart: '#EC4899'
                      colorEnd: '#F97316'
                      direction: to bottom right
                    opacity: 100
                  radius: xl
                  shadow: none
                  border:
                    width: 0
                spacing:
                  paddingBlock: xxxl
                  paddingInline: xxl
              components:

                # Eyebrow label
                - name: eyebrow
                  properties:
                    text: The Future Is Now
                    typography:
                      size: xs
                      weight: semibold
                      color: rgba(255,255,255,0.9)
                      transform: uppercase
                      letterSpacing: wider
                      align: center

                # Main heading
                - name: heading
                  properties:
                    text: Ready to experience the future?
                    level: 2
                    typography:
                      size: xxxl
                      weight: bold
                      color: '#ffffff'
                      align: center
                      lineHeight: snug
                    spacing:
                      marginBlock: sm

                # Supporting paragraph
                - name: paragraph
                  properties:
                    text: |
                      Join over 50,000 forward-thinking teams already building with the
                      most powerful platform in their industry. Setup takes under 5 minutes.
                    typography:
                      size: lg
                      color: rgba(255,255,255,0.9)
                      align: center
                      lineHeight: "1.7"
                    layout:
                      widthMode: '75'
                    spacing:
                      marginBlock: lg

                # CTA buttons
                - name: layout-row
                  properties:
                    layout:
                      horizontalAlign: center
                      verticalAlign: center
                      wrap: wrap
                      gap: md
                  components:
                    - name: button
                      properties:
                        text: Start for Free
                        appearance:
                          background:
                            color: '#ffffff'
                            opacity: 100
                          border:
                            width: 0
                          radius: pill
                          shadow: none
                        typography:
                          color: *color-accent
                          weight: bold
                          size: md
                        spacing:
                          paddingBlock: md
                          paddingInline: xxl
                    - name: button
                      properties:
                        text: Watch Demo
                        appearance:
                          background:
                            color: transparent
                            opacity: 0
                          border:
                            width: 2
                            style: solid
                            color: '#ffffff'
                          radius: pill
                          shadow: none
                        typography:
                          color: '#ffffff'
                          weight: semibold
                          size: md
                        spacing:
                          paddingBlock: md
                          paddingInline: xxl
