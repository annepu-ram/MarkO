- name: page
  properties:
    theme:
      fonts:
        headingMain: &font-heading-main 'system-ui, sans-serif'
        headingLevel2: &font-heading-level2 'system-ui, sans-serif'
        content: &font-content 'system-ui, sans-serif'
      colors:
        # 60-30-10 Color System:
        # Primary (30%) = TEXT - all headings, paragraphs, body text
        # Secondary (10%) = UI elements, section highlights, regular buttons
        # Accent (CTAs only) = Call-to-action buttons like "Get Started", "Start Free Trial"
        # Background (60%) = Page base, content areas
        primary: &color-primary '#1e293b'
        secondary: &color-secondary '#64748b'
        accent: &color-accent '#2563eb'
        background: &color-background '#f5f5f5'
    appearance:
      background:
        color: *color-background
  components:
    - name: image
      properties:
        source:
          url: >-
            https://images.pexels.com/photos/3807517/pexels-photo-3807517.jpeg?auto=compress&cs=tinysrgb&w=1260&h=750&dpr=1
          altText: Modern workspace with laptop and coffee
        appearance:
          fit: cover
          cornerStyle: none
        spacing:
          marginBlock: none
          marginInline: none
        layout:
          widthMode: stretch
      components:
        - name: heading
          properties:
            text: Build Something Amazing
            typography:
              color: '#ffffff'
              weight: bold
              size: xl
              align: center
            level: 1
            layout:
              widthMode: stretch
            spacing:
              marginBlock: lg
        - name: paragraph
          properties:
            text: >-
              Launch your next big idea with cutting-edge tools and expert
              guidance. We're here to help you succeed.
            typography:
              color: '#ffffff'
              size: lg
              align: center
              weight: normal
            layout:
              widthMode: stretch
            spacing:
              marginBlock: md
        - name: button
          properties:
            text: Get Started Now
            appearance:
              background:
                color: *color-primary
              border:
                color: *color-secondary
              padding:
                block: md
                inline: lg
            typography:
              color: '#ffffff'
              weight: semibold
            layout:
            spacing:
              marginBlock: md
              marginInline: xs
    - name: heading
      properties:
        text: Why Our Platform Stands Out
        typography:
          color: *color-primary
          align: center
          weight: bold
          size: lg
        level: 2
        spacing:
          marginBlock: lg
    - name: paragraph
