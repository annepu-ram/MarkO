# Product Card Variant: Retail Classic
# layout-column with image, heading, caption (Price), and button
# Base components: page, layout-column, image, eyebrow, heading, caption, button
# Section type: product
# Layout: stacked
# Visual style: card_based
# Perfect for: ecommerce, retail, online store, marketplace, SaaS

- name: page
  properties:
    theme:
      colors:
        primary: &color-primary '#111827'
        text: &color-text '#2C3039'
        secondary: &color-secondary '#e5e7eb'
        accent: &color-accent '#059669'
        background: &color-background '#ffffff'
    appearance:
      background: {color: *color-background}
  components:
  - name: layout-column
    properties:
      layout: {horizontalAlign: center, gap: sm}
      appearance:
        background: {color: *color-background}
        radius: lg
        shadow: soft
        border: {width: 1, style: solid, color: *color-secondary}
      spacing: {marginBlock: lg, marginInline: lg, paddingBlock: none, paddingInline: none}
    components:
    - name: image
      properties:
        source: {url: 'https://images.unsplash.com/photo-1523275335684-37898b6baf30?w=600', altText: 'Premium Watch'}
        appearance: {minHeight: 18, fit: cover, cornerStyle: none}
        layout: {widthMode: stretch}
        spacing: {marginBlock: none}
    - name: layout-column
      properties:
        layout: {horizontalAlign: left, gap: xs}
        appearance: {background: {transparency: 0}}
        spacing:
          paddingBlock: md
          paddingInline: md
      components:
      - name: eyebrow
        properties:
          text: NEW ARRIVAL
          typography: {size: xxs, weight: semibold, color: *color-accent, transform: uppercase, letterSpacing: wider}
      - name: heading
        properties:
          text: Classic Timepiece
          level: 3
          typography: {size: lg, weight: bold, color: *color-primary, align: left}
          spacing: {marginBlock: xs}
      - name: caption
        properties:
          text: "$299.00"
          typography: {size: lg, weight: bold, color: *color-primary, align: left}
      - name: button
        properties:
          text: Add to Cart
          appearance: {background: {color: *color-primary}, radius: md}
          typography: {color: *color-background, weight: semibold}
          layout: {widthMode: stretch}
