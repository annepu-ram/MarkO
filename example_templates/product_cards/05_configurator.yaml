# Product Card Variant: The Configurator
# layout-column with image and a form containing a dropdown for size and radio for color
# Base components: page, layout-column, image, heading, caption, form, dropdown, paragraph, radio, button
# Section type: product
# Layout: stacked
# Visual style: modern_minimalist
# Perfect for: ecommerce, retail, online store, marketplace, SaaS

- name: page
  properties:
    theme:
      colors:
        primary: &color-primary '#111827'
        text: &color-text '#2C3039'
        secondary: &color-secondary '#374151'
        accent: &color-accent '#92400e'
        background: &color-background '#ffffff'
    appearance:
      background: {color: *color-background}
  components:
  - name: layout-column
    properties:
      layout: {horizontalAlign: center, gap: sm}
      appearance:
        background: {color: *color-background}
        radius: lg
        shadow: medium
      spacing: {marginBlock: lg, marginInline: lg, paddingBlock: none, paddingInline: none}
    components:
    - name: image
      properties:
        source: {url: 'https://images.unsplash.com/photo-1441986300917-64674bd600d8?w=600', altText: 'Premium leather bag'}
        appearance: {minHeight: 18, fit: cover, cornerStyle: none}
        layout: {widthMode: stretch}
        spacing: {marginBlock: none}
    - name: layout-column
      properties:
        layout: {horizontalAlign: left, gap: sm}
        appearance: {background: {opacity: 0}}
        spacing:
          paddingBlock: md
          paddingInline: md
      components:
      - name: heading
        properties:
          text: Heritage Leather Tote
          level: 3
          typography: {size: xl, weight: bold, color: *color-primary, align: left}
          spacing: {marginBlock: xs}
      - name: caption
        properties:
          text: "$425.00"
          typography: {size: lg, weight: bold, color: *color-primary, align: left}
      - name: form
        properties:
          layout: {direction: column}
          submit: {show: false}
        components:
        - name: dropdown
          properties:
            label: {text: Size, show: true}
            field:
              placeholder: Select Size
              options: "Small\nMedium\nLarge\nExtra Large"
              selected: Medium
            appearance: {border: {width: 1, color: *color-secondary}, radius: sm}
        - name: paragraph
          properties:
            text: Color
            typography: {size: sm, weight: medium, color: *color-secondary}
            spacing: {marginBlock: xs}
        - name: radio
          properties:
            label: {text: ''}
            field: {text: Cognac Brown, groupName: color, value: cognac, checked: true}
            appearance: {color: *color-accent}
        - name: radio
          properties:
            label: {text: ''}
            field: {text: Midnight Black, groupName: color, value: black, checked: false}
            appearance: {color: *color-primary}
        - name: radio
          properties:
            label: {text: ''}
            field: {text: Forest Green, groupName: color, value: green, checked: false}
            appearance: {color: *color-secondary}
      - name: button
        properties:
          text: Add to Bag
          appearance: {background: {color: *color-primary}, radius: md}
          typography: {color: *color-background, weight: semibold}
          layout: {widthMode: stretch}
          spacing:
            paddingBlock: md
