# Product Card Variant: Comparison Card
# layout-column with a checkbox at the top for "Compare," followed by image and paragraph

- name: page
  properties:
    theme:
      colors:
        primary: &color-primary '#111827'
        secondary: &color-secondary '#6b7280'
        accent: &color-accent '#2563eb'
        background: &color-background '#ffffff'
    appearance:
      background: { color: *color-background }
  components:
    - name: layout-column
      properties:
        layout: { horizontalAlign: center, gap: xs }
        appearance:
          background: { color: *color-background }
          radius: lg
          shadow: soft
          padding: { block: none, inline: none }
          border: { width: 1, style: solid, color: *color-secondary }
        spacing: { marginBlock: lg, marginInline: lg }
      components:
        - name: layout-row
          properties:
            layout: { horizontalAlign: space-between, verticalAlign: center, wrap: nowrap }
            appearance: { background: { transparency: 0 }, padding: { block: sm, inline: md } }
          components:
            - name: checkbox
              properties:
                label: { text: '' }
                field: { text: Compare, checked: false }
                appearance: { color: *color-accent }
            - name: eyebrow
              properties:
                text: BEST SELLER
                typography: { size: xxs, weight: bold, color: *color-accent, transform: uppercase, letterSpacing: wider }
                spacing: { marginBlock: none }
        - name: image
          properties:
            source: { url: 'https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=600', altText: 'Premium Headphones' }
            appearance: { minHeight: 15, fit: cover }
            layout: { widthMode: stretch }
            spacing: { marginBlock: none }
        - name: layout-column
          properties:
            layout: { horizontalAlign: left, gap: xs }
            appearance: { background: { transparency: 0 }, padding: { block: md, inline: md } }
          components:
            - name: heading
              properties:
                text: SoundMax Pro 7
                level: 3
                typography: { size: lg, weight: bold, color: *color-primary, align: left }
                spacing: { marginBlock: none }
            - name: paragraph
              properties:
                text: |
                  Active noise cancellation with transparency mode.
                  40-hour battery life. Premium build quality.
                typography: { size: sm, color: *color-secondary, align: left, lineHeight: "1.6" }
            - name: layout-row
              properties:
                layout: { horizontalAlign: space-between, verticalAlign: center, wrap: nowrap }
                appearance: { background: { transparency: 0 } }
              components:
                - name: heading
                  properties:
                    text: "$329.00"
                    level: 4
                    typography: { size: lg, weight: extrabold, color: *color-primary, align: left }
                    spacing: { marginBlock: none }
                - name: link
                  properties:
                    text: View Details
                    href: '#'
                    typography: { size: sm, weight: semibold, color: *color-accent }
                    appearance: { underline: false, showArrow: true }
