# Product Card Variant: Subscription Card
# layout-column with tabs to toggle between Monthly/Yearly pricing before the button
# Base components: page, layout-column, image, heading, paragraph, tabs, eyebrow, button
# Section type: product
# Layout: stacked
# Visual style: card_based
# Perfect for: ecommerce, retail, online store, marketplace, SaaS

- name: page
  properties:
    theme:
      colors:
        primary: &color-primary '#111827'
        text: &color-text '#2C3039'
        secondary: &color-secondary '#6b7280'
        accent: &color-accent '#166534'
        background: &color-background '#ffffff'
    appearance:
      background: {color: *color-background}
  components:
  - name: layout-column
    properties:
      layout: {horizontalAlign: center, gap: sm}
      appearance:
        background: {color: *color-background}
        radius: lg
        shadow: medium
        border: {width: 1, style: solid, color: *color-accent}
      spacing: {marginBlock: lg, marginInline: lg, paddingBlock: lg, paddingInline: lg}
    components:
    - name: image
      properties:
        source: {url: 'https://images.unsplash.com/photo-1611162617474-5b21e879e113?w=600', altText: 'Premium coffee subscription'}
        appearance: {minHeight: 12, fit: cover, cornerStyle: md}
        layout: {widthMode: stretch}
    - name: heading
      properties:
        text: Artisan Coffee Box
        level: 3
        typography: {size: xl, weight: bold, color: *color-primary, align: center}
        spacing: {marginBlock: sm}
    - name: paragraph
      properties:
        text: |
          Hand-picked single-origin beans delivered fresh to your door.
          Choose your frequency below.
        typography: {size: sm, color: *color-secondary, align: center}
    - name: tabs
      properties:
        layout: {orientation: horizontal, widthMode: stretch}
        typography:
          label:
            size: sm
            weight: semibold
            active: {color: *color-accent}
            inactive: {color: *color-secondary}
        appearance:
          tab:
            background: {active: *color-background, inactive: *color-background}
            border: {width: 2, style: solid, position: lower}
          content:
            background: {color: *color-background}
            border: {color: *color-secondary, width: 1, style: solid}
            padding: {block: md, inline: md}
      tabs:
      - title: Monthly
        components:
        - name: layout-column
          properties:
            layout: {horizontalAlign: center, gap: xs}
            appearance: {background: {transparency: 0}}
          components:
          - name: heading
            properties:
              text: "$34.99/mo"
              level: 4
              typography: {size: xxl, weight: extrabold, color: *color-accent, align: center}
              spacing: {marginBlock: xs}
          - name: paragraph
            properties:
              text: |
                12oz bag of premium beans
                Free shipping every month
                Cancel anytime
              typography: {size: sm, color: *color-secondary, align: center}
          - name: button
            properties:
              text: Subscribe Monthly
              appearance: {background: {color: *color-accent}, radius: md}
              typography: {color: *color-background, weight: bold}
              layout: {widthMode: stretch}
      - title: Yearly
        components:
        - name: layout-column
          properties:
            layout: {horizontalAlign: center, gap: xs}
            appearance: {background: {transparency: 0}}
          components:
          - name: eyebrow
            properties:
              text: SAVE 20%
              typography: {size: xxs, weight: bold, color: *color-accent, transform: uppercase, letterSpacing: wider, align: center}
          - name: heading
            properties:
              text: "$27.99/mo"
              level: 4
              typography: {size: xxl, weight: extrabold, color: *color-accent, align: center}
              spacing: {marginBlock: xs}
          - name: paragraph
            properties:
              text: |
                12oz bag of premium beans
                Free shipping + bonus bag quarterly
                Billed annually at $335.88
              typography: {size: sm, color: *color-secondary, align: center}
          - name: button
            properties:
              text: Subscribe Yearly
              appearance: {background: {color: *color-accent}, radius: md}
              typography: {color: *color-background, weight: bold}
              layout: {widthMode: stretch}
