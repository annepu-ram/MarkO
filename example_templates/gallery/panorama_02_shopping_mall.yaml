# Shopping Mall Virtual Tour Panorama with Auto-Scroll
# Light warm-themed panoramic mall interior tour with auto-scrolling behavior, a Virtual Tour badge header, four animated counter-up stat cards for stores/levels/dining/parking, and a Plan Your Visit CTA button
# Base components: layout-row, layout-column, badge, heading, paragraph, panorama-display, columnsgrid, counter-up, button
# Section type: gallery
# Layout: stacked
# Visual style: modern_minimalist
# Content volume: rich
# Tone: neutral
# Conversion intent: engagement
# Image requirement: none
# Interactivity: static
# Industries: professional_services, restaurant, portfolio, realestate, hospitality
# Perfect for: real estate agency, hotel, travel agency, architecture firm, event venue, restaurant, resort, museum, shopping mall

- name: site
  properties:
    theme:
      fonts:
        heading: &font-heading "'Inter', sans-serif"
        content: &font-content "'Inter', sans-serif"
      colors:
        primary: &color-primary '#1c1917'
        text: &color-text '#32312F'
        secondary: &color-secondary '#57534e'
        accent: &color-accent '#059669'
        background: &color-background '#fafaf9'
  components:
    - name: page
      properties:
        appearance:
          background:
            color: *color-background
      components:
      # Header
      - name: layout-row
        properties:
          layout:
            horizontalAlign: center
            verticalAlign: center
          appearance:
            background:
              color: *color-background
              opacity: 0
          spacing:
            paddingBlock: lg
            paddingInline: md
        components:
        - name: layout-column
          properties:
            layout:
              horizontalAlign: center
              verticalAlign: center
              widthMode: "66"
              gap: sm
            appearance:
              background:
                opacity: 0
          components:
          - name: badge
            properties:
              text: Virtual Tour
              variant: success
              pill: true
          - name: heading
            properties:
              text: Grand Mall Panorama
              level: 1
              typography:
                size: xxl
                weight: bold
                align: center
                color: *color-primary
          - name: paragraph
            properties:
              text: Take a virtual stroll through our stunning multi-level shopping destination. Scroll to explore the architectural marvel and luxury retail spaces.
              typography:
                size: md
                align: center
                color: *color-secondary

      # Panorama - Mall Interior
      - name: panorama-display
        properties:
          source:
            url: https://images.pexels.com/photos/15485843/pexels-photo-15485843.jpeg?auto=compress&cs=tinysrgb&w=3000&h=600&fit=crop
            altText: Panoramic interior view of a modern multi-level shopping mall
          behavior:
            initialPosition: left
            autoScroll: true
            autoScrollSpeed: 15
            stepDistance: 300
            pauseOnHover: true
          spacing:
            marginBlock: lg
          appearance:
            radius: lg
            shadow: soft
            shadowColor: '#78716c'
            border:
              width: 1
              style: solid
              color: '#e7e5e4'

      # Mall Stats
      - name: columnsgrid
        properties:
          layout:
            columns: 4
            gap: md
            verticalAlign: center
          responsive:
            breakpoints:
              md: 2
              sm: 1
          appearance:
            columnBackground: '#ffffff'
            columnRadius: md
          spacing:
            marginBlock: lg
            paddingBlock: md
            paddingInline: lg
        columns:
        - components:
          - name: counter-up
            properties:
              endValue: 350
              suffix: '+'
              duration: 2000
              typography:
                size: xxl
                weight: bold
                color: *color-accent
                align: center
          - name: paragraph
            properties:
              text: Premium Stores
              typography:
                size: sm
                weight: medium
                align: center
                color: *color-secondary
        - components:
          - name: counter-up
            properties:
              endValue: 5
              duration: 1500
              typography:
                size: xxl
                weight: bold
                color: *color-accent
                align: center
          - name: paragraph
            properties:
              text: Shopping Levels
              typography:
                size: sm
                weight: medium
                align: center
                color: *color-secondary
        - components:
          - name: counter-up
            properties:
              endValue: 50
              suffix: '+'
              duration: 1800
              typography:
                size: xxl
                weight: bold
                color: *color-accent
                align: center
          - name: paragraph
            properties:
              text: Dining Options
              typography:
                size: sm
                weight: medium
                align: center
                color: *color-secondary
        - components:
          - name: counter-up
            properties:
              endValue: 12
              prefix: ''
              suffix: K
              duration: 2200
              typography:
                size: xxl
                weight: bold
                color: *color-accent
                align: center
          - name: paragraph
            properties:
              text: Parking Spaces
              typography:
                size: sm
                weight: medium
                align: center
                color: *color-secondary

      # Call to Action
      - name: layout-row
        properties:
          layout:
            horizontalAlign: center
            verticalAlign: center
          appearance:
            background:
              color: *color-background
              opacity: 0
          spacing:
            paddingBlock: lg
            paddingInline: md
        components:
        - name: layout-column
          properties:
            layout:
              horizontalAlign: center
              widthMode: "50"
              gap: sm
            appearance:
              background:
                opacity: 0
          components:
          - name: paragraph
            properties:
              text: Hover over the panorama to pause auto-scroll. Drag or use arrows to explore at your own pace.
              typography:
                size: sm
                align: center
                color: '#78716c'
          - name: button
            properties:
              text: Plan Your Visit
              appearance:
                background:
                  color: *color-accent
                  opacity: 100
                border:
                  width: 0
                  style: none
                  color: *color-accent
                radius: md
              typography:
                size: md
                weight: semibold
                color: '#ffffff'
