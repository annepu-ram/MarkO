              horizontalAlign: space-evenly
              widthMode: "60"
            spacing:
              paddingBlock: none
              paddingInline: none
          components:
            - name: eyebrow
              properties:
                text: Our Story
                typography:
                  size: xs
                  weight: bold
                  transform: uppercase
                  letterSpacing: wider
                  color: *color-primary
                spacing:
                  marginBlock: none
            - name: heading
              properties:
                text: Baked with Passion Since 2003
                level: "3"
                typography:
                  color: "#1A3A3A"
                  size: xxxl
                  weight: bold
                  align: center
                  lineHeight: "1.2"
                  transform: none
                  letterSpacing: normal
                spacing:
                  marginBlock: sm
                  marginInline: none
