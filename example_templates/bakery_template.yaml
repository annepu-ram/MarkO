- name: page
  properties:
    theme:
      fonts:
        headingMain: &font-heading-main Georgia, serif
        headingLevel2: &font-heading-level2 Georgia, serif
        content: &font-content Georgia, serif
      colors:
        primary: &color-primary "#1A3A3A"
        secondary: &color-secondary "#E8DEB0"
        accent: &color-accent "#008B8B"
        background: &color-background "#FFF5D6"
    appearance:
      background:
        color: *color-background
        transparency: 100
  components:
    # Titlebar with latest schema
    - name: titlebar
      properties:
        branding:
          showLogo: true
          logoUrl: https://images.pexels.com/photos/205961/pexels-photo-205961.jpeg?auto=compress&cs=tinysrgb&w=100
          title: The Golden Loaf Bakery
        navigation:
          links:
            - label: Home
              href: "#home"
            - label: Menu
              href: "#menu"
            - label: About
              href: "#about"
            - label: Gallery
              href: "#gallery"
            - label: Contact
              href: "#contact"
        layout:
          alignment: center
          height: 70
        scroll:
          shrinkPercentage: 70
        appearance:
          background:
            color: "#FFF5D6"
            transparency: 100
            type: ""
          border:
            width: 0
            style: solid
            color: "#E8DEB0"
          focus:
            background: "#E8DEB0"
            color: "#111827"
        typography:
          title:
            size: 20
            weight: bold
            color: "#1A3A3A"
          menu:
            size: 16
            weight: medium
            color: "#1A3A3A"

    # Hero Section
    - name: image
      properties:
        source:
          url: https://images.pexels.com/photos/1721934/pexels-photo-1721934.jpeg?auto=compress&cs=tinysrgb&w=1260&h=750&dpr=1
          altText: Freshly baked artisanal bread spread
        appearance:
          minHeight: 25
          fit: cover
          cornerStyle: none
        spacing:
          marginBlock: none
          marginInline: none
        layout:
          widthMode: stretch
      components:
        - name: layout-column
          properties:
            layout:
              align: center
              horizontalAlign: space-evenly
            spacing:
              paddingBlock: xl
              paddingInline: md
            appearance:
              background:
                color: rgba(0,0,0,0.4)
                transparency: 100
              radius: lg
              padding:
                block: xl
                inline: xl
          components:
            - name: heading
              properties:
                text: Artisanal Breads & Pastries
                level: 2
                typography:
                  color: *color-accent
                  size: xxxl
                  weight: bold
                  align: center
                  lineHeight: "1.2"
                  transform: none
                  letterSpacing: normal
                spacing:
                  marginBlock: none
                  marginInline: none
                layout:
                  widthMode: stretch
                appearance:
                  background:
                    type: solid
                    color: "#ffffff"
                    transparency: 0
                  radius: none
                  padding:
                    block: none
                    inline: none
            - name: paragraph
              properties:
                text: |
                  Baked fresh daily with love and the finest local ingredients.
                  Experience the warmth and comfort of traditional baking.
                typography:
                  color: '#ffffff'
                  size: lg
                  align: center
                  weight: regular
                spacing:
                  marginBlock: md
                layout:
                  widthMode: 75
            - name: layout-row
              properties:
                layout:
                  align: center
                  horizontalAlign: space-evenly
                  wrap: wrap
              components:
                - name: button
                  properties:
                    text: View Our Menu
                    appearance:
                      background:
                        color: *color-accent
                        transparency: 100
                      border:
                        width: 0
                        style: solid
                        color: *color-accent
                      padding:
                        block: md
                        inline: lg
                    typography:
                      color: '#ffffff'
                      weight: semibold
                      size: md
                    spacing:
                      marginBlock: none
                      marginInline: xs
                - name: button
                  properties:
                    text: Order Online
                    appearance:
                      background:
                        color: '#ffffff'
                        transparency: 100
                      border:
                        width: 2
                        style: solid
                        color: *color-secondary
                      padding:
                        block: md
                        inline: lg
                    typography:
                      color: *color-secondary
                      weight: semibold
                      size: md
                    spacing:
                      marginBlock: none
                      marginInline: xs

    # Introduction Section
    - name: layout-column
      properties:
        layout:
          align: center
          horizontalAlign: space-evenly
        spacing:
          paddingBlock: lg
          paddingInline: md
        background:
          color: '#ffffff'
          transparency: 100
      components:
        - name: eyebrow
          properties:
            text: Welcome to The Golden Loaf
            typography:
              size: xs
              weight: bold
              transform: uppercase
              letterSpacing: wider
              color: *color-primary
              align: center
            spacing:
              marginBlock: none
        - name: heading
          properties:
            text: Handcrafted with Passion
            level: 2
            typography:
              color: *color-primary
              size: xxl
              weight: bold
              align: center
            spacing:
              marginBlock: sm
        - name: paragraph
