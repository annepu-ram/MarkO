                  widthMode: fit
                appearance:
                  background:
                    type: ""
                    color: "#ffffff"
                    transparency: 0
                  radius: none
                  padding:
                    block: none
                    inline: none
            - name: paragraph
              properties:
                text: |
                  Founded in 2003, The Golden Loaf Bakery began with a simple mission:
                  to bring the joy of traditional, artisanal baking to our community.
                  We believe in using only the finest locally-sourced ingredients,
                  time-honored techniques, and a whole lot of love.

                  Every loaf, pastry, and cake that leaves our ovens is a piece of our heart.
                  Our master bakers wake before dawn to ensure you get the freshest products
                  possible, made with care and attention to detail.
                typography:
                  color: *color-primary
                  size: md
                  lineHeight: '1.6'
                spacing:
                  marginBlock: sm

    # FAQ Accordion Section
    - name: layout-column
      properties:
        layout:
          align: center
          horizontalAlign: space-evenly
        spacing:
          paddingBlock: lg
          paddingInline: md
      components:
        - name: heading
          properties:
            text: Frequently Asked Questions
            level: 2
            typography:
              align: center
              color: *color-primary
              size: xxl
              weight: bold
            spacing:
              marginBlock: sm
        - name: accordion
          properties:
            behavior:
              allowMultipleOpen: false
            typography:
              title:
                size: lg
                weight: semibold
                color: "#1A3A3A"
              content:
                size: md
                weight: regular
                color: "#1A3A3A"
            appearance:
              titleBackground:
                color: "#FFF5D6"
              border:
                width: 1
                style: solid
                color: "#E8DEB0"
                position: bottom
              contentBackground:
                color: "#FFF5D6"
                transparency: 100
              radius: sm
              padding:
                block: md
                inline: md
              shadow: soft
              shadowColor: "#000000"
            spacing:
              marginBlock: lg
              marginInline: auto
            layout:
              widthMode: "83"
          items:
            - title: What makes your bread different?
              components:
                - name: paragraph
                  properties:
                    text: >
                      We use traditional fermentation methods, locally-sourced
                      organic flour,

                      and bake everything fresh daily. Our sourdough is
                      fermented for 48 hours,

                      giving it that distinctive tangy flavor and perfect
                      texture.
            - title: Do you offer gluten-free options?
              components:
                - name: paragraph
                  properties:
                    text: >
                      Yes! We have a selection of gluten-free breads and
                      pastries made with

                      certified gluten-free ingredients. Please ask our staff
                      about our daily

                      gluten-free offerings.
            - title: Can I place custom orders?
              components:
                - name: paragraph
                  properties:
                    text: >
                      Absolutely! We love creating custom cakes and pastries for
                      weddings,

                      birthdays, anniversaries, and special events. Please
                      contact us at least

                      48 hours in advance for custom orders.
            - title: Where do you source your ingredients?
              components:
                - name: paragraph
                  properties:
                    text: >
                      All our flour comes from organic farms within 50 miles of
                      our bakery.

                      We use only free-range eggs from local farms and European
                      butter for

                      our pastries. We're committed to supporting local
                      agriculture.
            - title: Do you offer baking classes?
              components:
                - name: paragraph
                  properties:
                    text: >
                      Yes! We offer monthly baking classes where you can learn
                      traditional

                      techniques from our master bakers. Check our website or
                      call us for

                      the current schedule and to reserve your spot.
            - title: What are your hours?
              components:
                - name: paragraph
                  properties:
                    text: >
                      We're open Monday through Saturday from 6 AM to 7 PM, and
                      Sundays

                      from 7 AM to 5 PM. We're closed on major holidays. Follow
                      us on social

                      media for holiday hours and special announcements.

