# 08 - Search Bar Header
# Titlebar followed by a layout-row with a textbox in the center
# for quick navigation/search. Two-tier header pattern.

- name: page
  properties:
    theme:
      fonts:
        headingMain: &font-heading-main "'Nunito Sans', sans-serif"
        headingLevel2: &font-heading-level2 "'Nunito Sans', sans-serif"
        content: &font-content "'Nunito Sans', sans-serif"
      colors:
        primary: &color-primary '#1a1a2e'
        secondary: &color-secondary '#6b7280'
        accent: &color-accent '#e63946'
        background: &color-background '#ffffff'
    spacing: { paddingBlock: none, paddingInline: none }
    appearance: { background: { color: '#f9fafb' } }
  components:

    # ============================================
    # TIER 1 - TITLEBAR
    # ============================================
    - name: titlebar
      properties:
        branding:
          showLogo: true
          logoUrl: 'https://images.unsplash.com/photo-1472851294608-062f824d29cc?w=60&h=60&fit=crop'
          title: 'Marketplace'
        navigation:
          links:
            - label: Categories
              href: '#categories'
            - label: Deals
              href: '#deals'
            - label: Sell
              href: '#sell'
            - label: Help
              href: '#help'
        layout: { alignment: left, height: 60 }
        scroll:
          shrinkPercentage: 70
        appearance:
          background: { color: *color-primary, transparency: 100 }
          border: { width: 0, style: solid, color: *color-primary }
        typography:
          title: { size: 22, weight: bold, color: *color-background }
          menu: { size: 14, weight: medium, color: '#d1d5db' }

    # ============================================
    # TIER 2 - SEARCH BAR
    # ============================================
    - name: layout-row
      properties:
        layout: { horizontalAlign: space-evenly, align: center, wrap: nowrap }
        spacing: { paddingBlock: sm, paddingInline: xl }
        appearance:
          background: { color: *color-background, transparency: 100 }
          border: { width: 1, style: solid, color: '#e5e7eb' }
      components:
        - name: form
          properties:
            layout: { direction: row, horizontalAlign: space-evenly, widthMode: "75" }
            submit: { show: false }
          components:
            - name: textbox
              properties:
                label: { show: false }
                field: { placeholder: 'Search for products, brands, or categories...' }
                appearance:
                  background: { color: '#f3f4f6', transparency: 100 }
                  border: { width: 1, style: solid, color: '#d1d5db' }
                  radius: md
                  padding: { block: sm, inline: md }
                typography: { size: md, color: *color-primary }
                layout: { widthMode: stretch }
            - name: button
              properties:
                text: Search
                appearance:
                  background: { color: *color-accent }
                  padding: { block: sm, inline: lg }
                  radius: md
                typography: { color: *color-background, weight: semibold, size: md }

    # ============================================
    # CATEGORY QUICK LINKS
    # ============================================
    - name: layout-row
      properties:
        layout: { horizontalAlign: space-evenly, align: center, wrap: wrap }
        spacing: { paddingBlock: sm, paddingInline: lg }
        appearance: { background: { color: '#fef2f2', transparency: 100 } }
      components:
        - name: link
          properties:
            text: Electronics
            href: '#electronics'
            typography: { size: sm, weight: medium, color: *color-primary }
            appearance: { underline: false }
            spacing: { marginInline: sm }
        - name: link
          properties:
            text: Clothing
            href: '#clothing'
            typography: { size: sm, weight: medium, color: *color-primary }
            appearance: { underline: false }
            spacing: { marginInline: sm }
        - name: link
          properties:
            text: Home & Garden
            href: '#home-garden'
            typography: { size: sm, weight: medium, color: *color-primary }
            appearance: { underline: false }
            spacing: { marginInline: sm }
        - name: link
          properties:
            text: Sports
            href: '#sports'
            typography: { size: sm, weight: medium, color: *color-primary }
            appearance: { underline: false }
            spacing: { marginInline: sm }
        - name: link
          properties:
            text: Books
            href: '#books'
            typography: { size: sm, weight: medium, color: *color-primary }
            appearance: { underline: false }
            spacing: { marginInline: sm }
        - name: link
          properties:
            text: Toys
            href: '#toys'
            typography: { size: sm, weight: medium, color: *color-primary }
            appearance: { underline: false }
            spacing: { marginInline: sm }
        - name: link
          properties:
            text: Automotive
            href: '#auto'
            typography: { size: sm, weight: medium, color: *color-primary }
            appearance: { underline: false }
            spacing: { marginInline: sm }

    # ============================================
    # HERO BANNER
    # ============================================
    - name: image
      properties:
        source:
          url: 'https://images.unsplash.com/photo-1607082348824-0a96f2a4b9da?w=1600&q=80'
          altText: 'Shopping sale banner with colorful bags'
        appearance: { minHeight: 25, fit: cover }
        layout: { widthMode: stretch }
      components:
        - name: layout-column
          properties:
            layout: { align: center, horizontalAlign: space-evenly }
            spacing: { paddingBlock: xxxl, paddingInline: xl }
          components:
            - name: eyebrow
              properties:
                text: LIMITED TIME OFFER
                typography: { size: sm, weight: bold, color: *color-background, transform: uppercase, letterSpacing: wider }
            - name: heading
              properties:
                text: Spring Sale - Up to 70% Off
                level: 1
                typography: { size: xxxl, weight: extrabold, color: *color-background, align: center }
                spacing: { marginBlock: sm }
            - name: paragraph
              properties:
                text: Shop thousands of deals across all categories. Free shipping on orders over $50.
                typography: { size: lg, color: *color-background, align: center }
                spacing: { marginBlock: sm }
            - name: button
              properties:
                text: Shop Now
                appearance:
                  background: { color: *color-accent }
                  padding: { block: md, inline: xxl }
                  radius: md
                typography: { color: *color-background, weight: bold, size: lg }

    # ============================================
    # FEATURED CATEGORIES
    # ============================================
    - name: layout-column
      properties:
        layout: { align: center, horizontalAlign: space-evenly }
        spacing: { paddingBlock: xxl, paddingInline: lg }
      components:
        - name: heading
          properties:
            text: Popular Categories
            level: 2
            typography: { size: xxl, weight: bold, color: *color-primary, align: center }
            spacing: { marginBlock: md }
        - name: columnsgrid
          properties:
            layout: { columns: 4, gap: md, verticalAlign: top }
            responsive: { breakpoints: { md: 2, sm: 1 } }
          columns:
            - components:
                - name: image
                  properties:
                    source:
                      url: 'https://images.unsplash.com/photo-1498049794561-7780e7231661?w=400&q=80'
                      altText: 'Electronics category'
                    appearance: { minHeight: 12.5, fit: cover, cornerStyle: md, hoverEffect: zoom }
                    layout: { widthMode: stretch }
                - name: heading
                  properties:
                    text: Electronics
                    level: 3
                    typography: { size: md, weight: semibold, color: *color-primary, align: center }
                    spacing: { marginBlock: sm }
            - components:
                - name: image
                  properties:
                    source:
                      url: 'https://images.unsplash.com/photo-1445205170230-053b83016050?w=400&q=80'
                      altText: 'Fashion category'
                    appearance: { minHeight: 12.5, fit: cover, cornerStyle: md, hoverEffect: zoom }
                    layout: { widthMode: stretch }
                - name: heading
                  properties:
                    text: Fashion
                    level: 3
                    typography: { size: md, weight: semibold, color: *color-primary, align: center }
                    spacing: { marginBlock: sm }
            - components:
                - name: image
                  properties:
                    source:
                      url: 'https://images.unsplash.com/photo-1556909114-f6e7ad7d3136?w=400&q=80'
                      altText: 'Home & Living category'
                    appearance: { minHeight: 12.5, fit: cover, cornerStyle: md, hoverEffect: zoom }
                    layout: { widthMode: stretch }
                - name: heading
                  properties:
                    text: Home & Living
                    level: 3
                    typography: { size: md, weight: semibold, color: *color-primary, align: center }
                    spacing: { marginBlock: sm }
            - components:
                - name: image
                  properties:
                    source:
                      url: 'https://images.unsplash.com/photo-1461896836934-bd45ba8fcf9b?w=400&q=80'
                      altText: 'Sports & Outdoors category'
                    appearance: { minHeight: 12.5, fit: cover, cornerStyle: md, hoverEffect: zoom }
                    layout: { widthMode: stretch }
                - name: heading
                  properties:
                    text: Sports & Outdoors
                    level: 3
                    typography: { size: md, weight: semibold, color: *color-primary, align: center }
                    spacing: { marginBlock: sm }
