# 09 - The Tabbed Nav
# Tabs component used as the primary site navigation across the top of the page.
# Each tab shows different section content, acting as a single-page site.

- name: page
  properties:
    theme:
      fonts:
        headingMain: &font-heading-main "'Sora', sans-serif"
        headingLevel2: &font-heading-level2 "'Sora', sans-serif"
        content: &font-content "'Inter', sans-serif"
      colors:
        primary: &color-primary '#0f172a'
        secondary: &color-secondary '#475569'
        accent: &color-accent '#8b5cf6'
        background: &color-background '#fafafa'
    spacing: { paddingBlock: none, paddingInline: none }
    appearance: { background: { color: *color-background } }
  components:

    # ============================================
    # BRAND HEADER
    # ============================================
    - name: layout-row
      properties:
        layout: { horizontalAlign: space-between, align: center, wrap: nowrap }
        spacing: { paddingBlock: md, paddingInline: xl }
        appearance:
          background: { color: '#ffffff', transparency: 100 }
          border: { width: 1, style: solid, color: '#e2e8f0' }
      components:
        - name: heading
          properties:
            text: Prism Design
            level: 1
            typography: { size: xl, weight: extrabold, color: *color-accent }
        - name: layout-row
          properties:
            layout: { horizontalAlign: space-evenly, align: center }
          components:
            - name: button
              properties:
                text: Get in Touch
                appearance:
                  background: { color: *color-accent }
                  padding: { block: sm, inline: lg }
                  radius: md
                typography: { color: '#ffffff', weight: semibold, size: sm }

    # ============================================
    # TABBED NAVIGATION
    # ============================================
    - name: tabs
      properties:
        layout:
          orientation: horizontal
          widthMode: stretch
        typography:
          label:
            size: md
            weight: semibold
            active:
              color: *color-accent
            inactive:
              color: *color-secondary
        appearance:
          tab:
            background:
              active: '#ffffff'
              inactive: '#f8fafc'
            border:
              width: 3
              style: solid
              position: lower
          content:
            background:
              color: '#ffffff'
              transparency: 100
            border:
              color: '#e2e8f0'
              width: 1
              style: solid
            padding:
              block: none
              inline: none
        spacing: { marginBlock: none, marginInline: none }
      tabs:

        # Tab 1 - Home
        - title: Home
          components:
            - name: image
              properties:
                source:
                  url: 'https://images.unsplash.com/photo-1542744173-8e7e53415bb0?w=1600&q=80'
                  altText: 'Creative team collaborating in modern office'
                appearance: { minHeight: 30, fit: cover }
                layout: { widthMode: stretch }
              components:
                - name: layout-column
                  properties:
                    layout: { align: center, horizontalAlign: space-evenly }
                    spacing: { paddingBlock: xxxl, paddingInline: xl }
                  components:
                    - name: eyebrow
                      properties:
                        text: AWARD-WINNING DESIGN STUDIO
                        typography: { size: xs, weight: bold, color: '#e2e8f0', transform: uppercase, letterSpacing: wider }
                    - name: heading
                      properties:
                        text: We Create Digital Experiences That Matter
                        level: 2
                        typography: { size: xxxl, weight: extrabold, color: '#ffffff', align: center, letterSpacing: tight }
                        spacing: { marginBlock: md }
                        layout: { widthMode: 75 }
                    - name: paragraph
                      properties:
                        text: From brand identity to full-scale digital products, we help companies stand out in a crowded market.
                        typography: { size: lg, color: '#e2e8f0', align: center }
                        layout: { widthMode: 75 }

        # Tab 2 - Services
        - title: Services
          components:
            - name: layout-column
              properties:
                layout: { align: center, horizontalAlign: space-evenly }
                spacing: { paddingBlock: xxl, paddingInline: lg }
              components:
                - name: heading
                  properties:
                    text: Our Services
                    level: 2
                    typography: { size: xxl, weight: bold, color: *color-primary, align: center }
                    spacing: { marginBlock: md }
                - name: columnsgrid
                  properties:
                    layout: { columns: 3, gap: lg, verticalAlign: top }
                    responsive: { breakpoints: { md: 2, sm: 1 } }
                  columns:
                    - components:
                        - name: layout-column
                          properties:
                            layout: { align: start, horizontalAlign: space-evenly }
                            spacing: { paddingBlock: lg, paddingInline: lg }
                            appearance:
                              background: { color: '#faf5ff', transparency: 100 }
                              radius: lg
                              border: { width: 1, style: solid, color: '#e9d5ff' }
                          components:
                            - name: heading
                              properties:
                                text: Brand Identity
                                level: 3
                                typography: { size: lg, weight: bold, color: *color-primary }
                            - name: paragraph
                              properties:
                                text: Logo design, visual identity systems, brand guidelines, and messaging frameworks that define your unique presence.
                                typography: { size: sm, color: *color-secondary, lineHeight: '1.7' }
                                spacing: { marginBlock: sm }
                            - name: link
                              properties:
                                text: Learn more
                                href: '#branding'
                                typography: { size: sm, weight: semibold, color: *color-accent }
                                appearance: { underline: false, showArrow: true }
                    - components:
                        - name: layout-column
                          properties:
                            layout: { align: start, horizontalAlign: space-evenly }
                            spacing: { paddingBlock: lg, paddingInline: lg }
                            appearance:
                              background: { color: '#faf5ff', transparency: 100 }
                              radius: lg
                              border: { width: 1, style: solid, color: '#e9d5ff' }
                          components:
                            - name: heading
                              properties:
                                text: Web Development
                                level: 3
                                typography: { size: lg, weight: bold, color: *color-primary }
                            - name: paragraph
                              properties:
                                text: Responsive websites, progressive web apps, and e-commerce platforms built with modern technologies for speed and scale.
                                typography: { size: sm, color: *color-secondary, lineHeight: '1.7' }
                                spacing: { marginBlock: sm }
                            - name: link
                              properties:
                                text: Learn more
                                href: '#web'
                                typography: { size: sm, weight: semibold, color: *color-accent }
                                appearance: { underline: false, showArrow: true }
                    - components:
                        - name: layout-column
                          properties:
                            layout: { align: start, horizontalAlign: space-evenly }
                            spacing: { paddingBlock: lg, paddingInline: lg }
                            appearance:
                              background: { color: '#faf5ff', transparency: 100 }
                              radius: lg
                              border: { width: 1, style: solid, color: '#e9d5ff' }
                          components:
                            - name: heading
                              properties:
                                text: UX Strategy
                                level: 3
                                typography: { size: lg, weight: bold, color: *color-primary }
                            - name: paragraph
                              properties:
                                text: User research, information architecture, wireframing, and prototyping to craft intuitive experiences users love.
                                typography: { size: sm, color: *color-secondary, lineHeight: '1.7' }
                                spacing: { marginBlock: sm }
                            - name: link
                              properties:
                                text: Learn more
                                href: '#ux'
                                typography: { size: sm, weight: semibold, color: *color-accent }
                                appearance: { underline: false, showArrow: true }

        # Tab 3 - Portfolio
        - title: Portfolio
          components:
            - name: layout-column
              properties:
                layout: { align: center, horizontalAlign: space-evenly }
                spacing: { paddingBlock: xxl, paddingInline: lg }
              components:
                - name: heading
                  properties:
                    text: Selected Work
                    level: 2
                    typography: { size: xxl, weight: bold, color: *color-primary, align: center }
                    spacing: { marginBlock: md }
                - name: columnsgrid
                  properties:
                    layout: { columns: 2, gap: lg, verticalAlign: top }
                    responsive: { breakpoints: { md: 1, sm: 1 } }
                  columns:
                    - components:
                        - name: image
                          properties:
                            source:
                              url: 'https://images.unsplash.com/photo-1460925895917-afdab827c52f?w=600&q=80'
                              altText: 'Dashboard analytics project'
                            appearance: { minHeight: 18.75, fit: cover, cornerStyle: lg, hoverEffect: zoom }
                            layout: { widthMode: stretch }
                        - name: heading
                          properties:
                            text: Fintech Dashboard Redesign
                            level: 3
                            typography: { size: lg, weight: semibold, color: *color-primary }
                            spacing: { marginBlock: sm }
                        - name: paragraph
                          properties:
                            text: Reimagined the analytics experience for 500K+ daily users, resulting in 40% better engagement.
                            typography: { size: sm, color: *color-secondary }
                    - components:
                        - name: image
                          properties:
                            source:
                              url: 'https://images.unsplash.com/photo-1586717791821-3f44a563fa4c?w=600&q=80'
                              altText: 'Mobile app design project'
                            appearance: { minHeight: 18.75, fit: cover, cornerStyle: lg, hoverEffect: zoom }
                            layout: { widthMode: stretch }
                        - name: heading
                          properties:
                            text: HealthTrack Mobile App
                            level: 3
                            typography: { size: lg, weight: semibold, color: *color-primary }
                            spacing: { marginBlock: sm }
                        - name: paragraph
                          properties:
                            text: End-to-end design of a health monitoring app downloaded by 2M+ users across iOS and Android.
                            typography: { size: sm, color: *color-secondary }

        # Tab 4 - About
        - title: About
          components:
            - name: layout-row
              properties:
                layout: { horizontalAlign: space-evenly, align: center, wrap: nowrap }
                spacing: { paddingBlock: xxl, paddingInline: xl }
              components:
                - name: image
                  properties:
                    source:
                      url: 'https://images.unsplash.com/photo-1522071820081-009f0129c71c?w=600&q=80'
                      altText: 'Design team working together'
                    appearance: { minHeight: 25, fit: cover, cornerStyle: lg }
                    layout: { widthMode: "50" }
                - name: layout-column
                  properties:
                    layout: { align: start, horizontalAlign: space-evenly, widthMode: "50" }
                    spacing: { paddingInline: xl }
                  components:
                    - name: eyebrow
                      properties:
                        text: ABOUT US
                        typography: { size: xs, weight: bold, color: *color-accent, transform: uppercase, letterSpacing: wider }
                    - name: heading
                      properties:
                        text: A Team of Creative Problem Solvers
                        level: 2
                        typography: { size: xxl, weight: bold, color: *color-primary }
                        spacing: { marginBlock: sm }
                    - name: paragraph
                      properties:
                        text: Founded in 2018, Prism Design is a collective of 24 designers, developers, and strategists who believe great design drives business growth. We work with forward-thinking companies from startups to Fortune 500.
                        typography: { size: md, color: *color-secondary, lineHeight: '1.8' }
                        spacing: { marginBlock: sm }
                    - name: layout-row
                      properties:
                        layout: { horizontalAlign: space-evenly, align: center }
                        spacing: { marginBlock: md }
                      components:
                        - name: layout-column
                          properties:
                            layout: { align: center, horizontalAlign: space-evenly }
                          components:
                            - name: heading
                              properties:
                                text: "150+"
                                level: 3
                                typography: { size: xxl, weight: extrabold, color: *color-accent, align: center }
                            - name: paragraph
                              properties:
                                text: Projects Delivered
                                typography: { size: sm, color: *color-secondary, align: center }
                        - name: layout-column
                          properties:
                            layout: { align: center, horizontalAlign: space-evenly }
                          components:
                            - name: heading
                              properties:
                                text: "24"
                                level: 3
                                typography: { size: xxl, weight: extrabold, color: *color-accent, align: center }
                            - name: paragraph
                              properties:
                                text: Team Members
                                typography: { size: sm, color: *color-secondary, align: center }
                        - name: layout-column
                          properties:
                            layout: { align: center, horizontalAlign: space-evenly }
                          components:
                            - name: heading
                              properties:
                                text: "12"
                                level: 3
                                typography: { size: xxl, weight: extrabold, color: *color-accent, align: center }
                            - name: paragraph
                              properties:
                                text: Design Awards
                                typography: { size: sm, color: *color-secondary, align: center }

        # Tab 5 - Contact
        - title: Contact
          components:
            - name: layout-row
              properties:
                layout: { horizontalAlign: space-evenly, align: start, wrap: nowrap }
                spacing: { paddingBlock: xxl, paddingInline: xl }
              components:
                - name: layout-column
                  properties:
                    layout: { align: start, horizontalAlign: space-evenly, widthMode: "50" }
                  components:
                    - name: heading
                      properties:
                        text: Let's Talk
                        level: 2
                        typography: { size: xxl, weight: bold, color: *color-primary }
                        spacing: { marginBlock: sm }
                    - name: paragraph
                      properties:
                        text: Have a project in mind? We'd love to hear about it. Fill out the form and we'll get back to you within 24 hours.
                        typography: { size: md, color: *color-secondary, lineHeight: '1.7' }
                        spacing: { marginBlock: md }
                    - name: paragraph
                      properties:
                        text: |
                          Email: hello@prismdesign.co
                          Phone: +1 (415) 555-0198
                          Address: 123 Design District, San Francisco, CA 94105
                        typography: { size: sm, color: *color-secondary, lineHeight: '1.8' }
                - name: form
                  properties:
                    layout: { direction: column, horizontalAlign: space-evenly, widthMode: "50" }
                    submit: { show: false }
                  components:
                    - name: textbox
                      properties:
                        label: { text: 'Your Name', show: true, typography: { size: sm, weight: medium, color: *color-primary } }
                        field: { placeholder: 'John Smith' }
                        appearance: { border: { width: 1, style: solid, color: '#d1d5db' }, radius: md }
                        layout: { widthMode: stretch }
                    - name: textbox
                      properties:
                        label: { text: 'Email Address', show: true, typography: { size: sm, weight: medium, color: *color-primary } }
                        field: { placeholder: 'john@company.com' }
                        appearance: { border: { width: 1, style: solid, color: '#d1d5db' }, radius: md }
                        layout: { widthMode: stretch }
                    - name: textarea
                      properties:
                        label: { text: 'Project Details', show: true, typography: { size: sm, weight: medium, color: *color-primary } }
                        field: { placeholder: 'Tell us about your project...', rows: 5 }
                        appearance: { border: { width: 1, style: solid, color: '#d1d5db' }, radius: md }
                        layout: { widthMode: stretch }
                    - name: button
                      properties:
                        text: Send Message
                        appearance:
                          background: { color: *color-accent }
                          padding: { block: md, inline: xl }
                          radius: md
                        typography: { color: '#ffffff', weight: semibold, size: md }
                        layout: { widthMode: stretch }
                        spacing: { marginBlock: sm }
