# Multi-Column Footer
# Branding column with social links alongside a three-column link grid for products, company, and support, plus a copyright bar.
# Base components: page, layout-column, heading, paragraph, layout-row, link, columnsgrid
# Section type: footer
# Layout: grid
# Visual style: dark_mode
# Perfect for: technology companies, cloud platforms, and enterprise sites needing comprehensive footer navigation

- name: page
  properties:
    theme:
      fonts:
        heading: &font-heading "'Plus Jakarta Sans', sans-serif"
        content: &font-content "'Plus Jakarta Sans', sans-serif"
      colors:
        primary: &color-primary '#f8fafc'
        text: &color-text '#B6B8B9'
        secondary: &color-secondary '#cbd5e1'
        accent: &color-accent '#06b6d4'
        background: &color-background '#ffffff'
    spacing: {paddingBlock: none, paddingInline: none}
    appearance: {background: {color: *color-background}}
  components:

    # ============================================
    # PAGE BODY (Demo Content)
    # ============================================
  - name: layout-column
    properties:
      layout: {horizontalAlign: space-evenly}
      spacing: {paddingBlock: xxxl, paddingInline: xl}
    components:
    - name: heading
      properties:
        text: Multi-Column Footer Pattern
        level: 1
        typography: {size: xxxl, weight: extrabold, color: *color-primary, align: center}
        spacing: {marginBlock: md}
    - name: paragraph
      properties:
        text: A comprehensive four-column footer with organized link categories, branding section, and copyright bar. The industry-standard footer layout for marketing websites.
        typography: {size: lg, color: *color-secondary, align: center}
        layout: {widthMode: 75}

    # ============================================
    # MULTI-COLUMN FOOTER
    # ============================================

    # Footer Top - Branding + Columns
  - name: layout-row
    properties:
      layout: {horizontalAlign: space-evenly, wrap: wrap, verticalAlign: start}
      spacing: {paddingBlock: xxl, paddingInline: xl}
      appearance: {background: {color: *color-primary, transparency: 100}}
    components:

        # Branding Column
    - name: layout-column
      properties:
        layout: {horizontalAlign: space-evenly, widthMode: "25"}
      components:
      - name: heading
        properties:
          text: Horizon
          level: 3
          typography: {size: xl, weight: extrabold, color: *color-accent}
      - name: paragraph
        properties:
          text: Building the next generation of cloud infrastructure for modern development teams worldwide.
          typography: {size: sm, color: *color-secondary, lineHeight: '1.7'}
          spacing: {marginBlock: sm}
      - name: layout-row
        properties:
          layout: {horizontalAlign: space-evenly, verticalAlign: center}
          spacing: {marginBlock: sm}
        components:
        - name: link
          properties:
            text: Twitter
            href: 'https://twitter.com'
            typography: {size: sm, weight: medium, color: *color-accent}
            appearance: {underline: false}
        - name: link
          properties:
            text: GitHub
            href: 'https://github.com'
            typography: {size: sm, weight: medium, color: *color-accent}
            appearance: {underline: false}
        - name: link
          properties:
            text: Discord
            href: 'https://discord.com'
            typography: {size: sm, weight: medium, color: *color-accent}
            appearance: {underline: false}

        # Links Grid (3 columns of links)
    - name: columnsgrid
      properties:
        layout: {columns: 3, gap: lg, verticalAlign: top}
        responsive: {breakpoints: {md: 2, sm: 1}}
      columns:

            # Products Column
      - components:
        - name: heading
          properties:
            text: Products
            level: 4
            typography: {size: sm, weight: bold, color: *color-primary}
            spacing: {marginBlock: sm}
        - name: link
          properties:
            text: Cloud Compute
            href: '#compute'
            typography: {size: sm, color: *color-secondary}
            appearance: {underline: false}
            spacing: {marginBlock: xs}
        - name: link
          properties:
            text: Managed Database
            href: '#database'
            typography: {size: sm, color: *color-secondary}
            appearance: {underline: false}
            spacing: {marginBlock: xs}
        - name: link
          properties:
            text: Object Storage
            href: '#storage'
            typography: {size: sm, color: *color-secondary}
            appearance: {underline: false}
            spacing: {marginBlock: xs}
        - name: link
          properties:
            text: CDN
            href: '#cdn'
            typography: {size: sm, color: *color-secondary}
            appearance: {underline: false}
            spacing: {marginBlock: xs}
        - name: link
          properties:
            text: Serverless Functions
            href: '#serverless'
            typography: {size: sm, color: *color-secondary}
            appearance: {underline: false}
            spacing: {marginBlock: xs}
        - name: link
          properties:
            text: Container Registry
            href: '#registry'
            typography: {size: sm, color: *color-secondary}
            appearance: {underline: false}
            spacing: {marginBlock: xs}

            # Company Column
      - components:
        - name: heading
          properties:
            text: Company
            level: 4
            typography: {size: sm, weight: bold, color: *color-primary}
            spacing: {marginBlock: sm}
        - name: link
          properties:
            text: About Us
            href: '#about'
            typography: {size: sm, color: *color-secondary}
            appearance: {underline: false}
            spacing: {marginBlock: xs}
        - name: link
          properties:
            text: Careers
            href: '#careers'
            typography: {size: sm, color: *color-secondary}
            appearance: {underline: false}
            spacing: {marginBlock: xs}
        - name: link
          properties:
            text: Blog
            href: '#blog'
            typography: {size: sm, color: *color-secondary}
            appearance: {underline: false}
            spacing: {marginBlock: xs}
        - name: link
          properties:
            text: Press
            href: '#press'
            typography: {size: sm, color: *color-secondary}
            appearance: {underline: false}
            spacing: {marginBlock: xs}
        - name: link
          properties:
            text: Partners
            href: '#partners'
            typography: {size: sm, color: *color-secondary}
            appearance: {underline: false}
            spacing: {marginBlock: xs}

            # Support Column
      - components:
        - name: heading
          properties:
            text: Support
            level: 4
            typography: {size: sm, weight: bold, color: *color-primary}
            spacing: {marginBlock: sm}
        - name: link
          properties:
            text: Documentation
            href: '#docs'
            typography: {size: sm, color: *color-secondary}
            appearance: {underline: false}
            spacing: {marginBlock: xs}
        - name: link
          properties:
            text: API Reference
            href: '#api'
            typography: {size: sm, color: *color-secondary}
            appearance: {underline: false}
            spacing: {marginBlock: xs}
        - name: link
          properties:
            text: Status Page
            href: '#status'
            typography: {size: sm, color: *color-secondary}
            appearance: {underline: false}
            spacing: {marginBlock: xs}
        - name: link
          properties:
            text: Help Center
            href: '#help'
            typography: {size: sm, color: *color-secondary}
            appearance: {underline: false}
            spacing: {marginBlock: xs}
        - name: link
          properties:
            text: Community Forum
            href: '#forum'
            typography: {size: sm, color: *color-secondary}
            appearance: {underline: false}
            spacing: {marginBlock: xs}

    # ============================================
    # FOOTER BOTTOM BAR
    # ============================================
  - name: layout-row
    properties:
      layout: {horizontalAlign: space-between, wrap: wrap, verticalAlign: center}
      spacing: {paddingBlock: md, paddingInline: xl}
      appearance:
        background: {color: *color-primary, transparency: 100}
        border: {width: 1, style: solid, color: *color-secondary}
    components:
    - name: paragraph
      properties:
        text: "© 2026 Horizon Inc. All rights reserved."
        typography: {size: xs, color: *color-secondary}
    - name: layout-row
      properties:
        layout: {horizontalAlign: space-evenly, verticalAlign: center}
      components:
      - name: link
        properties:
          text: Privacy Policy
          href: '#privacy'
          typography: {size: xs, color: *color-secondary}
          appearance: {underline: false}
          spacing: {marginInline: sm}
      - name: link
        properties:
          text: Terms of Service
          href: '#terms'
          typography: {size: xs, color: *color-secondary}
          appearance: {underline: false}
          spacing: {marginInline: sm}
      - name: link
        properties:
          text: Security
          href: '#security'
          typography: {size: xs, color: *color-secondary}
          appearance: {underline: false}
          spacing: {marginInline: sm}
      - name: link
        properties:
          text: Sitemap
          href: '#sitemap'
          typography: {size: xs, color: *color-secondary}
          appearance: {underline: false}
          spacing: {marginInline: sm}
