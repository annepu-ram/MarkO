# 03 - Social Footer
# layout-row with justify: space-between containing a logo/copyright column
# and a row of social media link components.

- name: page
  properties:
    theme:
      fonts:
        headingMain: &font-heading-main "'DM Sans', sans-serif"
        headingLevel2: &font-heading-level2 "'DM Sans', sans-serif"
        content: &font-content "'DM Sans', sans-serif"
      colors:
        primary: &color-primary '#1a1a2e'
        secondary: &color-secondary '#e2e8f0'
        accent: &color-accent '#7c3aed'
        background: &color-background '#f8fafc'
    spacing: { paddingBlock: none, paddingInline: none }
    appearance: { background: { color: *color-background } }
  components:

    # ============================================
    # PAGE BODY (Demo Content)
    # ============================================
    - name: layout-column
      properties:
        layout: { align: center, horizontalAlign: space-evenly }
        spacing: { paddingBlock: xxxl, paddingInline: xl }
        appearance: { background: { color: *color-background, transparency: 100 } }
      components:
        - name: heading
          properties:
            text: Social Footer Pattern
            level: 1
            typography: { size: xxxl, weight: extrabold, color: *color-primary, align: center }
            spacing: { marginBlock: md }
        - name: paragraph
          properties:
            text: A clean, minimal footer with branding on the left and social media links
              on the right. Scroll down to see the footer.
            typography: { size: lg, color: '#64748b', align: center }
            layout: { widthMode: 75 }

    # ============================================
    # SOCIAL FOOTER
    # ============================================
    - name: layout-row
      properties:
        layout: { horizontalAlign: space-between, align: center, wrap: wrap }
        spacing: { paddingBlock: lg, paddingInline: xl }
        appearance:
          background: { color: *color-primary, transparency: 100 }
          border: { width: 1, style: solid, color: '#2d2d4a' }
      components:

        # Left Side - Logo & Copyright
        - name: layout-column
          properties:
            layout: { align: start, horizontalAlign: space-evenly, widthMode: "50" }
            spacing: { paddingBlock: sm, paddingInline: none }
          components:
            - name: heading
              properties:
                text: Vivid Studio
                level: 3
                typography: { size: xl, weight: bold, color: *color-secondary }
            - name: paragraph
              properties:
                text: Crafting digital experiences that inspire. Building the future of web
                  design, one pixel at a time.
                typography: { size: sm, color: '#94a3b8', lineHeight: '1.6' }
                spacing: { marginBlock: xs }
            - name: paragraph
              properties:
                text: "© 2026 Vivid Studio. All rights reserved."
                typography: { size: xs, color: '#64748b' }
                spacing: { marginBlock: sm }

        # Right Side - Social Links
        - name: layout-column
          properties:
            layout: { align: end, horizontalAlign: space-evenly, widthMode: "50" }
            spacing: { paddingBlock: sm, paddingInline: none }
          components:
            - name: paragraph
              properties:
                text: Follow Us
                typography: { size: sm, weight: semibold, color: *color-secondary, align: right }
                spacing: { marginBlock: xs }
            - name: layout-row
              properties:
                layout:
                  {
                    horizontalAlign: space-evenly,
                    align: center,
                    tag: section,
                    verticalAlign: stretch,
                    wrap: wrap,
                    gap: sm
                  }
                spacing: { paddingBlock: xs, marginBlock: none, marginInline: none }
                appearance:
                  padding:
                    block: sm
                    inline: sm
                  background:
                    type: ""
                    color: "#ffffff"
                    transparency: 0
                  border:
                    width: 0
                    style: solid
                    color: "#000000"
                  radius: none
                  shadow: none
                  shadowColor: "#000000"
              components:
                - name: link
                  properties:
                    text: Twitter
                    href: 'https://twitter.com'
                    typography: { size: sm, weight: medium, color: *color-accent }
                    appearance: { underline: false }
                    spacing: { marginInline: sm }
                - name: link
                  properties:
                    text: GitHub
                    href: 'https://github.com'
                    typography: { size: sm, weight: medium, color: *color-accent }
                    appearance: { underline: false }
                    spacing: { marginInline: sm }
                - name: link
                  properties:
                    text: LinkedIn
                    href: 'https://linkedin.com'
                    typography: { size: sm, weight: medium, color: *color-accent }
                    appearance: { underline: false }
                    spacing: { marginInline: sm }
                - name: link
                  properties:
                    text: Dribbble
                    href: 'https://dribbble.com'
                    typography: { size: sm, weight: medium, color: *color-accent }
                    appearance: { underline: false }
                    spacing: { marginInline: sm }
                - name: link
                  properties:
                    text: YouTube
                    href: 'https://youtube.com'
                    typography: { size: sm, weight: medium, color: *color-accent }
                    appearance: { underline: false }
                    spacing: { marginInline: sm }

    # ============================================
    # BOTTOM BAR
    # ============================================
    - name: layout-row
      properties:
        layout: { horizontalAlign: space-between, align: center, wrap: wrap }
        spacing: { paddingBlock: sm, paddingInline: xl }
        appearance: { background: { color: '#0f0f23', transparency: 100 } }
      components:
        - name: layout-row
          properties:
            layout: { horizontalAlign: space-evenly, align: center }
          components:
            - name: link
              properties:
                text: Privacy Policy
                href: '#privacy'
                typography: { size: xs, weight: regular, color: '#64748b' }
                appearance: { underline: false }
                spacing: { marginInline: sm }
            - name: link
              properties:
                text: Terms of Service
                href: '#terms'
                typography: { size: xs, weight: regular, color: '#64748b' }
                appearance: { underline: false }
                spacing: { marginInline: sm }
            - name: link
              properties:
                text: Cookie Policy
                href: '#cookies'
                typography: { size: xs, weight: regular, color: '#64748b' }
                appearance: { underline: false }
                spacing: { marginInline: sm }
        - name: paragraph
          properties:
            text: "Made with care in San Francisco"
            typography: { size: xs, color: '#475569', align: right }
