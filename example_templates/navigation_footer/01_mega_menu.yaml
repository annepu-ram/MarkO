# 01 - The Mega-Menu
# Titlebar with navigation links, followed by a columnsgrid mega-menu layout
# with link categories and featured images.

- name: page
  properties:
    theme:
      fonts:
        heading: &font-heading "'Inter', sans-serif"
        content: &font-content "'Inter', sans-serif"
      colors:
        primary: &color-primary '#1e293b'
        secondary: &color-secondary '#475569'
        accent: &color-accent '#3b82f6'
        background: &color-background '#ffffff'
    spacing: { paddingBlock: none, paddingInline: none }
    appearance: { background: { color: *color-background } }
  components:

    # ============================================
    # TITLEBAR
    # ============================================
    - name: titlebar
      properties:
        branding:
          showLogo: true
          logoUrl: 'https://images.unsplash.com/photo-1599305445671-ac291c95aaa9?w=60&h=60&fit=crop'
          title: 'Nexus'
        navigation:
          links:
            - label: Products
              href: '#products'
            - label: Solutions
              href: '#solutions'
            - label: Resources
              href: '#resources'
            - label: Pricing
              href: '#pricing'
            - label: Company
              href: '#company'
        layout: { alignment: left, height: 64 }
        scroll:
          shrinkPercentage: 70
        appearance:
          background: { color: *color-primary, transparency: 100 }
          border: { width: 0, style: solid, color: *color-primary }
        typography:
          title: { size: 22, weight: bold, color: *color-background }
          menu: { size: 15, weight: medium, color: *color-secondary }

    # ============================================
    # MEGA-MENU PANEL
    # ============================================
    - name: layout-row
      properties:
        layout: { horizontalAlign: space-evenly, align: start, wrap: nowrap }
        spacing: { paddingBlock: none, paddingInline: none }
        appearance:
          background: { color: *color-background, transparency: 100 }
          border: { width: 1, style: solid, color: *color-secondary }
      components:

        # Mega-Menu Content Area
        - name: columnsgrid
          properties:
            layout: { columns: 4, gap: md, verticalAlign: top }
            spacing: { paddingBlock: none, paddingInline: none }
            appearance: { padding: { block: lg, inline: lg } }
            responsive: { breakpoints: { md: 2, sm: 1 } }
          columns:

            # Column 1 - Products
            - components:
                - name: eyebrow
                  properties:
                    text: PRODUCTS
                    typography: { size: xs, weight: bold, color: *color-accent, transform: uppercase, letterSpacing: wider }
                    spacing: { marginBlock: xs }
                - name: link
                  properties:
                    text: Analytics Platform
                    href: '#analytics'
                    typography: { size: sm, weight: medium, color: *color-primary }
                    appearance: { underline: false }
                    spacing: { marginBlock: xs }
                - name: link
                  properties:
                    text: Data Warehouse
                    href: '#warehouse'
                    typography: { size: sm, weight: medium, color: *color-primary }
                    appearance: { underline: false }
                    spacing: { marginBlock: xs }
                - name: link
                  properties:
                    text: Machine Learning
                    href: '#ml'
                    typography: { size: sm, weight: medium, color: *color-primary }
                    appearance: { underline: false }
                    spacing: { marginBlock: xs }
                - name: link
                  properties:
                    text: Cloud Infrastructure
                    href: '#cloud'
                    typography: { size: sm, weight: medium, color: *color-primary }
                    appearance: { underline: false }
                    spacing: { marginBlock: xs }
                - name: link
                  properties:
                    text: API Gateway
                    href: '#api'
                    typography: { size: sm, weight: medium, color: *color-primary }
                    appearance: { underline: false }
                    spacing: { marginBlock: xs }

            # Column 2 - Solutions
            - components:
                - name: eyebrow
                  properties:
                    text: SOLUTIONS
                    typography: { size: xs, weight: bold, color: *color-accent, transform: uppercase, letterSpacing: wider }
                    spacing: { marginBlock: xs }
                - name: link
                  properties:
                    text: Enterprise
                    href: '#enterprise'
                    typography: { size: sm, weight: medium, color: *color-primary }
                    appearance: { underline: false }
                    spacing: { marginBlock: xs }
                - name: link
                  properties:
                    text: Startups
                    href: '#startups'
                    typography: { size: sm, weight: medium, color: *color-primary }
                    appearance: { underline: false }
                    spacing: { marginBlock: xs }
                - name: link
                  properties:
                    text: Healthcare
                    href: '#healthcare'
                    typography: { size: sm, weight: medium, color: *color-primary }
                    appearance: { underline: false }
                    spacing: { marginBlock: xs }
                - name: link
                  properties:
                    text: Financial Services
                    href: '#finance'
                    typography: { size: sm, weight: medium, color: *color-primary }
                    appearance: { underline: false }
                    spacing: { marginBlock: xs }
                - name: link
                  properties:
                    text: Education
                    href: '#education'
                    typography: { size: sm, weight: medium, color: *color-primary }
                    appearance: { underline: false }
                    spacing: { marginBlock: xs }

            # Column 3 - Resources
            - components:
                - name: eyebrow
                  properties:
                    text: RESOURCES
                    typography: { size: xs, weight: bold, color: *color-accent, transform: uppercase, letterSpacing: wider }
                    spacing: { marginBlock: xs }
                - name: link
                  properties:
                    text: Documentation
                    href: '#docs'
                    typography: { size: sm, weight: medium, color: *color-primary }
                    appearance: { underline: false }
                    spacing: { marginBlock: xs }
                - name: link
                  properties:
                    text: API Reference
                    href: '#api-ref'
                    typography: { size: sm, weight: medium, color: *color-primary }
                    appearance: { underline: false }
                    spacing: { marginBlock: xs }
                - name: link
                  properties:
                    text: Blog
                    href: '#blog'
                    typography: { size: sm, weight: medium, color: *color-primary }
                    appearance: { underline: false }
                    spacing: { marginBlock: xs }
                - name: link
                  properties:
                    text: Community Forum
                    href: '#community'
                    typography: { size: sm, weight: medium, color: *color-primary }
                    appearance: { underline: false }
                    spacing: { marginBlock: xs }
                - name: link
                  properties:
                    text: Webinars
                    href: '#webinars'
                    typography: { size: sm, weight: medium, color: *color-primary }
                    appearance: { underline: false }
                    spacing: { marginBlock: xs }

            # Column 4 - Featured Content
            - components:
                - name: eyebrow
                  properties:
                    text: FEATURED
                    typography: { size: xs, weight: bold, color: *color-accent, transform: uppercase, letterSpacing: wider }
                    spacing: { marginBlock: xs }
                - name: image
                  properties:
                    source:
                      url: 'https://images.unsplash.com/photo-1551434678-e076c223a692?w=400&q=80'
                      altText: 'Team working on analytics dashboard'
                    appearance: { minHeight: 10, fit: cover, cornerStyle: md, hoverEffect: zoom }
                    layout: { widthMode: stretch }
                    spacing: { marginBlock: xs }
                - name: heading
                  properties:
                    text: "What's New in v4.0"
                    level: 4
                    typography: { size: sm, weight: semibold, color: *color-primary }
                    spacing: { marginBlock: xs }
                - name: paragraph
                  properties:
                    text: Discover the latest features including AI-powered analytics and real-time dashboards.
                    typography: { size: xs, color: *color-secondary }
                - name: link
                  properties:
                    text: Read more
                    href: '#featured'
                    typography: { size: xs, weight: semibold, color: *color-accent }
                    appearance: { underline: false, showArrow: true }
                    spacing: { marginBlock: xs }

    # ============================================
    # HERO CONTENT (Demo Body)
    # ============================================
    - name: layout-column
      properties:
        layout: { align: center, horizontalAlign: space-evenly }
        spacing: { paddingBlock: xxxl, paddingInline: xl }
        appearance: { background: { color: *color-background, transparency: 100 } }
      components:
        - name: eyebrow
          properties:
            text: MEGA-MENU NAVIGATION PATTERN
            typography: { size: xs, weight: semibold, color: *color-accent, transform: uppercase, letterSpacing: wider }
        - name: heading
          properties:
            text: Explore Our Full Product Suite
            level: 1
            typography: { size: xxxl, weight: extrabold, color: *color-primary, align: center, letterSpacing: tight }
            spacing: { marginBlock: md }
        - name: paragraph
          properties:
            text: The mega-menu above organizes navigation into categorized columns with featured imagery, making it easy for users to discover products, solutions, and resources at a glance.
            typography: { size: lg, color: *color-secondary, align: center }
            layout: { widthMode: 75 }
            spacing: { marginBlock: md }
        - name: button
          properties:
            text: Get Started Free
            appearance:
              background: { color: *color-accent }
              padding: { block: md, inline: xl }
              radius: md
            typography: { color: *color-background, weight: semibold, size: md }
