# Scandinavian Clean Features
# Minimal feature cards with subtle borders, no shadows, and clean typography
# Base components: site, page, layout-column, columnsgrid, icon, heading, paragraph, eyebrow
# Section type: features
# Layout: grid
# Visual style: scandinavian_clean
# Content volume: standard
# Tone: neutral
# Conversion intent: engagement
# Image requirement: none
# Interactivity: static
# Industries: professional_services, portfolio, realestate
# Perfect for: Furniture brand, architecture studio, interior design, Nordic lifestyle, home goods

- name: site
  properties:
    theme:
      fonts:
        heading: &font-heading "'Inter', sans-serif"
        content: &font-content "'Inter', sans-serif"
      colors:
        primary: &color-primary "#1A2B3C"
        text: &color-text "#4A5568"
        secondary: &color-secondary "#E2E8F0"
        accent: &color-accent "#2B6CB0"
        background: &color-background "#F7FAFC"
  components:
    - name: page
      slug: home
      title: "Scandinavian Clean Features"
      properties:
        appearance:
          background:
            color: *color-background
            opacity: 100
      components:

        # Features section — clean cards with subtle border
        - name: layout-column
          properties:
            layout:
              horizontalAlign: center
              gap: lg
            spacing:
              paddingBlock: xxxl
              paddingInline: lg
          components:

            # Section header
            - name: eyebrow
              properties:
                text: "Our Principles"
                typography:
                  size: xs
                  weight: medium
                  color: *color-accent
                  transform: uppercase
                  letterSpacing: wider
                  align: center

            - name: heading
              properties:
                text: "Form follows function"
                level: 2
                typography:
                  size: xxl
                  weight: medium
                  color: *color-primary
                  align: center
                  lineHeight: snug

            - name: paragraph
              properties:
                text: "Every detail serves a purpose. Every material is chosen with care. Every design decision starts with how you live."
                typography:
                  size: lg
                  color: *color-text
                  align: center
                  lineHeight: relaxed
                layout:
                  widthMode: "66"

            # Feature grid — 3 clean cards
            - name: columnsgrid
              properties:
                layout:
                  columns: 3
                  gap: md
                responsive:
                  breakpoints:
                    md: 2
                    sm: 1
                spacing:
                  paddingBlock: lg
              columns:

                # Card 1
                - components:
                    - name: layout-column
                      properties:
                        layout:
                          horizontalAlign: left
                          gap: sm
                        appearance:
                          background:
                            color: "#ffffff"
                            opacity: 100
                          radius: md
                          shadow: none
                          border:
                            width: 1
                            style: solid
                            color: *color-secondary
                        spacing:
                          paddingBlock: xl
                          paddingInline: lg
                      components:
                        - name: icon
                          properties:
                            name: ruler
                            appearance:
                              color: *color-accent
                              size: lg
                        - name: heading
                          properties:
                            text: "Precision Craft"
                            level: 3
                            typography:
                              size: lg
                              weight: medium
                              color: *color-primary
                        - name: paragraph
                          properties:
                            text: "Each piece is built to exact specifications using time-tested joinery techniques and sustainably sourced hardwoods."
                            typography:
                              size: sm
                              color: *color-text
                              lineHeight: relaxed

                # Card 2
                - components:
                    - name: layout-column
                      properties:
                        layout:
                          horizontalAlign: left
                          gap: sm
                        appearance:
                          background:
                            color: "#ffffff"
                            opacity: 100
                          radius: md
                          shadow: none
                          border:
                            width: 1
                            style: solid
                            color: *color-secondary
                        spacing:
                          paddingBlock: xl
                          paddingInline: lg
                      components:
                        - name: icon
                          properties:
                            name: leaf
                            appearance:
                              color: *color-accent
                              size: lg
                        - name: heading
                          properties:
                            text: "Natural Materials"
                            level: 3
                            typography:
                              size: lg
                              weight: medium
                              color: *color-primary
                        - name: paragraph
                          properties:
                            text: "Oak, birch, wool, and linen. We work with nature, not against it, choosing materials that age beautifully over time."
                            typography:
                              size: sm
                              color: *color-text
                              lineHeight: relaxed

                # Card 3
                - components:
                    - name: layout-column
                      properties:
                        layout:
                          horizontalAlign: left
                          gap: sm
                        appearance:
                          background:
                            color: "#ffffff"
                            opacity: 100
                          radius: md
                          shadow: none
                          border:
                            width: 1
                            style: solid
                            color: *color-secondary
                        spacing:
                          paddingBlock: xl
                          paddingInline: lg
                      components:
                        - name: icon
                          properties:
                            name: home
                            appearance:
                              color: *color-accent
                              size: lg
                        - name: heading
                          properties:
                            text: "Timeless Design"
                            level: 3
                            typography:
                              size: lg
                              weight: medium
                              color: *color-primary
                        - name: paragraph
                          properties:
                            text: "Designs that transcend trends. Simple, honest forms that look as relevant decades from now as they do today."
                            typography:
                              size: sm
                              color: *color-text
                              lineHeight: relaxed
