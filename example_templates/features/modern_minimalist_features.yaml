# Modern Minimalist Features (Ink & Paper)
# Clean feature cards with subtle borders, soft shadows, and refined typography
# Base components: site, page, layout-column, columnsgrid, icon, heading, paragraph, eyebrow
# Section type: features
# Layout: grid
# Visual style: modern_minimalist
# Content volume: rich
# Tone: neutral
# Conversion intent: engagement
# Image requirement: none
# Interactivity: static
# Industries: saas, ecommerce, portfolio
# Perfect for: SaaS product, design tool, productivity app, developer platform, agency

- name: site
  properties:
    theme:
      fonts:
        heading: &font-heading "'Outfit', sans-serif"
        content: &font-content "'Inter', sans-serif"
      colors:
        primary: &color-primary "#1F2937"
        text: &color-text "#4B5563"
        secondary: &color-secondary "#D1D5DB"
        accent: &color-accent "#4F46E5"
        background: &color-background "#FFFFFF"
        border: &color-border '#e5e7eb'
  components:
    - name: page
      slug: home
      title: "Modern Minimalist Features"
      properties:
        appearance:
          background:
            color: *color-background
            opacity: 100
      components:

        # Features section — clean minimal cards
        - name: layout-column
          properties:
            layout:
              horizontalAlign: center
              gap: lg
            spacing:
              paddingBlock: xxxl
              paddingInline: lg
          components:

            # Section header
            - name: eyebrow
              properties:
                text: "Features"
                typography:
                  size: xs
                  weight: semibold
                  color: *color-accent
                  transform: uppercase
                  letterSpacing: wider
                  align: center

            - name: heading
              properties:
                text: "Everything you need, nothing you don't"
                level: 2
                typography:
                  size: xxl
                  weight: semibold
                  color: *color-primary
                  align: center
                  lineHeight: snug

            - name: paragraph
              properties:
                text: "A thoughtfully crafted toolkit that stays out of your way and lets you focus on what matters most."
                typography:
                  size: lg
                  color: *color-text
                  align: center
                  lineHeight: relaxed
                layout:
                  widthMode: "66"

            # Feature grid — 3 clean cards
            - name: columnsgrid
              properties:
                layout:
                  columns: 3
                  gap: lg
                responsive:
                  breakpoints:
                    md: 2
                    sm: 1
                spacing:
                  paddingBlock: lg
              columns:

                # Card 1 — Smart Editor
                - components:
                    - name: layout-column
                      properties:
                        layout:
                          horizontalAlign: center
                          gap: sm
                        appearance:
                          background:
                            color: *color-background
                            opacity: 100
                          radius: sm
                          shadow: soft
                          border:
                            width: 1
                            style: solid
                            color: *color-border
                        spacing:
                          paddingBlock: xl
                          paddingInline: lg
                      components:
                        - name: icon
                          properties:
                            name: pen-line
                            appearance:
                              color: *color-accent
                              size: xl
                        - name: heading
                          properties:
                            text: "Smart Editor"
                            level: 3
                            typography:
                              size: lg
                              weight: semibold
                              color: *color-primary
                              align: center
                        - name: paragraph
                          properties:
                            text: "Intelligent autocomplete and inline suggestions that learn from your writing style over time."
                            typography:
                              size: sm
                              color: *color-text
                              align: center
                              lineHeight: relaxed

                # Card 2 — Version Control
                - components:
                    - name: layout-column
                      properties:
                        layout:
                          horizontalAlign: center
                          gap: sm
                        appearance:
                          background:
                            color: *color-background
                            opacity: 100
                          radius: sm
                          shadow: soft
                          border:
                            width: 1
                            style: solid
                            color: *color-border
                        spacing:
                          paddingBlock: xl
                          paddingInline: lg
                      components:
                        - name: icon
                          properties:
                            name: git-branch
                            appearance:
                              color: *color-accent
                              size: xl
                        - name: heading
                          properties:
                            text: "Version History"
                            level: 3
                            typography:
                              size: lg
                              weight: semibold
                              color: *color-primary
                              align: center
                        - name: paragraph
                          properties:
                            text: "Every change tracked automatically. Compare versions side by side and restore any previous state."
                            typography:
                              size: sm
                              color: *color-text
                              align: center
                              lineHeight: relaxed

                # Card 3 — Collaboration
                - components:
                    - name: layout-column
                      properties:
                        layout:
                          horizontalAlign: center
                          gap: sm
                        appearance:
                          background:
                            color: *color-background
                            opacity: 100
                          radius: sm
                          shadow: soft
                          border:
                            width: 1
                            style: solid
                            color: *color-border
                        spacing:
                          paddingBlock: xl
                          paddingInline: lg
                      components:
                        - name: icon
                          properties:
                            name: users
                            appearance:
                              color: *color-accent
                              size: xl
                        - name: heading
                          properties:
                            text: "Live Collaboration"
                            level: 3
                            typography:
                              size: lg
                              weight: semibold
                              color: *color-primary
                              align: center
                        - name: paragraph
                          properties:
                            text: "Work together in real time with presence indicators, comments, and instant sync across devices."
                            typography:
                              size: sm
                              color: *color-text
                              align: center
                              lineHeight: relaxed

            # Second row of features
            - name: columnsgrid
              properties:
                layout:
                  columns: 3
                  gap: lg
                responsive:
                  breakpoints:
                    md: 2
                    sm: 1
              columns:

                # Card 4 — Integrations
                - components:
                    - name: layout-column
                      properties:
                        layout:
                          horizontalAlign: center
                          gap: sm
                        appearance:
                          background:
                            color: *color-background
                            opacity: 100
                          radius: sm
                          shadow: soft
                          border:
                            width: 1
                            style: solid
                            color: *color-border
                        spacing:
                          paddingBlock: xl
                          paddingInline: lg
                      components:
                        - name: icon
                          properties:
                            name: puzzle
                            appearance:
                              color: *color-accent
                              size: xl
                        - name: heading
                          properties:
                            text: "50+ Integrations"
                            level: 3
                            typography:
                              size: lg
                              weight: semibold
                              color: *color-primary
                              align: center
                        - name: paragraph
                          properties:
                            text: "Connect with Slack, Notion, GitHub, Figma, and dozens more. Your workflow, unified in one place."
                            typography:
                              size: sm
                              color: *color-text
                              align: center
                              lineHeight: relaxed

                # Card 5 — Analytics
                - components:
                    - name: layout-column
                      properties:
                        layout:
                          horizontalAlign: center
                          gap: sm
                        appearance:
                          background:
                            color: *color-background
                            opacity: 100
                          radius: sm
                          shadow: soft
                          border:
                            width: 1
                            style: solid
                            color: *color-border
                        spacing:
                          paddingBlock: xl
                          paddingInline: lg
                      components:
                        - name: icon
                          properties:
                            name: bar-chart-2
                            appearance:
                              color: *color-accent
                              size: xl
                        - name: heading
                          properties:
                            text: "Usage Analytics"
                            level: 3
                            typography:
                              size: lg
                              weight: semibold
                              color: *color-primary
                              align: center
                        - name: paragraph
                          properties:
                            text: "Understand how your team works with clear dashboards and actionable insights delivered weekly."
                            typography:
                              size: sm
                              color: *color-text
                              align: center
                              lineHeight: relaxed

                # Card 6 — Security
                - components:
                    - name: layout-column
                      properties:
                        layout:
                          horizontalAlign: center
                          gap: sm
                        appearance:
                          background:
                            color: *color-background
                            opacity: 100
                          radius: sm
                          shadow: soft
                          border:
                            width: 1
                            style: solid
                            color: *color-border
                        spacing:
                          paddingBlock: xl
                          paddingInline: lg
                      components:
                        - name: icon
                          properties:
                            name: shield-check
                            appearance:
                              color: *color-accent
                              size: xl
                        - name: heading
                          properties:
                            text: "Enterprise Security"
                            level: 3
                            typography:
                              size: lg
                              weight: semibold
                              color: *color-primary
                              align: center
                        - name: paragraph
                          properties:
                            text: "SOC 2 certified with SSO, audit logs, and granular permissions. Your data stays yours, always."
                            typography:
                              size: sm
                              color: *color-text
                              align: center
                              lineHeight: relaxed
