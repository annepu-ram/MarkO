# Bold Editorial Features
# High-contrast 2-column grid with bold serif headings and strong typography
# Base components: site, page, layout-column, columnsgrid, icon, heading, paragraph, eyebrow
# Section type: features
# Layout: grid
# Visual style: bold_editorial
# Content volume: rich
# Tone: neutral
# Conversion intent: engagement
# Image requirement: none
# Interactivity: static
# Industries: portfolio
# Perfect for: Magazine, news, media, publishing, blog, creative agency, portfolio, fashion

- name: site
  properties:
    theme:
      fonts:
        heading: &font-heading "'Playfair Display', serif"
        content: &font-content "'Inter', sans-serif"
      colors:
        primary: &color-primary "#1A1A1A"
        text: &color-text "#374151"
        secondary: &color-secondary "#F5F5F0"
        accent: &color-accent "#DC2626"
        background: &color-background "#FFFFFF"
  components:
    - name: page
      slug: home
      title: "Bold Editorial Features"
      properties:
        appearance:
          background:
            color: *color-background
            opacity: 100
      components:

        # Features section — bold 2-column grid
        - name: layout-column
          properties:
            layout:
              horizontalAlign: center
              gap: lg
            spacing:
              paddingBlock: xxxl
              paddingInline: lg
          components:

            # Section header
            - name: eyebrow
              properties:
                text: "What We Do"
                typography:
                  size: xs
                  weight: bold
                  color: *color-accent
                  transform: uppercase
                  letterSpacing: wider
                  align: center

            - name: heading
              properties:
                text: "Bold thinking, bolder results"
                level: 2
                typography:
                  size: xxl
                  weight: extrabold
                  color: *color-primary
                  align: center
                  lineHeight: snug
                  letterSpacing: tight

            - name: paragraph
              properties:
                text: "We combine editorial precision with creative ambition to produce work that commands attention and drives action."
                typography:
                  size: lg
                  color: *color-text
                  align: center
                  lineHeight: relaxed
                layout:
                  widthMode: "66"

            # Feature grid — 2 columns, bold headings
            - name: columnsgrid
              properties:
                layout:
                  columns: 2
                  gap: lg
                responsive:
                  breakpoints:
                    sm: 1
                spacing:
                  paddingBlock: lg
              columns:

                # Card 1
                - components:
                    - name: layout-column
                      properties:
                        layout:
                          horizontalAlign: left
                          gap: sm
                        appearance:
                          background:
                            color: *color-secondary
                            opacity: 100
                          radius: none
                          shadow: none
                          border:
                            width: 0
                        spacing:
                          paddingBlock: xl
                          paddingInline: xl
                      components:
                        - name: icon
                          properties:
                            name: pen-tool
                            appearance:
                              color: *color-accent
                              size: lg
                        - name: heading
                          properties:
                            text: "Editorial Strategy"
                            level: 3
                            typography:
                              size: xl
                              weight: extrabold
                              color: *color-primary
                              letterSpacing: tight
                        - name: paragraph
                          properties:
                            text: "We craft narratives that resonate deeply with your audience, blending data-driven insight with compelling storytelling to cut through the noise."
                            typography:
                              size: sm
                              color: *color-text
                              lineHeight: relaxed

                # Card 2
                - components:
                    - name: layout-column
                      properties:
                        layout:
                          horizontalAlign: left
                          gap: sm
                        appearance:
                          background:
                            color: *color-secondary
                            opacity: 100
                          radius: none
                          shadow: none
                          border:
                            width: 0
                        spacing:
                          paddingBlock: xl
                          paddingInline: xl
                      components:
                        - name: icon
                          properties:
                            name: layout
                            appearance:
                              color: *color-accent
                              size: lg
                        - name: heading
                          properties:
                            text: "Visual Identity"
                            level: 3
                            typography:
                              size: xl
                              weight: extrabold
                              color: *color-primary
                              letterSpacing: tight
                        - name: paragraph
                          properties:
                            text: "From typography systems to brand guidelines, we build visual identities that are instantly recognizable and impossible to ignore."
                            typography:
                              size: sm
                              color: *color-text
                              lineHeight: relaxed

                # Card 3
                - components:
                    - name: layout-column
                      properties:
                        layout:
                          horizontalAlign: left
                          gap: sm
                        appearance:
                          background:
                            color: *color-secondary
                            opacity: 100
                          radius: none
                          shadow: none
                          border:
                            width: 0
                        spacing:
                          paddingBlock: xl
                          paddingInline: xl
                      components:
                        - name: icon
                          properties:
                            name: megaphone
                            appearance:
                              color: *color-accent
                              size: lg
                        - name: heading
                          properties:
                            text: "Brand Voice"
                            level: 3
                            typography:
                              size: xl
                              weight: extrabold
                              color: *color-primary
                              letterSpacing: tight
                        - name: paragraph
                          properties:
                            text: "We define and refine the tone, language, and personality that make your brand unmistakable across every channel and touchpoint."
                            typography:
                              size: sm
                              color: *color-text
                              lineHeight: relaxed

                # Card 4
                - components:
                    - name: layout-column
                      properties:
                        layout:
                          horizontalAlign: left
                          gap: sm
                        appearance:
                          background:
                            color: *color-secondary
                            opacity: 100
                          radius: none
                          shadow: none
                          border:
                            width: 0
                        spacing:
                          paddingBlock: xl
                          paddingInline: xl
                      components:
                        - name: icon
                          properties:
                            name: trending-up
                            appearance:
                              color: *color-accent
                              size: lg
                        - name: heading
                          properties:
                            text: "Growth Content"
                            level: 3
                            typography:
                              size: xl
                              weight: extrabold
                              color: *color-primary
                              letterSpacing: tight
                        - name: paragraph
                          properties:
                            text: "Performance-driven content strategies that turn readers into subscribers, followers into advocates, and clicks into conversions."
                            typography:
                              size: sm
                              color: *color-text
                              lineHeight: relaxed
