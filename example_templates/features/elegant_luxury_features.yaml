# Elegant Luxury Features
# Refined feature cards with gold borders and serif typography
# Base components: site, page, layout-column, columnsgrid, icon, heading, paragraph, eyebrow
# Section type: features
# Layout: grid
# Visual style: elegant_luxury
# Content volume: rich
# Tone: formal
# Conversion intent: engagement
# Image requirement: none
# Interactivity: static
# Industries: beauty, restaurant, portfolio, realestate, hospitality
# Perfect for: Jewelry, hotel, fashion, interior design, real estate, spa, fine dining, wedding

- name: site
  properties:
    theme:
      fonts:
        heading: &font-heading "'Playfair Display', serif"
        content: &font-content "'Inter', sans-serif"
      colors:
        primary: &color-primary "#1A1A1A"
        text: &color-text "#4A4A4A"
        secondary: &color-secondary "#D4AF37"
        accent: &color-accent "#B8860B"
        background: &color-background "#FFFDF7"
  components:
    - name: page
      slug: home
      title: "Elegant Luxury Features"
      properties:
        appearance:
          background:
            color: *color-background
            opacity: 100
      components:

        # Features section — refined cards with gold borders
        - name: layout-column
          properties:
            layout:
              horizontalAlign: center
              gap: lg
            spacing:
              paddingBlock: xxxl
              paddingInline: lg
          components:

            # Section header
            - name: eyebrow
              properties:
                text: "Our Services"
                typography:
                  size: xs
                  weight: regular
                  color: *color-secondary
                  transform: uppercase
                  letterSpacing: wider
                  align: center

            - name: heading
              properties:
                text: "An experience beyond compare"
                level: 2
                typography:
                  size: xxl
                  weight: light
                  color: *color-primary
                  align: center
                  lineHeight: snug
                  letterSpacing: wider
                  transform: uppercase

            - name: paragraph
              properties:
                text: "Every detail has been considered, every moment designed to deliver quiet sophistication and lasting impressions."
                typography:
                  size: lg
                  color: *color-text
                  align: center
                  lineHeight: relaxed
                layout:
                  widthMode: "66"

            # Feature grid — 3 cards with gold border
            - name: columnsgrid
              properties:
                layout:
                  columns: 3
                  gap: md
                responsive:
                  breakpoints:
                    md: 2
                    sm: 1
                spacing:
                  paddingBlock: lg
              columns:

                # Card 1
                - components:
                    - name: layout-column
                      properties:
                        layout:
                          horizontalAlign: center
                          gap: sm
                        appearance:
                          background:
                            color: "#ffffff"
                            opacity: 100
                          radius: none
                          shadow: soft
                          border:
                            width: 1
                            style: solid
                            color: *color-secondary
                        spacing:
                          paddingBlock: xl
                          paddingInline: lg
                      components:
                        - name: icon
                          properties:
                            name: diamond
                            appearance:
                              color: *color-secondary
                              size: lg
                        - name: heading
                          properties:
                            text: "Bespoke Design"
                            level: 3
                            typography:
                              size: lg
                              weight: light
                              color: *color-primary
                              align: center
                              letterSpacing: wider
                              transform: uppercase
                        - name: paragraph
                          properties:
                            text: "Each piece is individually crafted to your specifications, ensuring a result that is uniquely and unmistakably yours."
                            typography:
                              size: sm
                              color: *color-text
                              align: center
                              lineHeight: relaxed

                # Card 2
                - components:
                    - name: layout-column
                      properties:
                        layout:
                          horizontalAlign: center
                          gap: sm
                        appearance:
                          background:
                            color: "#ffffff"
                            opacity: 100
                          radius: none
                          shadow: soft
                          border:
                            width: 1
                            style: solid
                            color: *color-secondary
                        spacing:
                          paddingBlock: xl
                          paddingInline: lg
                      components:
                        - name: icon
                          properties:
                            name: crown
                            appearance:
                              color: *color-secondary
                              size: lg
                        - name: heading
                          properties:
                            text: "Premium Materials"
                            level: 3
                            typography:
                              size: lg
                              weight: light
                              color: *color-primary
                              align: center
                              letterSpacing: wider
                              transform: uppercase
                        - name: paragraph
                          properties:
                            text: "We source only the finest materials from trusted artisans around the world, guaranteeing exceptional quality in every detail."
                            typography:
                              size: sm
                              color: *color-text
                              align: center
                              lineHeight: relaxed

                # Card 3
                - components:
                    - name: layout-column
                      properties:
                        layout:
                          horizontalAlign: center
                          gap: sm
                        appearance:
                          background:
                            color: "#ffffff"
                            opacity: 100
                          radius: none
                          shadow: soft
                          border:
                            width: 1
                            style: solid
                            color: *color-secondary
                        spacing:
                          paddingBlock: xl
                          paddingInline: lg
                      components:
                        - name: icon
                          properties:
                            name: sparkles
                            appearance:
                              color: *color-secondary
                              size: lg
                        - name: heading
                          properties:
                            text: "White Glove Service"
                            level: 3
                            typography:
                              size: lg
                              weight: light
                              color: *color-primary
                              align: center
                              letterSpacing: wider
                              transform: uppercase
                        - name: paragraph
                          properties:
                            text: "From initial consultation to final delivery, our dedicated team ensures a seamless and memorable experience at every turn."
                            typography:
                              size: sm
                              color: *color-text
                              align: center
                              lineHeight: relaxed
