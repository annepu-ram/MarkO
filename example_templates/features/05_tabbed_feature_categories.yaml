# Tabbed Feature Categories Section — Organized Feature Showcase
# A feature section using tabs component to organize features into categories with each tab containing a columnsgrid of feature cards with icons, headings, and descriptions
# Base components: layout-row, tabs, columnsgrid, layout-column, icon, heading, paragraph, eyebrow, image
# Section type: features
# Layout: grid, card_based
# Visual style: modern_minimalist
# Content volume: rich
# Tone: neutral
# Conversion intent: engagement
# Image requirement: none
# Interactivity: tabs
# Industries: professional_services, fitness_recreation, saas, ecommerce, portfolio
# Perfect for: SaaS platform, mobile app, software company, online store, consulting firm, logistics company, tutoring center, dental clinic, gym, digital agency


- name: site
  properties:
    theme:
      fonts:
        heading: &font-heading "'Inter', sans-serif"
        content: &font-content "'Inter', sans-serif"
      colors:
        primary: &color-primary '#111827'
        text: &color-text '#2C3039'
        secondary: &color-secondary '#6b7280'
        accent: &color-accent '#6366f1'
        background: &color-background '#ffffff'
  components:
    - name: page
      slug: home
      title: "05 Tabbed Feature Categories"
      properties:
        appearance: { background: { color: *color-background } }
      components:
        # Section Header
        - name: layout-row
          properties:
            layout: { horizontalAlign: center }
            spacing: { paddingBlock: xl, paddingInline: lg }
          components:
            - name: layout-column
              properties:
                layout: { widthMode: '75', horizontalAlign: center }
              components:
                - name: eyebrow
                  properties:
                    text: PLATFORM CAPABILITIES
                    typography: { size: xs, weight: semibold, color: *color-accent, transform: uppercase, letterSpacing: wider, align: center }
                - name: heading
                  properties:
                    text: Explore Our Features
                    level: 2
                    typography: { size: xxl, weight: bold, color: *color-primary, align: center }
                    spacing: { marginBlock: sm }
                - name: paragraph
                  properties:
                    text: Browse by category to discover everything our platform has to offer.
                    typography: { size: md, color: *color-secondary, align: center }
                    spacing: { marginBlock: sm }

        # Tabbed Feature Sections
        - name: layout-row
          properties:
            layout: { horizontalAlign: center }
            spacing: { paddingBlock: lg, paddingInline: lg }
          components:
            - name: layout-column
              properties:
                layout: { widthMode: '83', horizontalAlign: center }
              components:
                - name: tabs
                  properties:
                    layout: { orientation: horizontal, widthMode: stretch }
                    typography:
                      label:
                        size: md
                        weight: semibold
                        active: { color: *color-accent }
                        inactive: { color: *color-secondary }
                    appearance:
                      tab:
                        background: { active: *color-background, inactive: *color-background }
                        border: { width: 2, style: solid, position: lower }
                      content:
                        background: { color: *color-background, opacity: 100 }
                        border: { color: '#e5e7eb', width: 1, style: solid }
                        padding: { block: lg, inline: lg }
                      shadow: none
                    spacing: { marginBlock: md, paddingBlock: sm, paddingInline: sm }
                  tabs:
                    # Tab 1 — Core Features
                    - title: Core Features
                      components:
                        - name: columnsgrid
                          properties:
                            layout: { columns: 3, gap: lg }
                            responsive: { breakpoints: { md: 2, sm: 1 } }
                          columns:
                            - components:
                                - name: layout-column
                                  properties:
                                    layout: { horizontalAlign: center }
                                    appearance: { background: { color: '#f9fafb', opacity: 100 }, radius: md }
                                    spacing: { paddingBlock: lg, paddingInline: md }
                                  components:
                                    - name: icon
                                      properties: { name: layout-dashboard, size: "40", color: *color-accent }
                                    - name: heading
                                      properties:
                                        text: Unified Dashboard
                                        level: 4
                                        typography: { size: md, weight: semibold, color: *color-primary, align: center }
                                        spacing: { marginBlock: sm }
                                    - name: paragraph
                                      properties:
                                        text: A single command center for all your projects, tasks, and team activity in one view.
                                        typography: { size: sm, color: *color-secondary, align: center }

                            - components:
                                - name: layout-column
                                  properties:
                                    layout: { horizontalAlign: center }
                                    appearance: { background: { color: '#f9fafb', opacity: 100 }, radius: md }
                                    spacing: { paddingBlock: lg, paddingInline: md }
                                  components:
                                    - name: icon
                                      properties: { name: file-edit, size: "40", color: *color-accent }
                                    - name: heading
                                      properties:
                                        text: Rich Text Editor
                                        level: 4
                                        typography: { size: md, weight: semibold, color: *color-primary, align: center }
                                        spacing: { marginBlock: sm }
                                    - name: paragraph
                                      properties:
                                        text: Create beautiful documents with markdown, embeds, tables, and real-time collaboration.
                                        typography: { size: sm, color: *color-secondary, align: center }

                            - components:
                                - name: layout-column
                                  properties:
                                    layout: { horizontalAlign: center }
                                    appearance: { background: { color: '#f9fafb', opacity: 100 }, radius: md }
                                    spacing: { paddingBlock: lg, paddingInline: md }
                                  components:
                                    - name: icon
                                      properties: { name: check-square, size: "40", color: *color-accent }
                                    - name: heading
                                      properties:
                                        text: Task Management
                                        level: 4
                                        typography: { size: md, weight: semibold, color: *color-primary, align: center }
                                        spacing: { marginBlock: sm }
                                    - name: paragraph
                                      properties:
                                        text: Organize work with boards, lists, and timelines. Assign, prioritize, and track progress easily.
                                        typography: { size: sm, color: *color-secondary, align: center }

                    # Tab 2 — Integrations
                    - title: Integrations
                      components:
                        - name: columnsgrid
                          properties:
                            layout: { columns: 3, gap: lg }
                            responsive: { breakpoints: { md: 2, sm: 1 } }
                          columns:
                            - components:
                                - name: layout-column
                                  properties:
                                    layout: { horizontalAlign: center }
                                    appearance: { background: { color: '#f9fafb', opacity: 100 }, radius: md }
                                    spacing: { paddingBlock: lg, paddingInline: md }
                                  components:
                                    - name: icon
                                      properties: { name: plug, size: "40", color: '#10b981' }
                                    - name: heading
                                      properties:
                                        text: REST API
                                        level: 4
                                        typography: { size: md, weight: semibold, color: *color-primary, align: center }
                                        spacing: { marginBlock: sm }
                                    - name: paragraph
                                      properties:
                                        text: Full-featured API with webhooks, OAuth, and comprehensive documentation for developers.
                                        typography: { size: sm, color: *color-secondary, align: center }

                            - components:
                                - name: layout-column
                                  properties:
                                    layout: { horizontalAlign: center }
                                    appearance: { background: { color: '#f9fafb', opacity: 100 }, radius: md }
                                    spacing: { paddingBlock: lg, paddingInline: md }
                                  components:
                                    - name: icon
                                      properties: { name: refresh-cw, size: "40", color: '#10b981' }
                                    - name: heading
                                      properties:
                                        text: Third-Party Sync
                                        level: 4
                                        typography: { size: md, weight: semibold, color: *color-primary, align: center }
                                        spacing: { marginBlock: sm }
                                    - name: paragraph
                                      properties:
                                        text: Connect with Slack, Jira, GitHub, Salesforce, and 200+ other tools out of the box.
                                        typography: { size: sm, color: *color-secondary, align: center }

                            - components:
                                - name: layout-column
                                  properties:
                                    layout: { horizontalAlign: center }
                                    appearance: { background: { color: '#f9fafb', opacity: 100 }, radius: md }
                                    spacing: { paddingBlock: lg, paddingInline: md }
                                  components:
                                    - name: icon
                                      properties: { name: link, size: "40", color: '#10b981' }
                                    - name: heading
                                      properties:
                                        text: Webhooks & Events
                                        level: 4
                                        typography: { size: md, weight: semibold, color: *color-primary, align: center }
                                        spacing: { marginBlock: sm }
                                    - name: paragraph
                                      properties:
                                        text: Trigger custom automations with real-time event hooks for any action in the platform.
                                        typography: { size: sm, color: *color-secondary, align: center }

                    # Tab 3 — Analytics
                    - title: Analytics
                      components:
                        - name: columnsgrid
                          properties:
                            layout: { columns: 3, gap: lg }
                            responsive: { breakpoints: { md: 2, sm: 1 } }
                          columns:
                            - components:
                                - name: layout-column
                                  properties:
                                    layout: { horizontalAlign: center }
                                    appearance: { background: { color: '#f9fafb', opacity: 100 }, radius: md }
                                    spacing: { paddingBlock: lg, paddingInline: md }
                                  components:
                                    - name: icon
                                      properties: { name: bar-chart-2, size: "40", color: '#f59e0b' }
                                    - name: heading
                                      properties:
                                        text: Custom Reports
                                        level: 4
                                        typography: { size: md, weight: semibold, color: *color-primary, align: center }
                                        spacing: { marginBlock: sm }
                                    - name: paragraph
                                      properties:
                                        text: Build drag-and-drop reports with filters, grouping, and export to PDF or spreadsheet.
                                        typography: { size: sm, color: *color-secondary, align: center }

                            - components:
                                - name: layout-column
                                  properties:
                                    layout: { horizontalAlign: center }
                                    appearance: { background: { color: '#f9fafb', opacity: 100 }, radius: md }
                                    spacing: { paddingBlock: lg, paddingInline: md }
                                  components:
                                    - name: icon
                                      properties: { name: trending-up, size: "40", color: '#f59e0b' }
                                    - name: heading
                                      properties:
                                        text: Trend Analysis
                                        level: 4
                                        typography: { size: md, weight: semibold, color: *color-primary, align: center }
                                        spacing: { marginBlock: sm }
                                    - name: paragraph
                                      properties:
                                        text: Identify patterns and forecast outcomes with machine learning-powered trend detection.
                                        typography: { size: sm, color: *color-secondary, align: center }

                            - components:
                                - name: layout-column
                                  properties:
                                    layout: { horizontalAlign: center }
                                    appearance: { background: { color: '#f9fafb', opacity: 100 }, radius: md }
                                    spacing: { paddingBlock: lg, paddingInline: md }
                                  components:
                                    - name: icon
                                      properties: { name: gauge, size: "40", color: '#f59e0b' }
                                    - name: heading
                                      properties:
                                        text: Real-Time Metrics
                                        level: 4
                                        typography: { size: md, weight: semibold, color: *color-primary, align: center }
                                        spacing: { marginBlock: sm }
                                    - name: paragraph
                                      properties:
                                        text: Live dashboards update every second so you always have the latest data at your fingertips.
                                        typography: { size: sm, color: *color-secondary, align: center }
