# Alternating Image-Text Feature Rows Section
# A feature showcase using alternating left-right layout-row pairs with images on one side and text content on the other, creating a visual zigzag rhythm for highlighting product benefits
# Base components: layout-row, layout-column, image, heading, paragraph, eyebrow, icon, button
# Section type: features
# Layout: split_screen
# Visual style: modern_minimalist
# Content volume: standard
# Tone: neutral
# Conversion intent: engagement
# Image requirement: required
# Interactivity: static
# Industries: professional_services, fitness_recreation, saas, ecommerce, portfolio
# Perfect for: SaaS platform, mobile app, software company, online store, consulting firm, logistics company, tutoring center, dental clinic, gym, digital agency


- name: site
  properties:
    theme:
      fonts:
        heading: &font-heading "'Inter', sans-serif"
        content: &font-content "'Inter', sans-serif"
      colors:
        primary: &color-primary '#111827'
        text: &color-text '#2C3039'
        secondary: &color-secondary '#6b7280'
        accent: &color-accent '#2563eb'
        background: &color-background '#ffffff'
  components:
    - name: page
      slug: home
      title: "02 Alternating Image Text"
      properties:
        appearance: { background: { color: *color-background } }
      components:
        # Section Header
        - name: layout-row
          properties:
            layout: { horizontalAlign: center }
            spacing: { paddingBlock: xl, paddingInline: lg }
          components:
            - name: layout-column
              properties:
                layout: { widthMode: '75', horizontalAlign: center }
              components:
                - name: eyebrow
                  properties:
                    text: PRODUCT FEATURES
                    typography: { size: xs, weight: semibold, color: *color-accent, transform: uppercase, letterSpacing: wider, align: center }
                - name: heading
                  properties:
                    text: Everything You Need to Succeed
                    level: 2
                    typography: { size: xxl, weight: bold, color: *color-primary, align: center }
                    spacing: { marginBlock: sm }
                - name: paragraph
                  properties:
                    text: Discover how our platform empowers teams to build, launch, and scale with confidence.
                    typography: { size: md, color: *color-secondary, align: center }
                    spacing: { marginBlock: sm }

        # Row 1 — Image Left, Text Right
        - name: layout-row
          properties:
            layout:
              horizontalAlign: space-evenly
              verticalAlign: center
              wrap: wrap
              gap: lg
            spacing: { paddingBlock: xl, paddingInline: lg }
          components:
            - name: image
              properties:
                source:
                  url: https://images.pexels.com/photos/3183150/pexels-photo-3183150.jpeg?auto=compress&cs=tinysrgb&w=800
                  altText: Team collaborating on project
                appearance:
                  minHeight: 20
                  fit: cover
                  cornerStyle: md
                layout:
                  widthMode: "50"
            - name: layout-column
              properties:
                layout: { widthMode: "50", horizontalAlign: left, gap: sm }
                appearance: { background: { opacity: 0 } }
              components:
                - name: eyebrow
                  properties:
                    text: COLLABORATE
                    typography: { size: xs, weight: semibold, color: *color-accent, transform: uppercase, letterSpacing: wider }
                - name: heading
                  properties:
                    text: Seamless Team Collaboration
                    level: 3
                    typography: { size: xl, weight: bold, color: *color-primary }
                    spacing: { marginBlock: xs, paddingBlock: sm, paddingInline: lg }
                - name: paragraph
                  properties:
                    text: Work together in real time with shared workspaces, inline comments, and instant notifications. Keep everyone aligned no matter where they are.
                    typography: { size: md, color: *color-secondary, lineHeight: '1.7' }
                    spacing: { marginBlock: sm }
                - name: button
                  properties:
                    text: Learn More
                    appearance:
                      background: { color: *color-accent }
                      radius: md
                    typography: { color: *color-background, weight: semibold, size: sm }

        # Row 2 — Text Left, Image Right
        - name: layout-row
          properties:
            layout:
              horizontalAlign: space-evenly
              verticalAlign: center
              wrap: wrap
              gap: lg
            appearance: { background: { color: '#f9fafb', opacity: 100 } }
            spacing: { paddingBlock: xl, paddingInline: lg }
          components:
            - name: layout-column
              properties:
                layout: { widthMode: "50", horizontalAlign: left, gap: sm }
                appearance: { background: { opacity: 0 } }
              components:
                - name: eyebrow
                  properties:
                    text: AUTOMATE
                    typography: { size: xs, weight: semibold, color: '#10b981', transform: uppercase, letterSpacing: wider }
                - name: heading
                  properties:
                    text: Intelligent Automation
                    level: 3
                    typography: { size: xl, weight: bold, color: *color-primary }
                    spacing: { marginBlock: xs, paddingBlock: sm, paddingInline: lg }
                - name: paragraph
                  properties:
                    text: Eliminate repetitive tasks with smart automation rules. Set triggers, define workflows, and let the platform handle the rest while you focus on strategy.
                    typography: { size: md, color: *color-secondary, lineHeight: '1.7' }
                    spacing: { marginBlock: sm }
                - name: button
                  properties:
                    text: See How It Works
                    appearance:
                      background: { color: '#10b981' }
                      radius: md
                    typography: { color: *color-background, weight: semibold, size: sm }
            - name: image
              properties:
                source:
                  url: https://images.pexels.com/photos/546819/pexels-photo-546819.jpeg?auto=compress&cs=tinysrgb&w=800
                  altText: Code automation workflow
                appearance:
                  minHeight: 20
                  fit: cover
                  cornerStyle: md
                layout:
                  widthMode: "50"

        # Row 3 — Image Left, Text Right
        - name: layout-row
          properties:
            layout:
              horizontalAlign: space-evenly
              verticalAlign: center
              wrap: wrap
              gap: lg
            spacing: { paddingBlock: xl, paddingInline: lg }
          components:
            - name: image
              properties:
                source:
                  url: https://images.pexels.com/photos/590022/pexels-photo-590022.jpeg?auto=compress&cs=tinysrgb&w=800
                  altText: Analytics dashboard on screen
                appearance:
                  minHeight: 20
                  fit: cover
                  cornerStyle: md
                layout:
                  widthMode: "50"
            - name: layout-column
              properties:
                layout: { widthMode: "50", horizontalAlign: left, gap: sm }
                appearance: { background: { opacity: 0 } }
              components:
                - name: eyebrow
                  properties:
                    text: ANALYZE
                    typography: { size: xs, weight: semibold, color: '#8b5cf6', transform: uppercase, letterSpacing: wider }
                - name: heading
                  properties:
                    text: Actionable Insights
                    level: 3
                    typography: { size: xl, weight: bold, color: *color-primary }
                    spacing: { marginBlock: xs, paddingBlock: sm, paddingInline: lg }
                - name: paragraph
                  properties:
                    text: Make data-driven decisions with powerful analytics dashboards. Track key metrics, identify trends, and uncover opportunities for growth.
                    typography: { size: md, color: *color-secondary, lineHeight: '1.7' }
                    spacing: { marginBlock: sm }
                - name: button
                  properties:
                    text: View Analytics
                    appearance:
                      background: { color: '#8b5cf6' }
                      radius: md
                    typography: { color: *color-background, weight: semibold, size: sm }
