# Categorized Tabs FAQ Section — Organized by Topic
# A FAQ section using tabs to organize questions into categories with each tab containing an accordion of topic-specific question-answer pairs for easy navigation
# Base components: layout-row, layout-column, tabs, accordion, heading, paragraph, eyebrow
# Section type: faq
# Layout: stacked
# Visual style: modern_minimalist
# Perfect for: SaaS platform, online store, consulting firm, dental clinic, law firm, tutoring center, real estate agency, insurance company, software company, subscription service


- name: site
  properties:
    theme:
      fonts:
        heading: &font-heading "'Inter', sans-serif"
        content: &font-content "'Inter', sans-serif"
      colors:
        primary: &color-primary '#0f172a'
        text: &color-text '#2B2F3B'
        secondary: &color-secondary '#64748b'
        accent: &color-accent '#8b5cf6'
        background: &color-background '#fafafe'
  components:
    - name: page
      slug: home
      title: "02 Categorized Tabs FAQ"
      properties:
        appearance: { background: { color: *color-background } }
        spacing: { paddingInline: lg }
      components:
        - name: layout-column
          properties:
            layout: { horizontalAlign: center, gap: md }
            appearance: { background: { color: *color-background, opacity: 100 } }
            spacing: { paddingBlock: xxl, paddingInline: lg }
          components:
            - name: eyebrow
              properties:
                text: HELP CENTER
                typography:
                  size: xs
                  weight: semibold
                  color: *color-accent
                  transform: uppercase
                  letterSpacing: wider
                  align: center

            - name: heading
              properties:
                text: Find Answers by Topic
                level: 2
                typography:
                  size: xxxl
                  weight: extrabold
                  color: *color-primary
                  align: center
                  letterSpacing: tight
                  lineHeight: "1.2"
                spacing: { marginBlock: sm }

            - name: paragraph
              properties:
                text: Browse our most frequently asked questions organized by category. Select a topic below to find the answers you need.
                typography:
                  size: md
                  color: *color-secondary
                  align: center
                spacing: { marginBlock: sm }
                layout: { widthMode: "66" }

            - name: tabs
              properties:
                layout: { orientation: horizontal, widthMode: "75" }
                typography:
                  label:
                    size: sm
                    weight: semibold
                    active: { color: *color-accent }
                    inactive: { color: *color-secondary }
                appearance:
                  tab:
                    background: { active: *color-background, inactive: *color-background }
                    border: { width: 2, style: solid, position: lower }
                  content:
                    background: { color: *color-background, opacity: 100 }
                    padding: { block: lg, inline: md }
                  shadow: none
                spacing: { marginBlock: md, paddingBlock: sm, paddingInline: sm }
              tabs:
                - title: Getting Started
                  components:
                    - name: accordion
                      properties:
                        behavior:
                          allowMultipleOpen: false
                        appearance:
                          border:
                            position: bottom
                          radius: sm
                      items:
                        - title: "How do I create an account?"
                          components:
                            - name: paragraph
                              properties:
                                text: Click the "Sign Up" button on our homepage and fill in your email, name, and password. You'll receive a verification email within minutes. Once verified, you can start using the platform immediately.
                                typography:
                                  size: sm
                                  color: *color-secondary
                                  lineHeight: "1.7"

                        - title: "What are the system requirements?"
                          components:
                            - name: paragraph
                              properties:
                                text: Our platform runs entirely in the browser, so you just need a modern web browser like Chrome, Firefox, Safari, or Edge. We support the latest two versions of each browser. No software installation required.
                                typography:
                                  size: sm
                                  color: *color-secondary
                                  lineHeight: "1.7"

                        - title: "Is there an onboarding tutorial?"
                          components:
                            - name: paragraph
                              properties:
                                text: Yes! After signing up, you'll be guided through an interactive onboarding tour that covers all the key features. We also have a comprehensive video library and documentation center available at any time.
                                typography:
                                  size: sm
                                  color: *color-secondary
                                  lineHeight: "1.7"

                        - title: "Can I import data from other platforms?"
                          components:
                            - name: paragraph
                              properties:
                                text: Absolutely. We support CSV, JSON, and direct API imports from popular platforms. Our import wizard walks you through the process step by step, and our team is available to help with large-scale migrations.
                                typography:
                                  size: sm
                                  color: *color-secondary
                                  lineHeight: "1.7"

                - title: Billing & Plans
                  components:
                    - name: accordion
                      properties:
                        behavior:
                          allowMultipleOpen: false
                        appearance:
                          border:
                            position: bottom
                          radius: sm
                      items:
                        - title: "What plans do you offer?"
                          components:
                            - name: paragraph
                              properties:
                                text: We offer three plans — Starter (free), Professional ($29/month), and Enterprise (custom pricing). Each plan includes different feature sets and usage limits. Annual billing saves you 20% compared to monthly.
                                typography:
                                  size: sm
                                  color: *color-secondary
                                  lineHeight: "1.7"

                        - title: "How do I upgrade or downgrade my plan?"
                          components:
                            - name: paragraph
                              properties:
                                text: You can change your plan at any time from the Billing section in your account settings. Upgrades take effect immediately with prorated charges. Downgrades apply at the start of your next billing cycle.
                                typography:
                                  size: sm
                                  color: *color-secondary
                                  lineHeight: "1.7"

                        - title: "Do you offer discounts for nonprofits?"
                          components:
                            - name: paragraph
                              properties:
                                text: Yes, we offer a 50% discount on all paid plans for verified nonprofit organizations and educational institutions. Contact our sales team with proof of status to get your discount code.
                                typography:
                                  size: sm
                                  color: *color-secondary
                                  lineHeight: "1.7"

                        - title: "What happens if my payment fails?"
                          components:
                            - name: paragraph
                              properties:
                                text: If a payment fails, we'll notify you via email and retry the charge after 3 days. You'll have a 14-day grace period to update your payment method before your account is downgraded to the free tier. No data is ever deleted.
                                typography:
                                  size: sm
                                  color: *color-secondary
                                  lineHeight: "1.7"

                - title: Technical Support
                  components:
                    - name: accordion
                      properties:
                        behavior:
                          allowMultipleOpen: false
                        appearance:
                          border:
                            position: bottom
                          radius: sm
                      items:
                        - title: "How do I reset my password?"
                          components:
                            - name: paragraph
                              properties:
                                text: Click "Forgot Password" on the login page and enter your email address. You'll receive a password reset link within a few minutes. The link expires after 24 hours for security. If you don't see the email, check your spam folder.
                                typography:
                                  size: sm
                                  color: *color-secondary
                                  lineHeight: "1.7"

                        - title: "Why is the platform running slowly?"
                          components:
                            - name: paragraph
                              properties:
                                text: Performance issues are usually related to browser cache or extensions. Try clearing your browser cache, disabling extensions, or using an incognito window. If the issue persists, check our status page for any ongoing incidents.
                                typography:
                                  size: sm
                                  color: *color-secondary
                                  lineHeight: "1.7"

                        - title: "How do I enable two-factor authentication?"
                          components:
                            - name: paragraph
                              properties:
                                text: Navigate to Settings > Security > Two-Factor Authentication and click "Enable." You can use an authenticator app like Google Authenticator or Authy. We also support SMS verification as a backup method.
                                typography:
                                  size: sm
                                  color: *color-secondary
                                  lineHeight: "1.7"

                        - title: "Do you have an API I can integrate with?"
                          components:
                            - name: paragraph
                              properties:
                                text: Yes, we offer a RESTful API available on Professional and Enterprise plans. Full API documentation, SDKs for popular languages, and webhooks are available in our developer portal. Rate limits vary by plan.
                                typography:
                                  size: sm
                                  color: *color-secondary
                                  lineHeight: "1.7"
