# Two-Column Accordion FAQ — Dual Category Side by Side Layout
# A two-column FAQ section using layout-row with two layout-columns each containing a categorized accordion, splitting General and Technical questions for organized browsing
# Base components: layout-row, layout-column, accordion, heading, paragraph, eyebrow
# Section type: faq
# Layout: split_screen, grid
# Visual style: modern, card_based
# Perfect for: SaaS platform, online store, consulting firm, dental clinic, law firm, tutoring center, real estate agency, insurance company, software company, subscription service


- name: site
  properties:
    theme:
      fonts:
        heading: &font-heading "'Inter', sans-serif"
        content: &font-content "'Inter', sans-serif"
      colors:
        primary: &color-primary '#1e293b'
        text: &color-text '#343A45'
        secondary: &color-secondary '#64748b'
        accent: &color-accent '#3b82f6'
        background: &color-background '#f8fafc'
  components:
    - name: page
      slug: home
      title: "03 Two Column FAQ"
      properties:
        appearance: { background: { color: *color-background } }
        spacing: { paddingInline: lg }
      components:
        - name: layout-column
          properties:
            layout: { horizontalAlign: center, gap: md }
            appearance: { background: { color: *color-background, transparency: 100 } }
            spacing: { paddingBlock: xxl, paddingInline: lg }
          components:
            - name: eyebrow
              properties:
                text: FAQ
                typography:
                  size: xs
                  weight: semibold
                  color: *color-accent
                  transform: uppercase
                  letterSpacing: wider
                  align: center

            - name: heading
              properties:
                text: Frequently Asked Questions
                level: 2
                typography:
                  size: xxxl
                  weight: extrabold
                  color: *color-primary
                  align: center
                  letterSpacing: tight
                  lineHeight: "1.2"
                spacing: { marginBlock: sm }

            - name: paragraph
              properties:
                text: Find answers organized by category. Browse general questions on the left and technical questions on the right.
                typography:
                  size: md
                  color: *color-secondary
                  align: center
                spacing: { marginBlock: sm }
                layout: { widthMode: "66" }

            - name: layout-row
              properties:
                layout:
                  horizontalAlign: center
                  verticalAlign: top
                  gap: lg
                  wrap: nowrap
                appearance:
                  background: { transparency: 0 }
                spacing: { marginBlock: lg }
              components:
                # Left Column — General Questions
                - name: layout-column
                  properties:
                    layout: { horizontalAlign: left, gap: md, widthMode: "50" }
                    appearance:
                      background: { color: '#ffffff', transparency: 100 }
                      radius: lg
                      shadow: soft
                    spacing:
                      paddingBlock: lg
                      paddingInline: lg
                  components:
                    - name: heading
                      properties:
                        text: General Questions
                        level: 3
                        typography:
                          size: lg
                          weight: bold
                          color: *color-primary
                        spacing: { marginBlock: xs }

                    - name: accordion
                      properties:
                        behavior:
                          allowMultipleOpen: false
                        appearance:
                          border:
                            position: bottom
                          radius: sm
                      items:
                        - title: "What is your product and who is it for?"
                          components:
                            - name: paragraph
                              properties:
                                text: Our platform is an all-in-one solution designed for teams of all sizes. Whether you are a solo freelancer, a growing startup, or an enterprise organization, our tools help you streamline workflows, collaborate effectively, and deliver results faster.
                                typography:
                                  size: sm
                                  color: *color-secondary
                                  lineHeight: "1.7"

                        - title: "How much does it cost?"
                          components:
                            - name: paragraph
                              properties:
                                text: We offer a free tier for individuals, a Professional plan at $19/month, and an Enterprise plan with custom pricing. All paid plans come with a 14-day free trial. Annual billing gives you two months free compared to monthly billing.
                                typography:
                                  size: sm
                                  color: *color-secondary
                                  lineHeight: "1.7"

                        - title: "Do you offer a money-back guarantee?"
                          components:
                            - name: paragraph
                              properties:
                                text: Yes, we offer a full 30-day money-back guarantee on all paid plans. If our product does not meet your expectations, contact support within 30 days and we will process a complete refund with no questions asked.
                                typography:
                                  size: sm
                                  color: *color-secondary
                                  lineHeight: "1.7"

                # Right Column — Technical Questions
                - name: layout-column
                  properties:
                    layout: { horizontalAlign: left, gap: md, widthMode: "50" }
                    appearance:
                      background: { color: '#ffffff', transparency: 100 }
                      radius: lg
                      shadow: soft
                    spacing:
                      paddingBlock: lg
                      paddingInline: lg
                  components:
                    - name: heading
                      properties:
                        text: Technical Questions
                        level: 3
                        typography:
                          size: lg
                          weight: bold
                          color: *color-primary
                        spacing: { marginBlock: xs }

                    - name: accordion
                      properties:
                        behavior:
                          allowMultipleOpen: false
                        appearance:
                          border:
                            position: bottom
                          radius: sm
                      items:
                        - title: "What are the system requirements?"
                          components:
                            - name: paragraph
                              properties:
                                text: Our platform is entirely cloud-based and runs in any modern browser including Chrome, Firefox, Safari, and Edge. No downloads or plugins are required. We recommend a stable internet connection and a screen resolution of at least 1280x720 for the best experience.
                                typography:
                                  size: sm
                                  color: *color-secondary
                                  lineHeight: "1.7"

                        - title: "Do you provide an API for integrations?"
                          components:
                            - name: paragraph
                              properties:
                                text: Yes, we offer a comprehensive RESTful API available on Professional and Enterprise plans. Our developer documentation includes SDKs for JavaScript, Python, and Ruby, along with webhook support for real-time event notifications.
                                typography:
                                  size: sm
                                  color: *color-secondary
                                  lineHeight: "1.7"

                        - title: "How do you handle data security?"
                          components:
                            - name: paragraph
                              properties:
                                text: All data is encrypted at rest with AES-256 and in transit with TLS 1.3. We are SOC 2 Type II certified and GDPR compliant. Our infrastructure runs on AWS with automatic backups, and we conduct regular third-party penetration testing.
                                typography:
                                  size: sm
                                  color: *color-secondary
                                  lineHeight: "1.7"
