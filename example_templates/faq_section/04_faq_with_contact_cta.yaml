# FAQ with Contact Call-to-Action — Questions and Support Banner
# A vertically stacked FAQ section with a five-item accordion on top followed by a prominent call-to-action bar inviting users to contact support if their question was not answered
# Base components: layout-column, accordion, heading, paragraph, eyebrow, button, br, icon
# Section type: faq, cta, contact
# Layout: stacked, centered
# Visual style: modern_minimalist
# Perfect for: SaaS platform, online store, consulting firm, dental clinic, law firm, tutoring center, real estate agency, insurance company, software company, subscription service


- name: site
  properties:
    theme:
      fonts:
        heading: &font-heading "'Inter', sans-serif"
        content: &font-content "'Inter', sans-serif"
      colors:
        primary: &color-primary '#1e293b'
        text: &color-text '#343A45'
        secondary: &color-secondary '#64748b'
        accent: &color-accent '#7c3aed'
        background: &color-background '#ffffff'
  components:
    - name: page
      slug: home
      title: "04 FAQ With Contact CTA"
      properties:
        appearance: { background: { color: *color-background } }
        spacing: { paddingInline: lg }
      components:
        - name: layout-column
          properties:
            layout: { horizontalAlign: center, gap: md }
            appearance: { background: { color: *color-background, opacity: 100 } }
            spacing: { paddingBlock: xxl, paddingInline: lg }
          components:
            # Section Header
            - name: eyebrow
              properties:
                text: HELP CENTER
                typography:
                  size: xs
                  weight: semibold
                  color: *color-accent
                  transform: uppercase
                  letterSpacing: wider
                  align: center

            - name: heading
              properties:
                text: "Frequently Asked Questions"
                level: 2
                typography:
                  size: xxxl
                  weight: extrabold
                  color: *color-primary
                  align: center
                  letterSpacing: tight
                  lineHeight: "1.2"
                spacing: { marginBlock: sm }

            - name: paragraph
              properties:
                text: Browse our most commonly asked questions below. If you still need help, our support team is ready to assist you.
                typography:
                  size: md
                  color: *color-secondary
                  align: center
                spacing: { marginBlock: sm }
                layout: { widthMode: "66" }

            # FAQ Accordion
            - name: accordion
              properties:
                behavior:
                  allowMultipleOpen: false
                appearance:
                  border:
                    position: bottom
                  radius: sm
                spacing: { marginBlock: md }
                layout: { widthMode: "66" }
              items:
                - title: "How do I create an account?"
                  components:
                    - name: paragraph
                      properties:
                        text: Click the Sign Up button on our homepage and enter your email, name, and password. You will receive a verification email within minutes. Once verified, you can start using the platform immediately with access to all free-tier features.
                        typography:
                          size: sm
                          color: *color-secondary
                          lineHeight: "1.7"

                - title: "What payment methods do you accept?"
                  components:
                    - name: paragraph
                      properties:
                        text: We accept all major credit cards including Visa, Mastercard, and American Express. PayPal is also supported for all plans. Enterprise customers can pay via invoice with NET 30 terms. All transactions are processed securely through Stripe.
                        typography:
                          size: sm
                          color: *color-secondary
                          lineHeight: "1.7"

                - title: "Can I upgrade or downgrade my plan?"
                  components:
                    - name: paragraph
                      properties:
                        text: Yes, you can change your plan at any time from your account settings. Upgrades take effect immediately with prorated billing for the remainder of your cycle. Downgrades apply at the start of your next billing period and no data is ever lost.
                        typography:
                          size: sm
                          color: *color-secondary
                          lineHeight: "1.7"

                - title: "Is there a free trial available?"
                  components:
                    - name: paragraph
                      properties:
                        text: Absolutely. Every paid plan includes a 14-day free trial with full access to all features. No credit card is required to start your trial. At the end of the period, you can choose a plan or continue with our generous free tier.
                        typography:
                          size: sm
                          color: *color-secondary
                          lineHeight: "1.7"

                - title: "How do I cancel my subscription?"
                  components:
                    - name: paragraph
                      properties:
                        text: You can cancel your subscription at any time from the Billing section in your account settings. There are no cancellation fees or long-term contracts. Your access continues until the end of your current billing period, and all your data remains available.
                        typography:
                          size: sm
                          color: *color-secondary
                          lineHeight: "1.7"

            # Divider
            - name: br
              properties:
                appearance:
                  style: solid
                  color: *color-secondary
                  opacity: 20
                spacing: { marginBlock: lg, paddingBlock: xl, paddingInline: xl }
                layout: { widthMode: "66" }

            # Contact CTA Bar
            - name: layout-column
              properties:
                layout: { horizontalAlign: center, gap: sm }
                appearance:
                  background: { color: *color-accent, opacity: 100 }
                  radius: lg
                spacing: { marginBlock: sm }
                layout: { widthMode: "66" }
              components:
                - name: icon
                  properties:
                    icon: mail
                    appearance:
                      size: xl
                      color: *color-background

                - name: heading
                  properties:
                    text: "Still have questions?"
                    level: 3
                    typography:
                      size: xl
                      weight: bold
                      color: *color-background
                      align: center
                    spacing: { marginBlock: xs }

                - name: paragraph
                  properties:
                    text: "We are here to help. Reach out to our support team and we will get back to you within a few hours."
                    typography:
                      size: md
                      color: *color-background
                      align: center
                    spacing: { marginBlock: sm }

                - name: button
                  properties:
                    text: Contact Us
                    layout: { widthMode: fit }
                    appearance:
                      background: { color: *color-background }
                      radius: md
                    typography:
                      color: *color-accent
                      weight: semibold
                      size: sm
