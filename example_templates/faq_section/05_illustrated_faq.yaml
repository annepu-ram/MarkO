# Illustrated Split-Screen FAQ — Image Left Accordion Right
# A split-screen FAQ section with a large illustration image and heading on the left and a five-item accordion of expandable questions on the right using a 50/50 layout-row for visual balance
# Base components: layout-row, layout-column, accordion, heading, paragraph, eyebrow, image
# Section type: faq
# Layout: split_screen
# Visual style: modern, minimal
# Perfect for: SaaS platform, online store, consulting firm, dental clinic, law firm, tutoring center, real estate agency, insurance company, software company, subscription service


- name: site
  properties:
    theme:
      fonts:
        heading: &font-heading "'Inter', sans-serif"
        content: &font-content "'Inter', sans-serif"
      colors:
        primary: &color-primary '#0f172a'
        text: &color-text '#2B2F3B'
        secondary: &color-secondary '#64748b'
        accent: &color-accent '#2563eb'
        background: &color-background '#ffffff'
  components:
    - name: page
      slug: home
      title: "05 Illustrated FAQ"
      properties:
        appearance: { background: { color: *color-background } }
        spacing: { paddingInline: lg }
      components:
        - name: layout-row
          properties:
            layout:
              horizontalAlign: center
              verticalAlign: center
              gap: xl
              wrap: nowrap
            appearance: { background: { color: *color-background, transparency: 100 } }
            spacing: { paddingBlock: xxl, paddingInline: lg }
          components:
            # Left Column — Illustration and Heading
            - name: layout-column
              properties:
                layout: { horizontalAlign: left, gap: md, widthMode: "50" }
                appearance:
                  background: { transparency: 0 }
              components:
                - name: eyebrow
                  properties:
                    text: FAQ
                    typography:
                      size: xs
                      weight: semibold
                      color: *color-accent
                      transform: uppercase
                      letterSpacing: wider

                - name: heading
                  properties:
                    text: "Questions? We have answers."
                    level: 2
                    typography:
                      size: xxxl
                      weight: extrabold
                      color: *color-primary
                      letterSpacing: tight
                      lineHeight: "1.2"
                    spacing: { marginBlock: sm }

                - name: paragraph
                  properties:
                    text: Everything you need to know about getting started. Browse the most common questions or reach out to our team for personalized help.
                    typography:
                      size: md
                      color: *color-secondary
                      lineHeight: "1.6"
                    spacing: { marginBlock: sm }

                - name: image
                  properties:
                    src: "https://images.pexels.com/photos/3184291/pexels-photo-3184291.jpeg?auto=compress&cs=tinysrgb&w=800"
                    alt: "Team collaborating on answers"
                    appearance:
                      radius: lg
                      aspectRatio: "4:3"
                      objectFit: cover
                    spacing: { marginBlock: md }

            # Right Column — Accordion FAQ
            - name: layout-column
              properties:
                layout: { horizontalAlign: left, gap: md, widthMode: "50" }
                appearance:
                  background: { transparency: 0 }
              components:
                - name: heading
                  properties:
                    text: Common Questions
                    level: 3
                    typography:
                      size: lg
                      weight: bold
                      color: *color-primary
                    spacing: { marginBlock: xs }

                - name: accordion
                  properties:
                    behavior:
                      allowMultipleOpen: false
                    appearance:
                      border:
                        position: bottom
                      radius: sm
                  items:
                    - title: "How do I get started with the platform?"
                      components:
                        - name: paragraph
                          properties:
                            text: Getting started is simple. Create a free account, follow our interactive onboarding guide, and you will be set up in under five minutes. We also offer live onboarding sessions every weekday for new users who prefer a guided walkthrough.
                            typography:
                              size: sm
                              color: *color-secondary
                              lineHeight: "1.7"

                    - title: "What integrations do you support?"
                      components:
                        - name: paragraph
                          properties:
                            text: We integrate with over 100 popular tools including Slack, Google Workspace, Microsoft Teams, Salesforce, HubSpot, and Zapier. Our open API also lets you build custom integrations tailored to your specific workflow requirements.
                            typography:
                              size: sm
                              color: *color-secondary
                              lineHeight: "1.7"

                    - title: "Can I try before I buy?"
                      components:
                        - name: paragraph
                          properties:
                            text: Yes, every paid plan comes with a 14-day free trial that gives you full access to all features. No credit card is needed to start. At the end of the trial you can select a plan or continue using our free tier at no cost.
                            typography:
                              size: sm
                              color: *color-secondary
                              lineHeight: "1.7"

                    - title: "What level of support is included?"
                      components:
                        - name: paragraph
                          properties:
                            text: All plans include access to our help center and community forum. Professional plans add priority email support with a four-hour response guarantee. Enterprise customers get 24/7 phone support and a dedicated customer success manager.
                            typography:
                              size: sm
                              color: *color-secondary
                              lineHeight: "1.7"

                    - title: "Is my data safe and private?"
                      components:
                        - name: paragraph
                          properties:
                            text: Security is fundamental to our platform. We use AES-256 encryption at rest, TLS 1.3 in transit, and maintain SOC 2 Type II certification. We are fully GDPR compliant, perform regular penetration testing, and never share your data with third parties.
                            typography:
                              size: sm
                              color: *color-secondary
                              lineHeight: "1.7"
