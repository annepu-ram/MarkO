# Claymorphism CTA Banner
# Soft clay-style call-to-action with bubbly rounded container and pastel tones
# Base components: site, page, layout-column, layout-row, heading, paragraph, button
# Section type: cta
# Layout: centered
# Visual style: claymorphism
# Content volume: standard
# Tone: playful
# Conversion intent: lead
# Image requirement: none
# Interactivity: static
# Industries: saas, portfolio, health, education
# Perfect for: education, health, SaaS platform, creative portfolio, children's app

- name: site
  properties:
    theme:
      fonts:
        heading: "'Poppins', sans-serif"
        content: "'Nunito Sans', sans-serif"
      colors:
        primary: &color-primary '#4A1942'
        text: &color-text '#4E3149'
        secondary: &color-secondary '#9D5094'
        accent: &color-accent '#FF1493'
        background: &color-background '#FFD6E6'
  components:
    - name: page
      slug: home
      title: "Claymorphism CTA Banner"
      properties:
        appearance:
          background:
            color: *color-background
            opacity: 100
      components:

        # Outer section wrapper
        - name: layout-row
          properties:
            layout:
              horizontalAlign: center
            spacing:
              paddingBlock: xxl
              paddingInline: lg
          components:

            # Clay CTA card container
            - name: layout-column
              properties:
                layout:
                  widthMode: '75'
                  horizontalAlign: center
                  gap: md
                appearance:
                  background:
                    color: '#ffffff'
                    opacity: 100
                  radius: xxl
                  shadow: elevated
                  border:
                    width: 0
                spacing:
                  paddingBlock: xxl
                  paddingInline: xxl
              components:

                # Eyebrow
                - name: eyebrow
                  properties:
                    text: Get Started Today
                    typography:
                      size: xs
                      weight: semibold
                      color: *color-accent
                      transform: none
                      letterSpacing: wider
                      align: center

                # Main heading
                - name: heading
                  properties:
                    text: Start your journey today
                    level: 2
                    typography:
                      size: xxxl
                      weight: bold
                      color: *color-primary
                      align: center
                      lineHeight: snug
                    spacing:
                      marginBlock: sm

                # Supporting paragraph
                - name: paragraph
                  properties:
                    text: |
                      Join thousands of happy creators, learners, and builders who discovered
                      a better, more joyful way to bring their ideas to life. No experience needed.
                    typography:
                      size: lg
                      color: *color-secondary
                      align: center
                      lineHeight: relaxed
                    spacing:
                      marginBlock: md

                # CTA buttons row
                - name: layout-row
                  properties:
                    layout:
                      horizontalAlign: center
                      verticalAlign: center
                      wrap: wrap
                      gap: md
                    spacing:
                      marginBlock: md
                  components:
                    - name: button
                      properties:
                        text: Try It Free
                        appearance:
                          background:
                            color: *color-accent
                            opacity: 100
                          border:
                            width: 0
                          radius: pill
                          shadow: medium
                        typography:
                          color: '#ffffff'
                          weight: bold
                          size: md
                        spacing:
                          paddingBlock: md
                          paddingInline: xxl
                    - name: button
                      properties:
                        text: See How It Works
                        appearance:
                          background:
                            color: '#F5F0FF'
                            opacity: 100
                          border:
                            width: 0
                          radius: pill
                          shadow: medium
                        typography:
                          color: *color-primary
                          weight: bold
                          size: md
                        spacing:
                          paddingBlock: md
                          paddingInline: xxl
