# Modern Minimalist CTA Banner (Ink & Paper)
# Clean indigo call-to-action with white text and minimal layout
# Base components: site, page, layout-column, layout-row, heading, paragraph, button, eyebrow
# Section type: cta
# Layout: centered
# Visual style: modern_minimalist
# Content volume: standard
# Tone: neutral
# Conversion intent: lead
# Image requirement: none
# Interactivity: static
# Industries: saas, ecommerce, portfolio
# Perfect for: SaaS product, design tool, productivity app, developer platform, agency

- name: site
  properties:
    theme:
      fonts:
        heading: &font-heading "'Outfit', sans-serif"
        content: &font-content "'Inter', sans-serif"
      colors:
        primary: &color-primary "#1F2937"
        text: &color-text "#4B5563"
        secondary: &color-secondary "#D1D5DB"
        accent: &color-accent "#4F46E5"
        background: &color-background "#FFFFFF"
  components:
    - name: page
      slug: home
      title: "Modern Minimalist CTA"
      properties:
        appearance:
          background:
            color: *color-background
            opacity: 100
      components:

        # CTA section — accent indigo background
        - name: layout-column
          properties:
            layout:
              horizontalAlign: center
            spacing:
              paddingBlock: xxxl
              paddingInline: lg
          components:

            # Inner container with accent background
            - name: layout-column
              properties:
                layout:
                  widthMode: "83"
                  horizontalAlign: center
                  gap: md
                appearance:
                  background:
                    color: *color-accent
                    opacity: 100
                  radius: sm
                  shadow: soft
                  border:
                    width: 0
                spacing:
                  paddingBlock: xxxl
                  paddingInline: xxl
              components:

                # Eyebrow
                - name: eyebrow
                  properties:
                    text: "Get Started Today"
                    typography:
                      size: xs
                      weight: semibold
                      color: *color-background
                      transform: uppercase
                      letterSpacing: wider
                      align: center

                # Main heading
                - name: heading
                  properties:
                    text: "Ready to simplify your workflow?"
                    level: 2
                    typography:
                      size: xxl
                      weight: semibold
                      color: *color-background
                      align: center
                      lineHeight: snug

                # Supporting paragraph
                - name: paragraph
                  properties:
                    text: |
                      Join over 10,000 teams who have already made the switch. Set up takes
                      less than five minutes and your first 14 days are completely free.
                    typography:
                      size: md
                      color: *color-background
                      align: center
                      lineHeight: relaxed
                    layout:
                      widthMode: "75"

                # CTA buttons
                - name: layout-row
                  properties:
                    layout:
                      horizontalAlign: center
                      verticalAlign: center
                      wrap: wrap
                      gap: md
                    spacing:
                      marginBlock: md
                  components:
                    - name: button
                      properties:
                        text: "Start Free Trial"
                        appearance:
                          background:
                            color: *color-background
                            opacity: 100
                          border:
                            width: 0
                          radius: sm
                          shadow: none
                        typography:
                          color: *color-accent
                          weight: semibold
                          size: md
                        spacing:
                          paddingBlock: md
                          paddingInline: xxl
                    - name: button
                      properties:
                        text: "Talk to Sales"
                        appearance:
                          background:
                            color: transparent
                            opacity: 0
                          border:
                            width: 1
                            style: solid
                            color: *color-background
                          radius: sm
                          shadow: none
                        typography:
                          color: *color-background
                          weight: medium
                          size: md
                        spacing:
                          paddingBlock: md
                          paddingInline: xxl

                # Trust line
                - name: layout-row
                  properties:
                    layout:
                      horizontalAlign: center
                      verticalAlign: center
                      wrap: wrap
                      gap: lg
                    spacing:
                      marginBlock: sm
                  components:
                    - name: paragraph
                      properties:
                        text: "No credit card required"
                        typography:
                          size: xs
                          color: *color-background
                          weight: regular
                          align: center
                    - name: paragraph
                      properties:
                        text: "14-day free trial"
                        typography:
                          size: xs
                          color: *color-background
                          weight: regular
                          align: center
                    - name: paragraph
                      properties:
                        text: "Cancel anytime"
                        typography:
                          size: xs
                          color: *color-background
                          weight: regular
                          align: center
