# Elegant Luxury CTA Banner
# Dark refined call-to-action with gold typography and border accents
# Base components: site, page, layout-column, layout-row, heading, paragraph, button, eyebrow
# Section type: cta
# Layout: centered
# Visual style: elegant_luxury
# Content volume: standard
# Tone: formal
# Conversion intent: lead
# Image requirement: none
# Interactivity: static
# Industries: beauty, restaurant, portfolio, realestate, hospitality
# Perfect for: Jewelry, hotel, fashion, interior design, real estate, spa, fine dining, wedding

- name: site
  properties:
    theme:
      fonts:
        heading: &font-heading "'Playfair Display', serif"
        content: &font-content "'Inter', sans-serif"
      colors:
        primary: &color-primary "#1A1A1A"
        text: &color-text "#4A4A4A"
        secondary: &color-secondary "#D4AF37"
        accent: &color-accent "#B8860B"
        background: &color-background "#FFFDF7"
  components:
    - name: page
      slug: home
      title: "Elegant Luxury CTA"
      properties:
        appearance:
          background:
            color: *color-background
            opacity: 100
      components:

        # CTA section — dark primary background with gold text
        - name: layout-column
          properties:
            layout:
              horizontalAlign: center
            appearance:
              background:
                color: *color-primary
                opacity: 100
              border:
                width: 0
              radius: none
              shadow: none
            spacing:
              paddingBlock: xxxl
              paddingInline: lg
          components:

            # Inner content
            - name: layout-column
              properties:
                layout:
                  widthMode: "66"
                  horizontalAlign: center
                  gap: md
              components:

                # Decorative eyebrow
                - name: eyebrow
                  properties:
                    text: "By Invitation Only"
                    typography:
                      size: xs
                      weight: regular
                      color: *color-background
                      letterSpacing: wider
                      transform: uppercase
                      align: center

                # Main heading — light on dark
                - name: heading
                  properties:
                    text: "Experience the extraordinary"
                    level: 2
                    typography:
                      size: xxl
                      weight: light
                      color: *color-background
                      align: center
                      lineHeight: snug
                      letterSpacing: wider
                      transform: uppercase

                # Supporting paragraph
                - name: paragraph
                  properties:
                    text: |
                      Reserve your private consultation and discover how our artisans
                      can bring your vision to life. Limited appointments available
                      each season to ensure the highest standard of personal attention.
                    typography:
                      size: md
                      color: "#B0B0B0"
                      align: center
                      lineHeight: relaxed
                    layout:
                      widthMode: "83"
                    spacing:
                      marginBlock: md

                # CTA buttons
                - name: layout-row
                  properties:
                    layout:
                      horizontalAlign: center
                      verticalAlign: center
                      wrap: wrap
                      gap: md
                    spacing:
                      marginBlock: md
                  components:
                    - name: button
                      properties:
                        text: "Reserve Now"
                        appearance:
                          background:
                            color: transparent
                            opacity: 0
                          border:
                            width: 1
                            style: solid
                            color: *color-background
                          radius: none
                          shadow: none
                        typography:
                          color: *color-background
                          weight: regular
                          size: md
                          letterSpacing: wider
                          transform: uppercase
                        spacing:
                          paddingBlock: md
                          paddingInline: xxl
                    - name: button
                      properties:
                        text: "View Catalogue"
                        appearance:
                          background:
                            color: transparent
                            opacity: 0
                          border:
                            width: 1
                            style: solid
                            color: *color-secondary
                          radius: none
                          shadow: none
                        typography:
                          color: *color-secondary
                          weight: regular
                          size: md
                          letterSpacing: wider
                          transform: uppercase
                        spacing:
                          paddingBlock: md
                          paddingInline: xxl
