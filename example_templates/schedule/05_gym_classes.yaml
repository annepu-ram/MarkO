# Gym Class Timetable - Weekly Fitness Schedule with Accordion
# A weekly fitness class schedule using accordion per day (Monday-Friday), each expanding to show classes with time, name, instructor, difficulty badge, and class type icon
# Base components: layout-column, heading, paragraph, eyebrow, accordion, badge, icon, caption
# Section type: schedule, event, agenda
# Layout: stacked
# Visual style: modern_minimalist
# Perfect for: gym, fitness studio, yoga studio, martial arts, dance studio, crossfit box, swimming pool, sports center


- name: site
  properties:
    theme:
      fonts:
        heading: &font-heading "'Inter', sans-serif"
        content: &font-content "'Inter', sans-serif"
      colors:
        primary: &color-primary '#111827'
        text: &color-text '#374151'
        secondary: &color-secondary '#D1D5DB'
        accent: &color-accent '#EF4444'
        background: &color-background '#F9FAFB'
  components:
  - name: page
    slug: home
    title: "Gym Class Timetable"
    properties:
      appearance: {background: {color: *color-background, opacity: 100}}
    components:

        # ============================================
        # TIMETABLE HEADER
        # ============================================
    - name: layout-column
      properties:
        layout: {horizontalAlign: space-evenly}
        appearance:
          background: {color: '#ffffff', opacity: 100}
        spacing:
          paddingBlock: xxl
          paddingInline: xl
      components:
      - name: icon
        properties:
          name: dumbbell
          size: 32
          color: *color-accent
      - name: eyebrow
        properties:
          text: WEEKLY SCHEDULE
          typography: {size: xs, weight: semibold, color: *color-accent, transform: uppercase, letterSpacing: wider}
          spacing: {marginBlock: xs}
      - name: heading
        properties:
          text: Class Timetable
          level: 2
          typography: {size: xxl, weight: semibold, color: *color-primary, align: center, letterSpacing: tight}
          spacing: {marginBlock: sm}
      - name: paragraph
        properties:
          text: Find the perfect class for your fitness goals. All levels welcome — from beginner-friendly sessions to advanced training.
          typography: {size: md, color: '#6B7280', align: center, lineHeight: '1.7'}
          layout: {widthMode: "66"}
          spacing: {marginBlock: md}

        # ============================================
        # DIFFICULTY LEGEND
        # ============================================
    - name: layout-column
      properties:
        layout: {horizontalAlign: center}
        appearance:
          background: {color: '#ffffff', opacity: 100}
        spacing:
          paddingBlock: sm
          paddingInline: xl
      components:
      - name: layout-row
        properties:
          layout: {horizontalAlign: space-evenly, verticalAlign: center}
          spacing: {marginBlock: sm}
        components:
        - name: badge
          properties:
            text: "Beginner"
            appearance: {background: {color: '#10B981'}, radius: pill}
            typography: {color: '#ffffff', size: xs, weight: semibold}
        - name: badge
          properties:
            text: "Intermediate"
            appearance: {background: {color: '#F59E0B'}, radius: pill}
            typography: {color: '#ffffff', size: xs, weight: semibold}
        - name: badge
          properties:
            text: "Advanced"
            appearance: {background: {color: *color-accent}, radius: pill}
            typography: {color: '#ffffff', size: xs, weight: semibold}

        # ============================================
        # MONDAY
        # ============================================
    - name: layout-column
      properties:
        layout: {horizontalAlign: space-evenly}
        appearance:
          background: {color: '#ffffff', opacity: 100}
        spacing:
          paddingBlock: lg
          paddingInline: xl
      components:
      - name: accordion
        properties:
          behavior: {allowMultiple: true}
          appearance:
            background: {color: *color-background, opacity: 100}
            border: {width: 1, style: solid, color: *color-secondary}
            radius: sm
          typography:
            title: {size: md, weight: semibold, color: *color-primary}
