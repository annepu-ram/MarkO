# Salon Appointment Slots - Beauty & Spa Booking Schedule with Accordion
# A salon/spa booking schedule with accordion per service category (Hair, Nails, Facial, Massage), each expanding to show time slots with service name, duration + price, and availability badge
# Base components: layout-column, heading, paragraph, eyebrow, accordion, badge, caption
# Section type: schedule, appointment
# Layout: stacked
# Visual style: modern_minimalist
# Perfect for: salon, spa, barbershop, beauty studio, wellness center, nail bar, skincare clinic


- name: site
  properties:
    theme:
      fonts:
        heading: &font-heading "'Playfair Display', serif"
        content: &font-content "'Inter', sans-serif"
      colors:
        primary: &color-primary '#1C1917'
        text: &color-text '#44403C'
        secondary: &color-secondary '#D6D3D1'
        accent: &color-accent '#BE185D'
        background: &color-background '#FAFAF9'
  components:
  - name: page
    slug: home
    title: "Salon Appointment Slots"
    properties:
      appearance: {background: {color: *color-background, opacity: 100}}
    components:

        # ============================================
        # SCHEDULE HEADER
        # ============================================
    - name: layout-column
      properties:
        layout: {horizontalAlign: space-evenly}
        appearance:
          background: {color: '#ffffff', opacity: 100}
        spacing:
          paddingBlock: xxl
          paddingInline: xl
      components:
      - name: eyebrow
        properties:
          text: BOOK YOUR SESSION
          typography: {size: xs, weight: semibold, color: *color-accent, transform: uppercase, letterSpacing: wider}
      - name: heading
        properties:
          text: Today's Available Appointments
          level: 2
          typography: {size: xxl, weight: semibold, color: *color-primary, align: center, letterSpacing: tight}
          spacing: {marginBlock: sm}
      - name: paragraph
        properties:
          text: Browse our services and pick a time that works for you. Walk-ins welcome, but appointments are recommended to guarantee your preferred slot.
          typography: {size: md, color: '#78716C', align: center, lineHeight: '1.7'}
          layout: {widthMode: "66"}
          spacing: {marginBlock: md}

        # ============================================
        # AVAILABILITY LEGEND
        # ============================================
    - name: layout-column
      properties:
        layout: {horizontalAlign: center}
        appearance:
          background: {color: '#ffffff', opacity: 100}
        spacing:
          paddingBlock: sm
          paddingInline: xl
      components:
      - name: layout-row
        properties:
          layout: {horizontalAlign: space-evenly, verticalAlign: center}
          spacing: {marginBlock: sm}
        components:
        - name: badge
          properties:
            text: "Available"
            appearance: {background: {color: '#10B981'}, radius: pill}
            typography: {color: '#ffffff', size: xs, weight: semibold}
        - name: badge
          properties:
            text: "Few Left"
            appearance: {background: {color: '#F59E0B'}, radius: pill}
            typography: {color: '#ffffff', size: xs, weight: semibold}
        - name: badge
          properties:
            text: "Fully Booked"
            appearance: {background: {color: '#EF4444'}, radius: pill}
            typography: {color: '#ffffff', size: xs, weight: semibold}

        # ============================================
        # HAIR SERVICES ACCORDION
        # ============================================
