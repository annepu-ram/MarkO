                            - name: layout-column
                              properties:
                                appearance: { background: { color: *color-background, transparency: 100 }, radius: xxl, shadow: elevated }
                                spacing: { paddingBlock: md, paddingInline: md }
                              components:
                                - name: eyebrow
                                  properties:
                                    text: "9:00 — 10:30 AM"
                                    typography: { size: xs, weight: semibold, color: *color-accent }
                                - name: heading
                                  properties:
                                    text: Introduction to Design
                                    level: 4
                                    typography: { size: md, weight: bold, color: *color-primary }
                                - name: caption
