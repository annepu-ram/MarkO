# Class Timetable - Weekly Course Schedule with Tabs
# A weekly timetable using tabs for each day, with columnsgrid showing class times, names, and instructors
# Base components: layout-column, heading, paragraph, eyebrow, caption, tabs, columnsgrid
# Section type: schedule, timetable, classes
# Layout: stacked, grid
# Visual style: claymorphism, playful
# Perfect for: dental clinic, salon, barbershop, yoga studio, fitness studio, conference, workshop, tutoring center, cooking class, music school


- name: site
  properties:
    theme:
      fonts:
        heading: &font-heading "'Poppins', sans-serif"
        content: &font-content "'Nunito Sans', sans-serif"
      colors:
        primary: &color-primary '#4A1942'
        text: &color-text '#4E3149'
        secondary: &color-secondary '#F5B0D0'
        accent: &color-accent '#FF1493'
        background: &color-background '#FFD6E6'
  components:
    - name: page
      slug: home
      title: "Class Timetable"
      properties:
        appearance: { background: { color: *color-background, transparency: 100 } }
      components:

        # ============================================
        # TIMETABLE HEADER
        # ============================================
        - name: layout-column
          properties:
            layout: { align: center, horizontalAlign: space-evenly }
            appearance:
            spacing:
              paddingBlock: xxl
              paddingInline: xl
          components:
            - name: eyebrow
              properties:
                text: SPRING 2026 SEMESTER
                typography: { size: xs, weight: semibold, color: *color-accent, transform: uppercase, letterSpacing: wider }
            - name: heading
              properties:
                text: Weekly Class Schedule
                level: 2
                typography: { size: xxl, weight: bold, color: *color-primary, align: center }
                spacing: { marginBlock: sm }
            - name: paragraph
              properties:
                text: Browse classes by day. All sessions are held at the main campus unless noted otherwise.
                typography: { size: md, color: *color-text, align: center, lineHeight: '1.7' }
                layout: { widthMode: 66 }

        # ============================================
        # TABBED TIMETABLE
        # ============================================
        - name: layout-column
          properties:
            layout: { align: center, horizontalAlign: space-evenly }
            appearance:
              background: { color: '#ffffff', transparency: 100 }
              radius: xxl
              shadow: elevated
            spacing:
              paddingBlock: xl
              paddingInline: lg
          components:
            - name: tabs
              properties:
                appearance:
                  background: { color: '#ffffff', transparency: 100 }
                  radius: xxl
                typography:
                  label: { size: sm, weight: semibold, color: *color-primary }
              tabs:
                # ── Monday ──
