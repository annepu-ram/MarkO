      label: Level
      options:
      - 1
      - 2
      - 3
      - 4
      - 5
      - 6
  - id: typography
    label: Typography
    fields:
    - path: typography.size
      type: select
      label: Font Size
      tokens: typographySizes
    - path: typography.weight
      type: select
      label: Weight
      tokens: fontWeights
    - path: typography.align
      type: select
      label: Alignment
      tokens: alignmentHorizontal
    - path: typography.color
      type: color
      label: Text Color
    - path: typography.lineHeight
      type: text
      label: Line Height
    - path: typography.transform
      type: select
      label: Transform
      options:
      - none
      - uppercase
      - lowercase
      - capitalize
    - path: typography.letterSpacing
      type: select
      label: Letter Spacing
      tokens: letterSpacingMap
  - id: layout
    label: Layout
    fields:
    - path: layout.widthMode
      type: select
      label: Width
      options:
      - value: fit
        label: Fit to content
      - value: '25'
        label: 25%
      - value: '50'
        label: 50%
      - value: '75'
        label: 75%
      - value: stretch
        label: Stretch
  - id: appearance
