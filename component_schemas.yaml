page:
  groups:
  - id: background
    label: Background
    fields:
    - path: background.color
      type: color
      label: Background Color
    - path: background.transparency
      type: range
      label: Background Transparency
      min: 0
      max: 100
      unit: '%'
    - path: background.image
      type: text
      label: Background Image URL
  - id: layout
    label: Layout
    fields:
    - path: layout.padding.top
      type: select
      label: Padding Top
      tokens: spacingScale
    - path: layout.padding.right
      type: select
      label: Padding Right
      tokens: spacingScale
    - path: layout.padding.bottom
      type: select
      label: Padding Bottom
      tokens: spacingScale
    - path: layout.padding.left
      type: select
      label: Padding Left
      tokens: spacingScale
    - path: layout.margin.top
      type: select
      label: Margin Top
      tokens: spacingScale
    - path: layout.margin.bottom
      type: select
      label: Margin Bottom
      tokens: spacingScale
layout-row:
  groups:
  - id: layout
    label: Layout
    fields:
    - path: layout.tag
      type: select
      label: HTML Tag
      options:
      - section
      - div
      - main
      - article
    - path: layout.align
      type: select
      label: Align Items
      options:
      - start
      - center
      - end
      - stretch
    - path: layout.wrap
      type: select
      label: Wrap Children
      options:
      - nowrap
      - wrap
    - path: layout.gap
      type: select
      label: Gap Between Items
      tokens: gapScale
  - id: sizing
    label: Sizing
    fields:
    - path: layout.width
      type: text
      label: Width
    - path: layout.minWidth
      type: text
      label: Min Width
    - path: layout.maxWidth
      type: text
      label: Max Width
    - path: layout.minHeight
      type: text
      label: Min Height
    - path: layout.maxHeight
      type: text
      label: Max Height
  - id: spacing
    label: Spacing
    fields:
    - path: spacing.paddingBlock
      type: select
      label: Padding (Vertical)
      tokens: spacingScale
    - path: spacing.paddingInline
      type: select
      label: Padding (Horizontal)
      tokens: spacingScale
    - path: spacing.marginBlock
      type: select
      label: Margin (Vertical)
      tokens: spacingScale
    - path: spacing.marginInline
      type: select
      label: Margin (Horizontal)
      tokens: spacingScale
  - id: background
    label: Background
    fields:
    - path: background.color
      type: color
      label: Background Color
    - path: background.transparency
      type: range
      label: Background Transparency
      min: 0
      max: 100
      unit: '%'
    - path: background.image
      type: text
      label: Background Image URL
  - id: appearance
    label: Appearance
    fields:
    - path: appearance.border.width
      type: number
      label: Border Width (px)
    - path: appearance.border.style
      type: select
      label: Border Style
      options:
        - value: solid
          label: Solid
        - value: dashed
          label: Dashed
        - value: none
          label: None
    - path: appearance.border.color
      type: color
      label: Border Color
    - path: appearance.radius
      type: select
      label: Border Radius
      tokens: borderRadius
    - path: appearance.shadow
      type: text
      label: Shadow
