site:
  groups: []
page:
  groups:
  - id: meta
    label: Meta
    fields:
    - path: id
      type: text
      label: Page ID
      placeholder: page-1
    - path: slug
      type: text
      label: Slug
      placeholder: home
    - path: title
      type: text
      label: Page Title
      placeholder: My Website
  - id: background
    label: Background
    fields:
    - path: appearance.background.type
      type: select
      label: Background Type
      options:
        - color
        - gradient
    - path: appearance.background.color
      type: color
      label: Background Color
      showWhen:
        field: appearance.background.type
        value: color
    - path: appearance.background.opacity
      type: range
      label: Background Opacity
      min: 0
      max: 100
      unit: '%'
    - path: appearance.background.gradient.colorStart
      type: color
      label: Gradient Start
      showWhen:
        field: appearance.background.type
        value: gradient
    - path: appearance.background.gradient.colorEnd
      type: color
      label: Gradient End
      showWhen:
        field: appearance.background.type
        value: gradient
    - path: appearance.background.gradient.direction
      type: select
      label: Gradient Direction
      options:
        - to right
        - to bottom
        - to bottom right
        - to top right
      showWhen:
        field: appearance.background.type
        value: gradient
    - path: appearance.background.image
      type: text
      label: Background Image URL
  - id: spacing
    label: Spacing
    fields:
    - path: spacing.paddingBlock
      type: select
      label: Padding (Top+Bottom)
      tokens: spacingScale
    - path: spacing.paddingInline
      type: select
      label: Padding (Left+Right)
      tokens: spacingScale
layout-row:
  groups:
  - id: layout
    label: Layout
    fields:
    - path: layout.tag
      type: select
      label: HTML Tag
      options:
      - section
      - div
      - main
      - article
    - path: layout.horizontalAlign
      type: select
      label: Horizontal Align
      options:
        - value: center
          label: Center
        - value: space-between
          label: Space Between
        - value: left
          label: Left
        - value: space-around
          label: Space Around
        - value: right
          label: Right
        - value: space-evenly
          label: Space Evenly
    - path: layout.verticalAlign
      type: select
      label: Vertical Align
      options:
      - top
      - center
      - bottom
      - stretch
    - path: layout.wrap
      type: select
      label: Wrap Children
      options:
      - nowrap
      - wrap
    - path: layout.gap
      type: select
      label: Gap
      tokens: gapScale
  - id: spacing
    label: Spacing
    fields:
    - path: spacing.paddingBlock
      type: select
      label: Padding (Top+Bottom)
      tokens: spacingScale
    - path: spacing.paddingInline
      type: select
      label: Padding (Left+Right)
      tokens: spacingScale
    - path: spacing.marginBlock
      type: select
      label: Margin (Top+Bottom)
      tokens: spacingScale
    - path: spacing.marginInline
      type: select
      label: Margin (Left+Right)
      tokens: spacingScale
  - id: appearance
    label: Appearance
    fields:
    - path: appearance.background.type
      type: select
      label: Background Type
      options:
        - color
        - gradient
    - path: appearance.background.color
      type: color
      label: Background Color
      showWhen:
        field: appearance.background.type
        value: color
    - path: appearance.background.opacity
      type: range
      label: Background Opacity
      min: 0
      max: 100
      unit: '%'
    - path: appearance.blur
      type: checkbox
      label: Backdrop Blur
    - path: appearance.background.gradient.colorStart
      type: color
      label: Gradient Start
      showWhen:
        field: appearance.background.type
        value: gradient
    - path: appearance.background.gradient.colorEnd
      type: color
      label: Gradient End
      showWhen:
        field: appearance.background.type
        value: gradient
    - path: appearance.background.gradient.direction
      type: select
      label: Gradient Direction
      options:
        - to right
        - to bottom
        - to bottom right
        - to top right
      showWhen:
        field: appearance.background.type
        value: gradient
    - path: appearance.background.image
      type: text
      label: Background Image URL
    - path: appearance.border.width
      type: number
      label: Border Width (px)
    - path: appearance.border.style
      type: select
      label: Border Style
      options:
        - value: solid
          label: Solid
        - value: dashed
          label: Dashed
        - value: none
          label: None
    - path: appearance.border.color
      type: color
      label: Border Color
    - path: appearance.radius
      type: select
      label: Border Radius
      tokens: borderRadiusScale
    - path: appearance.shadow
      type: select
      label: Shadow
      tokens: shadowScale
    - path: appearance.shadowColor
      type: color
      label: Shadow Color
