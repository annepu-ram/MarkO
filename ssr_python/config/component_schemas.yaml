      label: Underline
    - path: appearance.showArrow
      type: checkbox
      label: Show Arrow
    - path: appearance.padding.block
      type: select
      label: Padding (Top+Bottom)
      tokens: spacingScale
    - path: appearance.padding.inline
      type: select
      label: Padding (Left+Right)
      tokens: spacingScale
  - id: typography
    label: Typography
    fields:
    - path: typography.size
      type: select
      label: Font Size
      tokens: typographySizes
    - path: typography.weight
      type: select
      label: Weight
      tokens: fontWeights
    - path: typography.align
      type: select
      label: Alignment
      tokens: alignmentHorizontal
    - path: typography.color
      type: color
      label: Text Color
    - path: typography.lineHeight
