    - path: content.padding
      type: select
      label: Content Padding
      tokens: spacingScale
  - id: layout
    label: Layout
    fields:
    - path: layout.widthMode
      type: select
      label: Width
      tokens: widthPercentages
  - id: spacing
    label: Spacing
    fields:
    - path: spacing.marginBlock
      type: select
