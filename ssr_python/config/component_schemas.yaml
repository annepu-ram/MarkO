  groups:
  - id: layout
    label: Layout
    fields:
    - path: layout.columns
      type: number
      label: Columns
      min: 1
      max: 6
    - path: layout.gap
      type: select
      label: Gap
      tokens: gapScale
    - path: layout.verticalAlign
      type: select
      label: Vertical Align
      options:
        - value: stretch
