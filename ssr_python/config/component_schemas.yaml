          label: Space Between
        - value: left
          label: Left
        - value: space-around
          label: Space Around
        - value: right
          label: Right
        - value: space-evenly
          label: Space Evenly
  - id: submit
    label: Submit Button
    fields:
    - path: submit.show
      type: checkbox
      label: Show Submit Button
    - path: submit.buttonText
      type: text
      label: Button Text
  - id: appearance
    label: Appearance
    fields:
    - path: appearance.shadow
      type: select
      label: Shadow
      tokens: shadowScale
    - path: appearance.shadowColor
      type: color
      label: Shadow Color
carousel:
  groups:
  - id: behavior
    label: Behavior
    fields:
    - path: behavior.autoplay
      type: checkbox
      label: Autoplay
    - path: behavior.delay
      type: number
      label: Delay (ms)
      min: 1000
      max: 10000
    - path: behavior.loop
      type: checkbox
      label: Loop Slides
    - path: behavior.pauseOnHover
      type: checkbox
      label: Pause on Hover
    - path: behavior.swipeEnabled
      type: checkbox
      label: Enable Touch Swipe
    - path: behavior.swipeThreshold
      type: number
      label: Swipe Threshold (px)
      min: 20
      max: 150
    - path: behavior.keyboardNavigation
      type: checkbox
      label: Keyboard Navigation
  - id: animation
    label: Animation
    fields:
    - path: animation.effect
      type: select
      label: Transition Effect
      options:
      - value: slide
        label: Slide
      - value: fade
        label: Fade
    - path: animation.duration
      type: number
      label: Duration (ms)
      min: 100
      max: 1000
  - id: navigation
    label: Navigation
    fields:
    - path: navigation.showArrows
      type: checkbox
      label: Show Arrows
    - path: navigation.arrowStyle
      type: select
      label: Arrow Style
      options:
      - value: chevron
        label: Chevron
      - value: arrow
        label: Arrow
      - value: circle
        label: Circle Buttons
    - path: navigation.arrowPosition
      type: select
      label: Arrow Position
      options:
      - value: inside
        label: Inside
      - value: outside
        label: Outside
    - path: navigation.showDots
      type: checkbox
      label: Show Indicators
  - id: indicators
    label: Indicators
    fields:
    - path: indicators.style
      type: select
      label: Indicator Style
      options:
      - value: dots
        label: Dots
      - value: numbers
        label: Numbers
      - value: dashes
        label: Dashes
    - path: indicators.position
      type: select
      label: Position
      options:
      - value: bottom
        label: Bottom
      - value: top
        label: Top
  - id: accessibility
    label: Accessibility
    fields:
    - path: accessibility.showPauseButton
      type: checkbox
      label: Show Pause Button (WCAG)
    - path: accessibility.ariaLabel
      type: text
      label: ARIA Label
  - id: appearance
    label: Appearance
    fields:
    - path: appearance.shadow
      type: select
      label: Shadow
      tokens: shadowScale
    - path: appearance.shadowColor
      type: color
      label: Shadow Color
  - id: slides
    label: Slides
    fields:
    - path: slides
      type: custom
      renderer: carouselSlides
video-background:
