alignmentHorizontal:
  type: selectOptions
  options:
    - value: left
      label: Left
    - value: center
      label: Center
    - value: right
      label: Right
    - value: justify
      label: Justify

alignmentVertical:
  type: selectOptions
  options:
    - value: start
      label: Start
    - value: center
      label: Center
    - value: end
      label: End

booleanToggle:
  type: selectOptions
  options:
    - value: true
      label: Yes
    - value: false
      label: No

letterSpacingMap:
  type: selectOptions
  options:
    - value: normal
      label: Normal
    - value: tight
      label: Tight
    - value: wide
      label: Wide
    - value: wider
      label: Wider

# Width percentages based on 12-column grid system (industry standard)
# See: https://getbootstrap.com/docs/5.0/layout/grid/
widthPercentages:
  type: selectOptions
  options:
    - value: stretch
      label: "Full Width (100%)"
    - value: "83"
      label: "83% (10/12 columns)"
    - value: "75"
      label: "75% (9/12 columns)"
    - value: "66"
      label: "66% (8/12 columns)"
    - value: "50"
      label: "50% (6/12 columns)"
    - value: "33"
      label: "33% (4/12 columns)"
    - value: "25"
      label: "25% (3/12 columns)"
    - value: "16"
      label: "16% (2/12 columns)"
    - value: fit
      label: "Fit Content"

# Ticker column widths — fixed pixel sizes with CSS clamp() for responsiveness
tickerWidths:
  type: selectOptions
  options:
    - value: fit
      label: "Content-Sized (auto)"
    - value: "120"
      label: "120px (Compact)"
    - value: "200"
      label: "200px (Small)"
    - value: "280"
      label: "280px (Medium)"
    - value: "360"
      label: "360px (Large)"
    - value: "480"
      label: "480px (Extra Large)"

# Media component tokens
aspectRatios:
  type: selectOptions
  options:
    - value: auto
      label: Auto
    - value: "16/9"
      label: "16:9 Widescreen"
    - value: "4/3"
      label: "4:3 Standard"
    - value: "1/1"
      label: "1:1 Square"
    - value: "3/2"
      label: "3:2 Photo"
    - value: "21/9"
      label: "21:9 Ultrawide"
    - value: "9/16"
      label: "9:16 Portrait"

