        width: 3
        style: solid
        color: "#0D0D0D"
      radius: none
      shadow: retro
    typography:
      heading:
        weight: extrabold
        letterSpacing: wide
        transform: uppercase
      body:
        weight: regular
        letterSpacing: normal
    spacing:
      section_padding:
        block: xl
        inline: md
      container_padding:
        block: md
        inline: md


