# Visual Design Style Presets
# Maps style names to concrete YAML property recipes for SwiftSites components.
# Used by LLM system prompt and RAG retrieval to generate correctly styled YAML.
#
# Each preset defines:
#   - theme_suggestion: recommended colors + fonts (references themesPanel.js presets)
#   - rules: property values per component role (container, card, button, typography, spacing)


glassmorphism:
  display_name: "Glassmorphism"
  description: "Frosted glass effect with semi-transparent backgrounds and blur overlay"
  keywords: [glass, glassmorphism, blur, frosted, translucent, transparent, frost]
  theme_suggestion:
    name: "Glass Azure"
    colors:
      primary: "#1A365D"
      secondary: "#B0D4E8"
      accent: "#3182CE"
      background: "#D6EBF5"
    fonts:
      heading: "'Inter', sans-serif"
      content: "'Inter', sans-serif"
  rules:
    page_background:
      type: gradient
      gradient:
        direction: to bottom right
      note: "REQUIRED — gradient parent needed for blur visibility"
    container:
      background:
        color: "#ffffff"
        opacity: 12
      blur: true
      border:
        width: 1
        style: solid
        color: "#ffffff"
      radius: lg
      shadow: soft
    card:
      background:
        color: "#ffffff"
        opacity: 15
      blur: true
      border:
        width: 1
        style: solid
        color: "#ffffff"
      radius: lg
      shadow: soft
    button:
      background:
        color: "#ffffff"
        opacity: 20
      blur: true
      border:
        width: 1
        style: solid
        color: "#ffffff"
      radius: pill
      shadow: soft
    typography:
      heading:
        weight: bold
        letterSpacing: normal
      body:
        weight: regular
        letterSpacing: normal
    spacing:
      section_padding:
        block: xxxl
        inline: lg
      container_padding:
        block: lg
        inline: lg


modern:
  display_name: "Modern (Minimalist & Functional)"
  description: "Clean, high-readability design with neutral tones and high whitespace"
  keywords: [modern, minimalist, clean, simple, minimal, functional]
  theme_suggestion:
    name: "Slate Professional"
    colors:
      primary: "#1E3A5F"
      secondary: "#C5D4E3"
      accent: "#0052CC"
      background: "#E8EDF2"
    fonts:
      heading: "'Inter', sans-serif"
      content: "'Inter', sans-serif"
  rules:
    page_background:
      type: color
      note: "Solid light background — no gradients"
    container:
      background:
        color: "theme_background"
        opacity: 100
      blur: false
      border:
        width: 0
      radius: sm
      shadow: soft
    card:
      background:
        color: "#ffffff"
        opacity: 100
      blur: false
      border:
        width: 1
        style: solid
        color: "#e5e7eb"
      radius: sm
      shadow: soft
    button:
      background:
        opacity: 100
      blur: false
      border:
        width: 0
      radius: sm
      shadow: none
    typography:
      heading:
        weight: semibold
        letterSpacing: tight
      body:
        weight: regular
        letterSpacing: normal
    spacing:
      section_padding:
        block: xxxl
        inline: xl
      container_padding:
        block: xl
        inline: xl


retro:
