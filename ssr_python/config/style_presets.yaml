      accent: "#FF0000"
      background: "#FFEB3B"
    fonts:
      heading: "'Bebas Neue', sans-serif"
      content: "'Merriweather', serif"
  rules:
    page_background:
      type: color
      note: "Bold, saturated solid color backgrounds"
    container:
      background:
        opacity: 100
      blur: false
      border:
        width: 3
        style: solid
        color: "#0D0D0D"
      radius: none
      shadow: retro
      shadowColor: "#0D0D0D"
    card:
      background:
        opacity: 100
      blur: false
      border:
        width: 3
