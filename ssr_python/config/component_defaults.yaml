# Color placeholders: $color-primary, $color-text, $color-secondary, $color-accent, $color-background
# These resolve to the user's theme colors at render time.
# Fallback defaults (when no theme): primary=#111827, text=#374151, secondary=#6b7280, accent=#6366f1, background=#ffffff

site:
  id: ''
page:
  id: ''
  slug: ''
  title: ''
  spacing:
    paddingBlock: none
    paddingInline: none
  appearance:
    background:
      color: $color-background
      opacity: 100
      image: ''
layout-row:
  layout:
    tag: section
    horizontalAlign: space-evenly
    verticalAlign: stretch
    wrap: wrap
    gap: sm
  spacing:
    marginBlock: none
    marginInline: none
    paddingBlock: sm
    paddingInline: sm
  appearance:
    background:
      color: $color-background
      opacity: 0
      image: ''
    border:
      width: 0
      style: solid
      color: $color-primary
    radius: none
    shadow: none
    shadowColor: ''
    blur: false
layout-column:
  layout:
    tag: section
    horizontalAlign: center
    verticalAlign: space-between
    wrap: nowrap
    gap: none
    widthMode: stretch
  spacing:
    marginBlock: none
    marginInline: none
    paddingBlock: sm
    paddingInline: sm
  appearance:
    background:
      color: $color-background
      opacity: 0
      image: ''
    border:
      width: 0
      style: solid
      color: $color-primary
    radius: none
    shadow: none
    shadowColor: ''
    blur: false
columnsgrid:
  layout:
    columns: 2
    gap: md
    verticalAlign: stretch
  responsive:
    breakpoints:
      md: 2
      sm: 1
  appearance:
    shadow: none
    shadowColor: ''
    columnBackground: $color-background
    columnOpacity: 0
    columnBlur: false
    columnRadius: none
    columnBorder:
      width: 0
      color: '#e5e7eb'
  spacing:
    marginBlock: none
    marginInline: none
    paddingBlock: sm
    paddingInline: sm
titlebar:
  branding:
    showLogo: true
    logoUrl: https://placehold.co/50x40?text=Add+Image
    title: Website Title
  navigation:
    links:
    - label: Home
      href: '#home'
    - label: About
      href: '#about'
    - label: Contact
      href: '#contact'
  layout:
    alignment: left
    height: 60
  scroll:
    shrinkPercentage: 70
  appearance:
    background:
      color: $color-background
      opacity: 100
    border:
      width: 1
      style: solid
      color: '#dddddd'
    focus:
      background: '#f0f0f0'
      color: $color-primary
  typography:
    title:
      size: 24
      weight: bold
      color: $color-primary
    menu:
      size: 16
      weight: medium
      color: '#333333'
heading:
  text: |
    Elevate your message
    with a bold statement
  level: 2
  typography:
    size: xl
    weight: bold
    lineHeight: 1.2
    transform: none
    letterSpacing: normal
    fontStyle: normal
    textDecoration: none
    align: center
    color: $color-primary
  appearance:
    background:
      color: $color-background
      opacity: 0
    radius: none
    textShadow: none
  spacing:
    marginBlock: md
    marginInline: none
    paddingBlock: none
    paddingInline: none
  layout:
    widthMode: fit
paragraph:
  text: |
    Tell your story across multiple lines.
    Continue the narrative with more detail here.
  typography:
    size: md
    weight: regular
    align: left
    color: $color-text
    lineHeight: 1.6
    transform: none
    letterSpacing: normal
    fontStyle: normal
    textDecoration: none
  spacing:
    marginBlock: none
    marginInline: none
    paddingBlock: sm
    paddingInline: none
  layout:
    widthMode: fit
  appearance:
    background:
      color: $color-background
      opacity: 0
    radius: none
    textShadow: none
eyebrow:
  text: |
    Featured insight
    Highlights at a glance
  typography:
    size: xs
    weight: semibold
    align: left
    color: $color-accent
    lineHeight: 1.4
    transform: uppercase
    letterSpacing: wide
    fontStyle: normal
    textDecoration: none
  spacing:
    marginBlock: none
    marginInline: none
    paddingBlock: sm
    paddingInline: none
  layout:
    widthMode: fit
  appearance:
    background:
      color: $color-background
      opacity: 0
    radius: none
    textShadow: none
caption:
  text: |
    Photo by Jane Doe
    Captured on location
  typography:
    size: sm
    weight: regular
    align: center
    color: $color-secondary
    lineHeight: 1.4
    transform: none
    letterSpacing: normal
    fontStyle: normal
    textDecoration: none
  spacing:
    marginBlock: xs
    marginInline: none
    paddingBlock: none
    paddingInline: none
  layout:
    widthMode: fit
  appearance:
    background:
      color: $color-background
      opacity: 0
    radius: none
    textShadow: none
blockquote:
  quote: |
    Design is intelligence made visible.
    Share a thought worth repeating.
  cite: Alina Wheeler
  typography:
    size: xl
    weight: medium
    align: center
    color: $color-text
    lineHeight: 1.6
    transform: none
    letterSpacing: normal
    fontStyle: italic
    textDecoration: none
  spacing:
    marginBlock: lg
    marginInline: none
    paddingBlock: md
    paddingInline: md
  appearance:
    border:
      accentColor: $color-accent
    background:
      color: $color-background
      opacity: 0
    radius: none
    shadow: none
    shadowColor: ''
    textShadow: none
  layout:
    widthMode: fit
image:
  source:
    url: https://placehold.co/150x150?text=Add+Image
    altText: Placeholder image
  appearance:
    minHeight: 12.5
    maxHeight: 0
    fit: cover
    cornerStyle: none
    objectPosition: center
    filter: none
    shadow: none
    shadowColor: ''
    hoverEffect: none
    lazy: true
    overlay:
      enabled: false
      color: rgba(0,0,0,0.5)
      opacity: 0.5
  spacing:
    marginBlock: sm
    marginInline: none
    paddingBlock: none
    paddingInline: none
  layout:
    widthMode: stretch
    horizontalAlign: center
video:
  source:
    url: https://www.youtube.com/watch?v=dQw4w9WgXcQ
  appearance:
    aspectRatio: '16/9'
    height: 400
    shadow: none
    shadowColor: ''
  playback:
    controls: true
    autoplay: false
    muted: false
    loop: false
  poster:
    url: ''
  spacing:
    marginBlock: md
    marginInline: none
  layout:
    widthMode: stretch
gif:
  source:
    url: https://media.giphy.com/media/VseXoJs6vVmwU/giphy.gif
    altText: Animated GIF
  appearance:
    minHeight: 12.5
    maxHeight: 0
    fit: cover
    cornerStyle: none
    objectPosition: center
    filter: none
    shadow: none
    shadowColor: ''
    hoverEffect: none
    lazy: true
    overlay:
      enabled: false
      color: rgba(0,0,0,0.5)
      opacity: 0.5
  spacing:
    marginBlock: sm
    marginInline: none
    paddingBlock: none
    paddingInline: none
  layout:
    widthMode: stretch
textbox:
  label:
    text: Label
    show: true
    typography:
      weight: medium
      color: '#374151'
  field:
    name: ''
    placeholder: Enter text...
    initialValue: ''
    validation: none
    helperText: ''
    required: false
  appearance:
    size: sm
    accentColor: '#3b82f6'
textarea:
  label:
    text: Label
    show: true
    typography:
      weight: medium
      color: '#374151'
  field:
    name: ''
    placeholder: Enter text...
    rows: 4
    helperText: ''
    required: false
  appearance:
    size: sm
    accentColor: '#3b82f6'
button:
  text: Click Me
  action:
    type: inlineScript
    value: alert("Clicked!")
  appearance:
    background:
      color: $color-background
      opacity: 100
    border:
      width: 1
      style: solid
      color: '#1d4ed8'
    radius: sm
    shadow: none
    shadowColor: ''
    iconPlacement: none
  typography:
    size: md
    weight: semibold
    align: center
    color: $color-background
    lineHeight: 1.5
    transform: none
    letterSpacing: normal
  spacing:
    marginBlock: sm
    marginInline: xs
    paddingBlock: sm
    paddingInline: md
  layout:
    widthMode: fit
dropdown:
  label:
    text: Label
    show: true
    typography:
      weight: medium
      color: '#374151'
  field:
    name: ''
    placeholder: Choose an option
    options: "Option 1\nOption 2\nOption 3"
    helperText: ''
    required: false
  appearance:
    size: sm
    accentColor: '#3b82f6'
calendar:
  label:
    text: Date
    show: true
    typography:
      weight: medium
      color: '#374151'
  field:
    name: ''
    value: ''
    min: ''
    max: ''
    helperText: ''
    required: false
  appearance:
    size: sm
    accentColor: '#3b82f6'
checkbox:
  label:
    text: Select options
    show: true
    typography:
      weight: medium
      color: '#374151'
  field:
    name: ''
    options: "Option 1\nOption 2\nOption 3"
    helperText: ''
    required: false
  appearance:
    size: sm
    color: '#2563eb'
radio:
  label:
    text: Choose one
    show: true
    typography:
      weight: medium
      color: '#374151'
  field:
    name: radio1
    options: "Option 1\nOption 2\nOption 3"
    helperText: ''
    required: false
  appearance:
    size: sm
    color: '#2563eb'
accordion:
  items:
  - title: Click to expand
    components:
    - name: paragraph
      properties:
        text: Add your content here using nested components.
  behavior:
    allowMultipleOpen: false
  typography:
    title:
      size: lg
      weight: semibold
      color: $color-primary
    content:
      size: md
      weight: regular
      color: $color-primary
  layout:
    widthMode: stretch
  appearance:
    titleBackground:
      color: $color-background
    border:
      width: 1
      style: solid
      color: '#d1d5db'
      position: bottom
    contentBackground:
      color: $color-background
      opacity: 100
    radius: sm
    shadow: none
    shadowColor: ''
  spacing:
    marginBlock: md
    marginInline: none
    paddingBlock: sm
    paddingInline: sm
tabs:
  layout:
    orientation: horizontal
    widthMode: stretch
  typography:
    label:
      size: md
      weight: semibold
      active:
        color: $color-primary
      inactive:
        color: $color-secondary
  appearance:
    tab:
      background:
        active: $color-background
        inactive: $color-background
      border:
        width: 2
        style: solid
        position: lower
    content:
      background:
        color: $color-background
        opacity: 100
      border:
        color: '#d1d5db'
        width: 1
        style: solid
      padding:
        block: md
        inline: md
    shadow: none
    shadowColor: ''
  spacing:
    marginBlock: md
    marginInline: none
    paddingBlock: sm
    paddingInline: sm
  tabs:
    - title: Tab 1
      components:
        - name: paragraph
          properties:
            text: Tab 1 content
hamburger:
  label: Menu
  links:
  - label: Home
    href: '#home'
  - label: About
    href: '#about'
br:
  size: md
  type: solid
  orientation: horizontal
  thickness: 2
  color: '#e5e7eb'
  invert: false
  mirror: false
icon:
  name: star
  size: "36"
  strokeWidth: "2"
  color: $color-primary
badge:
  text: Badge
  variant: info
  pill: false
  typography:
    size: xxs
    color: ''
rating:
  value: 3.5
  iconType: star
  showCount: false
  color: '#f59e0b'
  typography:
    size: md
    color: $color-secondary
progress-bar:
  percent: 50
  thickness: medium
  color: '#3b82f6'
  trackColor: '#e5e7eb'
  colorGradient: false
  appearance:
    radius: pill
counter-up:
  endValue: 100
  duration: 2000
  prefix: ''
  suffix: ''
  typography:
    size: xxl
    weight: bold
    color: $color-primary
    align: center
countdown:
  targetDate: ''
  format: 'DD:HH:MM:SS'
  expiredText: Expired
  typography:
    size: xl
    weight: bold
    color: $color-primary
    align: center
link:
  text: Click Me
  href: '#'
  appearance:
    underline: true
    showArrow: false
  typography:
    size: md
    weight: regular
    align: left
    color: rgba(0,0,238,1)
    lineHeight: 1.5
    transform: none
    letterSpacing: normal
    fontStyle: normal
    textDecoration: none
  spacing:
    marginBlock: xs
    marginInline: xs
    paddingBlock: none
    paddingInline: none
  layout:
    widthMode: fit
form:
  layout:
    style: vertical
  submit:
    buttonText: Submit
    show: true
  appearance:
    background:
      color: $color-background
      opacity: 0
    border:
      width: 0
      color: '#e5e7eb'
    radius: none
    shadow: none
    shadowColor: ''
  spacing:
    paddingBlock: md
    paddingInline: md
    marginBlock: none
carousel:
  behavior:
    autoplay: true
    delay: 3000
    loop: true
    pauseOnHover: true
    swipeEnabled: true
    swipeThreshold: 50
    keyboardNavigation: true
  animation:
    effect: slide
    duration: 300
  navigation:
    showArrows: true
    showDots: true
    arrowStyle: chevron
    arrowPosition: inside
  indicators:
    style: dots
    position: bottom
  accessibility:
    showPauseButton: true
    ariaLabel: 'Image carousel'
  appearance:
    shadow: none
    shadowColor: ''
  spacing:
    marginBlock: lg
    marginInline: none
  slides:
  - components:
    - name: image
      properties:
        source:
          url: https://placehold.co/800x400?text=Add+Image
          altText: Slide 1
    - name: heading
      properties:
        text: First Slide
        level: 3
  - components:
    - name: image
      properties:
        source:
          url: https://placehold.co/800x400?text=Add+Image
          altText: Slide 2
    - name: paragraph
      properties:
        text: Second slide with some text.
  - components:
    - name: image
      properties:
        source:
          url: https://placehold.co/800x400?text=Add+Image
          altText: Slide 3
ticker:
  behavior:
    direction: left
    speed: 25
    mode: continuous
    pauseOnHover: true
    pauseDuration: 3000
  layout:
    widthMode: fit
    gap: lg
  spacing:
    marginBlock: md
    marginInline: none
  appearance:
    columnBackground: $color-background
    columnOpacity: 0
    columnRadius: none
    columnBorder:
      width: 0
      style: solid
      color: $color-primary
  columns:
  - components:
    - name: heading
      properties:
        text: Ticker Item 1
        level: 4
        typography:
          size: md
          weight: semibold
  - components:
    - name: heading
      properties:
        text: Ticker Item 2
        level: 4
        typography:
          size: md
          weight: semibold
  - components:
    - name: heading
      properties:
        text: Ticker Item 3
        level: 4
        typography:
          size: md
          weight: semibold
video-background:
  source:
    url: ''
    poster: ''
  appearance:
    aspectRatio: '16/9'
    minHeight: 25
    fit: cover
    objectPosition: center
    overlay:
      enabled: true
      color: 'rgba(0,0,0,0.4)'
      opacity: 40
  playback:
    autoplay: true
    loop: true
    muted: true
    playsinline: true
  content:
    verticalAlign: center
    horizontalAlign: center
    padding: md
  spacing:
    marginBlock: none
    marginInline: none
  layout:
    widthMode: stretch

panorama-display:
  source:
    url: https://placehold.co/2400x600/e2e8f0/475569?text=Panorama+Image
    altText: Panorama image
  behavior:
    autoScroll: false
    autoScrollSpeed: 30
    stepDistance: 300
    pauseOnHover: true
    initialPosition: left
  spacing:
    marginBlock: md
    marginInline: none
  appearance:
    border:
      width: 0
      style: solid
      color: '#e5e7eb'
    radius: none
    shadow: none
    shadowColor: ''
