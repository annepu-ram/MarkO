# ssr_python/tokens.yaml
# Hardcoded token to CSS value mappings with increased sizes and variance.

spacing:
  # 8px grid aligned - desktop max values
  # (CSS uses clamp() for fluid responsive scaling)
  none: '0'
  xxs: '0.25rem'   # 4px
  xs: '0.5rem'     # 8px
  sm: '1rem'       # 16px
  md: '1.5rem'     # 24px
  lg: '2rem'       # 32px
  xl: '3rem'       # 48px
  xxl: '4rem'      # 64px
  xxxl: '6rem'     # 96px
  auto: 'auto'

typography_sizes:
  xxs: '0.9rem'
  xs: '1.1rem'
  sm: '1.4rem'
  md: '1.8rem'
  lg: '2.2rem'
  xl: '3rem'
  xxl: '4.5rem'
  xxxl: '6rem'
  auto: 'auto'

font_weights:
  light: '300'
  regular: '400'
  medium: '500'
  semibold: '600'
  bold: '700'
  extrabold: '800'

border_radius:
  none: '0'
  xs: '0.15rem'
  sm: '0.3rem'
  md: '0.75rem'
  lg: '1.5rem'
  xl: '2.5rem'
  xxl: '4rem'
  pill: '9999px'

letter_spacing:
  normal: 'normal'
  tight: '-0.025em'
  wide: '0.025em'
  wider: '0.05em'
