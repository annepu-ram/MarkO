# ssr_python/tokens.yaml
# Hardcoded token to CSS value mappings with increased sizes and variance.

spacing:
  # 8px grid aligned - desktop max values
  # (CSS uses clamp() for fluid responsive scaling)
  none: '0'
  xxs: '0.25rem'   # 4px
  xs: '0.5rem'     # 8px
  sm: '1rem'       # 16px
  md: '1.5rem'     # 24px
  lg: '2rem'       # 32px
  xl: '3rem'       # 48px
  xxl: '4rem'      # 64px
  xxxl: '6rem'     # 96px
  auto: 'auto'

typography_sizes:
  xxs: '0.9rem'
  xs: '1.1rem'
  sm: '1.4rem'
  md: '1.8rem'
  lg: '2.2rem'
  xl: '3rem'
  xxl: '4.5rem'
  xxxl: '6rem'
  auto: 'auto'

font_weights:
  light: '300'
  regular: '400'
  medium: '500'
  semibold: '600'
  bold: '700'
  extrabold: '800'

border_radius:
  none: '0'
  xs: '0.15rem'
  sm: '0.3rem'
  md: '0.75rem'
  lg: '1.5rem'
  xl: '2.5rem'
  xxl: '4rem'
  pill: '9999px'

letter_spacing:
  normal: 'normal'
  tight: '-0.025em'
  wide: '0.025em'
  wider: '0.05em'

# Media component tokens
aspect_ratios:
  auto: 'auto'
  '16/9': '16 / 9'
  '4/3': '4 / 3'
  '1/1': '1 / 1'
  '3/2': '3 / 2'
  '21/9': '21 / 9'
  '9/16': '9 / 16'

object_positions:
  center: 'center'
  top: 'top'
  bottom: 'bottom'
  left: 'left'
  right: 'right'
  'top left': 'top left'
  'top right': 'top right'
  'bottom left': 'bottom left'
  'bottom right': 'bottom right'

image_filters:
  none: 'none'
  grayscale: 'grayscale(100%)'
  sepia: 'sepia(100%)'
  blur: 'blur(4px)'
  brighten: 'brightness(1.2)'
  darken: 'brightness(0.8)'
  saturate: 'saturate(1.5)'

shadows:
  none: 'none'
  soft: 'rgb(var(--shadow-rgb, 60 64 67) / 0.3) 0px 1px 2px 0px, rgb(var(--shadow-rgb, 60 64 67) / 0.15) 0px 1px 3px 1px'
  medium: 'rgb(var(--shadow-rgb, 0 0 0) / 0.12) 0px 4px 12px -2px, rgb(var(--shadow-rgb, 0 0 0) / 0.08) 0px 2px 6px -2px'
  elevated: 'rgb(var(--shadow-rgb, 0 0 0) / 0.15) 0px 12px 24px -4px, rgb(var(--shadow-rgb, 0 0 0) / 0.1) 0px 4px 8px -2px'
  dramatic: 'rgb(var(--shadow-rgb, 0 0 0) / 0.25) 0px 20px 40px -8px, rgb(var(--shadow-rgb, 0 0 0) / 0.15) 0px 8px 16px -4px'
  retro: '4px 4px 0 0 rgb(var(--shadow-rgb, 30 41 59))'
