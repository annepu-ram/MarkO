{% macro render_hamburger(component, tokens, path, component_id) %}
    {% set properties = component.properties | default({}) %}
    {% set links = component.links | default([]) %}
    {% set styles = build_styles(component, tokens) %}
    <div class="hamburger-menu chrome-target" data-component-id="{{ component_id }}"{% if styles %} style="{{ styles }} position: relative;"{% else %} style="position: relative;"{% endif %}>
        <button class="mobile-menu-button">
            <span>{{ component.label | default('Menu') }}</span>
        </button>
        <div class="titlebar-nav">
            {% for link in links %}
                <a href="{{ link.href }}" class="titlebar-link">{{ link.label }}</a>
            {% endfor %}
        </div>
    </div>
{% endmacro %}
