<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Swift Sites - AI Page Builder</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- Stylesheets -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/tokens.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/components.css') }}">
</head>
<body>
    <div id="svgSpriteRoot" hidden></div>

    <!-- Mobile Overlay - backdrop when panels are open -->
    <div class="mobile-overlay" id="mobileOverlay"></div>

    <!-- TOP HEADER - Spans full width -->
    <header class="app-header">
        <div class="header-brand">
            <button class="mobile-menu-btn" id="mobileMenuBtn" title="Menu">
                <svg aria-hidden="true"><use href="#icon-menu"></use></svg>
            </button>
            <h2>
                <svg class="icon-logo" aria-hidden="true"><use href="#icon-swift-sites"></use></svg>
                Swift Sites
            </h2>
        </div>

        <!-- Viewport Switching -->
        <div class="header-center">
            <button class="viewport-btn active" data-viewport="desktop">
                <svg aria-hidden="true"><use href="#icon-monitor"></use></svg>
                <span>Desktop</span>
            </button>
            <button class="viewport-btn" data-viewport="tablet">
                <svg aria-hidden="true"><use href="#icon-tablet"></use></svg>
                <span>Tablet</span>
            </button>
            <button class="viewport-btn" data-viewport="mobile">
                <svg aria-hidden="true"><use href="#icon-smartphone"></use></svg>
                <span>Mobile</span>
            </button>
        </div>

        <!-- Action buttons -->
        <div class="header-actions">
            <button id="fullscreenBtn" class="btn btn-ghost btn-icon" title="Preview">
                <svg class="icon" aria-hidden="true"><use href="#icon-eye"></use></svg>
            </button>
            <button id="clearBtn" class="btn btn-ghost btn-icon" title="Clear Canvas">
                <svg class="icon" aria-hidden="true"><use href="#icon-trash-2"></use></svg>
            </button>
            <button id="exportBtn" class="btn btn-primary" title="Export HTML">
                <svg class="icon" aria-hidden="true"><use href="#icon-globe"></use></svg>
                <span>Publish</span>
            </button>
        </div>
    </header>

    <!-- Main application container (below header) -->
    <div id="appContainer" class="app-container">

        <!-- LEFT SIDEBAR - Icon buttons -->
        <aside class="sidebar" id="sidebar">
            <nav class="sidebar-nav">
                <button class="sidebar-btn active" data-panel="layers" title="Layers">
                    <svg aria-hidden="true"><use href="#icon-layers"></use></svg>
                    <span class="sidebar-btn-tooltip">Layers</span>
                </button>
                <button class="sidebar-btn" data-panel="editor" title="Editor">
                    <svg aria-hidden="true"><use href="#icon-code"></use></svg>
                    <span class="sidebar-btn-tooltip">Editor</span>
                </button>
                <div class="sidebar-spacer"></div>
                <button class="sidebar-btn" data-panel="settings" title="Settings">
                    <svg aria-hidden="true"><use href="#icon-settings"></use></svg>
                    <span class="sidebar-btn-tooltip">Settings</span>
                </button>
            </nav>
        </aside>

        <!-- SLIDE-OUT PANELS -->

        <!-- Layers Panel -->
        <div class="sidebar-panel open" id="layersPanel">
            <div class="panel-header">
                <span class="panel-title">Layers</span>
                <button class="panel-close" onclick="window.closePanel()">
                    <svg aria-hidden="true"><use href="#icon-x"></use></svg>
                </button>
            </div>
            <div class="panel-content">
                <div class="component-tree-section">
                    <h3 class="tree-header">Page Structure</h3>
                    <div id="componentTree" class="component-tree">
                        <p class="tree-empty">No components</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- Editor Panel -->
        <div class="sidebar-panel editor-panel" id="editorPanel">
            <div class="panel-header">
                <span class="panel-title">YAML Editor</span>
                <button class="panel-close" onclick="window.closePanel()">
                    <svg aria-hidden="true"><use href="#icon-x"></use></svg>
                </button>
            </div>
            <div class="editor-content" style="flex: 1; display: flex; flex-direction: column; overflow: hidden;">
                <div class="editor-wrapper" id="editorWrapper" style="flex: 1; height: auto;">
                    <div class="line-numbers" id="lineNumbers"></div>
                    <textarea id="codeEditor" class="code-editor" placeholder="Enter YAML..." spellcheck="false"></textarea>
                </div>
            </div>
        </div>

        <!-- Settings Panel -->
        <div class="sidebar-panel" id="settingsPanel">
            <div class="panel-header">
                <span class="panel-title">Settings</span>
                <button class="panel-close" onclick="window.closePanel()">
                    <svg aria-hidden="true"><use href="#icon-x"></use></svg>
                </button>
            </div>
            <div class="panel-content">
                <p style="color: var(--text-muted); font-size: 13px;">Site settings will appear here.</p>
            </div>
        </div>

        <!-- MAIN CANVAS AREA -->
        <div class="main-canvas">
            <!-- Canvas with device frame -->
            <div class="canvas-wrapper">
                <div class="device-frame desktop" id="deviceFrame">
                    <iframe id="preview-frame"
                            src="/preview-frame"
                            class="preview-area"
                            title="Live Preview"
                            sandbox="allow-scripts allow-same-origin"></iframe>
                </div>
            </div>
        </div>

        <!-- RIGHT PROPERTIES PANEL -->
        <aside class="properties-section" id="propertiesPanel">
            <button class="properties-close" id="propertiesCloseBtn" title="Close">
                <svg aria-hidden="true"><use href="#icon-x"></use></svg>
            </button>
            <div class="properties-header" id="propertiesHeader" style="display: none;">
                <div class="properties-icon" id="propertiesIcon">
                    <svg aria-hidden="true"><use href="#icon-box"></use></svg>
                </div>
                <div class="properties-info">
                    <div class="properties-title" id="propertiesTitle">Component</div>
                    <div class="properties-subtitle" id="propertiesSubtitle">Select a component</div>
                </div>
            </div>
            <div class="properties-content" id="propertiesContent">
                <div class="no-selection">
                    <div class="no-selection-icon">
                        <svg aria-hidden="true"><use href="#icon-layers"></use></svg>
                    </div>
                    <div class="no-selection-text">No component selected</div>
                    <div class="no-selection-hint">Click a component in the preview to edit its properties</div>
                </div>
            </div>
        </aside>
    </div>

    <!-- Load js-yaml for YAML parsing on client side (local copy, loads synchronously before modules) -->
    <script src="{{ url_for('static', filename='js/js-yaml.min.js') }}"></script>
    <script>
        // Make js-yaml available globally - verify it loaded
        if (typeof jsyaml !== 'undefined') {
            window.jsyaml = jsyaml;
            console.log('[Init] js-yaml loaded successfully');
        } else {
            console.error('[Init] js-yaml failed to load!');
        }
        // Pass sprite path from Flask
        window.SPRITE_PATH = "{{ url_for('static', filename='icon-sprite.svg') }}";
    </script>
    <script type="module" src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
