<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Swift Sites - AI Page Builder</title>

    <!-- Stylesheets -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/tokens.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/components.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/chat.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/images-panel.css') }}">
</head>
<body>
    <div id="svgSpriteRoot" hidden></div>

    <!-- Mobile Overlay - backdrop when panels are open -->
    <div class="mobile-overlay" id="mobileOverlay"></div>

    <!-- TOP HEADER - Spans full width -->
    <header class="app-header">
        <div class="header-brand">
            <button class="mobile-menu-btn" id="mobileMenuBtn" title="Menu">
                <svg aria-hidden="true"><use href="#icon-menu"></use></svg>
            </button>
            <h2>
                <svg class="icon-logo" aria-hidden="true"><use href="#icon-swift-sites"></use></svg>
                Swift Sites
            </h2>
        </div>

        <!-- Viewport Switching -->
        <div class="header-center">
            <button class="viewport-btn active" data-viewport="desktop">
                <svg aria-hidden="true"><use href="#icon-monitor"></use></svg>
                <span>Desktop</span>
            </button>
            <button class="viewport-btn" data-viewport="tablet">
                <svg aria-hidden="true"><use href="#icon-tablet"></use></svg>
                <span>Tablet</span>
            </button>
            <button class="viewport-btn" data-viewport="tablet-portrait">
                <svg aria-hidden="true"><use href="#icon-tablet-portrait"></use></svg>
                <span>Tablet Portrait</span>
            </button>
            <button class="viewport-btn" data-viewport="mobile">
                <svg aria-hidden="true"><use href="#icon-smartphone"></use></svg>
                <span>Mobile</span>
            </button>
        </div>

        <!-- Action buttons -->
        <div class="header-actions">
            <button id="fullscreenBtn" class="btn btn-ghost btn-icon" title="Preview">
                <svg class="icon" aria-hidden="true"><use href="#icon-eye"></use></svg>
            </button>
            <button id="clearBtn" class="btn btn-ghost btn-icon" title="Clear Canvas">
                <svg class="icon" aria-hidden="true"><use href="#icon-trash-2"></use></svg>
            </button>
            <button id="exportBtn" class="btn btn-primary" title="Export HTML">
                <svg class="icon" aria-hidden="true"><use href="#icon-globe"></use></svg>
                <span>Publish</span>
            </button>
        </div>
    </header>

    <!-- Main application container (below header) -->
    <div id="appContainer" class="app-container">

        <!-- LEFT SIDEBAR - Icon buttons -->
        <aside class="sidebar" id="sidebar">
            <nav class="sidebar-nav">
                <button class="sidebar-btn active" data-panel="layers" title="Layers">
                    <svg aria-hidden="true"><use href="#icon-layers"></use></svg>
                    <span class="sidebar-btn-tooltip">Layers</span>
                </button>
                <button class="sidebar-btn" data-panel="editor" title="Editor">
                    <svg aria-hidden="true"><use href="#icon-code"></use></svg>
                    <span class="sidebar-btn-tooltip">Editor</span>
                </button>
                <button class="sidebar-btn" data-panel="themes" title="Themes">
                    <svg aria-hidden="true"><use href="#icon-paintbrush"></use></svg>
                    <span class="sidebar-btn-tooltip">Themes</span>
                </button>
                <button class="sidebar-btn" data-panel="images" title="Images">
                    <svg aria-hidden="true"><use href="#icon-image"></use></svg>
                    <span class="sidebar-btn-tooltip">Images</span>
                </button>
            </nav>
        </aside>

        <!-- SLIDE-OUT PANELS -->

        <!-- Layers Panel -->
        <div class="sidebar-panel open" id="layersPanel">
            <div class="panel-header">
                <span class="panel-title">Layers</span>
                <button class="panel-close" onclick="window.closePanel()">
                    <svg aria-hidden="true"><use href="#icon-x"></use></svg>
                </button>
            </div>
            <div class="panel-content">
                <div class="component-tree-section">
                    <h3 class="tree-header">Page Structure</h3>
                    <div id="componentTree" class="component-tree">
                        <p class="tree-empty">No components</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- Editor Panel -->
        <div class="sidebar-panel editor-panel" id="editorPanel">
            <div class="panel-header">
                <span class="panel-title">YAML Editor</span>
                <button class="panel-close" onclick="window.closePanel()">
                    <svg aria-hidden="true"><use href="#icon-x"></use></svg>
                </button>
            </div>
            <div class="editor-content" style="flex: 1; display: flex; flex-direction: column; overflow: hidden;">
                <div class="editor-wrapper" id="editorWrapper" style="flex: 1; height: auto;">
                    <div class="line-numbers" id="lineNumbers"></div>
                    <textarea id="codeEditor" class="code-editor" placeholder="Enter YAML..." spellcheck="false"></textarea>
                </div>
            </div>
        </div>

        <!-- Themes Panel -->
        <div class="sidebar-panel" id="themesPanel">
            <div class="panel-header">
                <span class="panel-title">Themes</span>
                <button class="panel-close" onclick="window.closePanel()">
                    <svg aria-hidden="true"><use href="#icon-x"></use></svg>
                </button>
            </div>
            <div class="panel-content" id="themesContent">
                <!-- Dynamic content rendered by themesPanel.js -->
            </div>
            <div class="panel-footer" id="themesFooter">
                <!-- Apply button rendered by themesPanel.js -->
            </div>
        </div>

        <!-- Images Panel -->
        <div class="sidebar-panel" id="imagesPanel">
            <div class="panel-header">
                <span class="panel-title">Images</span>
                <button class="panel-close" onclick="window.closePanel()">
                    <svg aria-hidden="true"><use href="#icon-x"></use></svg>
                </button>
            </div>
            <div class="panel-content" id="imagesContent">
                <!-- Dynamic content rendered by imagesPanel.js -->
            </div>
        </div>

        <!-- MAIN CANVAS AREA -->
        <div class="main-canvas">
            <!-- Canvas with device frame -->
            <div class="canvas-wrapper">
                <div class="device-frame desktop" id="deviceFrame">
                    <iframe id="preview-frame"
                            src="/preview-frame"
                            class="preview-area"
                            title="Live Preview"
                            sandbox="allow-scripts allow-same-origin"></iframe>
                </div>
            </div>
        </div>

        <!-- RIGHT PROPERTIES PANEL -->
        <aside class="properties-section" id="propertiesPanel">
            <button class="properties-close" id="propertiesCloseBtn" title="Close">
                <svg aria-hidden="true"><use href="#icon-x"></use></svg>
            </button>
            <div class="properties-header" id="propertiesHeader" style="display: none;">
                <div class="properties-icon" id="propertiesIcon">
                    <svg aria-hidden="true"><use href="#icon-box"></use></svg>
                </div>
                <div class="properties-info">
                    <div class="properties-title" id="propertiesTitle">Component</div>
                    <div class="properties-subtitle" id="propertiesSubtitle">Select a component</div>
                </div>
            </div>
            <div class="properties-content" id="propertiesContent">
                <div class="no-selection">
                    <div class="no-selection-icon">
                        <svg aria-hidden="true"><use href="#icon-layers"></use></svg>
                    </div>
                    <div class="no-selection-text">No component selected</div>
                    <div class="no-selection-hint">Click a component in the preview to edit its properties</div>
                </div>
            </div>
        </aside>
    </div>

    <!-- Global config before modules load -->
    <script>
        // Pass sprite path from Flask
        window.SPRITE_PATH = "{{ url_for('static', filename='icon-sprite.svg') }}";
    </script>
    <!-- YAML library loaded via ES module imports in yamlWrapper.js (eemeli/yaml replaces js-yaml) -->
    <script type="module" src="{{ url_for('static', filename='js/main.js') }}"></script>

    <!-- LLM Chat Widget Initialization -->
    <script type="module">
        import { initChat } from '/static/js/chat.js';
        import { selectionManager } from '/static/js/main.js';
        import { getYamlStructureFromEditor, getComponentByPath, updateComponentByPath, generateYamlFromStructure, updateYamlEditor } from '/static/js/yamlUtils.js';
        import { renderPreview } from '/static/js/ssr_app.js';
        import { historyManager } from '/static/js/historyManager.js';

        // ES modules are deferred, so DOM is ready when this runs
        // Small delay to ensure main.js has fully initialized
        console.log('[Chat Init] Module loaded, waiting for main.js to initialize...');

        setTimeout(() => {
            console.log('[Chat Init] Starting chat widget initialization...');

            try {
                const chatUI = initChat({
                    // Get current YAML from editor
                    getCurrentYaml: () => {
                        const editor = document.getElementById('codeEditor');
                        return editor ? editor.value : '';
                    },

                    // Get selection context for targeted modifications
                    getSelectionContext: () => {
                        if (!selectionManager.selectedComponentId || !selectionManager.selectedPath) {
                            return null;
                        }

                        // Get component name from YAML structure
                        const structure = getYamlStructureFromEditor();
                        const component = getComponentByPath(structure, selectionManager.selectedPath);

                        return {
                            id: selectionManager.selectedComponentId,
                            path: selectionManager.selectedPath,
                            name: component ? component.name : 'unknown'
                        };
                    },

                    // Handle YAML apply from chat
                    onYamlApply: async (yaml, action) => {
                        console.log('[Chat] Applying YAML changes:', action);

                        // Step 1: Validate YAML syntax before applying
                        let parsedYaml;
                        try {
                            parsedYaml = window.jsyaml.load(yaml);
                        } catch (e) {
                            const errorMsg = e.message || 'Unknown parse error';
                            throw new Error(`Invalid YAML syntax: ${errorMsg.split('\n')[0]}`);
                        }

                        // Step 2: Validate component structure (must have 'name' field)
                        const validateComponent = (comp, path = 'root') => {
                            if (Array.isArray(comp)) {
                                comp.forEach((item, i) => validateComponent(item, `${path}[${i}]`));
                            } else if (comp && typeof comp === 'object') {
                                if (!comp.name) {
                                    throw new Error(`Component at ${path} missing required "name" field`);
                                }
                            }
                        };
                        validateComponent(parsedYaml);

                        const editor = document.getElementById('codeEditor');

                        if (action === 'create') {
                            // Full replacement - use the YAML directly
                            editor.value = yaml;
                        } else if (action === 'modify') {
                            // Targeted modification
                            const selection = selectionManager.selectedPath;

                            if (selection && selection.length > 0) {
                                let newComponent = parsedYaml;

                                // Handle if LLM returned array (starts with -)
                                if (Array.isArray(parsedYaml) && parsedYaml.length === 1) {
                                    newComponent = parsedYaml[0];
                                }

                                // Get current structure and update at path
                                const currentStructure = getYamlStructureFromEditor();
                                if (!currentStructure) {
                                    throw new Error('Cannot modify: editor has no valid YAML content');
                                }

                                const updatedStructure = updateComponentByPath(currentStructure, selection, newComponent);

                                // Generate new YAML
                                const newYaml = generateYamlFromStructure(updatedStructure);
                                editor.value = newYaml;
                            } else {
                                // No selection - full replacement
                                editor.value = yaml;
                            }
                        }

                        // Push to history
                        historyManager.push(editor.value);

                        // Trigger render and catch render errors
                        try {
                            const structure = getYamlStructureFromEditor();
                            await renderPreview(editor.value, structure);
                        } catch (renderError) {
                            // Render failed - rollback from history and throw
                            historyManager.undo();
                            const prevState = historyManager.getCurrentState();
                            if (prevState) {
                                editor.value = prevState;
                            }
                            throw new Error(`Render failed: ${renderError.message || 'Preview could not display the changes'}`);
                        }

                        console.log('[Chat] YAML applied and rendered successfully');
                    }
                });

                // Selection changes are now handled via 'swift-selection-changed' event
                // (see selectionManager.js and chat.js)

                console.log('[Chat Init] Chat widget initialized successfully');
            } catch (error) {
                console.error('[Chat Init] Failed to initialize chat widget:', error);
            }
        }, 200);  // 200ms delay to ensure main.js is ready
    </script>
</body>
</html>
