<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Preview</title>
    <link rel="stylesheet" href="/static/css/tokens.css">
    <link rel="stylesheet" href="/static/css/components.css">
    <link rel="stylesheet" href="/static/css/preview-chrome.css">
    <style>
        /* Reset and base styles for preview */
        * {
            box-sizing: border-box;
        }

        html {
            /* Responsive root font-size using CSS clamp() */
            /* Min: 12px (mobile), Preferred: scales with viewport, Max: 18px (desktop) */
            font-size: clamp(12px, 1vw + 8px, 18px);
        }

        body {
            margin: 0;
            padding: 0;
            min-height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            font-size: 1rem;
            line-height: 1.5;
            color: #1f2937;
            background: #ffffff;
        }

        /* No body padding - allows titlebar sticky positioning to work at viewport edge */

        #preview-content {
            min-height: 100vh;
        }

        /* Add padding to content that is NOT a titlebar or page component */
        #preview-content > :not(.titlebar):not(.page) {
            margin-left: 2rem;
            margin-right: 2rem;
        }

        #preview-content > :first-child:not(.titlebar):not(.page) {
            margin-top: 2rem;
        }

        #preview-content > :last-child:not(.page) {
            margin-bottom: 2rem;
        }

        /* Page component - container for page content with sticky support */
        .page {
            min-height: 100vh;
            position: relative;
        }

        /* Titlebar inside page component should stick to top of page */
        .page > .titlebar {
            position: sticky;
            top: 0;
            z-index: 100;
        }

        /* Preview placeholder */
        .preview-placeholder {
            text-align: center;
            padding: 3rem;
            color: #6b7280;
        }

        .preview-placeholder h3 {
            margin: 0 0 0.5rem 0;
            font-size: 1.25rem;
            font-weight: 600;
        }

        .preview-placeholder p {
            margin: 0;
            font-size: 0.875rem;
        }

        /* Error message styling */
        .error-message {
            background: #fef2f2;
            border: 1px solid #fecaca;
            border-radius: 0.5rem;
            padding: 1rem;
            color: #991b1b;
        }

        .error-message h3 {
            margin: 0 0 0.5rem 0;
            color: #991b1b;
        }

        .error-message pre {
            margin: 0.5rem 0 0 0;
            padding: 0.5rem;
            background: #fee2e2;
            border-radius: 0.25rem;
            font-size: 0.75rem;
            overflow-x: auto;
            white-space: pre-wrap;
        }
    </style>
</head>
<body>
    <div id="preview-content">
        <div class="preview-placeholder">
            <h3>Live Preview</h3>
            <p>Your rendered HTML will appear here.</p>
        </div>
    </div>
    <!-- Component runtime - standalone, exportable with published sites -->
    <script src="/static/js/swift-sites-runtime.js"></script>
    <!-- Preview bridge - handles communication with parent window -->
    <script src="/static/js/preview_bridge.js"></script>
</body>
</html>
