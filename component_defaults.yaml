page:
  backgroundColor: '#ffffff'
  backgroundImage: ''
  padding: 10
  margin: 0
titlebar:
  logo: https://via.placeholder.com/50x40
  title: Website Title
  links:
  - text: Home
    value: '#home'
    borderWidth: 1
    borderStyle: solid
    borderColor: '#cccccc'
    backgroundColor: '#f0f0f0'
    borderRadius: 5
    padding: 5px 10px
  - text: About
    value: '#about'
  - text: Contact
    value: '#contact'
  borderWidth: 1
  borderStyle: solid
  borderColor: '#ddd'
  backgroundColor: '#ffffff'
  focusedButtonBackgroundColor: '#f0f0f0'
  alignment: left
  logoPosition: left
  titleFontSize: 24
  menuFontSize: 16
  shrinkPercent: 50
  height: 60
  padding: 10
  margin: 0
  borderRadius: 0
  linksBackgroundColor: '#f0f0f0'
  linksBorderWidth: 0.1
  linksBorderStyle: solid
  linksBorderColor: '#cccccc'
  linksBorderRadius: 0.5
  linksPadding: 0.5rem 1rem
  linksColor: '#000000'
  linksFontSize: 1.6
  linksFontWeight: normal
  linksFontStyle: normal
heading:
  text: Section Heading
  level: 2
  typography:
    size: xl
    weight: bold
    lineHeight: 1.2
    transform: 'none'
    align: center
    color: '#111827'
  spacing:
    margin:
      top: lg
      bottom: md
paragraph:
  text: This is a paragraph of text content.
  variant: body
  typography:
    size: md
    lineHeight: 1.6
    transform: 'none'
    align: left
    color: '#1f2937'
    weight: normal
  spacing:
    margin:
      top: sm
      bottom: md
eyebrow:
  text: Featured
  typography:
    size: xs
    weight: semibold
    transform: uppercase
    letterSpacing: wide
    align: left
    color: '#6366f1'
  spacing:
    margin:
      bottom: xs
caption:
  text: Photo by Jane Doe
  typography:
    size: sm
    lineHeight: 1.4
    transform: 'none'
    align: center
    color: '#6b7280'
  spacing:
    margin:
      top: xs
blockquote:
  quote: Design is intelligence made visible.
  cite: Alina Wheeler
  typography:
    size: lg
    lineHeight: 1.6
    weight: medium
    transform: 'none'
    align: center
    color: '#111827'
  spacing:
    margin:
      top: lg
      bottom: lg
  pullBorderColor: '#6366f1'
  backgroundColor: '#f9fafb'
image:
  src: https://via.placeholder.com/150
  alt: Placeholder image
  height: auto
  padding: 0
  margin: 10
  borderRadius: 0
video:
  src: https://www.youtube.com/watch?v=dQw4w9WgXcQ
  padding: 0
  margin: 10
  borderRadius: 0
gif:
  src: https://media.giphy.com/media/VseXoJs6vVmwU/giphy.gif
  padding: 10
  margin: 10
  borderRadius: 0
textbox:
  label: Textbox Label
  placeholder: Enter text...
  value: ''
  padding: 10
  margin: 10
  borderWidth: 1
  borderColor: '#cccccc'
  borderRadius: 4
  color: '#333333'
  fontWeight: normal
  label_properties:
    fontSize: 14
    fontWeight: '500'
    fontStyle: normal
    color: '#374151'
    backgroundColor: transparent
textarea:
  label: Textarea Label
  placeholder: Enter text...
  rows: 3
  padding: 10
  margin: 10
  borderRadius: 0
  label_properties:
    fontSize: 14
    fontWeight: '500'
    fontStyle: normal
    color: '#374151'
    backgroundColor: transparent
button:
  text: Click Me
  onclick: alert("Clicked!")
  variant: primary
  padding: 10
  margin: 10
  borderRadius: 0
  align: none
dropdown:
  label: Dropdown Label
  options: Option 1,Option 2,Option 3
  selected: ''
  padding: 10
  margin: 10
  borderWidth: 1
  borderColor: '#cccccc'
  borderRadius: 4
  color: '#333333'
  fontWeight: normal
  label_properties:
    fontSize: 14
    fontWeight: '500'
    fontStyle: normal
    color: '#374151'
    backgroundColor: transparent
calendar:
  month: 8
  year: 2024
  padding: 10
  margin: 10
  borderRadius: 0
checkbox:
  label: Checkbox Label
  text: Check me
  checked: false
  padding: 10
  margin: 10
  borderRadius: 0
  label_properties:
    fontSize: 14
    fontWeight: '500'
    fontStyle: normal
    color: '#374151'
    backgroundColor: transparent
radio:
  label: Radio Label
  text: Select me
  name: radio1
  value: option1
  padding: 10
  margin: 10
  borderWidth: 1
  borderColor: '#cccccc'
  borderRadius: 4
  color: '#333333'
  fontWeight: normal
  label_properties:
    fontSize: 14
    fontWeight: '500'
    fontStyle: normal
    color: '#374151'
    backgroundColor: transparent
columnsgrid:
  count: 2
  padding: 10
  margin: 10
  borderRadius: 0
accordion:
  title: Click to expand
  padding: 10
  margin: 10
  borderRadius: 0
tabs:
  padding: 10
  margin: 10
  borderRadius: 0
hamburger: {}
br: {}
link:
  text: Click Me
  url: '#'
  color: '#0000EE'
  underline: true
  showArrow: false
  fontSize: 16
  fontStyle: normal
  fontWeight: normal
  align: none
form:
  components: []
  padding: 10
  margin: 10
  borderRadius: 0
carousel:
  images_count: 3
  autoplay: true
  delay: 3000
  slides:
  - components:
    - name: image
      properties:
        src: https://via.placeholder.com/800x400?text=Slide+1
        alt: Slide 1
    - name: h3
      properties:
        text: First Slide
  - components:
    - name: image
      properties:
        src: https://via.placeholder.com/800x400?text=Slide+2
        alt: Slide 2
    - name: paragraph
      properties:
        text: Second slide with some text.
  - components:
    - name: image
      properties:
        src: https://via.placeholder.com/800x400?text=Slide+3
        alt: Slide 3






