page:
  background:
    color: '#ffffff'
    image: ''
  layout:
    padding:
      top: none
      right: none
      bottom: none
      left: none
    margin:
      top: none
      right: none
      bottom: none
      left: none
section:
  layout:
    tag: section
    direction: column
    align: stretch
    justify: start
    gap: md
  spacing:
    padding:
      top: md
      right: md
      bottom: md
      left: md
    margin:
      top: none
      right: none
      bottom: none
      left: none
  background:
    color: '#ffffff'
    image: ''
  appearance: {}
stack:
  layout:
    direction: column
    gap: md
    align: start
    justify: start
  responsive:
    collapseBreakpoint: sm
  appearance:
    divider: none
columnsgrid:
  layout:
    columns: 2
    gap: md
    align: stretch
  responsive:
    breakpoints:
      md: 2
      sm: 1
titlebar:
  branding:
    showLogo: true
    logoUrl: https://via.placeholder.com/50x40
    title: Website Title
  navigation:
    links:
    - label: Home
      href: '#home'
    - label: About
      href: '#about'
    - label: Contact
      href: '#contact'
  layout:
    alignment: left
    height: 60
  appearance:
    background:
      color: '#ffffff'
    border:
      width: 1
      style: solid
      color: '#dddddd'
    focus:
      background: '#f0f0f0'
  typography:
    title:
      size: 24
      weight: bold
      color: '#111827'
    menu:
      size: 16
      weight: medium
      color: '#333333'
heading:
  text: |
    Elevate your message
    with a bold statement
  level: 2
  typography:
    size: xl
    weight: bold
    lineHeight: 1.2
    transform: none
    letterSpacing: normal
    align: center
    color: '#111827'
  spacing:
    margin:
      top: none
      bottom: none
paragraph:
  text: |
    Tell your story across multiple lines.
    Continue the narrative with more detail here.
  typography:
    size: md
    lineHeight: 1.6
    transform: none
    letterSpacing: normal
    align: left
    color: '#1f2937'
    weight: regular
  spacing:
    margin:
      top: sm
      bottom: md
eyebrow:
  text: |
    Featured insight
    Highlights at a glance
  typography:
    size: xs
    weight: semibold
    transform: uppercase
    letterSpacing: wide
    align: left
    color: '#6366f1'
  spacing:
    margin:
      bottom: xs
caption:
  text: |
    Photo by Jane Doe
    Captured on location
  typography:
    size: sm
    lineHeight: 1.4
    transform: none
    align: center
    color: '#6b7280'
  spacing:
    margin:
      top: xs
blockquote:
  quote: |
    Design is intelligence made visible.
    Share a thought worth repeating.
  cite: Alina Wheeler
  typography:
    size: lg
    lineHeight: 1.6
    weight: medium
    transform: none
    align: center
    color: '#111827'
  spacing:
    margin:
      top: lg
      bottom: lg
  appearance:
    border:
      accentColor: '#6366f1'
    background:
      color: '#f9fafb'
image:
  source:
    url: https://via.placeholder.com/150
    altText: Placeholder image
  presentation:
    height: auto
    fit: cover
    cornerStyle: none
  overlay:
    enabled: false
video:
  source:
    url: https://www.youtube.com/watch?v=dQw4w9WgXcQ
  playback:
    controls: true
    autoplay: false
    muted: false
gif:
  source:
    url: https://media.giphy.com/media/VseXoJs6vVmwU/giphy.gif
  presentation:
    fit: cover
textbox:
  label:
    text: Textbox Label
    show: true
    typography:
      size: sm
      weight: medium
      color: '#374151'
  field:
    placeholder: Enter text...
    initialValue: ''
    helperText: ''
    required: false
  appearance:
    border:
      width: 1
      style: solid
      color: '#cccccc'
    background:
      color: '#ffffff'
    icon:
      position: none
textarea:
  label:
    text: Textarea Label
    show: true
    typography:
      size: sm
      weight: medium
      color: '#374151'
  field:
    placeholder: Enter text...
    rows: 3
    helperText: ''
    required: false
  appearance:
    border:
      width: 1
      style: solid
      color: '#cccccc'
    background:
      color: '#ffffff'
button:
  text: Click Me
  action:
    type: inlineScript
    value: alert("Clicked!")
  appearance:
    background:
      color: '#2563eb'
    border:
      color: '#1d4ed8'
    iconPlacement: none
  typography:
    weight: semibold
    color: '#ffffff'
dropdown:
  label:
    text: Dropdown Label
    show: true
    typography:
      size: sm
      weight: medium
      color: '#374151'
  field:
    placeholder: Choose an option
    selected: ''
    options: 'Option 1

      Option 2

      Option 3'
  appearance:
    border:
      width: 1
      style: solid
      color: '#cccccc'
    background:
      color: '#ffffff'
calendar:
  display:
    month: 8
    year: 2024
  appearance:
    showWeekNumbers: false
checkbox:
  label:
    text: Checkbox Label
    typography:
      size: sm
      weight: medium
      color: '#374151'
  field:
    text: Check me
    checked: false
    required: false
radio:
  label:
    text: Radio Label
    typography:
      size: sm
      weight: medium
      color: '#374151'
  field:
    text: Select me
    groupName: radio1
    value: option1
    checked: false
accordion:
  items:
  - title: Click to expand
    content: ''
  behavior:
    allowMultipleOpen: false
tabs:
  layout:
    orientation: horizontal
  tabs:
  - title: Tab One
    content: ''
  - title: Tab Two
    content: ''
hamburger:
  label: Menu
  links:
  - label: Home
    href: '#home'
  - label: About
    href: '#about'
br:
  size: md
link:
  text: Click Me
  href: '#'
  appearance:
    color: '#0000ee'
    underline: true
    showArrow: false
  typography:
    size: md
    weight: regular
form:
  layout:
    direction: column
    gap: md
  submit:
    buttonText: Submit
    show: true
carousel:
  behavior:
    autoplay: true
    delay: 3000
    loop: true
  navigation:
    showArrows: true
    showDots: true
  slides:
  - components:
    - name: image
      properties:
        source:
          url: https://via.placeholder.com/800x400?text=Slide+1
          altText: Slide 1
    - name: heading
      properties:
        text: First Slide
        level: 3
  - components:
    - name: image
      properties:
        source:
          url: https://via.placeholder.com/800x400?text=Slide+2
          altText: Slide 2
    - name: paragraph
      properties:
        text: Second slide with some text.
  - components:
    - name: image
      properties:
        source:
          url: https://via.placeholder.com/800x400?text=Slide+3
          altText: Slide 3
