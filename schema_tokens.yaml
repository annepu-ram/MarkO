typographySizes:
  type: selectOptions
  options:
    - value: xxs
      label: XXS
    - value: xs
      label: XS
    - value: sm
      label: SM
    - value: md
      label: MD
    - value: lg
      label: LG
    - value: xl
      label: XL
    - value: xxl
      label: XXL
    - value: xxxl
      label: XXXL
    - value: auto
      label: Auto

fontWeights:
  type: selectOptions
  options:
    - value: light
      label: Light
    - value: regular
      label: Regular
    - value: medium
      label: Medium
    - value: semibold
      label: Semi Bold
    - value: bold
      label: Bold
    - value: extrabold
      label: Extra Bold

spacingScale:
  type: selectOptions
  options:
    - value: none
      label: None
    - value: xs
      label: XS
    - value: sm
      label: SM
    - value: md
      label: MD
    - value: lg
      label: LG
    - value: xl
      label: XL
    - value: auto
      label: Auto
gapScale:
  type: selectOptions
  options:
    - value: none
      label: None
    - value: xs
      label: XS
    - value: sm
      label: SM
    - value: md
      label: MD
    - value: lg
      label: LG
    - value: xl
      label: XL
    - value: auto
      label: Auto
borderRadiusScale:
  type: selectOptions
  options:
    - value: none
      label: None
    - value: xs
      label: Extra Small
    - value: sm
      label: Small
    - value: md
      label: Medium
    - value: lg
      label: Large
    - value: xl
      label: Extra Large
    - value: xxl
      label: Extra Extra Large
    - value: pill
      label: Pill

borderStyleOptions:
  type: selectOptions
  options:
    - value: none
      label: None
    - value: solid
      label: Solid
    - value: dashed
      label: Dashed
    - value: dotted
      label: Dotted
    - value: double
      label: Double

alignmentHorizontal:
  type: selectOptions
  options:
    - value: left
      label: Left
    - value: center
      label: Center
    - value: right
      label: Right
    - value: justify
      label: Justify

alignmentVertical:
  type: selectOptions
  options:
    - value: start
      label: Start
    - value: center
      label: Center
    - value: end
      label: End

booleanToggle:
  type: selectOptions
  options:
    - value: true
      label: Yes
    - value: false
      label: No

letterSpacingMap:
  type: selectOptions
  options:
    - value: normal
      label: Normal
    - value: tight
      label: Tight
    - value: wide
      label: Wide
    - value: wider
      label: Wider

widthPercentages:
  type: selectOptions
  options:
    - value: "100"
      label: "100%"
    - value: "90"
      label: "90%"
    - value: "80"
      label: "80%"
    - value: "75"
      label: "75%"
    - value: "60"
      label: "60%"
    - value: "50"
      label: "50%"
    - value: "40"
      label: "40%"
    - value: "30"
      label: "30%"
    - value: "25"
      label: "25%"
    - value: "10"
      label: "10%"

